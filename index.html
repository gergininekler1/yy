<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Chimptopus Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet" />
    
    <script>
        const manifestJSON = {
            "name": "Chimptopus Pro", "short_name": "Notes",
            "start_url": window.location.href.split('#')[0].split('?')[0],
            "display": "standalone", "background_color": "#000000", "theme_color": "#000000",
            "icons": [{"src": "https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsrounded/edit_document/default/24px.svg", "sizes": "192x192", "type": "image/svg+xml"}]
        };
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestJSON));
        document.head.appendChild(manifestLink);
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #f2f2f7; 
            --surface-color: #ffffff; 
            --surface-alt: #e5e5ea; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --border-color: #d1d1d6;
            --primary-blue: #007aff; 
            --danger-color: #ff3b30;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.06);
            --color-taslak: #8e8e93; --color-revize: #007aff; --color-archive: #34c759; 
        }

        .dark-mode {
            --bg-color: #000000; 
            --surface-color: #1c1c1e; 
            --surface-alt: #2c2c2e;   
            --text-main: rgba(255,255,255,0.95); 
            --text-muted: rgba(255,255,255,0.6);
            --border-color: #38383a; 
            --card-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }

        html, body { max-width: 100vw; overflow-x: hidden; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            min-height: 100vh; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background 0.3s ease, color 0.3s ease, padding-top 0.3s ease;
            -webkit-tap-highlight-color: transparent; padding-top: calc(125px + env(safe-area-inset-top)); 
        }

        body.focus-mode .app-header, body.focus-mode .top-tabs { transform: translateY(-150%); opacity: 0; pointer-events: none; }
        body.focus-mode { padding-top: calc(20px + env(safe-area-inset-top)) !important; }
        body.home-active { padding-top: calc(75px + env(safe-area-inset-top)); }

        * { box-sizing: border-box; }

        .card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--card-shadow); }
        
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 1010;
            padding: calc(15px + env(safe-area-inset-top)) 20px 10px;
            display: flex; justify-content: space-between; align-items: center; transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .logo { font-size: 22px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        .top-tabs {
            position: fixed; top: calc(56px + env(safe-area-inset-top)); left: 0; width: 100%;
            background: var(--bg-color); border-bottom: 1px solid var(--border-color); 
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 0; z-index: 1000; transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-muted); cursor: pointer; flex: 1; text-align: center; position: relative; padding-bottom: 4px;
        }
        .nav-item .icon { font-size: 20px; transition: transform 0.2s ease; }
        .nav-item .label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-item.active { color: var(--text-main); }
        .nav-item.active .icon { transform: scale(1.1); font-weight: 500; }

        .page-container { padding: 0 20px 40px; display: none; animation: pageIn 0.3s ease; }
        .page-container.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .editor-island { 
            padding: 16px; margin-bottom: 15px; display: flex; flex-direction: column; 
            border-radius: 16px; background: var(--surface-color); border: 1px solid var(--border-color); box-shadow: var(--card-shadow); 
        }
        .island-title { 
            font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; 
        }

        .meta-input {
            width: 100%; background: var(--surface-alt); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 12px 15px; font-size: 14px; font-weight: 600;
            color: var(--text-main); outline: none; font-family: inherit; 
        }
        .meta-input::placeholder { color: var(--text-muted); font-weight: 400; }
        
        /* DRY PRENSİBİ: Ortak Buton Özellikleri */
        .btn-base {
            border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px; 
            font-family: inherit; transition: 0.2s; border: none; white-space: nowrap;
        }
        .btn-base:active { transform: scale(0.96); opacity: 0.9; }

        .timer-btn { @extend .btn-base; padding: 8px 12px; background: var(--surface-alt); border: 1px solid var(--border-color); color: var(--text-main); font-size: 12px; height: 36px; border-radius: 8px; font-weight: 600;}
        .timer-btn:active { background: var(--border-color); transform: scale(0.96); }
        .btn-primary { background: var(--primary-blue); color: white; padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; font-family: inherit; }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
        .btn-secondary { background: var(--surface-alt); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; font-family: inherit; }
        .btn-secondary:active { transform: scale(0.96); }

        @keyframes pulseBorder { 0% { border-color: var(--border-color); } 50% { border-color: var(--primary-blue); } 100% { border-color: var(--border-color); } }
        .sw-running { animation: pulseBorder 2s infinite; color: var(--primary-blue); border-color: var(--primary-blue); }

        textarea {
            width: 100%; height: 160px; background-color: var(--surface-alt);
            background-image: repeating-linear-gradient(transparent, transparent 31px, var(--border-color) 31px, var(--border-color) 32px);
            background-attachment: local; line-height: 32px; padding: 6px 15px; font-size: 16px; 
            border: 1px solid var(--border-color); border-radius: 8px; outline: none; color: var(--text-main); resize: none;
            font-family: inherit; transition: height 0.3s ease; margin-bottom: 10px;
        }

        .ref-input-container { display: flex; gap: 10px; align-items: center; background: var(--surface-alt); padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .ref-input-container input { background: transparent; border: none; outline: none; font-size: 14px; color: var(--text-main); flex-grow: 1; font-family: inherit; }
        .ref-item-text { font-size: 14px; line-height: 1.5; color: var(--text-main); margin-top: 4px; }
        
        .word-challenge { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-top: 15px; }
        .progress-bar-container { flex-grow: 1; height: 8px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; margin-left: 10px; border: 1px solid var(--border-color); }
        .progress-bar { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s ease; }

        .recent-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .recent-scroll::-webkit-scrollbar { display: none; }

        .tag-filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; margin-bottom: 4px; }
        .tag-filter-bar::-webkit-scrollbar { display: none; }
        .tag-chip { flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-muted); cursor: pointer; transition: 0.2s; white-space: nowrap; box-shadow: var(--card-shadow); display:flex; align-items:center; gap:4px; }
        .tag-chip.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        .ios-close-btn { background: var(--surface-alt); border: none; color: var(--text-muted); flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .note-card { min-width: 150px; padding: 16px; cursor: pointer; position: relative; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.15s ease, background 0.15s ease; }
        .note-card:active { transform: scale(0.985); }

        .duplicate-warning { border: 2px solid var(--danger-color) !important; background: rgba(255, 59, 48, 0.05) !important; }
        .duplicate-badge { font-size: 9px; font-weight: 800; color: white; background: var(--danger-color); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-left: 6px; vertical-align: middle; }
        .mention-link { color: var(--primary-blue); cursor: pointer; font-weight: 500; text-decoration: none; background: rgba(0,122,255,0.15); padding: 2px 6px; border-radius: 4px; }
        .tag-link { color: #bf5af2; cursor: pointer; font-weight: 600; background: rgba(191,90,242,0.15); padding: 2px 6px; border-radius: 4px; font-size: inherit; }
        .highlight { background-color: rgba(48,209,88,0.25); color: #30d158; border-radius: 4px; padding: 0 4px; font-weight: 500; }

        /* MODALS */
        .ios-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 3000; display: none; opacity: 0; transition: opacity 0.3s; justify-content: center; align-items: flex-end; padding: 20px;
        }
        .ios-modal.active { display: flex; opacity: 1; }
        .ios-modal-content {
            background: var(--surface-color); border-radius: 20px; width: 100%; max-width: 400px;
            max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ios-modal.center-modal { align-items: center; }
        .ios-modal.center-modal .ios-modal-content { transform: scale(0.9); transition: transform 0.3s; }
        .ios-modal.active .ios-modal-content { transform: translateY(0) scale(1); }
        .ios-modal-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--surface-color); }
        .ios-modal-body { flex-grow: 1; min-height: 0; padding: 20px; overflow-y: auto; font-size: 15px; line-height: 1.6; color: var(--text-main); white-space: pre-wrap; word-wrap: break-word; background: var(--surface-color); }
        .ios-modal-footer { padding: 15px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; background: var(--surface-alt); flex-shrink: 0; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--text-main); color: var(--bg-color); padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600;
            z-index: 9999; opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none; white-space: nowrap; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        
        .side-panel {
            position: fixed; top: 0; right: 0; transform: translateX(100%); width: 100%; max-width: 320px; height: 100%;
            z-index: 2000; padding: 40px 25px; background: var(--surface-color); border-left: 1px solid var(--border-color); transition: transform 0.3s ease; overflow-y: auto;
        }
        .side-panel.active { transform: translateX(0); box-shadow: -5px 0 25px rgba(0,0,0,0.5); }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); display: none; z-index: 1500; opacity: 0; transition: opacity 0.3s; }
        .menu-overlay.active { display: block; opacity: 1; }

        .action-btn-menu { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--surface-alt); color: var(--text-main); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .icon-btn { background: transparent; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-main); transition: 0.2s; }
        .action-icon { font-size: 22px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .empty-state-icon-wrap { width: 72px; height: 72px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 36px; }

        .dash-hero-btn { background: var(--surface-color); color: var(--text-main); border: 2px dashed var(--border-color); border-radius: 16px; padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; box-shadow: var(--card-shadow); transition: transform 0.2s, border-color 0.2s; }
        .dash-hero-btn:hover { border-color: var(--primary-blue); }

        .swipe-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-blue); z-index: 9999; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold; }
        .swipe-overlay.active { transform: translateX(0); }

        .q-row { display:flex; gap:10px; align-items:center; width:100%; margin-bottom:8px; }
        .q-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--primary-blue); flex-shrink: 0; }
        .q-input-wrap { flex-grow: 1; display: flex; align-items: center; }

        /* Yeni Klasör Yöneticisi CSS */
        .folder-list-item { display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border-color); align-items:center; }
    </style>
</head>
<body class="dark-mode home-active">

    <div class="swipe-overlay" id="swipeOverlay"><span class="material-symbols-rounded" style="font-size: 48px; color:white;">find_replace</span></div>

    <header class="app-header">
        <div class="logo" id="mainLogo" onclick="navSwitchPage('home')">
            <span class="material-symbols-rounded" style="color:var(--primary-blue)">memory</span> Notes
        </div>
        <div style="display:flex; gap:5px;">
            <button class="icon-btn" onclick="toggleDarkMode()"><span class="material-symbols-rounded" id="themeIcon">light_mode</span></button>
            <button class="icon-btn" onclick="togglePanel('sideMenu')"><span class="material-symbols-rounded">more_horiz</span></button>
        </div>
    </header>

    <nav class="top-tabs" id="mainNavTabs">
        <div class="nav-item" id="nav-taslak" onclick="navSwitchPage('taslak')"><span class="material-symbols-rounded icon">edit_document</span><span class="label">Draft</span></div>
        <div class="nav-item" id="nav-revize" onclick="navSwitchPage('revize')"><span class="material-symbols-rounded icon">find_replace</span><span class="label">Revise</span></div>
        <div class="nav-item" id="nav-database" onclick="navSwitchPage('database')"><span class="material-symbols-rounded icon">database</span><span class="label">Database</span></div>
    </nav>

    <div class="menu-overlay" id="overlay" onclick="closePanels()"></div>
    <div class="toast" id="toastEl"><span id="toastMsg"></span></div>

    <div class="ios-modal center-modal" id="universalModal" onclick="closeUniversalModal(event)">
        <div class="ios-modal-content" onclick="event.stopPropagation()">
            <div class="ios-modal-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div>
                        <div id="modalTitle" style="font-weight:800; font-size:18px; color:var(--text-main);"></div>
                        <div id="modalDate" style="font-size:12px; color:var(--text-muted); margin-top:2px;"></div>
                    </div>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <select id="modalFolderSelect" class="meta-input" style="padding:6px; font-size:11px; height:auto; width:auto; border-radius:6px; margin:0;" onchange="moveCurrentNoteFolder(this.value)"></select>
                    <button class="ios-close-btn" onclick="closeUniversalModal()"><span class="material-symbols-rounded">close</span></button>
                </div>
            </div>
            <div class="ios-modal-body" id="modalBody"></div>
            <div id="modalLinksContainer" style="padding:0 20px 15px; display:none; flex-direction:column; gap:10px; background:var(--surface-color);">
                <div style="font-size:11px; font-weight:800; color:var(--primary-blue); border-top:1px dashed var(--border-color); padding-top:15px; display:flex; align-items:center; gap:4px;">
                    <span class="material-symbols-rounded" style="font-size:16px;">link</span> CONNECTIONS
                </div>
                <div id="modalLinksList" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
            <div class="ios-modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <div class="ios-modal center-modal" id="filterModal" onclick="closeFilterModal(event)">
        <div class="ios-modal-content" onclick="event.stopPropagation()">
            <div class="ios-modal-header">
                <div style="font-weight:800; font-size:18px;">🌪️ Görünümü Filtrele</div>
                <button class="ios-close-btn" onclick="closeFilterModal()"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="ios-modal-body">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <div style="font-size:10px; font-weight:800; color:var(--text-muted);">KLASÖRLER</div>
                    <button class="btn-secondary" style="padding:4px 8px; font-size:11px;" onclick="openFolderManager()">⚙️ Yönet</button>
                </div>
                <div id="dbFolderFilters" class="tag-filter-bar" style="margin-bottom:15px; flex-wrap:wrap;"></div>
                
                <div style="font-size:10px; font-weight:800; color:var(--text-muted); margin-bottom:8px;">AŞAMA & DURUM</div>
                <div id="dbStageFilters" class="tag-filter-bar" style="margin-bottom:15px; flex-wrap:wrap;"></div>
                
                <div style="font-size:10px; font-weight:800; color:var(--text-muted); margin-bottom:8px;">KATEGORİ</div>
                <div id="dbCatFilters" class="tag-filter-bar" style="margin-bottom:15px; flex-wrap:wrap;"></div>
            </div>
            <div class="ios-modal-footer" style="justify-content:flex-end;">
                <button class="btn-primary" onclick="closeFilterModal()" style="width:100%;">Uygula</button>
            </div>
        </div>
    </div>

    <div class="ios-modal center-modal" id="folderManageModal" onclick="closeFolderManager(event)">
        <div class="ios-modal-content" onclick="event.stopPropagation()">
            <div class="ios-modal-header">
                <div style="font-weight:800; font-size:18px;">⚙️ Klasör Yönetimi</div>
                <button class="ios-close-btn" onclick="closeFolderManager()"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="ios-modal-body" style="padding: 0;">
                <div id="folderListContainer" style="display:flex; flex-direction:column;"></div>
            </div>
            <div class="ios-modal-footer">
                <button class="btn-secondary" style="width:100%; border-color:var(--primary-blue); color:var(--primary-blue);" onclick="createFolder()">+ Yeni Klasör Oluştur</button>
            </div>
        </div>
    </div>

    <div class="ios-modal" id="newProjectModal" onclick="closeNewProjectModal(event)">
        <div class="ios-modal-content" onclick="event.stopPropagation()">
            <div class="ios-modal-header">
                <div style="font-weight:800; font-size:18px;">✨ Yeni Proje / Fikir</div>
                <button class="ios-close-btn" onclick="closeNewProjectModal()"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="ios-modal-body">
                <label style="font-size:11px; font-weight:800; color:var(--text-muted); display:block; margin-bottom:8px;">PROJE ADI / ANA FİKİR</label>
                <input type="text" id="npTitle" class="meta-input" placeholder="Aklındaki fikri yaz..." style="margin-bottom:20px;">
                <label style="font-size:11px; font-weight:800; color:var(--text-muted); display:block; margin-bottom:8px;">KATEGORİ</label>
                <div id="npCatChips" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;"></div>
                <label style="font-size:11px; font-weight:800; color:var(--text-muted); display:block; margin-bottom:8px;">KLASÖR</label>
                <select id="npFolderSelect" class="meta-input" style="width:100%;"></select>
            </div>
            <div class="ios-modal-footer" style="justify-content:flex-end;">
                <button class="btn-primary" onclick="startNewProject()" style="width:100%; font-size:16px; padding:14px;">🚀 Başla</button>
            </div>
        </div>
    </div>

    <div id="sideMenu" class="side-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="font-weight:800; margin:0; font-size:22px;">Ayarlar</h2>
            <button class="ios-close-btn" onclick="closePanels()"><span class="material-symbols-rounded">close</span></button>
        </div>
        
        <button class="action-btn-menu" onclick="uploadToCloud()" style="color: var(--primary-blue); background: rgba(0,122,255,0.1); border-color: rgba(0,122,255,0.2);">
            <span class="material-symbols-rounded" style="font-size:20px;">cloud_upload</span> Buluta Yedekle
        </button>
        <button class="action-btn-menu" onclick="downloadFromCloud()" style="color: var(--primary-blue); background: rgba(0,122,255,0.1); border-color: rgba(0,122,255,0.2);">

        </button>
        
        <hr style="margin:20px 0; border:0; border-top:1px solid var(--border-color);">
        <button class="action-btn-menu" onclick="clearAll()" style="color:var(--danger-color); background: rgba(255,59,48,0.1); border-color: rgba(255,59,48,0.2);">

    <div id="pageHome" class="page-container">
        <button class="dash-hero-btn" onclick="openNewProjectModal()">
            <span class="material-symbols-rounded" style="font-size:32px; color:var(--text-main);">add_circle</span>
            <span style="font-size:16px; font-weight:800;">Yeni Proje / Fikir Oluştur</span>

        <div style="margin-top: 30px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">

            </div>

    <div id="pageEditor" class="page-container">
        <div class="editor-island" style="padding: 12px 16px;">
            <div class="island-title" style="margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:8px;">

                    <span id="boxLabel" style="font-size:14px;">Draft</span>
                    <span id="currentNoteIdDisplay" style="font-size:13px; font-weight:800; color:var(--primary-blue); background:rgba(0,122,255,0.15); padding:2px 8px; border-radius:6px;"></span>
                </div>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <button class="timer-btn" onclick="toggleFocusMode()"><span class="material-symbols-rounded">fullscreen</span> Focus</button>

                    <span id="swDisplay" style="font-size:16px; font-weight:800; color:var(--text-muted);">00:00</span>
                    <button class="timer-btn" id="swToggleBtn" onclick="toggleStopwatch()"><span class="material-symbols-rounded" id="swToggleIcon">play_arrow</span></button>
                    <button class="ios-close-btn" style="color:var(--danger-color);" onclick="clearCurrentNote()"><span class="material-symbols-rounded">delete_sweep</span></button>
                </div>
            </div>
        </div>

        <div class="editor-island">
            <input type="text" id="metaTitle" class="meta-input" style="margin-bottom:12px; font-size:16px; font-weight:800;" placeholder="Proje Adı / Core Idea">
            <textarea id="noteInput" placeholder="Type your text here... (#tag @001)" oninput="handleInput()"></textarea>
            
            <div class="word-challenge">
                <span class="material-symbols-rounded" style="font-size:18px; color:var(--primary-blue);">military_tech</span>
                <span id="wordLevel" style="font-weight:800; color:var(--primary-blue)">Level 1</span>
                <span id="wordCountUI" style="margin-left:auto; font-size:12px; font-weight:700; color:var(--text-muted);">0 / 50</span>
                <div class="progress-bar-container"><div class="progress-bar" id="wordProgress"></div></div>
            </div>

            <div style="display:flex; align-items:center; gap:8px; margin-top:20px; overflow-x:auto; scrollbar-width:none;">
                <span style="font-size:10px; font-weight:800; color:var(--text-muted); flex-shrink:0;">KATEGORİ:</span>
                <div id="editorCatChips" style="display:flex; gap:6px;"></div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                <span class="material-symbols-rounded action-icon" onclick="undoText()" title="Undo" style="font-size:24px;">undo</span>

    <div id="pageDatabase" class="page-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="font-weight:800; font-size:24px; margin:0; letter-spacing:-0.5px;">Database</h2>
            <div style="display:flex; gap:8px;">
                <button class="btn-secondary" style="padding:6px 10px; height:auto; border-radius:6px;" onclick="openFilterModal()">
                    <span class="material-symbols-rounded" style="font-size:18px;">filter_list</span> Filtrele
                </button>
                <select id="dbSortSelect" class="meta-input" style="padding: 6px 10px; font-size: 12px; height: auto;" onchange="renderDatabasePage()">
                    <option value="newest">En Yeniler</option>
                    <option value="oldest">Eskiden Yeniye</option>
                </select>
            </div>
        </div>
        <div id="databaseBoard" style="display:flex; flex-direction:column;"></div>
    </div>

    <script>
        /* ─────────────────────────────────────────
           1. FIREBASE YEDEKLEME & GERİ YÜKLEME
        ───────────────────────────────────────── */
        const firebaseConfig = {
            apiKey: "AIzaSyDvkn0pkYJPMNcnUYEaFElyrFUOmEumD30",
            authDomain: "gergininekler11.firebaseapp.com",
            databaseURL: "https://gergininekler11-default-rtdb.firebaseio.com",
            projectId: "gergininekler11",
            storageBucket: "gergininekler11.firebasestorage.app",
            messagingSenderId: "75194866682",
            appId: "1:75194866682:web:d390dc7fea8bd47fbde243",
            measurementId: "G-1F3HZ9EPDJ"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function uploadToCloud() {
            showToast('Buluta yedekleniyor... Lütfen bekleyin.', null, null);
            const dataToBackup = {
                notes: JSON.parse(localStorage.getItem('chimptopus_v18_notes')) || [],
                archive: JSON.parse(localStorage.getItem('chimptopus_v18_archive')) || [],
                folders: JSON.parse(localStorage.getItem('chimptopus_v18_folders')) || [{id:'f_default', name:'Kişisel Notlar'}],
                counter: localStorage.getItem('chimptopus_v18_counter') || 1,
            };
            database.ref('chimptopus_backup').set(dataToBackup).then(() => {
                showToast('✅ Tüm veriler buluta başarıyla yedeklendi!');
            }).catch((error) => {
                console.error("Yedekleme hatası:", error); showToast('❌ Yedekleme başarısız oldu!');
            });
        }

        function downloadFromCloud() {
            if (!confirm("DİKKAT: Cihazındaki tüm notlar silinip buluttaki yedek yüklenecek. Emin misin?")) return;
            showToast('Buluttan indiriliyor...', null, null);
            database.ref('chimptopus_backup').once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if(data.notes) localStorage.setItem('chimptopus_v18_notes', JSON.stringify(data.notes));
                    if(data.archive) localStorage.setItem('chimptopus_v18_archive', JSON.stringify(data.archive));
                    if(data.folders) localStorage.setItem('chimptopus_v18_folders', JSON.stringify(data.folders));
                    if(data.counter) localStorage.setItem('chimptopus_v18_counter', data.counter);
                    showToast('✅ Veriler geri yüklendi! Sayfa yenileniyor...');
                    setTimeout(() => location.reload(), 1500); 
                } else { showToast('⚠️ Bulutta yedek bulunamadı.'); }
            }).catch((error) => { showToast('❌ İndirme başarısız!'); });
        }


        /* ─────────────────────────────────────────
           2. KLASÖR YÖNETİMİ & FİLTRELER
        ───────────────────────────────────────── */
        const CATEGORIES = { 'genel': '📂 Genel', 'fikir': '🧠 Fikir / Karalama', 'medya': '📚 Kitap / Film', 'yazi': '✍️ Köşe Yazısı', 'proje': '⚙️ Proje / Teknik' };
        let folders = JSON.parse(localStorage.getItem('chimptopus_v18_folders')) || [{id:'f_default', name:'Kişisel Notlar'}];
        
        let currentEditorCategory = 'genel', currentEditorFolder = 'f_default', npSelectedCategory = 'genel';
        let dbStageFilter = 'all', dbCategoryFilter = 'all', dbFolderFilter = 'all';

        function saveFolders() { localStorage.setItem('chimptopus_v18_folders', JSON.stringify(folders)); }

        // Modal Yönetimi
        function openFilterModal() { const m = document.getElementById('filterModal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); }
        function closeFilterModal(e) { if(e && e.target !== e.currentTarget && !e.target.classList.contains('close')) return; const m = document.getElementById('filterModal'); m.classList.remove('active'); setTimeout(() => m.style.display = 'none', 300); }
        function openFolderManager() { closeFilterModal(); renderFolderManager(); const m = document.getElementById('folderManageModal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); }
        function closeFolderManager(e) { if(e && e.target !== e.currentTarget && !e.target.classList.contains('close')) return; const m = document.getElementById('folderManageModal'); m.classList.remove('active'); setTimeout(() => {m.style.display = 'none'; openFilterModal();}, 300); }

        function renderDatabaseFilters() {
            const fCont = document.getElementById('dbFolderFilters');
            fCont.innerHTML = `<div class="tag-chip ${dbFolderFilter === 'all' ? 'active' : ''}" onclick="dbFolderFilter='all'; renderDatabaseFilters(); renderDatabasePage();">Tüm Klasörler</div>`;
            folders.forEach(f => fCont.innerHTML += `<div class="tag-chip ${dbFolderFilter === f.id ? 'active' : ''}" onclick="dbFolderFilter='${f.id}'; renderDatabaseFilters(); renderDatabasePage();">📁 ${f.name}</div>`);
            
            const sCont = document.getElementById('dbStageFilters');
            const stages = [{id: 'all', label: 'Tümü'}, {id: 'taslak', label: 'Taslaklar'}, {id: 'revize', label: 'Revizeler'}, {id: 'archive', label: 'Arşiv'}];
            sCont.innerHTML = stages.map(s => `<div class="tag-chip ${dbStageFilter === s.id ? 'active' : ''}" onclick="dbStageFilter='${s.id}'; renderDatabaseFilters(); renderDatabasePage();">${s.label}</div>`).join('');
            
            const cCont = document.getElementById('dbCatFilters');
            cCont.innerHTML = `<div class="tag-chip ${dbCategoryFilter === 'all' ? 'active' : ''}" onclick="dbCategoryFilter='all'; renderDatabaseFilters(); renderDatabasePage();">Tüm Kategoriler</div>`;
            for (const [k, v] of Object.entries(CATEGORIES)) cCont.innerHTML += `<div class="tag-chip ${dbCategoryFilter === k ? 'active' : ''}" onclick="dbCategoryFilter='${k}'; renderDatabaseFilters(); renderDatabasePage();">${v}</div>`;
        }

        // Klasör CRUD işlemleri
        function createFolder() {
            const name = prompt("Yeni klasör adı:");
            if (name && name.trim()) { folders.push({id: 'f_' + Date.now(), name: name.trim()}); saveFolders(); renderFolderManager(); renderDatabaseFilters(); }
        }
        function editFolder(id) {
            let f = folders.find(x => x.id === id); let newName = prompt("Yeni klasör adı:", f.name);
            if(newName && newName.trim()) { f.name = newName.trim(); saveFolders(); renderFolderManager(); renderDatabaseFilters(); renderDatabasePage(); }
        }
        function deleteFolder(id) {
            if(confirm("Bu klasörü silmek istediğinize emin misiniz? İçindeki notlar zarar görmeden 'Kişisel Notlar' klasörüne taşınacaktır.")) {
                notes.forEach(n => { if(n.folderId === id) n.folderId = 'f_default'; });
                archive.forEach(a => { if(a.folderId === id) a.folderId = 'f_default'; });
                saveToLocal(); localStorage.setItem('chimptopus_v18_archive', JSON.stringify(archive));
                folders = folders.filter(f => f.id !== id);
                saveFolders(); renderFolderManager(); renderDatabaseFilters(); renderDatabasePage(); showToast("Klasör silindi, notlar kurtarıldı.");
            }
        }
        function renderFolderManager() {
            const cont = document.getElementById('folderListContainer'); cont.innerHTML = '';
            folders.forEach(f => {
                const actionHtml = f.id === 'f_default' ? `<span style="font-size:10px; color:var(--text-muted);">Sistem Klasörü</span>` : `<div style="display:flex; gap:10px;"><span class="material-symbols-rounded action-icon" style="font-size:18px; color:var(--primary-blue);" onclick="editFolder('${f.id}')">edit</span><span class="material-symbols-rounded action-icon" style="font-size:18px; color:var(--danger-color);" onclick="deleteFolder('${f.id}')">delete</span></div>`;
                cont.innerHTML += `<div class="folder-list-item"><span style="font-weight:600; font-size:14px;">📁 ${f.name}</span>${actionHtml}</div>`;
            });
        }


        /* ─────────────────────────────────────────
           3. DRY: ORTAK MODAL VE HIGHLIGHT MANTIĞI
        ───────────────────────────────────────── */
        function openNoteModal(id) {
            let item = notes.find(n => n.id === id); let isArchive = false;
            if(!item) { item = archive.find(a => a.id === id); isArchive = true; } if(!item) return;

            let typeStr = isArchive ? 'Archived #' : (item.type === 'taslak' ? 'Draft #' : 'Revise #');
            document.getElementById('modalTitle').innerText = typeStr + item.num;
            let timeHtml = item.spentSeconds ? `<span style="margin-left:6px;"><span class="material-symbols-rounded" style="font-size:14px; vertical-align:middle;">timer</span>${formatTime(item.spentSeconds)}</span>` : '';
            document.getElementById('modalDate').innerHTML = (item.time || item.date) + timeHtml;
            
            document.getElementById('modalFolderSelect').innerHTML = folders.map(f => `<option value="${f.id}" ${f.id === (item.folderId || 'f_default') ? 'selected' : ''}>📁 ${f.name}</option>`).join('');
            currentlyViewingModalNoteId = item.id; // Taşıma işlemi için
            
            document.getElementById('modalBody').innerHTML = formatMentionsAndHighlights(item.text);
            
            let hlAction = `toggleHighlight(${item.id}, ${isArchive}, false)`;
            let unhlAction = `toggleHighlight(${item.id}, ${isArchive}, true)`;
            let delAction = isArchive ? `deleteArchive(${item.id})` : `deleteNote(${item.id})`;

            let leftBtn = `<div style="display:flex; gap:15px; align-items:center;">
                <span class="material-symbols-rounded action-icon" style="color:var(--danger-color);" onclick="${delAction}; closeUniversalModal();">delete</span>
                <span class="material-symbols-rounded action-icon" style="color:#30d158;" onmousedown="event.preventDefault(); ${hlAction};" ontouchstart="event.preventDefault(); ${hlAction};">border_color</span>
                <span class="material-symbols-rounded action-icon" style="color:var(--text-muted);" onmousedown="event.preventDefault(); ${unhlAction};" ontouchstart="event.preventDefault(); ${unhlAction};">format_color_reset</span>
            </div>`;
            
            let rightBtn = isArchive 
                ? `<div style="display:flex; gap:15px;"><span class="material-symbols-rounded action-icon" onclick="restoreToRevize(${item.id}); closeUniversalModal();">restore_page</span></div>`
                : `<div style="display:flex; gap:15px; align-items:center;"><button class="btn-primary" style="padding:6px 16px; border-radius:20px;" onclick="editNote(${item.id}); closeUniversalModal();">Edit</button></div>`;

            document.getElementById('modalFooter').innerHTML = leftBtn + rightBtn;
            const modal = document.getElementById('universalModal'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('active'), 10);
        }

        function toggleHighlight(noteId, isArchive, isRemove) {
            const sel = window.getSelection(); const textToHighlight = sel.toString().trim(); if (!textToHighlight) return showToast('⚠️ Metin seçin.');
            let list = isArchive ? archive : notes; let note = list.find(n => n.id === noteId); if (!note) return;

            if (isRemove) {
                const safeText = textToHighlight.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                let regex = new RegExp(`==([^=]*?${safeText}[^=]*?)==`, 'g');
                if (regex.test(note.text)) note.text = note.text.replace(regex, '$1');
            } else {
                if (note.text.includes(textToHighlight)) note.text = note.text.replace(textToHighlight, `==${textToHighlight}==`);
            }
            saveToLocal(); if (isArchive) localStorage.setItem('chimptopus_v18_archive', JSON.stringify(archive));
            openNoteModal(noteId); renderDatabasePage(); renderHomeActiveProjects(); showToast(isRemove ? '🧹 Vurgu Silindi' : '🖍️ Vurgulandı');
        }

        function closeUniversalModal(e) { if (e && e.target !== e.currentTarget && !e.target.classList.contains('close')) return; const m = document.getElementById('universalModal'); m.classList.remove('active'); setTimeout(() => m.style.display = 'none', 300); }


        /* ─────────────────────────────────────────
           4. YENİ: SİLME VE GERİ YÜKLEME FONKSİYONLARI
        ───────────────────────────────────────── */
        function deleteNote(id) {
            if(confirm("Bu notu tamamen silmek istediğine emin misin?")) {
                notes = notes.filter(n => n.id !== id); saveToLocal(); renderDatabasePage(); renderHomeActiveProjects(); showToast('🗑️ Not Silindi');
            }
        }
        function deleteArchive(id) {
            if(confirm("Arşivdeki bu notu kalıcı olarak silmek istediğine emin misin?")) {
                archive = archive.filter(a => a.id !== id); localStorage.setItem('chimptopus_v18_archive', JSON.stringify(archive)); renderDatabasePage(); showToast('🗑️ Arşivden Silindi');
            }
        }
        function restoreToRevize(id) {
            let item = archive.find(a => a.id === id); if(!item) return;
            archive = archive.filter(a => a.id !== id); localStorage.setItem('chimptopus_v18_archive', JSON.stringify(archive));
            item.type = 'revize'; notes.unshift(item); saveToLocal(); renderDatabasePage(); showToast('🚀 Revizeye Geri Döndü');
        }
        function moveCurrentNoteFolder(folderId) {
            let note = notes.find(n => n.id === currentlyViewingModalNoteId) || archive.find(a => a.id === currentlyViewingModalNoteId);
            if(note) { note.folderId = folderId; saveToLocal(); if(note.type === 'archive') localStorage.setItem('chimptopus_v18_archive', JSON.stringify(archive)); showToast('📁 Klasör Değiştirildi'); renderDatabasePage(); renderHomeActiveProjects(); }
        }

        /* ─────────────────────────────────────────
           5. DÜZELTİLMİŞ SWIPE (Y EKSENİ KORUMALI)
        ───────────────────────────────────────── */
        const editorPageEl = document.getElementById('pageEditor');
        let touchstartX = 0, touchstartY = 0, touchendX = 0, touchendY = 0;

        editorPageEl.addEventListener('touchstart', e => { 
            touchstartX = e.changedTouches[0].screenX; touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});

        editorPageEl.addEventListener('touchend', e => { 
            touchendX = e.changedTouches[0].screenX; touchendY = e.changedTouches[0].screenY; 
            // Hem X ekseninde yeterli kaydırma olmalı hem de Y ekseninde (aşağı kaydırma) sapma az olmalı (Yanlışlıkları önler)
            if (currentPage === 'taslak' && (touchendX > touchstartX + 80) && Math.abs(touchendY - touchstartY) < 50) { 
                const text = document.getElementById('noteInput').value; 
                if (!text.trim()) return showToast('⚠️ Boş taslak kaydırılamaz!');
                const overlay = document.getElementById('swipeOverlay'); overlay.classList.add('active');
                setTimeout(() => { handleAction('transfer_revize', true); overlay.classList.remove('active'); }, 300);
            }
        }, {passive: true});


        /* ─────────────────────────────────────────
           6. TEMEL SİSTEM DEĞİŞKENLERİ VE ARAYÜZ
        ───────────────────────────────────────── */
        let notes = JSON.parse(localStorage.getItem('chimptopus_v18_notes')) || [];
        let archive = JSON.parse(localStorage.getItem('chimptopus_v18_archive')) || [];
        let globalCounter = parseInt(localStorage.getItem('chimptopus_v18_counter')) || 1;
        let draftsMemory = JSON.parse(localStorage.getItem('chimptopus_v18_drafts')) || { taslak:'', revize:'' };
        let metaMemory = JSON.parse(localStorage.getItem('chimptopus_v18_meta')) || { title:'', category: 'genel', folder: 'f_default' };

        let currentPage = 'home', editingNoteId = null, textHistory = [], swInterval, swSeconds = 0, swRunning = false, currentlyViewingModalNoteId = null;

        function saveToLocal() { localStorage.setItem('chimptopus_v18_notes', JSON.stringify(notes)); localStorage.setItem('chimptopus_v18_counter', globalCounter); }
        function getNextAvailableNum() { let next = 1; const all = [...notes, ...archive].map(n => parseInt(n.num)); while (all.includes(next)) next++; return String(next).padStart(3, '0'); }

        window.onload = () => { renderDatabaseFilters(); navSwitchPage('home'); };

        function navSwitchPage(page) { 
            if (['taslak', 'revize'].includes(currentPage)) { draftsMemory[currentPage] = document.getElementById('noteInput').value; localStorage.setItem('chimptopus_v18_drafts', JSON.stringify(draftsMemory)); }
            editingNoteId = null; switchPage(page); 
        }

        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); 
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active')); 
            
            if(document.getElementById('nav-' + page)) document.getElementById('nav-' + page).classList.add('active');
            
            if (page === 'home') { document.getElementById('pageHome').classList.add('active'); document.body.classList.add('home-active'); renderHomeActiveProjects(); }
            else if (page === 'database') { document.getElementById('pageDatabase').classList.add('active'); document.body.classList.remove('home-active'); renderDatabasePage(); } 
            else {
                document.getElementById('pageEditor').classList.add('active'); document.body.classList.remove('home-active');
                if(!editingNoteId) { document.getElementById('currentNoteIdDisplay').innerText = '#' + getNextAvailableNum(); document.getElementById('noteInput').value = draftsMemory[page] || ''; swSeconds = 0; }
                document.getElementById('stageBadge').style.background = page === 'taslak' ? 'var(--color-taslak)' : 'var(--color-revize)';
                renderEditorCategories(); renderEditorButtons(page); updateWordProgress();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Ana Aksiyonlar (Kaydet, Güncelle vb)
        function handleAction(actionType, isSilent = false) {
            const text = document.getElementById('noteInput').value; if (!text.trim()) return showToast('⚠️ Metin alanı boş!');
            const noteObj = { id: editingNoteId || Date.now(), num: getNextAvailableNum(), text, type: currentPage, title: document.getElementById('metaTitle').value, category: currentEditorCategory, folderId: currentEditorFolder, time: new Date().toLocaleDateString(), spentSeconds: swSeconds };
            
            if (actionType === 'save') { notes.unshift(noteObj); globalCounter++; saveToLocal(); showToast('✅ Kaydedildi!'); navSwitchPage('home'); } 
            else if (actionType === 'update') { const n = notes.find(x => x.id === editingNoteId); Object.assign(n, noteObj); saveToLocal(); showToast('✅ Güncellendi!'); navSwitchPage('home'); } 
            else if (actionType === 'transfer_revize') { if(!editingNoteId) { noteObj.type = 'revize'; notes.unshift(noteObj); globalCounter++; editingNoteId = noteObj.id; } else { notes.find(x=>x.id===editingNoteId).type = 'revize'; } saveToLocal(); showToast('🚀 Revizeye Geçildi'); switchPage('revize'); } 
            else if (actionType === 'archive') { let archiveNote = notes.find(x => x.id === editingNoteId); if(archiveNote) { noteObj.id = archiveNote.id; noteObj.num = archiveNote.num; notes = notes.filter(n => n.id !== editingNoteId); } archive.unshift(noteObj); localStorage.setItem('chimptopus_v18_archive', JSON.stringify(archive)); saveToLocal(); showToast('📦 Arşivlendi'); navSwitchPage('database'); }
        }

        // Görüntüleme UI Fonksiyonları
        function renderHomeActiveProjects() {
            const container = document.getElementById('homeActiveProjectsList'); container.innerHTML = '';
            let list = notes.filter(n => n.type === 'taslak' || n.type === 'revize');
            if (list.length === 0) { container.innerHTML = `<div style="font-size:12px; color:var(--text-muted); font-weight:600;">Aktif bir projen yok.</div>`; return; }
            list.forEach(item => {
                const color = item.type === 'taslak' ? 'var(--color-taslak)' : 'var(--color-revize)';
                container.innerHTML += `<div class="card" style="min-width:160px; padding:14px; border-left:4px solid ${color}; cursor:pointer;" onclick="editNote(${item.id})">
                    <div style="font-size:12px; color:var(--text-muted); font-weight:800; margin-bottom:8px;">#${item.num}</div>
                    <div style="font-weight:800; font-size:13px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title||'İsimsiz'}</div>
                    <div style="font-size:11px; font-weight:500; color:var(--text-muted); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${item.text.replace(/<\/?[^>]+(>|$)/g, "")}</div>
                </div>`;
            });
        }

        function renderDatabasePage() {
            const board = document.getElementById('databaseBoard'); board.innerHTML = '';
            let allDB = [...notes, ...archive];
            if (dbFolderFilter !== 'all') allDB = allDB.filter(a => (a.folderId || 'f_default') === dbFolderFilter);
            if (dbStageFilter !== 'all') allDB = allDB.filter(n => (n.type||'archive') === dbStageFilter);
            if (dbCategoryFilter !== 'all') allDB = allDB.filter(a => (a.category || 'genel') === dbCategoryFilter);

            const sortMode = document.getElementById('dbSortSelect')?.value || 'newest';
            if (sortMode === 'oldest') allDB.reverse();

            if (allDB.length === 0) return board.innerHTML = `<div class="empty-state"><h3 style="font-weight:700;">Veri Bulunamadı</h3></div>`;
            
            allDB.forEach(a => {
                const typeColor = a.type === 'taslak' ? 'var(--color-taslak)' : (a.type === 'revize' ? 'var(--color-revize)' : 'var(--color-archive)');
                const folderName = (folders.find(f => f.id === (a.folderId || 'f_default')) || folders[0]).name;
                board.innerHTML += `
                    <div style="display:flex; padding:14px 10px; cursor:pointer; border-bottom:1px solid var(--border-color);" onclick="openNoteModal(${a.id})">
                        <span style="font-weight:800; font-size:12px; color:${typeColor}; padding:4px 8px; margin-right:12px; align-self:flex-start;">#${a.num}</span>
                        <div style="display:flex; flex-direction:column; overflow:hidden;">
                            <div style="font-size:13px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"><span style="font-weight:800; color:var(--text-main); margin-right:6px;">${a.title||''}</span><span style="font-weight:500;">${a.text.substring(0,40)}...</span></div>
                            <div style="font-size:9px; font-weight:700; color:var(--text-muted); margin-top:3px; text-transform:uppercase;">📁 ${folderName}</div>
                        </div>
                    </div>`;
            });
        }

        // Proje Başlatma ve Düzenleme
        function openNewProjectModal() { document.getElementById('npTitle').value=''; document.getElementById('npFolderSelect').innerHTML = folders.map(f => `<option value="${f.id}">${f.name}</option>`).join(''); document.getElementById('newProjectModal').style.display='flex'; setTimeout(()=>document.getElementById('newProjectModal').classList.add('active'),10); }
        function closeNewProjectModal() { document.getElementById('newProjectModal').classList.remove('active'); setTimeout(()=>document.getElementById('newProjectModal').style.display='none',300); }
        function startNewProject() {
            document.getElementById('metaTitle').value = document.getElementById('npTitle').value; currentEditorFolder = document.getElementById('npFolderSelect').value; closeNewProjectModal(); navSwitchPage('taslak');
        }
        function editNote(id) {
            let n = notes.find(x => x.id === id); if(!n) return; editingNoteId = id; switchPage(n.type); document.getElementById('noteInput').value = n.text; document.getElementById('metaTitle').value = n.title||''; currentEditorFolder = n.folderId||'f_default'; document.getElementById('currentNoteIdDisplay').innerText = '#'+n.num;
        }

        // Araçlar
        let toastTimeout; function showToast(msg) { const el = document.getElementById('toastEl'); document.getElementById('toastMsg').innerText = msg; el.classList.add('show'); clearTimeout(toastTimeout); toastTimeout = setTimeout(()=>el.classList.remove('show'), 2500); }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); document.getElementById('themeIcon').innerText = document.body.classList.contains('dark-mode') ? 'light_mode' : 'dark_mode'; }
        function togglePanel(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); }
        function closePanels() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
        function renderEditorCategories() { document.getElementById('editorCatChips').innerHTML = Object.entries(CATEGORIES).map(([k,v]) => `<div class="tag-chip ${currentEditorCategory===k?'active':''}" onclick="currentEditorCategory='${k}'; renderEditorCategories();">${v}</div>`).join(''); }
        function renderEditorButtons(page) { document.getElementById('editorActions').innerHTML = page==='taslak' ? (editingNoteId ? `<button class="btn-secondary" onclick="handleAction('update')">Güncelle</button><button class="btn-primary" style="background:var(--color-revize)" onclick="handleAction('transfer_revize')">Revize</button>` : `<button class="btn-primary" onclick="handleAction('save')">Kaydet</button>`) : `<button class="btn-primary" style="background:var(--color-archive)" onclick="handleAction('archive')">Arşivle</button>`; }
        function handleInput() { updateWordProgress(); }
        function updateWordProgress() { const val = document.getElementById('noteInput').value.trim(); const w = val.length===0?0:val.split(/\s+/).length; document.getElementById('wordLevel').innerText = `Level ${Math.floor(w/50)+1}`; document.getElementById('wordCountUI').innerText = `${w%50} / 50`; document.getElementById('wordProgress').style.width = ((w%50)/50*100)+'%'; }
        function toggleStopwatch() { if(swRunning) { clearInterval(swInterval); swRunning=false; document.getElementById('swToggleIcon').innerText='play_arrow'; document.getElementById('swToggleBtn').classList.remove('sw-running'); } else { swInterval = setInterval(()=>{swSeconds++; document.getElementById('swDisplay').innerText=formatTime(swSeconds);}, 1000); swRunning=true; document.getElementById('swToggleIcon').innerText='pause'; document.getElementById('swToggleBtn').classList.add('sw-running'); } }
        function formatTime(sec) { const m=Math.floor(sec/60).toString().padStart(2,'0'); const s=(sec%60).toString().padStart(2,'0'); return `${m}:${s}`; }
        function clearCurrentNote() { if(confirm("Temizlenecek emin misin?")) { document.getElementById('noteInput').value=''; document.getElementById('metaTitle').value=''; updateWordProgress(); } }
        function formatMentionsAndHighlights(txt) { let f=txt.replace(/</g,'&lt;').replace(/>/g,'&gt;'); f=f.replace(/==([^=]+)==/g, '<span class="highlight">$1</span>'); return f; }
    </script>
</body>
</html>
