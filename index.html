<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bohem & Fütüristik Not Sistemi</title>
    <style>
        /* CSS DEĞİŞKENLERİ - Renk paleti ve tasarım dili */
        :root {
            --bg-color: #1a1a17; /* Koyu bohem toprak/zeytin tonu */
            --glass-bg: rgba(230, 220, 200, 0.05); /* Fütüristik cam şeffaflığı */
            --glass-border: rgba(230, 220, 200, 0.1);
            --text-main: #e8e3d8;
            --text-muted: #a39e93;
            --accent: #d4a373; /* Bohem vurgu rengi */
            --danger: #e07a5f;
            --success: #81b29a;
            --radius: 16px;
        }

        /* GENEL SIFIRLAMA VE YAPI */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { 
            background: linear-gradient(135deg, var(--bg-color), #2c2a26); 
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* GLASSMORPHISM (Cam Efekti) SINIFI */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 var(--radius) var(--radius);
        }
        header h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; }

        /* BUTONLAR */
        button {
            background: rgba(212, 163, 115, 0.15);
            color: var(--accent);
            border: 1px solid rgba(212, 163, 115, 0.3);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        button:hover { background: rgba(212, 163, 115, 0.3); }
        .btn-danger { color: var(--danger); border-color: rgba(224, 122, 95, 0.3); background: rgba(224, 122, 95, 0.1); }
        .btn-success { color: var(--success); border-color: rgba(129, 178, 154, 0.3); background: rgba(129, 178, 154, 0.1); width: 100%; margin-top: 15px;}
        .btn-icon { padding: 6px 10px; font-size: 0.8rem; }

        /* SAYFA YAPISI */
        main { padding: 20px; padding-bottom: 80px; }
        .page { display: none; animation: fadeIn 0.4s ease forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* NETFLIX TARZI KARTLAR (Yatay Kaydırma) */
        .card-row-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .netflix-row {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 15px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }
        .netflix-row::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        .square-card {
            flex: 0 0 110px;
            height: 110px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            scroll-snap-align: start;
            cursor: pointer;
            font-size: 0.8rem;
            overflow: hidden;
            position: relative;
        }
        .square-card::after { /* Uzun metinler için solma efekti */
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 30px;
            background: linear-gradient(transparent, var(--bg-color));
        }
        .card-tag { font-size: 0.65rem; color: var(--accent); }

        /* FORM ELEMANLARI (Input, Textarea, Select) */
        textarea, select, input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            outline: none;
            resize: none;
        }
        textarea:focus, select:focus { border-color: var(--accent); }
        .scrollable-block { max-height: 200px; overflow-y: auto; padding: 15px; margin-bottom: 15px; font-size: 0.9rem; line-height: 1.5; color: var(--text-muted); }
        
        /* ÇEKİRDEK BLOKLARI */
        .core-block { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .core-block textarea { margin-bottom: 0; flex: 1; height: 60px; }
        
        /* CHECKBOX TASARIMI (Aşama 3 için) */
        .checkbox-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding: 10px; }
        .checkbox-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); }
        .checkbox-row span { font-size: 0.9rem; transition: 0.3s; }
        .checkbox-row input[type="checkbox"]:checked + span { text-decoration: line-through; color: var(--text-muted); opacity: 0.5; }

        /* ALT NAVİGASYON (İleri / Geri) */
        .bottom-nav { display: flex; justify-content: space-between; margin-top: 20px; }

        /* DATABASE MODAL */
        #dbModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 23, 0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 20px;
        }
        .db-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .db-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .db-tab { flex: 1; text-align: center; padding: 10px; border-bottom: 2px solid transparent; color: var(--text-muted); cursor: pointer;}
        .db-tab.active { border-color: var(--accent); color: var(--text-main); }
        .db-filters { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; scrollbar-width: none; }
        .db-filters::-webkit-scrollbar { display: none; }
        .db-filter-chip { padding: 5px 12px; font-size: 0.8rem; border-radius: 20px; cursor: pointer; white-space: nowrap; border: 1px solid var(--glass-border); }
        .db-filter-chip.active { background: var(--accent); color: var(--bg-color); }
        .db-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; overflow-y: auto; align-content: start;}

    </style>
</head>
<body>

    <header class="glass">
        <h1>N<span style="color: var(--accent);">.</span></h1>
        <button onclick="openDatabase()">Database</button>
    </header>

    <main>
        <div id="page1" class="page active">
            <div class="card-row-title">Kaldığın Yerden Devam Et</div>
            <div class="netflix-row" id="activeNotesRow">
                </div>

            <div style="margin-top: 30px;">
                <label class="card-row-title">Yeni Kaynak Notu</label>
                <textarea id="sourceText" rows="6" placeholder="İlham verici metni veya kaynak yazıyı buraya yapıştır..."></textarea>
                
                <label class="card-row-title">Kategori / Etiket</label>
                <select id="sourceTag">
                    <option value="Makale">Makale</option>
                    <option value="Kitap">Kitap</option>
                    <option value="Video">Video</option>
                    <option value="Film">Film</option>
                    <option value="Fikir">Kişisel Fikir</option>
                </select>

                <div class="bottom-nav" style="justify-content: flex-end;">
                    <button onclick="goToStage2()">İleri ➔</button>
                </div>
            </div>
        </div>

        <div id="page2" class="page">
            <div class="card-row-title">Kaynak Önizleme</div>
            <div class="glass scrollable-block" id="sourcePreview">
                </div>

            <div class="card-row-title" style="display: flex; justify-content: space-between; align-items: center;">
                <span>Çekirdek Notlar</span>
                <button class="btn-icon" onclick="addCoreField()">+ Yeni Ekle</button>
            </div>
            
            <div id="coreContainer">
                </div>

            <div class="bottom-nav">
                <button onclick="goToPage(1)">&#8592; Geri</button>
                <button onclick="goToStage3()">İleri ➔</button>
            </div>
        </div>

        <div id="page3" class="page">
            <div class="card-row-title">Çekirdek Referanslar</div>
            <div class="glass scrollable-block" id="coreChecklistContainer" style="padding: 10px;">
                </div>

            <div class="card-row-title" style="margin-top: 20px;">Yaratım Alanı</div>
            <textarea id="finalCreationText" rows="10" placeholder="Çekirdekleri kullanarak asıl fikrini burada yarat..."></textarea>

            <div class="bottom-nav">
                <button onclick="goToPage(2)">&#8592; Geri</button>
            </div>
            <button class="btn-success" onclick="finishNote()">Arşive At / Tamamla</button>
        </div>
    </main>

    <div id="dbModal">
        <div class="db-header">
            <h2>Database</h2>
            <button class="btn-icon btn-danger" onclick="closeDatabase()">Kapat</button>
        </div>
        
        <div class="db-tabs">
            <div class="db-tab active" onclick="switchDbTab('active')" id="tab-active">Aktif</div>
            <div class="db-tab" onclick="switchDbTab('archived')" id="tab-archived">Arşivlenenler</div>
        </div>

        <div class="db-filters" id="dbFilters">
            </div>

        <div class="db-grid" id="dbGrid">
            </div>
    </div>

    <script>
        // VERİ TABANI SİMÜLASYONU VE STATE YÖNETİMİ
        let notes = JSON.parse(localStorage.getItem('bohemNotes')) || [];
        let currentNoteId = null;
        let currentDbTab = 'active';
        let currentDbFilter = 'Hepsi';

        const tags = ['Hepsi', 'Makale', 'Kitap', 'Video', 'Film', 'Fikir'];

        // UYGULAMA BAŞLATMA
        window.onload = () => {
            renderActiveCardsRow();
            setupDbFilters();
        };

        // --- SAYFA GEÇİŞ VE YÖNLENDİRME FONKSİYONLARI ---
        function goToPage(pageNum) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page${pageNum}`).classList.add('active');
        }

        function goToStage2() {
            const sourceText = document.getElementById('sourceText').value.trim();
            const tag = document.getElementById('sourceTag').value;

            if (!sourceText) {
                alert("Lütfen ilerlemeden önce bir kaynak notu girin.");
                return;
            }

            // Yeni not oluştur veya mevcut olanı güncelle
            if (!currentNoteId) {
                currentNoteId = Date.now().toString();
                notes.push({ id: currentNoteId, source: sourceText, tag: tag, cores: [], creation: '', status: 'active' });
            } else {
                const note = notes.find(n => n.id === currentNoteId);
                note.source = sourceText;
                note.tag = tag;
            }
            saveData();

            // 2. Aşama arayüzünü hazırla
            document.getElementById('sourcePreview').innerText = sourceText;
            renderCoreFields();
            goToPage(2);
        }

        function goToStage3() {
            // Çekirdekleri topla
            const coreInputs = document.querySelectorAll('.core-input');
            const cores = Array.from(coreInputs).map(input => input.value.trim()).filter(val => val !== "");
            
            const note = notes.find(n => n.id === currentNoteId);
            note.cores = cores;
            saveData();

            // 3. Aşama arayüzünü hazırla
            const checklistContainer = document.getElementById('coreChecklistContainer');
            checklistContainer.innerHTML = '';
            
            if(cores.length === 0) {
                checklistContainer.innerHTML = '<span style="color:#a39e93; font-size:0.8rem;">Hiç çekirdek eklenmedi.</span>';
            } else {
                cores.forEach((core, index) => {
                    checklistContainer.innerHTML += `
                        <label class="checkbox-row glass">
                            <input type="checkbox">
                            <span>${core}</span>
                        </label>
                    `;
                });
            }

            document.getElementById('finalCreationText').value = note.creation || '';
            goToPage(3);
        }

        function finishNote() {
            const finalText = document.getElementById('finalCreationText').value.trim();
            const note = notes.find(n => n.id === currentNoteId);
            note.creation = finalText;
            note.status = 'archived'; // Statüyü tamamlandı olarak değiştir
            saveData();
            
            alert("Harika! Notun başarıyla arşivlendi.");
            resetApp();
        }

        // --- DOM MANİPÜLASYONU (Çekirdekler ve Kartlar) ---
        function addCoreField(value = "") {
            const container = document.getElementById('coreContainer');
            const div = document.createElement('div');
            div.className = 'core-block';
            div.innerHTML = `
                <textarea class="core-input glass" placeholder="Anahtar kelime veya ilham verici bir cümle yaz...">${value}</textarea>
                <button class="btn-icon btn-danger" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        function renderCoreFields() {
            const container = document.getElementById('coreContainer');
            container.innerHTML = ''; // Temizle
            const note = notes.find(n => n.id === currentNoteId);
            
            if (note.cores && note.cores.length > 0) {
                note.cores.forEach(core => addCoreField(core));
            } else {
                addCoreField(); // Varsayılan olarak 1 tane boş aç
            }
        }

        function renderActiveCardsRow() {
            const row = document.getElementById('activeNotesRow');
            row.innerHTML = '';
            const activeNotes = notes.filter(n => n.status === 'active');

            if (activeNotes.length === 0) {
                row.innerHTML = '<span style="font-size:0.8rem; color:var(--text-muted);">Henüz üzerinde çalışılan bir not yok.</span>';
                return;
            }

            activeNotes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'square-card glass';
                card.onclick = () => loadNote(note.id);
                card.innerHTML = `
                    <span class="card-tag">${note.tag}</span>
                    <div style="margin-top:5px; overflow:hidden;">${note.source.substring(0, 40)}...</div>
                `;
                row.appendChild(card);
            });
        }

        // --- DATABASE EKRANI FONKSİYONLARI ---
        function openDatabase() {
            document.getElementById('dbModal').style.display = 'flex';
            renderDbCards();
        }

        function closeDatabase() {
            document.getElementById('dbModal').style.display = 'none';
        }

        function switchDbTab(tab) {
            currentDbTab = tab;
            document.getElementById('tab-active').classList.remove('active');
            document.getElementById('tab-archived').classList.remove('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderDbCards();
        }

        function setupDbFilters() {
            const filterContainer = document.getElementById('dbFilters');
            filterContainer.innerHTML = '';
            tags.forEach(tag => {
                const chip = document.createElement('div');
                chip.className = `db-filter-chip ${tag === currentDbFilter ? 'active' : ''}`;
                chip.innerText = tag;
                chip.onclick = () => {
                    currentDbFilter = tag;
                    setupDbFilters(); // Görünümü güncelle
                    renderDbCards();
                };
                filterContainer.appendChild(chip);
            });
        }

        function renderDbCards() {
            const grid = document.getElementById('dbGrid');
            grid.innerHTML = '';
            
            let filteredNotes = notes.filter(n => n.status === currentDbTab);
            if (currentDbFilter !== 'Hepsi') {
                filteredNotes = filteredNotes.filter(n => n.tag === currentDbFilter);
            }

            if (filteredNotes.length === 0) {
                grid.innerHTML = '<div style="color:var(--text-muted); font-size:0.9rem; grid-column: 1 / -1;">Bu kategoride not bulunamadı.</div>';
                return;
            }

            filteredNotes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'square-card glass';
                card.onclick = () => {
                    loadNote(note.id);
                    closeDatabase();
                };
                card.innerHTML = `
                    <span class="card-tag">${note.tag}</span>
                    <div style="margin-top:5px; overflow:hidden;">${(note.creation || note.source).substring(0, 40)}...</div>
                `;
                grid.appendChild(card);
            });
        }

        // --- YARDIMCI FONKSİYONLAR ---
        function saveData() {
            localStorage.setItem('bohemNotes', JSON.stringify(notes));
            renderActiveCardsRow(); // Ana sayfadaki kartları güncelle
        }

        function loadNote(id) {
            const note = notes.find(n => n.id === id);
            if(note) {
                currentNoteId = note.id;
                document.getElementById('sourceText').value = note.source;
                document.getElementById('sourceTag').value = note.tag;
                goToPage(1);
            }
        }

        function resetApp() {
            currentNoteId = null;
            document.getElementById('sourceText').value = '';
            document.getElementById('sourceTag').value = 'Makale';
            document.getElementById('finalCreationText').value = '';
            goToPage(1);
            renderActiveCardsRow();
        }
    </script>
</body>
</html>
