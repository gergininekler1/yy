<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Task - Modern & Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #f8fafc;
            transition: background-color 0.8s ease;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .timer-circle {
            position: relative;
            width: 220px;
            height: 220px;
        }
        svg {
            transform: rotate(-90deg);
        }
        circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.8s ease;
        }
        .bg-circle { stroke: rgba(255, 255, 255, 0.05); }
        .progress-circle {
            stroke-dasharray: 628;
            stroke-dashoffset: 628;
            stroke: var(--accent-color);
        }
        .commitment-active {
            pointer-events: none;
            opacity: 0.5;
            filter: grayscale(1);
        }
        .xp-bar-inner {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); color: #ef4444; }
        }
        .emergency { animation: pulse-red 1s infinite; }
    </style>
</head>
<body>

<div id="app" class="w-full max-w-md p-6">
    <div class="flex justify-between items-center mb-8 px-2">
        <div class="flex flex-col">
            <span class="text-xs uppercase tracking-widest text-slate-400">Seviye <span id="level-val">1</span></span>
            <div class="w-32 h-1.5 bg-slate-800 rounded-full mt-1 overflow-hidden">
                <div id="xp-bar" class="xp-bar-inner h-full bg-emerald-500" style="width: 0%"></div>
            </div>
            <span class="text-[10px] mt-1 text-slate-500">XP: <span id="xp-val">0</span></span>
        </div>
        <div class="flex items-center space-x-3 bg-slate-800/50 px-4 py-2 rounded-full border border-white/5">
            <div class="text-emerald-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <span id="streak-val" class="font-semibold text-sm">0</span>
            <span id="multiplier" class="text-[10px] bg-emerald-500/20 text-emerald-400 px-1.5 rounded hidden">1.5x</span>
        </div>
    </div>

    <div class="glass-card p-8 flex flex-col items-center text-center">
        <div id="task-input-area" class="w-full">
            <input type="text" id="task-name" placeholder="Hangi göreve başlıyorsun?" class="w-full bg-transparent border-b border-slate-700 pb-2 text-center text-lg focus:outline-none focus:border-emerald-500 transition-colors placeholder:text-slate-600">
            
            <div class="flex justify-center space-x-4 mt-6">
                <button onclick="setTime(5)" class="px-3 py-1 rounded-lg bg-slate-800 text-xs hover:bg-slate-700 transition">5dk</button>
                <button onclick="setTime(25)" class="px-3 py-1 rounded-lg bg-slate-800 text-xs hover:bg-slate-700 transition">25dk</button>
                <button onclick="setTime(50)" class="px-3 py-1 rounded-lg bg-slate-800 text-xs hover:bg-slate-700 transition">50dk</button>
            </div>

            <div class="mt-8 flex items-center justify-center space-x-2">
                <input type="checkbox" id="commitment-mode" class="accent-emerald-500">
                <label for="commitment-mode" class="text-xs text-slate-400 cursor-pointer">Commitment Modu (İptal edilemez)</label>
            </div>

            <button onclick="startTask()" class="mt-8 w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-semibold rounded-2xl transition-all active:scale-95 shadow-lg shadow-emerald-500/20">
                Görevi Başlat
            </button>
        </div>

        <div id="timer-area" class="hidden w-full flex flex-col items-center">
            <h2 id="active-task-title" class="text-sm text-slate-400 mb-4 tracking-wide truncate w-full">Görev Yapılıyor</h2>
            <div class="timer-circle">
                <svg width="220" height="220">
                    <circle class="bg-circle" cx="110" cy="110" r="100"></circle>
                    <circle id="progress" class="progress-circle" cx="110" cy="110" r="100"></circle>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="time-display" class="text-5xl font-light tracking-tighter tabular-nums">00:00</span>
                    <span id="cancel-btn" onclick="cancelTask()" class="mt-4 text-[10px] uppercase tracking-widest text-slate-500 cursor-pointer hover:text-red-400 transition">Görevi İptal Et</span>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/90">
        <div class="glass-card w-full p-8 text-center border-emerald-500/30">
            <div class="w-16 h-16 bg-emerald-500/20 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Görev Başarılı!</h2>
            <p class="text-slate-400 text-sm mb-6">"Demir gibi bir zihin" yolunda bir adım daha attın.</p>
            
            <div class="bg-slate-800/50 rounded-xl p-4 mb-6">
                <input type="text" id="micro-note" placeholder="Kısa bir not bırak (nasıl geçti?)" class="w-full bg-transparent text-center text-sm focus:outline-none border-b border-slate-700 pb-1">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="text-left bg-slate-800/30 p-3 rounded-lg">
                    <span class="block text-[10px] text-slate-500 uppercase">Kazanılan XP</span>
                    <span id="xp-earned" class="text-emerald-400 font-bold">+15</span>
                </div>
                <div class="text-left bg-slate-800/30 p-3 rounded-lg">
                    <span class="block text-[10px] text-slate-500 uppercase">Streak</span>
                    <span id="streak-added" class="text-orange-400 font-bold">Lvl 1</span>
                </div>
            </div>

            <button onclick="closeModal()" class="w-full py-3 bg-emerald-500 text-slate-900 font-bold rounded-xl shadow-lg">Harika, Devam Et</button>
            <p class="mt-4 text-[10px] text-emerald-400 animate-pulse">Öneri: Şimdi 2 dakikalık bir nefes egzersizi yap.</p>
        </div>
    </div>
</div>

<script>
    // State Management
    let state = {
        xp: parseInt(localStorage.getItem('xp')) || 0,
        streak: parseInt(localStorage.getItem('streak')) || 0,
        level: 1,
        isRunning: false,
        endTime: null,
        totalDuration: 0,
        selectedTime: 25,
        commitment: false,
        taskName: ''
    };

    // DOM Elements
    const elements = {
        timeDisplay: document.getElementById('time-display'),
        progress: document.getElementById('progress'),
        taskInputArea: document.getElementById('task-input-area'),
        timerArea: document.getElementById('timer-area'),
        xpBar: document.getElementById('xp-bar'),
        xpVal: document.getElementById('xp-val'),
        levelVal: document.getElementById('level-val'),
        streakVal: document.getElementById('streak-val'),
        successModal: document.getElementById('success-modal')
    };

    function init() {
        updateStats();
        checkActiveSession();
        setInterval(updateTimer, 1000);
    }

    function setTime(mins) {
        state.selectedTime = mins;
        document.querySelectorAll('#task-input-area button').forEach(btn => {
            btn.classList.remove('bg-emerald-500', 'text-slate-900');
            if(parseInt(btn.innerText) === mins) btn.classList.add('bg-emerald-500', 'text-slate-900');
        });
    }

    function startTask() {
        const name = document.getElementById('task-name').value;
        if (!name) return alert("Lütfen bir görev adı girin.");

        state.taskName = name;
        state.commitment = document.getElementById('commitment-mode').checked;
        state.totalDuration = state.selectedTime * 60 * 1000;
        state.endTime = Date.now() + state.totalDuration;
        state.isRunning = true;

        localStorage.setItem('activeTask', JSON.stringify({
            endTime: state.endTime,
            totalDuration: state.totalDuration,
            taskName: state.taskName,
            commitment: state.commitment
        }));

        showTimerUI();
    }

    function checkActiveSession() {
        const saved = JSON.parse(localStorage.getItem('activeTask'));
        if (saved && saved.endTime > Date.now()) {
            state.endTime = saved.endTime;
            state.totalDuration = saved.totalDuration;
            state.taskName = saved.taskName;
            state.commitment = saved.commitment;
            state.isRunning = true;
            showTimerUI();
        }
    }

    function showTimerUI() {
        elements.taskInputArea.classList.add('hidden');
        elements.timerArea.classList.remove('hidden');
        document.getElementById('active-task-title').innerText = state.taskName;
        document.getElementById('cancel-btn').style.display = state.commitment ? 'none' : 'block';
    }

    function updateTimer() {
        if (!state.isRunning) return;

        const now = Date.now();
        const remaining = state.endTime - now;

        if (remaining <= 0) {
            completeTask();
            return;
        }

        // Calculate time
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        elements.timeDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

        // Update Progress Circle
        const percentage = remaining / state.totalDuration;
        const offset = 628 * (1 - percentage);
        elements.progress.style.strokeDashoffset = 628 - offset;

        // Dynamic Colors (Heatmap logic)
        if (percentage < 0.1) {
            document.body.style.backgroundColor = '#450a0a'; // Dark Red
            elements.timeDisplay.classList.add('emergency');
            elements.progress.style.stroke = '#ef4444';
        } else if (percentage < 0.4) {
            document.body.style.backgroundColor = '#431407'; // Dark Orange
            elements.progress.style.stroke = '#f97316';
        } else {
            document.body.style.backgroundColor = '#0f172a';
            elements.progress.style.stroke = '#10b981';
        }
    }

    function completeTask() {
        state.isRunning = false;
        localStorage.removeItem('activeTask');
        
        // Reward Logic
        const earnedXP = Math.floor(state.selectedTime * 0.8);
        const multiplier = state.streak >= 5 ? 1.5 : 1;
        const finalXP = Math.floor(earnedXP * multiplier);
        
        state.xp += finalXP;
        state.streak += 1;
        
        localStorage.setItem('xp', state.xp);
        localStorage.setItem('streak', state.streak);
        
        document.getElementById('xp-earned').innerText = `+${finalXP}`;
        document.getElementById('streak-added').innerText = `Seri: ${state.streak}`;
        
        updateStats();
        elements.successModal.classList.remove('hidden');
    }

    function updateStats() {
        // Simple Level Formula: Her 100 XP bir seviye
        state.level = Math.floor(state.xp / 100) + 1;
        const currentXPInLevel = state.xp % 100;

        elements.xpVal.innerText = state.xp;
        elements.levelVal.innerText = state.level;
        elements.streakVal.innerText = state.streak;
        elements.xpBar.style.width = `${currentXPInLevel}%`;
        
        if(state.streak >= 5) document.getElementById('multiplier').classList.remove('hidden');
    }

    function cancelTask() {
        if (state.commitment) return;
        if (confirm("Görevi iptal etmek istediğine emin misin? Serin bozulabilir!")) {
            state.isRunning = false;
            state.streak = 0;
            localStorage.setItem('streak', 0);
            localStorage.removeItem('activeTask');
            location.reload();
        }
    }

    function closeModal() {
        elements.successModal.classList.add('hidden');
        location.reload();
    }

    init();
</script>

</body>
</html>
