<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitap Takibi - Final</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161a24; --surface2: #1e2333; --border: #2a3045;
    --accent: #f0c93a; --accent2: #4ef0a0; --accent3: #4ec8f0; --danger: #f05a4e;
    --text: #e8ecf7; --muted: #6b7599; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
    min-height: 100vh; padding: 20px;
  }
  .container { max-width: 600px; margin: 0 auto; }

  /* ZAMANLAYICI (İlave Edilen Özellik) */
  .timer-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 30px;
    padding: 8px 18px; display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .timer-display { font-family: 'Syne'; font-weight: 800; color: var(--accent2); font-size: 18px; }

  /* ÜST BİLGİ & KAPAK */
  header { text-align: center; margin-bottom: 25px; }
  .book-title { font-family: 'Syne'; font-size: 42px; font-weight: 800; color: var(--accent); line-height: 1; }
  .book-author { color: var(--muted); font-size: 14px; margin-top: 5px; }
  #coverImg { width: 140px; height: 200px; border-radius: 10px; object-fit: cover; margin: 20px auto; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); }

  /* KÜNYE TABLOSU */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 15px; overflow: hidden; }
  .card-header { background: var(--surface2); padding: 10px 15px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .field { background: var(--surface); padding: 12px; }
  .f-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
  .f-val { width: 100%; background: transparent; border: none; color: var(--text); font-family: 'Syne'; font-size: 14px; font-weight: 600; outline: none; }

  /* SAYAÇLAR */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; text-align: center; }
  .s-num { font-family: 'Syne'; font-size: 28px; font-weight: 800; display: block; }
  .s-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; }

  /* ANA SAYAÇ */
  .counter { text-align: center; padding: 30px 20px; }
  .big-num { font-family: 'Syne'; font-size: 80px; font-weight: 800; margin-bottom: 15px; }
  .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; transition: 0.2s; }
  .btn-plus { background: var(--accent); color: #000; }
  .btn-minus { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* LİSTELER (Alıntılar & Son Okumalar) */
  .list-item { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; justify-content: space-between; }
  .hist-plus { color: var(--accent2); font-weight: 700; }
  .hist-minus { color: var(--danger); font-weight: 700; }

  .btn-small { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <div class="timer-box">
    <div style="font-size: 10px; font-weight: 700; color: var(--muted);">FOCUS</div>
    <div class="timer-display" id="timer">00:00</div>
    <button class="btn-small" id="timerBtn" onclick="toggleTimer()" style="background:var(--accent2); color:#000; border:none; font-weight:800;">BAŞLAT</button>
  </div>

  <header>
    <div class="book-title" id="dispTitle">Kitap Adı</div>
    <div class="book-author" id="dispAuthor">Yazar</div>
    <img id="coverImg">
  </header>

  <div class="card">
    <div class="card-header">📋 KÜNYE</div>
    <div class="grid-fields">
      <div class="field" style="grid-column: span 2;"><span class="f-lbl">Kapak URL</span><input class="f-val" id="inCover" oninput="save()"></div>
      <div class="field"><span class="f-lbl">Kitap Adı</span><input class="f-val" id="inTitle" oninput="save()"></div>
      <div class="field"><span class="f-lbl">Yazar</span><input class="f-val" id="inAuthor" oninput="save()"></div>
      <div class="field"><span class="f-lbl">Toplam Sayfa</span><input class="f-val" type="number" id="inTotal" oninput="save()"></div>
      <div class="field"><span class="f-lbl">Hedef Bitiş</span><input class="f-val" type="date" id="inDate" oninput="save()"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box"><span class="s-num" style="color:var(--accent)" id="sRead">0</span><span class="s-lbl">Okunan</span></div>
    <div class="stat-box"><span class="s-num" style="color:var(--accent2)" id="sLeft">0</span><span class="s-lbl">Kalan</span></div>
    <div class="stat-box"><span class="s-num" style="color:var(--accent3)" id="sDays">0</span><span class="s-lbl">Kalan Gün</span></div>
  </div>

  <div class="card counter">
    <div class="big-num" id="bigPage">0</div>
    <div style="display:flex; justify-content:center; gap:40px; margin-bottom:20px;">
      <button class="btn-circle btn-minus" onclick="changePage(-1)">−</button>
      <button class="btn-circle btn-plus" onclick="changePage(1)">+</button>
    </div>
    <div style="display:flex; justify-content:center; gap:8px;">
      <button class="btn-small" onclick="setStep(1)">1</button>
      <button class="btn-small" onclick="setStep(10)">10</button>
      <button class="btn-small" onclick="setStep(25)">25</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">📊 SON OKUMALAR</div>
    <div id="historyList"></div>
  </div>

  <div style="display:flex; gap:10px; margin-top:20px;">
    <button class="btn-small" onclick="exportJSON()">Yedekle</button>
    <button class="btn-small" onclick="document.getElementById('fileInp').click()">Yükle</button>
    <input type="file" id="fileInp" style="display:none" onchange="importJSON(this)">
    <button class="btn-small" style="margin-left:auto; color:var(--danger)" onclick="reset()">Sıfırla</button>
  </div>
</div>

<script>
let pages = parseInt(localStorage.getItem('p_val')) || 0;
let history = JSON.parse(localStorage.getItem('p_hist') || '[]');
let step = 1;
let timer;
let sec = 0;

function save() {
  const t = document.getElementById('inTitle').value;
  const a = document.getElementById('inAuthor').value;
  const c = document.getElementById('inCover').value;
  const tot = parseInt(document.getElementById('inTotal').value) || 0;
  const dat = document.getElementById('inDate').value;

  document.getElementById('dispTitle').textContent = t || 'Kitap Adı';
  document.getElementById('dispAuthor').textContent = a || 'Yazar';
  const img = document.getElementById('coverImg');
  if(c) { img.src = c; img.style.display = 'block'; } else { img.style.display = 'none'; }

  document.getElementById('bigPage').textContent = pages;
  document.getElementById('sRead').textContent = pages;
  document.getElementById('sLeft').textContent = tot ? Math.max(0, tot - pages) : '0';

  if(dat) {
    const diff = Math.ceil((new Date(dat) - new Date()) / (1000*60*60*24));
    document.getElementById('sDays').textContent = diff >= 0 ? diff : '!';
  }

  localStorage.setItem('p_title', t); localStorage.setItem('p_author', a);
  localStorage.setItem('p_cover', c); localStorage.setItem('p_total', tot);
  localStorage.setItem('p_date', dat); localStorage.setItem('p_val', pages);
  renderHistory();
}

function changePage(v) {
  let diff = v * step;
  pages = Math.max(0, pages + diff);
  history.unshift({ time: new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}), diff: diff, total: pages });
  if(history.length > 5) history.pop();
  localStorage.setItem('p_hist', JSON.stringify(history));
  save();
}

function setStep(s) { step = s; }

function toggleTimer() {
  const btn = document.getElementById('timerBtn');
  if(timer) { clearInterval(timer); timer = null; btn.textContent = 'DEVAM'; btn.style.background = 'var(--accent)'; }
  else {
    timer = setInterval(() => { sec++;
      let m = Math.floor(sec/60).toString().padStart(2,'0');
      let s = (sec%60).toString().padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
    btn.textContent = 'DURDUR'; btn.style.background = 'var(--danger)';
  }
}

function renderHistory() {
  const list = document.getElementById('historyList'); list.innerHTML = '';
  history.forEach(i => {
    list.innerHTML += `<div class="list-item">
      <span>${i.time}</span>
      <span class="${i.diff > 0 ? 'hist-plus' : 'hist-minus'}">${i.diff > 0 ? '+' : ''}${i.diff}</span>
      <span style="color:var(--muted)">${i.total}</span>
    </div>`;
  });
}

function exportJSON() {
  const data = { t:localStorage.getItem('p_title'), a:localStorage.getItem('p_author'), c:localStorage.getItem('p_cover'), tot:localStorage.getItem('p_total'), d:localStorage.getItem('p_date'), p:pages, h:history };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'yedek.json'; a.click();
}

function importJSON(input) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const d = JSON.parse(e.target.result);
    localStorage.setItem('p_title', d.t); localStorage.setItem('p_author', d.a);
    localStorage.setItem('p_cover', d.c); localStorage.setItem('p_total', d.tot);
    localStorage.setItem('p_date', d.d); localStorage.setItem('p_val', d.p);
    localStorage.setItem('p_hist', JSON.stringify(d.h));
    location.reload();
  };
  reader.readAsText(input.files[0]);
}

function reset() { if(confirm("Sıfırlansın mı?")) { localStorage.clear(); location.reload(); } }

window.onload = () => {
  document.getElementById('inTitle').value = localStorage.getItem('p_title') || '';
  document.getElementById('inAuthor').value = localStorage.getItem('p_author') || '';
  document.getElementById('inCover').value = localStorage.getItem('p_cover') || '';
  document.getElementById('inTotal').value = localStorage.getItem('p_total') || '';
  document.getElementById('inDate').value = localStorage.getItem('p_date') || '';
  save();
};
</script>
</body>
</html>
