<!DOCTYPE html>
<html lang="tr" data-theme="brutal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ANLIK.GÖREV // BRUTAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════════════════════════════
     BRUTALIST BLACK & YELLOW — KALIN TİPOGRAFİ, YÜKSEK KONTRAST, SERT KENARLAR
     ═══════════════════════════════════════════════════════════════════════════════════ */
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --primary: #FFE600;
    --text: #FFFFFF;
    --text-muted: #888888;
    --border: #333333;
    --border-light: #444444;
    --success: #FFE600;
    --warn: #FFE600;
    
    --radius: 0px;
    --radius-sm: 0px;
    --nav-h: 74px;
    --safe-b: env(safe-area-inset-bottom, 0px);
    
    /* Brutalist Spacing */
    --border-width: 3px;
    --border-width-thick: 5px;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  
  html { scroll-behavior: smooth; background: var(--bg); }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-weight: 700;
  }

  /* Sert, keskin arka plan */
  .app {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    border-left: var(--border-width) solid var(--border);
    border-right: var(--border-width) solid var(--border);
    background: var(--bg);
  }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  SCREENS                                                                   */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .screen {
    display: none; flex: 1;
    padding: 0 20px calc(var(--nav-h) + var(--safe-b) + 20px);
    animation: slideUp .25s cubic-bezier(.4,0,.2,1);
  }
  .screen.active { display: flex; flex-direction: column; }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  HEADER                                                                    */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 48px 0 20px;
    border-bottom: var(--border-width-thick) solid var(--primary);
    margin-bottom: 24px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 36px; font-weight: 800;
    letter-spacing: -1.5px;
    text-transform: uppercase;
    color: var(--primary);
  }
  .header h1 .dot { color: var(--text); }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  FORM ELEMENTS (BRUTAL)                                                    */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .field-label {
    font-size: 14px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 12px;
  }

  .task-input-wrap { margin-bottom: 24px; }

  .task-input {
    width: 100%;
    background: var(--surface);
    border: var(--border-width) solid var(--border);
    padding: 18px 20px;
    font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 700;
    color: var(--text); outline: none;
    text-transform: uppercase;
    transition: all .1s ease;
  }
  .task-input:focus {
    border-color: var(--primary);
    background: #000;
  }
  .task-input::placeholder {
    color: #444;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  TEMPLATES (SÜRE SEÇ)                                                      */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .templates-wrap { margin-bottom: 20px; }
  .templates {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
  }
  .tpl-btn {
    background: var(--surface);
    border: var(--border-width) solid var(--border);
    padding: 16px 8px;
    cursor: pointer; text-align: center;
    transition: all .1s ease;
    text-transform: uppercase;
  }
  .tpl-btn:active { transform: scale(.96); }
  .tpl-btn.active {
    border-color: var(--primary);
    background: #000;
    color: var(--primary);
  }
  .tpl-dur {
    font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
    color: var(--primary); display: block;
  }
  .tpl-lbl {
    font-size: 11px; color: var(--text-muted);
    margin-top: 4px; display: block; letter-spacing: 1px;
    font-weight: 700;
  }

  .custom-wrap { margin-top: 16px; display: none; }
  .custom-wrap.open { display: flex; gap: 12px; align-items: center; }
  .custom-wrap label { font-size: 14px; color: var(--text-muted); white-space: nowrap; font-weight: 700; }
  .custom-input {
    flex: 1; background: var(--surface); border: var(--border-width) solid var(--border);
    padding: 14px 18px;
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    color: var(--primary); outline: none; text-align: center;
  }
  .custom-input:focus { border-color: var(--primary); }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  TIMER RING                                                                */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .timer-section {
    display: flex; flex-direction: column; align-items: center;
    margin-top: 16px; gap: 0;
  }

  .ring-wrap {
    position: relative; width: 240px; height: 240px;
  }

  .ring-svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none; stroke: var(--border); stroke-width: 8;
  }
  .ring-fill {
    fill: none;
    stroke: var(--primary);
    stroke-width: 8;
    stroke-linecap: butt;
    stroke-dasharray: 609;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset .4s cubic-bezier(.4,0,.2,1);
  }

  .ring-center {
    position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    text-align: center; pointer-events: none;
    width: 100%;
  }
  .t-display {
    font-family: 'Syne', sans-serif;
    font-size: 56px; font-weight: 800;
    letter-spacing: -2px; line-height: 1;
    color: var(--primary);
    text-shadow: 3px 3px 0 #000;
  }
  .t-name {
    font-size: 16px; color: var(--text);
    margin-top: 8px; max-width: 180px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 700; text-transform: uppercase;
  }
  .t-state {
    display: inline-block; margin-top: 12px;
    padding: 6px 16px; border: var(--border-width) solid var(--border);
    font-size: 12px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase;
    background: var(--surface);
  }
  .t-state.idle   { color: var(--text-muted); border-color: var(--border); }
  .t-state.run    { color: var(--primary); border-color: var(--primary); background: #000; }
  .t-state.paused { color: var(--primary); border-color: var(--primary); }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  CONTROLS                                                                  */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .controls {
    display: flex; gap: 16px;
    align-items: center; justify-content: center;
    margin-top: 32px;
  }

  .btn-main {
    background: var(--primary);
    color: #000;
    border: var(--border-width-thick) solid var(--primary);
    padding: 0 48px; height: 64px; min-width: 180px;
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    cursor: pointer; transition: all .1s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn-main:active  { transform: scale(.96); background: #000; color: var(--primary); }
  .btn-main:disabled { opacity:.4; cursor:not-allowed; }

  .btn-sq {
    width: 64px; height: 64px;
    background: var(--surface);
    border: var(--border-width-thick) solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .1s ease;
    color: var(--text);
  }
  .btn-sq:active { transform: scale(.9); border-color: var(--primary); }
  .btn-sq.danger  { color: #ff4444; }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  STATS SCREEN                                                              */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-top: 8px;
  }
  .s-card {
    background: var(--surface);
    border: var(--border-width) solid var(--border);
    padding: 24px 20px;
  }
  .s-card.wide { grid-column: 1/-1; }
  
  .s-val {
    font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800;
    color: var(--primary); line-height: 1;
  }
  .s-lbl {
    font-size: 14px; color: var(--text-muted);
    margin-top: 8px; font-weight: 700;
    text-transform: uppercase;
  }
  .s-icon { font-size: 32px; margin-bottom: 8px; display: block; }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  WEEKLY DONUT (HALKA GRAFİK)                                                */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .donut-wrap {
    position: relative;
    width: 200px; height: 200px;
    margin: 16px auto 8px;
  }
  .donut {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #333;
    border: var(--border-width) solid var(--border);
  }
  .donut-hole {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 110px; height: 110px;
    background: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    border: var(--border-width) solid var(--border);
  }
  .donut-total {
    font-size: 48px; font-weight: 900;
    color: var(--primary); line-height: 1;
    font-family: 'Syne', sans-serif;
  }
  .donut-label {
    font-size: 12px; font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .week-labels {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
    padding: 0 10px;
  }
  .day-label {
    font-size: 16px; font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    transition: color .1s;
  }
  .day-label.active {
    color: var(--primary);
  }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  HISTORY SCREEN                                                            */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .hist-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }

  .hist-item {
    background: var(--surface);
    border: var(--border-width) solid var(--border);
    padding: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .hist-dot {
    width: 12px; height: 12px;
    background: var(--primary);
    flex-shrink: 0;
  }
  .hist-info { flex: 1; min-width: 0; }
  .hist-task {
    font-size: 16px; font-weight: 800;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-transform: uppercase;
  }
  .hist-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
  .hist-dur  {
    font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
    color: var(--primary);
  }

  .empty {
    text-align: center; padding: 64px 20px; color: var(--text-muted);
    border: var(--border-width) dashed var(--border);
  }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  BADGES SCREEN                                                             */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .badge-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 12px; margin-top: 20px;
  }
  .b-card {
    background: var(--surface);
    border: var(--border-width) solid var(--border);
    padding: 24px 8px;
    text-align: center;
    position: relative;
  }
  .b-card.earned {
    border-color: var(--primary);
    background: #000;
  }
  .b-card.locked { opacity: .4; }
  .b-icon { font-size: 36px; display: block; margin-bottom: 12px; }
  .b-name { font-size: 14px; font-weight: 800; color: var(--text); text-transform: uppercase; }
  .b-desc { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; font-weight: 500; }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  BOTTOM NAV                                                                */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    height: calc(var(--nav-h) + var(--safe-b));
    background: #000;
    border-top: var(--border-width-thick) solid var(--primary);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding: 0 8px; padding-bottom: var(--safe-b);
    z-index: 100;
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    cursor: pointer; padding: 16px 4px;
    transition: all .1s;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .nav-tab.active { color: var(--primary); }
  .nav-tab svg { width: 24px; height: 24px; stroke-width: 2.5; }
  .nav-lbl { font-size: 11px; font-weight: 800; letter-spacing: .5px; }

  /* ═══════════════════════════════════════════════════════════════════════════ */
  /*  TOAST & MODAL                                                             */
  /* ═══════════════════════════════════════════════════════════════════════════ */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: var(--primary); color: #000;
    padding: 16px 32px; border: var(--border-width-thick) solid #000;
    font-size: 16px; font-weight: 800; z-index: 999;
    transition: transform .4s cubic-bezier(.34,1.56,.64,1);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.95);
    z-index: 200; display: none;
    align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #000;
    border: var(--border-width-thick) solid var(--primary);
    padding: 40px 30px;
    text-align: center; max-width: 340px; width: 90%;
  }
  .modal-emoji { font-size: 64px; display:block; margin-bottom: 24px; }
  .modal-title {
    font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
    margin-bottom: 16px; color: var(--primary); text-transform: uppercase;
  }
  .modal-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; font-weight: 500; }
  .modal-badge {
    background: #000; border: var(--border-width) solid var(--primary);
    padding: 16px; margin-bottom: 24px;
    display: none;
  }
  .modal-badge.show { display: block; }
  .modal-badge p { font-size: 14px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
</style>
</head>
<body>

<div class="app">

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Complete Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <span class="modal-emoji" id="mEmoji">🎉</span>
      <h2 class="modal-title">TAMAMLANDI!</h2>
      <p class="modal-sub" id="mSub"></p>
      <div class="modal-badge" id="mBadge">
        <p>🏆 YENİ ROZET: <span id="mBadgeName"></span></p>
      </div>
      <button class="btn-main" style="width:100%;min-width:0" onclick="closeModal()">DEVAM →</button>
    </div>
  </div>

  <!-- ═══════════════════════════════ TIMER SCREEN ═══ -->
  <div class="screen active" id="screen-timer">
    <div class="header">
      <h1>ANLIK<span class="dot">.</span>GÖREV</h1>
    </div>

    <!-- Task -->
    <div class="task-input-wrap">
      <div class="field-label">NE YAPACAKSIN?</div>
      <input class="task-input" id="taskInput" type="text" placeholder="GÖREVİNİ YAZ…" maxlength="60" />
    </div>

    <!-- Duration templates -->
    <div class="templates-wrap">
      <div class="field-label">SÜRE SEÇ</div>
      <div class="templates">
        <button class="tpl-btn active" data-min="5" onclick="pickTemplate(this,5)">
          <span class="tpl-dur">5</span><span class="tpl-lbl">DAKİKA</span>
        </button>
        <button class="tpl-btn" data-min="15" onclick="pickTemplate(this,15)">
          <span class="tpl-dur">15</span><span class="tpl-lbl">DAKİKA</span>
        </button>
        <button class="tpl-btn" data-min="25" onclick="pickTemplate(this,25)">
          <span class="tpl-dur">25</span><span class="tpl-lbl">POMODORO</span>
        </button>
        <button class="tpl-btn" data-min="0" onclick="pickTemplate(this,0)">
          <span class="tpl-dur" style="font-size:28px">⚙</span><span class="tpl-lbl">ÖZEL</span>
        </button>
      </div>
      <div class="custom-wrap" id="customWrap">
        <label>DAKİKA:</label>
        <input class="custom-input" id="customMin" type="number" min="1" max="180" value="30" />
      </div>
    </div>

    <!-- Ring -->
    <div class="timer-section" id="timerSection">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 224 224">
          <circle class="ring-track" cx="112" cy="112" r="97"/>
          <circle class="ring-fill"  cx="112" cy="112" r="97" id="ringFill"/>
        </svg>
        <div class="ring-center">
          <div class="t-display" id="tDisp">05:00</div>
          <div class="t-name"   id="tName">HAZIR</div>
          <span class="t-state idle" id="tState">BEKLİYOR</span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="controls">
        <button class="btn-sq" onclick="resetTimer()" title="SIFIRLA">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>

        <button class="btn-main" id="startBtn" onclick="handleStart()">BAŞLAT</button>

        <button class="btn-sq" id="pauseBtn" onclick="togglePause()" style="display:none" title="DURAKLAT / DEVAM">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" id="pauseIco">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════ STATS SCREEN ═══ -->
  <div class="screen" id="screen-stats">
    <div class="header"><h1>İSTATİSTİK<span class="dot">.</span></h1></div>
    <div class="stats-grid">
      <div class="s-card">
        <span class="s-icon" id="fireIcon">🔥</span>
        <div class="s-val" id="sStreak">0</div>
        <div class="s-lbl">GÜNLÜK SERİ</div>
      </div>
      <div class="s-card">
        <span class="s-icon">📋</span>
        <div class="s-val" id="sTotal">0</div>
        <div class="s-lbl">TOPLAM GÖREV</div>
      </div>
      <div class="s-card">
        <span class="s-icon">⏱️</span>
        <div class="s-val" id="sMins">0</div>
        <div class="s-lbl">TOPLAM DAKİKA</div>
      </div>
      <div class="s-card">
        <span class="s-icon">✅</span>
        <div class="s-val" id="sToday">0</div>
        <div class="s-lbl">BUGÜN</div>
      </div>
      
      <!-- HAFTALIK HALKA GRAFİK -->
      <div class="s-card wide">
        <div class="field-label" style="margin-bottom: 8px;">HAFTALIK AKTİVİTE</div>
        <div class="donut-wrap">
          <div class="donut" id="weekDonut"></div>
          <div class="donut-hole">
            <span class="donut-total" id="donutTotal">0</span>
            <span class="donut-label">GÖREV</span>
          </div>
        </div>
        <div class="week-labels" id="weekLabels">
          <!-- Dinamik olarak JS ile doldurulacak -->
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════ HISTORY SCREEN ═══ -->
  <div class="screen" id="screen-history">
    <div class="header">
      <h1>GEÇMİŞ<span class="dot">.</span></h1>
      <button class="btn-sq" style="width:48px;height:48px;" onclick="clearHistory()" title="TEMİZLE">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>

  <!-- ═══════════════════════════════ BADGES SCREEN ═══ -->
  <div class="screen" id="screen-badges">
    <div class="header"><h1>ROZETLER<span class="dot">.</span></h1></div>
    <div class="badge-grid" id="badgeGrid"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="nav">
    <div class="nav-tab active" onclick="goTo('timer')" id="nav-timer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="nav-lbl">GÖREV</span>
    </div>
    <div class="nav-tab" onclick="goTo('stats')" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span class="nav-lbl">İSTATİSTİK</span>
    </div>
    <div class="nav-tab" onclick="goTo('history')" id="nav-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square" stroke-linejoin="miter">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span class="nav-lbl">GEÇMİŞ</span>
    </div>
    <div class="nav-tab" onclick="goTo('badges')" id="nav-badges">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="8" r="6"/>
        <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
      </svg>
      <span class="nav-lbl">ROZETLER</span>
    </div>
  </nav>

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════════════════════════════════════════════
//  BRUTALIST TIMER — KESKİN SİYAH & SARI
// ═══════════════════════════════════════════════════════════════════════════════════
const CIRC = 2 * Math.PI * 97; // ≈ 609.46

let selectedMs   = 5 * 60 * 1000;
let endTimestamp = null;
let pausedAt     = null;
let tickId       = null;
let isRunning    = false;
let isPaused     = false;

// ═══════════════════════════════════════════════════════════════════════════════════
//  SES (BASİT WEB AUDIO)
// ═══════════════════════════════════════════════════════════════════════════════════
let actx = null;
const audio = () => actx || (actx = new (window.AudioContext || window.webkitAudioContext)());

function tone(freq, dur, type = 'square', vol = 0.25) { // Square wave daha brutal
  try {
    const a = audio();
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.frequency.value = freq; o.type = type;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e) {}
}

const sfxStart    = () => { tone(440,.12); setTimeout(()=>tone(550,.15),110); };
const sfxPause    = () => tone(330,.18,'triangle',.18);
const sfxResume   = () => { tone(400,.1); setTimeout(()=>tone(500,.12),90); };
const sfxComplete = () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.45,'square',.22),i*140));

// ═══════════════════════════════════════════════════════════════════════════════════
//  VERİ DEPOLAMA
// ═══════════════════════════════════════════════════════════════════════════════════
const LS_DATA   = 'agBrutalData';
const LS_TIMER  = 'agBrutalTimer';
const LS_BADGES = 'agBrutalBadges';

function getData() {
  return JSON.parse(localStorage.getItem(LS_DATA) || JSON.stringify({
    history:[], streak:0, lastDayStr:null, totalMins:0, weekly:{}
  }));
}
function saveData(d) { localStorage.setItem(LS_DATA, JSON.stringify(d)); }

// ═══════════════════════════════════════════════════════════════════════════════════
//  ZAMANLAYICI ÇEKİRDEĞİ
// ═══════════════════════════════════════════════════════════════════════════════════
function handleStart() {
  if (isRunning) return;
  const task = document.getElementById('taskInput').value.trim() || 'GÖREV';

  endTimestamp = Date.now() + selectedMs;
  pausedAt = null;
  isRunning = true;
  isPaused  = false;

  localStorage.setItem(LS_TIMER, JSON.stringify({ endTimestamp, selectedMs, task }));

  startTick();
  setUIState('run', task);
  sfxStart();
}

function startTick() {
  if (tickId) clearInterval(tickId);
  tickId = setInterval(tick, 250);
}

function tick() {
  if (isPaused || !endTimestamp) return;
  const rem = endTimestamp - Date.now();
  if (rem <= 0) { onComplete(); return; }
  setDisplayMs(rem);
  setRing(rem);
}

function togglePause() {
  if (!isRunning) return;
  if (!isPaused) {
    pausedAt  = Date.now();
    isPaused  = true;
    setUIState('paused');
    sfxPause();
  } else {
    endTimestamp += (Date.now() - pausedAt);
    pausedAt  = null;
    isPaused  = false;
    const saved = JSON.parse(localStorage.getItem(LS_TIMER)||'{}');
    saved.endTimestamp = endTimestamp;
    localStorage.setItem(LS_TIMER, JSON.stringify(saved));
    setUIState('run');
    sfxResume();
  }
}

function resetTimer() {
  clearInterval(tickId); tickId = null;
  endTimestamp = null; pausedAt = null;
  isRunning = false; isPaused = false;
  localStorage.removeItem(LS_TIMER);
  setDisplayMs(selectedMs);
  setRing(selectedMs);
  setUIState('idle');
}

function onComplete() {
  clearInterval(tickId); tickId = null;
  localStorage.removeItem(LS_TIMER);

  const task    = document.getElementById('taskInput').value.trim() || 'GÖREV';
  const durMins = Math.round(selectedMs / 60000);

  const d   = getData();
  const now = new Date();

  d.history.unshift({ task, duration: durMins, at: now.toISOString() });
  if (d.history.length > 150) d.history.pop();

  const dayStr = now.toDateString();
  if (d.lastDayStr !== dayStr) {
    const yest = new Date(now - 86400000).toDateString();
    d.streak = (d.lastDayStr === yest) ? d.streak + 1 : 1;
    d.lastDayStr = dayStr;
  }
  d.totalMins = (d.totalMins || 0) + durMins;

  const key = now.toISOString().split('T')[0];
  d.weekly[key] = (d.weekly[key] || 0) + 1;

  saveData(d);

  const newBadge = evalBadges(d);

  isRunning = false; isPaused = false; endTimestamp = null;
  setDisplayMs(selectedMs);
  setRing(selectedMs);
  setUIState('idle');
  sfxComplete();
  showModal(task, durMins, d.streak, newBadge);
}

// Sayfa yenilendiğinde kurtarma
function recoverTimer() {
  const raw = localStorage.getItem(LS_TIMER);
  if (!raw) return;
  try {
    const s = JSON.parse(raw);
    const rem = s.endTimestamp - Date.now();
    if (rem <= 200) { localStorage.removeItem(LS_TIMER); return; }

    endTimestamp = s.endTimestamp;
    selectedMs   = s.selectedMs;
    isRunning    = true;

    document.getElementById('taskInput').value = s.task || '';

    const mins = selectedMs / 60000;
    document.querySelectorAll('.tpl-btn').forEach(b => {
      b.classList.toggle('active', +b.dataset.min === mins);
    });

    startTick();
    setUIState('run', s.task);
  } catch(e) { localStorage.removeItem(LS_TIMER); }
}

// ═══════════════════════════════════════════════════════════════════════════════════
//  GÖRÜNÜM YARDIMCILARI
// ═══════════════════════════════════════════════════════════════════════════════════
function setDisplayMs(ms) {
  const s = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(s / 60), sec = s % 60;
  document.getElementById('tDisp').textContent =
    String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function setRing(remMs) {
  const pct = Math.max(0, Math.min(1, remMs / selectedMs));
  document.getElementById('ringFill').style.strokeDashoffset = CIRC * (1 - pct);
}

function setUIState(state, task) {
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const tState   = document.getElementById('tState');
  const tName    = document.getElementById('tName');

  if (state === 'run') {
    startBtn.style.display = 'none';
    pauseBtn.style.display = 'flex';
    document.getElementById('pauseIco').innerHTML =
      '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    tState.className = 't-state run'; tState.textContent = 'ÇALIŞIYOR';
    if (task) tName.textContent = task;
  } else if (state === 'paused') {
    document.getElementById('pauseIco').innerHTML =
      '<polygon points="5 3 19 12 5 21 5 3"/>';
    tState.className = 't-state paused'; tState.textContent = 'DURAKLATILDI';
  } else {
    startBtn.style.display = '';
    pauseBtn.style.display = 'none';
    tState.className = 't-state idle'; tState.textContent = 'BEKLİYOR';
    tName.textContent = 'HAZIR';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════════
//  ŞABLON SEÇİMİ
// ═══════════════════════════════════════════════════════════════════════════════════
function pickTemplate(el, min) {
  if (isRunning) return;
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const cw = document.getElementById('customWrap');
  if (min === 0) {
    cw.classList.add('open');
    const v = parseInt(document.getElementById('customMin').value) || 30;
    selectedMs = v * 60000;
  } else {
    cw.classList.remove('open');
    selectedMs = min * 60000;
  }
  setDisplayMs(selectedMs);
  setRing(selectedMs);
}

document.getElementById('customMin').addEventListener('input', function() {
  const v = Math.max(1, Math.min(180, parseInt(this.value) || 1));
  selectedMs = v * 60000;
  setDisplayMs(selectedMs);
  setRing(selectedMs);
});

// ═══════════════════════════════════════════════════════════════════════════════════
//  NAVİGASYON
// ═══════════════════════════════════════════════════════════════════════════════════
const SCREENS = ['timer','stats','history','badges'];
function goTo(id) {
  SCREENS.forEach(s => {
    document.getElementById('screen-'+s).classList.toggle('active', s===id);
    document.getElementById('nav-'+s).classList.toggle('active', s===id);
  });
  if (id==='stats')   renderStats();
  if (id==='history') renderHistory();
  if (id==='badges')  renderBadges();
}

// ═══════════════════════════════════════════════════════════════════════════════════
//  MODAL & TOAST
// ═══════════════════════════════════════════════════════════════════════════════════
function showModal(task, mins, streak, newBadge) {
  const emojis = ['🎉','🔥','⚡','🚀','💎','👑','🌟'];
  document.getElementById('mEmoji').textContent = emojis[Math.min(streak-1, emojis.length-1)] || '🎉';
  document.getElementById('mSub').innerHTML = `"${task}" — ${mins} DAKİKA<br>🔥 ${streak} GÜNLÜK SERİ!`;
  const mb = document.getElementById('mBadge');
  if (newBadge) { mb.classList.add('show'); document.getElementById('mBadgeName').textContent = newBadge.name; }
  else          { mb.classList.remove('show'); }
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('taskInput').value = '';
}

let toastTimer;
function toast(msg, color='#FFE600') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = color; el.style.color = '#000';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════════════════════════════
//  İSTATİSTİK & HALKA GRAFİK (DONUT)
// ═══════════════════════════════════════════════════════════════════════════════════
const TR_DAYS = ['PZT','SAL','ÇAR','PER','CUM','CMT','PAZ'];

function renderStats() {
  const d = getData();
  document.getElementById('sStreak').textContent = d.streak || 0;
  document.getElementById('sTotal').textContent  = d.history.length;
  document.getElementById('sMins').textContent   = d.totalMins || 0;

  const todayStr  = new Date().toDateString();
  const todayCnt  = d.history.filter(h => new Date(h.at).toDateString()===todayStr).length;
  document.getElementById('sToday').textContent  = todayCnt;

  document.getElementById('fireIcon').textContent = d.streak>=7 ? '🔥🔥' : d.streak>=3 ? '🔥' : '⚡';
  renderWeekDonut(d);
}

function renderWeekDonut(d) {
  const today = new Date();
  const days = [];
  // Son 7 günü al (Pazartesi -> Pazar formatına uygun)
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(today);
    dt.setDate(today.getDate() - i);
    days.push(dt);
  }

  const counts = days.map(dt => d.weekly[dt.toISOString().split('T')[0]] || 0);
  const total = counts.reduce((a, b) => a + b, 0);
  
  // Haftalık etiketleri güncelle
  const labelsContainer = document.getElementById('weekLabels');
  labelsContainer.innerHTML = '';
  
  let gradient = 'conic-gradient(';
  let currentAngle = 0;
  const sliceAngle = 360 / 7; // 51.428...

  counts.forEach((count, i) => {
    const isActive = count > 0;
    const color = isActive ? '#FFE600' : '#333333';
    const start = currentAngle;
    const end = currentAngle + sliceAngle;
    gradient += `${color} ${start}deg ${end}deg, `;
    currentAngle = end;
    
    // Etiket oluştur
    const dayIdx = days[i].getDay() === 0 ? 6 : days[i].getDay() - 1; // Pzt=0
    const label = document.createElement('span');
    label.className = 'day-label' + (isActive ? ' active' : '');
    label.textContent = TR_DAYS[dayIdx];
    labelsContainer.appendChild(label);
  });

  gradient = gradient.slice(0, -2) + ')';
  document.getElementById('weekDonut').style.background = gradient;
  document.getElementById('donutTotal').textContent = total;
}

// ═══════════════════════════════════════════════════════════════════════════════════
//  GEÇMİŞ & ROZETLER
// ═══════════════════════════════════════════════════════════════════════════════════
function renderHistory() {
  const d = getData();
  const list = document.getElementById('histList');
  if (!d.history.length) {
    list.innerHTML = `<div class="empty"><p>HENÜZ GÖREV TAMAMLANMADI.<br>İLK GÖREVİNİ BAŞLAT! 🚀</p></div>`;
    return;
  }
  list.innerHTML = d.history.map(h => {
    const dt = new Date(h.at);
    const dateStr = dt.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})
      + ' · ' + dt.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="hist-item">
      <div class="hist-dot"></div>
      <div class="hist-info">
        <div class="hist-task">${h.task}</div>
        <div class="hist-meta">${dateStr}</div>
      </div>
      <div class="hist-dur">${h.duration}DK</div>
    </div>`;
  }).join('');
}

function clearHistory() {
  if (!confirm('TÜM GEÇMİŞ SİLİNSİN Mİ?')) return;
  const d = getData();
  d.history=[]; d.totalMins=0; d.weekly={};
  saveData(d);
  renderHistory();
  toast('GEÇMİŞ TEMİZLENDİ ✓');
}

const BADGES = [
  { id:'b1',  icon:'🌱', name:'İLK ADIM',    desc:'1 GÖREV',    ok: d => d.history.length>=1  },
  { id:'b2',  icon:'⭐', name:'BEŞLİ',        desc:'5 GÖREV',    ok: d => d.history.length>=5  },
  { id:'b3',  icon:'🏆', name:'ONLU',         desc:'10 GÖREV',   ok: d => d.history.length>=10 },
  { id:'b4',  icon:'💎', name:'ELMAS',        desc:'50 GÖREV',   ok: d => d.history.length>=50 },
  { id:'b5',  icon:'🔥', name:'ATEŞ',         desc:'3 GÜN SERİ', ok: d => d.streak>=3          },
  { id:'b6',  icon:'⚡', name:'HAFTALIK',     desc:'7 GÜN SERİ', ok: d => d.streak>=7          },
  { id:'b7',  icon:'👑', name:'EFSANE',       desc:'30 GÜN SERİ',ok: d => d.streak>=30         },
  { id:'b8',  icon:'⏱️', name:'SAATÇİ',       desc:'60 DAKİKA',  ok: d => d.totalMins>=60      },
  { id:'b9',  icon:'🚀', name:'MARATON',      desc:'500 DAKİKA', ok: d => d.totalMins>=500     },
  { id:'b10', icon:'🌟', name:'YILDIZ',       desc:'30 GÖREV',   ok: d => d.history.length>=30 },
  { id:'b11', icon:'🎯', name:'NİŞANCI',      desc:'25DK POMODORO', ok: d => d.history.some(h=>h.duration===25) },
];

function evalBadges(d) {
  const earned = JSON.parse(localStorage.getItem(LS_BADGES)||'[]');
  for (const b of BADGES) {
    if (!earned.includes(b.id) && b.ok(d)) {
      earned.push(b.id);
      localStorage.setItem(LS_BADGES, JSON.stringify(earned));
      return b;
    }
  }
  return null;
}

function renderBadges() {
  const d      = getData();
  const earned = JSON.parse(localStorage.getItem(LS_BADGES)||'[]');
  BADGES.forEach(b => { if (b.ok(d) && !earned.includes(b.id)) { earned.push(b.id); } });
  localStorage.setItem(LS_BADGES, JSON.stringify(earned));

  document.getElementById('badgeGrid').innerHTML = BADGES.map(b => {
    const got = earned.includes(b.id);
    return `<div class="b-card ${got?'earned':'locked'}">
      <span class="b-icon">${got ? b.icon : '🔒'}</span>
      <div class="b-name">${b.name}</div>
      <div class="b-desc">${b.desc}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════════════
//  BAŞLANGIÇ
// ═══════════════════════════════════════════════════════════════════════════════════
(function init() {
  document.getElementById('ringFill').style.strokeDasharray  = CIRC;
  document.getElementById('ringFill').style.strokeDashoffset = 0;
  setDisplayMs(selectedMs);
  recoverTimer();
})();
</script>
</body>
