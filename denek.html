<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitap Takibi - Full & Master</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161a24; --surface2: #1e2333; --border: #2a3045;
    --accent: #f0c93a; --accent2: #4ef0a0; --accent3: #4ec8f0; --danger: #f05a4e;
    --purple: #c44ef0; --text: #e8ecf7; --muted: #6b7599; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
    min-height: 100vh; padding: 20px 20px 100px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(240,201,58,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(240,201,58,0.02) 1px, transparent 1px);
    background-size: 30px 30px; pointer-events: none; z-index: 0;
  }
  .container { max-width: 750px; margin: 0 auto; position: relative; z-index: 1; }

  /* ZAMANLAYICI */
  .timer-bar {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 30px; padding: 8px 20px; display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 24px;
  }
  .timer-display { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent2); }

  /* BAŞLIK & KAPAK */
  header { text-align: center; margin-bottom: 30px; }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 6vw, 42px); font-weight: 800; color: var(--accent); margin-bottom: 5px; text-shadow: 0 0 20px rgba(240,201,58,0.3); }
  .subtitle { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  #coverImg { width: 120px; height: 180px; border-radius: 8px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; margin: 0 auto 15px; border: 1px solid var(--border); }

  /* NEON SAYAÇLAR */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
  .stat-num.yellow { color: var(--accent); text-shadow: 0 0 20px rgba(240,201,58,0.6); }
  .stat-num.green { color: var(--accent2); text-shadow: 0 0 20px rgba(78,240,160,0.6); }
  .stat-num.blue { color: var(--accent3); text-shadow: 0 0 20px rgba(78,200,240,0.6); }
  .stat-num.purple { color: var(--purple); text-shadow: 0 0 20px rgba(196,78,240,0.6); }
  .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ISI HARİTASI */
  .heatmap-box { padding: 15px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; }
  .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
  .day-cell { aspect-ratio: 1; border-radius: 3px; background: var(--surface2); border: 1px solid rgba(255,255,255,0.03); position: relative; }

  /* KÜNYE */
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
  .sec-header { padding: 12px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-family: 'Syne'; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .book-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .book-field { background: var(--surface); padding: 12px; }
  .field-tag { font-size: 8px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .field-inp { width: 100%; background: transparent; border: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; outline: none; }

  /* ANA SAYAÇ */
  .counter-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 20px; text-align: center; margin-bottom: 20px; }
  .page-num { font-family: 'Syne', sans-serif; font-size: 90px; font-weight: 800; line-height: 1; color: var(--text); margin-bottom: 20px; }
  .btn-group { display: flex; justify-content: center; gap: 40px; margin-bottom: 25px; }
  .c-btn { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
  .c-plus { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(240,201,58,0.3); }
  .c-minus { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* FOOTER VE İÇE AKTAR */
  .footer-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
  .f-btn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.2s; font-family: 'Syne'; }
  .f-btn:hover { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<div class="container">
  <div class="timer-bar">
    <div style="font-size: 11px; color: var(--muted); font-weight: 700;">⏱ OKUMA SEANSI</div>
    <div class="timer-display" id="timer">00:00</div>
    <button class="f-btn" id="timerBtn" onclick="toggleTimer()" style="padding: 6px 15px; background: var(--accent2); color: #000; border:none;">BAŞLAT</button>
  </div>

  <header>
    <img id="coverImg" alt="Kapak">
    <h1 id="dynTitle">Kitap Günlüğü</h1>
    <p id="dynAuthor" class="subtitle">Okuma yolculuğunuzu kişiselleştirin</p>
  </header>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num yellow" id="statRead">0</div><div class="stat-lbl">Okunan</div></div>
    <div class="stat-card"><div class="stat-num green" id="statLeft">—</div><div class="stat-lbl">Kalan</div></div>
    <div class="stat-card"><div class="stat-num blue" id="statDays">—</div><div class="stat-lbl">Kalan Gün</div></div>
    <div class="stat-card"><div class="stat-num purple" id="statSpeed">—</div><div class="stat-lbl">Tahmini Bitiş</div></div>
  </div>

  <div class="heatmap-box">
    <div style="font-size: 10px; font-family: 'Syne'; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;">📊 Haftalık İstikrar</div>
    <div class="heatmap-grid" id="heatmap"></div>
  </div>

  <div class="section-card">
    <div class="sec-header">📖 KÜNYE & HEDEFLER</div>
    <div class="book-fields">
      <div class="book-field" style="grid-column: span 2; border-bottom: 1px solid var(--border);">
        <span class="field-tag">Kitap Adı</span>
        <input class="field-inp" id="bName" placeholder="Adını gir..." oninput="updateAll()">
      </div>
      <div class="book-field"><span class="field-tag">Yazar</span><input class="field-inp" id="bAuthor" placeholder="Yazar..." oninput="updateAll()"></div>
      <div class="book-field"><span class="field-tag">Kapak URL</span><input class="field-inp" id="bCover" placeholder="https://..." oninput="updateAll()"></div>
      <div class="book-field"><span class="field-tag">Toplam Sayfa</span><input class="field-inp" type="number" id="bTotal" oninput="updateAll()"></div>
      <div class="book-field"><span class="field-tag">Hedef Tarih</span><input class="field-inp" type="date" id="bDeadline" oninput="updateAll()"></div>
    </div>
    <div style="padding: 15px; text-align: center; border-top: 1px solid var(--border); font-weight: 800; font-family: 'Syne';" id="statusArea">—</div>
  </div>

  <div class="counter-box">
    <div class="page-num" id="pageNum">0</div>
    <div class="btn-group">
      <button class="c-btn c-minus" onclick="addPage(-1)">−</button>
      <button class="c-btn c-plus" onclick="addPage(1)">+</button>
    </div>
    <div style="display:flex; justify-content:center; gap:8px;">
      <button class="f-btn" onclick="setStep(1)">1</button>
      <button class="f-btn" onclick="setStep(10)">10</button>
      <button class="f-btn" onclick="setStep(50)">50</button>
    </div>
  </div>

  <div class="footer-btns">
    <button class="f-btn" style="background: var(--accent); color: #000; border:none;" onclick="exportData()">⬇ YEDEKLE (Dışa Aktar)</button>
    <button class="f-btn" onclick="document.getElementById('importFile').click()">⬆ YÜKLE (İçe Aktar)</button>
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
    <button class="f-btn" onclick="resetData()" style="color: var(--danger)">🗑 HER ŞEYİ SIFIRLA</button>
  </div>
</div>

<script>
let pages = parseInt(localStorage.getItem('m_pages')) || 0;
let history = JSON.parse(localStorage.getItem('m_history') || '{}');
let step = 1;
let timerInterval;
let seconds = 0;

function updateAll() {
  const name = document.getElementById('bName').value;
  const author = document.getElementById('bAuthor').value;
  const total = parseInt(document.getElementById('bTotal').value) || 0;
  const cover = document.getElementById('bCover').value;
  const deadline = document.getElementById('bDeadline').value;

  document.getElementById('dynTitle').textContent = name || 'Kitap Günlüğü';
  document.getElementById('dynAuthor').textContent = author || 'Okuma yolculuğunuzu kişiselleştirin';
  const img = document.getElementById('coverImg');
  if(cover) { img.src = cover; img.style.display = 'block'; } else { img.style.display = 'none'; }

  document.getElementById('pageNum').textContent = pages;
  document.getElementById('statRead').textContent = pages;
  document.getElementById('statLeft').textContent = total ? Math.max(0, total - pages) : '—';
  
  if(deadline) {
    const diff = Math.ceil((new Date(deadline) - new Date()) / (1000*60*60*24));
    document.getElementById('statDays').textContent = diff > 0 ? diff : (diff === 0 ? 'Bgn' : 'Bitti');
    if(total > 0 && pages > 0) {
      const daysNeeded = (total - pages) / (pages / 7 || 1);
      document.getElementById('statSpeed').textContent = Math.ceil(daysNeeded) + ' Gün';
    }
  }

  let status = '—';
  if(total > 0) {
    const pct = (pages / total) * 100;
    if(pct >= 100) status = '🥹 <span style="color:var(--accent2)">BİTTİ</span>';
    else if(pct >= 70) status = '🫅🏻 BİTMEK ÜZERE';
    else if(pct >= 30) status = '🤩 HARİKA';
    else status = '🙂 BAŞLADIK';
  }
  document.getElementById('statusArea').innerHTML = status;

  localStorage.setItem('m_name', name);
  localStorage.setItem('m_author', author);
  localStorage.setItem('m_total', total);
  localStorage.setItem('m_cover', cover);
  localStorage.setItem('m_deadline', deadline);
  localStorage.setItem('m_pages', pages);
  renderHeatmap();
}

function addPage(dir) {
  pages = Math.max(0, pages + (dir * step));
  const today = new Date().toISOString().split('T')[0];
  history[today] = (history[today] || 0) + (dir * step);
  localStorage.setItem('m_history', JSON.stringify(history));
  updateAll();
}

function setStep(s) { step = s; }

// İÇE AKTAR (Geri geldi!)
function importData(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(data.pages !== undefined) {
        pages = data.pages;
        localStorage.setItem('m_name', data.name || '');
        localStorage.setItem('m_author', data.author || '');
        localStorage.setItem('m_total', data.total || 0);
        localStorage.setItem('m_cover', data.cover || '');
        localStorage.setItem('m_deadline', data.deadline || '');
        localStorage.setItem('m_pages', data.pages);
        localStorage.setItem('m_history', JSON.stringify(data.history || {}));
        location.reload();
      }
    } catch(err) { alert('Hatalı dosya formatı!'); }
  };
  reader.readAsText(file);
}

// DIŞA AKTAR (Geri geldi!)
function exportData() {
  const data = {
    name: document.getElementById('bName').value,
    author: document.getElementById('bAuthor').value,
    total: document.getElementById('bTotal').value,
    cover: document.getElementById('bCover').value,
    deadline: document.getElementById('bDeadline').value,
    pages: pages,
    history: history
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kitap-takibi-yedek.json'; a.click();
}

function renderHeatmap() {
  const grid = document.getElementById('heatmap'); grid.innerHTML = '';
  for(let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const val = history[d.toISOString().split('T')[0]] || 0;
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if(val > 0) { cell.style.background = 'var(--accent2)'; cell.style.opacity = Math.min(1, val/50); cell.style.boxShadow = '0 0 10px rgba(78,240,160,0.3)'; }
    grid.appendChild(cell);
  }
}

function toggleTimer() {
  const btn = document.getElementById('timerBtn');
  if(timerInterval) { clearInterval(timerInterval); timerInterval = null; btn.textContent = 'DEVAM ET'; btn.style.background = 'var(--accent)'; }
  else {
    timerInterval = setInterval(() => { seconds++;
      const m = Math.floor(seconds/60).toString().padStart(2,'0');
      const s = (seconds%60).toString().padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
    btn.textContent = 'DURAKLAT'; btn.style.background = 'var(--danger)';
  }
}

function resetData() { if(confirm("Tüm veriler silinecek?")) { localStorage.clear(); location.reload(); } }

window.onload = () => {
  document.getElementById('bName').value = localStorage.getItem('m_name') || '';
  document.getElementById('bAuthor').value = localStorage.getItem('m_author') || '';
  document.getElementById('bTotal').value = localStorage.getItem('m_total') || '';
  document.getElementById('bCover').value = localStorage.getItem('m_cover') || '';
  document.getElementById('bDeadline').value = localStorage.getItem('m_deadline') || '';
  updateAll();
};
</script>
</body>
</html>
