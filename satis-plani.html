
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haftalık Satış Planı</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #f0c93a;
    --accent2: #4ef0a0;
    --danger: #f05a4e;
    --text: #e8ecf7;
    --muted: #6b7599;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 16px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(240,201,58,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(240,201,58,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }

  header { margin-bottom: 36px; }
  .week-badge {
    display: inline-block;
    background: var(--accent); color: #000;
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 4px; margin-bottom: 12px;
  }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(24px,5vw,40px); font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 12px; }

  .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 36px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .summary-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .summary-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
  .summary-value.yellow { color: var(--accent); }
  .summary-value.green  { color: var(--accent2); }

  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }

  thead th {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); padding: 0 4px 10px; text-align: center; font-weight: 400;
  }
  thead th.col-name { text-align: left; }
  thead th.today-col { color: var(--accent); }

  tbody tr { animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  td { padding: 3px 4px; vertical-align: middle; }

  .name-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    height: 64px; min-width: 100px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .svc-label { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

  .counter {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); height: 64px; min-width: 96px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: border-color 0.15s, background 0.15s;
  }
  .counter.has-val { border-color: var(--accent); background: rgba(240,201,58,0.07); }
  .counter.today-counter { border-color: rgba(240,201,58,0.4); }

  .btn {
    width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 20px; font-weight: 700; font-family: 'Syne', sans-serif;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; flex-shrink: 0; line-height: 1; user-select: none;
  }
  .btn-plus  { background: var(--accent); color: #000; }
  .btn-plus:hover  { background: #ffd84a; transform: scale(1.12); }
  .btn-plus:active { transform: scale(0.92); }
  .btn-minus { background: var(--surface2); color: var(--muted); }
  .btn-minus:hover { background: var(--border); color: var(--text); }
  .btn-minus:active { transform: scale(0.92); }

  .count-num {
    font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
    min-width: 24px; text-align: center; color: var(--text);
  }

  .total-cell {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); height: 64px; min-width: 68px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
    color: var(--accent2);
  }

  .target-cell {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: var(--radius); height: 64px; min-width: 76px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .target-lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .target-input {
    background: transparent; border: none; outline: none;
    font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
    color: var(--accent); text-align: center; width: 64px;
  }
  .target-input::placeholder { color: #3a4560; }

  .prog-bar-cell { padding: 0 4px 10px; }
  .prog-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.3s; }
  .pct-cell { font-size: 10px; color: var(--muted); text-align: center; padding-bottom: 10px; }

  .reset-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 9px 20px; border-radius: 8px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em;
    transition: all 0.2s; margin: 24px auto 0; display: block;
  }
  .reset-btn:hover { border-color: var(--danger); color: var(--danger); }
  .footer { margin-top: 16px; text-align: center; font-size: 11px; color: var(--muted); }

  @media (max-width: 600px) {
    .summary-bar { grid-template-columns: repeat(2,1fr); }
    .counter { min-width: 80px; }
    .btn { width: 24px; height: 24px; font-size: 17px; }
    .count-num { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="week-badge" id="weekBadge">—</div>
    <h1>Haftalık <span>Satış</span> Planı</h1>
    <p class="subtitle">+ butonu ile günlük gerçekleşen adetleri gir · Hedef alanına haftalık hedefinizi yaz</p>
  </header>

  <div class="summary-bar">
    <div class="summary-card">
      <div class="summary-label">Bu Hafta Toplam</div>
      <div class="summary-value yellow" id="s-total">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Toplam Hedef</div>
      <div class="summary-value" id="s-target">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Gerçekleşme</div>
      <div class="summary-value green" id="s-pct">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Bugün</div>
      <div class="summary-value" id="s-today">0</div>
    </div>
  </div>

  <div class="table-scroll">
    <table id="mainTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <button class="reset-btn" onclick="resetAll()">↺ Tüm Verileri Sıfırla</button>
  <p class="footer">Veriler tarayıcınızda saklanır · Sayfa yenilendiğinde korunur</p>
</div>

<script>
const SERVICES = [
  { key:'kk',      label:'KK',      color:'#f0c93a' },
  { key:'oft',     label:'OFT',     color:'#4ef0a0' },
  { key:'ap',      label:'AP',      color:'#4ec8f0' },
  { key:'esnek',   label:'Esnek',   color:'#c44ef0' },
  { key:'bes',     label:'BES',     color:'#f08a4e' },
  { key:'sigorta', label:'Sigorta', color:'#f04e7a' },
];
const DAYS = ['Pzt','Sal','Çar','Per','Cum'];

function todayCol() {
  const d = new Date().getDay();
  return (d===0||d===6) ? -1 : d-1;
}

function getWeekLabel() {
  const now = new Date(), day = now.getDay();
  const diff = now.getDate() - day + (day===0?-6:1);
  const mon = new Date(now); mon.setDate(diff);
  const fri = new Date(mon); fri.setDate(mon.getDate()+4);
  const M=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  return `${mon.getDate()} ${M[mon.getMonth()]} – ${fri.getDate()} ${M[fri.getMonth()]} ${fri.getFullYear()}`;
}

function lsGet(k)    { return parseInt(localStorage.getItem(k)||'0'); }
function lsSet(k,v)  { localStorage.setItem(k,v); }
function dayKey(s,d) { return `satis_${s}_${d}`; }
function tgtKey(s)   { return `target_${s}`; }

let state = {};
function loadState() {
  SERVICES.forEach(s => {
    state[s.key] = {
      days: [0,1,2,3,4].map(d => lsGet(dayKey(s.key,d))),
      target: lsGet(tgtKey(s.key))
    };
  });
}

function buildHead() {
  const tc = todayCol();
  let html = '<tr><th class="col-name">Hizmet</th>';
  DAYS.forEach((d,i) => html += `<th class="${i===tc?'today-col':''}">${d}</th>`);
  html += '<th>Toplam</th><th>Hedef</th></tr>';
  document.getElementById('thead').innerHTML = html;
}

function buildBody() {
  const tc = todayCol();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  SERVICES.forEach((s, si) => {
    const days   = state[s.key].days;
    const target = state[s.key].target;
    const total  = days.reduce((a,b)=>a+b,0);
    const pct    = target>0 ? Math.min(100,Math.round(total/target*100)) : 0;
    const pc     = pct>=100?'#4ef0a0':pct>=60?s.color:'#f05a4e';

    // --- Main data row ---
    const tr = document.createElement('tr');
    tr.style.animationDelay = (si*0.06)+'s';

    // Name cell
    const tdName = document.createElement('td');
    tdName.innerHTML = `<div class="name-cell">
      <div class="dot" style="background:${s.color}"></div>
      <div class="svc-label" style="color:${s.color}">${s.label}</div>
    </div>`;
    tr.appendChild(tdName);

    // Day counter cells
    days.forEach((v, d) => {
      const td = document.createElement('td');
      const isToday = d===tc;
      td.innerHTML = `<div class="counter${v>0?' has-val':''}${isToday?' today-counter':''}" id="cell_${s.key}_${d}">
        <button class="btn btn-minus" onclick="change('${s.key}',${d},-1)">−</button>
        <span class="count-num" id="num_${s.key}_${d}">${v}</span>
        <button class="btn btn-plus" onclick="change('${s.key}',${d},1)">+</button>
      </div>`;
      tr.appendChild(td);
    });

    // Total cell
    const tdTotal = document.createElement('td');
    tdTotal.innerHTML = `<div class="total-cell" id="total_${s.key}">${total}</div>`;
    tr.appendChild(tdTotal);

    // Target cell
    const tdTarget = document.createElement('td');
    tdTarget.innerHTML = `<div class="target-cell">
      <span class="target-lbl">Hedef</span>
      <input class="target-input" type="number" min="0"
        id="tgt_${s.key}" value="${target||''}" placeholder="—"
        oninput="setTarget('${s.key}',this.value)">
    </div>`;
    tr.appendChild(tdTarget);
    tbody.appendChild(tr);

    // --- Progress row ---
    const pr = document.createElement('tr');
    pr.innerHTML = `<td></td>
      <td colspan="5" class="prog-bar-cell">
        <div class="prog-track">
          <div class="prog-fill" id="prog_${s.key}" style="width:${pct}%;background:${pc}"></div>
        </div>
      </td>
      <td class="pct-cell" id="pct_${s.key}">${target>0?pct+'%':'—'}</td>
      <td></td>`;
    tbody.appendChild(pr);
  });
}

function change(sKey, day, delta) {
  const nv = Math.max(0, state[sKey].days[day] + delta);
  state[sKey].days[day] = nv;
  lsSet(dayKey(sKey,day), nv);

  document.getElementById(`num_${sKey}_${day}`).textContent = nv;
  const cell = document.getElementById(`cell_${sKey}_${day}`);
  nv>0 ? cell.classList.add('has-val') : cell.classList.remove('has-val');

  updateRow(sKey);
  updateSummary();
}

function setTarget(sKey, val) {
  const v = Math.max(0, parseInt(val)||0);
  state[sKey].target = v;
  lsSet(tgtKey(sKey), v);
  updateRow(sKey);
  updateSummary();
}

function updateRow(sKey) {
  const s      = SERVICES.find(x=>x.key===sKey);
  const total  = state[sKey].days.reduce((a,b)=>a+b,0);
  const target = state[sKey].target;
  const pct    = target>0 ? Math.min(100,Math.round(total/target*100)) : 0;
  const pc     = pct>=100?'#4ef0a0':pct>=60?s.color:'#f05a4e';

  const el = document.getElementById(`total_${sKey}`);
  if(el) el.textContent = total;
  const pg = document.getElementById(`prog_${sKey}`);
  if(pg) { pg.style.width=pct+'%'; pg.style.background=pc; }
  const pt = document.getElementById(`pct_${sKey}`);
  if(pt) pt.textContent = target>0?pct+'%':'—';
}

function updateSummary() {
  let tot=0, tgt=0, today=0;
  const tc = todayCol();
  SERVICES.forEach(s => {
    tot += state[s.key].days.reduce((a,b)=>a+b,0);
    tgt += state[s.key].target;
    if(tc>=0) today += state[s.key].days[tc];
  });
  document.getElementById('s-total').textContent  = tot;
  document.getElementById('s-target').textContent = tgt;
  document.getElementById('s-pct').textContent    = tgt>0 ? Math.round(tot/tgt*100)+'%' : '—';
  document.getElementById('s-today').textContent  = today;
}

function resetAll() {
  if(!confirm('Tüm satış verileri sıfırlanacak. Emin misin?')) return;
  SERVICES.forEach(s => {
    for(let d=0;d<5;d++) { localStorage.removeItem(dayKey(s.key,d)); state[s.key].days[d]=0; }
    localStorage.removeItem(tgtKey(s.key)); state[s.key].target=0;
  });
  buildBody();
  updateSummary();
}

// Init
document.getElementById('weekBadge').textContent = getWeekLabel();
loadState();
buildHead();
buildBody();
updateSummary();
</script>
</body>
</html>
