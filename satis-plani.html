<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* APP */
.app {
    width: 360px;
    height: 720px;
    background: #fff;
    border-radius: 30px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}

/* HEADER */
.header {
    padding: 25px;
}

.title {
    font-size: 32px;
    font-weight: 800;
}

.date {
    color: gray;
    margin-top: 5px;
}

/* TASK */
.task {
    display: flex;
    align-items: center;
    margin-top: 12px;
}

.task input {
    margin-right: 10px;
}

.task.done span {
    text-decoration: line-through;
    color: gray;
}

/* INPUT */
.input {
    width: 100%;
    margin-top: 15px;
    padding: 10px 0;
    border: none;
    border-top: 1px solid #eee;
    outline: none;
}

/* DAYS */
.days {
    margin-top: auto;
}

.day {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    background: #eee;
    border-top: 1px solid #ddd;
    cursor: pointer;
}

.day.active {
    background: #ccc;
}
</style>

</head>
<body>

<div class="app">

    <div class="header">
        <div class="title" id="title">MONDAY</div>
        <div class="date" id="date"></div>

        <div id="tasks"></div>

        <input class="input" id="input" placeholder="Add task...">
    </div>

    <div class="days" id="days"></div>

</div>

<script>

const days = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY","SUNDAY"];
let currentDay = localStorage.getItem("day") || "MONDAY";

const tasksEl = document.getElementById("tasks");
const input = document.getElementById("input");

document.getElementById("date").innerText = new Date().toDateString();

function getData(){
    return JSON.parse(localStorage.getItem("todo") || "{}");
}

function saveData(data){
    localStorage.setItem("todo", JSON.stringify(data));
}

function renderDays(){
    const daysEl = document.getElementById("days");
    daysEl.innerHTML = "";

    days.forEach(d=>{
        const el = document.createElement("div");
        el.className = "day" + (d===currentDay ? " active":"");
        el.innerText = d;

        el.onclick = ()=>{
            currentDay = d;
            localStorage.setItem("day", d);
            render();
        };

        daysEl.appendChild(el);
    });
}

function renderTasks(){
    const data = getData();
    const list = data[currentDay] || [];

    tasksEl.innerHTML = "";

    list.forEach((t,i)=>{
        const div = document.createElement("div");
        div.className = "task" + (t.done ? " done":"");

        const check = document.createElement("input");
        check.type = "checkbox";
        check.checked = t.done;

        check.onchange = ()=>{
            t.done = !t.done;
            saveData(data);
            render();
        };

        const span = document.createElement("span");
        span.innerText = t.text;

        div.append(check, span);
        tasksEl.appendChild(div);
    });
}

input.addEventListener("keypress", e=>{
    if(e.key==="Enter" && input.value.trim()){
        const data = getData();

        if(!data[currentDay]) data[currentDay]=[];

        data[currentDay].push({
            text: input.value,
            done: false
        });

        saveData(data);
        input.value="";
        render();
    }
});

function render(){
    document.getElementById("title").innerText = currentDay;
    renderDays();
    renderTasks();
}

render();

</script>

</body>
</html>
