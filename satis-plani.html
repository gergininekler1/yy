<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexusCards - Swipe Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');

        :root {
            --bg-deep: #130C14; /* Koyu Mürdüm / Uzay */
            --glass-bg: rgba(242, 204, 143, 0.05); /* Bohem Altın Yansıması */
            --glass-border: rgba(224, 122, 95, 0.15); /* Bohem Kiremit Sınır */
            --accent-terracotta: #E07A5F;
            --accent-gold: #F2CC8F;
            --accent-green: #81B29A;
            --text-main: #F4F1DE;
            --text-muted: #9A8C98;
            --danger: #E56B6F;
            --font-main: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); touch-action: manipulation; }
        body { background-color: var(--bg-deep); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Fütüristik Bohem Arka Plan Mesh */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(224, 122, 95, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(242, 204, 143, 0.06) 0%, transparent 50%);
            filter: blur(30px);
        }

        /* Header (Zamanlayıcı Sağa Yaslı) */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(19, 12, 20, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 10; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; color: var(--text-main); }
        .logo span { color: var(--accent-terracotta); }
        .header-right { display: flex; flex-direction: column; align-items: flex-end; }
        .timer-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .timer { font-family: monospace; font-size: 1.2rem; color: var(--accent-gold); }

        main { flex: 1; padding: 20px; overflow-y: auto; overflow-x: hidden; width: 100%; max-width: 800px; margin: 0 auto; position: relative; }

        /* Paneller */
        .panel { display: none; animation: fadeIn 0.4s ease forwards; height: 100%; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Butonlar */
        .btn { padding: 12px 20px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent-terracotta), var(--accent-gold)); color: #130C14; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(224, 122, 95, 0.2); }
        .btn:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); box-shadow: none; }

        /* Klasör (Deck) Tasarımı */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .deck-card { position: relative; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; min-height: 140px; }
        .deck-card:hover { border-color: var(--accent-gold); background: rgba(242, 204, 143, 0.1); }
        .deck-card h3 { font-size: 1.1rem; margin-bottom: 5px; color: var(--text-main); word-break: break-word; }
        .deck-card .count { font-size: 0.85rem; color: var(--accent-terracotta); }
        
        /* Klasör Silme Tuşu */
        .delete-deck-btn { position: absolute; top: 10px; right: 10px; background: rgba(229, 107, 111, 0.2); color: var(--danger); border: none; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; }

        /* Editör Alanı (Taşma engelli) */
        .editor-container { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-top: 15px; }
        textarea { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); outline: none; resize: none; margin-bottom: 15px; font-size: 1rem; }
        textarea:focus { border-color: var(--accent-gold); }
        .q-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 10px; word-break: break-word; border-left: 3px solid var(--accent-terracotta); }
        .q-item button { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 8px; flex-shrink: 0; margin-left: 10px; }

        /* TINDER MANTIĞI ÇALIŞMA EKRANI */
        .study-container { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-start; padding-top: 10px; }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 20px; font-size: 0.9rem; color: var(--text-muted); }
        .stats-bar span b { color: var(--text-main); }
        
        .tinder-wrapper { position: relative; width: 100%; max-width: 350px; height: 450px; perspective: 1000px; margin-top: 20px; }
        
        .tinder-card { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: grab; z-index: 2; }
        .tinder-card.dragging { transition: none; cursor: grabbing; }
        .tinder-card.flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: linear-gradient(160deg, rgba(30,22,34,0.95), rgba(19,12,20,0.95)); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card-face h2 { font-size: 1.4rem; font-weight: 500; line-height: 1.4; pointer-events: none; }
        .card-back { transform: rotateY(180deg); border-color: var(--accent-terracotta); }
        .card-back h2 { color: var(--accent-gold); }

        /* Kaydırma İpuçları */
        .swipe-hints { display: flex; justify-content: space-between; width: 100%; max-width: 350px; margin-top: 30px; opacity: 0.5; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; pointer-events: none; }
        .hint-left { color: var(--danger); }
        .hint-up { color: var(--accent-gold); }
        .hint-right { color: var(--accent-green); }

    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <header>
        <div class="logo">NEXUS<span>.</span></div>
        <div class="header-right">
            <span class="timer-label">Focus</span>
            <span class="timer" id="timer">00:00</span>
        </div>
    </header>

    <main>
        <div id="panel-home" class="panel active">
            <div class="section-header">
                <h2>Arşiv</h2>
                <button class="btn btn-outline" onclick="addDeck()">+ Klasör</button>
            </div>
            <div class="deck-grid" id="deck-list"></div>
        </div>

        <div id="panel-editor" class="panel">
            <div class="section-header">
                <button class="btn btn-outline" onclick="showPanel('panel-home')">← Geri</button>
                <button class="btn" onclick="startStudy()">Başlat ▶</button>
            </div>
            <h2 id="editor-title" style="color: var(--accent-gold); margin-bottom: 10px;"></h2>
            
            <div class="editor-container">
                <textarea id="bulk-input" rows="3" placeholder="Soru | Cevap şeklinde yapıştır..."></textarea>
                <button class="btn" style="width: 100%" onclick="bulkImport()">Toplu Yükle (En Başa Ekler)</button>
                
                <div style="margin-top: 20px; max-height: 300px; overflow-y: auto;" id="question-list"></div>
            </div>
        </div>

        <div id="panel-study" class="panel">
            <div class="study-container">
                <div class="stats-bar">
                    <button class="btn-outline" style="border:none; padding:0; font-size:1.2rem;" onclick="showPanel('panel-home')">🔙</button>
                    <span>Kalan: <b id="stat-kalan">0</b></span>
                    <span>Öğrenilen: <b id="stat-kolay" style="color: var(--accent-green)">0</b></span>
                </div>

                <div class="tinder-wrapper">
                    <div class="tinder-card" id="tcard">
                        <div class="card-face">
                            <h2 id="card-front">Soru Yükleniyor...</h2>
                        </div>
                        <div class="card-face card-back">
                            <h2 id="card-back">Cevap Yükleniyor...</h2>
                        </div>
                    </div>
                </div>

                <div class="swipe-hints">
                    <span class="hint-left">👈 Zor</span>
                    <span class="hint-up">👆 Normal</span>
                    <span class="hint-right">Kolay 👉</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('nexus_boho')) || {};
        let currentDeck = null, studyQueue = [], sessionStats = { kolay: 0, total: 0 };
        
        // Kronometre
        let seconds = 0;
        setInterval(() => {
            seconds++;
            document.getElementById('timer').innerText = `${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`;
        }, 1000);

        function saveDB() { localStorage.setItem('nexus_boho', JSON.stringify(db)); renderHome(); }
        function showPanel(id) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='panel-home') renderHome(); }

        // --- ANA EKRAN & SİLME MANTIĞI ---
        function renderHome() {
            const list = document.getElementById('deck-list'); list.innerHTML = '';
            for (let deck in db) {
                list.innerHTML += `
                    <div class="deck-card" onclick="openEditor('${deck}')">
                        <button class="delete-deck-btn" onclick="deleteDeck('${deck}', event)">✕</button>
                        <h3>${deck}</h3>
                        <div class="count">${db[deck].length} Kart</div>
                    </div>`;
            }
        }

        function addDeck() { const n = prompt("Klasör Adı:"); if(n && !db[n]) { db[n] = []; saveDB(); } }
        function deleteDeck(name, event) {
            event.stopPropagation(); // Kartın içine girmeyi engeller
            if(confirm(`"${name}" klasörünü tamamen silmek istediğine emin misin?`)) { delete db[name]; saveDB(); }
        }

        function openEditor(name) { currentDeck = name; document.getElementById('editor-title').innerText = name; renderQuestions(); showPanel('panel-editor'); }

        // --- EKLENENLERİ EN BAŞA ALMA (UNSHIFT) ---
        function bulkImport() {
            const lines = document.getElementById('bulk-input').value.split('\n');
            let added = 0;
            lines.forEach(l => {
                if(l.includes('|')) {
                    const [q, a] = l.split('|');
                    db[currentDeck].unshift({ q: q.trim(), a: a.trim() }); // EN BAŞA EKLER
                    added++;
                }
            });
            if(added > 0) { document.getElementById('bulk-input').value = ''; saveDB(); renderQuestions(); }
        }

        function renderQuestions() {
            const list = document.getElementById('question-list'); list.innerHTML = '';
            db[currentDeck].forEach((c, i) => {
                list.innerHTML += `<div class="q-item"><span>${c.q}</span><button onclick="delQ(${i})">Sil</button></div>`;
            });
        }
        function delQ(i) { db[currentDeck].splice(i, 1); saveDB(); renderQuestions(); }

        // --- TINDER MANTIĞI & ÇALIŞMA SİSTEMİ ---
        const tcard = document.getElementById('tcard');
        let startX = 0, startY = 0, currentX = 0, currentY = 0, isDragging = false;

        function startStudy() {
            if(!db[currentDeck].length) return alert("Kart yok!");
            studyQueue = [...db[currentDeck]].sort(() => Math.random() - 0.5);
            sessionStats = { kolay: 0, total: studyQueue.length };
            showPanel('panel-study'); nextCard();
        }

        function nextCard() {
            if(!studyQueue.length) { alert("Klasör Bitti!"); return showPanel('panel-home'); }
            document.getElementById('card-front').innerText = studyQueue[0].q;
            document.getElementById('card-back').innerText = studyQueue[0].a;
            document.getElementById('stat-kalan').innerText = studyQueue.length;
            document.getElementById('stat-kolay').innerText = sessionStats.kolay;
            
            tcard.classList.remove('flipped');
            tcard.style.transform = ''; // Kartı merkeze sıfırla
        }

        function handleAnswer(dir) {
            const card = studyQueue.shift();
            if(dir === 'left') { studyQueue.splice(Math.min(2, studyQueue.length), 0, card); } // Zor
            else if(dir === 'up') { studyQueue.push(card); } // Normal
            else if(dir === 'right') { sessionStats.kolay++; } // Kolay

            // Kartı ekran dışına uçurma animasyonu
            const flyX = dir === 'left' ? -500 : (dir === 'right' ? 500 : 0);
            const flyY = dir === 'up' ? -500 : 0;
            tcard.style.transition = 'transform 0.4s ease';
            tcard.style.transform = `translate(${flyX}px, ${flyY}px) rotate(${flyX * 0.1}deg)`;
            
            setTimeout(() => {
                tcard.style.transition = 'none'; // Geri gelirken animasyon olmasın
                nextCard();
            }, 300);
        }

        // Dokunmatik / Fare Olayları (Tinder Swipe)
        function dragStart(e) {
            isDragging = true;
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            tcard.classList.add('dragging');
        }

        function dragMove(e) {
            if(!isDragging) return;
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            currentX = clientX - startX;
            currentY = clientY - startY;
            
            const rotate = currentX * 0.05;
            // Çevrilmişse arka yüz ters durmasın diye rotateY(180deg) ekliyoruz
            const flipFix = tcard.classList.contains('flipped') ? 'rotateY(180deg)' : '';
            tcard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg) ${flipFix}`;
        }

        function dragEnd(e) {
            if(!isDragging) return;
            isDragging = false;
            tcard.classList.remove('dragging');
            
            // Eğer çok az sürüklendiyse bu bir TIKLAMA'dır, kartı çevir.
            if(Math.abs(currentX) < 15 && Math.abs(currentY) < 15) {
                tcard.style.transform = '';
                tcard.classList.toggle('flipped');
                currentX = 0; currentY = 0;
                return;
            }

            // Yeterince sürüklendiyse işlem yap
            if(currentX > 100) handleAnswer('right'); // Kolay
            else if(currentX < -100) handleAnswer('left'); // Zor
            else if(currentY < -100) handleAnswer('up'); // Normal
            else { 
                // Yeterli kaydırılmadıysa merkeze geri sek (snap back)
                tcard.style.transition = 'transform 0.3s ease';
                tcard.style.transform = tcard.classList.contains('flipped') ? 'rotateY(180deg)' : ''; 
            }
            currentX = 0; currentY = 0;
        }

        tcard.addEventListener('mousedown', dragStart); window.addEventListener('mousemove', dragMove); window.addEventListener('mouseup', dragEnd);
        tcard.addEventListener('touchstart', dragStart, {passive: true}); window.addEventListener('touchmove', dragMove, {passive: true}); window.addEventListener('touchend', dragEnd);

        renderHome();
    </script>
</body>
</html>
