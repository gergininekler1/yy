<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Günlük Satış Planı</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #f0c93a;
    --accent2: #4ef0a0;
    --danger: #f05a4e;
    --text: #e8ecf7;
    --muted: #6b7599;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; padding: 32px 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(240,201,58,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,201,58,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { max-width: 780px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── Header ── */
  header { margin-bottom: 24px; }
  .date-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #000;
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 4px; margin-bottom: 12px;
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .date-badge:hover { background: #ffd84a; }
  .date-badge input[type="date"] {
    position: absolute; opacity: 0; width: 100%; height: 100%;
    top: 0; left: 0; cursor: pointer;
  }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(22px,4vw,38px); font-weight: 800; line-height: 1.1; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 0; }

  /* ── Notes block ── */
  .notes-block {
    margin: 20px 0 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .notes-block:focus-within { border-color: rgba(240,201,58,0.45); }
  .notes-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .notes-icon { font-size: 14px; }
  .notes-title {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .notes-char {
    margin-left: auto; font-size: 10px; color: var(--muted); opacity: 0.6;
  }
  .notes-textarea {
    width: 100%; min-height: 110px;
    background: transparent; border: none; outline: none;
    padding: 14px 16px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    line-height: 1.7; resize: vertical;
  }
  .notes-textarea::placeholder { color: #3a4560; }

  /* ── Summary ── */
  .summary-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 28px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
  .summary-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .summary-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
  .summary-value.yellow { color: var(--accent); }
  .summary-value.green  { color: var(--accent2); }

  /* ── Col headers ── */
  .col-headers {
    display: grid;
    grid-template-columns: 120px 1fr 90px 90px;
    gap: 10px; padding: 0 4px 8px;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .col-headers span { text-align: center; }
  .col-headers .col-name { text-align: left; }

  /* ── Rows ── */
  .rows { display: flex; flex-direction: column; gap: 8px; }
  .service-row {
    display: grid;
    grid-template-columns: 120px 1fr 90px 90px;
    gap: 10px; align-items: center;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }

  .name-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0 14px;
    display: flex; align-items: center; gap: 10px; height: 64px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .svc-label { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

  .counter {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); height: 64px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .counter.has-val { border-color: var(--accent); background: rgba(240,201,58,0.07); }
  .counter.complete { border-color: var(--accent2); background: rgba(78,240,160,0.07); }

  .btn {
    width: 30px; height: 30px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 20px; font-weight: 700; font-family: 'Syne', sans-serif;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; flex-shrink: 0; user-select: none;
  }
  .btn-plus  { background: var(--accent); color: #000; }
  .btn-plus:hover  { background: #ffd84a; transform: scale(1.1); }
  .btn-plus:active { transform: scale(0.9); }
  .btn-minus { background: var(--surface2); color: var(--muted); }
  .btn-minus:hover { background: var(--border); color: var(--text); }
  .btn-minus:active { transform: scale(0.9); }

  .count-num {
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    min-width: 28px; text-align: center;
  }

  .target-cell {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: var(--radius); height: 64px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .target-lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .target-input {
    background: transparent; border: none; outline: none;
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
    color: var(--accent); text-align: center; width: 60px;
  }
  .target-input::placeholder { color: #3a4560; }

  .pct-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); height: 64px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    padding: 0 10px;
  }
  .prog-track { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.3s; }
  .pct-label {
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    transition: color 0.3s;
  }

  /* ── Confetti canvas ── */
  #confettiCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9999;
  }

  /* ── Footer ── */
  .footer-actions { display: flex; justify-content: center; margin-top: 28px; }
  .reset-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 9px 20px; border-radius: 8px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--danger); color: var(--danger); }
  .footer { margin-top: 14px; text-align: center; font-size: 11px; color: var(--muted); }

  @media (max-width: 560px) {
    .col-headers, .service-row { grid-template-columns: 90px 1fr 72px 72px; gap: 7px; }
    .summary-bar { grid-template-columns: repeat(3,1fr); }
    .btn { width: 26px; height: 26px; font-size: 17px; }
    .count-num { font-size: 19px; }
  }
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<div class="container">

  <!-- Header -->
  <header>
    <div class="date-badge">
      📅 <span id="dateLabel">—</span>
      <input type="date" id="datePicker" onchange="changeDate(this.value)">
    </div>
    <h1>Günlük <span>Satış</span> Planı</h1>
    <p class="subtitle">Gerçekleşen adetleri + ile gir · Hedef yaz · Notlarını kaydet</p>
  </header>

  <!-- Notes -->
  <div class="notes-block">
    <div class="notes-header">
      <span class="notes-icon">📝</span>
      <span class="notes-title">Günün Notları</span>
      <span class="notes-char" id="charCount">0 karakter</span>
    </div>
    <textarea class="notes-textarea" id="dayNotes"
      placeholder="Bugüne dair notlarını buraya yaz... müşteri görüşmeleri, hatırlatmalar, hedefler, önemli detaylar."
      oninput="saveNotes(this.value)"></textarea>
  </div>

  <!-- Summary -->
  <div class="summary-bar">
    <div class="summary-card">
      <div class="summary-label">Bugün Toplam</div>
      <div class="summary-value yellow" id="s-total">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Toplam Hedef</div>
      <div class="summary-value" id="s-target">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Gerçekleşme</div>
      <div class="summary-value green" id="s-pct">—</div>
    </div>
  </div>

  <!-- Column headers -->
  <div class="col-headers">
    <span class="col-name">Hizmet</span>
    <span>Gerçekleşen</span>
    <span>Hedef</span>
    <span>Durum</span>
  </div>

  <div class="rows" id="rows"></div>

  <div class="footer-actions">
    <button class="reset-btn" onclick="resetDay()">↺ Bugünü Sıfırla</button>
  </div>
  <p class="footer">Veriler tarihe göre tarayıcınızda saklanır</p>
</div>

<script>
/* ─────────────── Config ─────────────── */
const SERVICES = [
  { key:'kk',      label:'KK',      color:'#f0c93a' },
  { key:'oft',     label:'OFT',     color:'#4ef0a0' },
  { key:'ap',      label:'AP',      color:'#4ec8f0' },
  { key:'esnek',   label:'Esnek',   color:'#c44ef0' },
  { key:'bes',     label:'BES',     color:'#f08a4e' },
  { key:'sigorta', label:'Sigorta', color:'#f04e7a' },
];
const DAYS_TR   = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

let currentDate = todayStr();
let state = {};
// track which services already fired confetti today
let confettiFired = new Set();

/* ─────────────── Helpers ─────────────── */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n){ return String(n).padStart(2,'0'); }
function formatLabel(str){
  const [y,m,d]=str.split('-').map(Number);
  const date=new Date(y,m-1,d);
  return `${DAYS_TR[date.getDay()]}, ${d} ${MONTHS_TR[m-1]} ${y}`;
}
function lsKey(s,f){ return `day_${currentDate}_${s}_${f}`; }
function lsGet(k)  { return localStorage.getItem(k)||''; }
function lsSet(k,v){ localStorage.setItem(k,v); }

/* ─────────────── State ─────────────── */
function loadState(){
  state={};
  confettiFired=new Set();
  SERVICES.forEach(s=>{
    const val    = parseInt(lsGet(lsKey(s.key,'val')))||0;
    const target = parseInt(lsGet(lsKey(s.key,'target')))||0;
    state[s.key]={val,target};
    // if already complete on load, mark fired so we don't re-trigger
    if(target>0 && val>=target) confettiFired.add(s.key);
  });
}

function loadNotes(){
  const notes = lsGet(`notes_${currentDate}`);
  const ta = document.getElementById('dayNotes');
  ta.value = notes;
  document.getElementById('charCount').textContent = notes.length+' karakter';
}

function saveNotes(v){
  lsSet(`notes_${currentDate}`, v);
  document.getElementById('charCount').textContent = v.length+' karakter';
}

/* ─────────────── Build UI ─────────────── */
function buildRows(){
  const container = document.getElementById('rows');
  container.innerHTML='';
  SERVICES.forEach((s,si)=>{
    const {val,target}=state[s.key];
    const pct = target>0?Math.min(100,Math.round(val/target*100)):0;
    const pc  = pctColor(pct,s.color);
    const done = target>0 && val>=target;

    const row = document.createElement('div');
    row.className='service-row';
    row.style.animationDelay=(si*0.06)+'s';

    row.innerHTML=`
      <div class="name-cell">
        <div class="dot" style="background:${s.color}"></div>
        <div class="svc-label" style="color:${s.color}">${s.label}</div>
      </div>
      <div class="counter${val>0?' has-val':''}${done?' complete':''}" id="cell_${s.key}">
        <button class="btn btn-minus" onclick="change('${s.key}',-1)">−</button>
        <span class="count-num" id="num_${s.key}">${val}</span>
        <button class="btn btn-plus" onclick="change('${s.key}',1)">+</button>
      </div>
      <div class="target-cell">
        <span class="target-lbl">Hedef</span>
        <input class="target-input" type="number" min="0"
          id="tgt_${s.key}" value="${target||''}" placeholder="—"
          oninput="setTarget('${s.key}',this.value)">
      </div>
      <div class="pct-cell" id="pctcell_${s.key}">
        <div class="prog-track"><div class="prog-fill" id="prog_${s.key}" style="width:${pct}%;background:${pc}"></div></div>
        <span class="pct-label" id="pct_${s.key}" style="color:${pc}">${target>0?pct+'%':'—'}</span>
      </div>`;
    container.appendChild(row);
  });
  updateSummary();
}

function pctColor(pct, base){
  return pct>=100?'#4ef0a0':pct>=60?base:'#f05a4e';
}

/* ─────────────── Actions ─────────────── */
function change(sKey, delta){
  const prev   = state[sKey].val;
  const nv     = Math.max(0, prev+delta);
  state[sKey].val = nv;
  lsSet(lsKey(sKey,'val'), nv);

  document.getElementById(`num_${sKey}`).textContent=nv;
  const cell=document.getElementById(`cell_${sKey}`);
  cell.classList.toggle('has-val', nv>0);

  const {target}=state[sKey];
  const justCompleted = target>0 && nv>=target && prev<target && !confettiFired.has(sKey);
  if(justCompleted){
    confettiFired.add(sKey);
    const s=SERVICES.find(x=>x.key===sKey);
    launchConfetti(s.color);
  }
  // reset fire flag if they go back below
  if(target>0 && nv<target) confettiFired.delete(sKey);

  cell.classList.toggle('complete', target>0 && nv>=target);
  updateRow(sKey);
  updateSummary();
}

function setTarget(sKey, v){
  const val=Math.max(0,parseInt(v)||0);
  state[sKey].target=val;
  lsSet(lsKey(sKey,'target'),val);
  confettiFired.delete(sKey); // reset so hitting target again triggers confetti
  updateRow(sKey);
  updateSummary();
}

function updateRow(sKey){
  const s=SERVICES.find(x=>x.key===sKey);
  const {val,target}=state[sKey];
  const pct=target>0?Math.min(100,Math.round(val/target*100)):0;
  const pc=pctColor(pct,s.color);

  const pg=document.getElementById(`prog_${sKey}`);
s.forEach(p=>{
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.rot+= p.vr;
    if(p.y>canvas.height*0.7) p.opacity-=0.03;
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.opacity);
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    // mix shapes
    if(p.w>11){
      ctx.arc(0,0,p.w/2,0,Math.PI*2);
    } else {
      ctx.rect(-p.w/2,-p.h/2,p.w,p.h);
    }
    ctx.fill();
    ctx.restore();
  });
  particles=particles.filter(p=>p.opacity>0);
  if(particles.length>0){
    animFrame=requestAnimationFrame(animateConfetti);
  } else {
    animFrame=null;
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
}

/* ─────────────── Init ─────────────── */
document.getElementById('datePicker').value=currentDate;
document.getElementById('dateLabel').textContent=formatLabel(currentDate);
loadState();
loadNotes();
buildRows();
</script>
</body>
</html>
