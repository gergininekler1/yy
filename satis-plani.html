<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro ToDo</title>

<style>
:root {
    --bg: #f2f2f2;
    --card: #fff;
    --text: #111;
}

body.dark {
    --bg: #1c1c1e;
    --card: #2c2c2e;
    --text: #fff;
}

body {
    margin: 0;
    font-family: -apple-system;
    background: var(--bg);
    display: flex;
    justify-content: center;
}

.app {
    width: 360px;
    height: 100vh;
    background: var(--card);
    border-radius: 30px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 20px;
}

h1 {
    margin: 0;
    color: var(--text);
}

.info {
    font-size: 13px;
    color: gray;
}

/* TASK */
.task {
    display: flex;
    align-items: center;
    margin-top: 10px;
}

.task input {
    margin-right: 10px;
}

.task.done span {
    text-decoration: line-through;
    color: gray;
}

/* INPUT */
input[type="text"] {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

/* BUTTONS */
button {
    margin-left: 5px;
}

/* DAYS */
.days {
    margin-top: auto;
}

.day {
    padding: 15px;
    font-weight: bold;
    background: #ddd;
    cursor: pointer;
}

.day.active {
    background: #aaa;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
}

.progress {
    font-size: 13px;
}
</style>

</head>
<body>

<div class="app">

<div class="header">

<div class="topbar">
<h1 id="dayTitle">MONDAY</h1>
<button onclick="toggleDark()">🌙</button>
</div>

<div class="info" id="date"></div>
<div class="progress" id="progress"></div>
<div class="progress" id="streak"></div>

<div id="tasks"></div>

<input id="input" placeholder="Add task...">

</div>

<div class="days" id="days"></div>

</div>

<script>

const days = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY","SUNDAY"];
let currentDay = localStorage.getItem("currentDay") || "MONDAY";

const tasksEl = document.getElementById("tasks");
const input = document.getElementById("input");

document.getElementById("date").innerText = new Date().toDateString();

function getData() {
    return JSON.parse(localStorage.getItem("tasks") || "{}");
}

function saveData(data) {
    localStorage.setItem("tasks", JSON.stringify(data));
}

function renderDays() {
    const daysEl = document.getElementById("days");
    daysEl.innerHTML = "";
    days.forEach(d => {
        const el = document.createElement("div");
        el.className = "day" + (d===currentDay ? " active":"");
        el.innerText = d;
        el.onclick = () => {
            currentDay = d;
            localStorage.setItem("currentDay", d);
            render();
        };
        daysEl.appendChild(el);
    });
}

function renderTasks() {
    const data = getData();
    const list = data[currentDay] || [];
    tasksEl.innerHTML = "";

    list.forEach((t, i) => {
        const div = document.createElement("div");
        div.className = "task" + (t.done ? " done":"");

        const check = document.createElement("input");
        check.type = "checkbox";
        check.checked = t.done;

        check.onchange = () => {
            t.done = !t.done;
            saveData(data);
            render();
        };

        const span = document.createElement("span");
        span.innerText = t.text;

        span.ondblclick = () => {
            const newText = prompt("Edit task", t.text);
            if(newText) {
                t.text = newText;
                saveData(data);
                render();
            }
        };

        const del = document.createElement("button");
        del.innerText = "❌";
        del.onclick = () => {
            list.splice(i,1);
            saveData(data);
            render();
        };

        div.append(check, span, del);
        tasksEl.appendChild(div);
    });

    updateProgress(list);
}

function updateProgress(list) {
    const done = list.filter(t=>t.done).length;
    const total = list.length;
    const percent = total ? Math.round(done/total*100) : 0;
    document.getElementById("progress").innerText = "Progress: "+percent+"%";

    if(percent === 100 && total>0) {
        let streak = Number(localStorage.getItem("streak")||0);
        streak++;
        localStorage.setItem("streak", streak);
    }

    document.getElementById("streak").innerText = "🔥 Streak: "+(localStorage.getItem("streak")||0);
}

input.addEventListener("keypress", e=>{
    if(e.key==="Enter" && input.value.trim()) {
        const data = getData();
        if(!data[currentDay]) data[currentDay]=[];

        data[currentDay].push({text: input.value, done:false});
        saveData(data);
        input.value="";
        render();
    }
});

function toggleDark() {
    document.body.classList.toggle("dark");
}

function render() {
    document.getElementById("dayTitle").innerText = currentDay;
    renderDays();
    renderTasks();
}

render();

</script>

</body>
</html>
