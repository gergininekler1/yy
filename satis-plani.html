<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexusCards - Light Boho</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #F7F5F0; /* Kırık beyaz / Soft krem */
            --card-bg: #FFFFFF;
            --border-color: rgba(212, 163, 115, 0.3); /* Soft Bohem Kahve */
            --text-main: #333333;
            --text-muted: #888888;
            --accent-main: #D4A373; /* Bohem Kum/Toprak */
            --danger: #E07A5F;
            --warning: #F2CC8F;
            --success: #81B29A;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Üst Menü */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); z-index: 10; }
        .logo { font-size: 1.4rem; font-weight: 700; color: var(--text-main); }
        .logo span { color: var(--accent-main); }
        .header-right { text-align: right; }
        .timer-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; display: block; }
        .timer { font-size: 1.2rem; font-weight: 700; color: var(--accent-main); }

        main { flex: 1; padding: 20px; overflow-y: auto; overflow-x: hidden; width: 100%; max-width: 800px; margin: 0 auto; }

        /* Paneller */
        .panel { display: none; animation: fadeIn 0.3s ease forwards; height: 100%; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Butonlar */
        .btn { padding: 12px 20px; border: none; border-radius: 12px; background: var(--accent-main); color: #FFF; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(212, 163, 115, 0.3); }
        .btn:active { transform: scale(0.96); }
        .btn-outline { background: transparent; border: 1px solid var(--accent-main); color: var(--accent-main); box-shadow: none; }

        /* Netflix Tarzı Klasörler */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .deck-slider { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .deck-slider::-webkit-scrollbar { height: 0px; } /* Mobilde kaydırma çubuğunu gizler */

        .deck-card { flex: 0 0 auto; width: 140px; height: 160px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; scroll-snap-align: start; box-shadow: var(--shadow-soft); position: relative; }
        .deck-card h3 { font-size: 1.1rem; color: var(--text-main); margin-bottom: 8px; }
        .deck-card .count { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        
        .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(224, 122, 95, 0.1); color: var(--danger); border: none; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }

        /* Editör Alanı */
        .editor-container { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-soft); }
        textarea { width: 100%; padding: 15px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-main); outline: none; margin-bottom: 15px; font-size: 1rem; }
        textarea:focus { border-color: var(--accent-main); }
        .q-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-color); border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent-main); }
        .q-item button { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 8px; margin-left: 10px; }

        /* Çalışma Ekranı & Kart Mimarisi */
        .study-container { display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; max-width: 350px; margin-bottom: 15px; font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }
        
        .tinder-wrapper { position: relative; width: 100%; max-width: 350px; height: 400px; perspective: 1000px; touch-action: none; /* Tarayıcı kaydırmasını kilitler */ }
        
        .tinder-card { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: grab; z-index: 2; }
        .tinder-card.dragging { transition: none; cursor: grabbing; }
        .tinder-card.flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; box-shadow: var(--shadow-soft); }
        .card-face h2 { font-size: 1.3rem; font-weight: 600; color: var(--text-main); pointer-events: none; }
        .card-back { transform: rotateY(180deg); background: #FCFAF6; border-color: var(--accent-main); }
        .card-back h2 { color: var(--accent-main); }

        /* Fallback Butonları (Kaydırma sevmeyenler veya takılanlar için) */
        .action-buttons { display: flex; justify-content: space-between; width: 100%; max-width: 350px; margin-top: 25px; gap: 10px; }
        .action-buttons button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-zor { background: rgba(224, 122, 95, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-normal { background: rgba(242, 204, 143, 0.2); color: #D49A3E; border: 1px solid var(--warning); }
        .btn-kolay { background: rgba(129, 178, 154, 0.1); color: var(--success); border: 1px solid var(--success); }
        .action-buttons button:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS<span>.</span></div>
        <div class="header-right">
            <span class="timer-label">ODAK</span>
            <span class="timer" id="timer">00:00</span>
        </div>
    </header>

    <main>
        <div id="panel-home" class="panel active">
            <div class="section-header">
                <h2 style="font-size: 1.4rem;">Kitaplık</h2>
                <button class="btn btn-outline" style="padding: 8px 15px;" onclick="addDeck()">+ Yeni</button>
            </div>
            <div class="deck-slider" id="deck-list"></div>
        </div>

        <div id="panel-editor" class="panel">
            <div class="section-header">
                <button class="btn btn-outline" style="padding: 8px 15px;" onclick="showPanel('panel-home')">← Geri</button>
                <button class="btn" onclick="startStudy()">Çalışmaya Başla ▶</button>
            </div>
            <h2 id="editor-title" style="color: var(--accent-main); margin-bottom: 15px;"></h2>
            
            <div class="editor-container">
                <textarea id="bulk-input" rows="3" placeholder="Soru | Cevap şeklinde yapıştır..."></textarea>
                <button class="btn" style="width: 100%" onclick="bulkImport()">Sisteme Ekle</button>
                
                <div style="margin-top: 20px; max-height: 250px; overflow-y: auto;" id="question-list"></div>
            </div>
        </div>

        <div id="panel-study" class="panel">
            <div class="study-container">
                <div class="stats-bar">
                    <span onclick="showPanel('panel-home')" style="cursor: pointer; font-size: 1.2rem;">🔙</span>
                    <span>Kalan: <b id="stat-kalan" style="color: var(--text-main)">0</b></span>
                    <span>Öğrenilen: <b id="stat-kolay" style="color: var(--success)">0</b></span>
                </div>

                <div class="tinder-wrapper">
                    <div class="tinder-card" id="tcard">
                        <div class="card-face">
                            <h2 id="card-front">Soru Yükleniyor...</h2>
                        </div>
                        <div class="card-face card-back">
                            <h2 id="card-back">Cevap Yükleniyor...</h2>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-zor" onclick="btnAnswer('left')">ZOR</button>
                    <button class="btn-normal" onclick="btnAnswer('up')">NORMAL</button>
                    <button class="btn-kolay" onclick="btnAnswer('right')">KOLAY</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('nexus_light')) || {};
        let currentDeck = null, studyQueue = [], sessionStats = { kolay: 0, total: 0 };
        
        let seconds = 0;
        setInterval(() => {
            seconds++;
            document.getElementById('timer').innerText = `${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`;
        }, 1000);

        function saveDB() { localStorage.setItem('nexus_light', JSON.stringify(db)); renderHome(); }
        function showPanel(id) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='panel-home') renderHome(); }

        function renderHome() {
            const list = document.getElementById('deck-list'); list.innerHTML = '';
            for (let deck in db) {
                list.innerHTML += `
                    <div class="deck-card" onclick="openEditor('${deck}')">
                        <button class="delete-btn" onclick="deleteDeck('${deck}', event)">✕</button>
                        <h3>${deck}</h3>
                        <div class="count">${db[deck].length} Not</div>
                    </div>`;
            }
        }

        function addDeck() { const n = prompt("Klasör Adı:"); if(n && !db[n]) { db[n] = []; saveDB(); } }
        function deleteDeck(name, event) {
            event.stopPropagation();
            if(confirm(`"${name}" silinecek. Emin misin?`)) { delete db[name]; saveDB(); }
        }

        function openEditor(name) { currentDeck = name; document.getElementById('editor-title').innerText = name; renderQuestions(); showPanel('panel-editor'); }

        function bulkImport() {
            const lines = document.getElementById('bulk-input').value.split('\n');
            let added = 0;
            lines.forEach(l => {
                if(l.includes('|')) {
                    const [q, a] = l.split('|');
                    db[currentDeck].unshift({ q: q.trim(), a: a.trim() });
                    added++;
                }
            });
            if(added > 0) { document.getElementById('bulk-input').value = ''; saveDB(); renderQuestions(); }
        }

        function renderQuestions() {
            const list = document.getElementById('question-list'); list.innerHTML = '';
            db[currentDeck].forEach((c, i) => {
                list.innerHTML += `<div class="q-item"><span>${c.q}</span><button onclick="delQ(${i})">Sil</button></div>`;
            });
        }
        function delQ(i) { db[currentDeck].splice(i, 1); saveDB(); renderQuestions(); }

        // --- KART MANTIĞI ---
        const tcard = document.getElementById('tcard');
        let startX = 0, startY = 0, currentX = 0, currentY = 0, isDragging = false;

        function startStudy() {
            if(!db[currentDeck].length) return alert("İçerik yok!");
            studyQueue = [...db[currentDeck]].sort(() => Math.random() - 0.5);
            sessionStats = { kolay: 0, total: studyQueue.length };
            showPanel('panel-study'); nextCard();
        }

        function nextCard() {
            if(!studyQueue.length) { alert("Tebrikler, bitti!"); return showPanel('panel-home'); }
            document.getElementById('card-front').innerText = studyQueue[0].q;
            document.getElementById('card-back').innerText = studyQueue[0].a;
            document.getElementById('stat-kalan').innerText = studyQueue.length;
            document.getElementById('stat-kolay').innerText = sessionStats.kolay;
            
            tcard.classList.remove('flipped');
            tcard.style.transform = ''; 
        }

        function handleAnswer(dir) {
            const card = studyQueue.shift();
            if(dir === 'left') { studyQueue.splice(Math.min(2, studyQueue.length), 0, card); } 
            else if(dir === 'up') { studyQueue.push(card); } 
            else if(dir === 'right') { sessionStats.kolay++; } 

            const flyX = dir === 'left' ? -500 : (dir === 'right' ? 500 : 0);
            const flyY = dir === 'up' ? -500 : 0;
            tcard.style.transition = 'transform 0.3s ease-out';
            tcard.style.transform = `translate(${flyX}px, ${flyY}px) rotate(${flyX * 0.05}deg)`;
            
            setTimeout(() => {
                tcard.style.transition = 'none'; 
                nextCard();
            }, 300);
        }

        // Butonlarla kontrol
        function btnAnswer(dir) {
            if(studyQueue.length === 0) return;
            handleAnswer(dir);
        }

        // Swipe (Dokunmatik) Kontrolü
        function dragStart(e) {
            if (e.target.tagName === 'BUTTON') return; // Butonlara basılıyorsa kaydırmayı engelle
            isDragging = true;
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            tcard.classList.add('dragging');
        }

        function dragMove(e) {
            if(!isDragging) return;
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            currentX = clientX - startX;
            currentY = clientY - startY;
            
            const rotate = currentX * 0.03;
            const flipFix = tcard.classList.contains('flipped') ? 'rotateY(180deg)' : '';
            tcard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg) ${flipFix}`;
        }

        function dragEnd(e) {
            if(!isDragging) return;
            isDragging = false;
            tcard.classList.remove('dragging');
            
            if(Math.abs(currentX) < 10 && Math.abs(currentY) < 10) {
                tcard.style.transform = '';
                tcard.classList.toggle('flipped');
                currentX = 0; currentY = 0;
                return;
            }

            if(currentX > 80) handleAnswer('right'); 
            else if(currentX < -80) handleAnswer('left'); 
            else if(currentY < -80) handleAnswer('up'); 
            else { 
                tcard.style.transition = 'transform 0.2s ease';
                tcard.style.transform = tcard.classList.contains('flipped') ? 'rotateY(180deg)' : ''; 
            }
            currentX = 0; currentY = 0;
        }

        tcard.addEventListener('mousedown', dragStart); window.addEventListener('mousemove', dragMove); window.addEventListener('mouseup', dragEnd);
        tcard.addEventListener('touchstart', dragStart, {passive: false}); window.addEventListener('touchmove', dragMove, {passive: false}); window.addEventListener('touchend', dragEnd);

        renderHome();
    </script>
</body>
</html>
