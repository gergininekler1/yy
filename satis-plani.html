['paylar','Halka açık olmayan ortaklığın halka açık ortaklık statüsü kazanması hangisidir?',['Halka açılma','Halka arz','Ek satış'],0,'Halka açılma statü değişimidir.','Halka arz satış işlemidir.'],['paylar','Şirkete yeni nakit girişi olmayan sermaye artırımı hangisidir?',['Bedelsiz sermaye artırımı','Bedelli sermaye artırımı','Şarta bağlı sermaye artırımı'],0,'Bedelsiz artırım iç kaynaklardan yapılır.','Bedelli artırımda yeni kaynak girişi vardır.'],['borclanma','İhraççının kendi paylarına dönüşen tahvil hangisidir?',['PDT','DET','Finansman bonosu'],0,'PDT ihraççının kendi paylarına dönüşür.','DET başka ortaklık payıyla değişir.'],['borclanma','Başka ortaklık paylarıyla değiştirilebilen tahvil hangisidir?',['DET','PDT','Tahvil'],0,'DET başka ortaklık payıyla değişir.','PDT kendi payına dönüşür.'],['fonlar','Yatırım fonunun tüzel kişiliği var mıdır?',['Yoktur','Vardır'],0,'Ana kural fonun tüzel kişiliğinin bulunmamasıdır.','Şirket gibi düşünme.'],['fonlar','Katılma payı sahibinin fon yönetimine katılma hakkı var mı?',['Yoktur','Vardır'],0,'Katılma payı idari hak vermez.','Şirket payıyla karıştırma.'],['turev','Borsada işlem gören standart vadeli sözleşme hangisidir?',['Futures','Forward','Swap'],0,'Futures organize piyasada standarttır.','Forward tezgahüstüdür.'],['turev','Sadece vade sonunda kullanılabilen opsiyon hangisidir?',['Avrupa tipi','Amerikan tipi'],0,'Avrupa tipi opsiyon sadece vade sonunda kullanılır.','Coğrafi yer değildir.'],['kamu','364 gün ve daha uzun vadeli DİBS hangisidir?',['Devlet tahvili','Hazine bonosu','Finansman bonosu'],0,'Devlet tahvili 364 gün ve üzeridir.','Hazine bonosu 364 günden kısadır.'],['kamu','Kazananların kendi teklif fiyatından aldığı ihale yöntemi hangisidir?',['Çoklu fiyat ihalesi','Tek fiyat ihalesi','Doğrudan satış'],0,'Çoklu fiyat yönteminde herkes kendi fiyatından alır.','Tek fiyatta Hazinece belirlenen tek fiyat uygulanır.']

function makeQuestions(){let qs=[];FACTS.forEach((f,i)=>{let pool=FACTS.filter(x=>x.section===f.section&&x.id!==f.id);let wrong=pool.slice(0,3).map(x=>x.answer);let opts=shuffle([f.answer,...wrong],f.id);qs.push({id:'q'+i,section:f.section,topic:f.topic,question:'“'+f.concept+'” için aşağıdakilerden hangisi doğrudur?',options:opts,answer:opts.indexOf(f.answer),explanation:f.answer,trap:f.note,hint:hintFor(f),tags:f.tags});let w2=pool.slice(3,6).map(x=>x.concept);let opts2=shuffle([f.concept,...w2],f.id+'x');qs.push({id:'qr'+i,section:f.section,topic:f.topic,question:'“'+f.answer+'” açıklaması hangi kavrama aittir?',options:opts2,answer:opts2.indexOf(f.concept),explanation:'Doğru kavram: '+f.concept+'.',trap:f.note,hint:hintFor(f),tags:f.tags})});return qs}
function hintFor(f){let t=(f.concept+' '+f.note).toLowerCase();if(t.includes('halka'))return'Statü değişimi mi, satış işlemi mi?';if(t.includes('pdt')||t.includes('det')||t.includes('dönüştür')||t.includes('değiştir'))return'Kendi payı mı, başka ortaklık payı mı?';if(t.includes('forward')||t.includes('futures'))return'Borsada standart mı, tezgahüstü mü?';if(t.includes('opsiyon'))return'Alıcı hak sahibi, satıcı yükümlüdür.';if(t.includes('hazine')||t.includes('devlet tahvili')||t.includes('364'))return'364 gün eşiğini düşün.';if(t.includes('fon'))return'Fonun tüzel kişiliği ve idari hak meselesini düşün.';return'Tanım, süre/oran veya tuzak ayrımı hangisi isteniyor?'}
function shuffle(a,seed){let s=0;for(let ch of seed)s+=ch.charCodeAt(0);let arr=[...a];for(let i=arr.length-1;i>0;i--){s=(s*9301+49297)%233280;let j=s%(i+1);[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
const QUESTIONS=makeQuestions();const ITEMS=[...QUESTIONS,...COMP];const KEY='spl1003_notion_clean_v1';let state=load();let ui={feedback:null,hint:null,query:'',mock:null};function def(){let d=new Date();d.setDate(d.getDate()+30);return{section:'all',mode:'dashboard',pos:{},records:{},favorites:{},hard:{},wrong:{},hints:{},last:null,examDate:d.toISOString().slice(0,10),activeNode:null,mockResults:[]}}function load(){try{return Object.assign(def(),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch(e){return def()}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function pct(a,b){return b?Math.round(a*100/b):0}function sectionName(k){return (SECTIONS.find(s=>s.key===k)||{short:'Tümü'}).short}function daysLeft(){let t=new Date();t.setHours(0,0,0,0);let d=new Date(state.examDate+'T00:00:00');return Math.max(0,Math.ceil((d-t)/86400000))}function bySec(list){return state.section==='all'?list:list.filter(x=>x.section===state.section)}function posKey(m){return state.section+'_'+m}function getPos(m,len){let k=posKey(m);if(state.pos[k]==null)state.pos[k]=0;if(len&&state.pos[k]>=len)state.pos[k]=0;return state.pos[k]||0}function setPos(m,v){state.pos[posKey(m)]=v;save()}function stats(sec='all'){let ids=new Set(bySection(ITEMS,sec).map(x=>x.id));let rec=Object.entries(state.records).filter(([id])=>ids.has(id));let cor=rec.filter(([,r])=>r.lastCorrect).length;return{answered:rec.length,correct:cor,accuracy:pct(cor,rec.length),total:ids.size,fav:Object.keys(state.favorites).filter(id=>ids.has(id)).length}}function bySection(list,sec){return sec==='all'?list:list.filter(x=>x.section===sec)}function shell(html){document.getElementById('app').innerHTML='<div class="top"><div class="brand"><div class="logo">📝</div><div><h1>SPL 1003 Çalışma Alanı</h1><p>Notion-esintili • ipuçlu • açıklamalı sınav hazırlık aracı</p></div></div><div class="row"><span class="pill">⏳ '+daysLeft()+' gün kaldı</span><button class="btn small" onclick="renderSettings()">Ayarlar</button></div></div>'+html}
function renderDashboard(){state.mode='dashboard';save();let st=stats();shell('<div class="grid"><section class="card hero"><div style="font-size:64px">📝</div><h2 class="page-title">SPL 1003 Çalışma Alanı</h2><p class="muted">Flashkart yok. Konu haritası, karıştırılan kavramlar, açıklamalı test, ipucu ve favoriler var.</p><div class="row"><button class="btn primary" onclick="continueLast()">Çalışmaya Devam Et</button><button class="btn" onclick="switchMode(\'mind\')">Konu Haritası</button><button class="btn" onclick="switchMode(\'mock\')">Karışık Deneme</button></div><div class="statline"><div class="mini"><b>'+ITEMS.length+'</b><span class="muted">açıklamalı soru</span></div><div class="mini"><b>'+st.accuracy+'%</b><span class="muted">doğru oranı</span></div><div class="mini"><b>'+st.fav+'</b><span class="muted">favori</span></div></div></section><aside class="card side"><b>Bugünkü öneri</b><p class="muted">Zayıf bölümden 15 test, 10 kavram ayrımı ve yanlışlardan tekrar.</p><div class="note"><b>Son kaldığın yer</b><br>'+(state.last?sectionName(state.last.section)+' / '+state.last.mode:'Henüz yok')+'</div></aside>'+SECTIONS.map(sectionCard).join('')+'<div class="card section" onclick="switchMode(\'favorites\')"><span style="font-size:30px">⭐</span><h3>Favorilerim</h3><p class="muted">Yıldızladığın sorular</p></div><div class="card section" onclick="switchMode(\'traps\')"><span style="font-size:30px">🪤</span><h3>Sinsi Tuzaklar</h3><p class="muted">Çeldirici kısa notlar</p></div><div class="card section" onclick="switchMode(\'hints\')"><span style="font-size:30px">💡</span><h3>İpucu Kullandıklarım</h3><p class="muted">İpucu aldığın sorular</p></div></div>')}
function sectionCard(s){let st=stats(s.key);return'<div class="card section" onclick="selectSection(\''+s.key+'\')"><div class="space"><div><span style="font-size:30px">'+s.icon+'</span><h3>'+s.name+'</h3><p class="muted">'+bySection(QUESTIONS,s.key).length+' test • '+bySection(COMP,s.key).length+' kavram • '+nodes(s.key).length+' node</p></div><span class="badge">'+st.accuracy+'%</span></div><div class="progress"><div class="bar" style="width:'+pct(st.answered,st.total)+'%"></div></div><div class="row" style="margin-top:14px"><button class="btn small primary" onclick="event.stopPropagation();selectSection(\''+s.key+'\',\'mind\')">Harita</button><button class="btn small" onclick="event.stopPropagation();selectSection(\''+s.key+'\',\'compare\')">Kavram</button><button class="btn small" onclick="event.stopPropagation();selectSection(\''+s.key+'\',\'test\')">Test</button></div></div>'}
function selectSection(s,m){state.section=s;save();m?switchMode(m):renderSectionHome()}function renderSectionHome(){let s=SECTIONS.find(x=>x.key===state.section);shell('<div class="wrap"><button class="btn small" onclick="state.section=\'all\';save();renderDashboard()">← Ana panel</button><div class="card" style="margin-top:14px"><div style="font-size:38px">'+s.icon+'</div><h2 class="page-title" style="font-size:38px">'+s.name+'</h2><p class="muted">Bu bölümde konu haritası, kavram ayrımı ve sınav tarzı test var.</p><div class="tabs"><button class="tab" onclick="switchMode(\'mind\')">Konu Haritası</button><button class="tab" onclick="switchMode(\'compare\')">Karıştırılan Kavramlar</button><button class="tab" onclick="switchMode(\'test\')">Sınav Tarzı Test</button><button class="tab" onclick="switchMode(\'favorites\')">Favorilerim</button><button class="tab" onclick="switchMode(\'traps\')">Sinsi Tuzaklar</button></div></div></div>')}
function header(title,sub){let tabs='<button class="tab '+(state.section==='all'?'active':'')+'" onclick="state.section=\'all\';save();switchMode(state.mode)">Tümü</button>'+SECTIONS.map(s=>'<button class="tab '+(state.section===s.key?'active':'')+'" onclick="state.section=\''+s.key+'\';save();switchMode(state.mode)">'+s.short+'</button>').join('');return'<div class="wrap"><button class="btn small" onclick="renderDashboard()">← Ana panel</button><div class="tabs">'+tabs+'</div><div class="card" style="margin-bottom:14px"><div class="space"><div><h2 style="font-size:30px;margin:0 0 6px">'+title+'</h2><p class="muted" style="margin:0">'+sub+'</p></div><span class="badge">'+sectionName(state.section)+'</span></div></div>'}
function switchMode(m){state.mode=m;ui.feedback=null;ui.hint=null;save();if(m==='mind')renderMind();if(m==='compare')renderCompare();if(m==='test')renderTest();if(m==='favorites')renderList('Favorilerim','Yıldızladığın sorular.',bySec(ITEMS).filter(x=>state.favorites[x.id]),'favorites');if(m==='hints')renderList('İpucu Kullandıklarım','İpucu aldığın sorular.',bySec(ITEMS).filter(x=>state.hints[x.id]),'hints');if(m==='wrongs')renderWrongs();if(m==='traps')renderTraps();if(m==='mock')renderMock()}function continueLast(){state.last? (state.section=state.last.section,switchMode(state.last.mode)):switchMode('mind')}
function nodes(sec){let map={};bySection(FACTS,sec).forEach(f=>{map[f.topic]=map[f.topic]||[];map[f.topic].push(f)});return Object.entries(map).map(([title,facts],i)=>({id:'n'+sec+i,title,facts}))}function renderMind(){let ns=nodes(state.section);if(!state.activeNode||!ns.find(n=>n.id===state.activeNode))state.activeNode=ns[0]?.id;let active=ns.find(n=>n.id===state.activeNode)||ns[0];shell(header('Konu Haritası','Kavram iskeletini gör, kritik notları oku, sonra aynı başlıktan soru çöz.')+'<div class="card mind"><div class="tree">'+ns.map(n=>'<button class="node '+(active&&active.id===n.id?'active':'')+'" onclick="state.activeNode=\''+n.id+'\';save();renderMind()"><b>'+esc(n.title)+'</b><br><span class="muted">'+n.facts.length+' kritik bilgi</span></button>').join('')+'</div><div>'+(active?nodePanel(active):'')+'</div></div></div>')}function nodePanel(n){let traps=n.facts.filter(f=>f.tags.includes('tuzak'));return'<h2>'+esc(n.title)+'</h2><p class="muted">Bu başlık sınavda çıkabilecek temel kavramları ve tuzakları toplar.</p><div class="note"><b>Kritik bilgiler</b><ul>'+n.facts.map(f=>'<li><b>'+esc(f.concept)+':</b> '+esc(f.answer)+'</li>').join('')+'</ul></div>'+(traps.length?'<div class="note trap"><b>Sınav tuzakları</b><ul>'+traps.map(f=>'<li>'+esc(f.note)+'</li>').join('')+'</ul></div>':'')+'<div class="row" style="margin-top:14px"><button class="btn primary" onclick="topicTest(\''+n.facts[0].section+'\',\''+esc(n.title)+'\')">Bu konudan soru çöz</button></div>'}function topicTest(sec,topic){state.section=sec;renderTest(QUESTIONS.filter(q=>q.section===sec&&q.topic===topic),'Konu Testi: '+topic)}
function renderQuestion(mode,list,i,item,title,sub){let answered=ui.feedback&&ui.feedback.id===item.id,sel=answered?ui.feedback.sel:null,correct=answered&&sel===item.answer,fav=!!state.favorites[item.id],hinted=ui.hint===item.id;shell(header(title,sub)+'<div class="card study"><div><div class="space"><div class="row"><span class="badge">'+(i+1)+'/'+list.length+'</span><span class="badge">'+sectionName(item.section)+'</span><span class="badge">'+esc(item.topic||'')+'</span></div><button class="btn small" onclick="toggleFav(\''+item.id+'\');rerender(\''+mode+'\')">'+(fav?'★ Favorilerde':'☆ Favori')+'</button></div><div class="progress" style="margin-top:12px"><div class="bar" style="width:'+pct(i+1,list.length)+'%"></div></div><div class="question">'+esc(item.question||item.prompt)+'</div><div class="row" style="margin-top:14px"><button class="btn" onclick="showHint(\''+item.id+'\',\''+mode+'\')">💡 İpucu Al</button><button class="btn warn" onclick="toggleHard(\''+item.id+'\');rerender(\''+mode+'\')">'+(state.hard[item.id]?'Zordan çıkar':'Zor İşaretle')+'</button></div>'+(hinted?'<div class="hintbox"><b>İpucu:</b> '+esc(item.hint)+'</div>':'')+'<div class="options">'+item.options.map((op,idx)=>'<button class="option '+(answered?(idx===item.answer?'correct':idx===sel?'wrong':''):'')+'" '+(answered?'disabled':'')+' onclick="answer(\''+mode+'\',\''+item.id+'\','+idx+')"><b>'+String.fromCharCode(65+idx)+')</b> '+esc(op)+'</button>').join('')+'</div>'+(answered?'<div class="feedback"><b>'+(correct?'✅ Doğru.':'❌ Yanlış. Doğru cevap: '+String.fromCharCode(65+item.answer)+'.')+'</b><p>'+esc(item.explanation)+'</p>'+(item.trap?'<div class="note trap"><b>Kritik not:</b> '+esc(item.trap)+'</div>':'')+'</div>':'')+'</div><div class="row"><button class="btn" onclick="move(\''+mode+'\','+i+','+list.length+',-1)">Önceki</button>'+(answered?'<button class="btn primary" onclick="move(\''+mode+'\','+i+','+list.length+',1)">Sonraki</button><button class="btn" onclick="similar(\''+item.id+'\')">Benzer Soru Getir</button>':'')+'</div></div></div>')}
function renderCompare(){let list=bySec(COMP),i=getPos('compare',list.length);renderQuestion('compare',list,i,list[i],'Karıştırılan Kavramlar',list.length+' kritik ayrım.')}function renderTest(custom,title){let list=custom||bySec(QUESTIONS),i=getPos(custom?'custom':'test',list.length);renderQuestion(custom?'custom':'test',list,i,list[i],title||'Sınav Tarzı Test',list.length+' açıklamalı soru.')}function answer(mode,id,sel){let item=ITEMS.find(x=>x.id===id),ok=sel===item.answer;ui.feedback={id,sel};let r=state.records[id]||{times:0,correctCount:0,wrongCount:0,section:item.section};r.times++;r.lastCorrect=ok;r.lastAnswer=sel;if(ok)r.correctCount++;else{r.wrongCount++;state.wrong[id]=true;state.hard[id]=true}state.records[id]=r;state.last={section:state.section,mode:mode==='custom'?'test':mode};save();rerender(mode)}function rerender(mode){if(mode==='compare')renderCompare();else if(mode==='favorites')renderList('Favorilerim','Yıldızladığın sorular.',bySec(ITEMS).filter(x=>state.favorites[x.id]),'favorites');else if(mode==='hints')renderList('İpucu Kullandıklarım','İpucu aldığın sorular.',bySec(ITEMS).filter(x=>state.hints[x.id]),'hints');else if(mode==='wrongs')renderWrongs();else renderTest()}function move(mode,i,len,d){setPos(mode,(i+d+len)%len);ui.feedback=null;rerender(mode)}function toggleFav(id){state.favorites[id]=!state.favorites[id];if(!state.favorites[id])delete state.favorites[id];save()}function toggleHard(id){state.hard[id]=!state.hard[id];if(!state.hard[id])delete state.hard[id];save()}function showHint(id,mode){state.hints[id]=(state.hints[id]||0)+1;ui.hint=id;save();rerender(mode)}function similar(id){let cur=ITEMS.find(x=>x.id===id),list=QUESTIONS.filter(q=>q.section===cur.section&&q.topic===cur.topic&&q.id!==id);if(!list.length)return;renderQuestion('custom',list,0,list[0],'Benzer Soru',cur.topic+' başlığından.')}function renderList(title,sub,list,mode){if(!list.length)return shell(header(title,sub)+'<div class="card"><p class="muted">Henüz burada gösterilecek soru yok.</p></div></div>');let i=getPos(mode,list.length);renderQuestion(mode,list,i,list[i],title,sub)}function renderWrongs(){let ids=new Set([...Object.keys(state.wrong),...Object.keys(state.hard)]);renderList('Yanlışlarım ve Zorlandıklarım','Yanlış yaptığın veya zor işaretlediğin sorular.',bySec(ITEMS).filter(x=>ids.has(x.id)),'wrongs')}function renderTraps(){let list=bySec(FACTS).filter(f=>f.tags.includes('tuzak'));shell(header('Sinsi Tuzaklar','Sınavda çeldirici olabilecek kısa notlar.')+'<div class="card"><div class="list">'+list.map(f=>'<div class="list-item"><div class="space"><b>'+esc(f.concept)+'</b><span class="badge">'+sectionName(f.section)+'</span></div><p>'+esc(f.answer)+'</p><div class="note trap">'+esc(f.note)+'</div></div>').join('')+'</div></div></div>')}function renderMock(){let list=shuffle(bySec(ITEMS),Date.now().toString()).slice(0,25);renderQuestion('custom',list,0,list[0],'Karışık Deneme','25 soruluk karışık prova.')}function renderSettings(){shell('<div class="wrap"><button class="btn small" onclick="renderDashboard()">← Ana panel</button><div class="card" style="margin-top:14px"><h2>Ayarlar</h2><p class="muted">İlerleme, favoriler, ipuçları ve yanlışlar bu tarayıcıda saklanır.</p><label>Sınav tarihi</label><input class="search" type="date" value="'+state.examDate+'" onchange="state.examDate=this.value;save();renderSettings()"><div class="row" style="margin-top:14px"><button class="btn danger" onclick="if(confirm(\'Tüm ilerleme silinsin mi?\')){localStorage.removeItem(KEY);location.reload()}">İlerlemeyi Sıfırla</button></div></div></div>')}renderDashboard();
</script>
