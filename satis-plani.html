<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #f2f2f2, #e6e6e6);
}

/* PHONE LOOK */
.app {
    width: 360px;
    height: 720px;
    background: #fff;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
}

/* TOP */
.top {
    padding: 25px;
}

.day-title {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 1px;
}

.date {
    color: #888;
    margin-top: 5px;
    font-size: 14px;
}

/* TASKS */
.tasks {
    margin-top: 15px;
}

.task {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    transition: 0.2s;
}

.task input {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid #bbb;
    border-radius: 4px;
    margin-right: 10px;
    cursor: pointer;
    position: relative;
}

.task input:checked {
    background: #ff6a00;
    border-color: #ff6a00;
}

.task input:checked::after {
    content: "✓";
    color: white;
    font-size: 12px;
    position: absolute;
    top: -2px;
    left: 3px;
}

.task span {
    font-size: 15px;
}

.task.done span {
    text-decoration: line-through;
    color: #aaa;
}

/* INPUT */
.input {
    margin-top: 10px;
    width: 100%;
    border: none;
    padding: 12px 0;
    border-top: 1px solid #eee;
    outline: none;
    font-size: 14px;
    color: #666;
}

/* DAYS LIST */
.days {
    flex: 1;
    overflow-y: auto;
}

.day {
    padding: 22px;
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(180deg, #f0f0f0, #e5e5e5);
    border-top: 1px solid #ddd;
    transition: 0.2s;
}

.day:hover {
    background: #ddd;
}

/* SCROLL EFFECT */
.days::-webkit-scrollbar {
    display: none;
}
</style>

</head>
<body>

<div class="app">

    <div class="top">
        <div class="day-title">MONDAY</div>
        <div class="date" id="date"></div>

        <div class="tasks" id="tasks">
            <div class="task">
                <input type="checkbox">
                <span>Read 10 pages</span>
            </div>
            <div class="task">
                <input type="checkbox">
                <span>Walk the dog</span>
            </div>
            <div class="task">
                <input type="checkbox">
                <span>Get groceries</span>
            </div>
        </div>

        <input class="input" id="input" placeholder="Add a new task...">
    </div>

    <div class="days">
        <div class="day">TUESDAY</div>
        <div class="day">WEDNESDAY</div>
        <div class="day">THURSDAY</div>
        <div class="day">FRIDAY</div>
    </div>

</div>

<script>

// DATE
const dateEl = document.getElementById("date");
dateEl.innerText = new Date().toLocaleString();

// ADD TASK
const input = document.getElementById("input");
const tasks = document.getElementById("tasks");

input.addEventListener("keypress", e => {
    if (e.key === "Enter" && input.value.trim() !== "") {
        createTask(input.value);
        input.value = "";
    }
});

function createTask(text) {
    const task = document.createElement("div");
    task.className = "task";

    const check = document.createElement("input");
    check.type = "checkbox";

    const span = document.createElement("span");
    span.innerText = text;

    check.addEventListener("change", () => {
        task.classList.toggle("done");
    });

    task.appendChild(check);
    task.appendChild(span);
    tasks.appendChild(task);
}

// CLICK EFFECT (iOS hissi)
document.querySelectorAll(".day").forEach(day => {
    day.addEventListener("click", () => {
        document.querySelector(".day-title").innerText = day.innerText;
    });
});

</script>

</body>
</html>
