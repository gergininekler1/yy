<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPL 1003 Çalışma Alanı</title>
  <style>
    :root {
      --bg: #f7f6f3;
      --paper: #ffffff;
      --soft: #fbfaf8;
      --text: #2f3437;
      --muted: #73777f;
      --line: #e7e2da;
      --blue: #2f6feb;
      --blue-soft: #edf3ff;
      --green: #0f8f61;
      --red: #c93434;
      --amber: #9a6700;
      --shadow: 0 16px 42px rgba(15, 23, 42, 0.075);
      --radius: 18px;
    }* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

.app {
  max-width: 1220px;
  margin: 0 auto;
  padding: 26px;
}

.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 18px;
  margin-bottom: 22px;
}

.brand { display: flex; gap: 14px; align-items: center; }

.logo {
  width: 54px;
  height: 54px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: #fff;
  display: grid;
  place-items: center;
  font-size: 28px;
}

.brand h1 {
  margin: 0;
  font-size: 27px;
  letter-spacing: -0.035em;
}

.brand p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 14px;
}

.pill {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 14px;
  color: var(--muted);
  white-space: nowrap;
}

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 22px;
}

.hero { grid-column: span 8; min-height: 280px; }
.side { grid-column: span 4; background: var(--soft); }
.section { grid-column: span 4; cursor: pointer; transition: 0.15s; }
.section:hover { transform: translateY(-2px); }

.page-title {
  font-size: 48px;
  letter-spacing: -0.06em;
  margin: 10px 0;
  line-height: 1.02;
}

.muted { color: var(--muted); }

.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.space {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
}

.btn {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 12px;
  padding: 11px 14px;
  cursor: pointer;
  color: var(--text);
  font: inherit;
}

.btn:hover { background: var(--soft); }
.btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.btn.warn { background: #fff7e8; color: var(--amber); }
.btn.danger { background: #fff0f0; color: var(--red); }
.btn.small { font-size: 13px; padding: 8px 10px; }

.tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }

.tab {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 12px;
  padding: 9px 12px;
  cursor: pointer;
  color: var(--muted);
}

.tab.active { background: var(--blue-soft); border-color: #cfe0ff; color: #1f4e9d; }

.progress { height: 8px; background: #eeeae3; border-radius: 999px; overflow: hidden; }
.bar { height: 100%; background: var(--blue); }

.badge, .tag {
  font-size: 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px 8px;
  background: var(--soft);
  color: #6f7378;
  display: inline-flex;
}

.statline {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 18px;
}

.mini {
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px;
}

.mini b { display: block; font-size: 22px; }

.wrap { max-width: 1060px; margin: 0 auto; }

.question {
  font-size: 24px;
  line-height: 1.32;
  font-weight: 750;
  letter-spacing: -0.02em;
  margin-top: 18px;
}

.options { display: grid; gap: 10px; margin-top: 18px; }

.option {
  width: 100%;
  text-align: left;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
  cursor: pointer;
}

.option:hover { background: var(--soft); }
.option.correct { border-color: #96d9bc; background: #edf8f2; }
.option.wrong { border-color: #efb0b0; background: #fff0f0; }

.feedback {
  margin-top: 16px;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 16px;
  padding: 15px;
}

.note {
  border-left: 4px solid #82a7ff;
  background: #f4f7ff;
  border-radius: 12px;
  padding: 12px;
  margin-top: 12px;
}

.trap { border-left-color: #e6b762; background: #fff8eb; }

.hintbox {
  background: #f7f6f3;
  border: 1px dashed #d7d2c8;
  border-radius: 14px;
  padding: 13px;
  margin-top: 14px;
  color: #595f65;
}

.study {
  min-height: 430px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.mind-layout {
  display: grid;
  grid-template-columns: minmax(420px, 1.15fr) minmax(280px, 0.85fr);
  gap: 16px;
  align-items: stretch;
}

.mind-board {
  min-height: 560px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 22px;
  position: relative;
  overflow: hidden;
}

.mind-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.mind-node {
  position: absolute;
  transform: translate(-50%, -50%);
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 999px;
  padding: 11px 14px;
  box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
  cursor: pointer;
  max-width: 170px;
  text-align: center;
  font-size: 13px;
  line-height: 1.2;
  z-index: 2;
}

.mind-node.root {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
  font-weight: 800;
  font-size: 16px;
  padding: 16px 20px;
}

.mind-node.topic {
  background: var(--blue-soft);
  border-color: #cfe0ff;
  font-weight: 700;
}

.mind-node.child { background: #fff; }
.mind-node.active { outline: 3px solid rgba(47, 111, 235, 0.2); }

.panel-title { font-size: 28px; letter-spacing: -0.04em; margin: 6px 0 8px; }

.list { display: grid; gap: 10px; }

.list-item {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
}

.search {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  padding: 12px;
  font: inherit;
}

.mode-card { grid-column: span 3; background: #fff; }

@media (max-width: 980px) {
  .mind-layout { grid-template-columns: 1fr; }
  .mind-board { min-height: 520px; }
  .mode-card { grid-column: span 6; }
}

@media (max-width: 760px) {
  .app { padding: 16px; }
  .top { align-items: flex-start; flex-direction: column; }
  .hero, .side, .section, .mode-card { grid-column: span 12; }
  .page-title { font-size: 36px; }
  .statline { grid-template-columns: 1fr 1fr; }
  .space { align-items: flex-start; flex-direction: column; }
  .question { font-size: 21px; }
  .mind-board { min-height: 680px; }
  .mind-node { font-size: 12px; max-width: 140px; padding: 9px 11px; }
  .mind-node.root { font-size: 14px; }
}

  </style>
</head>

      ['turev', 'Uzun mu kısa pozisyon mu?', 'Sözleşmede alıcı konumunda olmayı veya fiyat artışından yararlanmayı ifade eden pozisyon hangisidir?', ['Uzun pozisyon', 'Kısa pozisyon', 'Teminat çağrısı', 'Swap'], 0, 'Uzun pozisyon alıcı veya fiyat artışından yararlanan taraftır.', 'Kısa pozisyon bunun karşıtıdır.'],
      ['turev', 'Arbitraj mı spekülasyon mu?', 'Farklı piyasalardaki fiyat uyumsuzluklarından kazanç hedefi hangisidir?', ['Arbitraj', 'Spekülasyon', 'Riskten korunma', 'Opsiyon primi'], 0, 'Arbitraj fiyat farklılıklarından yararlanmayı amaçlar.', 'Spekülasyon beklentiyle risk almaktır.'],
      ['kamu', 'Kuponlu mu kuponsuz mu?', 'Dönemsel kupon ödemesi sağlayan senet hangisidir?', ['Kuponlu senet', 'Kuponsuz senet', 'Pay senedi', 'PDT'], 0, 'Kuponlu senette dönemsel ödeme vardır.', 'Kuponsuz senette ödeme vade sonunda tek seferdir.'],
      ['kamu', 'Kuponsuz senet', 'İskontolu satılıp ödeme vade sonunda tek seferde yapılan senet hangisidir?', ['Kuponsuz senet', 'Kuponlu senet', 'Değişken faizli senet', 'KİS'], 0, 'Kuponsuz senette getiri iskonto farkıdır.', 'Kuponlu senette dönemsel kupon ödemesi vardır.'],
      ['kamu', 'Döviz cinsi mi dövize endeksli mi?', 'Ödeme yükümlülüğü doğrudan döviz üzerinden belirlenen senet hangisidir?', ['Döviz cinsi senet', 'Dövize endeksli senet', 'TL cinsi senet', 'Enflasyona endeksli senet'], 0, 'Döviz cinsi senette ödeme döviz üzerinden belirlenir.', 'Dövize endeksli senette değer kurla ilişkilidir.'],
      ['kamu', 'TAP satış', 'TAP satışlarına kimler katılabilir?', ['Piyasa yapıcılar', 'Tüm bireysel yatırımcılar', 'Sadece yatırım fonları', 'Sadece halka arz edenler'], 0, 'TAP satışlarda piyasa yapıcı vurgusu önemlidir.', 'Halka arz yönteminden farklıdır.'],
      ['kamu', 'Doğrudan satış', 'Başlangıçta kime ve ne kadar satılacağı belli olan DİBS ihraç yöntemi hangisidir?', ['Doğrudan satış', 'Çoklu fiyat ihalesi', 'Tek fiyat ihalesi', 'Arbitraj'], 0, 'Doğrudan satışta alıcı ve tutar baştan bellidir.', 'İhale rekabetçi teklif toplar.']
    ];

    const FACTS = FACT_ROWS.map((row, index) => ({
      id: 'f' + index,
      section: row[0],
      topic: row[1],
      concept: row[2],
      answer: row[3],
      note: row[4],
      tags: row[5].split(',')
    }));

    const COMPARISONS = COMPARISON_ROWS.map((row, index) => ({
      id: 'c' + index,
      section: row[0],
      topic: row[1],
      prompt: row[2],
      options: row[3],
      answer: row[4],
      explanation: row[5],
      trap: row[6],
      hint: hintFromText(row[2] + ' ' + row[6]),
      tags: ['tuzak']
    }));

    function hintFromText(text) {
      const lower = String(text).toLowerCase();
      if (lower.includes('halka')) return 'Satış işlemi mi, statü değişimi mi?';
      if (lower.includes('pdt') || lower.includes('det')) return 'Kendi payı mı, başka ortaklık payı mı?';
      if (lower.includes('forward') || lower.includes('futures')) return 'Borsada standart mı, tezgahüstü mü?';
      if (lower.includes('opsiyon') || lower.includes('call') || lower.includes('put')) return 'Call alma, put satma hakkı verir.';
      if (lower.includes('fon')) return 'Fon şirket değildir; katılma payı idari hak vermez.';
      if (lower.includes('364')) return '364 gün eşiği devlet tahvili / hazine bonosu ayrımında kilittir.';
      return 'Soruda anahtar kavramı ve çeldiriciyi ayır.';
    }

    function shuffle(array, seed) {
      let s = 0;
      for (const ch of String(seed)) s += ch.charCodeAt(0);
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        s = (s * 9301 + 49297) % 233280;
        const j = s % (i + 1);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function makeQuestions() {
      const questions = [];
      FACTS.forEach((fact, index) => {
        const sameSection = FACTS.filter(item => item.section === fact.section && item.id !== fact.id);
        const wrongAnswers = shuffle(sameSection.map(item => item.answer), fact.id + 'a').slice(0, 3);
        const options = shuffle([fact.answer, ...wrongAnswers], fact.id + 'b');

        questions.push({
          id: 'q' + index,
          section: fact.section,
          topic: fact.topic,
          question: '“' + fact.concept + '” için aşağıdakilerden hangisi doğrudur?',
          options,
          answer: options.indexOf(fact.answer),
          explanation: fact.answer,
          trap: fact.note,
          hint: hintFromText(fact.concept + ' ' + fact.note),
          tags: fact.tags,
          sourceFact: fact.id
        });

        const wrongConcepts = shuffle(sameSection.map(item => item.concept), fact.id + 'c').slice(0, 3);
        const reverseOptions = shuffle([fact.concept, ...wrongConcepts], fact.id + 'd');

        questions.push({
          id: 'qr' + index,
          section: fact.section,
          topic: fact.topic,
          question: '“' + fact.answer + '” açıklaması hangi kavrama aittir?',
          options: reverseOptions,
          answer: reverseOptions.indexOf(fact.concept),
          explanation: 'Doğru kavram: ' + fact.concept + '.',
          trap: fact.note,
          hint: hintFromText(fact.concept + ' ' + fact.note),
          tags: fact.tags,
          sourceFact: fact.id
        });
      });
      return questions;
    }

    const QUESTIONS = makeQuestions();
    const ITEMS = [...QUESTIONS, ...COMPARISONS];
    const STORAGE_KEY = 'spl1003_full_mindmap_v1';

    let state = loadState();
    let ui = { feedback: null, hint: null, customList: null, customTitle: null };

    function defaultState() {
      const date = new Date();
      date.setDate(date.getDate() + 30);
      return {
        section: 'all',
        mode: 'dashboard',
        pos: {},
        records: {},
        favorites: {},
        hard: {},
        wrong: {},
        hints: {},
        last: null,
        examDate: date.toISOString().slice(0, 10),
        activeMindNode: null
      };
    }

    function loadState() {
      try {
        return Object.assign(defaultState(), JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'));
      } catch (error) {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function pct(a, b) { return b ? Math.round((a * 100) / b) : 0; }
    function sectionName(key) { return (SECTIONS.find(s => s.key === key) || { short: 'Tümü' }).short; }
    function sectionFullName(key) { return (SECTIONS.find(s => s.key === key) || { name: 'Tüm Konular' }).name; }
    function bySection(list, section) { return section === 'all' ? list : list.filter(item => item.section === section); }
    function current(list) { return bySection(list, state.section); }

    function daysLeft() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const exam = new Date(state.examDate + 'T00:00:00');
      return Math.max(0, Math.ceil((exam - today) / 86400000));
    }

    function posKey(mode) { return state.section + '_' + mode; }

    function getPos(mode, length) {
      const key = posKey(mode);
      if (state.pos[key] == null) state.pos[key] = 0;
      if (length && state.pos[key] >= length) state.pos[key] = 0;
      return state.pos[key] || 0;
    }

    function setPos(mode, value) {
      state.pos[posKey(mode)] = value;
      saveState();
    }

    function sectionStats(section = 'all') {
      const ids = new Set(bySection(ITEMS, section).map(item => item.id));
      const records = Object.entries(state.records).filter(([id]) => ids.has(id));
      const correct = records.filter(([, record]) => record.lastCorrect).length;
      const favorites = Object.keys(state.favorites).filter(id => ids.has(id)).length;
      const wrongs = Object.keys(state.wrong).filter(id => ids.has(id)).length;
      return {
        answered: records.length,
        correct,
        accuracy: pct(correct, records.length),
        total: ids.size,
        favorites,
        wrongs
      };
    }

    function shell(html) {
      document.getElementById('app').innerHTML = `
        <div class="top">
          <div class="brand">
            <div class="logo">📝</div>
            <div>
              <h1>SPL 1003 Çalışma Alanı</h1>

            </div>
          </div>
          <div class="row">
            <span class="pill">⏳ ${daysLeft()} gün kaldı</span>
            <button class="btn small" onclick="renderSettings()">Ayarlar</button>
          </div>
        </div>
        ${html}
      `;
    }

    function renderDashboard() {
      state.mode = 'dashboard';
      saveState();
      const st = sectionStats();
      const totalTopics = uniqueTopics('all').length;

      shell(`
        <div class="grid">
          <section class="card hero">
            <div style="font-size:64px">📝</div>
            <h2 class="page-title">SPL 1003 Çalışma Alanı</h2>
            <p class="muted">
              Flashkart yok. Gerçek görsel konu haritası, karıştırılan kavramlar,

            </p>
            <div class="row">
              <button class="btn primary" onclick="continueLast()">Çalışmaya Devam Et</button>
              <button class="btn" onclick="switchMode('mind')">Konu Haritası</button>

            </div>
            <div class="statline">
              <div class="mini"><b>${ITEMS.length}</b><span class="muted">açıklamalı soru</span></div>

              <div class="mini"><b>${totalTopics}</b><span class="muted">konu node'u</span></div>
              <div class="mini"><b>${st.accuracy}%</b><span class="muted">doğru oranı</span></div>
            </div>
          </section>

          <aside class="card side">
            <b>Bugünkü öneri</b>
            <p class="muted">Zayıf bölümden 20 test, 10 kavram ayrımı ve yanlışlardan tekrar.</p>

              ${state.last ? sectionName(state.last.section) + ' / ' + state.last.mode : 'Henüz yok'}
            </div>
          </aside>

          ${SECTIONS.map(sectionCard).join('')}

          <div class="card section" onclick="switchMode('favorites')">
            <span style="font-size:30px">⭐</span>
            <h3>Favorilerim</h3>
            <p class="muted">Yıldızladığın sorular</p>
          </div>

          <div class="card section" onclick="switchMode('wrongs')">

            <h3>Yanlışlarım</h3>

          </div>

            <h3>Sinsi Tuzaklar</h3>
            <p class="muted">Çeldirici kısa notlar</p>
          </div>

          <div class="card section" onclick="switchMode('hints')">
            <span style="font-size:30px">💡</span>
            <h3>İpucu Kullandıklarım</h3>

          </div>
        </div>
      `);
    }

    function sectionCard(section) {
      const st = sectionStats(section.key);
      return `
        <div class="card section" onclick="selectSection('${section.key}')">
          <div class="space">
            <div>
              <span style="font-size:30px">${section.icon}</span>
              <h3>${section.name}</h3>
              <p class="muted">
                ${bySection(QUESTIONS, section.key).length} test •
                ${bySection(COMPARISONS, section.key).length} kavram •
                ${uniqueTopics(section.key).length} node
              </p>
            </div>
            <span class="badge">${st.accuracy}%</span>
          </div>
          <div class="progress"><div class="bar" style="width:${pct(st.answered, st.total)}%"></div></div>
          <div class="row" style="margin-top:14px">
            <button class="btn small primary" onclick="event.stopPropagation(); selectSection('${section.key}', 'mind')">Harita</button>
            <button class="btn small" onclick="event.stopPropagation(); selectSection('${section.key}', 'compare')">Kavram</button>
            <button class="btn small" onclick="event.stopPropagation(); selectSection('${section.key}', 'test')">Test</button>
          </div>
        </div>
      `;
    }

    function selectSection(section, mode) {
      state.section = section;
      saveState();
      mode ? switchMode(mode) : renderSectionHome();
    }

    function renderSectionHome() {
      const section = SECTIONS.find(item => item.key === state.section);
      const st = sectionStats(state.section);
      shell(`
        <div class="wrap">
          <button class="btn small" onclick="state.section='all'; saveState(); renderDashboard()">← Ana panel</button>
          <div class="card" style="margin-top:14px">
            <div style="font-size:38px">${section.icon}</div>
            <h2 class="page-title" style="font-size:38px">${section.name}</h2>
            <p class="muted">Bu bölümde gerçek konu haritası, kavram ayrımı ve sınav tarzı test var.</p>
            <div class="progress"><div class="bar" style="width:${pct(st.answered, st.total)}%"></div></div>
            <div class="tabs">
              <button class="tab" onclick="switchMode('mind')">Konu Haritası</button>
              <button class="tab" onclick="switchMode('compare')">Karıştırılan Kavramlar</button>
              <button class="tab" onclick="switchMode('test')">Sınav Tarzı Test</button>
              <button class="tab" onclick="switchMode('favorites')">Favorilerim</button>
              <button class="tab" onclick="switchMode('wrongs')">Yanlışlarım</button>
              <button class="tab" onclick="switchMode('traps')">Sinsi Tuzaklar</button>
            </div>
          </div>
        </div>
      `);
    }

    function header(title, subtitle) {
      const tabs = `
        <button class="tab ${state.section === 'all' ? 'active' : ''}" onclick="state.section='all'; saveState(); switchMode(state.mode)">Tümü</button>
        ${SECTIONS.map(section => `
          <button class="tab ${state.section === section.key ? 'active' : ''}" onclick="state.section='${section.key}'; saveState(); switchMode(state.mode)">${section.short}</button>
        `).join('')}
      `;

      return `
        <div class="wrap">
          <button class="btn small" onclick="renderDashboard()">← Ana panel</button>
          <div class="tabs">${tabs}</div>
          <div class="card" style="margin-bottom:14px">
            <div class="space">
              <div>
                <h2 style="font-size:30px;margin:0 0 6px">${title}</h2>
                <p class="muted" style="margin:0">${subtitle}</p>
              </div>
              <span class="badge">${sectionName(state.section)}</span>
            </div>
          </div>
      `;
    }

    function switchMode(mode) {
      state.mode = mode;
      ui.feedback = null;
      ui.hint = null;
      ui.customList = null;
      ui.customTitle = null;
      saveState();

      if (mode === 'mind') renderMind();
      if (mode === 'compare') renderCompare();
      if (mode === 'test') renderTest();
      if (mode === 'favorites') renderFavorites();
      if (mode === 'hints') renderHints();
      if (mode === 'wrongs') renderWrongs();
      if (mode === 'traps') renderTraps();
      if (mode === 'mock') renderMock();
    }

    function continueLast() {
      if (state.last) {
        state.section = state.last.section;
        switchMode(state.last.mode);
      } else {
        switchMode('mind');
      }
    }

    function uniqueTopics(section) {
      return [...new Set(bySection(FACTS, section).map(item => item.topic))];
    }

    function topicFacts(section, topic) {
      return bySection(FACTS, section).filter(item => item.topic === topic);
    }

    function mindNodes(section) {
      const topics = uniqueTopics(section);
      const root = {
        id: 'root',
        label: sectionFullName(section),
        level: 'root',
        x: 50,
        y: 50
      };

      const topicNodes = topics.map((topic, index) => {
        const angle = -90 + index * (360 / topics.length);
        const radius = 33;
        const x = 50 + radius * Math.cos(angle * Math.PI / 180);
        const y = 50 + radius * Math.sin(angle * Math.PI / 180);
        return { id: 'topic_' + index, label: topic, topic, level: 'topic', x, y };
      });

      let childNodes = [];
      topicNodes.forEach((topicNode, topicIndex) => {
        const facts = topicFacts(section, topicNode.topic).slice(0, 4);
        facts.forEach((fact, factIndex) => {
          const baseAngle = -90 + topicIndex * (360 / topics.length);
          const offset = (factIndex - 1.5) * 10;
          const angle = baseAngle + offset;
          const radius = 47;
          const x = 50 + radius * Math.cos(angle * Math.PI / 180);
          const y = 50 + radius * Math.sin(angle * Math.PI / 180);
          childNodes.push({
            id: 'fact_' + fact.id,
            label: fact.concept,
            topic: topicNode.topic,
            factId: fact.id,
            level: 'child',
            parent: topicNode.id,
            x,
            y
          });
        });
      });

      return { root, topics: topicNodes, children: childNodes };
    }

    function renderMind() {
      const map = mindNodes(state.section);
      const allNodes = [map.root, ...map.topics, ...map.children];
      const active = allNodes.find(node => node.id === state.activeMindNode) || map.root;
      state.activeMindNode = active.id;
      saveState();

      const lines = [
        ...map.topics.map(topic => lineSvg(map.root, topic)),
        ...map.children.map(child => {
          const parent = map.topics.find(topic => topic.id === child.parent);
          return lineSvg(parent, child);
        })
      ].join('');

      shell(`
        ${header('Konu Haritası', 'Merkezden dallanan node’lara tıkla; sağ panelden kritik bilgi ve soru çözmeye geç.')}
        <div class="mind-layout">
          <div class="mind-board">
            <svg class="mind-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
              ${lines}
            </svg>
            ${allNodes.map(node => mindButton(node, active)).join('')}
          </div>
          <div class="card">${mindPanel(active)}</div>
        </div>
        </div>
      `);
    }

    function lineSvg(a, b) {
      if (!a || !b) return '';
      return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#d8d2c8" stroke-width="0.35" />`;
    }

    function mindButton(node, active) {
      const activeClass = node.id === active.id ? 'active' : '';
      return `
        <button
          class="mind-node ${node.level} ${activeClass}"
          style="left:${node.x}%; top:${node.y}%"
          onclick="state.activeMindNode='${node.id}'; saveState(); renderMind()"
        >
          ${esc(node.label)}
        </button>
      `;
    }

    function mindPanel(node) {
      if (node.level === 'root') {
        return `
          <span class="badge">Merkez</span>
          <h2 class="panel-title">${esc(node.label)}</h2>
          <p class="muted">Bu harita bölümün ana başlıklarını ve alt kavramlarını bağlantılı gösterir.</p>
          <div class="note">
            <b>Nasıl kullanılır?</b>
            <ul>
              <li>Ana başlığa tıklayınca o konu özeti açılır.</li>
              <li>Alt kavrama tıklayınca doğrudan kritik bilgi görünür.</li>
              <li>Panelden o konunun testine geçebilirsin.</li>
            </ul>
          </div>
        `;
      }

      if (node.level === 'topic') {
        const facts = topicFacts(state.section, node.topic);
        const traps = facts.filter(fact => fact.tags.includes('tuzak'));
        return `
          <span class="badge">Konu node’u</span>
          <h2 class="panel-title">${esc(node.topic)}</h2>
          <p class="muted">Bu başlık altında ${facts.length} kritik bilgi var.</p>
          <div class="note">
            <b>Kritik bilgiler</b>
            <ul>${facts.slice(0, 7).map(fact => `<li><b>${esc(fact.concept)}:</b> ${esc(fact.answer)}</li>`).join('')}</ul>
          </div>
          ${traps.length ? `
            <div class="note trap">
              <b>Sınav tuzakları</b>
              <ul>${traps.slice(0, 5).map(fact => `<li>${esc(fact.note)}</li>`).join('')}</ul>
            </div>
          ` : ''}
          <div class="row" style="margin-top:14px">
            <button class="btn primary" onclick="topicTest('${state.section}', '${esc(node.topic)}')">Bu konudan soru çöz</button>
            <button class="btn" onclick="topicTraps('${state.section}', '${esc(node.topic)}')">Tuzakları göster</button>
          </div>
        `;
      }

      const fact = FACTS.find(item => item.id === node.factId);
      return `
        <span class="badge">Alt kavram</span>
        <h2 class="panel-title">${esc(fact.concept)}</h2>
        <p>${esc(fact.answer)}</p>
        <div class="note trap"><b>Kritik not:</b> ${esc(fact.note)}</div>
        <div class="row" style="margin-top:14px">
          <button class="btn primary" onclick="factQuestion('${fact.id}')">Bu kavramdan soru çöz</button>
          <button class="btn" onclick="topicTest('${fact.section}', '${esc(fact.topic)}')">Konu testine git</button>
        </div>
      `;
    }

    function topicTest(section, topic) {
      state.section = section;
      const list = QUESTIONS.filter(question => question.section === section && question.topic === topic);
      ui.customList = list;
      ui.customTitle = 'Konu Testi: ' + topic;
      renderQuestionList('custom', list, ui.customTitle, list.length + ' açıklamalı soru.');
    }

    function topicTraps(section, topic) {
      state.section = section;
      const list = FACTS.filter(fact => fact.section === section && fact.topic === topic && fact.tags.includes('tuzak'));
      renderFactList('Konu Tuzakları: ' + topic, list);
    }

    function factQuestion(factId) {
      const list = QUESTIONS.filter(question => question.sourceFact === factId);
      ui.customList = list;
      ui.customTitle = 'Kavram Testi';
      renderQuestionList('custom', list, 'Kavram Testi', list.length + ' soru.');
    }

    function renderCompare() {
      const list = current(COMPARISONS);
      renderQuestionList('compare', list, 'Karıştırılan Kavramlar', list.length + ' kritik ayrım.');
    }

    function renderTest(customList, customTitle) {
      if (customList) {
        ui.customList = customList;
        ui.customTitle = customTitle || 'Sınav Tarzı Test';
        renderQuestionList('custom', customList, ui.customTitle, customList.length + ' açıklamalı soru.');
        return;
      }
      const list = current(QUESTIONS);
      renderQuestionList('test', list, 'Sınav Tarzı Test', list.length + ' açıklamalı soru.');
    }

    function renderQuestionList(mode, list, title, subtitle) {
      if (!list.length) {
        shell(`${header(title, subtitle)}<div class="card"><p class="muted">Bu filtrede soru yok.</p></div></div>`);
        return;
      }
      const index = getPos(mode, list.length);
      renderQuestion(mode, list, index, list[index], title, subtitle);
    }

    function renderQuestion(mode, list, index, item, title, subtitle) {
      const answered = ui.feedback && ui.feedback.id === item.id;
      const selected = answered ? ui.feedback.selected : null;
      const correct = answered && selected === item.answer;
      const favorite = !!state.favorites[item.id];
      const hinted = ui.hint === item.id;
      const label = item.question || item.prompt;

      shell(`
        ${header(title, subtitle)}
        <div class="card study">
          <div>
            <div class="space">
              <div class="row">
                <span class="badge">${index + 1}/${list.length}</span>
                <span class="badge">${sectionName(item.section)}</span>
                <span class="badge">${esc(item.topic || '')}</span>
              </div>
              <button class="btn small" onclick="toggleFavorite('${item.id}'); rerender('${mode}')">
                ${favorite ? '★ Favorilerde' : '☆ Favori'}
              </button>
            </div>
            <div class="progress" style="margin-top:12px"><div class="bar" style="width:${pct(index + 1, list.length)}%"></div></div>
            <div class="question">${esc(label)}</div>
            <div class="row" style="margin-top:14px">
              <button class="btn" onclick="showHint('${item.id}', '${mode}')">💡 İpucu Al</button>
              <button class="btn warn" onclick="toggleHard('${item.id}'); rerender('${mode}')">
                ${state.hard[item.id] ? 'Zordan çıkar' : 'Zor İşaretle'}
              </button>
              <span class="tag">${item.tags && item.tags.includes('sure') ? 'süre/oran' : item.tags && item.tags.includes('tuzak') ? 'tuzak' : 'tanım'}</span>
            </div>
            ${hinted ? `<div class="hintbox"><b>İpucu:</b> ${esc(item.hint)}</div>` : ''}
            <div class="options">
              ${item.options.map((option, optionIndex) => `
                <button
                  class="option ${answered ? (optionIndex === item.answer ? 'correct' : optionIndex === selected ? 'wrong' : '') : ''}"
                  ${answered ? 'disabled' : ''}
                  onclick="answer('${mode}', '${item.id}', ${optionIndex})"
                >
                  <b>${String.fromCharCode(65 + optionIndex)})</b> ${esc(option)}
                </button>
              `).join('')}
            </div>
            ${answered ? `
              <div class="feedback">
                <b>${correct ? '✅ Doğru.' : '❌ Yanlış. Doğru cevap: ' + String.fromCharCode(65 + item.answer) + '.'}</b>
                <p>${esc(item.explanation)}</p>
                ${item.trap ? `<div class="note trap"><b>Kritik not:</b> ${esc(item.trap)}</div>` : ''}
              </div>
            ` : ''}
          </div>
          <div class="row">
            <button class="btn" onclick="move('${mode}', ${index}, ${list.length}, -1)">Önceki</button>
            ${answered ? `<button class="btn primary" onclick="move('${mode}', ${index}, ${list.length}, 1)">Sonraki</button>` : ''}
            ${answered ? `<button class="btn" onclick="similarQuestion('${item.id}')">Benzer Soru Getir</button>` : ''}
          </div>
        </div>
        </div>
      `);
    }

    function answer(mode, id, selected) {
      const item = ITEMS.find(entry => entry.id === id);
      const correct = selected === item.answer;
      ui.feedback = { id, selected };

      const record = state.records[id] || {
        times: 0,
        correctCount: 0,
        wrongCount: 0,
        section: item.section,
        topic: item.topic
      };

      record.times++;
      record.lastCorrect = correct;
      record.lastAnswer = selected;
      record.usedHint = !!state.hints[id];
      record.updatedAt = new Date().toISOString();

      if (correct) {
        record.correctCount++;
      } else {
        record.wrongCount++;
        state.wrong[id] = true;
        state.hard[id] = true;
      }

      state.records[id] = record;
      state.last = { section: state.section, mode: mode === 'custom' ? 'test' : mode };
      saveState();
      rerender(mode);
    }

    function rerender(mode) {
      if (mode === 'compare') renderCompare();
      else if (mode === 'favorites') renderFavorites();
      else if (mode === 'hints') renderHints();
      else if (mode === 'wrongs') renderWrongs();
      else if (mode === 'custom') renderQuestionList('custom', ui.customList || [], ui.customTitle || 'Test', 'Özel liste.');
      else renderTest();
    }

    function move(mode, index, length, direction) {
      setPos(mode, (index + direction + length) % length);
      ui.feedback = null;
      ui.hint = null;
      rerender(mode);
    }

    function toggleFavorite(id) {
      if (state.favorites[id]) delete state.favorites[id];
      else state.favorites[id] = true;
      saveState();
    }

    function toggleHard(id) {
      if (state.hard[id]) delete state.hard[id];
      else state.hard[id] = true;
      saveState();
    }

    function showHint(id, mode) {
      state.hints[id] = (state.hints[id] || 0) + 1;
      ui.hint = id;
      saveState();
      rerender(mode);
    }

    function similarQuestion(id) {
      const item = ITEMS.find(entry => entry.id === id);
      const list = QUESTIONS.filter(question =>
        question.id !== id &&
        question.section === item.section &&
        question.topic === item.topic
      );
      if (!list.length) return;
      ui.customList = list;
      ui.customTitle = 'Benzer Soru: ' + item.topic;
      renderQuestionList('custom', list, ui.customTitle, list.length + ' benzer soru.');
    }

    function renderFavorites() {
      const list = current(ITEMS).filter(item => state.favorites[item.id]);
      renderQuestionList('favorites', list, 'Favorilerim', 'Yıldızladığın sorular.');
    }

    function renderHints() {
      const list = current(ITEMS).filter(item => state.hints[item.id]);
      renderQuestionList('hints', list, 'İpucu Kullandıklarım', 'İpucu aldığın sorular.');
    }

    function renderWrongs() {
      const ids = new Set([...Object.keys(state.wrong), ...Object.keys(state.hard)]);
      const list = current(ITEMS).filter(item => ids.has(item.id));
      renderQuestionList('wrongs', list, 'Yanlışlarım ve Zorlandıklarım', 'Yanlış yaptığın veya zor işaretlediğin sorular.');
    }

    function renderTraps() {
      const list = current(FACTS).filter(fact => fact.tags.includes('tuzak'));
      renderFactList('Sinsi Tuzaklar', list);
    }

    function renderFactList(title, list) {
      shell(`
        ${header(title, 'Sınavda çeldirici olabilecek kısa notlar.')}
        <div class="card">
          <div class="list">
            ${list.map(fact => `
              <div class="list-item">
                <div class="space">
                  <b>${esc(fact.concept)}</b>
                  <span class="badge">${sectionName(fact.section)}</span>
                </div>
                <p>${esc(fact.answer)}</p>
                <div class="note trap">${esc(fact.note)}</div>
                <div class="row" style="margin-top:10px">
                  <button class="btn small" onclick="factQuestion('${fact.id}')">Bu kavramdan soru çöz</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        </div>
      `);
    }

    function renderMock() {
      const list = shuffle(current(ITEMS), Date.now().toString()).slice(0, 25);
      ui.customList = list;
      ui.customTitle = 'Karışık Deneme';
      renderQuestionList('custom', list, 'Karışık Deneme', '25 soruluk karışık prova.');
    }

    function renderSettings() {
      shell(`
        <div class="wrap">
          <button class="btn small" onclick="renderDashboard()">← Ana panel</button>
          <div class="card" style="margin-top:14px">
            <h2>Ayarlar</h2>
            <p class="muted">İlerleme, favoriler, ipuçları, yanlışlar ve zor sorular bu tarayıcıda saklanır.</p>
            <label>Sınav tarihi</label>
            <input class="search" type="date" value="${state.examDate}" onchange="state.examDate=this.value; saveState(); renderSettings()">
            <div class="row" style="margin-top:14px">
              <button class="btn danger" onclick="resetProgress()">İlerlemeyi Sıfırla</button>
            </div>
          </div>
        </div>
      `);
    }

    function resetProgress() {
      if (confirm('Tüm ilerleme silinsin mi?')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    }

    renderDashboard();
  </script></body>
</html>
