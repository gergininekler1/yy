<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal To-Do List</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobil Uygulama Konteyneri */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: #f5f5f5;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 0;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 450px) {
            .app-container {
                height: 90vh;
                border-radius: 35px;
                border: 8px solid #ddd;
            }
        }

        /* Üst Durum Çubuğu (Görseldeki gibi) */
        .status-bar {
            padding: 15px 25px 5px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            background-color: #f5f5f5;
            z-index: 10;
        }

        .status-icons {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        /* Gün Blokları (Akordeon) */
        .days-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .day-section {
            width: 100%;
            transition: all 0.3s ease;
            overflow: hidden;
            cursor: pointer;
        }

        /* Görseldeki gibi aşağı doğru koyulaşan renk tonları */
        .day-section:nth-child(1) { background-color: #f5f5f5; }
        .day-section:nth-child(2) { background-color: #e8e8e8; }
        .day-section:nth-child(3) { background-color: #dadada; }
        .day-section:nth-child(4) { background-color: #cccccc; }
        .day-section:nth-child(5) { background-color: #bebebe; }
        .day-section:nth-child(6) { background-color: #b0b0b0; }
        .day-section:nth-child(7) { background-color: #a2a2a2; }

        .day-header {
            padding: 25px;
            font-size: 28px;
            font-weight: 800;
            color: #222;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .day-content {
            padding: 0 25px 25px 25px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Aktif Gün Stili */
        .day-section.active .day-content {
            display: block;
            opacity: 1;
        }
        
        .day-section.active {
            background-color: #f5f5f5 !important;
            flex-shrink: 0;
        }

        .date-subheader {
            font-size: 13px;
            color: #777;
            margin-top: -5px;
            margin-bottom: 20px;
            font-weight: 400;
        }

        /* Görev Listesi */
        .task-list {
            list-style: none;
            margin-bottom: 25px;
        }

        .task-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
            color: #444;
        }

        /* Özelleştirilmiş Checkbox */
        .task-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid #777;
            border-radius: 2px;
            margin-right: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .task-checkbox:checked {
            background-color: #ff6b00; /* Görseldeki turuncu */
            border-color: #ff6b00;
        }

        .task-checkbox:checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: bold;
            position: absolute;
            top: -1px;
        }

        .task-text {
            transition: all 0.2s;
        }

        /* Tamamlanmış Görev Stili */
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #a0a0a0;
        }
        .task-item.completed {
            color: #ff6b00; /* Görseldeki gibi üstü çizili turuncumsu gri efekti */
        }

        /* Görev Ekleme Alanı */
        .add-task-container {
            margin-top: 40px;
        }

        .add-task-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 14px;
            color: #333;
            outline: none;
            padding: 5px 0;
        }

        .add-task-input::placeholder {
            color: #a0a0a0;
            font-weight: 500;
        }
        
        .delete-btn {
            margin-left: auto;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0 5px;
        }
        
        .delete-btn:hover {
            color: #ff3b30;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="status-bar">
            <div id="clock">9:41</div>
            <div class="status-icons">
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 11H3V7H1V11ZM5 11H7V5H5V11ZM9 11H11V3H9V11ZM13 1H13.5V11H13V1Z" fill="#333"/></svg>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2C4.68629 2 1.80474 3.73373 0 6.25753L8 12L16 6.25753C14.1953 3.73373 11.3137 2 8 2Z" fill="#333"/></svg>
                <svg width="22" height="12" viewBox="0 0 22 12" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="2" width="18" height="8" rx="2" stroke="#333" stroke-width="1.5"/><path d="M21 4V8" stroke="#333" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
        </div>

        <div class="days-wrapper" id="daysWrapper">
            </div>
    </div>

    <script>
        const daysOfWeek = ['PAZARTESİ', 'SALI', 'ÇARŞAMBA', 'PERŞEMBE', 'CUMA', 'CUMARTESİ', 'PAZAR'];
        const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
        
        // Varsayılan boş veritabanı
        let todoData = JSON.parse(localStorage.getItem('minimalist_todo')) || {};
        
        // Veriyi kaydetme
        function saveData() {
            localStorage.setItem('minimalist_todo', JSON.stringify(todoData));
        }

        // Güncel Tarihi Formatlama (Görseldeki gibi: April, 14 2025 - 9:41am)
        function getFormattedDate() {
            const now = new Date();
            const month = months[now.getMonth()];
            const day = now.getDate();
            const year = now.getFullYear();
            
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            // Saati üstteki durum çubuğu için de güncelle
            document.getElementById('clock').innerText = `${hours}:${minutes}`;

            return `${month}, ${day} ${year} - ${hours}:${minutes}${ampm}`;
        }

        function renderApp() {
            const wrapper = document.getElementById('daysWrapper');
            wrapper.innerHTML = '';

            // Hangi günün açık olduğunu bul (varsayılan Pazartesi veya kaydedilen açık gün)
            let activeDay = localStorage.getItem('active_day') || 'PAZARTESİ';

            daysOfWeek.forEach(day => {
                if (!todoData[day]) {
                    todoData[day] = [];
                }

                const daySection = document.createElement('div');
                daySection.className = `day-section ${day === activeDay ? 'active' : ''}`;
                daySection.onclick = function(e) {
                    // Sadece başlığa tıklanınca akordeon açılsın
                    if(e.target.classList.contains('day-header')) {
                        document.querySelectorAll('.day-section').forEach(el => el.classList.remove('active'));
                        daySection.classList.add('active');
                        localStorage.setItem('active_day', day);
                    }
                };

                // Başlık
                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerText = day;
                daySection.appendChild(header);

                // İçerik (Sadece aktif olduğunda görünür)
                const content = document.createElement('div');
                content.className = 'day-content';

                // Tarih Alt Başlığı
                const dateSubheader = document.createElement('div');
                dateSubheader.className = 'date-subheader';
                dateSubheader.innerText = getFormattedDate();
                content.appendChild(dateSubheader);

                // Görev Listesi
                const ul = document.createElement('ul');
                ul.className = 'task-list';

                todoData[day].forEach((task, index) => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'task-checkbox';
                    checkbox.checked = task.completed;
                    checkbox.onchange = () => toggleTask(day, index);

                    const span = document.createElement('span');
                    span.className = 'task-text';
                    span.innerText = task.text;
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.innerHTML = '×';
                    deleteBtn.onclick = () => deleteTask(day, index);

                    li.appendChild(checkbox);
                    li.appendChild(span);
                    li.appendChild(deleteBtn);
                    ul.appendChild(li);
                });
                content.appendChild(ul);

                // Yeni Görev Ekleme Inputu
                const addContainer = document.createElement('div');
                addContainer.className = 'add-task-container';
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'add-task-input';
                input.placeholder = 'Yeni bir görev ekle...';
                input.onkeypress = (e) => {
                    if (e.key === 'Enter' && input.value.trim() !== '') {
                        addTask(day, input.value.trim());
                        input.value = '';
                    }
                };
                addContainer.appendChild(input);
                content.appendChild(addContainer);

                daySection.appendChild(content);
                wrapper.appendChild(daySection);
            });
        }

        // Görev Ekleme
        function addTask(day, text) {
            todoData[day].push({ text: text, completed: false });
            saveData();
            renderApp();
        }

        // Görev Durumunu Değiştirme
        function toggleTask(day, index) {
            todoData[day][index].completed = !todoData[day][index].completed;
            saveData();
            renderApp();
        }
        
        // Görevi Silme
        function deleteTask(day, index) {
            todoData[day].splice(index, 1);
            saveData();
            renderApp();
        }

        // Başlangıç ve Saat güncelleme döngüsü
        renderApp();
        setInterval(() => {
            const dateHeaders = document.querySelectorAll('.date-subheader');
            const newDate = getFormattedDate();
            dateHeaders.forEach(h => h.innerText = newDate);
        }, 60000); // Her dakikada bir saati güncelle

    </script>
</body>
</html>
