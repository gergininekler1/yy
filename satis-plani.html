function hashStr(str){let h=2166136261; for(let i=0;i<str.length;i++){h^=str.charCodeAt(i); h=Math.imul(h,16777619)} return h>>>0}

    const wrongConcepts=pickWrong(same.map(x=>x.concept), f.concept, 3, f.id+'b');
    packed=seededShuffle([{t:f.concept,c:true},...wrongConcepts.map(t=>({t,c:false}))], f.id+'rev');
    qs.push({id:`q_${f.id}_rev`,section:f.section,kind:'test',question:`“${f.answer}” açıklaması hangi kavrama aittir?`,options:packed.map(x=>x.t),answer:packed.findIndex(x=>x.c),explanation:`Doğru kavram: ${f.concept}. ${f.note||''}`,trap:f.tags.includes('tuzak')?'Bu kavram sınavda benzer başlıklarla karıştırılabilir.':'',tags:f.tags});

    <div class="topbar">
      <div class="brand"><div class="logo">1003</div><div><h1>SPL 1003 Çalışma Aracı</h1><p>Sermaye Piyasası Araçları 1 • Flashkart + Kavram + Test</p></div></div>
      <div class="row"><span class="pill">⏳ Sınava kalan: <b>${daysLeft()} gün</b></span><button class="btn ghost small" onclick="renderSettings()">Ayarlar</button></div>
    </div>${inner}`;
}
function renderDashboard(){state.mode='dashboard'; save(); const counts=allCounts('all'); const st=statsFor('all'); const suggested=suggestToday();
  renderShell(`
    <div class="grid">
      <section class="card hero">
        <div style="position:relative;z-index:1"><span class="badge">Apple-futuristic offline çalışma paneli</span><h2>Bugün küçük ama akıllı bir tekrar yapalım.</h2><p class="muted">Kaldığın yer, yanlışların ve zor işaretlediklerin bu tarayıcıda saklanır. Uygulamayı kapatıp açınca başa sarmaz.</p>
        <div class="row" style="margin-top:18px"><button class="btn primary" onclick="continueLast()">Çalışmaya Devam Et</button><button class="btn ghost" onclick="switchMode('critical')">Kritik Bilgiler</button><button class="btn ghost" onclick="switchMode('wrongs')">Yanlışlarım</button></div>
        <div class="statline"><div class="mini"><b>${counts.total}</b><span class="muted">aktif eğitim öğesi</span></div><div class="mini"><b>${st.accuracy}%</b><span class="muted">son doğru oranı</span></div><div class="mini"><b>${st.answered}/${st.total}</b><span class="muted">çözülen soru</span></div></div></div>
      </section>
      <aside class="card side"><div class="space"><div><b>Bugünkü öneri</b><p class="muted" style="margin:6px 0 0">${suggested}</p></div><span class="badge">akıllı yönlendirme</span></div><div class="progress" style="margin-top:18px"><div class="bar" style="width:${Math.min(100,st.accuracy||6)}%"></div></div><p class="footer-note">Öneri, düşük doğru oranı ve az çözülmüş bölümlere göre otomatik oluşur.</p></aside>
      ${SECTIONS.map(s=>sectionCard(s)).join('')}
    </div>`)}
function sectionCard(s){const st=statsFor(s.key), c=allCounts(s.key); return `<div class="card section-card" onclick="selectSection('${s.key}')"><div class="space"><div><span style="font-size:30px">${s.icon}</span><h3 style="margin:10px 0 5px">${s.name}</h3><p class="muted" style="margin:0">${c.facts} kart • ${c.comp} kavram • ${c.qs} test</p></div><span class="badge">${st.accuracy}%</span></div><div class="progress" style="margin-top:16px"><div class="bar" style="width:${pct(st.answered,st.total)}%"></div></div><div class="row" style="margin-top:14px"><button class="btn small primary" onclick="event.stopPropagation();selectSection('${s.key}','flash')">Flashkart</button><button class="btn small ghost" onclick="event.stopPropagation();selectSection('${s.key}','compare')">Kavram</button><button class="btn small ghost" onclick="event.stopPropagation();selectSection('${s.key}','test')">Test</button></div></div>`}
function suggestToday(){const arr=SECTIONS.map(s=>({s,st:statsFor(s.key)})).sort((a,b)=>(a.st.accuracy||0)-(b.st.accuracy||0)||a.st.answered-b.st.answered); const first=arr[0].s; const second=arr[1].s; return `${first.short}: 15 test sorusu • ${second.short}: 12 flashkart • Yanlışlardan 10 tekrar`;}
function selectSection(sec,mode){state.section=sec; save(); if(mode) switchMode(mode); else renderSectionHome()}
function renderSectionHome(){const s=SECTIONS.find(x=>x.key===state.section); const st=statsFor(state.section); const c=allCounts(state.section); renderShell(`<div class="mode-wrap"><button class="btn ghost small" onclick="state.section='all';save();renderDashboard()">← Ana panel</button><div class="card" style="margin-top:14px"><div class="space"><div><span style="font-size:34px">${s.icon}</span><h2>${s.name}</h2><p class="muted">Bu bölümde ${c.total} çalışma öğesi var. Cevap sonrası kısa açıklama ve tuzak notları aktiftir.</p></div><div class="big-stat">${st.accuracy}%</div></div><div class="progress"><div class="bar" style="width:${pct(st.answered,st.total)}%"></div></div><div class="tabs"><button class="tab" onclick="switchMode('flash')">Flashkart Modu</button><button class="tab" onclick="switchMode('compare')">Karıştırılan Kavramlar</button><button class="tab" onclick="switchMode('test')">Çoktan Seçmeli Test</button><button class="tab" onclick="switchMode('critical')">Kritik Bilgiler</button><button class="tab" onclick="switchMode('wrongs')">Yanlışlarım</button></div></div></div>`)}
function modeHeader(title, subtitle){const sections=`<button class="tab ${state.section==='all'?'active':''}" onclick="state.section='all';save();switchMode(state.mode)">Tümü</button>`+SECTIONS.map(s=>`<button class="tab ${state.section===s.key?'active':''}" onclick="state.section='${s.key}';save();switchMode(state.mode)">${s.short}</button>`).join(''); return `<div class="mode-wrap"><button class="btn ghost small" onclick="renderDashboard()">← Ana panel</button><div class="tabs">${sections}</div><div class="card" style="margin-bottom:14px"><div class="space"><div><h2 style="font-size:28px">${title}</h2><p class="muted" style="margin:0">${subtitle}</p></div><span class="badge">${sectionName(state.section)}</span></div></div>`}
function switchMode(mode){state.mode=mode; ui.feedback=null; ui.flipped=false; save(); if(mode==='flash') renderFlash(); if(mode==='compare') renderCompare(); if(mode==='test') renderTest(); if(mode==='critical') renderCritical(); if(mode==='wrongs') renderWrongs();}
function continueLast(){if(state.last){state.section=state.last.section||'all'; switchMode(state.last.mode||'flash')} else {state.section='all'; switchMode('flash')}}
function renderFlash(){let list=filterBySection(FACTS); const q=ui.query?.toLowerCase(); if(q) list=list.filter(x=>(x.concept+x.answer+x.note).toLowerCase().includes(q)); const i=getPos('flash',list.length), item=list[i]; if(!item) return renderEmpty('Flashkart bulunamadı.'); renderShell(`${modeHeader('Flashkart Modu',`${list.length} kart • Kolay, tekrar et veya zor olarak işaretle.`)}<input class="search" placeholder="Kartlarda ara..." value="${esc(ui.query)}" oninput="ui.query=this.value;renderFlash()"><div class="card study-card" style="margin-top:14px"><div class="space"><span class="badge">${i+1}/${list.length}</span><span class="badge">${sectionName(item.section)}</span></div><div class="flipbox ${ui.flipped?'flipped':''}" onclick="ui.flipped=!ui.flipped;renderFlash()"><div class="flipinner"><div class="face front"><div class="question">${esc(item.concept)}</div><p class="muted">Cevabı görmek için karta tıkla.</p></div><div class="face back"><div class="answer"><b>Cevap:</b><br>${esc(item.answer)}</div>${item.note?`<div class="note ${item.tags.includes('tuzak')?'trap':''}"><b>Mini not:</b> ${esc(item.note)}</div>`:''}</div></div></div><div class="row"><button class="btn good" onclick="flashRate('${item.id}','easy',${i},${list.length})">Kolay</button><button class="btn warn" onclick="flashRate('${item.id}','repeat',${i},${list.length})">Tekrar Et</button><button class="btn danger" onclick="flashRate('${item.id}','hard',${i},${list.length})">Zor</button><button class="btn ghost" onclick="setPos('flash',Math.max(0,${i}-1));ui.flipped=false;renderFlash()">Önceki</button></div></div></div>`)}
function flashRate(id,type,i,len){state.flashSeen[id]=(state.flashSeen[id]||0)+1; if(type==='hard') state.hard[id]=true; if(type==='repeat') state.repeat[id]=true; if(type==='easy'){delete state.repeat[id]} setPos('flash',(i+1)%len); ui.flipped=false; save(); renderFlash()}
function renderCompare(){const list=filterBySection(COMPARISONS); const i=getPos('compare',list.length), item=list[i]; if(!item) return renderEmpty('Bu bölümde karşılaştırma kartı yok.'); renderQuestionMode('compare', list, i, item, 'Karıştırılan Kavramlar', `${list.length} kritik ayrım • Her cevap sonrası kısa açıklama var.`)}
function renderTest(customList=null, title='Çoktan Seçmeli Test'){const list=customList || filterBySection(QUESTIONS); const i=getPos(customList?'wrongs':'test',list.length), item=list[i]; if(!item) return renderEmpty('Bu filtrede test sorusu bulunamadı.'); renderQuestionMode(customList?'wrongs':'test', list, i, item, title, `${list.length} soru • Doğru cevap + mini açıklama + tuzak notu.`)}
function renderQuestionMode(mode,list,i,item,title,subtitle){const answered=ui.feedback&&ui.feedback.id===item.id; const selected=answered?ui.feedback.selected:null; const correct=answered?selected===item.answer:false; renderShell(`${modeHeader(title,subtitle)}<div class="card study-card"><div><div class="space"><span class="badge">${i+1}/${list.length}</span><span class="badge">${sectionName(item.section)}</span></div><div class="question" style="margin-top:18px">${esc(item.question||item.prompt)}</div><div class="options">${item.options.map((op,idx)=>`<button class="option ${answered?(idx===item.answer?'correct':idx===selected?'wrong':''):''}" ${answered?'disabled':''} onclick="answerItem('${mode}','${item.id}',${idx})"><b>${String.fromCharCode(65+idx)})</b> ${esc(op)}</button>`).join('')}</div>${answered?feedbackBox(correct,item):''}</div><div class="row"><button class="btn ghost" onclick="prevItem('${mode}',${i},${list.length})">Önceki</button>${answered?`<button class="btn primary" onclick="nextItem('${mode}',${i},${list.length})">Sonraki</button>`:''}<button class="btn warn" onclick="toggleHard('${item.id}');switchMode('${state.mode}')">${state.hard[item.id]?'Zordan çıkar':'Zor işaretle'}</button></div></div></div>`)}
function feedbackBox(correct,item){return `<div class="feedback confetti"><b>${correct?'✅ Doğru.':'❌ Yanlış. Doğru cevap: '+String.fromCharCode(65+item.answer)+'.'}</b><p>${esc(item.explanation)}</p>${item.trap?`<div class="note trap"><b>Kritik not:</b> ${esc(item.trap)}</div>`:''}</div>`}
function answerItem(mode,id,selected){const item=[...QUESTIONS,...COMPARISONS].find(x=>x.id===id); const correct=selected===item.answer; ui.feedback={id,selected}; const r=state.records[id]||{times:0,correctCount:0,wrongCount:0,section:item.section}; r.times++; r.lastCorrect=correct; r.lastAnswer=selected; r.updatedAt=new Date().toISOString(); if(correct){r.correctCount++; delete state.repeat[id]; delete state.wrong?.[id]} else {r.wrongCount++; state.repeat[id]=true; state.hard[id]=true; state.wrong=state.wrong||{}; state.wrong[id]=true} state.records[id]=r; state.last={mode: mode==='wrongs'?'wrongs':state.mode, section:state.section, at:new Date().toISOString()}; save(); if(mode==='compare') renderCompare(); else if(mode==='wrongs') renderWrongs(); else renderTest();}
function nextItem(mode,i,len){setPos(mode,(i+1)%len); ui.feedback=null; if(mode==='compare') renderCompare(); else if(mode==='wrongs') renderWrongs(); else renderTest()}
function prevItem(mode,i,len){setPos(mode,(i-1+len)%len); ui.feedback=null; if(mode==='compare') renderCompare(); else if(mode==='wrongs') renderWrongs(); else renderTest()}
function toggleHard(id){if(state.hard[id]) delete state.hard[id]; else state.hard[id]=true; save()}
function renderWrongs(){const ids=new Set(Object.keys(state.repeat||{}).concat(Object.keys(state.hard||{})).concat(Object.entries(state.records).filter(([,r])=>!r.lastCorrect).map(([id])=>id))); const list=filterBySection([...QUESTIONS,...COMPARISONS]).filter(x=>ids.has(x.id)); if(!list.length) return renderShell(`${modeHeader('Yanlışlarım ve Zorlandıklarım','Henüz tekrar gerektiren soru yok.')}</div>`); renderTest(list,'Yanlışlarım ve Zorlandıklarım')}
function renderCritical(){let list=filterBySection(FACTS).filter(x=>x.tags.includes('kritik')); const q=ui.query?.toLowerCase(); if(q) list=list.filter(x=>(x.concept+x.answer+x.note).toLowerCase().includes(q)); renderShell(`${modeHeader('Kritik Bilgiler','Son hafta hızlı tekrar için kısa ve sınav odaklı bilgiler.')}<input class="search" placeholder="Kritik bilgilerde ara..." value="${esc(ui.query)}" oninput="ui.query=this.value;renderCritical()"><div class="card" style="margin-top:14px"><div class="list">${list.map(x=>`<div class="list-item"><div class="space"><b>${esc(x.concept)}</b><span class="badge">${sectionName(x.section)}</span></div><p>${esc(x.answer)}</p>${x.note?`<div class="note ${x.tags.includes('tuzak')?'trap':''}">${esc(x.note)}</div>`:''}</div>`).join('')}</div></div></div>`)}
function renderEmpty(msg){renderShell(`${modeHeader('Boş liste',msg)}<div class="card"><p>${esc(msg)}</p></div></div>`)}
function renderSettings(){const data=JSON.stringify(state,null,2); renderShell(`<div class="mode-wrap"><button class="btn ghost small" onclick="renderDashboard()">← Ana panel</button><div class="card" style="margin-top:14px"><h2>Ayarlar</h2><p class="muted">İlerleme verileri bu tarayıcıdaki localStorage alanında saklanır.</p><label>Sınav tarihi</label><input class="search" type="date" value="${state.examDate}" onchange="state.examDate=this.value;save();renderSettings()" style="margin:8px 0 16px"><div class="row"><button class="btn ghost" onclick="exportProgress()">İlerlemeyi dışa aktar</button><button class="btn danger" onclick="resetProgress()">Tüm ilerlemeyi sıfırla</button></div><p class="footer-note">Klavye ipucu: Kartın üzerine tıklayınca döner. Testlerde cevap sonrası açıklama otomatik görünür.</p></div></div>`)}
function exportProgress(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='spl1003_ilerleme.json'; a.click(); URL.revokeObjectURL(a.href)}
function resetProgress(){if(confirm('Tüm ilerleme, yanlışlar ve zor kartlar silinsin mi?')){localStorage.removeItem(STORAGE_KEY); state=defaultState(); ensureExamDate(); renderDashboard()}}
window.addEventListener('keydown',e=>{if(state.mode==='flash'&&e.code==='Space'){e.preventDefault(); ui.flipped=!ui.flipped; renderFlash()}});
renderDashboard();
</script>
</body>
</html>
