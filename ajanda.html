<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Kişisel Ajanda</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.8);
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --text-color: #2d3436;
            --success-color: #00b894;
            --accent-color: #fab1a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Cam Efekti (Glassmorphism) */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- MODERN GÖREVLER BÖLÜMÜ --- */
        .task-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        .btn-add {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover { background: var(--secondary-color); }

        .task-list { list-style: none; padding: 0; }

        .task-card {
            background: white;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid var(--primary-color);
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .task-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success-color);
        }

        .task-card.completed {
            opacity: 0.6;
            border-left-color: var(--success-color);
        }

        .task-card.completed label {
            text-decoration: line-through;
        }

        /* --- İSTATİSTİK BÖLÜMÜ --- */
        .stat-item {
            margin-bottom: 20px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .progress-bar {
            background: #eee;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            width: 0%;
            transition: width 0.5s ease;
        }

        /* --- BAŞARI ROZETLERİ --- */
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .badge-item {
            text-align: center;
            filter: grayscale(1);
            opacity: 0.4;
            transition: 0.5s;
        }

        .badge-item.unlocked {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.1);
        }

        .badge-icon {
            font-size: 2.5rem;
            display: block;
        }

        .badge-name {
            font-size: 0.7rem;
            margin-top: 5px;
            font-weight: bold;
        }

        /* --- KİTAP VE FİLM RAFI --- */
        .shelf {
            grid-column: span 2;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .item-box {
            min-width: 120px;
            height: 160px;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 4px solid var(--accent-color);
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .shelf { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card">
        <h2>✅ Günlük Görevler</h2>
        <div class="task-input-group">
            <input type="text" id="taskInput" placeholder="Yeni bir görev ekle...">
            <button class="btn-add" onclick="addTask()">Ekle</button>
        </div>
        <ul id="taskList" class="task-list">
            </ul>
    </div>

    <div class="card">
        <h2>📊 Haftalık İlerleme</h2>
        <div class="stat-item">
            <div class="stat-label"><span>📖 Kitap Okuma</span><span id="bookPercent">0%</span></div>
            <div class="progress-bar"><div id="bookBar" class="progress-fill"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>🏋️ Spor Aktivitesi</span><span id="sportPercent">0%</span></div>
            <div class="progress-bar"><div id="sportBar" class="progress-fill" style="background: #00b894;"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>🎬 Film/Dizi</span><span id="moviePercent">0%</span></div>
            <div class="progress-bar"><div id="movieBar" class="progress-fill" style="background: #fab1a0;"></div></div>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

        <h2>🏆 Başarı Rozetleri</h2>
        <div class="badges-grid">
            <div class="badge-item" id="badge-reader">
                <span class="badge-icon">📚</span>
                <span class="badge-name">Kitap Kurdu</span>
            </div>
            <div class="badge-item" id="badge-athlete">
                <span class="badge-icon">💪</span>
                <span class="badge-name">Demir Bilek</span>
            </div>
            <div class="badge-item" id="badge-productive">
                <span class="badge-icon">⚡</span>
                <span class="badge-name">Hiperaktif</span>
            </div>
        </div>
    </div>

    <div class="card shelf">
        <div class="item-box">📖<br><small>Okunan Kitap 1</small></div>
        <div class="item-box">🎬<br><small>İzlenen Film 1</small></div>
        <div class="item-box">📖<br><small>Okunan Kitap 2</small></div>
        <div class="item-box" style="border: 2px dashed #ccc; background: transparent;">➕<br>Yeni Ekle</div>
    </div>

</div>

<script>
    // Görev Ekleme Fonksiyonu
    function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value;
        if (text === '') return;

        const li = document.createElement('li');
        li.className = 'task-card';
        li.innerHTML = `
            <div class="task-content">
                <input type="checkbox" onclick="toggleTask(this)">
                <label>${text}</label>
            </div>
            <button style="background:none; border:none; cursor:pointer;" onclick="this.parentElement.remove()">🗑️</button>
        `;
        document.getElementById('taskList').appendChild(li);
        input.value = '';
        updateStats();
    }

    // Görev Durumu Değiştirme
    function toggleTask(checkbox) {
        const card = checkbox.parentElement.parentElement;
        if (checkbox.checked) {
            card.classList.add('completed');
        } else {
            card.classList.remove('completed');
        }
        updateStats();
    }

    // İstatistikleri ve Rozetleri Güncelleme (Demo Mantığı)
    function updateStats() {
        const totalTasks = document.querySelectorAll('.task-card').length;
        const completedTasks = document.querySelectorAll('.task-card.completed').length;
        
        // Görev Tamamlama Oranı (Productive rozeti için)
        let percent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        
        // Örnek Manuel Değerler (Gerçek projede inputlardan gelecek)
        let readingProgress = 65; // %65
        let sportProgress = 40;   // %40

        // Barları güncelle
        document.getElementById('bookBar').style.width = readingProgress + '%';
        document.getElementById('bookPercent').innerText = readingProgress + '%';
        
        document.getElementById('sportBar').style.width = sportProgress + '%';
        document.getElementById('sportPercent').innerText = sportProgress + '%';

        // Rozet Kontrolü
        if(readingProgress > 50) document.getElementById('badge-reader').classList.add('unlocked');
        if(sportProgress > 30) document.getElementById('badge-athlete').classList.add('unlocked');
        if(percent === 100 && totalTasks > 0) document.getElementById('badge-productive').classList.add('unlocked');
    }

    // İlk çalışma
    updateStats();
</script>

</body>
</html>
