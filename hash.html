<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Adım Not</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent: #e50914; /* Netflix kırmızısı dokunuşu */
            --success: #1db954;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px; /* Alt menü için boşluk */
        }

        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .container {
            padding: 20px;
        }

        /* Sekme İçerikleri */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Taslak Girdi Alanı & Timer */
        .input-group {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .timer-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .timer-btn:hover, .timer-btn.active {
            background: var(--accent);
        }

        #timerDisplay {
            font-weight: bold;
            font-size: 14px;
            color: var(--accent);
            margin-left: auto;
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: var(--border-radius);
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        /* Netflix Tarzı Kart Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            aspect-ratio: 1 / 1; /* Kare kart */
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.96);
        }

        .card.completed {
            opacity: 0.6;
        }

        .card.completed .card-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .card-text {
            font-size: 14px;
            line-height: 1.4;
            flex-grow: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }

        .card-actions {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-main);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .action-btn.success {
            color: var(--success);
            background: rgba(29, 185, 84, 0.15);
        }

        .completed-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--success);
            font-size: 20px;
            display: none;
        }

        .card.completed .completed-badge {
            display: block;
        }

        /* Alt Navigasyon (Mobil) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            gap: 5px;
            cursor: pointer;
            flex: 1;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: var(--text-main);
        }

        .nav-item.active i {
            color: var(--accent);
        }

        /* Modal (Düzenleme için) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            width: 100%;
            border-radius: var(--border-radius);
            padding: 20px;
        }
        .modal-content textarea {
            height: 200px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <span id="headerTitle">Taslak</span>
        <i class="fa-solid fa-user-astronaut"></i>
    </header>

    <div class="container">
        
        <div id="taslak" class="tab-content active">
            <div class="input-group">
                <textarea id="draftInput" placeholder="Aklına gelenleri buraya dök, alıntı yap, karala..."></textarea>
                
                <div class="timer-controls">
                    <i class="fa-solid fa-stopwatch" style="color: var(--text-muted);"></i>
                    <button class="timer-btn" onclick="startTimer(5)">5 dk</button>
                    <button class="timer-btn" onclick="startTimer(10)">10 dk</button>
                    <button class="timer-btn" onclick="startTimer(15)">15 dk</button>
                    <div id="timerDisplay"></div>
                </div>
                <button class="btn-primary" onclick="addNote()">Taslak Olarak Kaydet</button>
            </div>
            
            <div class="cards-grid" id="taslakGrid">
                </div>
        </div>

        <div id="revize" class="tab-content">
            <div class="cards-grid" id="revizeGrid">
                </div>
        </div>

        <div id="final" class="tab-content">
            <div class="cards-grid" id="finalGrid">
                </div>
        </div>

    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <textarea id="editInput"></textarea>
            <button class="btn-primary" onclick="saveEdit()">Değişiklikleri Kaydet</button>
            <button class="btn-primary" style="background: transparent; color: var(--text-muted); margin-top: 5px;" onclick="closeModal()">İptal</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('taslak', this)">
            <i class="fa-solid fa-pen-nib"></i>
            <span>Taslak</span>
        </div>
        <div class="nav-item" onclick="switchTab('revize', this)">
            <i class="fa-solid fa-hammer"></i>
            <span>Revize</span>
        </div>
        <div class="nav-item" onclick="switchTab('final', this)">
            <i class="fa-solid fa-flag-checkered"></i>
            <span>Final</span>
        </div>
    </nav>

    <script>
        // Not verileri (Uygulama yenilendiğinde sıfırlanır, tarayıcıda kalıcı yapmak için localStorage eklenebilir)
        let notes = [];
        let currentEditId = null;
        let timerInterval;

        // Sekme Değiştirme
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            
            const titles = { 'taslak': 'Taslak', 'revize': 'Revize', 'final': 'Final' };
            document.getElementById('headerTitle').innerText = titles[tabId];
            
            renderNotes();
        }

        // Zamanlayıcı (Challenge)
        function startTimer(minutes) {
            clearInterval(timerInterval);
            let time = minutes * 60;
            const display = document.getElementById('timerDisplay');
            
            timerInterval = setInterval(() => {
                const min = Math.floor(time / 60);
                const sec = time % 60;
                display.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                
                if (time <= 0) {
                    clearInterval(timerInterval);
                    display.innerText = "Süre Bitti!";
                    setTimeout(() => display.innerText = "", 3000);
                }
                time--;
            }, 1000);
        }

        // Not Ekleme
        function addNote() {
            const input = document.getElementById('draftInput');
            const text = input.value.trim();
            
            if (text) {
                notes.push({
                    id: Date.now(),
                    text: text,
                    stage: 'taslak', // taslak, revize, final
                    completed: false
                });
                input.value = '';
                renderNotes();
            }
        }

        // Aşama Taşıma
        function moveNote(id, newStage) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.stage = newStage;
                renderNotes();
            }
        }

        // Düzenleme İşlemleri
        function openEdit(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                currentEditId = id;
                document.getElementById('editInput').value = note.text;
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            currentEditId = null;
        }

        function saveEdit() {
            const note = notes.find(n => n.id === currentEditId);
            if (note) {
                note.text = document.getElementById('editInput').value;
                closeModal();
                renderNotes();
            }
        }

        // Tamamlandı (Yeşil Tik) İşareti
        function toggleComplete(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.completed = !note.completed;
                renderNotes();
            }
        }

        // Notları Ekrana Çizme
        function renderNotes() {
            const taslakGrid = document.getElementById('taslakGrid');
            const revizeGrid = document.getElementById('revizeGrid');
            const finalGrid = document.getElementById('finalGrid');

            taslakGrid.innerHTML = ''; revizeGrid.innerHTML = ''; finalGrid.innerHTML = '';

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = `card ${note.completed ? 'completed' : ''}`;
                
                let actionsHTML = '';
                
                if (note.stage === 'taslak') {
                    actionsHTML = `
                        <button class="action-btn" onclick="openEdit(${note.id})" title="Düzenle"><i class="fa-solid fa-pen"></i></button>
                        <button class="action-btn" onclick="moveNote(${note.id}, 'revize')" title="Revizeye Aktar"><i class="fa-solid fa-arrow-right"></i></button>
                    `;
                } else if (note.stage === 'revize') {
                    actionsHTML = `
                        <button class="action-btn" onclick="openEdit(${note.id})" title="Düzenle"><i class="fa-solid fa-pen"></i></button>
                        <button class="action-btn" onclick="moveNote(${note.id}, 'final')" title="Finale Aktar"><i class="fa-solid fa-flag-checkered"></i></button>
                    `;
                } else if (note.stage === 'final') {
                    actionsHTML = `
                        <button class="action-btn success" onclick="toggleComplete(${note.id})" title="Tamamla"><i class="fa-solid fa-check"></i></button>
                    `;
                }

                card.innerHTML = `
                    <i class="fa-solid fa-circle-check completed-badge"></i>
                    <div class="card-text">${note.text.replace(/\n/g, '<br>')}</div>
                    <div class="card-actions">${actionsHTML}</div>
                `;

                if (note.stage === 'taslak') taslakGrid.appendChild(card);
                else if (note.stage === 'revize') revizeGrid.appendChild(card);
                else if (note.stage === 'final') finalGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
