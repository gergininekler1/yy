<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Adım Not</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0d0d0f; --bg2: #141416;
            --card: #1a1a1e; --card2: #222228;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f0; --muted: #6b6b7a;
            --accent: #e5193a; --accent2: #ff4d6b;
            --success: #00d97e; --warn: #f5a623; --info: #3d9cff;
        }
        :root[data-theme="light"] {
            --bg: #f4f4f7; --bg2: #ebebef;
            --card: #ffffff; --card2: #f0f0f5;
            --border: rgba(0,0,0,0.08);
            --text: #131318; --muted: #8888a0;
            --accent: #e5193a; --accent2: #ff4d6b;
            --success: #00b865; --warn: #d48a00; --info: #1a7ef5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif;
            padding-bottom: 90px; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ── HEADER ── */
        header {
            position: sticky; top: 0; z-index: 50;
            background: var(--bg2); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px); padding: 14px 18px;
            display: flex; align-items: center; gap: 12px;
        }
        .header-title { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; flex: 1; }
        .header-title span { color: var(--accent); }
        .header-btn {
            background: var(--card2); border: 1px solid var(--border);
            color: var(--muted); width: 36px; height: 36px;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 15px; transition: 0.2s;
        }
        .header-btn:hover { color: var(--text); border-color: var(--accent); }
        
        /* ── STATS BAR ── */
        .stats-bar {
            display: flex; gap: 1px; overflow: hidden; margin: 16px 16px 0;
            border-radius: 12px; border: 1px solid var(--border);
        }
        .stat-item { flex: 1; background: var(--card); padding: 12px 10px; text-align: center; cursor: pointer; }
        .stat-item:hover { background: var(--card2); }
        .stat-num { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; }
        .stat-num.taslak-c { color: var(--info); }
        .stat-num.revize-c { color: var(--warn); }
        .stat-num.final-c  { color: var(--success); }
        .stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; }

        /* ── CONTAINER ── */
        .container { padding: 16px; }
        .tab-content { display: none; animation: fadeUp 0.25s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ── TAGS & COLORS ── */
        .color-picker { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .color-dot {
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: 0.15s; position: relative;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.9); font-weight: 700; font-size: 12px;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.5); text-transform: uppercase;
        }
        .color-dot.selected { border-color: var(--text); transform: scale(1.15); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .btn-manage-tags {
            background: transparent; border: 1px dashed var(--muted); color: var(--muted);
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 11px;
        }
        .btn-manage-tags:hover { border-color: var(--text); color: var(--text); }

        /* ── FORM ELEMENTS ── */
        .input-group { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
        .input-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        textarea, input[type="text"] {
            width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 14px; padding: 12px; outline: none; font-family: 'DM Sans', sans-serif;
            resize: none;
        }
        textarea:focus, input[type="text"]:focus { border-color: var(--accent); }
        textarea.kaos-box { height: 120px; }
        textarea.giris-box { height: 60px; margin-bottom: 10px; }

        .btn-save {
            background: var(--accent); color: #fff; border: none; width: 100%; padding: 12px;
            border-radius: 10px; font-weight: 600; font-size: 14px; margin-top: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
        }
        .btn-save:active { transform: scale(0.98); }

        /* ── REVIZE 2-BLOCK LAYOUT ── */
        .revize-draft-viewer { background: rgba(61,156,255,0.05); border: 1px solid var(--info); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
        .revize-draft-viewer .text-content { font-size: 13px; color: var(--text); line-height: 1.6; margin-top: 8px; }
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; color: var(--muted); }
        .pagination button { background: var(--card2); border: none; color: var(--text); padding: 4px 10px; border-radius: 6px; cursor: pointer; }
        .draft-preview-item {
            background: var(--card2); border-radius: 8px; padding: 10px; font-size: 13px; color: var(--muted); cursor: pointer;
            margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; border: 1px solid transparent;
        }
        .draft-preview-item.selected { border-color: var(--info); color: var(--text); background: rgba(61,156,255,0.1); }
        .draft-preview-item .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }

        /* ── CARDS GRID ── */
        .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-label::after { content:''; flex:1; height:1px; background: var(--border); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px;
            display: flex; flex-direction: column; position: relative; overflow: hidden; height: 180px;
        }
        .card-stripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .card-meta { font-size: 10px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .card-cat { background: var(--card2); padding: 2px 6px; border-radius: 4px; font-size: 9px; color: var(--info); }
        .card-text { font-size: 12px; line-height: 1.5; flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; }
        .card-actions { margin-top: 8px; display: flex; justify-content: flex-end; gap: 6px; }
        .action-btn {
            background: var(--card2); border: none; color: var(--muted); width: 28px; height: 28px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px;
        }
        .action-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }

        /* ── FAB BUTTON ── */
        .fab-btn {
            position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px;
            background: var(--info); color: #fff; border: none; border-radius: 50%;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(61,156,255,0.4); cursor: pointer; z-index: 90;
            transition: 0.2s;
        }
        .fab-btn:active { transform: scale(0.9); }

        /* ── FILTERS ── */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filter-chip {
            background: var(--card2); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px;
            border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ── MODALS ── */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 200; align-items: flex-end; justify-content: center; padding: 16px;
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; border-radius: 16px; padding: 20px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
        .close-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
        
        .tag-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: var(--card2); border-radius: 8px; margin-bottom: 8px; }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--bg2); border-top: 1px solid var(--border);
            display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--muted); padding: 12px 0; cursor: pointer; font-size: 11px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--text); }
        .nav-item.active i { color: var(--accent); }

        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 30px;
            font-size: 13px; z-index: 300; opacity: 0; transition: 0.3s; pointer-events: none; font-weight: 500;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <div class="header-title">3 <span>Adım</span> Not</div>
    <button class="header-btn" onclick="toggleTheme()"><i class="fa-regular fa-moon" id="themeIcon"></i></button>
</header>

<div class="stats-bar">
    <div class="stat-item" onclick="switchTab('taslak')">
        <div class="stat-num taslak-c" id="sTaslak">0</div><div class="stat-label">Taslak</div>
    </div>
    <div class="stat-item" onclick="switchTab('revize')">
        <div class="stat-num revize-c" id="sRevize">0</div><div class="stat-label">Revize</div>
    </div>
    <div class="stat-item" onclick="switchTab('final')">
        <div class="stat-num final-c" id="sFinal">0</div><div class="stat-label">Final</div>
    </div>
</div>

<div class="container">
    <div id="taslak" class="tab-content active">
        <div class="filter-bar" id="taslakFilters"></div>
        <div class="section-label"><i class="fa-regular fa-pen-to-square"></i> Taslaklarım</div>
        <div class="cards-grid" id="taslakGrid"></div>
        <button class="fab-btn" onclick="openNewTaslak()"><i class="fa-solid fa-plus"></i></button>
    </div>

    <div id="revize" class="tab-content">
        <div class="input-group">
            <span class="input-label"><i class="fa-regular fa-folder-open"></i> Taslak Seç (Sayfa <span id="draftPageNum">1</span>)</span>
            <div id="draftPreviewList"></div>
            <div class="pagination">
                <button onclick="changeDraftPage(-1)"><i class="fa-solid fa-chevron-left"></i> Önceki</button>
                <button onclick="changeDraftPage(1)">Sonraki <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="revize-draft-viewer" id="revizeViewer" style="display:none">
            <span class="input-label" style="color:var(--info)"><i class="fa-regular fa-eye"></i> Seçili Taslak İçeriği</span>
            <div class="text-content" id="selectedDraftText"></div>
        </div>

        <div class="input-group" id="revizeEditorBlock" style="display:none">
            <span class="input-label" style="color:var(--warn)"><i class="fa-solid fa-hammer"></i> Yeni Revize Notu</span>
            <div class="color-picker" id="revizeColorPicker"></div>
            <textarea id="revizeInput" class="kaos-box" placeholder="Taslağı incele ve buraya yeni halini yaz..."></textarea>
            <button class="btn-save" style="background:var(--warn)" onclick="saveRevize()"><i class="fa-solid fa-check-double"></i> Revizeyi Kaydet</button>
        </div>

        <div class="filter-bar" id="revizeFilters"></div>
        <div class="section-label"><i class="fa-solid fa-hammer"></i> Revize Edilenler</div>
        <div class="cards-grid" id="revizeGrid"></div>
    </div>

    <div id="final" class="tab-content">
        <div class="filter-bar" id="finalCatFilters"></div>
        <div class="section-label"><i class="fa-regular fa-flag"></i> Final Notlar</div>
        <div class="cards-grid" id="finalGrid"></div>
    </div>
</div>

<div class="modal" id="taslakModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">Yeni Taslak Ekle</div>
            <button class="close-btn" onclick="closeModal('taslakModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="color-picker" id="taslakColorPicker"></div>
        <span class="input-label">Giriş Bölümü</span>
        <textarea id="tGiris" class="giris-box" placeholder="Kısa bir özet veya başlık niteliğinde..."></textarea>
        <span class="input-label">Kaos Bölümü</span>
        <textarea id="tKaos" class="kaos-box" placeholder="Aklına ne geliyorsa buraya dök..."></textarea>
        <button class="btn-save" onclick="saveTaslak()"><i class="fa-regular fa-floppy-disk"></i> Kaydet</button>
    </div>
</div>

<div class="modal" id="tagModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">Etiketleri Yönet</div>
            <button class="close-btn" onclick="closeModal('tagModal'); renderAllPickers();"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="tagListArea"></div>
        <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:16px;">
            <span class="input-label">Yeni Etiket Ekle</span>
            <div style="display:flex; gap:10px;">
                <input type="color" id="newTagColor" value="#3d9cff" style="width:40px; height:40px; padding:0; border:none; background:transparent; cursor:pointer;">
                <input type="text" id="newTagName" placeholder="Etiket Adı" style="flex:1;">
                <button class="btn-save" style="width:auto; margin:0; padding:0 16px;" onclick="addNewTag()"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="viewModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="viewTitle">Not Detayı</div>
            <button class="close-btn" onclick="closeModal('viewModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="color-picker" id="editColorPicker"></div>
        <div id="categoryEditBlock" style="display:none; margin-bottom:12px;">
            <span class="input-label">Kategori (Final Notları İçin)</span>
            <input type="text" id="editCategory" placeholder="Örn: İş, Kişisel, Proje X...">
        </div>
        <textarea id="editTextGiris" class="giris-box" style="display:none;"></textarea>
        <textarea id="editTextKaos" class="kaos-box"></textarea>
        <button class="btn-save" onclick="saveEdit()"><i class="fa-regular fa-circle-check"></i> Güncelle</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
    <div class="nav-item active" id="nav-taslak" onclick="switchTab('taslak')"><i class="fa-regular fa-pen-to-square"></i><span>Taslak</span></div>
    <div class="nav-item" id="nav-revize" onclick="switchTab('revize')"><i class="fa-solid fa-hammer"></i><span>Revize</span></div>
    <div class="nav-item" id="nav-final" onclick="switchTab('final')"><i class="fa-regular fa-flag"></i><span>Final</span></div>
</nav>

<script>
// ── VERİ TABANI & STATE ──
let defaultTags = [
    { id: 1, name: 'Genel', color: '#3d9cff' },
    { id: 2, name: 'Acil', color: '#e5193a' },
    { id: 3, name: 'Önemli', color: '#f5a623' },
    { id: 4, name: 'Fikir', color: '#00d97e' }
];
let tags = JSON.parse(localStorage.getItem('3a_tags')) || defaultTags;
let notes = JSON.parse(localStorage.getItem('3a_notes')) || [];

let activeTab = 'taslak';
let selectedTagId = tags[0]?.id || null;
let currentDraftPage = 1;
let selectedDraftId = null;
let currentEditId = null;

let filterTaslak = 'all';
let filterFinalCat = 'all';

function save() {
    localStorage.setItem('3a_tags', JSON.stringify(tags));
    localStorage.setItem('3a_notes', JSON.stringify(notes));
}

// ── TEMA ──
function toggleTheme() {
    const root = document.documentElement;
    const isDark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeIcon').className = isDark ? 'fa-regular fa-sun' : 'fa-regular fa-moon';
}

// ── ETIKET SISTEMI ──
function renderAllPickers() {
    const pickers = ['taslakColorPicker', 'revizeColorPicker', 'editColorPicker'];
    const html = tags.map(t => `
        <div class="color-dot ${t.id === selectedTagId ? 'selected' : ''}" 
             style="background:${t.color}; border-color:${t.color}" 
             onclick="selectTag(${t.id}, this)" title="${t.name}">
            ${t.name.charAt(0).toUpperCase()}
        </div>
    `).join('') + `<button class="btn-manage-tags" onclick="openTagManager()"><i class="fa-solid fa-gear"></i></button>`;
    
    pickers.forEach(p => {
        const el = document.getElementById(p);
        if(el) el.innerHTML = html;
    });
}
function selectTag(id, el) {
    selectedTagId = id;
    const parent = el.parentElement;
    parent.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
}
function openTagManager() {
    renderTagManagerList();
    document.getElementById('tagModal').classList.add('active');
}
function renderTagManagerList() {
    const list = document.getElementById('tagListArea');
    list.innerHTML = tags.map(t => `
        <div class="tag-list-item">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="color-dot" style="background:${t.color}; width:20px; height:20px; font-size:10px;">${t.name.charAt(0).toUpperCase()}</div>
                <span style="font-size:13px">${t.name}</span>
            </div>
            <button class="action-btn" onclick="deleteTag(${t.id})" style="color:var(--accent)"><i class="fa-solid fa-trash"></i></button>
        </div>
    `).join('');
}
function addNewTag() {
    const name = document.getElementById('newTagName').value.trim();
    const color = document.getElementById('newTagColor').value;
    if(!name) return;
    tags.push({ id: Date.now(), name, color });
    document.getElementById('newTagName').value = '';
    save(); renderTagManagerList();
}
function deleteTag(id) {
    tags = tags.filter(t => t.id !== id);
    if(selectedTagId === id) selectedTagId = tags[0]?.id || null;
    save(); renderTagManagerList();
}

// ── TASLAK ISLEMLERI ──
function openNewTaslak() {
    document.getElementById('tGiris').value = '';
    document.getElementById('tKaos').value = '';
    document.getElementById('taslakModal').classList.add('active');
}
function saveTaslak() {
    const g = document.getElementById('tGiris').value.trim();
    const k = document.getElementById('tKaos').value.trim();
    if(!g && !k) { showToast('Bir şeyler yazmalısın!'); return; }
    
    notes.push({
        id: Date.now(), stage: 'taslak',
        tagId: selectedTagId,
        giris: g, kaos: k, text: k, // text alanı geriye dönük uyumluluk ve revize için
        date: new Date().toISOString()
    });
    save(); closeModal('taslakModal'); renderAll(); showToast('Taslak eklendi');
}

// ── REVIZE ISLEMLERI ──
function renderDraftPagination() {
    const drafts = notes.filter(n => n.stage === 'taslak');
    const totalPages = Math.ceil(drafts.length / 5);
    if(currentDraftPage > totalPages) currentDraftPage = totalPages || 1;
    
    document.getElementById('draftPageNum').innerText = currentDraftPage;
    const start = (currentDraftPage - 1) * 5;
    const items = drafts.slice(start, start + 5);
    
    const list = document.getElementById('draftPreviewList');
    if(items.length === 0) { list.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:10px">Taslak bulunamadı.</div>'; return; }
    
    list.innerHTML = items.map(n => {
        const t = tags.find(x => x.id === n.tagId) || tags[0];
        const previewText = n.giris ? `<b>${n.giris}</b> - ${n.kaos}` : n.text;
        return `
        <div class="draft-preview-item ${n.id === selectedDraftId ? 'selected' : ''}" onclick="selectDraftForRevize(${n.id})">
            <div class="dot" style="background:${t?.color || '#ccc'}"></div>
            <div style="overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${previewText}</div>
        </div>`;
    }).join('');
}
function changeDraftPage(dir) {
    const drafts = notes.filter(n => n.stage === 'taslak');
    const totalPages = Math.ceil(drafts.length / 5);
    currentDraftPage += dir;
    if(currentDraftPage < 1) currentDraftPage = 1;
    if(currentDraftPage > totalPages) currentDraftPage = totalPages || 1;
    renderDraftPagination();
}
function selectDraftForRevize(id) {
    selectedDraftId = id;
    const note = notes.find(n => n.id === id);
    if(note) {
        document.getElementById('revizeViewer').style.display = 'block';
        document.getElementById('revizeEditorBlock').style.display = 'block';
        document.getElementById('selectedDraftText').innerHTML = `
            ${note.giris ? `<strong>${note.giris}</strong><br><br>` : ''}
            ${(note.kaos || note.text || '').replace(/\n/g,'<br>')}
        `;
    }
    renderDraftPagination();
}
function saveRevize() {
    const text = document.getElementById('revizeInput').value.trim();
    if(!text) return;
    notes.push({
        id: Date.now(), stage: 'revize', sourceId: selectedDraftId,
        tagId: selectedTagId, text: text,
        date: new Date().toISOString()
    });
    // Opsiyonel: Eski taslağı silmek istersen -> notes = notes.filter(n => n.id !== selectedDraftId);
    document.getElementById('revizeInput').value = '';
    document.getElementById('revizeViewer').style.display = 'none';
    document.getElementById('revizeEditorBlock').style.display = 'none';
    selectedDraftId = null;
    save(); renderAll(); showToast('Revize kaydedildi');
}

// ── ORTAK KART RENDER ──
function renderGrid(stage) {
    const grid = document.getElementById(stage + 'Grid');
    let items = notes.filter(n => n.stage === stage);
    
    // Filtreleme (Taslak için etiket, Final için Kategori)
    if(stage === 'taslak' && filterTaslak !== 'all') items = items.filter(n => n.tagId === parseInt(filterTaslak));
    if(stage === 'final' && filterFinalCat !== 'all') items = items.filter(n => n.category === filterFinalCat);

    if(items.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px 10px;font-size:13px;">Burada gösterilecek not yok.</div>`;
        return;
    }

    grid.innerHTML = items.map(n => {
        const tag = tags.find(t => t.id === n.tagId) || { color:'#888', name:'' };
        let displayTxt = '';
        if(n.stage === 'taslak') {
            displayTxt = n.giris ? `<b>${n.giris}</b><br>${n.kaos}` : n.text;
        } else {
            displayTxt = n.text;
        }
        
        let nextStage = stage === 'taslak' ? 'revize' : (stage === 'revize' ? 'final' : null);
        
        return `
        <div class="card" onclick="openViewModal(${n.id})">
            <div class="card-stripe" style="background:${tag.color}"></div>
            <div class="card-meta">
                <span><i class="fa-regular fa-clock" style="font-size:10px"></i> ${new Date(n.date).toLocaleDateString('tr-TR')}</span>
                ${n.stage === 'final' && n.category ? `<span class="card-cat">${n.category}</span>` : ''}
            </div>
            <div class="card-text">${displayTxt.replace(/\n/g,'<br>')}</div>
            <div class="card-actions" onclick="event.stopPropagation()">
                ${nextStage ? `<button class="action-btn" onclick="moveNote(${n.id}, '${nextStage}')"><i class="fa-solid fa-arrow-right"></i></button>` : ''}
                <button class="action-btn" onclick="deleteNote(${n.id})"><i class="fa-regular fa-trash-can"></i></button>
            </div>
        </div>`;
    }).join('');
}

function moveNote(id, target) {
    const note = notes.find(n => n.id === id);
    if(note) {
        note.stage = target;
        if(target === 'final' && !note.category) note.category = 'Genel';
        save(); renderAll(); showToast(`Not taşındı: ${target.toUpperCase()}`);
    }
}
function deleteNote(id) { notes = notes.filter(n => n.id !== id); save(); renderAll(); }

// ── OKUMA & DUZENLEME ──
function openViewModal(id) {
    const note = notes.find(n => n.id === id);
    if(!note) return;
    currentEditId = id;
    selectedTagId = note.tagId;
    renderAllPickers();
    
    document.getElementById('viewTitle').innerText = note.stage.toUpperCase() + ' Detayı';
    
    const isTaslak = note.stage === 'taslak';
    document.getElementById('editTextGiris').style.display = isTaslak ? 'block' : 'none';
    
    if(isTaslak) {
        document.getElementById('editTextGiris').value = note.giris || '';
        document.getElementById('editTextKaos').value = note.kaos || note.text || '';
    } else {
        document.getElementById('editTextKaos').value = note.text || '';
    }

    const catBlock = document.getElementById('categoryEditBlock');
    if(note.stage === 'final') {
        catBlock.style.display = 'block';
        document.getElementById('editCategory').value = note.category || '';
    } else {
        catBlock.style.display = 'none';
    }

    document.getElementById('viewModal').classList.add('active');
}
function saveEdit() {
    const note = notes.find(n => n.id === currentEditId);
    if(!note) return;
    note.tagId = selectedTagId;
    
    if(note.stage === 'taslak') {
        note.giris = document.getElementById('editTextGiris').value;
        note.kaos = document.getElementById('editTextKaos').value;
        note.text = note.kaos; 
    } else {
        note.text = document.getElementById('editTextKaos').value;
    }
    
    if(note.stage === 'final') {
        note.category = document.getElementById('editCategory').value.trim() || 'Genel';
    }
    
    save(); closeModal('viewModal'); renderAll(); showToast('Güncellendi');
}

// ── FILTRELER (Final Kategorileri & Taslak Etiketleri) ──
function renderFiltersUI() {
    // Taslak Filters (Etiket bazlı)
    const tContainer = document.getElementById('taslakFilters');
    tContainer.innerHTML = `<div class="filter-chip ${filterTaslak === 'all' ? 'active':''}" onclick="filterTaslak='all';renderGrid('taslak');renderFiltersUI();">Tümü</div>` + 
        tags.map(t => `<div class="filter-chip ${filterTaslak == t.id ? 'active':''}" onclick="filterTaslak='${t.id}';renderGrid('taslak');renderFiltersUI();">${t.name}</div>`).join('');

    // Final Filters (Kategori bazlı)
    const finals = notes.filter(n => n.stage === 'final' && n.category);
    const cats = [...new Set(finals.map(n => n.category))];
    const fContainer = document.getElementById('finalCatFilters');
    fContainer.innerHTML = `<div class="filter-chip ${filterFinalCat === 'all' ? 'active':''}" onclick="filterFinalCat='all';renderGrid('final');renderFiltersUI();">Tümü</div>` + 
        cats.map(c => `<div class="filter-chip ${filterFinalCat === c ? 'active':''}" onclick="filterFinalCat='${c}';renderGrid('final');renderFiltersUI();">${c}</div>`).join('');
}

// ── YARDIMCI FONKSİYONLAR ──
function switchTab(tab) {
    ['taslak', 'revize', 'final'].forEach(t => {
        document.getElementById(t).classList.remove('active');
        document.getElementById('nav-' + t).classList.remove('active');
    });
    document.getElementById(tab).classList.add('active');
    document.getElementById('nav-' + tab).classList.add('active');
    activeTab = tab;
    renderAll();
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
function updateStats() {
    document.getElementById('sTaslak').innerText = notes.filter(n=>n.stage==='taslak').length;
    document.getElementById('sRevize').innerText = notes.filter(n=>n.stage==='revize').length;
    document.getElementById('sFinal').innerText = notes.filter(n=>n.stage==='final').length;
}

function renderAll() {
    renderAllPickers();
    renderDraftPagination();
    renderFiltersUI();
    renderGrid('taslak');
    renderGrid('revize');
    renderGrid('final');
    updateStats();
}

// INIT
renderAll();
</script>
</body>
</html>
