<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boho-Futurism Note Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            /* Bohem & Fütüristik Renk Paleti */
            --bg-color: #0b0c10;
            --boho-terracotta: #c87941;
            --boho-sage: #878c6b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-muted: #888;
            --neon-glow: 0 0 15px rgba(200, 121, 65, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(200, 121, 65, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(135, 140, 107, 0.08), transparent 25%);
        }

        /* Glassmorphism Ortak Sınıfı */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        header {
            padding: 25px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--boho-terracotta);
            text-shadow: var(--neon-glow);
        }

        /* İş Akışı Sekmeleri */
        .workflow-tabs {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            margin-top: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .workflow-tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab.active {
            background: var(--boho-terracotta);
            color: #fff;
            border-color: var(--boho-terracotta);
            box-shadow: var(--neon-glow);
        }

        /* Ana İçerik ve Editör */
        .main-container {
            padding: 20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .editor-block {
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Hızlı Aksiyon Butonları */
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .icon-btn:hover, .icon-btn:active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--boho-terracotta);
        }

        /* Odaklanma (Challenge) Alanı */
        .challenge-block {
            padding: 15px;
            margin-bottom: 25px;
            border-left: 3px solid var(--boho-sage);
        }

        .challenge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--boho-sage);
        }

        .timer-display {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 500;
        }

        .timer-btns {
            display: flex;
            gap: 8px;
        }

        .time-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .time-btn.active-time {
            background: rgba(135, 140, 107, 0.2);
            color: var(--boho-sage);
            border-color: var(--boho-sage);
        }

        /* Netflix Tarzı Kare Kartlar (Arşiv/Önceki Notlar) */
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .cards-wrapper {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none;
        }

        .cards-wrapper::-webkit-scrollbar { display: none; }

        .note-card {
            min-width: 110px;
            height: 110px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .note-card:active {
            transform: scale(0.95);
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(200,121,65,0.1), transparent);
            opacity: 0.5;
        }

        .card-time {
            font-size: 10px;
            color: var(--boho-terracotta);
            z-index: 1;
        }

        .card-text {
            font-size: 12px;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">Aura.</div>
        <button class="icon-btn" style="border:none; background:transparent;">
            <span class="material-symbols-rounded">menu</span>
        </button>
    </header>

    <div class="workflow-tabs">
        <button class="tab active" onclick="switchTab(this)">Taslak</button>
        <button class="tab" onclick="switchTab(this)">Revize</button>
        <button class="tab" onclick="switchTab(this)">Final</button>
    </div>

    <div class="main-container">
        
        <div class="glass challenge-block">
            <div class="challenge-header">
                <span>Odaklanma Modu</span>
                <span class="timer-display" id="timerDisplay">00:00</span>
            </div>
            <div class="timer-btns">
                <button class="time-btn" onclick="startTimer(5, this)">5 dk</button>
                <button class="time-btn" onclick="startTimer(10, this)">10 dk</button>
                <button class="time-btn" onclick="startTimer(15, this)">15 dk</button>
            </div>
        </div>

        <div class="glass editor-block">
            <textarea id="noteInput" placeholder="Zihnindekileri buraya dök..."></textarea>
            
            <div class="action-row">
                <div class="btn-group">
                    <button class="icon-btn" onclick="addTimestamp()" title="Saat Ekle">
                        <span class="material-symbols-rounded" style="font-size: 20px;">schedule</span>
                    </button>
                    <button class="icon-btn" onclick="copyAll()" title="Tümünü Kopyala">
                        <span class="material-symbols-rounded" style="font-size: 20px;">content_copy</span>
                    </button>
                </div>
                <button class="icon-btn" onclick="saveNote()" style="background: var(--boho-terracotta); border:none; box-shadow: var(--neon-glow); color:#fff;">
                    <span class="material-symbols-rounded" style="font-size: 20px;">done</span>
                </button>
            </div>
        </div>

        <h3 class="section-title">Kayıtlar</h3>
        <div class="cards-wrapper" id="cardsContainer">
            <div class="glass note-card">
                <span class="card-time">14:30</span>
                <p class="card-text">Modern arayüz fikirleri için renk paleti araştırması yapılacak.</p>
            </div>
            <div class="glass note-card">
                <span class="card-time">09:15</span>
                <p class="card-text">Proje toplantısı notları: Fütüristik öğeler artırılmalı.</p>
            </div>
            <div class="glass note-card">
                <span class="card-time">Dün</span>
                <p class="card-text">Glassmorphism ve bohem tarzın birleşimi üzerine düşün.</p>
            </div>
        </div>

    </div>

    <script>
        // Sekme Değiştirme
        function switchTab(element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('noteInput').placeholder = `${element.innerText} aşaması için notlarını gir...`;
        }

        // Saat Ekleme Butonu
        function addTimestamp() {
            const textarea = document.getElementById('noteInput');
            const now = new Date();
            const timeString = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}] `;
            textarea.value += timeString;
            textarea.focus();
        }

        // Tümünü Kopyalama Butonu
        function copyAll() {
            const textarea = document.getElementById('noteInput');
            if(textarea.value.trim() === '') return;
            
            navigator.clipboard.writeText(textarea.value).then(() => {
                const btn = event.currentTarget;
                const icon = btn.querySelector('span');
                icon.innerText = 'check';
                setTimeout(() => icon.innerText = 'content_copy', 2000);
            });
        }

        // Geri Sayım (Challenge) Özelliği
        let timerInterval;
        function startTimer(minutes, btnElement) {
            clearInterval(timerInterval);
            
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active-time'));
            btnElement.classList.add('active-time');

            let time = minutes * 60;
            const display = document.getElementById('timerDisplay');

            timerInterval = setInterval(() => {
                const min = Math.floor(time / 60);
                const sec = time % 60;
                display.innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
                
                if (time <= 0) {
                    clearInterval(timerInterval);
                    display.innerText = "Süre Bitti!";
                    display.style.color = "var(--boho-terracotta)";
                    setTimeout(() => { display.style.color = "inherit"; display.innerText = "00:00"; }, 3000);
                }
                time--;
            }, 1000);
        }

        // Karta Not Kaydetme
        function saveNote() {
            const textarea = document.getElementById('noteInput');
            if(textarea.value.trim() === '') return;

            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            const newCard = document.createElement('div');
            newCard.className = 'glass note-card';
            newCard.innerHTML = `
                <span class="card-time">${timeString}</span>
                <p class="card-text">${textarea.value}</p>
            `;

            const container = document.getElementById('cardsContainer');
            container.insertBefore(newCard, container.firstChild);
            
            textarea.value = '';
        }
    </script>
</body>
</html>
