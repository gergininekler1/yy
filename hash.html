<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitap Takibi V2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0f14;
    --surface: #161a24;
    --surface2: #1e2333;
    --border:  #2a3045;
    --accent:  #f0c93a;
    --accent2: #4ef0a0;
    --accent3: #4ec8f0;
    --danger:  #f05a4e;
    --purple:  #c44ef0;
    --text:    #e8ecf7;
    --muted:   #6b7599;
    --radius:  14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; padding: 20px 20px 60px;
    overflow-x: hidden;
    transition: background 0.3s;
  }
  
  /* Arkaplan ve Kapak Efekti */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(240,201,58,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,201,58,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .cover-bg {
    position: fixed; inset: -50px; z-index: 0;
    background-size: cover; background-position: center;
    filter: blur(40px) opacity(0.15) saturate(1.5);
    transition: background-image 0.5s ease;
    pointer-events: none;
  }

  .container { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── Kitaplık Kontrolleri ── */
  .lib-controls {
    display: flex; gap: 10px; margin-bottom: 24px;
    background: var(--surface); padding: 10px;
    border-radius: var(--radius); border: 1px solid var(--border);
    align-items: center; justify-content: space-between;
  }
  .book-select {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-family: 'Syne', sans-serif; font-weight: 600;
    outline: none; cursor: pointer;
  }
  .lib-btn {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; transition: all 0.2s;
  }
  .lib-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ── Odak Modu ── */
  body.focus-mode .hide-in-focus { display: none !important; }
  body.focus-mode { padding-top: 10vh; }
  .focus-btn {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    width: 50px; height: 50px; border-radius: 25px;
    background: var(--surface); border: 2px solid var(--border); color: var(--muted);
    font-size: 20px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }
  .focus-btn:hover { border-color: var(--accent); color: var(--accent); }
  body.focus-mode .focus-btn { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ── Header ── */
  header { margin-bottom: 32px; text-align: center; }
  .tag {
    display: inline-block; background: var(--accent); color: #000;
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 4px; margin-bottom: 14px;
  }
  h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(26px,5vw,44px); 
    font-weight: 800; line-height: 1.05; margin-bottom: 4px;
  }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 24px; }

  /* Book Inputs */
  .book-fields {
    display: flex; flex-direction: column; gap: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .book-field {
    display: flex; align-items: center; border-bottom: 1px solid var(--border);
  }
  .book-field:last-child { border-bottom: none; }
  .field-tag {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); padding: 12px 14px;
    border-right: 1px solid var(--border); white-space: nowrap; 
    min-width: 90px; text-align: right; background: var(--surface2);
  }
  .field-inp {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600;
    color: var(--text); padding: 12px 16px; transition: background 0.15s;
    width: 100%;
  }
  .field-inp::placeholder { color: var(--muted); font-weight: 400; }
  .field-inp:focus { background: rgba(240,201,58,0.04); }

  /* ── Stats ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 10px; margin: 20px 0;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 12px; text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
    line-height: 1; margin-bottom: 5px;
  }
  .stat-num.yellow { color: var(--accent); }
  .stat-num.green  { color: var(--accent2); }
  .stat-num.blue   { color: var(--accent3); }
  .stat-lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  /* ── Counter ── */
  .counter-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px;
    text-align: center; margin-bottom: 12px; position: relative; overflow: hidden;
  }
  .counter-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .counter-label {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 20px;
  }
  .counter-main {
    display: flex; align-items: center; justify-content: center; gap: 24px;
    margin-bottom: 18px;
  }
  .page-display {
    font-family: 'Syne', sans-serif; font-size: clamp(60px, 12vw, 88px); font-weight: 800;
    color: var(--text); line-height: 1; min-width: 140px;
    text-shadow: 0 0 40px rgba(240,201,58,0.15);
  }
  .page-unit {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-top: 2px;
  }
  .cnt-btn {
    width: 52px; height: 52px; border-radius: 50%; border: none;
    cursor: pointer; font-size: 22px; font-weight: 700;
    font-family: 'Syne', sans-serif; display: flex; align-items: center; justify-content: center;
    transition: all 0.12s; user-select: none; flex-shrink: 0;
  }
  .cnt-plus  { background: var(--accent); color: #000; }
  .cnt-plus:hover  { background: #ffd84a; transform: scale(1.1); }
  .cnt-plus:active { transform: scale(0.92); }
  .cnt-minus { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .cnt-minus:hover { background: var(--border); color: var(--text); }

  /* Steps */
  .step-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .step-pill {
    padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--muted); cursor: pointer; transition: all 0.12s;
  }
  .step-pill.active, .step-pill:hover {
    background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500;
  }

  /* Progress */
  .prog-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 7px; }
  .prog-fill {
    height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .prog-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

  /* ── Goal ── */
  .goal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
  }
  .goal-header {
    padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
  }
  .goal-body { display: flex; flex-wrap: wrap; }
  .goal-field {
    flex: 1; min-width: 150px; padding: 14px 18px; border-right: 1px solid var(--border);
  }
  .goal-field:last-child { border-right: none; }
  .goal-lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .goal-inp {
    background: transparent; border: none; outline: none; width: 100%;
    font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent2);
  }
  .goal-inp::placeholder { color: var(--border); font-weight: 400; font-size: 16px; }
  .pace-bar {
    padding: 10px 18px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted);
    min-height: 38px; display: flex; align-items: center; gap: 6px;
  }
  .pace-bar span.hi { color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; }

  /* ── Section Cards (Quotes, Notes, History) ── */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
  }
  .sec-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
  }
  .sec-icon { font-size: 15px; }
  .sec-title {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .sec-count { margin-left: auto; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

  /* Quotes & History Lists */
  .list-item {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    animation: fadeUp 0.25s ease;
  }
  .list-item:last-child { border-bottom: none; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  
  .quote-text {
    font-size: 14px; line-height: 1.65; color: var(--text);
    margin-bottom: 6px; position: relative; padding-left: 14px;
  }
  .quote-text::before {
    content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 2px; background: var(--accent); border-radius: 2px;
  }
  .quote-text strong { color: var(--accent2); font-weight: 600; }
  .quote-text em { color: var(--accent3); font-style: italic; }

  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--muted); letter-spacing: 0.08em;
  }
  .del-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--border); font-size: 15px; padding: 0 4px; transition: color 0.15s; line-height: 1;
  }
  .del-btn:hover { color: var(--danger); }
  .empty-state { padding: 24px; text-align: center; font-size: 13px; color: var(--border); }

  /* History Specific */
  .hist-entry { display: flex; align-items: center; gap: 12px; }
  .hist-badge {
    background: rgba(78, 240, 160, 0.1); color: var(--accent2);
    padding: 4px 8px; border-radius: 6px; font-weight: 700; font-family: 'Syne', sans-serif;
  }
  .hist-badge.negative { background: rgba(240, 90, 78, 0.1); color: var(--danger); }

  /* Forms */
  .input-form { padding: 14px 18px; background: var(--bg); border-top: 1px solid var(--border); }
  .form-ta {
    width: 100%; min-height: 68px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 13px; resize: none; outline: none; line-height: 1.6; margin-bottom: 8px;
  }
  .form-ta:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 8px; align-items: center; }
  .page-inp {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 12px; outline: none; font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text); width: 100px;
  }
  .add-btn {
    margin-left: auto; background: var(--accent); color: #000; border: none; border-radius: 8px;
    padding: 8px 20px; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  }
  .notes-ta {
    width: 100%; min-height: 140px; background: transparent; border: none; outline: none;
    padding: 16px 18px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    line-height: 1.8; resize: vertical;
  }

  /* Footer */
  .footer-row { display: flex; justify-content: center; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
  .ghost-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 9px 20px; border-radius: 8px; cursor: pointer; font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.08em; transition: all 0.2s;
  }
  .ghost-btn:hover { border-color: var(--danger); color: var(--danger); }
  
  #confettiCanvas { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999; }
</style>
</head>
<body>
<div id="coverBg" class="cover-bg"></div>
<canvas id="confettiCanvas"></canvas>

<button class="focus-btn" onclick="toggleFocus()" title="Odak Modu">👁</button>

<div class="container">
  
  <div class="lib-controls hide-in-focus">
    <select class="book-select" id="bookSelect" onchange="switchBook()"></select>
    <button class="lib-btn" onclick="createNewBook()">+ Yeni Kitap</button>
  </div>

  <header class="hide-in-focus">
    <div class="tag">📚 Okuma Takibi V2</div>
    <h1>Kitap <span>Günlüğü</span></h1>
    <div class="book-fields" style="margin-top: 20px;">
      <div class="book-field">
        <span class="field-tag">Kitap</span>
        <input class="field-inp" id="bName" placeholder="Kitabın adını yaz..." oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Yazar</span>
        <input class="field-inp" id="bAuthor" placeholder="Yazar adı..." oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Kapak URL</span>
        <input class="field-inp" id="bCover" placeholder="https://... (Görsel Linki)" oninput="saveMeta()">
      </div>
    </div>
  </header>

  <div class="stats-row hide-in-focus">
    <div class="stat-card">
      <div class="stat-num yellow" id="stat-read">0</div><div class="stat-lbl">Okunan Sayfa</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="stat-left">—</div><div class="stat-lbl">Kalan Sayfa</div>
    </div>
    <div class="stat-card">
      <div class="stat-num blue" id="stat-days">—</div><div class="stat-lbl">Kalan Gün</div>
    </div>
  </div>

  <div class="counter-card">
    <div class="counter-label hide-in-focus">Toplam Okunan Sayfa</div>
    <div class="counter-main">
      <button class="cnt-btn cnt-minus" onclick="addPages(-step)">−</button>
      <div>
        <div class="page-display" id="pageNum">0</div>
        <div class="page-unit hide-in-focus">sayfa</div>
      </div>
      <button class="cnt-btn cnt-plus" onclick="addPages(step)">+</button>
    </div>
    <div class="step-row hide-in-focus">
      <span style="font-size:10px; color:var(--muted); text-transform:uppercase; margin-right:4px;">Adım</span>
      <button class="step-pill active" onclick="setStep(1,this)">1</button>
      <button class="step-pill" onclick="setStep(5,this)">5</button>
      <button class="step-pill" onclick="setStep(10,this)">10</button>
      <button class="step-pill" onclick="setStep(25,this)">25</button>
    </div>
    <div class="prog-track hide-in-focus"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-labels hide-in-focus">
      <span id="progLeft">...</span><span id="progPct"></span>
    </div>
  </div>

  <div class="goal-card hide-in-focus">
    <div class="goal-header">Hedef Ayarları</div>
    <div class="goal-body">
      <div class="goal-field">
        <div class="goal-lbl">Toplam Sayfa</div>
        <input class="goal-inp" type="number" id="bTotal" placeholder="örn. 320" min="1" oninput="saveMeta()">
      </div>
      <div class="goal-field">
        <div class="goal-lbl">Bitiş Tarihi</div>
        <input class="goal-inp" type="date" id="bDeadline" style="font-size:15px;color:var(--accent2)" oninput="saveMeta()">
      </div>
    </div>
    <div class="pace-bar" id="paceBar">—</div>
  </div>

  <div class="section-card hide-in-focus">
    <div class="sec-header">
      <span class="sec-icon">⏳</span><span class="sec-title">Okuma Geçmişi</span>
    </div>
    <div id="historyList"></div>
  </div>

  <div class="section-card hide-in-focus">
    <div class="sec-header">
      <span class="sec-icon">❝</span><span class="sec-title">Alıntılar</span>
      <span class="sec-count" id="quoteCount">0 alıntı</span>
    </div>
    <div id="quotesList"></div>
    <div class="input-form">
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px;">İpucu: **kalın** ve *italik* yapabilirsiniz.</div>
      <textarea class="form-ta" id="quoteInput" placeholder="Kitaptan beğendiğin bir cümle..."></textarea>
      <div class="form-row">
        <input class="page-inp" type="number" id="quotePageInp" placeholder="Sayfa no">
        <button class="add-btn" onclick="addQuote()">+ Ekle</button>
      </div>
    </div>
  </div>

  <div class="section-card hide-in-focus">
    <div class="sec-header"><span class="sec-icon">📝</span><span class="sec-title">Notlar</span></div>
    <textarea class="notes-ta" id="notesArea" placeholder="Düşüncelerin..." oninput="saveMeta()"></textarea>
  </div>

  <div class="footer-row hide-in-focus">
    <button class="ghost-btn" onclick="deleteCurrentBook()">🗑 Bu Kitabı Sil</button>
    <button class="ghost-btn" onclick="alert('Verileri yedeklemek için tüm localStorage `app_library` anahtarını kopyalayabilirsiniz. Gelişmiş export yakında eklenecek.')">⬇ Dışa Aktar</button>
  </div>
</div>

<script>
// --- Data Structure ---
let appData = {
  activeId: null,
  books: []
};
let currentBook = null;
let step = 1;

// --- Initialize & Migrate ---
function init() {
  // Eski veriyi taşıma (Migration)
  if(localStorage.getItem('book_pages') && !localStorage.getItem('app_library')) {
    const migratedBook = {
      id: Date.now().toString(),
      name: localStorage.getItem('book_name') || 'Eski Kitap',
      author: localStorage.getItem('book_author') || '',
      cover: '',
      total: parseInt(localStorage.getItem('book_total')) || 0,
      deadline: localStorage.getItem('book_deadline') || '',
      pages: parseInt(localStorage.getItem('book_pages')) || 0,
      quotes: JSON.parse(localStorage.getItem('book_quotes') || '[]'),
      notes: localStorage.getItem('book_notes') || '',
      history: []
    };
    appData.books.push(migratedBook);
    appData.activeId = migratedBook.id;
    // Eski verileri temizle
    ['book_name','book_author','book_total','book_deadline','book_pages','book_quotes','book_notes'].forEach(k => localStorage.removeItem(k));
    saveData();
  } else {
    const saved = localStorage.getItem('app_library');
    if(saved) appData = JSON.parse(saved);
  }

  // Eğer hiç kitap yoksa boş bir tane oluştur
  if(appData.books.length === 0) {
    createNewBook(true);
  } else {
    currentBook = appData.books.find(b => b.id === appData.activeId) || appData.books[0];
    appData.activeId = currentBook.id;
    refreshUI();
  }
}

function saveData() {
  localStorage.setItem('app_library', JSON.stringify(appData));
}

function createNewBook(isInit = false) {
  const newBook = {
    id: Date.now().toString(), name: '', author: '', cover: '', total: 0,
    deadline: '', pages: 0, quotes: [], notes: '', history: []
  };
  appData.books.push(newBook);
  appData.activeId = newBook.id;
  currentBook = newBook;
  saveData();
  if(!isInit) refreshUI();
}

function switchBook() {
  const sel = document.getElementById('bookSelect');
  appData.activeId = sel.value;
  currentBook = appData.books.find(b => b.id === appData.activeId);
  saveData();
  refreshUI();
}

function deleteCurrentBook() {
  if(!confirm(`"${currentBook.name || 'Bu kitabı'}" silmek istediğine emin misin?`)) return;
  appData.books = appData.books.filter(b => b.id !== currentBook.id);
  if(appData.books.length === 0) createNewBook(true);
  else { appData.activeId = appData.books[0].id; currentBook = appData.books[0]; }
  saveData(); refreshUI();
}

// --- Interaction Logic ---
function saveMeta() {
  currentBook.name = document.getElementById('bName').value;
  currentBook.author = document.getElementById('bAuthor').value;
  currentBook.cover = document.getElementById('bCover').value;
  currentBook.total = parseInt(document.getElementById('bTotal').value) || 0;
  currentBook.deadline = document.getElementById('bDeadline').value;
  currentBook.notes = document.getElementById('notesArea').value;
  saveData();
  updateCalculations();
  updateDropdown();
  updateCover();
}

function setStep(n, btn) {
  step = n;
  document.querySelectorAll('.step-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addPages(delta) {
  const prev = currentBook.pages;
  currentBook.pages = Math.max(0, currentBook.pages + delta);
  
  // History Logging
  if(delta !== 0) {
    const today = new Date().toLocaleDateString('tr-TR');
    // Aynı güne ait son kaydı bulup güncelleyebiliriz veya yeni ekleriz
    currentBook.history.unshift({
      date: new Date().toLocaleString('tr-TR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}),
      delta: delta,
      total: currentBook.pages
    });
    // Geçmişi son 10 kayıtla sınırla
    if(currentBook.history.length > 10) currentBook.history.pop();
  }

  saveData();
  
  // Confetti check
  if(currentBook.total > 0 && currentBook.pages >= currentBook.total && prev < currentBook.total) {
    launchConfetti();
  }
  
  updateCalculations();
  renderHistory();
}

// --- Formatting (Markdown) ---
function parseText(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
             .replace(/\*(.*?)\*/g, '<em>$1</em>');
}

function addQuote() {
  const text = document.getElementById('quoteInput').value.trim();
  const pg = document.getElementById('quotePageInp').value.trim();
  if(!text) return;
  currentBook.quotes.push({ text, page: pg, date: new Date().toLocaleDateString('tr-TR') });
  saveData();
  document.getElementById('quoteInput').value = '';
  document.getElementById('quotePageInp').value = '';
  renderQuotes();
}

function deleteQuote(i) {
  currentBook.quotes.splice(i,1); saveData(); renderQuotes();
}

// --- UI Rendering ---
function refreshUI() {
  updateDropdown();
  document.getElementById('bName').value = currentBook.name;
  document.getElementById('bAuthor').value = currentBook.author;
  document.getElementById('bCover').value = currentBook.cover;
  document.getElementById('bTotal').value = currentBook.total || '';
  document.getElementById('bDeadline').value = currentBook.deadline;
  document.getElementById('notesArea').value = currentBook.notes;
  
  updateCover();
  updateCalculations();
  renderQuotes();
  renderHistory();
}

function updateDropdown() {
  const sel = document.getElementById('bookSelect');
  sel.innerHTML = '';
  appData.books.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id;
    opt.textContent = b.name ? b.name : '(İsimsiz Kitap)';
    if(b.id === appData.activeId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateCover() {
  const bg = document.getElementById('coverBg');
  if(currentBook.cover) {
    bg.style.backgroundImage = `url('${currentBook.cover}')`;
  } else {
    bg.style.backgroundImage = 'none';
  }
}

function updateCalculations() {
  const p = currentBook.pages;
  const t = currentBook.total;
  const d = currentBook.deadline;

  document.getElementById('pageNum').textContent = p;
  document.getElementById('stat-read').textContent = p;
  document.getElementById('stat-left').textContent = t ? Math.max(0, t - p) : '—';

  let daysLeft = '—';
  if(d) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(d); end.setHours(0,0,0,0);
    const diff = Math.ceil((end-today)/(1000*60*60*24));
    daysLeft = diff > 0 ? diff : diff === 0 ? 'Bugün!' : 'Geçti';
  }
  document.getElementById('stat-days').textContent = daysLeft;

  if(t > 0) {
    const pct = Math.min(100, Math.round(p/t*100));
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progLeft').textContent = `${Math.max(0, t - p)} sayfa kaldı`;
    document.getElementById('progPct').textContent = pct + '%';
  } else {
    document.getElementById('progFill').style.width = '0%';
    document.getElementById('progLeft').textContent = 'Hedef girilmedi';
    document.getElementById('progPct').textContent = '';
  }

  const paceEl = document.getElementById('paceBar');
  if(t > 0 && d) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(d); end.setHours(0,0,0,0);
    const diff = Math.ceil((end-today)/(1000*60*60*24));
    const left = Math.max(0, t - p);
    if(diff > 0 && left > 0) paceEl.innerHTML = `Hedefe ulaşmak için günde <span class="hi">${Math.ceil(left/diff)} sayfa</span> okumalısın.`;
    else if(left <= 0) paceEl.innerHTML = `<span class="hi">🎉 Kitabı tamamladın!</span>`;
    else paceEl.innerHTML = `<span style="color:var(--danger)">Bitiş tarihi geçmiş.</span>`;
  } else {
    paceEl.innerHTML = 'Hedef & tarih girince günlük hız hesaplanır.';
  }
}

function renderQuotes() {
  const list = document.getElementById('quotesList');
  list.innerHTML = '';
  if(!currentBook.quotes.length) list.innerHTML = '<div class="empty-state">Henüz alıntı eklenmedi...</div>';
  else {
    currentBook.quotes.forEach((q, i) => {
      list.innerHTML += `<div class="list-item">
        <div class="quote-text">${parseText(q.text)}</div>
        <div class="meta-row"><span>${q.page ? 's.'+q.page+' · ' : ''}${q.date}</span>
        <button class="del-btn" onclick="deleteQuote(${i})">✕</button></div></div>`;
    });
  }
  document.getElementById('quoteCount').textContent = currentBook.quotes.length + ' alıntı';
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if(!currentBook.history || !currentBook.history.length) list.innerHTML = '<div class="empty-state">Henüz okuma kaydı yok...</div>';
  else {
    currentBook.history.forEach(h => {
      const isPos = h.delta > 0;
      const sign = isPos ? '+' : '';
      list.innerHTML += `<div class="list-item hist-entry">
        <div class="hist-badge ${!isPos ? 'negative' : ''}">${sign}${h.delta}</div>
        <div style="font-size:13px; color:var(--text);">Toplam: ${h.total}</div>
        <div style="margin-left:auto; font-size:11px; color:var(--muted);">${h.date}</div>
      </div>`;
    });
  }
}

function toggleFocus() { document.body.classList.toggle('focus-mode'); }

// --- Confetti ---
const canvas = document.getElementById('confettiCanvas'), ctx = canvas.getContext('2d');
let particles = [], animFrame = null;
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
function launchConfetti() {
  const colors = ['#f0c93a','#4ef0a0','#4ec8f0','#c44ef0','#f05a4e','#ffffff'];
  for(let i=0; i<200; i++) particles.push({ x:Math.random()*canvas.width, y:-10-Math.random()*250, w:5+Math.random()*10, h:3+Math.random()*5, color:colors[Math.floor(Math.random()*colors.length)], rot:Math.random()*360, vx:(Math.random()-.5)*4, vy:1.5+Math.random()*5, vr:(Math.random()-.5)*8, opacity:1, gravity:.1+Math.random()*.1 });
  if(!animFrame) animateConfetti();
}
function animateConfetti() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.rot+=p.vr;
    if(p.y>canvas.height*.7) p.opacity-=0.03;
    ctx.save(); ctx.globalAlpha=Math.max(0,p.opacity); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color; p.w>12 ? (ctx.beginPath(), ctx.arc(0,0,p.w/2,0,Math.PI*2), ctx.fill()) : ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
  particles = particles.filter(p => p.opacity>0);
  if(particles.length) animFrame = requestAnimationFrame(animateConfetti);
  else { animFrame = null; ctx.clearRect(0,0,canvas.width,canvas.height); }
}

init();
</script>
