<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimptopus Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #fcfaf2;
            --boho-terracotta: #d48166;
            --boho-sage: #7d8c7d;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #3d3d3d;
            --text-muted: #7a7a7a;
            --shadow: 0 8px 32px rgba(212, 129, 102, 0.1);
        }

        .dark-mode {
            --bg-color: #0b0c10;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --text-muted: #888;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 129, 102, 0.05), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(125, 140, 125, 0.05), transparent 40%);
            animation: auraBreath 15s ease-in-out infinite alternate;
        }

        @keyframes auraBreath {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; transition: background 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent; }
        
        .glass { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--shadow); }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 500; color: var(--boho-terracotta); }

        .main-container { padding: 0 20px 100px; }
        .note-box { padding: 25px; display: flex; flex-direction: column; gap: 15px; position: relative; }

        /* Çizgili Defter (Sabit Boyutlu) */
        textarea { 
            width: 100%; 
            height: 160px; /* Sabit boyut */
            background-color: transparent; 
            background-image: repeating-linear-gradient(transparent, transparent 27px, rgba(212, 129, 102, 0.2) 28px);
            background-attachment: local;
            border: none; 
            font-size: 16px; 
            line-height: 28px; 
            outline: none; 
            color: var(--text-main); 
            resize: none; 
        }

        /* Vibe Çipleri */
        .mood-selector { display: flex; gap: 8px; margin-top: 5px; }
        .mood-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s;}
        .mood-dot.active { border-color: var(--text-main); transform: scale(1.3); }

        /* Link Önizlemesi */
        .link-preview { background: rgba(125, 140, 125, 0.1); padding: 8px 12px; border-radius: 12px; font-size: 12px; color: var(--boho-sage); display: inline-flex; align-items: center; gap: 5px; text-decoration: none; border: 1px solid var(--glass-border); margin-top: 5px; }

        /* Filtreler ve Kayıtlar */
        .filter-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .filter-chip { padding: 5px 12px; font-size: 11px; border-radius: 20px; border: 1px solid var(--glass-border); cursor: pointer; color: var(--text-muted); transition: 0.2s;}
        .filter-chip.active { background: var(--boho-sage); color: white; border-color: var(--boho-sage); }

        .cards-grid { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cards-grid::-webkit-scrollbar { display: none; }
        .note-card { min-width: 135px; height: 135px; padding: 15px; cursor: pointer; position: relative; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s;}
        .note-card:active { transform: scale(0.95); }
        .mood-indicator { width: 8px; height: 8px; border-radius: 50%; }

        .icon-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); width: 44px; height: 44px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-main); }
        
        /* Yan Menü ve Arşiv Yapısı */
        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 320px; height: 100%; z-index: 1000; padding: 30px 20px; background: var(--bg-color); transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;}
        .side-panel.active { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 999; }
        .menu-overlay.active { display: block; }

        .archive-item { margin-bottom: 10px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;}
        .archive-header { display: flex; justify-content: space-between; align-items: center; padding: 5px; cursor: pointer; font-size: 13px; font-weight: 600;}
        .archive-body { padding: 10px; background: rgba(0,0,0,0.02); border-radius: 8px; margin-top: 10px; font-size: 13px; line-height: 1.5; color: var(--text-main);}

        .note-number { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 11px; color: var(--text-muted); opacity: 0.7; }

    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="closePanels()"></div>

    <header>
        <div class="logo">Chimptopus.</div>
        <div style="display: flex; gap: 10px;">
            <button class="icon-btn" onclick="toggleDarkMode()"><span class="material-symbols-rounded">dark_mode</span></button>
            <button class="icon-btn" onclick="togglePanel('sideMenu')"><span class="material-symbols-rounded">menu</span></button>
        </div>
    </header>

    <div id="sideMenu" class="side-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-weight:500;">Arşiv & Menü</h2>
            <span class="material-symbols-rounded" onclick="closePanels()" style="cursor:pointer">close</span>
        </div>
        
        <h4 style="color: var(--boho-sage); margin-bottom: 15px; font-size: 14px;">Arşivlenmiş Finaller</h4>
        <div id="archiveContainer"></div>

        <hr style="margin:25px 0; border:0; border-top:1px solid var(--glass-border);">
        <button onclick="clearAll()" style="color:#d9534f; background:none; border:none; cursor:pointer; font-size: 15px; font-weight: 600;">Tüm Verileri Temizle</button>
    </div>

    <div class="workflow-tabs" style="display: flex; gap: 8px; padding: 10px 20px;">
        <button class="tab active" onclick="switchTab('taslak', this)" style="padding: 10px 18px; border-radius: 50px; font-size: 13px; border: 1px solid var(--glass-border); background: var(--boho-terracotta); color: white; cursor: pointer;">Taslak</button>
        <button class="tab" onclick="switchTab('revize', this)" style="padding: 10px 18px; border-radius: 50px; font-size: 13px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-muted); cursor: pointer;">Revize</button>
        <button class="tab" onclick="switchTab('final', this)" style="padding: 10px 18px; border-radius: 50px; font-size: 13px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-muted); cursor: pointer;">Final</button>
    </div>

    <div class="main-container">
        <div class="editor-section" style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;">
            
            <div class="glass note-box" id="referenceBox" style="display: none; padding: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 9px; color: var(--boho-terracotta); font-weight: 600; text-transform: uppercase;">Referans Not</span>
                    <span id="refNum" class="note-number"></span>
                </div>
                <div id="refContent" style="font-size: 13px; color: var(--text-muted); max-height: 80px; overflow-y: auto; margin-top: 5px;"></div>
            </div>

            <div class="glass note-box" id="editorBox">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <span id="boxLabel" style="font-size: 9px; color: var(--boho-terracotta); font-weight: 600; text-transform: uppercase;">Yeni Taslak</span>
                        <div class="mood-selector">
                            <div class="mood-dot active" style="background: #d48166;" onclick="setMood('#d48166', this)"></div>
                            <div class="mood-dot" style="background: #7d8c7d;" onclick="setMood('#7d8c7d', this)"></div>
                            <div class="mood-dot" style="background: #6b878c;" onclick="setMood('#6b878c', this)"></div>
                        </div>
                    </div>
                    <div class="timer-row" style="display: flex; gap: 8px;">
                        <button class="icon-btn" style="width:auto; height:30px; padding:0 10px; font-size:11px;" onclick="startCountdown(5)">5dk</button>
                        <button class="icon-btn" style="width:auto; height:30px; padding:0 10px; font-size:11px;" onclick="startCountdown(15)">15dk</button>
                        <span id="timerDisplay" style="font-size:12px; font-weight:600; color:var(--boho-terracotta); margin-left: 5px; line-height: 30px;"></span>
                    </div>
                </div>

                <textarea id="noteInput" placeholder="Zihnindekileri deftere dök..." oninput="handleInput()"></textarea>
                
                <div id="linkContainer"></div>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <span id="statusMsg" style="color:var(--boho-sage); font-size: 11px; font-weight: 600;"></span>
                        <span class="material-symbols-rounded" style="font-size:20px; cursor:pointer; color:var(--text-muted);" onclick="undoText()" title="Geri Al">history</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="icon-btn" onclick="insertTimestamp()"><span class="material-symbols-rounded">schedule</span></button>
                        <button class="icon-btn" style="background: var(--boho-terracotta); color: white; border: none;" onclick="handleAction()"><span class="material-symbols-rounded">done_all</span></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="records-section" style="margin-top: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="font-weight:400; font-size:16px;">Kayıtlar</h3>
            </div>
            
            <div class="filter-row">
                <span class="filter-chip active" onclick="filterNotes('all', this)">Tümü</span>
                <span class="filter-chip" onclick="filterNotes('taslak', this)">Taslak</span>
                <span class="filter-chip" onclick="filterNotes('revize', this)">Revize</span>
            </div>

            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('chimptopus_v5_notes')) || [];
        let archive = JSON.parse(localStorage.getItem('chimptopus_v5_archive')) || [];
        let globalCounter = parseInt(localStorage.getItem('chimptopus_v5_counter')) || 1;
        
        let currentMode = 'taslak';
        let currentFilter = 'all';
        let selectedMood = '#d48166';
        let textHistory = [];
        let timer;

        function handleInput() {
            const val = document.getElementById('noteInput').value;
            if (textHistory[textHistory.length - 1] !== val) {
                textHistory.push(val);
                if (textHistory.length > 20) textHistory.shift();
            }
            detectLinks(val);
        }

        function undoText() {
            if (textHistory.length > 1) {
                textHistory.pop();
                document.getElementById('noteInput').value = textHistory[textHistory.length - 1];
            }
        }

        function detectLinks(text) {
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            const links = text.match(urlPattern);
            const container = document.getElementById('linkContainer');
            container.innerHTML = '';
            if (links) {
                links.forEach(url => {
                    const domain = new URL(url).hostname;
                    container.innerHTML += `<a href="${url}" target="_blank" class="link-preview"><span class="material-symbols-rounded" style="font-size:14px">link</span>${domain}</a>`;
                });
            }
        }

        function setMood(color, el) {
            selectedMood = color;
            document.querySelectorAll('.mood-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function startCountdown(mins) {
            clearInterval(timer);
            let sec = mins * 60;
            document.getElementById('timerDisplay').innerText = `${mins}:00`;
            timer = setInterval(() => {
                sec--;
                let m = Math.floor(sec / 60);
                let s = sec % 60;
                document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (sec <= 0) { 
                    clearInterval(timer); 
                    if(navigator.vibrate) navigator.vibrate(200);
                    alert("Süre doldu!"); 
                }
            }, 1000);
        }

        function switchTab(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => {
                t.style.background = 'var(--glass-bg)';
                t.style.color = 'var(--text-muted)';
                t.classList.remove('active');
            });
            btn.classList.add('active');
            btn.style.background = 'var(--boho-terracotta)';
            btn.style.color = 'white';
            
            document.getElementById('boxLabel').innerText = mode === 'final' ? "Arşive Gönderilecek Final" : "Yeni " + mode;
            document.getElementById('referenceBox').style.display = mode === 'taslak' ? 'none' : 'flex';
        }

        function handleAction() {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return;

            const formattedNum = String(globalCounter).padStart(2, '0');

            if (currentMode === 'final') {
                archive.unshift({
                    id: Date.now(),
                    num: formattedNum,
                    text,
                    date: new Date().toLocaleDateString('tr-TR')
                });
                localStorage.setItem('chimptopus_v5_archive', JSON.stringify(archive));
                showStatus("Arşivlendi!");
                renderArchive();
            } else {
                notes.unshift({
                    id: Date.now(),
                    num: formattedNum,
                    text,
                    type: currentMode,
                    mood: selectedMood,
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
                });
                localStorage.setItem('chimptopus_v5_notes', JSON.stringify(notes));
                showStatus("Kaydedildi");
                renderNotes();
            }
            
            globalCounter++;
            localStorage.setItem('chimptopus_v5_counter', globalCounter);
            
            document.getElementById('noteInput').value = '';
            document.getElementById('linkContainer').innerHTML = '';
            textHistory = [];
        }

        function filterNotes(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            const filtered = currentFilter === 'all' ? notes : notes.filter(n => n.type === currentFilter);
            
            filtered.forEach(n => {
                const card = document.createElement('div');
                card.className = 'glass note-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 5px;">
                        <span class="note-number">#${n.num}</span>
                        <div class="mood-indicator" style="background:${n.mood}"></div>
                    </div>
                    <span style="font-size:8px; font-weight:600; color:var(--boho-terracotta); text-transform:uppercase;">${n.type}</span>
                    <p style="font-size:12px; line-height:1.4; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; margin: 8px 0; flex-grow: 1;">${n.text}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span style="font-size:9px; color:var(--text-muted)">${n.time}</span>
                        <span class="material-symbols-rounded" style="font-size:16px; color:#d9534f" onclick="deleteNote(${n.id}, event)">delete</span>
                    </div>
                `;
                card.onclick = () => {
                    document.getElementById('refNum').innerText = `#${n.num}`;
                    document.getElementById('refContent').innerText = n.text;
                    document.getElementById('referenceBox').style.display = 'flex';
                };
                grid.appendChild(card);
            });
        }

        function renderArchive() {
            const container = document.getElementById('archiveContainer');
            if (archive.length === 0) {
                container.innerHTML = '<p style="font-size:12px; color:var(--text-muted)">Henüz arşivlenmiş not yok.</p>';
                return;
            }
            container.innerHTML = '';
            archive.forEach(item => {
                const words = item.text.split(' ');
                const title = words.slice(0, 4).join(' ') + (words.length > 4 ? '...' : '');

                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerHTML = `
                    <div class="archive-header" onclick="toggleArchive(this)">
                        <div style="display:flex; align-items:center; gap: 8px;">
                            <span class="note-number">#${item.num}</span>
                            <span>${title}</span>
                        </div>
                        <span class="material-symbols-rounded expand-icon">expand_more</span>
                    </div>
                    <div class="archive-body" style="display:none;">
                        <p style="margin-bottom:10px;">${item.text}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:10px; color:var(--text-muted)">${item.date}</span>
                            <div>
                                <span class="material-symbols-rounded" style="color:#d9534f; cursor:pointer; margin-right:8px; font-size: 18px;" onclick="deleteArchive(${item.id})">delete</span>
                                <span class="material-symbols-rounded" style="color:var(--boho-terracotta); cursor:pointer; font-size: 18px;" onclick="copyToClipboard('${item.text.replace(/'/g, "\\'")}')">content_copy</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function toggleArchive(el) {
            const body = el.nextElementSibling;
            const icon = el.querySelector('.expand-icon');
            if(body.style.display === 'none') {
                body.style.display = 'block';
                icon.innerText = 'expand_less';
            } else {
                body.style.display = 'none';
                icon.innerText = 'expand_more';
            }
        }

        function deleteNote(id, e) {
            e.stopPropagation();
            if(confirm("Silinsin mi?")) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('chimptopus_v5_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function deleteArchive(id) {
            if(confirm("Arşivden kalıcı olarak silinsin mi?")) {
                archive = archive.filter(a => a.id !== id);
                localStorage.setItem('chimptopus_v5_archive', JSON.stringify(archive));
                renderArchive();
            }
        }

        function insertTimestamp() {
            const ta = document.getElementById('noteInput');
            const now = new Date();
            ta.value += `[${now.getHours().toString().padStart(2, '0')}.${now.getMinutes().toString().padStart(2, '0')}] `;
            ta.focus();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Arşiv kopyalandı!");
            });
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function togglePanel(id) { 
            document.getElementById(id).classList.add('active'); 
            document.getElementById('overlay').classList.add('active');
        }
        function closePanels() {
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
        function showStatus(m) { 
            const s = document.getElementById('statusMsg');
            s.innerText = m;
            setTimeout(() => s.innerText = '', 2000);
        }
        function clearAll() { 
            if(confirm("Tüm veriler ve sayaç sıfırlanacak!")) { 
                localStorage.clear(); 
                location.reload(); 
            } 
        }

        renderNotes();
        renderArchive();
    </script>
</body>
</html>
