<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitap Takibi - Profesyonel Sürüm</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161a24; --surface2: #1e2333; --border: #2a3045;
    --accent: #f0c93a; --accent2: #4ef0a0; --accent3: #4ec8f0; --danger: #f05a4e;
    --text: #e8ecf7; --muted: #6b7599; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
    min-height: 100vh; padding: 36px 20px 60px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(240,201,58,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,201,58,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── 3. Dinamik Başlık Alanı ── */
  header { margin-bottom: 32px; text-align: center; }
  .tag {
    display: inline-block; background: var(--accent); color: #000;
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 4px; margin-bottom: 14px;
  }
  h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(26px,5vw,44px); 
    font-weight: 800; line-height: 1.05; margin-bottom: 4px; color: var(--accent);
  }
  .subtitle { color: var(--muted); font-size: 14px; font-weight: 500; margin-bottom: 24px; font-family: 'Syne', sans-serif; }

  /* ── 4. KÜNYE Bölümü ── */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
  }
  .sec-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .sec-title {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  .book-fields { display: flex; flex-direction: column; }
  .book-field { display: flex; align-items: center; border-bottom: 1px solid var(--border); }
  .book-field:last-child { border-bottom: none; }
  .field-tag {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); padding: 10px 14px; border-right: 1px solid var(--border);
    white-space: nowrap; min-width: 90px; text-align: right;
  }
  .field-inp {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--text); padding: 10px 16px;
  }
  .status-val { padding: 10px 16px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

  /* ── 2. Sayaç Renkleri (Geri Getirildi) ── */
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 20px 0; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 12px; text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
  .stat-num.yellow { color: var(--accent); text-shadow: 0 0 15px rgba(240,201,58,0.3); }
  .stat-num.green { color: var(--accent2); text-shadow: 0 0 15px rgba(78,240,160,0.3); }
  .stat-num.blue { color: var(--accent3); text-shadow: 0 0 15px rgba(78,200,240,0.3); }
  .stat-lbl { font-size: 10px; text-transform: uppercase; color: var(--muted); }

  .counter-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px; text-align: center; margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .page-display {
    font-family: 'Syne', sans-serif; font-size: 88px; font-weight: 800;
    color: var(--accent); line-height: 1; text-shadow: 0 0 40px rgba(240,201,58,0.25);
  }
  .cnt-btn {
    width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 22px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: 0.15s;
  }
  .cnt-plus { background: var(--accent); color: #000; }
  .cnt-minus { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* Diğer Stiller */
  .step-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 18px; }
  .step-pill { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-size: 13px; color: var(--muted); cursor: pointer; }
  .step-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .prog-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 7px; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: 0.5s; }
  .goal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; }
  .notes-ta { width: 100%; min-height: 120px; background: transparent; border: none; padding: 15px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
  .quote-form { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); }
  .quote-ta { width: 100%; height: 60px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; outline: none; margin-bottom: 8px; }
  .add-btn { background: var(--accent); color: #000; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
  #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<div class="container">
  <header>
    <div class="tag">📚 Okuma Takibi</div>
    <h1 id="dynTitle">Kitap Günlüğü</h1>
    <p id="dynAuthor" class="subtitle">Yazarınızı buraya ekleyin</p>
  </header>

  <div class="section-card">
    <div class="sec-header"><span class="sec-title">📖 KÜNYE</span></div>
    <div class="book-fields">
      <div class="book-field">
        <span class="field-tag">Kitap</span>
        <input class="field-inp" id="bookName" placeholder="Kitap adı..." oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Yazar</span>
        <input class="field-inp" id="authorName" placeholder="Yazar adı..." oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Durum</span>
        <div id="statusEmoji" class="status-val">—</div>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num yellow" id="stat-read">0</div>
      <div class="stat-lbl">Okunan</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="stat-left">—</div>
      <div class="stat-lbl">Kalan</div>
    </div>
    <div class="stat-card">
      <div class="stat-num blue" id="stat-days">—</div>
      <div class="stat-lbl">Gün</div>
    </div>
  </div>

  <div class="counter-card">
    <div class="page-display" id="pageNum">0</div>
    <div style="font-size:11px; text-transform:uppercase; color:var(--muted); margin: 10px 0 20px;">toplam okunan sayfa</div>
    <div style="display:flex; align-items:center; justify-content:center; gap:30px; margin-bottom:20px;">
      <button class="cnt-btn cnt-minus" onclick="addPages(-step)">−</button>
      <button class="cnt-btn cnt-plus" onclick="addPages(step)">+</button>
    </div>
    <div class="step-row">
      <button class="step-pill active" onclick="setStep(1,this)">1</button>
      <button class="step-pill" onclick="setStep(5,this)">5</button>
      <button class="step-pill" onclick="setStep(10,this)">10</button>
      <button class="step-pill" onclick="setStep(25,this)">25</button>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <div class="goal-card">
    <div class="sec-header"><span class="sec-title">🎯 HEDEF AYARLARI</span></div>
    <div style="display:flex; border-bottom:1px solid var(--border);">
      <div style="flex:1; padding:15px; border-right:1px solid var(--border);">
        <div style="font-size:10px; color:var(--muted); margin-bottom:5px;">TOPLAM SAYFA</div>
        <input class="field-inp" type="number" id="totalPages" placeholder="0" oninput="saveMeta();updateAll()">
      </div>
      <div style="flex:1; padding:15px;">
        <div style="font-size:10px; color:var(--muted); margin-bottom:5px;">BİTİŞ TARİHİ</div>
        <input class="field-inp" type="date" id="deadlineDate" oninput="saveMeta();updateAll()">
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="sec-header"><span class="sec-title">❝ ALINTILAR</span></div>
    <div id="quotesList"></div>
    <div class="quote-form">
      <textarea class="quote-ta" id="quoteInput" placeholder="Bir alıntı yaz..."></textarea>
      <div style="display:flex; justify-content:space-between;">
        <input type="number" id="quotePageInp" placeholder="S." style="width:60px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:5px; border-radius:5px;">
        <button class="add-btn" onclick="addQuote()">+ Ekle</button>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="sec-header"><span class="sec-title">📝 NOTLAR</span></div>
    <textarea class="notes-ta" id="notesArea" placeholder="Düşüncelerini buraya yaz..." oninput="saveNotes()"></textarea>
  </div>
</div>

<script>
let pages = parseInt(localStorage.getItem('book_pages'))||0;
let step = 1;
let quotes = JSON.parse(localStorage.getItem('book_quotes')||'[]');
let finished = false;

function init(){
  document.getElementById('bookName').value = localStorage.getItem('book_name')||'';
  document.getElementById('authorName').value = localStorage.getItem('book_author')||'';
  document.getElementById('totalPages').value = localStorage.getItem('book_total')||'';
  document.getElementById('deadlineDate').value = localStorage.getItem('book_deadline')||'';
  document.getElementById('notesArea').value = localStorage.getItem('book_notes')||'';
  updateAll(); renderQuotes();
}

function saveMeta(){
  const bName = document.getElementById('bookName').value;
  const aName = document.getElementById('authorName').value;
  localStorage.setItem('book_name', bName);
  localStorage.setItem('book_author', aName);
  localStorage.setItem('book_total', document.getElementById('totalPages').value);
  localStorage.setItem('book_deadline', document.getElementById('deadlineDate').value);
  
  // 3. Başlığı ve Yazarı güncelle
  document.getElementById('dynTitle').innerHTML = bName ? bName : 'Kitap <span>Günlüğü</span>';
  document.getElementById('dynAuthor').textContent = aName ? aName : 'Okuma sürecinizi takip edin';
  updateAll();
}

function saveNotes(){ localStorage.setItem('book_notes', document.getElementById('notesArea').value); }

function addPages(delta){
  const prev = pages;
  pages = Math.max(0, pages + delta);
  localStorage.setItem('book_pages', pages);
  const total = parseInt(document.getElementById('totalPages').value)||0;
  if(total > 0 && pages >= total && prev < total && !finished){
    finished = true; launchConfetti();
  }
  if(pages < (total||Infinity)) finished = false;
  updateAll();
}

function setStep(n, btn){
  step = n;
  document.querySelectorAll('.step-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function updateAll(){
  const total = parseInt(document.getElementById('totalPages').value)||0;
  const deadline = document.getElementById('deadlineDate').value;
  document.getElementById('pageNum').textContent = pages;
  document.getElementById('stat-read').textContent = pages;
  document.getElementById('stat-left').textContent = total ? Math.max(0,total-pages) : '—';

  // 1. Emoji & İlerleme Mantığı
  let statusHtml = '—';
  if(total > 0){
    const pct = (pages / total) * 100;
    document.getElementById('progFill').style.width = Math.min(100, pct) + '%';
    
    if(pct >= 100) statusHtml = '🥹 <span style="color:var(--accent2)">BİTTİ</span>';
    else if(pct >= 70) statusHtml = '🫅🏻 <span style="color:var(--accent3)">BİTMEK ÜZERE</span>';
    else if(pct >= 30) statusHtml = '🤩 <span style="color:var(--accent)">HARİKA</span>';
    else statusHtml = '🙂 <span style="color:var(--muted)">BAŞLADIK</span>';
  }
  document.getElementById('statusEmoji').innerHTML = statusHtml;

  if(deadline){
    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(deadline); end.setHours(0,0,0,0);
    const diff = Math.ceil((end-today)/(1000*60*60*24));
    document.getElementById('stat-days').textContent = diff > 0 ? diff : (diff === 0 ? 'Bgn' : 'Geçti');
  }
}

function renderQuotes(){
  const list = document.getElementById('quotesList'); list.innerHTML = '';
  if(!quotes.length) list.innerHTML = '<div style="padding:20px; color:var(--muted); text-align:center; font-size:12px;">Henüz alıntı yok...</div>';
  quotes.forEach((q,i)=>{
    list.innerHTML += `<div style="padding:15px; border-bottom:1px solid var(--border);"><div style="font-size:14px; margin-bottom:5px;">${q.text}</div><div style="font-size:10px; color:var(--muted); display:flex; justify-content:space-between;"><span>${q.page?'s.'+q.page+' · ':''}${q.date}</span><button onclick="deleteQuote(${i})" style="background:none; border:none; color:var(--danger); cursor:pointer;">SİL</button></div></div>`;
  });
}
function addQuote(){
  const text = document.getElementById('quoteInput').value;
  if(!text) return;
  quotes.unshift({ text, page: document.getElementById('quotePageInp').value, date: new Date().toLocaleDateString('tr-TR') });
  localStorage.setItem('book_quotes', JSON.stringify(quotes));
  document.getElementById('quoteInput').value = ''; renderQuotes();
}
function deleteQuote(i){ quotes.splice(i,1); localStorage.setItem('book_quotes', JSON.stringify(quotes)); renderQuotes(); }

/* Confetti */
const canvas=document.getElementById('confettiCanvas'), ctx=canvas.getContext('2d');
function launchConfetti(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  let p=[]; for(let i=0;i<100;i++) p.push({x:Math.random()*canvas.width, y:-20, c:['#f0c93a','#4ef0a0','#4ec8f0'][Math.floor(Math.random()*3)], v:Math.random()*3+2, s:Math.random()*5+2});
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    p.forEach(i=>{ i.y+=i.v; ctx.fillStyle=i.c; ctx.fillRect(i.x,i.y,i.s,i.s); });
    p=p.filter(i=>i.y<canvas.height); if(p.length) requestAnimationFrame(draw);
  }
  draw();
}

init();
</script>
</body>
</html>
