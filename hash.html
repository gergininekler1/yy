<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3 Adım Not Arşivi</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --surface: #1e1e24;
            --surface-light: #2b2b36;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --accent: #e50914; /* Netflix tarzı ince vurgu */
            --accent-hover: #b80710;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Netflix Tarzı Kare Kart Navigasyonu */
        header {
            padding: 20px 15px 10px 15px;
            background: linear-gradient(to bottom, rgba(15,15,17,1) 0%, rgba(15,15,17,0) 100%);
        }

        .nav-cards {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 10px;
        }

        .nav-cards::-webkit-scrollbar { display: none; }

        .card {
            scroll-snap-align: start;
            flex: 0 0 85px;
            height: 85px;
            background-color: var(--surface);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .card.active {
            color: var(--text-primary);
            border-color: var(--accent);
            background-color: var(--surface-light);
            transform: scale(1.05);
        }

        .card svg {
            width: 24px;
            height: 24px;
            margin-bottom: 8px;
            fill: currentColor;
        }

        /* Ana İçerik Alanı */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            position: relative;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
            height: 100%;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Araç Kutuları ve Butonlar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: var(--surface);
            padding: 10px;
            border-radius: var(--radius);
        }

        .timer-btns {
            display: flex;
            gap: 8px;
        }

        button {
            background-color: var(--surface-light);
            color: var(--text-primary);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active { background-color: var(--accent); }
        
        .accent-btn {
            background-color: var(--accent);
            color: white;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 1rem;
            margin-top: 15px;
            width: 100%;
        }

        .accent-btn:active { background-color: var(--accent-hover); }

        #timer-display {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            color: var(--accent);
            font-size: 1.1rem;
        }

        /* Metin Alanları */
        textarea {
            width: 100%;
            flex: 1;
            background-color: var(--surface);
            color: var(--text-primary);
            border: none;
            border-radius: var(--radius);
            padding: 15px;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        textarea::placeholder { color: var(--text-secondary); }

        .readonly-box {
            background-color: var(--surface-light);
            padding: 15px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.4;
        }
        
        .readonly-box:empty::before {
            content: "Taslak boş...";
            font-style: italic;
        }

        /* Kategori ve Etiket Girişi */
        .category-input {
            width: 100%;
            background-color: var(--surface);
            color: var(--text-primary);
            border: none;
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 15px;
            font-size: 0.95rem;
            outline: none;
        }

        /* Toast Bildirim */
        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: bottom 0.3s ease;
            z-index: 1000;
        }

    </style>
</head>
<body>

    <header>
        <div class="nav-cards">
            <div class="card active" onclick="switchTab('taslak', this)">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Taslak
            </div>
            <div class="card" onclick="switchTab('revize', this)">
                <svg viewBox="0 0 24 24"><path d="M12 4L10.59 5.41 16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/></svg>
                Revize
            </div>
            <div class="card" onclick="switchTab('final', this)">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                Final
            </div>
        </div>
    </header>

    <main>
        <div id="taslak" class="tab-content active">
            <div class="toolbar">
                <div class="timer-btns">
                    <button onclick="startChallenge(5)">5 dk</button>
                    <button onclick="startChallenge(10)">10 dk</button>
                    <button onclick="startChallenge(20)">20 dk</button>
                </div>
                <div id="timer-display">00:00</div>
            </div>
            <textarea id="taslak-input" placeholder="Aklındakileri buraya dök... Sansürsüz, kuralsız."></textarea>
        </div>

        <div id="revize" class="tab-content">
            <div class="readonly-box" id="taslak-ref"></div>
            <textarea id="revize-input" placeholder="Taslağını buraya bakarak temize çek..."></textarea>
        </div>

        <div id="final" class="tab-content">
            <input type="text" id="kategori-input" class="category-input" placeholder="Kategori / Etiket (Örn: #proje #fikir)">
            <div class="toolbar">
                <button onclick="addTimestamp()">Saat Ekle</button>
                <button onclick="copyAll()">Tümünü Kopyala</button>
            </div>
            <textarea id="final-input" placeholder="Son dokunuşlar ve nihai metin..."></textarea>
            <button class="accent-btn" onclick="prepareToPublish()">Basıma Hazırla</button>
        </div>
    </main>

    <div id="toast">İşlem başarılı!</div>

    <script>
        // DOM Elementleri
        const taslakInput = document.getElementById('taslak-input');
        const revizeInput = document.getElementById('revize-input');
        const finalInput = document.getElementById('final-input');
        const taslakRef = document.getElementById('taslak-ref');
        const kategoriInput = document.getElementById('kategori-input');
        const timerDisplay = document.getElementById('timer-display');
        const toast = document.getElementById('toast');

        // State ve Timer
        let countdown;
        
        // Başlangıç - LocalStorage'dan Veri Çekme
        window.onload = () => {
            if(localStorage.getItem('taslak')) taslakInput.value = localStorage.getItem('taslak');
            if(localStorage.getItem('revize')) revizeInput.value = localStorage.getItem('revize');
            if(localStorage.getItem('final')) finalInput.value = localStorage.getItem('final');
            if(localStorage.getItem('kategori')) kategoriInput.value = localStorage.getItem('kategori');
            
            // Event Listeners for Auto-Save
            taslakInput.addEventListener('input', () => localStorage.setItem('taslak', taslakInput.value));
            revizeInput.addEventListener('input', () => localStorage.setItem('revize', revizeInput.value));
            finalInput.addEventListener('input', () => localStorage.setItem('final', finalInput.value));
            kategoriInput.addEventListener('input', () => localStorage.setItem('kategori', kategoriInput.value));
        };

        // Sekme Değiştirme Mantığı
        function switchTab(tabId, el) {
            // UI Güncelleme
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');

            // Sekme Geçişi Sırasındaki Otomatik Aktarım Mantığı
            if (tabId === 'revize') {
                taslakRef.innerText = taslakInput.value; // Taslağı referans kutusuna al
            } 
            else if (tabId === 'final') {
                // Eğer final kutusu boşsa, revizedeki metni otomatik aktar
                if (finalInput.value.trim() === '' && revizeInput.value.trim() !== '') {
                    finalInput.value = revizeInput.value;
                    localStorage.setItem('final', finalInput.value);
                }
            }
        }

        // Challenge (Geri Sayım) Özelliği
        function startChallenge(minutes) {
            clearInterval(countdown);
            let time = minutes * 60;
            
            updateTimerDisplay(time);
            
            countdown = setInterval(() => {
                time--;
                updateTimerDisplay(time);
                if (time <= 0) {
                    clearInterval(countdown);
                    showToast('Süre doldu!');
                    // İsteğe bağlı: süre bitince yazmayı kilitlemek istersen taslakInput.disabled = true; eklenebilir.
                }
            }, 1000);
            
            showToast(`${minutes} dakikalık odaklanma başladı.`);
        }

        function updateTimerDisplay(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }

        // Saat Ekleme İşlevi
        function addTimestamp() {
            const now = new Date();
            const timeString = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}] `;
            
            const startPos = finalInput.selectionStart;
            const endPos = finalInput.selectionEnd;
            
            finalInput.value = finalInput.value.substring(0, startPos) + timeString + finalInput.value.substring(endPos, finalInput.value.length);
            
            // Cursor'ı güncellenen metnin sonuna taşı
            finalInput.selectionStart = finalInput.selectionEnd = startPos + timeString.length;
            finalInput.focus();
            
            localStorage.setItem('final', finalInput.value);
        }

        // Tümünü Kopyala İşlevi
        function copyAll() {
            const textToCopy = finalInput.value;
            if (!textToCopy) return showToast("Kopyalanacak metin yok!");
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast("Tüm metin kopyalandı!");
            }).catch(() => {
                showToast("Kopyalama başarısız!");
            });
        }

        // Basıma Hazırla İşlevi (İleride API veya dışa aktarım için)
        function prepareToPublish() {
            const kat = kategoriInput.value || "Kategorisiz";
            const icerik = finalInput.value;
            
            if(!icerik) {
                showToast("Metin alanı boş!");
                return;
            }

            console.log("--- KAYIT EDİLEN NOT ---");
            console.log("Kategori:", kat);
            console.log("İçerik:", icerik);
            
            showToast("Not basıma hazır ve konsola yazdırıldı!");
            
            // Burada notu temizleme veya arşive atma işlemleri eklenebilir
        }

        // Basit Toast Bildirim Sistemi
        function showToast(msg) {
            toast.innerText = msg;
            toast.style.bottom = "20px";
            setTimeout(() => {
                toast.style.bottom = "-50px";
            }, 3000);
        }
    </script>
</body>
</html>
