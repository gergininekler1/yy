<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitap Takibi V3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161a24; --surface2: #1e2333; --border: #2a3045;
    --accent: #f0c93a; --accent2: #4ef0a0; --accent3: #4ec8f0; --danger: #f05a4e;
    --text: #e8ecf7; --muted: #6b7599; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
    min-height: 100vh; padding: 20px 20px 80px;
  }
  .container { max-width: 700px; margin: 0 auto; position: relative; }

  /* ── Üst Kontroller ── */
  .lib-controls {
    display: flex; gap: 10px; margin-bottom: 24px;
    background: var(--surface); padding: 10px; border-radius: var(--radius);
    border: 1px solid var(--border); align-items: center;
  }
  .book-select {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; font-family: 'Syne', sans-serif; font-weight: 600; outline: none;
  }
  .lib-btn {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; transition: 0.2s;
  }
  .lib-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ── Header & Kapak ── */
  header { text-align: center; margin-bottom: 24px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; margin-bottom: 10px; }
  h1 span { color: var(--accent); }
  
  #coverDisplay {
    width: 180px; height: 260px; margin: 0 auto 20px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    display: none; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .book-fields {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-top: 20px;
  }
  .book-field { display: flex; flex-direction: column; background: var(--surface); padding: 10px; }
  .book-field.full { grid-column: span 2; }
  .field-tag { font-size: 9px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; letter-spacing: 1px; }
  .field-inp {
    background: transparent; border: none; outline: none; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
  }

  /* ── Stats & Counter ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
  .stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

  .counter-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 30px 20px; text-align: center; margin-bottom: 20px;
  }
  .page-display { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; line-height: 1; margin: 10px 0; }
  .cnt-btn {
    width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 24px; font-weight: 700; transition: 0.2s;
  }
  .cnt-plus { background: var(--accent); color: #000; }
  .cnt-minus { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* ── Geçmiş Tablosu ── */
  .history-section { margin-top: 40px; }
  .history-table {
    width: 100%; border-collapse: collapse; background: var(--surface);
    border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
    font-size: 13px;
  }
  .history-table th { background: var(--surface2); padding: 12px; text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; }
  .history-table td { padding: 12px; border-top: 1px solid var(--border); }
  .hist-badge { padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 11px; }
  .badge-pos { background: rgba(78,240,160,0.1); color: var(--accent2); }
  .badge-neg { background: rgba(240,90,78,0.1); color: var(--danger); }

  /* ── Diğer ── */
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .sec-header { padding: 12px; background: var(--surface2); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; border-bottom: 1px solid var(--border); }
  .notes-ta { width: 100%; min-height: 100px; background: transparent; border: none; color: var(--text); padding: 15px; font-family: inherit; resize: vertical; outline: none; }
  
  .footer-row { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
  .io-btn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }
  .io-btn:hover { color: var(--text); border-color: var(--muted); }

  #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<div class="container">
  <div class="lib-controls">
    <select class="book-select" id="bookSelect" onchange="switchBook()"></select>
    <button class="lib-btn" onclick="createNewBook()">+ Yeni</button>
  </div>

  <header>
    <h1>Kitap <span>Günlüğü</span></h1>
    <img id="coverDisplay" alt="Kapak">
    
    <div class="book-fields">
      <div class="book-field full">
        <span class="field-tag">Kitap Adı</span>
        <input class="field-inp" id="bName" placeholder="Kitap ismi..." oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Yazar</span>
        <input class="field-inp" id="bAuthor" placeholder="Yazar..." oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Kapak Görsel URL</span>
        <input class="field-inp" id="bCover" placeholder="https://..." oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Başlangıç Tarihi</span>
        <input class="field-inp" type="date" id="bStart" oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Hedef Bitiş</span>
        <input class="field-inp" type="date" id="bDeadline" oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Toplam Sayfa</span>
        <input class="field-inp" type="number" id="bTotal" placeholder="0" oninput="saveMeta()">
      </div>
      <div class="book-field">
        <span class="field-tag">Günlük Hedef</span>
        <div id="paceVal" style="font-size:12px; font-weight:700; color:var(--accent);">—</div>
      </div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)" id="stat-read">0</div><div class="stat-lbl">Okunan</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent2)" id="stat-left">—</div><div class="stat-lbl">Kalan</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent3)" id="stat-days">—</div><div class="stat-lbl">Kalan Gün</div></div>
  </div>

  <div class="counter-card">
    <div style="display:flex; align-items:center; justify-content:center; gap:30px;">
      <button class="cnt-btn cnt-minus" onclick="addPages(-1)">−</button>
      <div class="page-display" id="pageNum">0</div>
      <button class="cnt-btn cnt-plus" onclick="addPages(1)">+</button>
    </div>
    <div style="margin-top:15px; font-size:11px; color:var(--muted);" id="progText">...</div>
  </div>

  <div class="section-card">
    <div class="sec-header">NOTLAR</div>
    <textarea class="notes-ta" id="notesArea" placeholder="Okurken aldığın notlar..." oninput="saveMeta()"></textarea>
  </div>

  <div class="history-section">
    <div class="sec-header" style="background:transparent; border:none; margin-bottom:10px;">SON 5 OKUMA KAYDI</div>
    <table class="history-table">
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Miktar</th>
          <th>Toplam</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>

  <div class="footer-row">
    <button class="io-btn" onclick="exportData()">💾 Dışa Aktar (.json)</button>
    <button class="io-btn" onclick="document.getElementById('importFile').click()">📂 İçe Aktar</button>
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
    <button class="io-btn" style="color:var(--danger)" onclick="deleteCurrentBook()">🗑 Sil</button>
  </div>
</div>

<script>
let appData = { activeId: null, books: [] };
let currentBook = null;

function init() {
  const saved = localStorage.getItem('app_library_v3');
  if(saved) {
    appData = JSON.parse(saved);
  }
  if(!appData.books || appData.books.length === 0) {
    createNewBook();
  } else {
    currentBook = appData.books.find(b => b.id === appData.activeId) || appData.books[0];
    appData.activeId = currentBook.id;
    refreshUI();
  }
}

function saveData() {
  localStorage.setItem('app_library_v3', JSON.stringify(appData));
}

function createNewBook() {
  const newBook = {
    id: Date.now().toString(), name: '', author: '', cover: '', start: '', deadline: '',
    total: 0, pages: 0, notes: '', history: []
  };
  appData.books.push(newBook);
  appData.activeId = newBook.id;
  currentBook = newBook;
  saveData();
  refreshUI();
}

function switchBook() {
  appData.activeId = document.getElementById('bookSelect').value;
  currentBook = appData.books.find(b => b.id === appData.activeId);
  saveData();
  refreshUI();
}

function saveMeta() {
  currentBook.name = document.getElementById('bName').value;
  currentBook.author = document.getElementById('bAuthor').value;
  currentBook.cover = document.getElementById('bCover').value;
  currentBook.start = document.getElementById('bStart').value;
  currentBook.deadline = document.getElementById('bDeadline').value;
  currentBook.total = parseInt(document.getElementById('bTotal').value) || 0;
  currentBook.notes = document.getElementById('notesArea').value;
  saveData();
  updateCalculations();
  updateCover();
  updateDropdown();
}

function addPages(delta) {
  const prev = currentBook.pages;
  currentBook.pages = Math.max(0, currentBook.pages + delta);
  
  if(delta !== 0) {
    currentBook.history.unshift({
      date: new Date().toLocaleDateString('tr-TR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}),
      delta: delta,
      total: currentBook.pages
    });
    if(currentBook.history.length > 5) currentBook.history.pop();
  }
  
  if(currentBook.total > 0 && currentBook.pages >= currentBook.total && prev < currentBook.total) {
    launchConfetti();
  }
  saveData();
  updateCalculations();
  renderHistory();
}

function refreshUI() {
  document.getElementById('bName').value = currentBook.name || '';
  document.getElementById('bAuthor').value = currentBook.author || '';
  document.getElementById('bCover').value = currentBook.cover || '';
  document.getElementById('bStart').value = currentBook.start || '';
  document.getElementById('bDeadline').value = currentBook.deadline || '';
  document.getElementById('bTotal').value = currentBook.total || '';
  document.getElementById('notesArea').value = currentBook.notes || '';
  
  updateDropdown();
  updateCover();
  updateCalculations();
  renderHistory();
}

function updateDropdown() {
  const sel = document.getElementById('bookSelect');
  sel.innerHTML = '';
  appData.books.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id;
    opt.textContent = b.name || '(İsimsiz Kitap)';
    if(b.id === appData.activeId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateCover() {
  const img = document.getElementById('coverDisplay');
  if(currentBook.cover) {
    img.src = currentBook.cover;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }
}

function updateCalculations() {
  const p = currentBook.pages;
  const t = currentBook.total;
  const d = currentBook.deadline;

  document.getElementById('pageNum').textContent = p;
  document.getElementById('stat-read').textContent = p;
  document.getElementById('stat-left').textContent = t ? Math.max(0, t - p) : '—';

  let diffDays = 0;
  if(d) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(d); end.setHours(0,0,0,0);
    diffDays = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
    document.getElementById('stat-days').textContent = diffDays > 0 ? diffDays : (diffDays === 0 ? 'Bugün' : 'Bitti');
  }

  if(t > 0) {
    const pct = Math.min(100, Math.round((p/t)*100));
    document.getElementById('progText').textContent = `%${pct} tamamlandı (${t - p} sayfa kaldı)`;
    if(diffDays > 0 && t-p > 0) {
      document.getElementById('paceVal').textContent = `Günlük ${Math.ceil((t-p)/diffDays)} sayfa`;
    } else {
      document.getElementById('paceVal').textContent = '—';
    }
  }
}

function renderHistory() {
  const body = document.getElementById('historyBody');
  body.innerHTML = '';
  if(!currentBook.history || currentBook.history.length === 0) {
    body.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--border);">Kayıt yok.</td></tr>';
    return;
  }
  currentBook.history.slice(0, 5).forEach(h => {
    const isPos = h.delta > 0;
    body.innerHTML += `<tr>
      <td>${h.date}</td>
      <td><span class="hist-badge ${isPos?'badge-pos':'badge-neg'}">${isPos?'+':''}${h.delta}</span></td>
      <td>${h.total}</td>
    </tr>`;
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kitap-takibi-yedek-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if(imported.books && imported.activeId) {
        appData = imported;
        currentBook = appData.books.find(b => b.id === appData.activeId);
        saveData();
        refreshUI();
        alert('Veriler başarıyla içe aktarıldı.');
      }
    } catch(err) {
      alert('Hatalı dosya formatı!');
    }
  };
  reader.readAsText(file);
}

function deleteCurrentBook() {
  if(appData.books.length <= 1) { alert('Son kitabı silemezsin!'); return; }
  if(!confirm('Bu kitabı silmek istediğine emin misin?')) return;
  appData.books = appData.books.filter(b => b.id !== currentBook.id);
  appData.activeId = appData.books[0].id;
  currentBook = appData.books[0];
  saveData();
  refreshUI();
}

function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas'), ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  let particles = [];
  for(let i=0; i<100; i++) {
    particles.push({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height - canvas.height,
      color: ['#f0c93a','#4ef0a0','#4ec8f0'][Math.floor(Math.random()*3)],
      size: Math.random()*7+3, vy: Math.random()*3+2
    });
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.y += p.vy;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    particles = particles.filter(p => p.y < canvas.height);
    if(particles.length) requestAnimationFrame(draw);
  }
  draw();
}

init();
</script>
</body>
</html>
