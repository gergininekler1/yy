<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Note Space - V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #fcfaf2;
            --boho-terracotta: #d48166;
            --boho-sage: #7d8c7d;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #3d3d3d;
            --text-muted: #7a7a7a;
            --shadow: 0 8px 32px rgba(212, 129, 102, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; }

        .glass { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--shadow); }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 500; color: var(--boho-terracotta); }

        /* Yan Menü & Arşiv */
        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; z-index: 100; padding: 30px 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
        #sideMenu.active { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.15); display: none; z-index: 99; }

        .archive-item { padding: 15px; margin-bottom: 10px; border-bottom: 1px solid var(--glass-border); position: relative; }
        .copy-archive-btn { position: absolute; right: 5px; top: 15px; cursor: pointer; color: var(--boho-terracotta); font-size: 18px; }

        .workflow-tabs { display: flex; gap: 8px; padding: 10px 20px; }
        .tab { padding: 10px 18px; border-radius: 50px; font-size: 13px; border: 1px solid var(--glass-border); background: var(--glass-bg); cursor: pointer; transition: 0.3s; color: var(--text-muted); }
        .tab.active { background: var(--boho-terracotta); color: white; border-color: var(--boho-terracotta); }

        .main-container { padding: 0 20px 100px; }
        .editor-section { margin-top: 15px; display: flex; flex-direction: column; gap: 15px; }

        .note-box { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--boho-terracotta); font-weight: 600; }

        textarea { width: 100%; height: 160px; background: transparent; border: none; font-size: 16px; outline: none; color: var(--text-main); resize: none; }
        .readonly-preview { background: rgba(0,0,0,0.03); border-radius: 15px; padding: 15px; font-size: 14px; color: var(--text-muted); min-height: 80px; max-height: 150px; overflow-y: auto; line-height: 1.5; }

        .records-section { margin-top: 30px; }
        .cards-grid { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: none; }
        .cards-grid::-webkit-scrollbar { display: none; }

        .note-card { min-width: 130px; height: 130px; padding: 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .note-card:active { transform: scale(0.95); }

        .icon-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); width: 44px; height: 44px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="menu-overlay" onclick="toggleMenu()"></div>
    
    <div id="sideMenu" class="glass">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h3 style="font-weight:500;">Arşiv</h3>
            <span class="material-symbols-rounded" onclick="toggleMenu()" style="cursor:pointer">close</span>
        </div>
        <div id="archiveContainer">
            <p style="font-size:12px; color:var(--text-muted)">Henüz arşivlenmiş bir final notu yok.</p>
        </div>
        <hr style="margin:25px 0; border:0; border-top:1px solid var(--glass-border);">
        <button class="tab" onclick="clearAll()" style="width:100%; color:#d9534f">Verileri Temizle</button>
    </div>

    <header>
        <div class="logo">Aura.</div>
        <button class="icon-btn" onclick="toggleMenu()">
            <span class="material-symbols-rounded">more_vert</span>
        </button>
    </header>

    <div class="workflow-tabs">
        <button class="tab active" onclick="switchTab('taslak', this)">Taslak</button>
        <button class="tab" onclick="switchTab('revize', this)">Revize</button>
        <button class="tab" onclick="switchTab('final', this)">Final</button>
    </div>

    <div class="main-container">
        <div class="editor-section">
            <div class="glass note-box" id="referenceBox" style="display: none;">
                <span class="box-label">Referans Not</span>
                <div class="readonly-preview" id="refContent">Kayıtlardan bir not seçerek buraya aktarabilirsin.</div>
            </div>

            <div class="glass note-box">
                <span class="box-label" id="boxLabel">Yeni Taslak</span>
                <textarea id="noteInput" placeholder="Notunu yazmaya baş..."></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span id="statusMsg" style="font-size:11px; color:var(--boho-sage)"></span>
                    <button class="icon-btn" style="background: var(--boho-terracotta); color: white;" onclick="handleAction()">
                        <span class="material-symbols-rounded">check</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="records-section">
            <h3 style="font-weight:400; font-size:16px;">Kayıtlar</h3>
            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('aura_notes')) || [];
        let archive = JSON.parse(localStorage.getItem('aura_archive')) || [];
        let currentMode = 'taslak';

        renderNotes();
        renderArchive();

        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.querySelector('.menu-overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        function switchTab(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            const refBox = document.getElementById('referenceBox');
            const boxLabel = document.getElementById('boxLabel');
            
            if (mode === 'taslak') {
                refBox.style.display = 'none';
                boxLabel.innerText = "Yeni Taslak";
            } else {
                refBox.style.display = 'flex';
                boxLabel.innerText = mode === 'revize' ? "Revize İşlemi" : "Final Dokunuşlar";
            }
        }

        // Kayıtlardaki nota basınca referansa atar
        function selectForReference(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                document.getElementById('refContent').innerText = note.text;
                // Eğer taslak modundaysak, referans kutusunu görünür yap (opsiyonel)
                document.getElementById('referenceBox').style.display = 'flex';
                showStatus("Not referansa eklendi");
            }
        }

        function handleAction() {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return;

            if (currentMode === 'final') {
                archiveNote(text);
            } else {
                saveNote(text);
            }
        }

        function saveNote(text) {
            const newNote = {
                id: Date.now(),
                text: text,
                type: currentMode,
                date: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })
            };
            notes.unshift(newNote);
            updateStorage();
            document.getElementById('noteInput').value = '';
            renderNotes();
            showStatus("Not kaydedildi");
        }

        function archiveNote(text) {
            const arcNote = {
                id: Date.now(),
                text: text,
                date: new Date().toLocaleDateString('tr-TR')
            };
            archive.unshift(arcNote);
            // Final yapıldığında inputu temizle
            document.getElementById('noteInput').value = '';
            updateStorage();
            renderArchive();
            renderNotes(); // Eğer listeden silinmesini istiyorsan burası tetiklenir
            showStatus("Final notu arşivlendi!");
        }

        function renderNotes() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'glass note-card';
                card.onclick = () => selectForReference(note.id);
                card.innerHTML = `
                    <span class="box-label" style="font-size:8px">${note.type}</span>
                    <p style="font-size:12px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;">${note.text}</p>
                    <span style="font-size:9px; color:var(--text-muted)">${note.date}</span>
                `;
                grid.appendChild(card);
            });
        }

        function renderArchive() {
            const container = document.getElementById('archiveContainer');
            if (archive.length === 0) {
                container.innerHTML = '<p style="font-size:12px; color:var(--text-muted)">Arşiv boş.</p>';
                return;
            }
            container.innerHTML = '';
            archive.forEach(item => {
                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerHTML = `
                    <p style="font-size:13px; padding-right:25px;">${item.text}</p>
                    <span style="font-size:10px; color:var(--text-muted)">${item.date}</span>
                    <span class="material-symbols-rounded copy-archive-btn" onclick="copyToClipboard('${item.text.replace(/'/g, "\\'")}')">content_copy</span>
                `;
                container.appendChild(div);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showStatus("Arşivden kopyalandı!");
            });
        }

        function updateStorage() {
            localStorage.setItem('aura_notes', JSON.stringify(notes));
            localStorage.setItem('aura_archive', JSON.stringify(archive));
        }

        function showStatus(msg) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            setTimeout(() => el.innerText = '', 2000);
        }

        function clearAll() {
            if(confirm("Tüm veriler silinecek!")) {
                localStorage.clear();
                notes = []; archive = [];
                renderNotes(); renderArchive();
                toggleMenu();
            }
        }
    </script>
</body>
</html>
