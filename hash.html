<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimptopus Pro - Efsanevi Versiyon</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #fcfaf2;
            --boho-terracotta: #d48166;
            --boho-sage: #7d8c7d;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #3d3d3d;
            --text-muted: #7a7a7a;
            --shadow: 0 8px 32px rgba(212, 129, 102, 0.1);
        }

        .dark-mode {
            --bg-color: #0b0c10;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --text-muted: #888;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* 1. Nefes Alan Arka Plan */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 129, 102, 0.05), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(125, 140, 125, 0.05), transparent 40%);
            animation: auraBreath 15s ease-in-out infinite alternate;
        }

        @keyframes auraBreath {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .glass { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--shadow); }

        header, .workflow-tabs, .records-section, .timer-row { opacity: 1; transition: opacity 0.5s; }

        /* 3. Zen (Ultra-Odak) Modu */
        .zen-mode header, .zen-mode .workflow-tabs, .zen-mode .records-section, .zen-mode .timer-row, .zen-mode #referenceBox {
            opacity: 0; pointer-events: none;
        }
        .zen-mode .note-box { transform: translateY(-50px); }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 500; color: var(--boho-terracotta); }

        /* 5. Vibe / Ruh Hali Çipleri */
        .mood-selector { display: flex; gap: 8px; margin-top: 5px; }
        .mood-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .mood-dot.active { border-color: var(--text-main); transform: scale(1.2); }

        .main-container { padding: 0 20px 100px; }
        .note-box { padding: 25px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        textarea { width: 100%; height: 120px; background: transparent; border: none; font-size: 17px; outline: none; color: var(--text-main); resize: none; line-height: 1.6; }
        textarea:focus { height: 280px; }

        /* 9. Zengin Link Kartları simülasyonu */
        .link-preview { background: rgba(125, 140, 125, 0.1); padding: 8px 12px; border-radius: 12px; font-size: 12px; color: var(--boho-sage); display: inline-flex; align-items: center; gap: 5px; text-decoration: none; border: 1px solid var(--glass-border); margin-top: 5px; }

        .cards-grid { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: none; }
        .note-card { min-width: 125px; height: 125px; padding: 15px; cursor: pointer; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
        
        .mood-indicator { position: absolute; top: 10px; right: 10px; width: 6px; height: 6px; border-radius: 50%; }

        .icon-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); width: 44px; height: 44px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-main); }
        
        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; z-index: 1000; padding: 30px 20px; background: var(--bg-color); }
        .side-panel.active { right: 0; }

        /* 4. Estetik Çıktı Butonu */
        #exportBtn { position: absolute; top: 20px; right: 60px; color: var(--boho-sage); cursor: pointer; }
        
        #statusMsg { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

    <header>
        <div class="logo">Chimptopus.</div>
        <div style="display: flex; gap: 10px;">
            <button class="icon-btn" onclick="toggleDarkMode()"><span class="material-symbols-rounded">dark_mode</span></button>
            <button class="icon-btn" onclick="togglePanel('sideMenu')"><span class="material-symbols-rounded">menu</span></button>
        </div>
    </header>

    <div class="workflow-tabs" style="display: flex; gap: 8px; padding: 10px 20px;">
        <button class="tab active" onclick="switchTab('taslak', this)" id="tab-taslak" style="padding: 10px 18px; border-radius: 50px; font-size: 13px; border: 1px solid var(--glass-border); background: var(--glass-bg); cursor: pointer;">Taslak</button>
        <button class="tab" onclick="switchTab('revize', this)" style="padding: 10px 18px; border-radius: 50px; font-size: 13px; border: 1px solid var(--glass-border); background: var(--glass-bg); cursor: pointer;">Revize</button>
        <button class="tab" onclick="switchTab('final', this)" style="padding: 10px 18px; border-radius: 50px; font-size: 13px; border: 1px solid var(--glass-border); background: var(--glass-bg); cursor: pointer;">Final</button>
    </div>

    <div class="main-container">
        <div class="editor-section" style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;">
            
            <div class="glass note-box" id="referenceBox" style="display: none;">
                <span style="font-size: 9px; color: var(--boho-terracotta); font-weight: 600; text-transform: uppercase;">Referans</span>
                <div id="refContent" style="font-size: 14px; color: var(--text-muted); max-height: 80px; overflow-y: auto;"></div>
            </div>

            <div class="glass note-box" id="editorBox">
                <span class="material-symbols-rounded" id="exportBtn" onclick="prepareExport()" title="Görüntü Olarak Hazırla">photo_camera</span>
                
                <div class="box-header">
                    <span id="boxLabel" style="font-size: 9px; color: var(--boho-terracotta); font-weight: 600; text-transform: uppercase;">Yeni Taslak</span>
                    <div class="mood-selector" id="moodSelector">
                        <div class="mood-dot active" style="background: #d48166;" onclick="setMood('#d48166', this)"></div>
                        <div class="mood-dot" style="background: #7d8c7d;" onclick="setMood('#7d8c7d', this)"></div>
                        <div class="mood-dot" style="background: #6b878c;" onclick="setMood('#6b878c', this)"></div>
                        <div class="mood-dot" style="background: #8c7d87;" onclick="setMood('#8c7d87', this)"></div>
                    </div>
                </div>

                <div class="timer-row" style="display: flex; gap: 8px; margin-top: 5px;">
                    <button class="icon-btn" style="width:auto; height:30px; padding:0 10px; font-size:11px;" onclick="startCountdown(5)">5dk</button>
                    <button class="icon-btn" style="width:auto; height:30px; padding:0 10px; font-size:11px;" onclick="startCountdown(15)">15dk</button>
                    <span id="timerDisplay" style="margin-left:auto; font-size:12px; font-weight:600; color:var(--boho-terracotta)"></span>
                </div>

                <textarea id="noteInput" placeholder="Düşüncelerini buraya dök..." onfocus="enterZen()" onblur="exitZen()" oninput="handleInput()"></textarea>
                
                <div id="linkContainer"></div>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span id="statusMsg" style="color:var(--boho-sage)"></span>
                        <span class="material-symbols-rounded" style="font-size:18px; cursor:pointer; color:var(--text-muted);" onclick="undoText()" title="Geri Al">history</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="icon-btn" onclick="insertTimestamp()"><span class="material-symbols-rounded">schedule</span></button>
                        <button class="icon-btn" style="background: var(--boho-terracotta); color: white; border: none;" onclick="handleAction()"><span class="material-symbols-rounded">done_all</span></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="records-section" style="margin-top: 30px;">
            <h3 style="font-weight:400; font-size:16px; margin-bottom: 10px;">Kayıtlar</h3>
            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>

    <div id="sideMenu" class="side-panel">
        <h2 style="margin-bottom:20px;">Chimptopus Menü</h2>
        <button class="glass" style="width:100%; padding:20px; text-align:left; border:none; margin-bottom:10px;" onclick="togglePanel('sideMenu')">Kapat</button>
        <button class="glass" style="width:100%; padding:20px; text-align:left; border:none; color:#d9534f" onclick="clearAll()">Tüm Verileri Sıfırla</button>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('chimptopus_v3_notes')) || [];
        let currentMode = 'taslak';
        let selectedMood = '#d48166';
        let textHistory = [];
        let timer;

        function handleInput() {
            const val = document.getElementById('noteInput').value;
            // Zaman Makinesi için geçmiş tutma
            if (textHistory[textHistory.length - 1] !== val) {
                textHistory.push(val);
                if (textHistory.length > 20) textHistory.shift();
            }
            // 9. Link Tespiti
            detectLinks(val);
        }

        function undoText() {
            if (textHistory.length > 1) {
                textHistory.pop();
                document.getElementById('noteInput').value = textHistory[textHistory.length - 1];
            }
        }

        function detectLinks(text) {
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            const links = text.match(urlPattern);
            const container = document.getElementById('linkContainer');
            container.innerHTML = '';
            if (links) {
                links.forEach(url => {
                    const domain = new URL(url).hostname;
                    container.innerHTML += `<a href="${url}" target="_blank" class="link-preview"><span class="material-symbols-rounded" style="font-size:14px">link</span>${domain}</a>`;
                });
            }
        }

        function enterZen() { document.body.classList.add('zen-mode'); }
        function exitZen() { 
            setTimeout(() => {
                if (document.activeElement.id !== 'noteInput') document.body.classList.remove('zen-mode');
            }, 100);
        }

        function setMood(color, el) {
            selectedMood = color;
            document.querySelectorAll('.mood-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function startCountdown(mins) {
            clearInterval(timer);
            let sec = mins * 60;
            timer = setInterval(() => {
                let m = Math.floor(sec / 60);
                let s = sec % 60;
                document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (sec <= 0) { clearInterval(timer); alert("Odaklanma Süresi Bitti!"); }
                sec--;
            }, 1000);
        }

        function prepareExport() {
            // Estetik Çıktı için arayüzü temizle ve bir "Snapshot" görünümü ver
            document.body.classList.add('zen-mode');
            const editor = document.getElementById('editorBox');
            editor.style.boxShadow = "0 0 100px rgba(0,0,0,0.1)";
            showStatus("Ekran Görüntüsü Alabilirsin");
            setTimeout(() => {
                document.body.classList.remove('zen-mode');
                editor.style.boxShadow = "";
            }, 5000);
        }

        function handleAction() {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return;
            notes.unshift({
                id: Date.now(),
                text,
                type: currentMode,
                mood: selectedMood,
                time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
            });
            localStorage.setItem('chimptopus_v3_notes', JSON.stringify(notes));
            document.getElementById('noteInput').value = '';
            renderNotes();
            showStatus("Kaydedildi");
        }

        function renderNotes() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            notes.forEach(n => {
                const card = document.createElement('div');
                card.className = 'glass note-card';
                card.innerHTML = `
                    <div class="mood-indicator" style="background:${n.mood}"></div>
                    <span style="font-size:8px; font-weight:600; color:var(--boho-terracotta)">${n.type.toUpperCase()}</span>
                    <p style="font-size:12px; line-height:1.4; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;">${n.text}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span style="font-size:9px; color:var(--text-muted)">${n.time}</span>
                        <span class="material-symbols-rounded" style="font-size:14px; color:#d9534f" onclick="deleteNote(${n.id}, event)">delete</span>
                    </div>
                `;
                card.onclick = () => {
                    document.getElementById('refContent').innerText = n.text;
                    document.getElementById('referenceBox').style.display = 'flex';
                };
                grid.appendChild(card);
            });
        }

        function deleteNote(id, e) {
            e.stopPropagation();
            if(confirm("Silinsin mi?")) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('chimptopus_v3_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function insertTimestamp() {
            const ta = document.getElementById('noteInput');
            const now = new Date();
            ta.value += `[${now.getHours()}.${now.getMinutes().toString().padStart(2, '0')}] `;
            ta.focus();
        }

        function switchTab(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('boxLabel').innerText = "Yeni " + mode;
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }
        function showStatus(m) { 
            const s = document.getElementById('statusMsg');
            s.innerText = m;
            setTimeout(() => s.innerText = '', 2000);
        }
        function clearAll() { if(confirm("Tüm veriler silinecek!")) { localStorage.clear(); location.reload(); } }

        renderNotes();
    </script>
</body>
</html>
