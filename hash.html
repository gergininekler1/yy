<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Note Space - Light Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            /* Bohem & Fütüristik Açık Renk Paleti */
            --bg-color: #fcfaf2; /* Yumuşak krem */
            --boho-terracotta: #d48166;
            --boho-sage: #7d8c7d;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #3d3d3d;
            --text-muted: #7a7a7a;
            --shadow: 0 8px 32px rgba(212, 129, 102, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 129, 102, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(125, 140, 125, 0.05), transparent 30%);
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--boho-terracotta);
            letter-spacing: -1px;
        }

        /* Yan Menü (Drawer) */
        #sideMenu {
            position: fixed;
            top: 0; right: -280px;
            width: 250px; height: 100%;
            z-index: 100;
            padding: 30px 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sideMenu.active { right: 0; }

        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            display: none; z-index: 99;
        }

        /* Sekmeler */
        .workflow-tabs {
            display: flex; gap: 10px;
            padding: 10px 20px;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer; transition: 0.3s;
            color: var(--text-muted);
        }

        .tab.active {
            background: var(--boho-terracotta);
            color: white;
            border-color: var(--boho-terracotta);
        }

        /* Ana Konteyner */
        .main-container { padding: 0 20px 100px; }

        /* Editor Alanı */
        .editor-section {
            margin-top: 20px;
            display: grid;
            gap: 15px;
            transition: 0.3s;
        }

        /* Revize Modu İçin Split Görünüm */
        .editor-section.split {
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 600px) {
            .editor-section.split { grid-template-columns: 1fr; }
        }

        .note-box {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .box-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--boho-terracotta);
            font-weight: 600;
        }

        textarea {
            width: 100%; height: 200px;
            background: transparent; border: none;
            font-size: 16px; outline: none;
            color: var(--text-main); resize: none;
        }

        .readonly-preview {
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            color: var(--text-muted);
            overflow-y: auto;
            height: 200px;
        }

        /* Kayıtlar Kartları */
        .records-section { margin-top: 30px; }
        .cards-grid {
            display: flex; gap: 15px;
            overflow-x: auto; padding-bottom: 20px;
            scrollbar-width: none;
        }
        .cards-grid::-webkit-scrollbar { display: none; }

        .note-card {
            min-width: 140px; height: 140px;
            padding: 15px; cursor: pointer;
            transition: 0.3s;
            display: flex; flex-direction: column;
            justify-content: space-between;
        }
        .note-card:hover { transform: translateY(-5px); }

        /* Modal (Not Detay Görüntüleme) */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 500px;
            z-index: 1000; display: none;
            padding: 30px; opacity: 0;
            transition: 0.3s;
        }
        .modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .icon-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            width: 45px; height: 45px;
            border-radius: 15px;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .icon-btn:hover { background: #fff; color: var(--boho-terracotta); }

    </style>
</head>
<body>

    <div class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="glass">
        <h3 style="margin-bottom: 20px;">Ayarlar</h3>
        <p style="font-size: 14px; color: var(--text-muted);">Uygulama Teması: Açık</p>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--glass-border);">
        <p style="font-size: 14px; cursor: pointer;" onclick="clearAll()">Tüm Verileri Temizle</p>
    </div>

    <header>
        <div class="logo">Aura.</div>
        <button class="icon-btn" onclick="toggleMenu()">
            <span class="material-symbols-rounded">more_vert</span>
        </button>
    </header>

    <div class="workflow-tabs">
        <button class="tab active" onclick="switchTab('taslak', this)">Taslak</button>
        <button class="tab" onclick="switchTab('revize', this)">Revize</button>
        <button class="tab" onclick="switchTab('final', this)">Final</button>
    </div>

    <div class="main-container">
        
        <div id="editorSection" class="editor-section">
            <div class="glass note-box" id="mainBox">
                <span class="box-label" id="boxLabel">Yeni Not</span>
                <textarea id="noteInput" placeholder="Zihnindekileri buraya dök..."></textarea>
                <div style="display: flex; justify-content: flex-end;">
                    <button class="icon-btn" style="background: var(--boho-terracotta); color: white;" onclick="saveNote()">
                        <span class="material-symbols-rounded">check</span>
                    </button>
                </div>
            </div>

            <div class="glass note-box" id="referenceBox" style="display: none;">
                <span class="box-label">Taslak Referansı</span>
                <div class="readonly-preview" id="refContent">Henüz taslak notun yok.</div>
            </div>
        </div>

        <div class="records-section">
            <h3 style="margin-bottom: 15px; font-weight: 400;">Kayıtlar</h3>
            <div class="cards-grid" id="cardsGrid">
                </div>
        </div>
    </div>

    <div id="noteModal" class="glass modal">
        <span class="box-label" id="modalDate">Tarih</span>
        <div id="modalContent" style="margin: 20px 0; line-height: 1.6;"></div>
        <button class="tab" onclick="closeModal()" style="width: 100%;">Kapat</button>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('aura_notes')) || [];
        let currentMode = 'taslak';

        // Sayfa yüklendiğinde notları bas
        renderNotes();

        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.querySelector('.menu-overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        function switchTab(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            const editor = document.getElementById('editorSection');
            const refBox = document.getElementById('referenceBox');
            const boxLabel = document.getElementById('boxLabel');
            const refContent = document.getElementById('refContent');

            if (mode === 'revize') {
                editor.classList.add('split');
                refBox.style.display = 'flex';
                boxLabel.innerText = "Revize Edilen";
                // En son taslak notu referansa çek
                const lastDraft = notes.find(n => n.type === 'taslak');
                refContent.innerText = lastDraft ? lastDraft.text : "Referans alınacak taslak bulunamadı.";
            } else {
                editor.classList.remove('split');
                refBox.style.display = 'none';
                boxLabel.innerText = mode.toUpperCase();
            }
        }

        function saveNote() {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return;

            const newNote = {
                id: Date.now(),
                text: text,
                type: currentMode,
                date: new Date().toLocaleString('tr-TR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })
            };

            notes.unshift(newNote);
            localStorage.setItem('aura_notes', JSON.stringify(notes));
            document.getElementById('noteInput').value = '';
            renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'glass note-card';
                card.onclick = () => openNote(note.id);
                card.innerHTML = `
                    <span class="box-label" style="font-size:9px">${note.type}</span>
                    <p style="font-size:13px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;">${note.text}</p>
                    <span style="font-size:10px; color:var(--text-muted)">${note.date}</span>
                `;
                grid.appendChild(card);
            });
        }

        function openNote(id) {
            const note = notes.find(n => n.id === id);
            document.getElementById('modalContent').innerText = note.text;
            document.getElementById('modalDate').innerText = `${note.type.toUpperCase()} - ${note.date}`;
            document.getElementById('noteModal').classList.add('active');
            document.querySelector('.menu-overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('noteModal').classList.remove('active');
            document.querySelector('.menu-overlay').style.display = 'none';
        }

        function clearAll() {
            if(confirm("Tüm notlar silinecek. Emin misin?")) {
                localStorage.clear();
                notes = [];
                renderNotes();
                toggleMenu();
            }
        }
    </script>
</body>
</html>
