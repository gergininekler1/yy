<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimptopus Pro V8</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            --theme-primary: #d48166;
            --theme-secondary: #7d8c7d;
            
            --bg-color: #fcfaf2;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #3d3d3d;
            --text-muted: #7a7a7a;
            --line-color: rgba(0, 0, 0, 0.06);
            --grid-line: rgba(0, 0, 0, 0.03);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .dark-mode {
            --bg-color: #0b0c10;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --text-muted: #888;
            --line-color: rgba(255, 255, 255, 0.05);
            --grid-line: rgba(255, 255, 255, 0.02);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            min-height: 100vh; overflow-x: hidden;
            font-family: 'Space Grotesk', sans-serif;
            transition: background 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
            
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 129, 102, 0.05), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(125, 140, 125, 0.05), transparent 40%),
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            background-attachment: fixed;
            animation: auraBreath 15s ease-in-out infinite alternate;
        }

        @keyframes auraBreath {
            0% { background-position: 0% 0%, 0% 0%, 0 0, 0 0; }
            100% { background-position: 100% 100%, 100% 100%, 0 0, 0 0; }
        }

        .glass { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--shadow); transition: all 0.3s; }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 500; color: var(--theme-primary); transition: color 0.3s; }

        /* Sayfa Konteynerleri */
        .page-container { padding: 0 20px 100px; display: none; animation: fadeIn 0.4s ease; }
        .page-container.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .note-box { padding: 25px; display: flex; flex-direction: column; gap: 15px; position: relative; }

        textarea { 
            width: 100%; height: 160px; background-color: transparent; 
            background-image: repeating-linear-gradient(transparent, transparent 27px, var(--line-color) 28px);
            background-attachment: local; border: none; font-size: 16px; line-height: 28px; 
            outline: none; color: var(--text-main); resize: none; 
        }

        .word-challenge { display: flex; align-items: center; gap: 8px; font-size: 12px; font-family: 'Outfit', sans-serif; font-weight: 500; color: var(--theme-secondary); }
        .goal-input { width: 45px; background: transparent; border: none; border-bottom: 1px solid var(--theme-primary); color: var(--theme-primary); font-size: 12px; font-weight: 600; text-align: center; outline: none; font-family: 'Outfit', sans-serif;}
        .progress-bar-container { flex-grow: 1; height: 4px; background: var(--glass-border); border-radius: 2px; overflow: hidden; margin-left: 10px; }
        .progress-bar { height: 100%; background: var(--theme-primary); width: 0%; transition: width 0.3s ease; }

        .mood-selector { display: flex; gap: 8px; margin-top: 5px; }
        .mood-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s;}
        .mood-dot.active { border-color: var(--text-main); transform: scale(1.3); }

        .mention-link { color: var(--theme-primary); cursor: pointer; font-weight: 600; text-decoration: underline; text-decoration-style: dotted; }
        .link-preview { background: rgba(125, 140, 125, 0.1); padding: 8px 12px; border-radius: 12px; font-size: 12px; color: var(--theme-secondary); display: inline-flex; align-items: center; gap: 5px; text-decoration: none; border: 1px solid var(--glass-border); margin-top: 5px; }

        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-bar { display: flex; align-items: center; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 8px 15px; flex-grow: 1; margin-right: 10px; }
        .search-bar input { border: none; background: transparent; outline: none; color: var(--text-main); font-size: 14px; width: 100%; margin-left: 8px; font-family: 'Space Grotesk', sans-serif;}
        
        /* Kart & Liste Görünümleri */
        .cards-grid { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cards-grid::-webkit-scrollbar { display: none; }
        .cards-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 10px; }

        .note-card { min-width: 145px; padding: 15px; cursor: pointer; position: relative; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s;}
        .cards-list .note-card { width: 100%; min-height: auto; }
        
        .note-card:active { transform: scale(0.98); }
        .note-card p { word-wrap: break-word; white-space: pre-wrap; }
        .note-number { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 11px; color: var(--text-muted); opacity: 0.7; }
        .highlight { background-color: rgba(212, 129, 102, 0.3); border-radius: 3px; }

        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 320px; height: 100%; z-index: 2000; padding: 30px 20px; background: var(--bg-color); transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;}
        .side-panel.active { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 1500; }
        .menu-overlay.active { display: block; }

        .theme-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--glass-border); cursor: pointer; }
        .action-btn-menu { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); font-family: 'Space Grotesk'; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        .icon-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); width: 44px; height: 44px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-main); transition: 0.3s; }
        .action-icon { font-size:18px; cursor:pointer; opacity: 0.8; transition: 0.2s; }
        .action-icon:hover { opacity: 1; transform: scale(1.1); }

        /* Arşiv Grid/List */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .archive-list { display: flex; flex-direction: column; gap: 12px; }

        /* Yeni Alt Navigasyon (Bottom Nav) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; padding: 12px 0;
            z-index: 1000; padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-muted); cursor: pointer; transition: 0.3s;
            flex: 1; text-align: center;
        }
        .nav-item.active { color: var(--theme-primary); }
        .nav-item .icon { font-size: 24px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item.active .icon { transform: translateY(-3px) scale(1.1); }
        .nav-item .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="closePanels()"></div>

    <header>
        <div class="logo" id="mainLogo">Chimptopus.</div>
        <div style="display: flex; gap: 8px;">
            <button class="icon-btn" onclick="toggleDarkMode()" title="Karanlık Mod"><span class="material-symbols-rounded">dark_mode</span></button>
            <button class="icon-btn" onclick="togglePanel('sideMenu')" title="Ayarlar"><span class="material-symbols-rounded">settings</span></button>
        </div>
    </header>

    <div id="sideMenu" class="side-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-weight:500;">Ayarlar</h2>
            <span class="material-symbols-rounded" onclick="closePanels()" style="cursor:pointer">close</span>
        </div>
        
        <h4 style="color: var(--theme-secondary); margin-bottom: 10px; font-size: 13px;">Aura (Tema Seçimi)</h4>
        <div style="display: flex; gap: 10px; margin-bottom: 25px;">
            <div class="theme-btn" style="background: linear-gradient(45deg, #d48166, #7d8c7d);" onclick="changeTheme('#d48166', '#7d8c7d')"></div>
            <div class="theme-btn" style="background: linear-gradient(45deg, #4A90E2, #50E3C2);" onclick="changeTheme('#4A90E2', '#50E3C2')"></div>
            <div class="theme-btn" style="background: linear-gradient(45deg, #FF007F, #00F0FF);" onclick="changeTheme('#FF007F', '#00F0FF')"></div>
            <div class="theme-btn" style="background: linear-gradient(45deg, #8A9A5B, #D4B872);" onclick="changeTheme('#8A9A5B', '#D4B872')"></div>
        </div>

        <h4 style="color: var(--theme-secondary); margin-bottom: 10px; font-size: 13px;">Veri Yönetimi</h4>
        <button class="action-btn-menu" onclick="exportData()"><span class="material-symbols-rounded">download</span> Verileri Yedekle</button>
        <label class="action-btn-menu" style="cursor: pointer;">
            <span class="material-symbols-rounded">upload</span> Yedeği Yükle
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
        </label>

        <hr style="margin:25px 0; border:0; border-top:1px solid var(--glass-border);">
        <button class="action-btn-menu" onclick="clearAll()" style="color:#d9534f; border-color: rgba(217, 83, 79, 0.3);"><span class="material-symbols-rounded">delete_forever</span> Tüm Sistemi Sıfırla</button>
    </div>

    <div id="pageEditor" class="page-container active">
        
        <div class="editor-section" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="glass note-box" id="referenceBox" style="display: none; padding: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 9px; color: var(--theme-primary); font-weight: 600; text-transform: uppercase;">Referans Not</span>
                    <span id="refNum" class="note-number"></span>
                </div>
                <div id="refContent" style="font-size: 14px; line-height: 1.5; color: var(--text-muted); max-height: 100px; overflow-y: auto; margin-top: 5px;"></div>
            </div>

            <div class="glass note-box" id="editorBox">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <span id="boxLabel" style="font-size: 9px; color: var(--theme-primary); font-weight: 600; text-transform: uppercase;">Yeni Taslak</span>
                        <div class="mood-selector">
                            <div class="mood-dot active" style="background: #d48166;" onclick="setMood('#d48166', this)"></div>
                            <div class="mood-dot" style="background: #7d8c7d;" onclick="setMood('#7d8c7d', this)"></div>
                            <div class="mood-dot" style="background: #4A90E2;" onclick="setMood('#4A90E2', this)"></div>
                        </div>
                    </div>
                    <div class="timer-row" style="display: flex; gap: 8px;">
                        <button class="icon-btn" style="width:auto; height:30px; padding:0 10px; font-size:11px;" onclick="startCountdown(5)">5dk</button>
                        <span id="timerDisplay" style="font-size:12px; font-weight:600; color:var(--theme-primary); margin-left: 5px; line-height: 30px;"></span>
                    </div>
                </div>

                <textarea id="noteInput" placeholder="Yazmaya başla... (@01 yazarak referans verebilirsin)" oninput="handleInput()"></textarea>
                <div id="linkContainer"></div>

                <div class="word-challenge">
                    <span class="material-symbols-rounded" style="font-size: 16px;">edit_document</span>
                    <span id="wordCount">0</span> / 
                    <input type="number" id="wordGoal" class="goal-input" value="100" onchange="updateWordProgress()"> kelime
                    <div class="progress-bar-container"><div class="progress-bar" id="wordProgress"></div></div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--glass-border); padding-top: 10px;">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <span id="statusMsg" style="color:var(--theme-secondary); font-size: 11px; font-weight: 600;"></span>
                        <span class="material-symbols-rounded" style="font-size:20px; cursor:pointer; color:var(--text-muted);" onclick="undoText()" title="Geri Al">history</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="icon-btn" onclick="insertTimestamp()" title="Saat Ekle"><span class="material-symbols-rounded">schedule</span></button>
                        <button class="icon-btn" style="background: var(--theme-primary); color: white; border: none;" onclick="handleAction()"><span class="material-symbols-rounded">done_all</span></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="records-section" style="margin-top: 30px;">
            <div class="controls-row">
                <div class="search-bar">
                    <span class="material-symbols-rounded" style="color: var(--text-muted); font-size: 18px;">search</span>
                    <input type="text" id="searchInput" placeholder="Bu sayfada ara..." oninput="renderNotes()">
                </div>
                <button class="icon-btn" style="width: 38px; height: 38px;" onclick="toggleViewMode()" title="Görünümü Değiştir">
                    <span class="material-symbols-rounded" id="viewIcon" style="font-size: 18px;">view_list</span>
                </button>
            </div>
            <div id="dynamicBoard"></div>
        </div>
    </div>

    <div id="pageArchive" class="page-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h2 style="font-weight:500; color: var(--theme-primary);">Finaller Arşivi</h2>
            <button class="icon-btn" style="width: 32px; height: 32px;" onclick="toggleViewMode()" title="Görünümü Değiştir">
                <span class="material-symbols-rounded" id="viewIconArchive" style="font-size: 16px;">view_list</span>
            </button>
        </div>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Tamamlanmış şaheserlerin.</p>
        <div id="archiveBoard"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-taslak" onclick="switchPage('taslak')">
            <span class="material-symbols-rounded icon">edit_note</span>
            <span class="label">Taslak</span>
        </div>
        <div class="nav-item" id="nav-revize" onclick="switchPage('revize')">
            <span class="material-symbols-rounded icon">rate_review</span>
            <span class="label">Revize</span>
        </div>
        <div class="nav-item" id="nav-final" onclick="switchPage('final')">
            <span class="material-symbols-rounded icon">task_alt</span>
            <span class="label">Final</span>
        </div>
        <div class="nav-item" id="nav-archive" onclick="switchPage('archive')">
            <span class="material-symbols-rounded icon">inventory_2</span>
            <span class="label">Arşiv</span>
        </div>
    </nav>

    <script>
        let notes = JSON.parse(localStorage.getItem('chimptopus_v8_notes')) || [];
        let archive = JSON.parse(localStorage.getItem('chimptopus_v8_archive')) || [];
        let globalCounter = parseInt(localStorage.getItem('chimptopus_v8_counter')) || 1;
        let savedTheme = JSON.parse(localStorage.getItem('chimptopus_v8_theme')) || { p: '#d48166', s: '#7d8c7d' };
        
        let currentPage = 'taslak'; // Context state
        let viewMode = 'grid'; // grid veya list
        let selectedMood = '#d48166';
        let editingNoteId = null; 
        let textHistory = [];
        let timer;

        changeTheme(savedTheme.p, savedTheme.s, false);
        renderNotes();

        // --- SAYFA GEÇİŞ MANTIĞI ---
        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + page).classList.add('active');

            if (page === 'archive') {
                document.getElementById('pageEditor').classList.remove('active');
                document.getElementById('pageArchive').classList.add('active');
                document.getElementById('mainLogo').innerText = 'ChimpArchive.';
                renderArchivePage();
            } else {
                document.getElementById('pageArchive').classList.remove('active');
                document.getElementById('pageEditor').classList.add('active');
                document.getElementById('mainLogo').innerText = 'Chimptopus.';
                
                document.getElementById('boxLabel').innerText = page === 'final' ? "Arşive Gönderilecek Final" : "Yeni " + page.charAt(0).toUpperCase() + page.slice(1);
                document.getElementById('referenceBox').style.display = page === 'taslak' ? 'none' : 'flex';
                
                renderNotes(); // Otomatik olarak o sayfanın filtresiyle yükler
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- GÖRÜNÜM DEĞİŞTİRME (KART / LİSTE) ---
        function toggleViewMode() {
            viewMode = viewMode === 'grid' ? 'list' : 'grid';
            document.getElementById('viewIcon').innerText = viewMode === 'grid' ? 'view_list' : 'grid_view';
            document.getElementById('viewIconArchive').innerText = viewMode === 'grid' ? 'view_list' : 'grid_view';
            if(currentPage === 'archive') renderArchivePage();
            else renderNotes();
        }

        function handleInput() {
            const val = document.getElementById('noteInput').value;
            if (textHistory[textHistory.length - 1] !== val) {
                textHistory.push(val);
                if (textHistory.length > 20) textHistory.shift();
            }
            detectLinks(val);
            updateWordProgress();
        }

        function detectLinks(text) {
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            const links = text.match(urlPattern);
            const container = document.getElementById('linkContainer');
            container.innerHTML = '';
            if (links) {
                links.forEach(url => {
                    const domain = new URL(url).hostname;
                    container.innerHTML += `<a href="${url}" target="_blank" class="link-preview"><span class="material-symbols-rounded" style="font-size:14px">link</span>${domain}</a>`;
                });
            }
        }

        function formatMentionsAndHighlights(text, query = '') {
            let formatted = text;
            formatted = formatted.replace(/@(\d{2,})/g, '<span class="mention-link" onclick="loadMention(\'$1\', event)">@$1</span>');
            if (query) {
                const regex = new RegExp(`(${query})`, "gi");
                formatted = formatted.replace(regex, '<span class="highlight">$1</span>');
            }
            return formatted;
        }

        function loadMention(num, event) {
            if(event) event.stopPropagation();
            let found = notes.find(n => n.num === num) || archive.find(a => a.num === num);
            if(found) {
                document.getElementById('refNum').innerText = `#${found.num}`;
                document.getElementById('refContent').innerHTML = formatMentionsAndHighlights(found.text);
                document.getElementById('referenceBox').style.display = 'flex';
                showStatus("Referans Yüklendi");
                if(currentPage === 'archive') switchPage(found.type === 'final' ? 'final' : found.type);
            } else {
                alert(`${num} numaralı not bulunamadı.`);
            }
        }

        function undoText() {
            if (textHistory.length > 1) {
                textHistory.pop();
                document.getElementById('noteInput').value = textHistory[textHistory.length - 1];
                updateWordProgress();
            }
        }

        function updateWordProgress() {
            const val = document.getElementById('noteInput').value.trim();
            const words = val.length === 0 ? 0 : val.split(/\s+/).length;
            const goal = parseInt(document.getElementById('wordGoal').value) || 100;
            
            document.getElementById('wordCount').innerText = words;
            let percentage = Math.min((words / goal) * 100, 100);
            const bar = document.getElementById('wordProgress');
            bar.style.width = percentage + '%';

            if(percentage === 100 && words > 0) bar.style.background = "#50E3C2";
            else bar.style.background = "var(--theme-primary)";
        }

        function changeTheme(primary, secondary, save = true) {
            document.documentElement.style.setProperty('--theme-primary', primary);
            document.documentElement.style.setProperty('--theme-secondary', secondary);
            if(save) localStorage.setItem('chimptopus_v8_theme', JSON.stringify({p: primary, s: secondary}));
            
            const currentMoodDot = document.querySelector(`.mood-dot[style*="${primary}"]`) || document.querySelector('.mood-dot');
            if(currentMoodDot) setMood(primary, currentMoodDot);
        }

        function exportData() {
            const data = { notes, archive, counter: globalCounter, theme: savedTheme };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "chimptopus_yedek.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            closePanels();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.notes && imported.archive) {
                        notes = imported.notes;
                        archive = imported.archive;
                        globalCounter = imported.counter || globalCounter;
                        
                        localStorage.setItem('chimptopus_v8_notes', JSON.stringify(notes));
                        localStorage.setItem('chimptopus_v8_archive', JSON.stringify(archive));
                        localStorage.setItem('chimptopus_v8_counter', globalCounter);
                        
                        if(imported.theme) changeTheme(imported.theme.p, imported.theme.s);
                        
                        if(currentPage === 'archive') renderArchivePage(); else renderNotes();
                        alert("Yedek başarıyla yüklendi!");
                        closePanels();
                    } else { alert("Geçersiz dosya formatı."); }
                } catch(err) { alert("Dosya okuma hatası."); }
            };
            reader.readAsText(file);
        }

        function setMood(color, el) {
            selectedMood = color;
            document.querySelectorAll('.mood-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function editNote(id, e) {
            e.stopPropagation();
            const noteToEdit = notes.find(n => n.id === id);
            if (!noteToEdit) return;

            editingNoteId = id;
            document.getElementById('noteInput').value = noteToEdit.text;
            
            document.getElementById('boxLabel').innerText = "Düzenleniyor: #" + noteToEdit.num;
            
            const dots = document.querySelectorAll('.mood-dot');
            let found = false;
            dots.forEach(d => {
                if(d.getAttribute('style').includes(noteToEdit.mood)) { setMood(noteToEdit.mood, d); found = true; }
            });
            if(!found && dots.length > 0) setMood(noteToEdit.mood, dots[0]);

            handleInput();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleAction() {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return;
            
            if (editingNoteId) {
                const noteIndex = notes.findIndex(n => n.id === editingNoteId);
                if (noteIndex > -1) {
                    notes[noteIndex].text = text;
                    notes[noteIndex].type = currentPage; // Hangi sayfadaysa oraya kaydeder
                    notes[noteIndex].mood = selectedMood;
                    notes[noteIndex].time = new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
                }
                editingNoteId = null;
                showStatus("Güncellendi");
                localStorage.setItem('chimptopus_v8_notes', JSON.stringify(notes));
            } else {
                const formattedNum = String(globalCounter).padStart(2, '0');
                if (currentPage === 'final') {
                    archive.unshift({ id: Date.now(), num: formattedNum, text, date: new Date().toLocaleDateString('tr-TR') });
                    localStorage.setItem('chimptopus_v8_archive', JSON.stringify(archive));
                    showStatus("Arşive Eklendi!");
                } else {
                    notes.unshift({
                        id: Date.now(), num: formattedNum, text, type: currentPage, mood: selectedMood,
                        time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
                    });
                    localStorage.setItem('chimptopus_v8_notes', JSON.stringify(notes));
                    showStatus("Kaydedildi");
                }
                globalCounter++;
                localStorage.setItem('chimptopus_v8_counter', globalCounter);
            }
            
            document.getElementById('noteInput').value = '';
            document.getElementById('linkContainer').innerHTML = '';
            document.getElementById('boxLabel').innerText = currentPage === 'final' ? "Arşive Gönderilecek Final" : "Yeni " + currentPage.charAt(0).toUpperCase() + currentPage.slice(1);
            textHistory = [];
            updateWordProgress();
            renderNotes();
        }

        function createCardHTML(n, query, isArchive = false) {
            const formattedText = formatMentionsAndHighlights(n.text, query);
            
            // Arşiv kartlarında "Geri Gönder" butonu olacak
            let actionButtons = '';
            if(isArchive) {
                actionButtons = `
                    <span class="material-symbols-rounded action-icon" style="color:#d9534f;" onclick="deleteArchive(${n.id}, event)" title="Kalıcı Sil">delete</span>
                    <span class="material-symbols-rounded action-icon" style="color:var(--theme-secondary);" onclick="restoreToFinal(${n.id}, event)" title="Finale Geri Gönder">restore_page</span>
                    <span class="material-symbols-rounded action-icon" style="color:var(--theme-primary);" onclick="copyToClipboard('${n.text.replace(/'/g, "\\'")}', event)" title="Kopyala">content_copy</span>
                `;
            } else {
                actionButtons = `
                    <span class="material-symbols-rounded action-icon" style="color:var(--theme-primary)" onclick="editNote(${n.id}, event)" title="Düzenle">edit</span>
                    <span class="material-symbols-rounded action-icon" style="color:#d9534f" onclick="deleteNote(${n.id}, event)" title="Sil">delete</span>
                `;
            }

            return `
                <div class="glass note-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 5px;">
                        <span class="note-number">#${n.num}</span>
                        ${isArchive ? '<span style="font-size:8px; font-weight:600; color:var(--theme-secondary);">FİNAL</span>' : `<div style="width:8px; height:8px; border-radius:50%; background:${n.mood}"></div>`}
                    </div>
                    ${!isArchive ? `<span style="font-size:8px; font-weight:600; color:var(--theme-primary); text-transform:uppercase;">${n.type}</span>` : ''}
                    <p style="font-size:13px; line-height:1.5; margin: 8px 0; flex-grow: 1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical;">${formattedText}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center; z-index:10; border-top:1px solid var(--glass-border); padding-top:8px;">
                        <span style="font-size:10px; color:var(--text-muted)">${n.time || n.date}</span>
                        <div style="display:flex; gap: 8px;">${actionButtons}</div>
                    </div>
                </div>
            `;
        }

        function renderNotes() {
            if(currentPage === 'archive') return;
            const board = document.getElementById('dynamicBoard');
            board.innerHTML = '';
            
            const query = document.getElementById('searchInput').value.toLowerCase();
            // Yalnızca aktif sayfanın verilerini göster
            let filtered = notes.filter(n => n.type === currentPage);
            if (query) filtered = filtered.filter(n => n.text.toLowerCase().includes(query) || n.num.includes(query));

            const container = document.createElement('div');
            container.className = viewMode === 'grid' ? 'cards-grid' : 'cards-list';
            
            filtered.forEach(n => {
                const wrap = document.createElement('div');
                wrap.innerHTML = createCardHTML(n, query, false);
                const card = wrap.firstElementChild;
                card.onclick = (e) => { 
                    if(!e.target.classList.contains('mention-link') && !e.target.classList.contains('action-icon')) {
                        loadMention(n.num); 
                    }
                }
                container.appendChild(card);
            });
            board.appendChild(container);
        }

        function renderArchivePage() {
            const board = document.getElementById('archiveBoard');
            board.innerHTML = '';
            if (archive.length === 0) {
                board.innerHTML = '<p style="font-size:13px; color:var(--text-muted)">Henüz arşivlenmiş bir eser yok.</p>';
                return;
            }

            const container = document.createElement('div');
            container.className = viewMode === 'grid' ? 'archive-grid' : 'archive-list';

            archive.forEach(a => {
                const wrap = document.createElement('div');
                wrap.innerHTML = createCardHTML(a, '', true);
                const card = wrap.firstElementChild;
                card.onclick = (e) => {
                    if(!e.target.classList.contains('mention-link') && !e.target.classList.contains('action-icon')) {
                        loadMention(a.num);
                    }
                }
                container.appendChild(card);
            });
            board.appendChild(container);
        }

        function deleteNote(id, e) {
            e.stopPropagation();
            if(confirm("Silmek istediğine emin misin?")) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('chimptopus_v8_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function deleteArchive(id, e) {
            e.stopPropagation();
            if(confirm("Arşivden kalıcı olarak silinsin mi?")) {
                archive = archive.filter(a => a.id !== id);
                localStorage.setItem('chimptopus_v8_archive', JSON.stringify(archive));
                renderArchivePage();
            }
        }

        // YENİ: FİNALE GERİ GÖNDERME
        function restoreToFinal(id, e) {
            e.stopPropagation();
            const index = archive.findIndex(a => a.id === id);
            if(index > -1) {
                const item = archive[index];
                archive.splice(index, 1);
                
                notes.unshift({
                    id: item.id,
                    num: item.num,
                    text: item.text,
                    type: 'final',
                    mood: '#d48166',
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
                });
                
                localStorage.setItem('chimptopus_v8_notes', JSON.stringify(notes));
                localStorage.setItem('chimptopus_v8_archive', JSON.stringify(archive));
                renderArchivePage();
                alert(`Note #${item.num} Final bölümüne geri gönderildi.`);
            }
        }

        function insertTimestamp() {
            const ta = document.getElementById('noteInput');
            const now = new Date();
            ta.value += `[${now.getHours().toString().padStart(2, '0')}.${now.getMinutes().toString().padStart(2, '0')}] `;
            ta.focus();
            updateWordProgress();
        }

        function startCountdown(mins) {
            clearInterval(timer);
            let sec = mins * 60;
            document.getElementById('timerDisplay').innerText = `${mins}:00`;
            timer = setInterval(() => {
                sec--;
                let m = Math.floor(sec / 60);
                let s = sec % 60;
                document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (sec <= 0) { clearInterval(timer); if(navigator.vibrate) navigator.vibrate(200); alert("Süre doldu!"); }
            }, 1000);
        }

        function copyToClipboard(text, e) {
            if(e) e.stopPropagation();
            navigator.clipboard.writeText(text).then(() => { alert("Kopyalandı!"); });
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function togglePanel(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); }
        function closePanels() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
        function showStatus(m) { const s = document.getElementById('statusMsg'); s.innerText = m; setTimeout(() => s.innerText = '', 2000); }
        function clearAll() { if(confirm("Tüm veriler (notlar, arşiv, tema ayarları) silinecek! İşlem geri alınamaz.")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
