<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cep Hikayeleri - Klasik Bilgelik Arşivi</title>
  <style>
    :root {
      --bg: #080b12;
      --text: #eef4ff;
      --muted: rgba(238, 244, 255, 0.62);
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --line: rgba(255, 255, 255, 0.13);
      --danger: #fb7185;
      --warn: #ffd580;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "DejaVu Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 5%, rgba(125, 211, 252, 0.18), transparent 34%),
        radial-gradient(circle at 92% 16%, rgba(167, 139, 250, 0.18), transparent 30%),
        linear-gradient(135deg, #070912 0%, #101827 45%, #090b12 100%);
      overflow: hidden;
    }
    .app { min-height: 100vh; display: grid; grid-template-columns: 372px 1fr; }
    aside {
      border-right: 1px solid var(--line);
      background: rgba(8, 11, 18, 0.58);
      backdrop-filter: blur(22px) saturate(145%);
      -webkit-backdrop-filter: blur(22px) saturate(145%);
      height: 100vh;
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header { padding: 18px 18px 12px; border-bottom: 1px solid var(--line); }
    .brand {
      display: inline-flex;
      padding: 5px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(125, 211, 252, 0.16), rgba(167, 139, 250, 0.14));
      color: var(--accent);
      font-weight: 750;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      border: 1px solid rgba(125, 211, 252, 0.18);
    }
    h1 { margin: 0; font-size: 25px; line-height: 1.05; font-weight: 780; letter-spacing: -0.04em; }
    .intro { margin: 8px 0 0; color: var(--muted); font-size: 12.2px; line-height: 1.45; }
    .controls { padding: 12px 14px 9px; display: grid; gap: 8px; border-bottom: 1px solid var(--line); }
    .search, .sortSelect {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.075);
      color: var(--text);
      border-radius: 13px;
      padding: 9px 11px;
      font-size: 12.5px;
      outline: none;
    }
    .sortSelect option { background: #101827; color: #eef4ff; }
    .topActions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .shuffleBtn, .restoreDeleted {
      border: 1px solid rgba(125,211,252,.22);
      background: rgba(125,211,252,.10);
      color: #d9f5ff;
      border-radius: 13px;
      padding: 9px 10px;
      font-size: 11.5px;
      font-weight: 800;
      cursor: pointer;
    }
    .shuffleBtn:hover { background: linear-gradient(135deg, rgba(125,211,252,.18), rgba(167,139,250,.15)); }
    .restoreDeleted {
      display: none;
      border-color: rgba(251,113,133,.25);
      background: rgba(251,113,133,.08);
      color: #fecdd3;
    }
    .rail {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 3px;
      scrollbar-width: thin;
    }
    .chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: rgba(238,244,255,.76);
      border-radius: 999px;
      padding: 6px 9px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 680;
      font-size: 10.8px;
    }
    .chip.active {
      background: linear-gradient(135deg, rgba(125,211,252,.24), rgba(167,139,250,.22));
      color: #fff;
      border-color: rgba(125,211,252,.42);
    }
    .listMeta { color: rgba(238,244,255,.52); font-size: 11.3px; padding-left: 2px; }
    .storyList { overflow: auto; padding: 9px; display: grid; gap: 6px; }
    .storyItem {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 16px;
      padding: 9px;
      cursor: pointer;
      color: var(--text);
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .storyItem:hover { transform: translateY(-1px); background: rgba(255,255,255,.07); border-color: var(--line); }
    .storyItem.active { background: rgba(255,255,255,.105); border-color: rgba(125,211,252,.32); box-shadow: 0 10px 26px rgba(0,0,0,.18); }
    .itemTop { display: flex; gap: 9px; align-items: flex-start; }
    .num {
      flex: 0 0 auto;
      width: 25px;
      height: 25px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: rgba(125,211,252,.12);
      color: var(--accent);
      font-weight: 800;
      font-size: 10.5px;
      border: 1px solid rgba(125,211,252,.12);
    }
    .itemTitle { font-weight: 760; font-size: 12.7px; line-height: 1.22; margin: 0; letter-spacing: -0.015em; }
    .itemPreview {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 11.2px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tagRow { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .tag {
      display: inline-flex;
      border-radius: 999px;
      background: rgba(125,211,252,.12);
      color: rgba(190,235,255,.92);
      padding: 4px 7px;
      font-size: 9.7px;
      font-weight: 760;
      border: 1px solid rgba(125,211,252,.13);
    }
    .tag.groupTag { background: rgba(167,139,250,.11); color: #ddd6fe; border-color: rgba(167,139,250,.16); }
    .itemActions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .actionBtns { display:flex; gap:5px; }
    .iconBtn {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.065);
      color: rgba(238,244,255,.72);
      cursor: pointer;
      width: 27px;
      height: 27px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      font-size: 13px;
      line-height: 1;
    }
    .favSmall.active, .favLarge.active { background: rgba(255,213,128,.16); border-color: rgba(255,213,128,.36); color: var(--warn); }
    .deleteSmall:hover, .deleteLarge:hover { background: rgba(251,113,133,.13); border-color: rgba(251,113,133,.35); color: #fecdd3; }
    .reader {
      min-width: 0;
      padding: 28px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: auto;
    }
    .reader::before {
      content:"";
      position: fixed;
      inset: 18px 18px 18px 390px;
      pointer-events:none;
      border-radius:28px;
      background:
        linear-gradient(90deg, rgba(125,211,252,.08), transparent 1px),
        linear-gradient(rgba(125,211,252,.08), transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, transparent, black 12%, black 82%, transparent);
      opacity:.35;
    }
    .readerCard {
      width: min(770px,100%);
      min-height: min(620px, calc(100vh - 56px));
      background: rgba(255,255,255,.085);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: clamp(24px,4vw,42px);
      display:flex;
      flex-direction:column;
      backdrop-filter: blur(22px) saturate(135%);
      -webkit-backdrop-filter: blur(22px) saturate(135%);
      position: relative;
      overflow: hidden;
    }
    .readerCard::after {
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background: linear-gradient(135deg, rgba(255,255,255,.13), transparent 32%, rgba(125,211,252,.06));
    }
    .readerTop,.reader section,.navButtons { position:relative; z-index:1; }
    .readerTop { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; border-bottom:1px solid var(--line); padding-bottom:17px; margin-bottom:20px; }
    .reader h2 { margin:0; font-size: clamp(28px,4.2vw,47px); line-height:1.02; font-weight:780; letter-spacing:-.055em; }
    .readerCategory,.readerGroup {
      display:inline-flex;
      background: rgba(125,211,252,.12);
      color:#c9f1ff;
      border:1px solid rgba(125,211,252,.22);
      border-radius:999px;
      padding:7px 10px;
      font-size:11.2px;
      font-weight:780;
      margin: 0 0 7px 5px;
    }
    .readerGroup { background: rgba(167,139,250,.12); color:#ddd6fe; border-color: rgba(167,139,250,.22); }
    .favLarge,.deleteLarge {
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.065);
      color:rgba(238,244,255,.72);
      cursor:pointer;
      border-radius:999px;
      padding:7px 10px;
      font-size:11.5px;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      gap:6px;
      margin-top:8px;
    }
    .sectionLabel { margin:0 0 7px; color:rgba(125,211,252,.84); font-size:10.5px; letter-spacing:.11em; text-transform:uppercase; font-weight:850; }
    .flow { font-size:clamp(15.5px,1.45vw,19px); line-height:1.72; color:rgba(248,251,255,.88); margin:0 0 23px; max-width:68ch; }
    .lessonBox {
      margin-top:auto;
      border:1px solid rgba(125,211,252,.18);
      background:rgba(125,211,252,.08);
      border-radius:18px;
      padding:14px 16px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }
    .lessonBox p { margin:0; color:rgba(248,251,255,.9); font-size:clamp(14px,1.35vw,17px); line-height:1.52; font-weight:520; }
    .lessonBox strong { color:#bdefff; }
    .navButtons { display:flex; gap:9px; margin-top:16px; flex-wrap: wrap; }
    .navBtn {
      border:1px solid var(--line);
      background:rgba(255,255,255,.075);
      color:rgba(238,244,255,.86);
      border-radius:13px;
      padding:9px 11px;
      font-weight:750;
      font-size:12px;
      cursor:pointer;
    }
    .navBtn:disabled { opacity:.38; cursor:not-allowed; }
    .mobileClose { display:none; }
    @media (max-width: 860px) {
      body { overflow:auto; }
      .app { display:block; }
      aside { width:100%; height:100vh; border-right:0; }
      .reader {
        display:none;
        position:fixed;
        inset:0;
        z-index:20;
        padding:22px;
        background:rgba(4,7,14,.40);
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        overflow:auto;
        place-items:center;
      }
      .reader.open { display:grid; }
      .reader::before {
        inset:0;
        background:
          radial-gradient(circle at 20% 10%, rgba(125,211,252,.16), transparent 35%),
          radial-gradient(circle at 90% 90%, rgba(167,139,250,.16), transparent 40%);
        mask-image:none;
        opacity:1;
      }
      .readerCard {
        width:min(94vw,640px);
        min-height:auto;
        max-height:82vh;
        overflow:auto;
        border-radius:24px;
        padding:20px;
        box-shadow:0 28px 90px rgba(0,0,0,.48);
      }
      .readerTop { display:block; padding-bottom:14px; margin-bottom:16px; }
      .reader h2 { font-size:clamp(25px,8vw,38px); }
      .flow { font-size:15.5px; line-height:1.68; }
      .lessonBox p { font-size:14px; }
      .mobileClose {
        display:inline-flex;
        position:fixed;
        top:12px;
        left:50%;
        transform:translateX(-50%);
        z-index:21;
        border:1px solid rgba(255,255,255,.18);
        background:rgba(255,255,255,.11);
        color:#f8fbff;
        border-radius:999px;
        padding:8px 12px;
        font-size:12px;
        font-weight:900;
        cursor:pointer;
        backdrop-filter:blur(16px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <header>
        <div class="brand">Cep Hikayeleri</div>
        <h1>Öğretici Öyküler</h1>
        <p class="intro">Yalnızca bilinen, anlatılagelen, klasik fabl, edebi öykü, felsefi alegori ve yaygın bilgelik kıssaları bulunur. Toplam 237 hikaye.</p>
      </header>
      <section class="controls">
        <input class="search" id="searchInput" type="search" placeholder="Öykü, konu, tür veya ders ara..." />
        <select class="sortSelect" id="sortSelect" aria-label="Sıralama ölçütü">
          <option value="default">Varsayılan sıra</option>
          <option value="newest">Son eklenenler</option>
          <option value="favorites">Favoriler önce</option>
          <option value="az">A’dan Z’ye</option>
          <option value="za">Z’den A’ya</option>
          <option value="shuffle">Karışık liste</option>
        </select>
        <div class="topActions">
          <button class="shuffleBtn" id="shuffleBtn" type="button">🔀 Listeyi karıştır</button>
          <button class="restoreDeleted" id="restoreDeleted" type="button">Silinenleri geri getir</button>
        </div>
        <div class="rail" id="categoryRail"></div>
        <div class="listMeta" id="listMeta"></div>
      </section>
      <nav class="storyList" id="storyList" aria-label="Hikaye listesi"></nav>
    </aside>

    <main class="reader" id="reader">
      <button class="mobileClose" id="mobileClose">← Listeye dön</button>
      <article class="readerCard">
        <div class="readerTop">
          <div>
            <p class="sectionLabel">Seçili öykü</p>
            <h2 id="readerTitle"></h2>
          </div>
          <div>
            <div><span class="readerCategory" id="readerCategory"></span></div>
            <div><span class="readerGroup" id="readerGroup"></span></div>
            <button class="favLarge" id="readerFavorite" type="button">☆ Favoriye ekle</button>
            <button class="deleteLarge" id="readerDelete" type="button">✕ Sil</button>
          </div>
        </div>
        <section>
          <p class="sectionLabel">Olay akışı</p>
          <p class="flow" id="readerFlow"></p>
        </section>
        <section class="lessonBox">
          <p><strong>Ders:</strong> <span id="readerLesson"></span></p>
        </section>
        <div class="navButtons">
          <button class="navBtn" id="prevBtn">← Önceki</button>
          <button class="navBtn" id="nextBtn">Sonraki →</button>
        </div>
      </article>
    </main>
  </div>

<script>
const stories = [
  {
    "title": "Aslan ile Fare",
    "category": "Yardımlaşma",
    "group": "Klasik Fabl ve Meseller",
    "flow": "Aslan, kendisini rahatsız eden küçük fareyi yakalar ama onu öldürmek yerine serbest bırakır. Fare bir gün bu iyiliğin karşılığını vereceğini söyler. Aslan buna pek inanmaz; fakat bir gün avcıların ağına yakalanınca fare gelir, ipleri kemirir ve aslanı kurtarır.",
    "lesson": "Küçük görülen kişiler bile büyük yardımlar yapabilir."
  },
  {
    "title": "Çoban ile Kurt",
    "category": "Dürüstlük",
    "group": "Klasik Fabl ve Meseller",
    "flow": "Bir çoban eğlenmek için birkaç kez köylülere “Kurt geldi!” diye bağırır. Köylüler telaşla yardıma koşar ama her defasında kandırıldıklarını görür. Günün birinde gerçekten kurt gelir; çoban yine yardım ister ama artık kimse ona inanmaz.",
    "lesson": "Sürekli yalan söyleyen kişiye, doğru söylediğinde bile inanılmaz."
  },
  {
    "title": "Tilki ile Üzümler",
    "category": "Kendini Bilme",
    "group": "Klasik Fabl ve Meseller",
    "flow": "Aç bir tilki yüksek bir asmada güzel üzümler görür. Üzümlere ulaşmak için defalarca zıplar ama başaramaz. Sonunda başarısızlığını kabul etmek yerine “Zaten ekşiydi” diyerek oradan uzaklaşır.",
    "lesson": "İnsan bazen ulaşamadığı şeyi değersiz göstermeye çalışır."
  },
  {
    "title": "Karga ile Tilki",
    "category": "Dikkat ve Karar",
    "group": "Klasik Fabl ve Meseller",
    "flow": "Karga ağzında peynirle bir dala konar. Tilki peyniri almak ister ve kargayı övmeye başlar; sesinin çok güzel olduğunu söyler. Karga bu övgülere kapılıp şarkı söylemek için ağzını açınca peynir yere düşer ve tilki peyniri alır.",
    "lesson": "Boş övgülere kapılıp aklı elden bırakmamak gerekir."
  },
  {
    "title": "Sütçü Kızın Hayali",
    "category": "Dikkat ve Karar",
    "group": "Klasik Fabl ve Meseller",
    "flow": "Sütçü kız başında taşıdığı sütü pazarda satmayı düşünür. Kazanacağı parayla tavuklar alacağını, sonra daha çok kazanacağını ve zenginleşeceğini hayal eder. Hayallere dalıp kendini unutur; başındaki kap düşer ve süt dökülür.",
    "lesson": "Gerçekleşmemiş kazanca güvenip dikkati kaybetmemek gerekir."
  },
  {
    "title": "Kralın Yeni Giysileri",
    "category": "Dürüstlük",
    "group": "Klasik Fabl ve Meseller",
    "flow": "İki dolandırıcı, krala yalnızca akıllı insanların görebileceği özel bir elbise diktiklerini söyler. Ortada hiçbir elbise yoktur; ama kimse aptal görünmemek için bunu söyleyemez. Kral halkın önüne çıktığında herkes susar; sonunda bir çocuk gerçeği açıkça söyler.",
    "lesson": "Gerçeği görmek kadar söylemek de cesaret ister."
  },
  {
    "title": "Kibritçi Kız",
    "category": "Merhamet ve Nezaket",
    "group": "Klasik Fabl ve Meseller",
    "flow": "Küçük bir kız soğuk bir gecede sokakta kibrit satmaya çalışır. Kimse ondan kibrit almaz ve kız ısınmak için kibritleri yakar. Her kibritte sıcaklık, yemek ve sevgiyle ilgili hayaller görür; fakat gerçek dünyada yalnız ve çaresizdir.",
    "lesson": "Toplumun yoksul ve çaresiz insanlara karşı duyarsız kalması büyük acılara yol açar."
  },
  {
    "title": "Küçük Prens ve Tilki",
    "category": "Dostluk",
    "group": "Bilgelik Kıssaları",
    "flow": "Küçük Prens dünyada gezerken bir tilkiyle karşılaşır. Tilki ona bağ kurmanın, zaman ayırmanın ve birini özel kılmanın ne demek olduğunu anlatır. Küçük Prens, sevginin yalnızca his değil, aynı zamanda emek ve sorumluluk olduğunu anlar.",
    "lesson": "Sevgi, emek ve sorumlulukla anlam kazanır."
  },
  {
    "title": "Nasreddin Hoca ve Kazan Doğurdu",
    "category": "Açgözlülük",
    "group": "Bilgelik Kıssaları",
    "flow": "Nasreddin Hoca komşusundan bir kazan alır ve geri verirken içine küçük bir kazan koyar. Komşusuna “Senin kazan doğurdu” der; komşu buna sevinerek inanır. Hoca daha sonra kazanı tekrar alır, geri vermeyince “Kazan öldü” der ve komşunun çıkarcı inanışını ortaya çıkarır.",
    "lesson": "Çıkarına gelen yalana inanan kişi, zararına gelen sonuca şaşırmamalıdır."
  },
  {
    "title": "Nasreddin Hoca ve Ye Kürküm Ye",
    "category": "Kendini Bilme",
    "group": "Bilgelik Kıssaları",
    "flow": "Nasreddin Hoca sade kıyafetlerle gittiği bir davette önemsenmez. Daha sonra gösterişli kürkünü giyip geri gelir ve herkes ona büyük ilgi gösterir. Hoca yemeği kendi ağzına değil, kürküne uzatır; çünkü saygının kendisine değil kıyafetine gösterildiğini anlatmak ister.",
    "lesson": "İnsanlara kıyafetlerine göre değil, kişiliklerine göre değer verilmelidir."
  },
  {
    "title": "Kör Adamlar ve Fil",
    "category": "Bakış Açısı",
    "group": "Bilgelik Kıssaları",
    "flow": "Kör adamlar bir fili tanımak için ona dokunur. Biri hortumuna, biri bacağına, biri kulağına, biri gövdesine dokunur ve her biri fili farklı tarif eder. Hepsi kendi deneyiminin tamam olduğunu sanır; oysa her biri gerçeğin sadece bir parçasını bilir.",
    "lesson": "Bir konunun tamamını görmeden kesin hüküm vermemek gerekir."
  },
  {
    "title": "Taşçı Ustası",
    "category": "Kendini Bilme",
    "group": "Bilgelik Kıssaları",
    "flow": "Bir taşçı hayatından memnun olmaz ve daha güçlü biri olmak ister. Önce zengin, sonra güneş, bulut, rüzgâr ve kaya olmayı diler. En sonunda kayayı bile yontabilen taşçının gücünü fark eder ve kendi işinin değerini anlar.",
    "lesson": "İnsan bazen sahip olduğu değeri ancak başka şeyleri deneyince anlar."
  },
  {
    "title": "Altın Yumurtlayan Tavuk",
    "category": "Açgözlülük",
    "group": "Klasik Fabl ve Meseller",
    "flow": "Bir adamın tavuğu her gün bir altın yumurta yumurtlar. Adam sabretmek yerine bütün altınlara hemen ulaşmak ister ve tavuğun içinde büyük bir hazine olduğunu düşünür. Tavuğu keser ama hiçbir altın bulamaz; üstelik her gün gelen kazancı da kaybeder.",
    "lesson": "Açgözlülük, eldeki nimeti de kaybettirir."
  },
  {

const storyList = document.getElementById("storyList");
const categoryRail = document.getElementById("categoryRail");
const searchInput = document.getElementById("searchInput");
const sortSelect = document.getElementById("sortSelect");
const shuffleBtn = document.getElementById("shuffleBtn");
const listMeta = document.getElementById("listMeta");
const restoreDeleted = document.getElementById("restoreDeleted");
const reader = document.getElementById("reader");
const readerTitle = document.getElementById("readerTitle");
const readerCategory = document.getElementById("readerCategory");
const readerGroup = document.getElementById("readerGroup");
const readerFlow = document.getElementById("readerFlow");
const readerLesson = document.getElementById("readerLesson");
const readerFavorite = document.getElementById("readerFavorite");
const readerDelete = document.getElementById("readerDelete");
const mobileClose = document.getElementById("mobileClose");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

let selectedCategory = "Tümü";
let filteredStories = [...stories];
let selectedOriginalIndex = 0;
const FAVORITES_KEY = "cepHikayeleriFavoriler";
const DELETED_KEY = "cepHikayeleriSilinenler";
let favorites = new Set(JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]"));
let deleted = new Set(JSON.parse(localStorage.getItem(DELETED_KEY) || "[]"));

function saveFavorites() { localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites])); }
function saveDeleted() { localStorage.setItem(DELETED_KEY, JSON.stringify([...deleted])); }
function storyKey(story) { return story.title; }
function isFavorite(story) { return favorites.has(storyKey(story)); }
function isDeleted(story) { return deleted.has(storyKey(story)); }
function normalize(value) { return value.toLocaleLowerCase("tr-TR"); }

function shuffleArray(items) {
  const copy = [...items];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function visibleStories() {
  return stories.filter(story => !isDeleted(story));
}

function categoryCounts() {
  return visibleStories().reduce((acc, story) => {
    acc[story.category] = (acc[story.category] || 0) + 1;
    return acc;
  }, {});
}

function renderCategories() {
  const counts = categoryCounts();
  const categories = ["Tümü", ...Object.keys(counts).sort((a,b) => {
    const diff = counts[b] - counts[a];
    return diff || a.localeCompare(b, "tr");
  })];

  categoryRail.innerHTML = "";
  categories.forEach(category => {
    const btn = document.createElement("button");
    btn.className = "chip" + (category === selectedCategory ? " active" : "");
    btn.textContent = category === "Tümü" ? `Tümü (${visibleStories().length})` : `${category} (${counts[category]})`;
    btn.addEventListener("click", () => {
      selectedCategory = category;
      render();
    });
    categoryRail.appendChild(btn);
  });
}

function applyFilters() {
  const query = normalize(searchInput.value.trim());
  filteredStories = stories.filter(story => {
    if (isDeleted(story)) return false;
    const inCategory = selectedCategory === "Tümü" || story.category === selectedCategory;
    const haystack = normalize(`${story.title} ${story.category} ${story.group} ${story.flow} ${story.lesson}`);
    return inCategory && (!query || haystack.includes(query));
  });

  const mode = sortSelect.value;
  if (mode === "newest") filteredStories.sort((a,b)=>stories.indexOf(b)-stories.indexOf(a));
  else if (mode === "favorites") filteredStories.sort((a,b)=>Number(isFavorite(b))-Number(isFavorite(a)) || stories.indexOf(a)-stories.indexOf(b));
  else if (mode === "az") filteredStories.sort((a,b)=>a.title.localeCompare(b.title,"tr"));
  else if (mode === "za") filteredStories.sort((a,b)=>b.title.localeCompare(a.title,"tr"));
  else if (mode === "shuffle") filteredStories = shuffleArray(filteredStories);
}

function toggleFavorite(index, event) {
  if (event) event.stopPropagation();
  const key = storyKey(stories[index]);
  favorites.has(key) ? favorites.delete(key) : favorites.add(key);
  saveFavorites();
  render();
  if (!isDeleted(stories[index])) selectStory(index, false);
}

function deleteStory(index, event) {
  if (event) event.stopPropagation();
  const story = stories[index];
  const ok = confirm(`"${story.title}" hikayesini listeden silmek istiyor musun? Bu işlem bu tarayıcıda kalıcı olarak saklanır.`);
  if (!ok) return;
  deleted.add(storyKey(story));
  favorites.delete(storyKey(story));
  saveDeleted();
  saveFavorites();
  const currentFilteredIndex = filteredStories.indexOf(story);
  render();
  const fallback = filteredStories[Math.min(currentFilteredIndex, filteredStories.length - 1)];
  if (fallback) selectStory(stories.indexOf(fallback), false);
  else selectEmpty();
}

function renderList() {
  storyList.innerHTML = "";
  listMeta.textContent = `${filteredStories.length} / ${visibleStories().length} öykü gösteriliyor`;
  restoreDeleted.style.display = deleted.size ? "inline-flex" : "none";

  filteredStories.forEach(story => {
    const originalIndex = stories.indexOf(story);
    const button = document.createElement("button");
    button.className = "storyItem" + (originalIndex === selectedOriginalIndex ? " active" : "");
    button.innerHTML = `
      <div class="itemTop">
        <div class="num">${originalIndex + 1}</div>
        <div style="min-width:0; flex:1;">
          <div class="itemActions">
            <p class="itemTitle">${story.title}</p>
            <div class="actionBtns">
              <button class="iconBtn favSmall ${isFavorite(story) ? "active" : ""}" type="button" title="Favori">${isFavorite(story) ? "★" : "☆"}</button>
              <button class="iconBtn deleteSmall" type="button" title="Sil">×</button>
            </div>
          </div>
          <p class="itemPreview">${story.flow}</p>
          <div class="tagRow"><span class="tag">${story.category}</span><span class="tag groupTag">${story.group}</span></div>
        </div>
      </div>`;
    button.querySelector(".favSmall").addEventListener("click", event => toggleFavorite(originalIndex, event));
    button.querySelector(".deleteSmall").addEventListener("click", event => deleteStory(originalIndex, event));
    button.addEventListener("click", () => selectStory(originalIndex, true));
    storyList.appendChild(button);
  });
}

function selectStory(index, openMobile=false) {
  if (index < 0 || index >= stories.length || isDeleted(stories[index])) return;
  selectedOriginalIndex = index;
  const story = stories[index];
  readerTitle.textContent = story.title;
  readerCategory.textContent = story.category;
  readerGroup.textContent = story.group;
  readerFlow.textContent = story.flow;
  readerLesson.textContent = story.lesson;
  readerFavorite.textContent = isFavorite(story) ? "★ Favorilerde" : "☆ Favoriye ekle";
  readerFavorite.classList.toggle("active", isFavorite(story));
  const currentFilteredIndex = filteredStories.indexOf(story);
  prevBtn.disabled = currentFilteredIndex <= 0;
  nextBtn.disabled = currentFilteredIndex === -1 || currentFilteredIndex >= filteredStories.length - 1;
  document.querySelectorAll(".storyItem").forEach(item => item.classList.remove("active"));
  const activeButton = [...storyList.children].find((button, i) => filteredStories[i] === story);
  if (activeButton) activeButton.classList.add("active");
  if (openMobile) reader.classList.add("open");
}

function selectEmpty() {
  readerTitle.textContent = "Sonuç bulunamadı";
  readerCategory.textContent = "—";
  readerGroup.textContent = "—";
  readerFlow.textContent = "Arama veya kategori filtresini değiştirerek tekrar dene.";
  readerLesson.textContent = "Doğru hikayeyi bulmak için filtreleri sadeleştirmek işe yarar.";
  prevBtn.disabled = true;
  nextBtn.disabled = true;
}

function moveSelection(direction) {
  const currentStory = stories[selectedOriginalIndex];
  let currentFilteredIndex = filteredStories.indexOf(currentStory);
  if (currentFilteredIndex === -1) currentFilteredIndex = 0;
  const nextFilteredIndex = currentFilteredIndex + direction;
  if (nextFilteredIndex < 0 || nextFilteredIndex >= filteredStories.length) return;
  selectStory(stories.indexOf(filteredStories[nextFilteredIndex]), true);
}

function shuffleVisibleList() {
  sortSelect.value = "shuffle";
  render();
  if (filteredStories.length) {
    selectStory(stories.indexOf(filteredStories[0]), false);
  }
}

function render() {
  renderCategories();
  applyFilters();
  renderList();
  if (!filteredStories.includes(stories[selectedOriginalIndex]) && filteredStories.length) {
    selectedOriginalIndex = stories.indexOf(filteredStories[0]);
  }
  filteredStories.length ? selectStory(selectedOriginalIndex, false) : selectEmpty();
}

searchInput.addEventListener("input", render);
sortSelect.addEventListener("change", render);
shuffleBtn.addEventListener("click", shuffleVisibleList);
readerFavorite.addEventListener("click", event => toggleFavorite(selectedOriginalIndex, event));
readerDelete.addEventListener("click", event => deleteStory(selectedOriginalIndex, event));
restoreDeleted.addEventListener("click", () => {
  const ok = confirm("Bu tarayıcıda sildiğin tüm hikayeler geri getirilsin mi?");
  if (!ok) return;
  deleted.clear();
  saveDeleted();
  render();
});
mobileClose.addEventListener("click", () => reader.classList.remove("open"));
reader.addEventListener("click", event => {
  if (event.target === reader) reader.classList.remove("open");
});
prevBtn.addEventListener("click", () => moveSelection(-1));
nextBtn.addEventListener("click", () => moveSelection(1));
document.addEventListener("keydown", event => {
  if (event.key === "Escape") reader.classList.remove("open");
  if (event.key === "ArrowLeft") moveSelection(-1);
  if (event.key === "ArrowRight") moveSelection(1);
});
render();
</script>
</body>
</html>
