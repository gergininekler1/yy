const storyList = document.getElementById("storyList");
const categoryRail = document.getElementById("categoryRail");
const searchInput = document.getElementById("searchInput");
const sortSelect = document.getElementById("sortSelect");
const shuffleBtn = document.getElementById("shuffleBtn");
const listMeta = document.getElementById("listMeta");
const restoreDeleted = document.getElementById("restoreDeleted");
const reader = document.getElementById("reader");
const readerTitle = document.getElementById("readerTitle");
const readerCategory = document.getElementById("readerCategory");
const readerGroup = document.getElementById("readerGroup");
const readerFlow = document.getElementById("readerFlow");
const readerLesson = document.getElementById("readerLesson");
const readerFavorite = document.getElementById("readerFavorite");
const readerDelete = document.getElementById("readerDelete");
const mobileClose = document.getElementById("mobileClose");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

let selectedCategory = "TÃ¼mÃ¼";
let filteredStories = [...stories];
let selectedOriginalIndex = 0;
const FAVORITES_KEY = "cepHikayeleriFavoriler";
const DELETED_KEY = "cepHikayeleriSilinenler";
let favorites = new Set(JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]"));
let deleted = new Set(JSON.parse(localStorage.getItem(DELETED_KEY) || "[]"));

function saveFavorites() { localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites])); }
function saveDeleted() { localStorage.setItem(DELETED_KEY, JSON.stringify([...deleted])); }
function storyKey(story) { return story.title; }
function isFavorite(story) { return favorites.has(storyKey(story)); }
function isDeleted(story) { return deleted.has(storyKey(story)); }
function normalize(value) { return value.toLocaleLowerCase("tr-TR"); }

function shuffleArray(items) {
  const copy = [...items];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function visibleStories() {
  return stories.filter(story => !isDeleted(story));
}

function categoryCounts() {
  return visibleStories().reduce((acc, story) => {
    acc[story.category] = (acc[story.category] || 0) + 1;
    return acc;
  }, {});
}

function renderCategories() {
  const counts = categoryCounts();
  const categories = ["TÃ¼mÃ¼", ...Object.keys(counts).sort((a,b) => {
    const diff = counts[b] - counts[a];
    return diff || a.localeCompare(b, "tr");
  })];

  categoryRail.innerHTML = "";
  categories.forEach(category => {
    const btn = document.createElement("button");
    btn.className = "chip" + (category === selectedCategory ? " active" : "");
    btn.textContent = category === "TÃ¼mÃ¼" ? `TÃ¼mÃ¼ (${visibleStories().length})` : `${category} (${counts[category]})`;
    btn.addEventListener("click", () => {
      selectedCategory = category;
      render();
    });
    categoryRail.appendChild(btn);
  });
}

function applyFilters() {
  const query = normalize(searchInput.value.trim());
  filteredStories = stories.filter(story => {
    if (isDeleted(story)) return false;
    const inCategory = selectedCategory === "TÃ¼mÃ¼" || story.category === selectedCategory;
    const haystack = normalize(`${story.title} ${story.category} ${story.group} ${story.flow} ${story.lesson}`);
    return inCategory && (!query || haystack.includes(query));
  });

  const mode = sortSelect.value;
  if (mode === "newest") filteredStories.sort((a,b)=>stories.indexOf(b)-stories.indexOf(a));
  else if (mode === "favorites") filteredStories.sort((a,b)=>Number(isFavorite(b))-Number(isFavorite(a)) || stories.indexOf(a)-stories.indexOf(b));
  else if (mode === "az") filteredStories.sort((a,b)=>a.title.localeCompare(b.title,"tr"));
  else if (mode === "za") filteredStories.sort((a,b)=>b.title.localeCompare(a.title,"tr"));
  else if (mode === "shuffle") filteredStories = shuffleArray(filteredStories);
}

function toggleFavorite(index, event) {
  if (event) event.stopPropagation();
  const key = storyKey(stories[index]);
  favorites.has(key) ? favorites.delete(key) : favorites.add(key);
  saveFavorites();
  render();
  if (!isDeleted(stories[index])) selectStory(index, false);
}

function deleteStory(index, event) {
  if (event) event.stopPropagation();
  const story = stories[index];
  const ok = confirm(`"${story.title}" hikayesini listeden silmek istiyor musun? Bu iÅŸlem bu tarayÄ±cÄ±da kalÄ±cÄ± olarak saklanÄ±r.`);
  if (!ok) return;
  deleted.add(storyKey(story));
  favorites.delete(storyKey(story));
  saveDeleted();
  saveFavorites();
  const currentFilteredIndex = filteredStories.indexOf(story);
  render();
  const fallback = filteredStories[Math.min(currentFilteredIndex, filteredStories.length - 1)];
  if (fallback) selectStory(stories.indexOf(fallback), false);
  else selectEmpty();
}

function renderList() {
  storyList.innerHTML = "";
  listMeta.textContent = `${filteredStories.length} / ${visibleStories().length} Ã¶ykÃ¼ gÃ¶steriliyor`;
  restoreDeleted.style.display = deleted.size ? "inline-flex" : "none";

  filteredStories.forEach(story => {
    const originalIndex = stories.indexOf(story);
    const button = document.createElement("button");
    button.className = "storyItem" + (originalIndex === selectedOriginalIndex ? " active" : "");
    button.innerHTML = `
      <div class="itemTop">
        <div class="num">${originalIndex + 1}</div>
        <div style="min-width:0; flex:1;">
          <div class="itemActions">
            <p class="itemTitle">${story.title}</p>
            <div class="actionBtns">
              <button class="iconBtn favSmall ${isFavorite(story) ? "active" : ""}" type="button" title="Favori">${isFavorite(story) ? "â˜…" : "â˜†"}</button>
              <button class="iconBtn deleteSmall" type="button" title="Sil">Ã—</button>
            </div>
          </div>
          <p class="itemPreview">${story.flow}</p>
          <div class="tagRow"><span class="tag">${story.category}</span><span class="tag groupTag">${story.group}</span></div>
        </div>
      </div>`;
    button.querySelector(".favSmall").addEventListener("click", event => toggleFavorite(originalIndex, event));
    button.querySelector(".deleteSmall").addEventListener("click", event => deleteStory(originalIndex, event));
    button.addEventListener("click", () => selectStory(originalIndex, true));
    storyList.appendChild(button);
  });
}

function selectStory(index, openMobile=false) {
  if (index < 0 || index >= stories.length || isDeleted(stories[index])) return;
  selectedOriginalIndex = index;
  const story = stories[index];
  readerTitle.textContent = story.title;
  readerCategory.textContent = story.category;
  readerGroup.textContent = story.group;
  readerFlow.textContent = story.flow;
  readerLesson.textContent = story.lesson;
  readerFavorite.textContent = isFavorite(story) ? "â˜… Favorilerde" : "â˜† Favoriye ekle";
  readerFavorite.classList.toggle("active", isFavorite(story));
  const currentFilteredIndex = filteredStories.indexOf(story);
  prevBtn.disabled = currentFilteredIndex <= 0;
  nextBtn.disabled = currentFilteredIndex === -1 || currentFilteredIndex >= filteredStories.length - 1;
  document.querySelectorAll(".storyItem").forEach(item => item.classList.remove("active"));
  const activeButton = [...storyList.children].find((button, i) => filteredStories[i] === story);
  if (activeButton) activeButton.classList.add("active");
  if (openMobile) reader.classList.add("open");
}

function selectEmpty() {
  readerTitle.textContent = "SonuÃ§ bulunamadÄ±";
  readerCategory.textContent = "â€”";
  readerGroup.textContent = "â€”";
  readerFlow.textContent = "Arama veya kategori filtresini deÄŸiÅŸtirerek tekrar dene.";
  readerLesson.textContent = "DoÄŸru hikayeyi bulmak iÃ§in filtreleri sadeleÅŸtirmek iÅŸe yarar.";
  prevBtn.disabled = true;
  nextBtn.disabled = true;
}

function moveSelection(direction) {
  const currentStory = stories[selectedOriginalIndex];
  let currentFilteredIndex = filteredStories.indexOf(currentStory);
  if (currentFilteredIndex === -1) currentFilteredIndex = 0;
  const nextFilteredIndex = currentFilteredIndex + direction;
  if (nextFilteredIndex < 0 || nextFilteredIndex >= filteredStories.length) return;
  selectStory(stories.indexOf(filteredStories[nextFilteredIndex]), true);
}

function shuffleVisibleList() {
  sortSelect.value = "shuffle";
  render();
  if (filteredStories.length) {
    selectStory(stories.indexOf(filteredStories[0]), false);
  }
}

function render() {
  renderCategories();
  applyFilters();
  renderList();
  if (!filteredStories.includes(stories[selectedOriginalIndex]) && filteredStories.length) {
    selectedOriginalIndex = stories.indexOf(filteredStories[0]);
  }
  filteredStories.length ? selectStory(selectedOriginalIndex, false) : selectEmpty();
}

searchInput.addEventListener("input", render);
sortSelect.addEventListener("change", render);
shuffleBtn.addEventListener("click", shuffleVisibleList);
readerFavorite.addEventListener("click", event => toggleFavorite(selectedOriginalIndex, event));
readerDelete.addEventListener("click", event => deleteStory(selectedOriginalIndex, event));
restoreDeleted.addEventListener("click", () => {
  const ok = confirm("Bu tarayÄ±cÄ±da sildiÄŸin tÃ¼m hikayeler geri getirilsin mi?");
  if (!ok) return;
  deleted.clear();
  saveDeleted();
  render();
});
mobileClose.addEventListener("click", () => reader.classList.remove("open"));
reader.addEventListener("click", event => {
  if (event.target === reader) reader.classList.remove("open");
});
prevBtn.addEventListener("click", () => moveSelection(-1));
nextBtn.addEventListener("click", () => moveSelection(1));
document.addEventListener("keydown", event => {
  if (event.key === "Escape") reader.classList.remove("open");
  if (event.key === "ArrowLeft") moveSelection(-1);
  if (event.key === "ArrowRight") moveSelection(1);
});
render();
</script>
