<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOTEFLOW — Terminal Edition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --surface:#111; --surface2:#181818;
    --border:#2a2a2a; --border-bright:#3a3a3a;
    --text:#e8e8e8; --text-dim:#666; --text-muted:#444;
    --accent-draft:#f0c040; --accent-revise:#4090f0;
    --accent-final:#40c878; --accent-done:#28a060; --red:#e05050;
    --scanline:rgba(255,255,255,0.015);
    --glow-draft:0 0 20px rgba(240,192,64,0.15);
    --glow-revise:0 0 20px rgba(64,144,240,0.15);
    --glow-final:0 0 20px rgba(64,200,120,0.15);
  }
  body.light {
    --bg:#f4f1eb; --surface:#faf8f4; --surface2:#ede9e0;
    --border:#d4cfc4; --border-bright:#bfb8ab;
    --text:#1a1a1a; --text-dim:#7a7060; --text-muted:#aaa090;
    --scanline:rgba(0,0,0,0.008);
    --glow-draft:0 0 18px rgba(180,130,10,0.1);
    --glow-revise:0 0 18px rgba(30,80,180,0.08);
    --glow-final:0 0 18px rgba(20,140,70,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);pointer-events:none;z-index:9999;}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.45) 100%);pointer-events:none;z-index:9998;}
  body.light::after{background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.07) 100%);}

  /* HEADER */
  .hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:11px 15px 9px;transition:background .3s;}
  body.light .hdr{background:rgba(244,241,235,0.96);}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:4px;color:var(--text);}
  .logo span{color:var(--accent-draft);}
  .hdr-right{display:flex;align-items:center;gap:8px;}
  .hdr-time{font-size:10px;color:var(--text-dim);letter-spacing:1px;}
  .theme-btn{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
  .theme-btn:active{transform:scale(.9);}

  /* TABS */
  .tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px;margin-bottom:9px;}
  .tab{flex:1;padding:6px 3px;text-align:center;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;font-weight:700;color:var(--text-dim);border-radius:4px;cursor:pointer;transition:all .2s;position:relative;user-select:none;}
  .tab.active-draft{background:rgba(240,192,64,0.12);color:var(--accent-draft);border:1px solid rgba(240,192,64,.3);}
  .tab.active-revise{background:rgba(64,144,240,0.12);color:var(--accent-revise);border:1px solid rgba(64,144,240,.3);}
  .tab.active-final{background:rgba(64,200,120,0.12);color:var(--accent-final);border:1px solid rgba(64,200,120,.3);}
  .tab.active-archive{background:rgba(120,120,120,0.1);color:var(--text-dim);border:1px solid rgba(120,120,120,.25);}
  .tab-count{position:absolute;top:2px;right:2px;background:var(--text-muted);color:var(--bg);border-radius:50%;width:13px;height:13px;font-size:7px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .tab.active-draft .tab-count{background:var(--accent-draft);}
  .tab.active-revise .tab-count{background:var(--accent-revise);}
  .tab.active-final .tab-count{background:var(--accent-final);}

  /* SEARCH */
  .search-bar{position:relative;margin-bottom:9px;}
  .search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 34px 8px 30px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
  .search-input:focus{border-color:var(--accent-draft);}
  .search-input::placeholder{color:var(--text-muted);}
  .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);pointer-events:none;}
  .sc{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-muted);cursor:pointer;display:none;width:20px;height:20px;align-items:center;justify-content:center;}
  .sc.vis{display:flex;}

  /* CHIPS */
  .chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:8px;letter-spacing:1.5px;font-weight:700;border:1px solid var(--border);color:var(--text-dim);background:var(--surface2);cursor:pointer;transition:all .15s;user-select:none;}
  .chip.ca{background:rgba(240,192,64,0.1);border-color:rgba(240,192,64,.35);color:var(--accent-draft);}
  .chip.cd{background:rgba(240,192,64,0.1);border-color:rgba(240,192,64,.35);color:var(--accent-draft);}
  .chip.cr{background:rgba(64,144,240,0.1);border-color:rgba(64,144,240,.35);color:var(--accent-revise);}
  .chip.cf{background:rgba(64,200,120,0.1);border-color:rgba(64,200,120,.35);color:var(--accent-final);}
  .chip.cx{background:rgba(40,160,96,0.1);border-color:rgba(40,160,96,.35);color:var(--accent-done);}

  /* CONTENT */
  .content{padding:13px 15px;padding-bottom:110px;}
  .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .sec-title{font-size:10px;letter-spacing:3px;color:var(--text-dim);font-weight:700;}
  .sec-title span{color:var(--text-muted);}
  .res-cnt{font-size:9px;color:var(--text-muted);letter-spacing:1px;}

  /* CARDS */
  .cards{display:flex;flex-direction:column;gap:11px;}
  .card-wrap{position:relative;border-radius:10px;overflow:hidden;animation:cardIn .3s ease both;}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .swipe-bg{position:absolute;inset:0;display:flex;align-items:center;border-radius:10px;}
  .swipe-bg-l{background:rgba(224,80,80,0.15);justify-content:flex-start;padding-left:18px;}
  .swipe-bg-r{background:rgba(64,200,120,0.15);justify-content:flex-end;padding-right:18px;}
  .swipe-icon{font-size:17px;color:var(--text-dim);opacity:0;transition:opacity .15s;}
  .swipe-icon.vis{opacity:1;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;cursor:pointer;transition:box-shadow .15s;touch-action:pan-y;will-change:transform;}
  .card.draft{border-left:3px solid var(--accent-draft);box-shadow:var(--glow-draft);}
  .card.revise{border-left:3px solid var(--accent-revise);box-shadow:var(--glow-revise);}
  .card.final{border-left:3px solid var(--accent-final);box-shadow:var(--glow-final);}
  .card.done{border-left:3px solid var(--accent-done);opacity:.75;}
  .card-wrap.drag-over{outline:2px dashed var(--accent-draft);outline-offset:2px;border-radius:10px;}
  .card-wrap.dragging{opacity:.35;}
  .card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 7px;border-bottom:1px solid var(--border);}
  .card-meta{display:flex;align-items:center;gap:7px;}
  .badge{font-size:8px;letter-spacing:2px;font-weight:700;padding:2px 6px;border-radius:3px;}
  .b-draft{background:rgba(240,192,64,0.15);color:var(--accent-draft);border:1px solid rgba(240,192,64,.3);}
  .b-revise{background:rgba(64,144,240,0.15);color:var(--accent-revise);border:1px solid rgba(64,144,240,.3);}
  .b-final{background:rgba(64,200,120,0.15);color:var(--accent-final);border:1px solid rgba(64,200,120,.3);}
  .b-done{background:rgba(40,160,96,0.2);color:var(--accent-done);border:1px solid rgba(40,160,96,.3);}
  .card-date{font-size:9px;color:var(--text-muted);letter-spacing:1px;}
  .card-acts{display:flex;gap:5px;}
  .card-btn{width:27px;height:27px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
  .card-btn:active{transform:scale(.9);}
  .done-mark{width:27px;height:27px;background:rgba(64,200,120,0.15);border:2px solid var(--accent-final);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
  .drag-hdl{width:27px;height:27px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;cursor:grab;touch-action:none;}
  .drag-hdl:active{cursor:grabbing;}
  .timer-badge{font-size:9px;color:var(--accent-draft);background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,.2);padding:2px 6px;border-radius:3px;letter-spacing:1px;font-weight:700;}
  .timer-badge.exp{color:var(--red);background:rgba(224,80,80,0.1);border-color:rgba(224,80,80,.2);}
  .card-body{padding:10px 12px;}
  .card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:.5px;line-height:1.4;}
  .card-prev{font-size:11px;color:var(--text-dim);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-ref{margin-top:7px;padding:5px 9px;background:rgba(255,255,255,0.03);border-left:2px solid var(--text-muted);font-size:10px;color:var(--text-muted);line-height:1.5;border-radius:0 4px 4px 0;}
  body.light .card-ref{background:rgba(0,0,0,0.04);}
  .card-ref-lbl{color:var(--text-dim);font-size:8px;letter-spacing:2px;margin-bottom:2px;}
  .card-foot{padding:7px 12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .prog{display:flex;align-items:center;gap:5px;flex:1;}
  .dots{display:flex;gap:4px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--border);}
  .dot.draft{background:var(--accent-draft);}
  .dot.revise{background:var(--accent-revise);}
  .dot.final{background:var(--accent-final);}
  .prog-lbl{font-size:8px;color:var(--text-muted);letter-spacing:1px;}
  .hl{background:rgba(240,192,64,0.25);color:var(--accent-draft);border-radius:2px;padding:0 1px;}

  /* EMPTY */
  .empty{text-align:center;padding:55px 20px;color:var(--text-muted);}
  .empty-icon{font-size:38px;margin-bottom:14px;opacity:.4;}
  .empty-text{font-size:11px;letter-spacing:2px;line-height:1.8;white-space:pre-line;}

  /* ARCHIVE */
  .arch-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;opacity:.82;animation:cardIn .3s ease both;margin-bottom:10px;}
  .arch-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .arch-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
  .arch-date{font-size:9px;color:var(--text-muted);letter-spacing:1px;margin-bottom:6px;}
  .arch-content{font-size:11px;color:var(--text-dim);line-height:1.6;}
  .arch-stats{display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .arch-stat{font-size:9px;color:var(--text-muted);letter-spacing:1px;}
  .arch-stat span{color:var(--accent-done);}
  .arch-restore{font-size:9px;color:var(--accent-revise);cursor:pointer;letter-spacing:1px;}

  /* FAB */
  .fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;background:var(--accent-draft);color:#000;border:none;border-radius:50%;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(240,192,64,.4);z-index:200;transition:all .2s;}
  .fab:active{transform:scale(.92);}
  .hist-btn{position:fixed;bottom:24px;left:20px;width:56px;height:56px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;transition:all .2s;}
  .hist-btn:active{transform:scale(.92);}

  /* MODAL */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(5px);}
  .modal-ov.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-height:93dvh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,.6,.64,1) both;-webkit-overflow-scrolling:touch;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .modal-hdl{width:40px;height:4px;background:var(--border-bright);border-radius:2px;margin:11px auto 0;}
  .modal-hdr{padding:13px 17px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;}
  .modal-title{font-size:11px;letter-spacing:3px;font-weight:700;color:var(--text);}
  .modal-close{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;color:var(--text-dim);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .modal-body{padding:16px;}

  /* FORM */
  .fg{margin-bottom:14px;}
  .fl{display:block;font-size:9px;letter-spacing:2.5px;color:var(--text-dim);font-weight:700;margin-bottom:5px;}
  .fi,.fta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;resize:none;-webkit-appearance:none;}
  .fi:focus,.fta:focus{border-color:var(--accent-draft);box-shadow:0 0 0 2px rgba(240,192,64,.1);}
  .fta{min-height:95px;line-height:1.7;}
  .fta.ref{min-height:65px;border-style:dashed;}

  /* PROMPT BOX */
  .prompt-box{background:var(--surface2);border:1px solid rgba(240,192,64,.2);border-radius:8px;padding:11px 38px 11px 13px;margin-bottom:14px;position:relative;}
  .prompt-lbl{font-size:8px;letter-spacing:2px;color:var(--accent-draft);font-weight:700;margin-bottom:5px;}
  .prompt-txt{font-size:12px;color:var(--text-dim);line-height:1.7;font-style:italic;}
  .prompt-ref{position:absolute;top:9px;right:9px;width:26px;height:26px;background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,.2);border-radius:5px;color:var(--accent-draft);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;}
  .prompt-ref:active{transform:rotate(180deg) scale(.9);}

  /* TIMER */
  .t-row{display:flex;gap:6px;}
  .t-opt{flex:1;padding:9px 3px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--text-dim);cursor:pointer;transition:all .15s;user-select:none;}
  .t-opt.active{background:rgba(240,192,64,0.12);border-color:rgba(240,192,64,.4);color:var(--accent-draft);}
  .t-opt:active{transform:scale(.95);}
  .cd-disp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px;text-align:center;margin-bottom:14px;display:none;}
  .cd-disp.act{display:block;}
  .cd-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent-draft);letter-spacing:2px;line-height:1;}
  .cd-num.warn{color:var(--red);animation:blink .8s infinite;}
  @keyframes blink{50%{opacity:.4;}}
  .cd-lbl{font-size:9px;color:var(--text-muted);letter-spacing:2px;margin-top:4px;}

  /* STAGE FLOW */
  .sf{display:flex;align-items:center;gap:5px;margin-bottom:15px;}
  .sn{flex:1;padding:6px 4px;text-align:center;border-radius:6px;font-size:9px;letter-spacing:1.5px;font-weight:700;border:1px solid var(--border);color:var(--text-muted);transition:all .2s;}
  .sn.sd{background:rgba(240,192,64,.08);border-color:rgba(240,192,64,.25);color:var(--accent-draft);}
  .sn.sr{background:rgba(64,144,240,.08);border-color:rgba(64,144,240,.25);color:var(--accent-revise);}
  .sn.sf2{background:rgba(64,200,120,.08);border-color:rgba(64,200,120,.25);color:var(--accent-final);}
  .sa{color:var(--text-muted);font-size:10px;}

  /* DIFF */
  .db{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px;}
  .dl{font-size:8px;letter-spacing:2px;color:var(--text-muted);margin-bottom:6px;font-weight:700;}
  .dt{font-size:12px;color:var(--text-dim);line-height:1.7;white-space:pre-wrap;}
  .dt.ref-t{border-left:2px solid #333;padding-left:9px;font-style:italic;}

  /* BUTTONS */
  .ar{display:flex;gap:7px;margin-top:15px;}
  .btn{flex:1;padding:12px 7px;border-radius:8px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;font-weight:700;cursor:pointer;border:none;transition:all .15s;text-align:center;}
  .btn:active{transform:scale(.96);}
  .btn-dr{background:var(--accent-draft);color:#000;}
  .btn-rv{background:var(--accent-revise);color:#fff;}
  .btn-fn{background:var(--accent-final);color:#000;}
  .btn-sc{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);}
  .btn-pr{background:linear-gradient(135deg,rgba(64,144,240,.15),rgba(64,200,120,.15));border:1px solid rgba(64,144,240,.3);color:var(--text);}
  .btn-dn{background:linear-gradient(135deg,rgba(64,200,120,.2),rgba(40,160,96,.2));border:2px solid var(--accent-final);color:var(--accent-final);}

  .sep{text-align:center;position:relative;margin:14px 0 11px;}
  .sep::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
  .sep span{position:relative;background:var(--surface);padding:0 9px;font-size:8px;letter-spacing:2px;color:var(--text-muted);}

  /* HISTORY */
  .hi{padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--surface2);}
  .hi-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
  .ht{font-size:8px;letter-spacing:2px;font-weight:700;padding:2px 6px;border-radius:3px;}
  .ht.hd{background:rgba(240,192,64,.1);color:var(--accent-draft);}
  .ht.hr{background:rgba(64,144,240,.1);color:var(--accent-revise);}
  .ht.hf{background:rgba(64,200,120,.1);color:var(--accent-final);}
  .ht.hx{background:rgba(40,160,96,.15);color:var(--accent-done);}
  .hi-date{font-size:9px;color:var(--text-muted);}
  .hi-title{font-size:12px;color:var(--text);margin-bottom:3px;font-weight:700;}
  .hi-snip{font-size:10px;color:var(--text-dim);line-height:1.6;}

  /* TOAST */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:11px;color:var(--text);letter-spacing:1px;z-index:800;opacity:0;transition:all .3s;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">NOTE<span>FLOW</span></div>
    <div class="hdr-right">
      <div class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀</div>
      <div class="hdr-time" id="liveClock">--:--</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active-draft" onclick="switchTab('draft')" id="tab-draft">◈ TASLAK<div class="tab-count" id="cnt-draft">0</div></div>

// ══ STATE ════════════════════════════════════
let notes   = JSON.parse(localStorage.getItem('nf2_notes')   || '[]');
let history = JSON.parse(localStorage.getItem('nf2_hist')    || '[]');
let archive = JSON.parse(localStorage.getItem('nf2_arch')    || '[]');
let currentTab='draft', currentFilter='all', searchQ='';
let editingId=null, selTimer=0, cdInterval=null, cdEnd=null;
let editTimerIv=null, cardTimers={}, dragSrc=null;
let isLight=localStorage.getItem('nf2_theme')==='light';
if(isLight){document.body.classList.add('light');}

function save(){localStorage.setItem('nf2_notes',JSON.stringify(notes));localStorage.setItem('nf2_hist',JSON.stringify(history));localStorage.setItem('nf2_arch',JSON.stringify(archive));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function now(){const d=new Date();return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pushHist(note,action){history.unshift({id:uid(),noteId:note.id,title:note.title,stage:note.stage,content:note.content,action,time:now()});if(history.length>120)history=history.slice(0,120);save();}

// ── THEME ───────────────────────────────────
function toggleTheme(){isLight=!isLight;document.body.classList.toggle('light',isLight);document.getElementById('themeBtn').textContent=isLight?'☾':'☀';localStorage.setItem('nf2_theme',isLight?'light':'dark');}
document.getElementById('themeBtn').textContent=isLight?'☾':'☀';

// ── CLOCK ───────────────────────────────────
setInterval(()=>{document.getElementById('liveClock').textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});},1000);

// ── PROMPTS ──────────────────────────────────
let lastP=-1;
function getPrompt(){let i;do{i=Math.floor(Math.random()*PROMPTS.length);}while(i===lastP&&PROMPTS.length>1);lastP=i;return PROMPTS[i];}
function refreshPrompt(){document.getElementById('promptTxt').textContent=getPrompt();}

// ── TABS & FILTER ────────────────────────────
function switchTab(tab){
  currentTab=tab;currentFilter='all';searchQ='';
  document.getElementById('searchInput').value='';
  document.getElementById('sc').classList.remove('vis');
  ['draft','revise','final','archive'].forEach(t=>{
    document.getElementById('tab-'+t).className='tab'+(t===tab?' active-'+t:'');
  });
  const isArch=tab==='archive';
  document.getElementById('chipRow').style.display=isArch?'none':'flex';
  document.getElementById('fabBtn').style.display=isArch?'none':'flex';
  updateChips();renderCards();
}
function setFilter(f){currentFilter=f;updateChips();renderCards();}
function updateChips(){
  const map={all:'ca',draft:'cd',revise:'cr',final:'cf',done:'cx'};
  ['all','draft','revise','final','done'].forEach(f=>{
    const el=document.getElementById('chip-'+f);
    el.className='chip'+(f===currentFilter?' '+map[f]:'');
  });
}

// ── SEARCH ───────────────────────────────────
function onSearch(v){searchQ=v.toLowerCase().trim();document.getElementById('sc').classList.toggle('vis',!!v);renderCards();}
function clearSearch(){searchQ='';document.getElementById('searchInput').value='';document.getElementById('sc').classList.remove('vis');renderCards();}
function hl(text,q){if(!q)return esc(text);return esc(text).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hl">$1</span>');}

// ── RENDER ───────────────────────────────────
function renderCards(){
  const list=document.getElementById('cardList');
  list.innerHTML='';
  ['draft','revise','final'].forEach(t=>document.getElementById('cnt-'+t).textContent=notes.filter(n=>n.stage===t).length);
  document.getElementById('cnt-archive').textContent=archive.length;

  if(currentTab==='archive'){renderArchive(list);return;}

  let filtered;
  if(searchQ){
    filtered=notes.filter(n=>(n.title||'').toLowerCase().includes(searchQ)||(n.content||'').toLowerCase().includes(searchQ)||(n.ref||'').toLowerCase().includes(searchQ));
  } else if(currentFilter==='done'){
    filtered=notes.filter(n=>n.stage===currentTab&&n.done);
  } else if(currentFilter!=='all'){
    filtered=notes.filter(n=>n.stage===currentFilter);
  } else {
    filtered=notes.filter(n=>n.stage===currentTab);
  }

  const lbl={draft:'◈ TASLAK',revise:'◉ REVİZE',final:'◆ FİNAL'};
  document.getElementById('secTitle').innerHTML=`${lbl[currentTab]||''} <span>/ ${String(notes.filter(n=>n.stage===currentTab).length).padStart(2,'0')}</span>`;
  document.getElementById('resCnt').textContent=searchQ?`${filtered.length} sonuç`:'';

  if(!filtered.length){
    const msgs={draft:'> taslak yok_\n> + ile yeni not ekle...',revise:'> revize bekleyen yok_',final:'> final notu yok_'};
    list.innerHTML=`<div class="empty"><div class="empty-icon">${currentTab==='draft'?'◈':currentTab==='revise'?'◉':'◆'}</div><div class="empty-text">${searchQ?'> sonuç bulunamadı_':msgs[currentTab]||''}</div></div>`;
    return;
  }
  list.className='cards';
  filtered.sort((a,b)=>b.createdAt-a.createdAt).forEach((note,i)=>{
    const wrap=buildWrap(note,i);list.appendChild(wrap);
    if(note.stage==='draft'&&note.timerEnd)startCardTimer(note.id);
  });
}

function buildWrap(note,i){
  const wrap=document.createElement('div');
  wrap.className='card-wrap';wrap.dataset.id=note.id;
  wrap.style.animationDelay=(i*.05)+'s';
  const bgL=document.createElement('div');bgL.className='swipe-bg swipe-bg-l';
  bgL.innerHTML=`<span class="swipe-icon" id="sl-${note.id}">🗑</span>`;
  const bgR=document.createElement('div');bgR.className='swipe-bg swipe-bg-r';
  const pi=note.stage==='draft'?'◉':note.stage==='revise'?'◆':note.done?'↩':'✓';
  bgR.innerHTML=`<span class="swipe-icon" id="sr-${note.id}">${pi}</span>`;
  wrap.appendChild(bgL);wrap.appendChild(bgR);wrap.appendChild(buildCard(note));
  setupSwipe(wrap,note);setupDrag(wrap,note);
  return wrap;
}

function buildCard(note){
  const div=document.createElement('div');
  div.className=`card ${note.stage}${note.done?' done':''}`;
  div.id='card-'+note.id;
  const sd={draft:1,revise:2,final:3};
  const dots=['draft','revise','final'].map(s=>`<div class="dot ${sd[note.stage]>=sd[s]?s:''}"></div>`).join('');
  const bc=note.done?'b-done':'b-'+note.stage;
  const bl=note.done?'✓ TAMAMLANDI':{draft:'TASLAK',revise:'REVİZE',final:'FİNAL'}[note.stage];
  let tb='';
  if(note.stage==='draft'&&note.timerEnd){const r=Math.max(0,note.timerEnd-Date.now());const exp=r===0;const mm=String(Math.floor(r/60000)).padStart(2,'0');const ss=String(Math.floor((r%60000)/1000)).padStart(2,'0');tb=`<div class="timer-badge${exp?' exp':''}" id="timer-${note.id}">${exp?'BİTTİ':mm+':'+ss}</div>`;}
  let da='';
  if(note.done)da=`<div class="done-mark">✓</div>`;
  else if(note.stage==='final')da=`<div class="card-btn" onclick="event.stopPropagation();quickDone('${note.id}')">✓</div>`;
  const refHtml=note.ref?`<div class="card-ref"><div class="card-ref-lbl">REFERANS</div>${hl(note.ref.slice(0,80),searchQ)}${note.ref.length>80?'…':''}</div>`:'';
  div.innerHTML=`
    <div class="card-hdr">
      <div class="card-meta"><span class="badge ${bc}">${bl}</span><span class="card-date">${note.date}</span></div>
      <div class="card-acts">${tb}${da}${!note.done?`<div class="card-btn" onclick="event.stopPropagation();openEdit('${note.id}')">✎</div>`:''}<div class="drag-hdl" title="Sürükle">⠿</div></div>
    </div>
    <div class="card-body" onclick="openEdit('${note.id}')">
      <div class="card-title">${hl(note.title||'Başlıksız',searchQ)}</div>
      <div class="card-prev">${hl(note.content||'—',searchQ)}</div>${refHtml}
    </div>
    <div class="card-foot">
      <div class="prog"><div class="dots">${dots}</div><div class="prog-lbl">AŞAMA ${sd[note.stage]}/3</div></div>
      ${note.revisions>0?`<div class="prog-lbl">${note.revisions} REVİZYON</div>`:''}
    </div>`;
  return div;
}

// ── ARCHIVE ──────────────────────────────────
function renderArchive(list){
  document.getElementById('secTitle').innerHTML=`▣ ARŞİV <span>/ ${String(archive.length).padStart(2,'0')}</span>`;
  if(!archive.length){list.innerHTML=`<div class="empty"><div class="empty-icon">▣</div><div class="empty-text">> arşiv boş_\n> tamamlanan notlar buraya taşınır...</div></div>`;return;}
  archive.slice().reverse().forEach((a,i)=>{
    const d=document.createElement('div');d.className='arch-card';d.style.animationDelay=(i*.05)+'s';
    d.innerHTML=`<div class="arch-hdr"><span class="badge b-done">✓ TAMAMLANDI</span><span class="arch-restore" onclick="restoreArchive('${a.id}')">GERİ AL</span></div>
    <div class="arch-title">${esc(a.title)}</div><div class="arch-date">${a.date}</div>
    <div class="arch-content">${esc((a.content||'').slice(0,120))}${(a.content||'').length>120?'…':''}</div>
    <div class="arch-stats"><div class="arch-stat">REVİZYON <span>${a.revisions||0}</span></div><div class="arch-stat">TASLAK → FİNAL</div></div>`;
    list.appendChild(d);
  });
}
function restoreArchive(id){const idx=archive.findIndex(a=>a.id===id);if(idx<0)return;const a=archive.splice(idx,1)[0];a.done=false;a.stage='final';notes.unshift(a);save();switchTab('final');showToast('↩ arşivden geri alındı');}

// ── CARD TIMER ────────────────────────────────
function startCardTimer(nid){
  if(cardTimers[nid])clearInterval(cardTimers[nid]);
  cardTimers[nid]=setInterval(()=>{
    const n=notes.find(x=>x.id===nid);if(!n||!n.timerEnd){clearInterval(cardTimers[nid]);return;}
    const el=document.getElementById('timer-'+nid);if(!el){clearInterval(cardTimers[nid]);return;}
    const r=Math.max(0,n.timerEnd-Date.now());
    if(r===0){el.textContent='BİTTİ';el.classList.add('exp');clearInterval(cardTimers[nid]);}
    else{const mm=String(Math.floor(r/60000)).padStart(2,'0');const ss=String(Math.floor((r%60000)/1000)).padStart(2,'0');el.textContent=mm+':'+ss;}
  },1000);
}

// ── SWIPE ─────────────────────────────────────
function setupSwipe(wrap,note){
  const card=wrap.querySelector('.card');
  let sx=0,dx=0,sw=false;const T=88;
  card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dx=0;sw=true;},{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!sw)return;dx=e.touches[0].clientX-sx;
    card.style.transform=`translateX(${dx}px)`;card.style.transition='none';
    const sl=document.getElementById('sl-'+note.id);const sr=document.getElementById('sr-'+note.id);
    if(sl)sl.classList.toggle('vis',dx<-38);if(sr)sr.classList.toggle('vis',dx>38);
  },{passive:true});
  card.addEventListener('touchend',()=>{
    if(!sw)return;sw=false;
    card.style.transition='transform .3s cubic-bezier(.34,.6,.64,1)';card.style.transform='translateX(0)';
    const sl=document.getElementById('sl-'+note.id);const sr=document.getElementById('sr-'+note.id);
    if(sl)sl.classList.remove('vis');if(sr)sr.classList.remove('vis');
    const cur=notes.find(n=>n.id===note.id)||note;
    if(dx<-T){if(confirm('Bu not silinsin mi?'))doDelete(note.id);}
    else if(dx>T)doSwipePromote(note.id);
    dx=0;
  });
}
function doSwipePromote(id){
  const n=notes.find(x=>x.id===id);if(!n)return;
  if(n.done){n.done=false;save();renderCards();showToast('↩ geri alındı');return;}
  if(n.stage==='draft'){n.draftContent=n.content;n.stage='revise';n.revisions=0;pushHist(n,'REVİZEYE AKTARILDI');save();switchTab('revise');showToast('◉ revizeye aktarıldı');}
  else if(n.stage==='revise'){n.stage='final';n.revisions=(n.revisions||0)+1;pushHist(n,'FİNALE AKTARILDI');save();switchTab('final');showToast('◆ finale aktarıldı');}
  else if(n.stage==='final'){quickDone(id);}
}
function doDelete(id){notes=notes.filter(n=>n.id!==id);save();renderCards();showToast('✕ not silindi');}
function quickDone(id){const n=notes.find(x=>x.id===id);if(!n)return;n.done=true;pushHist(n,'TAMAMLANDI ✓');save();renderCards();showToast('✓ not tamamlandı!');}

// ── DRAG & DROP ───────────────────────────────
function setupDrag(wrap,note){
  const hdl=wrap.querySelector('.drag-hdl');if(!hdl)return;
  let lp,isDrag=false;
  hdl.addEventListener('touchstart',()=>{lp=setTimeout(()=>{isDrag=true;wrap.classList.add('dragging');dragSrc=wrap;},300);},{passive:true});
  hdl.addEventListener('touchmove',e=>{
    if(!isDrag)return;
    const els=document.elementsFromPoint(e.touches[0].clientX,e.touches[0].clientY);
    const tgt=els.find(el=>el.classList.contains('card-wrap')&&el!==dragSrc);
    document.querySelectorAll('.card-wrap').forEach(w=>w.classList.remove('drag-over'));
    if(tgt)tgt.classList.add('drag-over');
  },{passive:true});
  hdl.addEventListener('touchend',()=>{
    clearTimeout(lp);if(!isDrag){isDrag=false;return;}isDrag=false;
    wrap.classList.remove('dragging');
    const tgt=document.querySelector('.card-wrap.drag-over');
    if(tgt)swapNotes(dragSrc.dataset.id,tgt.dataset.id);
    document.querySelectorAll('.card-wrap').forEach(w=>w.classList.remove('drag-over'));
    dragSrc=null;
  });
  wrap.setAttribute('draggable','true');
  wrap.addEventListener('dragstart',e=>{dragSrc=wrap;wrap.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  wrap.addEventListener('dragend',()=>{wrap.classList.remove('dragging');document.querySelectorAll('.card-wrap').forEach(w=>w.classList.remove('drag-over'));dragSrc=null;});
  wrap.addEventListener('dragover',e=>{e.preventDefault();if(wrap!==dragSrc)wrap.classList.add('drag-over');});
  wrap.addEventListener('dragleave',()=>wrap.classList.remove('drag-over'));
  wrap.addEventListener('drop',e=>{e.preventDefault();wrap.classList.remove('drag-over');if(dragSrc&&dragSrc!==wrap)swapNotes(dragSrc.dataset.id,wrap.dataset.id);});
}
function swapNotes(a,b){const i=notes.findIndex(n=>n.id===a);const j=notes.findIndex(n=>n.id===b);if(i<0||j<0)return;[notes[i],notes[j]]=[notes[j],notes[i]];save();renderCards();}

// ── NEW DRAFT ─────────────────────────────────
function openNew(){
  document.getElementById('nTitle').value='';document.getElementById('nRef').value='';document.getElementById('nContent').value='';
  selTimer=0;document.querySelectorAll('.t-opt').forEach(e=>e.classList.remove('active'));document.getElementById('to0').classList.add('active');
  stopCD();refreshPrompt();document.getElementById('newModal').classList.add('open');
}
function closeNew(){stopCD();document.getElementById('newModal').classList.remove('open');}
function selTimerFn(min){selTimer=min;document.querySelectorAll('.t-opt').forEach(e=>e.classList.remove('active'));document.getElementById('to'+min).classList.add('active');if(min>0)startCD(min);else stopCD();}
function selTimer(min){selTimerFn(min);}
function startCD(min){stopCD();cdEnd=Date.now()+min*60*1000;document.getElementById('cdDisp').classList.add('act');updCD();cdInterval=setInterval(()=>{updCD();if(cdEnd-Date.now()<=0)clearInterval(cdInterval);},1000);}
function stopCD(){clearInterval(cdInterval);cdInterval=null;cdEnd=null;document.getElementById('cdDisp').classList.remove('act');}
function updCD(){if(!cdEnd)return;const r=Math.max(0,cdEnd-Date.now());const mm=String(Math.floor(r/60000)).padStart(2,'0');const ss=String(Math.floor((r%60000)/1000)).padStart(2,'0');const el=document.getElementById('cdNum');el.textContent=mm+':'+ss;el.className='cd-num'+(r<60000&&r>0?' warn':'');}
function saveDraft(){
  const t=document.getElementById('nTitle').value.trim();const c=document.getElementById('nContent').value.trim();
  if(!t&&!c){showToast('⚠ başlık veya içerik gir');return;}
  const note={id:uid(),title:t||'Başlıksız',content:c,ref:document.getElementById('nRef').value.trim(),stage:'draft',done:false,revisions:0,createdAt:Date.now(),date:now(),timerEnd:selTimer>0?(cdEnd||(Date.now()+selTimer*60*1000)):null};
  notes.unshift(note);pushHist(note,'OLUŞTURULDU');save();stopCD();closeNew();switchTab('draft');showToast('✓ taslak kaydedildi');
}

// ── EDIT ─────────────────────────────────────
function openEdit(id){
  editingId=id;const note=notes.find(n=>n.id===id);if(!note)return;
  const ttls={draft:'◈ TASLAK DÜZENLE',revise:'◉ REVİZE DÜZENLE',final:'◆ FİNAL DÜZENLE'};
  document.getElementById('editTitle').textContent=note.done?'◆ TAMAMLANDI':ttls[note.stage];
  document.getElementById('editBody').innerHTML=buildEditBody(note);
  document.getElementById('editModal').classList.add('open');
}
function buildEditBody(note){
  if(note.done)return`<div class="sf"><div class="sn sd">TASLAK</div><div class="sa">›</div><div class="sn sr">REVİZE</div><div class="sa">›</div><div class="sn sf2">FİNAL</div></div><div style="text-align:center;padding:26px 0;color:var(--accent-final)"><div style="font-size:46px;margin-bottom:9px">✓</div><div style="font-size:11px;letter-spacing:3px;font-weight:700">TAMAMLANDI</div><div style="font-size:10px;color:var(--text-dim);margin-top:5px">${note.date}</div></div><div class="db"><div class="dl">SON İÇERİK</div><div class="dt">${esc(note.content)}</div></div><div class="ar"><div class="btn btn-sc" onclick="undoDone('${note.id}')">GERİ AL</div><div class="btn btn-sc" onclick="archiveNote('${note.id}')">ARŞİVLE ▣</div></div>`;
  if(note.stage==='draft'){
    let tb='';
    if(note.timerEnd){const r=Math.max(0,note.timerEnd-Date.now());const mm=String(Math.floor(r/60000)).padStart(2,'0');const ss=String(Math.floor((r%60000)/1000)).padStart(2,'0');tb=`<div class="cd-disp act" style="margin-bottom:12px"><div class="cd-num${r<60000&&r>0?' warn':''}" id="etnum">${r===0?'00:00':mm+':'+ss}</div><div class="cd-lbl">CHALLENGE — KALAN SÜRE</div></div>`;setTimeout(()=>startEditTimer(note),50);}
    return`<div class="sf"><div class="sn sd">TASLAK</div><div class="sa">›</div><div class="sn" style="opacity:.3">REVİZE</div><div class="sa" style="opacity:.3">›</div><div class="sn" style="opacity:.3">FİNAL</div></div>${tb}<div class="fg"><label class="fl">▸ BAŞLIK</label><input class="fi" id="et" value="${esc(note.title)}"></div><div class="fg"><label class="fl">▸ REFERANS / ALINTI</label><textarea class="fta ref" id="er">${esc(note.ref||'')}</textarea></div><div class="fg"><label class="fl">▸ TASLAK İÇERİK</label><textarea class="fta" id="ec">${esc(note.content)}</textarea></div><div class="ar" style="flex-wrap:wrap;gap:7px"><div class="btn btn-sc" onclick="saveEdit()" style="flex:1">KAYDET</div><div class="btn btn-pr" onclick="toRevise('${note.id}')" style="flex:2">REVİZEYE AKTAR ›</div></div><div class="ar"><div class="btn btn-sc" onclick="delNote('${note.id}')">SİL</div></div>`;
  }
  if(note.stage==='revise'){
    const rH=note.ref?`<div class="sep"><span>REFERANS</span></div><div class="db"><div class="dl">▸ REFERANS / ALINTI</div><div class="dt ref-t">${esc(note.ref)}</div></div>`:'';
    const prev=note.draftContent||'';
    const dH=prev?`<div class="sep"><span>ÖNCEKİ TASLAK</span></div><div class="db"><div class="dl">▸ TASLAK</div><div class="dt" style="color:var(--text-muted);text-decoration:line-through;font-size:11px">${esc(prev.slice(0,200))}${prev.length>200?'…':''}</div></div>`:'';
    return`<div class="sf"><div class="sn" style="opacity:.3">TASLAK</div><div class="sa">›</div><div class="sn sr">REVİZE</div><div class="sa">›</div><div class="sn" style="opacity:.3">FİNAL</div></div>${rH}${dH}<div class="sep"><span>REVİZE İÇERİK</span></div><div class="fg"><label class="fl">▸ BAŞLIK</label><input class="fi" id="et" value="${esc(note.title)}"></div><div class="fg"><label class="fl">▸ REVİZE YAZI <span style="color:var(--accent-revise);font-size:8px">— düzenle / yeniden yaz</span></label><textarea class="fta" style="min-height:120px;border-color:rgba(64,144,240,.3)" id="ec">${esc(note.content)}</textarea></div><div style="font-size:9px;color:var(--text-muted);margin-bottom:13px;letter-spacing:1px">▸ ${note.revisions} revizyon yapıldı</div><div class="ar" style="flex-wrap:wrap;gap:7px"><div class="btn btn-sc" onclick="saveEdit()" style="flex:1">KAYDET</div><div class="btn btn-rv" onclick="toFinal('${note.id}')" style="flex:2">FİNALE AKTAR ›</div></div><div class="ar"><div class="btn btn-sc" onclick="delNote('${note.id}')">SİL</div></div>`;
  }
  if(note.stage==='final')return`<div class="sf"><div class="sn" style="opacity:.3">TASLAK</div><div class="sa">›</div><div class="sn" style="opacity:.3">REVİZE</div><div class="sa">›</div><div class="sn sf2">FİNAL</div></div><div class="fg"><label class="fl">▸ BAŞLIK</label><input class="fi" id="et" value="${esc(note.title)}"></div><div class="fg"><label class="fl">▸ FİNAL İÇERİK <span style="color:var(--accent-final);font-size:8px">— son düzenleme</span></label><textarea class="fta" style="min-height:130px;border-color:rgba(64,200,120,.3)" id="ec">${esc(note.content)}</textarea></div>${note.revisions>0?`<div style="font-size:9px;color:var(--text-muted);margin-bottom:13px;letter-spacing:1px">▸ toplam ${note.revisions} revizyon</div>`:''}<div class="ar" style="flex-wrap:wrap;gap:7px"><div class="btn btn-sc" onclick="saveEdit()" style="flex:1">KAYDET</div><div class="btn btn-dn" onclick="markDone('${note.id}')" style="flex:2">✓ TAMAMLA</div></div><div class="ar"><div class="btn btn-sc" onclick="delNote('${note.id}')">SİL</div></div>`;
}
function startEditTimer(note){if(editTimerIv)clearInterval(editTimerIv);editTimerIv=setInterval(()=>{const el=document.getElementById('etnum');if(!el){clearInterval(editTimerIv);return;}const r=Math.max(0,note.timerEnd-Date.now());const mm=String(Math.floor(r/60000)).padStart(2,'0');const ss=String(Math.floor((r%60000)/1000)).padStart(2,'0');el.textContent=r===0?'00:00':mm+':'+ss;el.className='cd-num'+(r<60000&&r>0?' warn':'');if(r===0)clearInterval(editTimerIv);},1000);}
function closeEdit(){if(editTimerIv)clearInterval(editTimerIv);document.getElementById('editModal').classList.remove('open');editingId=null;}
function saveEdit(){const n=notes.find(x=>x.id===editingId);if(!n)return;const t=document.getElementById('et');const c=document.getElementById('ec');if(t)n.title=t.value.trim()||'Başlıksız';if(c)n.content=c.value.trim();if(n.stage==='revise')n.revisions=(n.revisions||0)+1;pushHist(n,'DÜZENLENDİ');save();closeEdit();renderCards();showToast('✓ kaydedildi');}
function toRevise(id){const n=notes.find(x=>x.id===id);if(!n)return;const t=document.getElementById('et');const c=document.getElementById('ec');const r=document.getElementById('er');if(c){n.draftContent=n.content;n.content=c.value.trim()||n.content;}if(t)n.title=t.value.trim()||n.title;if(r)n.ref=r.value.trim()||n.ref;n.stage='revise';n.revisions=0;pushHist(n,'REVİZEYE AKTARILDI');save();closeEdit();switchTab('revise');showToast('◉ revizeye aktarıldı');}
function toFinal(id){const n=notes.find(x=>x.id===id);if(!n)return;const c=document.getElementById('ec');const t=document.getElementById('et');if(c)n.content=c.value.trim()||n.content;if(t)n.title=t.value.trim()||n.title;n.revisions=(n.revisions||0)+1;n.stage='final';pushHist(n,'FİNALE AKTARILDI');save();closeEdit();switchTab('final');showToast('◆ finale aktarıldı');}
function markDone(id){const n=notes.find(x=>x.id===id);if(!n)return;const c=document.getElementById('ec');const t=document.getElementById('et');if(c)n.content=c.value.trim()||n.content;if(t)n.title=t.value.trim()||n.title;n.done=true;pushHist(n,'TAMAMLANDI ✓');save();closeEdit();renderCards();showToast('✓ not tamamlandı!');}
function undoDone(id){const n=notes.find(x=>x.id===id);if(!n)return;n.done=false;save();closeEdit();renderCards();showToast('↩ tamamlama geri alındı');}
function archiveNote(id){const n=notes.find(x=>x.id===id);if(!n)return;notes=notes.filter(x=>x.id!==id);archive.unshift(n);save();closeEdit();switchTab('archive');showToast('▣ arşive taşındı');}
function delNote(id){if(!confirm('Bu not silinsin mi?'))return;doDelete(id);closeEdit();}

// ── HISTORY ───────────────────────────────────
function openHistory(){
  const body=document.getElementById('histBody');
  if(!history.length){body.innerHTML=`<div class="empty"><div class="empty-icon">⟳</div><div class="empty-text">> geçmiş boş_</div></div>`;} 
  else{const cls={draft:'hd',revise:'hr',final:'hf',done:'hx'};body.innerHTML=history.slice(0,60).map(h=>`<div class="hi"><div class="hi-hdr"><span class="ht ${cls[h.stage]||'hd'}">${h.action}</span><span class="hi-date">${h.time}</span></div><div class="hi-title">${esc(h.title)}</div><div class="hi-snip">${esc((h.content||'').slice(0,80))}${(h.content||'').length>80?'…':''}</div></div>`).join('');}
  document.getElementById('histModal').classList.add('open');
}
function closeHistory(){document.getElementById('histModal').classList.remove('open');}

// ── TOAST ─────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── MODAL OVERLAY CLOSE ───────────────────────
['newModal','editModal','histModal'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id){if(id==='newModal')closeNew();else if(id==='editModal')closeEdit();else closeHistory();}});});

// ── INIT ─────────────────────────────────────
renderCards();
</script>
</body>
</html>
