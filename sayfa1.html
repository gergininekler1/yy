<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Retro Notes Final</title>

<style>
:root{
--bg:#d9edf5;
--bg2:#eef8fb;
--panel:#edf4f7;
--panel2:#dfeaf0;
--line:#8ba6b3;
--line2:#5f7986;
--text:#10222b;
--muted:#5e737d;
--title1:#2f62b6;
--title2:#5ea7cf;
--white:#fff;

--btn:#e8f0f4;
--btnh:#f8fcff;

--terminal:#071107;
--terminal2:#0d180d;
--green:#8cff9d;
--green2:#5cb66a;
}

body.dark{
--bg:#22343d;
--bg2:#304851;
--panel:#31454f;
--panel2:#3d5560;
--line:#7f98a4;
--line2:#c6d4dc;
--text:#edf5f8;
--muted:#bdd0d8;
--title1:#21408f;
--title2:#4476d8;
--white:#fff;
--btn:#415963;
--btnh:#56717d;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Tahoma,Verdana,sans-serif;
font-size:13px;
background:linear-gradient(135deg,var(--bg2),var(--bg));
color:var(--text);
min-height:100vh;
}

#app{
max-width:1200px;
margin:auto;
padding:18px;
}

.window{
border:2px solid;
border-color:#fff var(--line2) var(--line2) #fff;
background:var(--panel);
box-shadow:3px 3px 0 rgba(0,0,0,.12);
}

.titlebar{
padding:5px 8px;
color:white;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,var(--title1),var(--title2));
}

.titlebtn{
width:18px;height:18px;
background:#d9dde0;
color:#000;
text-align:center;
line-height:14px;
border:2px solid;
border-color:#fff #555 #555 #fff;
font-size:11px;
}

.content{padding:12px}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:12px;
}

button,.btn,input,textarea,select{
font-family:Tahoma,Verdana,sans-serif;
font-size:13px;
}

button,.btn{
padding:7px 12px;
cursor:pointer;
background:var(--btn);
color:var(--text);
border:2px solid;
border-color:#fff var(--line2) var(--line2) #fff;
}

button:hover,.btn:hover{
background:var(--btnh);
}

button:active,.btn:active{
border-color:var(--line2) #fff #fff var(--line2);
transform:translateY(1px);
}

input,textarea,select{
width:100%;
padding:7px;
background:white;
border:2px solid;
border-color:var(--line2) #fff #fff var(--line2);
color:#111;
}

body.dark input,
body.dark textarea,
body.dark select{
background:#edf4f7;
}

.section{
background:var(--panel2);
padding:10px;
margin-bottom:12px;
border:2px solid;
border-color:#fff var(--line) var(--line) #fff;
}

.section h3{
margin:0 0 10px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:320px 1fr;
gap:12px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.card{
padding:12px;
min-height:90px;
cursor:pointer;
background:linear-gradient(180deg,#fafdff,#dfeaf0);
border:2px solid;
border-color:#fff var(--line2) var(--line2) #fff;
display:flex;
flex-direction:column;
justify-content:center;
gap:6px;
}

body.dark .card{
background:linear-gradient(180deg,#4a626d,#354952);
}

.card:hover{
transform:translateY(-1px);
}

.card b{
font-size:15px;
}

.listitem{
padding:8px;
margin-bottom:8px;
cursor:pointer;
background:#f9fcff;
border:1px solid var(--line);
}

body.dark .listitem{
background:#3c4f58;
}

.muted{color:var(--muted);font-size:12px}

.tags{
padding:8px;
min-height:40px;
background:rgba(255,255,255,.5);
border:1px solid #b8cad2;
margin-bottom:0;
}

.tag{
display:inline-block;
margin:2px 6px 2px 0;
padding:4px 8px;
font-size:12px;
background:#eef8fb;
border:1px solid #bdd1db;
color:#607985;
}

.terminal-wrap{
border:2px solid;
border-color:#fff var(--line2) var(--line2) #fff;
background:#bcc5c9;
overflow:hidden;
}

.terminal-top{
padding:5px 8px;
background:linear-gradient(180deg,#d7d7d7,#bdbdbd);
font-weight:bold;
color:#111;
}

.terminal{
background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,.02),
rgba(255,255,255,.02) 1px,
transparent 2px,
transparent 4px),
linear-gradient(180deg,var(--terminal),var(--terminal2));
padding:10px;
}

.terminal-tags{
font-family:"Courier New",monospace;
color:var(--green2);
font-size:13px;
margin-bottom:8px;
line-height:1.6;
}

.terminal textarea{
background:transparent;
border:none;
padding:0;
min-height:360px;
resize:vertical;
font-family:"Courier New",monospace;
font-size:15px;
line-height:1.65;
color:var(--green);
caret-color:var(--green);
}

.terminal textarea::placeholder{
color:#5f9164;
}

.row2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.archiveItem{
display:grid;
grid-template-columns:1fr auto auto;
gap:8px;
align-items:center;
padding:8px;
margin-bottom:8px;
background:#f8fcff;
border:1px solid var(--line);
}

body.dark .archiveItem{
background:#3b4d56;
}

hr{
border:0;
border-top:1px solid var(--line);
margin:10px 0;
}

::-webkit-scrollbar{width:12px}
::-webkit-scrollbar-thumb{
background:#b9c8cf;
border:2px solid #eef6fa;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
.cards{grid-template-columns:1fr 1fr}
}

@media(max-width:650px){
.cards,.row2{grid-template-columns:1fr}
.archiveItem{grid-template-columns:1fr}
.toolbar{flex-direction:column}
#app{padding:10px}
}
</style>
</head>

<body>
<div id="app"></div>

<script>
const CATS=["Mekan","Nesne","Zaman","Kişi","Eylem","Duygu"];

let state=JSON.parse(localStorage.getItem("retroFinalState")||"null")||{
theme:"light",
notes:[],
refs:{
Mekan:["Kafe","Orman","Metro"],
Nesne:["Anahtar","Defter","Saat"],
Zaman:["Gece","1998","Sabah"],
Kişi:["Dedektif","Garson","Yabancı"],
Eylem:["Kaçmak","Beklemek","Araştırmak"],
Duygu:["Gerilim","Merak","Hüzün"]
}
};

if(state.theme==="dark")document.body.classList.add("dark");

function save(){
localStorage.setItem("retroFinalState",JSON.stringify(state));
}

function esc(t){
return String(t||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

function fmt(t){
return new Date(t).toLocaleString("tr-TR");
}

function top(title,body){
app.innerHTML=`
<div class="window">
<div class="titlebar">
<div>${title}</div>
<div class="titlebtn">×</div>
</div>
<div class="content">
${toolbar()}
${body}
</div>
</div>
`;
}

function toolbar(){
return `
<div class="toolbar">
<button onclick="home()">🏠 Ana Sayfa</button>
<button onclick="newNote()">📝 Yeni Not</button>
<button onclick="randomIdea()">🎲 İlham Üret</button>
<button onclick="toggleTheme()">🌙 Tema</button>
<button onclick="exportJSON()">💾 Dışa Aktar</button>
<label class="btn">📥 İçe Aktar<input hidden type="file" onchange="importJSON(event)"></label>
</div>
`;
}

function home(){
top("Retro Notes",`
<div class="grid">

<div>
<div class="section">
<h3>Son Notlara Devam Et</h3>
${recentNotes()}
</div>
</div>

<div>
<div class="section">
<h3>Referans Kutuları</h3>
<div class="cards">
${CATS.map(c=>`
<div class="card" onclick="archive('${c}')">
<b>${c}</b>
<div class="muted">${state.refs[c].length} kayıt</div>
</div>`).join("")}
</div>
</div>

<div class="section">
<h3>Bugünün İlham Kartı</h3>
<div class="tags">${ideaTags()}</div>
</div>
</div>

</div>
`);
}

function recentNotes(){
if(!state.notes.length)return `<div class="muted">Henüz not yok.</div>`;
return [...state.notes]
.sort((a,b)=>b.updated-a.updated)
.slice(0,8)
.map(n=>`
<div class="listitem" onclick="openNote(${n.id})">
<b>${esc(n.title||"Adsız Not")}</b><br>
<span class="muted">${fmt(n.updated)}</span>
</div>
`).join("");
}

function ideaTags(){
return CATS.map(c=>{
let arr=state.refs[c];
let val=arr[Math.floor(Math.random()*arr.length)]||"-";
return `<span class="tag">${c}: ${esc(val)}</span>`;
}).join("");
}

function newNote(){
let n={
id:Date.now(),
title:"",
body:"",
refs:{},
created:Date.now(),
updated:Date.now()
};
state.notes.unshift(n);
save();
openNote(n.id);
}

function openNote(id){
let n=state.notes.find(x=>x.id==id);
if(!n)return home();

top("Not Düzenleyici",`
<div class="section">
<h3>Not Başlığı</h3>
<input id="ttl" value="${esc(n.title)}" oninput="upd(${id})">
</div>

<div class="section">
<h3>Not Bloğu</h3>

<div class="terminal-wrap">
<div class="terminal-top">C:\\NOTLAR\\EDITOR.EXE</div>

<div class="terminal">
<div class="terminal-tags">
${renderRefTags(n)}
</div>

<textarea id="bod" placeholder="> yazmaya başla..." oninput="upd(${id})">${esc(n.body)}</textarea>
</div>
</div>

<div class="muted" style="margin-top:8px">
Oluşturuldu: ${fmt(n.created)} • Son düzenleme: ${fmt(n.updated)}
</div>
</div>

<div class="section">
<h3>Referans Seçimi</h3>
<div class="row2">
${CATS.map(c=>`
<div>
<label>${c}</label>
<select onchange="setRef(${id},'${c}',this.value)">
<option value="">Seçilmedi</option>
${state.refs[c].map(v=>`
<option ${n.refs[c]===v?"selected":""}>${esc(v)}</option>
`).join("")}
</select>
</div>
`).join("")}
</div>

<hr>

<button onclick="randomRefs(${id})">🎲 Rastgele Referans</button>
<button onclick="delNote(${id})">🗑 Notu Sil</button>
</div>
`);
}

function renderRefTags(n){
let html=CATS.filter(c=>n.refs[c]).map(c=>`[${c}: ${n.refs[c]}]`).join(" ");
return html || "[ Referans etiketi yok ]";
}

function upd(id){
let n=state.notes.find(x=>x.id==id);
n.title=ttl.value;
n.body=bod.value;
n.updated=Date.now();
save();
}

function setRef(id,c,v){
let n=state.notes.find(x=>x.id==id);
if(v)n.refs[c]=v;
else delete n.refs[c];
n.updated=Date.now();
save();
openNote(id);
}

function randomRefs(id){
let n=state.notes.find(x=>x.id==id);
CATS.forEach(c=>{
let arr=state.refs[c];
n.refs[c]=arr[Math.floor(Math.random()*arr.length)];
});
save();
openNote(id);
}

function delNote(id){
if(confirm("Not silinsin mi?")){
state.notes=state.notes.filter(x=>x.id!=id);
save();
home();
}
}

function archive(cat){
top(cat+" Arşivi",`
<div class="grid">

<div>
<div class="section">
<h3>Yeni Öğe</h3>
<input id="single" placeholder="Tek giriş">
<button onclick="addOne('${cat}')">Ekle</button>

<hr>

<h3>Toplu Ekle</h3>
<textarea id="bulk" rows="7" placeholder="Ev&#10;Kafe&#10;Metro&#10;veya virgüllü"></textarea>
<button onclick="addBulk('${cat}')">Toplu Ekle</button>
</div>
</div>

<div>
<div class="section">
<h3>Mevcut Öğeler</h3>
<input id="search" placeholder="Ara..." oninput="renderArchive('${cat}')">
<div id="alist"></div>
</div>
</div>

</div>
`);
renderArchive(cat);
}

function renderArchive(cat){
let q=(search.value||"").toLowerCase();
alist.innerHTML=state.refs[cat]
.filter(v=>v.toLowerCase().includes(q))
.map((v,i)=>`
<div class="archiveItem">
<div>${esc(v)}</div>
<button onclick="editItem('${cat}',${i})">Düzenle</button>
<button onclick="delItem('${cat}',${i})">Sil</button>
</div>
`).join("");
}

function addOne(cat){
if(!single.value.trim())return;
state.refs[cat].push(single.value.trim());
save();
archive(cat);
}

function addBulk(cat){
bulk.value.split(/,|\n/)
.map(x=>x.trim())
.filter(Boolean)
.forEach(v=>state.refs[cat].push(v));
save();
archive(cat);
}

function editItem(cat,i){
let nv=prompt("Yeni değer",state.refs[cat][i]);
if(nv){
state.refs[cat][i]=nv.trim();
save();
archive(cat);
}
}

function delItem(cat,i){
state.refs[cat].splice(i,1);
save();
archive(cat);
}

function toggleTheme(){
document.body.classList.toggle("dark");
state.theme=document.body.classList.contains("dark")?"dark":"light";
save();
home();
}

function randomIdea(){
alert(CATS.map(c=>{
let arr=state.refs[c];
return c+": "+arr[Math.floor(Math.random()*arr.length)];
}).join("\n"));
}

function exportJSON(){
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([JSON.stringify(state)],{type:"application/json"}));
a.download="retro-notes.json";
a.click();
}

function importJSON(e){
let f=e.target.files[0];
if(!f)return;
let r=new FileReader();
r.onload=()=>{
state=JSON.parse(r.result);
save();
location.reload();
};
r.readAsText(f);
}

home();
</script>
</body>
</html>
