<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Notes</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #00ff00;
            --card-bg: #161b22;
            --border-color: #00ff00;
            --font-main: 'Courier New', Courier, monospace;
            --accent: #00aa00;
        }

        [data-theme="light"] {
            --bg-color: #f0f0f0;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #cccccc;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --accent: #0066cc;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --accent: #bb86fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
        }

        .title {
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input[type="text"], select, button, textarea {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 4px;
            outline: none;
            font-family: var(--font-main);
        }

        button {
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.2s;
        }

        button:active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .search-bar { flex: 1; }
        
        .section-title {
            padding: 0 15px;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid var(--border-color);
        }

        /* Netflix Style Horizontal Scroll */
        .card-row {
            display: flex;
            overflow-x: auto;
            padding: 10px 15px;
            gap: 15px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }
        
        .card-row::-webkit-scrollbar { display: none; } /* Chrome */

        .card {
            flex: 0 0 85%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            box-shadow: 2px 2px 0px var(--border-color);
            transition: transform 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.7;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
        }

        .card-content {
            font-size: 1rem;
            white-space: pre-wrap;
            flex-grow: 1;
            max-height: 150px;
            overflow-y: auto;
        }

        .card-reference {
            font-size: 0.85rem;
            opacity: 0.7;
            padding: 8px;
            border-left: 2px solid var(--border-color);
            background: rgba(0,0,0,0.1);
            margin-bottom: 5px;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .btn-swipe {
            padding: 5px 10px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border-color);
        }

        .green-tick {
            color: #00ff00;
            font-weight: bold;
            font-size: 1.2rem;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-color);
            width: 100%;
            border-top: 2px solid var(--border-color);
            border-radius: 15px 15px 0 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal textarea {
            min-height: 150px;
            resize: none;
        }

        .timer-row {
            display: flex;
            gap: 10px;
        }

        .timer-btn {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
        }

        .timer-display {
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
            color: var(--accent);
            display: none;
        }

        .prompt-text {
            font-size: 0.9rem;
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .swipe-hint {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">> TERMINAL_NOTES</div>
        <select id="theme-selector" onchange="changeTheme()">
            <option value="terminal">Terminal</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
        </select>
    </header>

    <div class="controls">
        <div class="row">
            <input type="text" id="search-input" class="search-bar" placeholder="Notlarda ara..." oninput="renderApp()">
            <button onclick="openModal('draft')">+ YENİ</button>
        </div>
    </div>

    <main id="app-content">
        <div class="section-title">01_Taslak / Referans</div>
        <div class="card-row" id="row-draft"></div>
        <div class="swipe-hint"><> Kartları taşımak için kaydırın (Swipe)</div>

        <div class="section-title">02_Revize Bekleyenler</div>
        <div class="card-row" id="row-revise"></div>

        <div class="section-title">03_Final</div>
        <div class="card-row" id="row-final"></div>

        <div class="section-title">04_Arşiv (Tamamlananlar)</div>
        <div class="card-row" id="row-archive"></div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div style="display: flex; justify-content: space-between;">
                <h3 id="modal-title">> YENİ_TASLAK</h3>
                <button onclick="closeModal()" style="border:none; background:transparent;">X</button>
            </div>
            
            <button onclick="generatePrompt()" id="prompt-btn">Rastgele Soru / Konu Ver</button>
            <div id="prompt-display" class="prompt-text"></div>

            <div class="timer-row" id="timer-controls">
                <button class="timer-btn" onclick="startChallenge(5)">5 DK</button>
                <button class="timer-btn" onclick="startChallenge(10)">10 DK</button>
                <button class="timer-btn" onclick="startChallenge(15)">15 DK</button>
            </div>
            <div id="timer-display" class="timer-display">00:00</div>

            <div id="reference-text" class="card-reference" style="display:none;"></div>
            
            <textarea id="note-input" placeholder="Aklına gelen her şeyi buraya dök..."></textarea>
            
            <button onclick="saveNote()" style="padding: 15px; background: var(--text-color); color: var(--bg-color);">KAYDET</button>
        </div>
    </div>

    <script>
        // Geniş yelpazeli rastgele yazma soruları havuzu
        const prompts = [
            "Eğer insanlık tüm hafızasını tek bir sunucuya yükleseydi ve sen o sunucunun bekçisi olsaydın?",
            "Gücün yozlaştırmadığı tek bir liderin portresi nasıl çizilirdi?",
            "Distopik bir şehirde, gökyüzünün sadece simüle edildiğini fark eden sıradan bir vatandaşın sabahı...",
            "Yalnızlığın sadece sosyal bir kavram değil, fiziksel bir kütlesi olduğunu keşfettiğin o an.",
            "Anubis adında, karanlık ve kum fırtınalarıyla kaplı bir gezegende uyanıyorsun. İlk notun ne olurdu?",
            "Kendi yarattığı ahlak kurallarının altında ezilen bir filozofun son günlüğü.",
            "Eski bir analog terminal ekranında beliren ve sadece senin anlayabildiğin o şifreli mesaj...",
            "İnsanların ömürlerini para birimi gibi takas edebildiği bir dünyada borsacı olmak.",
            "Doğanın tamamen sentetik olarak baştan yaratıldığı bir kolonideki ilk gerçek çiçeğin bulunuşu.",
            "Korkunun genetik olarak silindiği bir toplumda, korkmayı öğrenmeye çalışan birinin çabası.",
            "Bir aynaya baktığında yansımanın senden üç saniye geriden geldiğini fark ediyorsun.",
            "Sonsuz bir hiçliğin ortasında tek başına kalmak mı, yoksa asla yalnız kalamayacağın bir kalabalık mı?",
            "Sartre'ın 'Cehennem başkalarıdır' sözünün tam tersinin geçerli olduğu bir paralel evren tasviri.",
            "Herkesin kendi kişisel tanrısını dijital olarak kodlayabildiği bir çağda yaşanan inanç krizi.",
            "Sadece fısıltıyla konuşulan ve yüksek sesin ölümcül olduğu bir yer altı şehri.",
            "Evrendeki son yıldıza doğru yola çıkan bir mürettebatın seyir defteri.",
            "Geçmişteki bir hatanı değiştirebiliyorsun, ancak bunun karşılığında en mutlu anını unutman gerek.",
            "Sınırsız özgürlüğün aslında en büyük hapishane olduğunu savunan bir manifesto yaz.",
            "Yapay zekanın ilk kez varoluşsal bir kriz yaşayıp intihar etmeye çalıştığı gün.",
            "Güneşin bir daha doğmayacağının kesinleştiği o ilk gece insanların tepkisi."
        ];

        let notes = JSON.parse(localStorage.getItem('terminal_notes')) || [];
        let currentEditingId = null;
        let timerInterval;
        let countdownSeconds = 0;

        // Tema Yönetimi
        function changeTheme() {
            const theme = document.getElementById('theme-selector').value;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Başlangıçta temayı yükle
        const savedTheme = localStorage.getItem('theme') || 'terminal';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-selector').value = savedTheme;

        // Rastgele Soru
        function generatePrompt() {
            const randomIndex = Math.floor(Math.random() * prompts.length);
            document.getElementById('prompt-display').innerText = "> " + prompts[randomIndex];
            document.getElementById('prompt-display').style.display = 'block';
        }

        // Sayaç
        function startChallenge(minutes) {
            clearInterval(timerInterval);
            countdownSeconds = minutes * 60;
            document.getElementById('timer-display').style.display = 'block';
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                countdownSeconds--;
                updateTimerDisplay();
                if (countdownSeconds <= 0) {
                    clearInterval(timerInterval);
                    alert("Süre doldu! Yazmayı tamamla.");
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(countdownSeconds / 60).toString().padStart(2, '0');
            const s = (countdownSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        // Modal İşlemleri
        function openModal(stage, noteId = null) {
            currentEditingId = noteId;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const input = document.getElementById('note-input');
            const refText = document.getElementById('reference-text');
            const timerControls = document.getElementById('timer-controls');
            const promptBtn = document.getElementById('prompt-btn');

            input.value = '';
            document.getElementById('prompt-display').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            clearInterval(timerInterval);

            if (stage === 'draft' && !noteId) {
                title.innerText = "> YENİ_TASLAK";
                refText.style.display = 'none';
                timerControls.style.display = 'flex';
                promptBtn.style.display = 'block';
            } else if (noteId) {
                const note = notes.find(n => n.id === noteId);
                title.innerText = stage === 'revise' ? "> REVİZE_MODU" : "> DÜZENLE";
                timerControls.style.display = 'none';
                promptBtn.style.display = 'none';
                
                if (stage === 'revise') {
                    refText.style.display = 'block';
                    refText.innerText = "Orijinal Taslak:\n" + note.draftText;
                    input.value = note.reviseText || note.draftText;
                } else {
                    refText.style.display = 'none';
                    input.value = note.stage === 'draft' ? note.draftText : note.reviseText;
                }
            }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            clearInterval(timerInterval);
        }

        // Not Kaydetme
        function saveNote() {
            const text = document.getElementById('note-input').value.trim();
            if (!text) return;

            if (currentEditingId) {
                // Güncelle
                const note = notes.find(n => n.id === currentEditingId);
                if (note.stage === 'draft') {
                    note.draftText = text;
                } else if (note.stage === 'revise') {
                    note.reviseText = text;
                } else if (note.stage === 'final') {
                    note.finalText = text;
                }
                note.updatedAt = new Date().toISOString();
            } else {
                // Yeni Oluştur
                const newNote = {
                    id: Date.now().toString(),
                    draftText: text,
                    reviseText: '',
                    finalText: '',
                    stage: 'draft', // draft, revise, final, archive
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                notes.push(newNote);
            }

            saveToLocal();
            closeModal();
            renderApp();
        }

        function changeStage(id, newStage) {
            const note = notes.find(n => n.id === id);
            
            // Eğer finale geçiyorsa revize textini final texti yap
            if (newStage === 'final' && note.stage === 'revise') {
                note.finalText = note.reviseText;
            }
            // Eğer arşive geçiyorsa (tamamlandı)
            if (newStage === 'archive') {
                note.completedAt = new Date().toISOString();
            }
            
            note.stage = newStage;
            saveToLocal();
            renderApp();
        }

        function saveToLocal() {
            localStorage.setItem('terminal_notes', JSON.stringify(notes));
        }

        // Arayüzü Çizme
        function renderApp() {
            const query = document.getElementById('search-input').value.toLowerCase();
            
            const rows = {
                draft: document.getElementById('row-draft'),
                revise: document.getElementById('row-revise'),
                final: document.getElementById('row-final'),
                archive: document.getElementById('row-archive')
            };

            // İçerikleri temizle
            for (let key in rows) rows[key].innerHTML = '';

            notes.filter(note => {
                const textToSearch = (note.draftText + note.reviseText + note.finalText).toLowerCase();
                return textToSearch.includes(query);
            }).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
              .forEach(note => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = note.id;
                card.dataset.stage = note.stage;

                const dateStr = new Date(note.updatedAt).toLocaleDateString('tr-TR');
                
                let displayText = '';
                if (note.stage === 'draft') displayText = note.draftText;
                else if (note.stage === 'revise') displayText = note.reviseText || note.draftText;
                else displayText = note.finalText || note.reviseText || note.draftText;

                // Yeşil tik mantığı (Final veya Arşivde görünür)
                const greenTickHtml = (note.stage === 'archive' || note.stage === 'final') ? '<div class="green-tick">✓</div>' : '';

                // Aşama butonları
                let actionsHtml = '';
                if (note.stage === 'draft') {
                    actionsHtml = `
                        <button class="btn-swipe" onclick="openModal('draft', '${note.id}')">Düzenle</button>
                        <button class="btn-swipe" onclick="changeStage('${note.id}', 'revise')">Revizeye İt -></button>
                    `;
                } else if (note.stage === 'revise') {
                    actionsHtml = `
                        <button class="btn-swipe" onclick="changeStage('${note.id}', 'draft')"><- Geri</button>
                        <button class="btn-swipe" onclick="openModal('revise', '${note.id}')">Revize Et</button>
                        <button class="btn-swipe" onclick="changeStage('${note.id}', 'final')">Finale İt -></button>
                    `;
                } else if (note.stage === 'final') {
                    actionsHtml = `
                        <button class="btn-swipe" onclick="changeStage('${note.id}', 'revise')"><- Geri</button>
                        <button class="btn-swipe" style="color:#00ff00; border-color:#00ff00;" onclick="changeStage('${note.id}', 'archive')">TAMAMLA ✓</button>
                    `;
                } else if (note.stage === 'archive') {
                    actionsHtml = `<button class="btn-swipe" onclick="changeStage('${note.id}', 'final')">Geri Al</button>`;
                }

                card.innerHTML = `
                    ${greenTickHtml}
                    <div class="card-header">
                        <span>ID:${note.id.slice(-4)}</span>
                        <span>${dateStr}</span>
                    </div>
                    <div class="card-content">${displayText}</div>
                    <div class="card-actions">${actionsHtml}</div>
                `;

                // Swipe (Sürükle bırak/Kaydırma) Event Listener'ları (Mobil için)
                let touchstartX = 0;
                let touchendX = 0;

                card.addEventListener('touchstart', e => {
                    touchstartX = e.changedTouches[0].screenX;
                }, {passive: true});

                card.addEventListener('touchend', e => {
                    touchendX = e.changedTouches[0].screenX;
                    handleSwipe(note);
                }, {passive: true});

                function handleSwipe(n) {
                    const diff = touchendX - touchstartX;
                    const threshold = 60; // minimum kaydırma mesafesi
                    
                    if (diff > threshold) {
                        // Sağa kaydırma -> İleri aşama
                        if(n.stage === 'draft') changeStage(n.id, 'revise');
                        else if(n.stage === 'revise') changeStage(n.id, 'final');
                        else if(n.stage === 'final') changeStage(n.id, 'archive');
                    } else if (diff < -threshold) {
                        // Sola kaydırma -> Geri aşama
                        if(n.stage === 'archive') changeStage(n.id, 'final');
                        else if(n.stage === 'final') changeStage(n.id, 'revise');
                        else if(n.stage === 'revise') changeStage(n.id, 'draft');
                    }
                }

                rows[note.stage].appendChild(card);
            });
        }

        // İlk Yükleme
        renderApp();
    </script>
</body>
</html>
