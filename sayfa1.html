<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3 Adım Notlar</title>
    <style>
        /* Temel Netflix Tarzı Karanlık Tema */
        :root {
            --bg: #141414;
            --surface: #2b2b2b;
            --text: #ffffff;
            --text-muted: #b3b3b3;
            --accent: #E50914; /* Netflix Kırmızısı */
            --success: #2ecc71;
            --card-radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }

        /* Üst Başlık */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
        .delete-all-btn { background: transparent; border: none; color: var(--text-muted); font-size: 20px; padding: 5px; cursor: pointer; }

        /* Tek Satır Sekmeler (Alt Navigasyon) */
        .tabs { display: flex; justify-content: space-around; position: fixed; bottom: 0; width: 100%; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #333; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 15px 0; font-size: 13px; font-weight: bold; cursor: pointer; border-top: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--text); border-top-color: var(--accent); }

        /* İçerik Konteynerleri */
        .section { display: none; padding: 0 20px 20px 20px; }
        .section.active { display: block; }

        /* Taslak Giriş Alanı ve Challenge */
        .input-card { background: var(--surface); padding: 15px; border-radius: var(--card-radius); margin-bottom: 20px; }
        .input-card textarea { width: 100%; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; resize: none; min-height: 80px; }
        
        .challenge-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; border-bottom: 1px solid #444; margin-bottom: 10px;}
        .challenge-row span { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
        .timer-btn { background: #444; border: none; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .timer-btn.active-timer { background: var(--accent); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .add-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px; }

        /* Kare Kart Izgarası (Yan yana ve ufak) */
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .note-card { background: var(--surface); aspect-ratio: 1; border-radius: var(--card-radius); padding: 12px; display: flex; flex-direction: column; position: relative; cursor: pointer; overflow: hidden; }
        .note-card p { flex: 1; font-size: 13px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; word-break: break-word; color: #ddd; }
        
        .card-action-btn { background: #444; color: white; border: none; padding: 6px; border-radius: 4px; font-size: 11px; margin-top: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .card-action-btn.green { background: var(--success); color: #000; }

        /* Tamamlanmış (Final) Kart Stili */
        .note-card.completed { border: 2px solid var(--success); background: rgba(46, 204, 113, 0.1); }
        .check-icon { position: absolute; top: 8px; right: 8px; background: var(--success); color: #000; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .note-card.completed .check-icon { display: flex; }
        .note-card.completed p { opacity: 0.6; text-decoration: line-through; }

        /* Revize Modal (Düzenleme Ekranı) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 50; padding: 20px; flex-direction: column; }
        .modal.active { display: flex; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-modal { background: transparent; color: white; border: none; font-size: 24px; cursor: pointer; }
        
        .reference-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px; font-size: 12px; color: var(--text-muted); margin-bottom: 15px; max-height: 100px; overflow-y: auto; border-left: 3px solid #555; }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        .tool-btn { flex: 1; background: #333; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px; }
        
        #edit-textarea { flex: 1; background: var(--surface); color: white; border: none; padding: 15px; border-radius: var(--card-radius); outline: none; resize: none; font-size: 15px; margin-bottom: 15px; }
        
        .save-revize-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: var(--card-radius); font-weight: bold; font-size: 16px; cursor: pointer; }

    </style>
</head>
<body>

    <header>
        <h1>📝 Notlar</h1>
        <button class="delete-all-btn" onclick="clearAllNotes()">🗑️</button>
    </header>

    <div id="taslak-sec" class="section active">
        <div class="input-card">
            <textarea id="draft-input" placeholder="Aklına geleni buraya dök veya alıntı yap..."></textarea>
            
            <div class="challenge-row">
                <span>⏱️ Challenge:</span>
                <button class="timer-btn" onclick="startTimer(5, this)">5 dk</button>
                <button class="timer-btn" onclick="startTimer(10, this)">10 dk</button>
                <button class="timer-btn" onclick="startTimer(15, this)">15 dk</button>
                <span id="timer-display" style="margin-left: auto; font-weight: bold; color: var(--accent);"></span>
            </div>

            <button class="add-btn" onclick="addNote()">Taslağı Kaydet</button>
        </div>
        <div class="card-grid" id="taslak-grid"></div>
    </div>

    <div id="revize-sec" class="section">
        <div class="card-grid" id="revize-grid"></div>
    </div>

    <div id="final-sec" class="section">
        <div class="card-grid" id="final-grid"></div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-header">
            <h3>Revize Et</h3>
            <button class="close-modal" onclick="closeModal()">×</button>
        </div>
        
        <div class="reference-box" id="modal-reference"></div>
        
        <div class="toolbar">
            <button class="tool-btn" onclick="addTimestamp()">🕒 Saat Ekle</button>
            <button class="tool-btn" onclick="copyText()">📋 Tümünü Kopyala</button>
        </div>

        <textarea id="edit-textarea" placeholder="Taslağı referans alarak son halini şekillendir..."></textarea>
        <button class="save-revize-btn" onclick="saveRevize()">Değişiklikleri Kaydet</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('taslak')">TASLAK</button>
        <button class="tab-btn" onclick="switchTab('revize')">REVİZE</button>
        <button class="tab-btn" onclick="switchTab('final')">FİNAL</button>
    </div>

    <script>
        // Veri Yapısı: stage (taslak, revize, final)
        let notes = JSON.parse(localStorage.getItem('myNotes')) || [];
        let currentEditId = null;
        let countdown;

        // Sekme Değiştirme
        function switchTab(tabName) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`${tabName}-sec`).classList.add('active');
            event.currentTarget.classList.add('active');
            renderNotes();
        }

        // Not Ekleme
        function addNote() {
            const input = document.getElementById('draft-input');
            const text = input.value.trim();
            if(!text) return;

            const newNote = {
                id: Date.now(),
                originalText: text, // Referans olarak saklanacak
                text: text,
                stage: 'taslak',
                completed: false
            };

            notes.push(newNote);
            input.value = '';
            saveAndRender();
        }

        // Aşamalar Arası Aktarım
        function moveNote(id, newStage) {
            const note = notes.find(n => n.id === id);
            if(note) {
                note.stage = newStage;
                saveAndRender();
            }
        }

        // Final Tamamlama (Yeşil Tik)
        function toggleComplete(id) {
            const note = notes.find(n => n.id === id);
            if(note) {
                note.completed = !note.completed;
                saveAndRender();
            }
        }

        // Revize Modalını Açma
        function openEditModal(id) {
            const note = notes.find(n => n.id === id);
            if(note) {
                currentEditId = id;
                document.getElementById('modal-reference').innerText = "📌 Referans: " + note.originalText;
                document.getElementById('edit-textarea').value = note.text;
                document.getElementById('edit-modal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
            currentEditId = null;
        }

        // Revizeyi Kaydetme
        function saveRevize() {
            const newText = document.getElementById('edit-textarea').value;
            const note = notes.find(n => n.id === currentEditId);
            if(note) {
                note.text = newText;
                closeModal();
                saveAndRender();
            }
        }

        // Pratik Araçlar
        function addTimestamp() {
            const textarea = document.getElementById('edit-textarea');
            const now = new Date();
            const timeString = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}] `;
            textarea.value = textarea.value + "\n" + timeString;
            textarea.focus();
        }

        function copyText() {
            const textarea = document.getElementById('edit-textarea');
            navigator.clipboard.writeText(textarea.value).then(() => {
                alert("Metin kopyalandı!");
            });
        }

        function clearAllNotes() {
            if(confirm("Tüm notları (Taslak, Revize, Final) silmek istediğine emin misin?")) {
                notes = [];
                saveAndRender();
            }
        }

        // Challenge Sayacı
        function startTimer(minutes, btnElement) {
            clearInterval(countdown);
            document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active-timer'));
            btnElement.classList.add('active-timer');
            
            let time = minutes * 60;
            const display = document.getElementById('timer-display');
            
            countdown = setInterval(() => {
                const m = Math.floor(time / 60);
                const s = time % 60;
                display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                
                if (time <= 0) {
                    clearInterval(countdown);
                    display.innerText = "Süre Bitti!";
                    btnElement.classList.remove('active-timer');
                    navigator.vibrate && navigator.vibrate([200, 100, 200]); // Süre bitimi titreşimi (Mobilde)
                }
                time--;
            }, 1000);
        }

        // Arayüzü Çizme
        function renderNotes() {
            const grids = {
                taslak: document.getElementById('taslak-grid'),
                revize: document.getElementById('revize-grid'),
                final: document.getElementById('final-grid')
            };

            grids.taslak.innerHTML = ''; grids.revize.innerHTML = ''; grids.final.innerHTML = '';

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = `note-card ${note.completed ? 'completed' : ''}`;
                
                let actionHTML = '';
                if(note.stage === 'taslak') {
                    actionHTML = `<button class="card-action-btn" onclick="moveNote(${note.id}, 'revize')">Revizeye Aktar ➡️</button>`;
                } else if(note.stage === 'revize') {
                    card.setAttribute('onclick', `if(event.target.tagName !== 'BUTTON') openEditModal(${note.id})`);
                    actionHTML = `<button class="card-action-btn green" onclick="moveNote(${note.id}, 'final'); event.stopPropagation();">Finale Aktar ➡️</button>`;
                } else if(note.stage === 'final') {
                    actionHTML = `<button class="card-action-btn" onclick="toggleComplete(${note.id})">${note.completed ? 'Geri Al' : 'Tamamla ✓'}</button>`;
                }

                card.innerHTML = `
                    <div class="check-icon">✓</div>
                    <p>${note.text}</p>
                    <div style="margin-top: auto">
                        ${actionHTML}
                    </div>
                `;
                grids[note.stage].appendChild(card);
            });
        }

        function saveAndRender() {
            localStorage.setItem('myNotes', JSON.stringify(notes));
            renderNotes();
        }

        // Başlangıçta Çalıştır
        renderNotes();
    </script>
</body>
</html>
