<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Not Terminali</title>
    <style>
        :root {
            --bg-dark-brown: #241714;
            --card-cream: #D6C7B3;
            --accent-gold: #C09B42;
            --text-dark: #1A100E;
            --text-light: #EAE0D5;
            --success-green: #4CAF50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Terminal analog hissi */
        }

        body {
            background-color: var(--bg-dark-brown);
            color: var(--text-light);
            padding: 15px;
            padding-bottom: 50px;
        }

        h1 {
            color: var(--accent-gold);
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Giriş Formu */
        .input-section {
            background-color: transparent;
            border: 1px solid var(--accent-gold);
            padding: 15px;
            margin-bottom: 30px;
        }

        input[type="text"], textarea {
            width: 100%;
            background-color: var(--bg-dark-brown);
            color: var(--text-light);
            border: 1px solid #5A443A;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-gold);
        }

        button {
            background-color: var(--accent-gold);
            color: var(--text-dark);
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        button:active {
            opacity: 0.8;
        }

        /* Netflix Tarzı Yatay Kart Kaydırma Sistemi */
        .section-title {
            color: var(--card-cream);
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .netflix-row {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 15px;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .netflix-row::-webkit-scrollbar {
            height: 6px;
        }
        .netflix-row::-webkit-scrollbar-track {
            background: #3a2823; 
        }
        .netflix-row::-webkit-scrollbar-thumb {
            background: var(--accent-gold); 
        }

        /* Kart Tasarımı */
        .card {
            background-color: var(--card-cream);
            color: var(--text-dark);
            min-width: 85%; /* Mobil ekranda bir kartın kaplayacağı alan */
            max-width: 85%;
            scroll-snap-align: center;
            border-left: 5px solid var(--accent-gold);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Başlık Bloğu */
        .card-header {
            background-color: rgba(0,0,0,0.1);
            padding: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px dashed var(--text-dark);
        }

        /* Künye (Metadata) Bloğu */
        .card-meta {
            background-color: rgba(0,0,0,0.05);
            padding: 5px 10px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--text-dark);
            display: flex;
            justify-content: space-between;
        }

        /* İçerik Bloğu */
        .card-body {
            padding: 15px 10px;
            flex-grow: 1;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        /* Aksiyon Butonları */
        .card-actions {
            padding: 10px;
            display: flex;
            gap: 10px;
            background-color: rgba(0,0,0,0.1);
        }

        .card-actions button {
            font-size: 0.8rem;
            padding: 8px;
            background-color: var(--bg-dark-brown);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }

        /* Geçmiş Bloğu */
        .card-history {
            background-color: #241714;
            color: #C09B42;
            padding: 10px;
            font-size: 0.75rem;
            display: none;
            border-top: 2px solid var(--accent-gold);
        }

        /* Tamamlanmış (Yeşil Tik) Durumu */
        .completed-tick {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--success-green);
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .edit-textarea {
            width: 100%;
            height: 100px;
            background-color: var(--card-cream);
            color: var(--text-dark);
            border: 1px dashed var(--text-dark);
            padding: 5px;
            font-family: inherit;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>[SİSTEM]_NOT_TERMİNALİ</h1>

    <div class="input-section">
        <input type="text" id="noteTitle" placeholder="> Not Başlığı_">
        <textarea id="noteContent" rows="4" placeholder="> Taslak metnini buraya gir_"></textarea>
        <button onclick="createDraft()">Taslağa Kaydet</button>
    </div>

    <div class="section-title">01_Taslaklar</div>
    <div class="netflix-row" id="draftRow"></div>

    <div class="section-title">02_Revize_Bekleyenler</div>
    <div class="netflix-row" id="reviseRow"></div>

    <div class="section-title">03_Finaller</div>
    <div class="netflix-row" id="finalRow"></div>

    <script>
        let notes = [];

        function generateId() {
            return '_' + Math.random().toString(36).substr(2, 9);
        }

        function getTimestamp() {
            const now = new Date();
            return now.toLocaleDateString('tr-TR') + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
        }

        function createDraft() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            
            if (!title || !content) {
                alert("Terminal Uyarısı: Başlık ve içerik boş olamaz.");
                return;
            }

            const newNote = {
                id: generateId(),
                title: title,
                content: content,
                stage: 'draft', // draft, revise, final
                completed: false,
                history: [`[${getTimestamp()}] Taslak olarak oluşturuldu.`]
            };

            notes.push(newNote);
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            renderNotes();
        }

        function moveToRevise(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.stage = 'revise';
                note.history.push(`[${getTimestamp()}] Revize aşamasına aktarıldı.`);
                renderNotes();
            }
        }

        function enableEdit(id) {
            const note = notes.find(n => n.id === id);
            if (note && note.stage === 'revise') {
                const bodyDiv = document.getElementById(`body-${id}`);
                bodyDiv.innerHTML = `<textarea id="edit-${id}" class="edit-textarea">${note.content}</textarea>`;
                
                const actionsDiv = document.getElementById(`actions-${id}`);
                actionsDiv.innerHTML = `<button onclick="saveRevision('${id}')">Revizeyi Kaydet</button>`;
            }
        }

        function saveRevision(id) {
            const note = notes.find(n => n.id === id);
            const newContent = document.getElementById(`edit-${id}`).value;
            if (note) {
                note.content = newContent;
                note.history.push(`[${getTimestamp()}] Metin revize edildi.`);
                renderNotes();
            }
        }

        function moveToFinal(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.stage = 'final';
                note.history.push(`[${getTimestamp()}] Final aşamasına aktarıldı.`);
                renderNotes();
            }
        }

        function markCompleted(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.completed = true;
                note.history.push(`[${getTimestamp()}] Sistemde tamamlandı olarak işaretlendi.`);
                renderNotes();
            }
        }

        function toggleHistory(id) {
            const historyDiv = document.getElementById(`history-${id}`);
            if (historyDiv.style.display === 'block') {
                historyDiv.style.display = 'none';
            } else {
                historyDiv.style.display = 'block';
            }
        }

        function renderNotes() {
            const draftRow = document.getElementById('draftRow');
            const reviseRow = document.getElementById('reviseRow');
            const finalRow = document.getElementById('finalRow');

            draftRow.innerHTML = '';
            reviseRow.innerHTML = '';
            finalRow.innerHTML = '';

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'card';

                let tickHtml = note.completed ? `<div class="completed-tick">✓</div>` : '';
                
                let actionsHtml = '';
                if (note.stage === 'draft') {
                    actionsHtml = `<button onclick="moveToRevise('${note.id}')">Revizeye Gönder ➔</button>`;
                } else if (note.stage === 'revise') {
                    actionsHtml = `
                        <button onclick="enableEdit('${note.id}')">Düzenle</button>
                        <button onclick="moveToFinal('${note.id}')">Finale Gönder ➔</button>
                    `;
                } else if (note.stage === 'final' && !note.completed) {
                    actionsHtml = `<button onclick="markCompleted('${note.id}')">Tamamlandı İşaretle ✓</button>`;
                }

                actionsHtml += `<button onclick="toggleHistory('${note.id}')">Geçmiş</button>`;

                const historyHtml = note.history.map(h => `<div>> ${h}</div>`).join('');

                card.innerHTML = `
                    ${tickHtml}
                    <div class="card-header">${note.title}</div>
                    <div class="card-meta">
                        <span>Aşama: ${note.stage.toUpperCase()}</span>
                        <span>[SİSTEM_KAYDI]</span>
                    </div>
                    <div class="card-body" id="body-${note.id}">${note.content}</div>
                    <div class="card-actions" id="actions-${note.id}">
                        ${actionsHtml}
                    </div>
                    <div class="card-history" id="history-${note.id}">
                        ${historyHtml}
                    </div>
                `;

                if (note.stage === 'draft') draftRow.appendChild(card);
                else if (note.stage === 'revise') reviseRow.appendChild(card);
                else if (note.stage === 'final') finalRow.appendChild(card);
            });
        }
    </script>
</body>
</html>
