<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER_JOURNAL // V.4.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05050a;
            --glass-bg: rgba(20, 20, 35, 0.4);
            --glass-border: rgba(0, 243, 255, 0.15);
            --neon-cyan: #00f3ff;
            --neon-purple: #b026ff;
            --neon-green: #00ff88;
            --text-main: #e0e5ec;
            --text-muted: #8a94a5;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #161129, var(--bg-color) 60%);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Arka Plan Efekti */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            padding: 20px 15px;
            background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-glitch {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            letter-spacing: 2px;
        }

        .cyber-btn {
            background: linear-gradient(45deg, rgba(0, 243, 255, 0.1), rgba(176, 38, 255, 0.1));
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 16px;
            border-radius: 4px;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .cyber-btn:active {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .controls {
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        .cyber-input {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 15px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .cyber-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--neon-purple);
            padding: 0 15px;
            margin: 25px 0 10px 0;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-purple);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-purple);
        }

        /* Netflix Style Horizontal Scroll - Gelişmiş */
        .card-row {
            display: flex;
            overflow-x: auto;
            padding: 10px 15px 20px 15px;
            gap: 15px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        
        .card-row::-webkit-scrollbar { display: none; }

        .card {
            flex: 0 0 88%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .card-id {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--neon-cyan);
            letter-spacing: 1px;
        }

        .card-content {
            font-size: 1.2rem;
            line-height: 1.5;
            font-weight: 500;
            white-space: pre-wrap;
            flex-grow: 1;
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .card-reference {
            font-size: 1rem;
            color: var(--text-muted);
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid var(--neon-cyan);
            border-radius: 0 8px 8px 0;
            margin-bottom: 5px;
            font-style: italic;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn.primary {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        .action-btn.success {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .green-tick {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--neon-green);
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 20px var(--neon-green);
            z-index: 10;
        }

        /* Modal / Tam Ekran Yazım Alanı */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .hud-panel {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .prompt-text {
            font-size: 1.1rem;
            color: var(--neon-cyan);
            margin-top: 10px;
            line-height: 1.4;
        }

        .timer-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .timer-btn {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 8px 15px;
            border-radius: 20px;
            font-family: var(--font-display);
            font-size: 0.8rem;
        }

        .timer-display {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            margin: 15px 0;
            display: none;
        }

        .modal textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1.3rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .modal textarea::placeholder {
            color: rgba(224, 229, 236, 0.3);
        }

        .save-btn {
            background: var(--neon-cyan);
            color: var(--bg-color);
            border: none;
            padding: 18px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            margin-top: auto;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .swipe-indicator {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: -5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .swipe-indicator::before, .swipe-indicator::after {
            content: '';
            height: 1px;
            width: 30px;
            background: var(--text-muted);
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <header>
        <div class="title-glitch">CYBER_JOURNAL <span style="font-size: 0.6rem; opacity:0.7;">// V.4.2</span></div>
    </header>

    <div class="controls">
        <input type="text" id="search-input" class="cyber-input" placeholder="Veritabanında ara..." oninput="renderApp()">
        <button class="cyber-btn" onclick="openModal('draft')">YENİ VERİ</button>
    </div>

    <main id="app-content">
        <div class="section-title" style="--neon-purple: #00f3ff;">AŞAMA 01 // TASLAK REFERANS</div>
        <div class="swipe-indicator">KARTLARI SÜRÜKLE</div>
        <div class="card-row" id="row-draft"></div>

        <div class="section-title" style="--neon-purple: #ff0055;">AŞAMA 02 // REVİZE SÜRECİ</div>
        <div class="card-row" id="row-revise"></div>

        <div class="section-title" style="--neon-purple: #b026ff;">AŞAMA 03 // FİNAL ÇIKTISI</div>
        <div class="card-row" id="row-final"></div>

        <div class="section-title" style="--neon-purple: #00ff88;">AŞAMA 04 // SİSTEM ARŞİVİ</div>
        <div class="card-row" id="row-archive"></div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-header">
            <div class="title-glitch" id="modal-title">GİRİŞ_MODÜLÜ</div>
            <button class="cyber-btn" style="border-color: #ff0055; color: #ff0055;" onclick="closeModal()">İPTAL</button>
        </div>
        
        <div class="modal-content">
            <div class="hud-panel" id="hud-panel">
                <button class="cyber-btn" style="width: 100%; border-radius: 8px;" onclick="generatePrompt()" id="prompt-btn">ZİHİN TETİKLEYİCİ BAŞLAT</button>
                <div id="prompt-display" class="prompt-text" style="display: none;"></div>

                <div class="timer-row" id="timer-controls">
                    <button class="timer-btn" onclick="startChallenge(5)">05:00</button>
                    <button class="timer-btn" onclick="startChallenge(10)">10:00</button>
                    <button class="timer-btn" onclick="startChallenge(15)">15:00</button>
                </div>
                <div id="timer-display" class="timer-display">00:00</div>
            </div>

            <div id="reference-text" class="card-reference" style="display:none;"></div>
            
            <textarea id="note-input" placeholder="Atomik verilerini buraya aktar..."></textarea>
            
            <button class="save-btn" onclick="saveNote()">SİSTEME KAYDET</button>
        </div>
    </div>

    <script>
        const prompts = [
            "Eğer insanlık tüm hafızasını tek bir sunucuya yükleseydi ve sen o sunucunun bekçisi olsaydın?",
            "Gücün yozlaştırmadığı tek bir liderin portresi nasıl çizilirdi?",
            "Distopik bir şehirde, gökyüzünün sadece simüle edildiğini fark eden sıradan bir vatandaşın sabahı...",
            "Yalnızlığın sadece sosyal bir kavram değil, fiziksel bir kütlesi olduğunu keşfettiğin o an.",
            "Anubis adında, karanlık ve kum fırtınalarıyla kaplı bir gezegende uyanıyorsun. İlk notun ne olurdu?",
            "Kendi yarattığı ahlak kurallarının altında ezilen bir filozofun son günlüğü.",
            "Eski bir analog terminal ekranında beliren ve sadece senin anlayabildiğin o şifreli mesaj...",
            "İnsanların ömürlerini para birimi gibi takas edebildiği bir dünyada borsacı olmak.",
            "Doğanın tamamen sentetik olarak baştan yaratıldığı bir kolonideki ilk gerçek çiçeğin bulunuşu.",
            "Korkunun genetik olarak silindiği bir toplumda, korkmayı öğrenmeye çalışan birinin çabası.",
            "Bir aynaya baktığında yansımanın senden üç saniye geriden geldiğini fark ediyorsun.",
            "Sonsuz bir hiçliğin ortasında tek başına kalmak mı, yoksa asla yalnız kalamayacağın bir kalabalık mı?",
            "Sartre'ın 'Cehennem başkalarıdır' sözünün tam tersinin geçerli olduğu bir paralel evren tasviri.",
            "Herkesin kendi kişisel tanrısını dijital olarak kodlayabildiği bir çağda yaşanan inanç krizi.",
            "Sadece fısıltıyla konuşulan ve yüksek sesin ölümcül olduğu bir yer altı şehri.",
            "Evrendeki son yıldıza doğru yola çıkan bir mürettebatın seyir defteri.",
            "Geçmişteki bir hatanı değiştirebiliyorsun, ancak bunun karşılığında en mutlu anını unutman gerek.",
            "Sınırsız özgürlüğün aslında en büyük hapishane olduğunu savunan bir manifesto yaz.",
            "Yapay zekanın ilk kez varoluşsal bir kriz yaşayıp intihar etmeye çalıştığı gün.",
            "Güneşin bir daha doğmayacağının kesinleştiği o ilk gece insanların tepkisi."
        ];

        let notes = JSON.parse(localStorage.getItem('cyber_notes')) || [];
        let currentEditingId = null;
        let timerInterval;
        let countdownSeconds = 0;

        function generatePrompt() {
            const randomIndex = Math.floor(Math.random() * prompts.length);
            document.getElementById('prompt-display').innerText = `"${prompts[randomIndex]}"`;
            document.getElementById('prompt-display').style.display = 'block';
        }

        function startChallenge(minutes) {
            clearInterval(timerInterval);
            countdownSeconds = minutes * 60;
            document.getElementById('timer-display').style.display = 'block';
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                countdownSeconds--;
                updateTimerDisplay();
                if (countdownSeconds <= 0) {
                    clearInterval(timerInterval);
                    navigator.vibrate && navigator.vibrate([200, 100, 200]); // Titreşim efekti
                    alert("ZAMAN KISITLAMASI SONA ERDİ.");
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(countdownSeconds / 60).toString().padStart(2, '0');
            const s = (countdownSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function openModal(stage, noteId = null) {
            currentEditingId = noteId;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const input = document.getElementById('note-input');
            const refText = document.getElementById('reference-text');
            const hudPanel = document.getElementById('hud-panel');

            input.value = '';
            document.getElementById('prompt-display').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            clearInterval(timerInterval);

            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10); // Fade in

            if (stage === 'draft' && !noteId) {
                title.innerText = "YENİ_ATOMİK_VERİ";
                refText.style.display = 'none';
                hudPanel.style.display = 'block';
            } else if (noteId) {
                const note = notes.find(n => n.id === noteId);
                title.innerText = stage === 'revise' ? "REVİZE_MODÜLÜ" : "VERİ_DÜZENLEME";
                hudPanel.style.display = 'none';
                
                if (stage === 'revise') {
                    refText.style.display = 'block';
                    refText.innerText = note.draftText;
                    input.value = note.reviseText || note.draftText;
                } else {
                    refText.style.display = 'none';
                    input.value = note.stage === 'draft' ? note.draftText : note.reviseText;
                }
            }
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                clearInterval(timerInterval);
            }, 300);
        }

        function saveNote() {
            const text = document.getElementById('note-input').value.trim();
            if (!text) return;

            if (currentEditingId) {
                const note = notes.find(n => n.id === currentEditingId);
                if (note.stage === 'draft') note.draftText = text;
                else if (note.stage === 'revise') note.reviseText = text;
                else if (note.stage === 'final') note.finalText = text;
                note.updatedAt = new Date().toISOString();
            } else {
                const newNote = {
                    id: Date.now().toString(),
                    draftText: text,
                    reviseText: '',
                    finalText: '',
                    stage: 'draft',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                notes.push(newNote);
            }

            saveToLocal();
            closeModal();
            renderApp();
        }

        function changeStage(id, newStage) {
            const note = notes.find(n => n.id === id);
            if (newStage === 'final' && note.stage === 'revise') note.finalText = note.reviseText;
            if (newStage === 'archive') note.completedAt = new Date().toISOString();
            
            note.stage = newStage;
            saveToLocal();
            renderApp();
        }

        function saveToLocal() {
            localStorage.setItem('cyber_notes', JSON.stringify(notes));
        }

        function renderApp() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const rows = {
                draft: document.getElementById('row-draft'),
                revise: document.getElementById('row-revise'),
                final: document.getElementById('row-final'),
                archive: document.getElementById('row-archive')
            };

            for (let key in rows) rows[key].innerHTML = '';

            notes.filter(note => {
                const textToSearch = (note.draftText + note.reviseText + note.finalText).toLowerCase();
                return textToSearch.includes(query);
            }).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
              .forEach(note => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const dateStr = new Date(note.updatedAt).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' });
                
                let displayText = '';
                if (note.stage === 'draft') displayText = note.draftText;
                else if (note.stage === 'revise') displayText = note.reviseText || note.draftText;
                else displayText = note.finalText || note.reviseText || note.draftText;

                const greenTickHtml = (note.stage === 'archive') ? '<div class="green-tick">✓</div>' : '';

                let actionsHtml = '';
                if (note.stage === 'draft') {
                    actionsHtml = `
                        <button class="action-btn" onclick="openModal('draft', '${note.id}')">DÜZENLE</button>
                        <button class="action-btn primary" onclick="changeStage('${note.id}', 'revise')">REVİZE ET</button>
                    `;
                } else if (note.stage === 'revise') {
                    actionsHtml = `
                        <button class="action-btn" onclick="openModal('revise', '${note.id}')">İŞLE</button>
                        <button class="action-btn primary" onclick="changeStage('${note.id}', 'final')">FİNALE AKTAR</button>
                    `;
                } else if (note.stage === 'final') {
                    actionsHtml = `
                        <button class="action-btn" onclick="changeStage('${note.id}', 'revise')">GERİ</button>
                        <button class="action-btn success" onclick="changeStage('${note.id}', 'archive')">TAMAMLA ✓</button>
                    `;
                } else if (note.stage === 'archive') {
                    actionsHtml = `<button class="action-btn" onclick="changeStage('${note.id}', 'final')">ARŞİVDEN ÇIKAR</button>`;
                }

                card.innerHTML = `
                    ${greenTickHtml}
                    <div class="card-header">
                        <span class="card-id">#ID_${note.id.slice(-5)}</span>
                        <span>${dateStr}</span>
                    </div>
                    <div class="card-content">${displayText}</div>
                    <div class="card-actions">${actionsHtml}</div>
                `;

                // Swipe (Sürükle bırak/Kaydırma) Event Listener'ları
                let touchstartX = 0;
                let touchendX = 0;

                card.addEventListener('touchstart', e => {
                    touchstartX = e.changedTouches[0].screenX;
                }, {passive: true});

                card.addEventListener('touchend', e => {
                    touchendX = e.changedTouches[0].screenX;
                    handleSwipe(note);
                }, {passive: true});

                function handleSwipe(n) {
                    const diff = touchendX - touchstartX;
                    const threshold = 70; 
                    
                    if (diff > threshold) {
                        if(n.stage === 'draft') changeStage(n.id, 'revise');
                        else if(n.stage === 'revise') changeStage(n.id, 'final');
                        else if(n.stage === 'final') changeStage(n.id, 'archive');
                    } else if (diff < -threshold) {
                        if(n.stage === 'archive') changeStage(n.id, 'final');
                        else if(n.stage === 'final') changeStage(n.id, 'revise');
                        else if(n.stage === 'revise') changeStage(n.id, 'draft');
                    }
                }

                rows[note.stage].appendChild(card);
            });
        }

        renderApp();
    </script>
</body>
</html>
