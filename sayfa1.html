<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Not Uygulaması</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #00ff41;
            --card-bg: #1a1a1a;
            --border-color: #00ff41;
            --font-family: 'Courier New', Courier, monospace;
            --accent-color: #008f11;
            --btn-text: #000;
        }

        body.light-theme {
            --bg-color: #f7f7f8;
            --text-color: #111;
            --card-bg: #ffffff;
            --border-color: #e5e5e5;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --accent-color: #000000;
            --btn-text: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            padding: 15px;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        button {
            background-color: var(--text-color);
            color: var(--btn-text);
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.9em;
        }

        button:active {
            opacity: 0.8;
        }

        .controls-section {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"], textarea {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            font-family: inherit;
            border-radius: 4px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Challenge & Prompts */
        .challenge-box, .prompt-box {
            border: 1px dashed var(--border-color);
            padding: 10px;
            border-radius: 4px;
        }

        .timer-display {
            font-size: 1.5em;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }

        .timer-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* Netflix Style Rows */
        .category-title {
            margin: 20px 0 10px 0;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid var(--text-color);
            padding-left: 10px;
        }

        .netflix-row {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 15px;
            padding-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .netflix-row::-webkit-scrollbar {
            height: 6px;
        }
        
        .netflix-row::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        /* Cards */
        .card {
            flex: 0 0 85vw;
            scroll-snap-align: center;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        @media (min-width: 600px) {
            .card { flex: 0 0 300px; }
        }

        .card-header {
            font-size: 0.8em;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
        }

        .reference-text {
            font-size: 0.9em;
            opacity: 0.6;
            background: rgba(0,0,0,0.1);
            padding: 8px;
            border-left: 2px solid var(--text-color);
            margin-bottom: 5px;
            white-space: pre-wrap;
        }

        .card-actions {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
        }

        .swipe-hint {
            font-size: 0.7em;
            text-align: center;
            opacity: 0.5;
            margin-top: 5px;
        }

        .completed-tick {
            color: #00ff41;
            font-size: 2.5em;
            text-align: center;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        body.light-theme .completed-tick {
            color: #28a745;
            text-shadow: none;
        }
    </style>
</head>
<body>

    <header>
        <h2>[NOT.SISTEMI]</h2>
        <button id="themeToggle" onclick="toggleTheme()">Tema Değiştir</button>
    </header>

    <div class="controls-section">
        <input type="text" id="searchInput" placeholder="Notlarda ara..." onkeyup="renderApp()">
        
        <div class="prompt-box">
            <p id="randomPromptText" style="margin-bottom:10px; font-size:0.9em;">Yazmaya başlamak için bir ilhama ihtiyacın var mı?</p>
            <button onclick="generatePrompt()">Rastgele Soru Getir</button>
        </div>

        <div class="challenge-box">
            <div style="font-size:0.9em;">Yazma Challenge (Geri Sayım)</div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="timer-buttons">
                <button onclick="startTimer(5)">5 Dk</button>
                <button onclick="startTimer(10)">10 Dk</button>
                <button onclick="startTimer(15)">15 Dk</button>
                <button onclick="stopTimer()" style="background:transparent; border:1px solid var(--text-color); color:var(--text-color);">Durdur</button>
            </div>
        </div>

        <div class="card" style="width:100%; flex:none;">
            <h3>Yeni Taslak / Referans</h3>
            <textarea id="newDraftInput" placeholder="Aklına gelenleri buraya dök veya referans bir metin yapıştır..."></textarea>
            <button onclick="createDraft()">Taslak Olarak Kaydet</button>
        </div>
    </div>

    <div class="category-title">1. Taslaklar (Sürükle/Swipe ->)</div>
    <div class="netflix-row" id="row-taslak"></div>

    <div class="category-title">2. Revize (Düzenleme Alanı)</div>
    <div class="netflix-row" id="row-revize"></div>

    <div class="category-title">3. Final (Tamamlananlar)</div>
    <div class="netflix-row" id="row-final"></div>

    <div class="category-title">Arşiv</div>
    <div class="netflix-row" id="row-arsiv"></div>

    <script>
        // 25+ Rastgele Yazma Sorusu
        const prompts = [
            "Gelecekteki kendine, şu anki ruh halini anlatan bir mektup yaz.",
            "Eğer dünyadaki herkes bir günlüğüne kör olsaydı, o günü nasıl geçirirdin?",
            "Unutmayı dilediğin ama aklından çıkmayan o anıyı detaylandır.",
            "Çocukken inandığın en saçma şey neydi? Şimdi düşününce ne hissediyorsun?",
            "Hiç tanımadığın birine sırrını anlatıyor gibi yaz.",
            "Bugün karşılaştığın en ilginç veya tuhaf detay neydi?",
            "Eğer hayatın bir film olsaydı, şu anki sahnenin arka plan müziği ne olurdu?",
            "İnsanların senin hakkında en çok yanıldığı konu nedir?",
            "Kendinde değiştirmek isteyip de bir türlü değiştiremediğin huyun?",
            "Şu an cebinde sonsuz para olsa, yapacağın ilk 3 şey (klişeler dışında).",
            "Sadece 24 saatin kalsaydı, kiminle konuşur ve ona ne söylerdin?",
            "Korkularınla yüzleştiğin bir anı kurgula veya anlat.",
            "Görünmez olabildiğin bir gün... Nereye giderdin, ne yapardın?",
            "Rüyanda gördüğün en absürt şehri tasvir et.",
            "Şu anki hislerini sadece renkler ve dokularla anlat.",
            "Hayatında 'iyi ki yapmışım' dediğin en riskli karar.",
            "Bir eşyanın dili olsaydı ve senin hakkında konuşsaydı, ne derdi?",
            "Geçmişteki sana tek bir cümle söyleme hakkın var. O cümle nedir?",
            "İnsanlığın en büyük zayıflığı sence nedir?",
            "Kendini en güvende hissettiğin yerin detaylı tasviri.",
            "Hiç bitmeyen bir yağmurun yağdığı bir dünyada yaşamı kurgula.",
            "Sence aşk kimyasal bir tepkime mi, yoksa ruhsal bir bağ mı?",
            "İçindeki öfkeyi somut bir canavara dönüştürsen neye benzerdi?",
            "Sonsuz yaşama sahip olsaydın, ilk 100 yılını neye adardın?",
            "Kendi ütopyanı yarat. Kuralları neler olurdu?",
            "Şu an bulunduğun odadaki en eski eşyanın hikayesini uydur."
        ];

        // Not Veri Yapısı
        let notes = JSON.parse(localStorage.getItem('notes')) || [];
        let currentTheme = localStorage.getItem('theme') || 'dark';

        if (currentTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const newTheme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
        }

        function generatePrompt() {
            const randomIndex = Math.floor(Math.random() * prompts.length);
            document.getElementById('randomPromptText').innerText = prompts[randomIndex];
        }

        // Timer Mantığı
        let timerInterval;
        let timeRemaining = 0;

        function startTimer(minutes) {
            clearInterval(timerInterval);
            timeRemaining = minutes * 60;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("Süre doldu! Kalemi bırakma vakti.");
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timeRemaining = 0;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }

        // Not İşlemleri
        function createDraft() {
            const input = document.getElementById('newDraftInput');
            if (!input.value.trim()) return;

            const newNote = {
                id: Date.now().toString(),
                originalText: input.value,
                revisedText: '',
                stage: 'taslak', // taslak, revize, final, arsiv
                date: new Date().toLocaleString()
            };

            notes.push(newNote);
            saveAndRender();
            input.value = '';
        }

        function moveNote(id, newStage) {
            const note = notes.find(n => n.id === id);
            if (note) {
                // Revize aşamasındaki metni kaydet
                if (note.stage === 'revize' && newStage === 'final') {
                    const textarea = document.getElementById(`textarea-${id}`);
                    if (textarea) {
                        note.revisedText = textarea.value;
                    }
                }
                note.stage = newStage;
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('notes', JSON.stringify(notes));
            renderApp();
        }

        // Swipe & Render Mantığı
        function renderApp() {
            const searchTerms = document.getElementById('searchInput').value.toLowerCase();
            
            const rows = {
                'taslak': document.getElementById('row-taslak'),
                'revize': document.getElementById('row-revize'),
                'final': document.getElementById('row-final'),
                'arsiv': document.getElementById('row-arsiv')
            };

            for (let stage in rows) {
                rows[stage].innerHTML = '';
            }

            notes.forEach(note => {
                const textToSearch = note.originalText + " " + (note.revisedText || "");
                if (searchTerms && !textToSearch.toLowerCase().includes(searchTerms)) return;

                const card = document.createElement('div');
                card.className = 'card';
                
                // Swipe olayları (Dokunmatik ekranlar için)
                let touchstartX = 0;
                let touchendX = 0;
                
                card.addEventListener('touchstart', e => {
                    touchstartX = e.changedTouches[0].screenX;
                });
                
                card.addEventListener('touchend', e => {
                    touchendX = e.changedTouches[0].screenX;
                    handleSwipe(note, touchstartX, touchendX);
                });

                let contentHtml = `<div class="card-header"><span>ID: ${note.id.slice(-4)}</span><span>${note.date.split(',')[0]}</span></div>`;

                if (note.stage === 'taslak') {
                    contentHtml += `
                        <div style="white-space: pre-wrap; font-size: 0.95em; flex-grow: 1;">${note.originalText}</div>
                        <div class="card-actions">
                            <button onclick="moveNote('${note.id}', 'revize')">Revizeye Aktar -></button>
                        </div>
                        <div class="swipe-hint">Sola/Sağa kaydırarak taşıyabilirsin</div>
                    `;
                } 
                else if (note.stage === 'revize') {
                    // Revize kısmında orijinal metin referans olarak görünür, altına yeni textarea açılır.
                    contentHtml += `
                        <div class="reference-text"><strong>Referans Taslak:</strong><br>${note.originalText}</div>
                        <textarea id="textarea-${note.id}" placeholder="Revize edilmiş yeni halini buraya yaz...">${note.revisedText || note.originalText}</textarea>
                        <div class="card-actions">
                            <button onclick="moveNote('${note.id}', 'taslak')" style="background:transparent; border:1px solid var(--text-color); color:var(--text-color);"><- Geri</button>
                            <button onclick="moveNote('${note.id}', 'final')">Finale Aktar -></button>
                        </div>
                    `;
                }
                else if (note.stage === 'final') {
                    contentHtml += `
                        <div class="completed-tick">✓</div>
                        <div style="white-space: pre-wrap; font-size: 0.95em; flex-grow: 1;">${note.revisedText || note.originalText}</div>
                        <div class="card-actions">
                            <button onclick="moveNote('${note.id}', 'revize')" style="background:transparent; border:1px solid var(--text-color); color:var(--text-color);"><- Revizeye Dön</button>
                            <button onclick="moveNote('${note.id}', 'arsiv')">Arşive Kaldır</button>
                        </div>
                    `;
                }
                else if (note.stage === 'arsiv') {
                    contentHtml += `
                        <div style="font-size: 0.8em; opacity: 0.5;">Tamamlandı ve Arşivlendi.</div>
                        <div style="white-space: pre-wrap; font-size: 0.9em; flex-grow: 1; opacity:0.8;">${note.revisedText || note.originalText}</div>
                        <div class="card-actions">
                            <button onclick="moveNote('${note.id}', 'final')" style="background:transparent; border:1px solid var(--text-color); color:var(--text-color);">Geri Al</button>
                            <button onclick="deleteNote('${note.id}')" style="background:#ff3333; color:white;">Sil</button>
                        </div>
                    `;
                }

                card.innerHTML = contentHtml;
                rows[note.stage].appendChild(card);
            });
        }

        function deleteNote(id) {
            if(confirm("Bu notu kalıcı olarak silmek istediğine emin misin?")) {
                notes = notes.filter(n => n.id !== id);
                saveAndRender();
            }
        }

        function handleSwipe(note, startX, endX) {
            const threshold = 60; // Kaydırma hassasiyeti
            
            // Sağa kaydırma (İleri aşama)
            if (endX - startX > threshold) {
                if (note.stage === 'taslak') moveNote(note.id, 'revize');
                else if (note.stage === 'revize') moveNote(note.id, 'final');
                else if (note.stage === 'final') moveNote(note.id, 'arsiv');
            }
            // Sola kaydırma (Geri aşama)
            else if (startX - endX > threshold) {
                if (note.stage === 'revize') moveNote(note.id, 'taslak');
                else if (note.stage === 'final') moveNote(note.id, 'revize');
                else if (note.stage === 'arsiv') moveNote(note.id, 'final');
            }
        }

        // Başlangıç tetiklemesi
        renderApp();
    </script>
</body>
</html>
