<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chimptopus Galaxy Notes</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --ink: #141414;
      --muted: #76716a;
      --line: #171717;
      --soft: rgba(20, 20, 20, 0.08);
      --panel: rgba(255, 255, 255, 0.64);
      --white: #fffdf8;
      --chip: #ebe6dd;
      --danger: #8d2f2f;
      --radius: 26px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(var(--soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--soft) 1px, transparent 1px),
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.95), transparent 28%),
    var(--bg);
  background-size: 12px 12px, 12px 12px, 100% 100%, 100% 100%;
  color: var(--ink);
  font-family: var(--sans);
}

button, input, textarea, select {
  font: inherit;
  color: inherit;
}

button {
  border: 2px solid var(--line);
  background: var(--white);
  border-radius: 999px;
  padding: 10px 16px;
  cursor: pointer;
  transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
}

button:hover { transform: translateY(-1px); box-shadow: 0 7px 0 rgba(20,20,20,.09); }
button:active { transform: translateY(0); box-shadow: none; }

.app {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 42px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  margin-bottom: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 48px;
  height: 48px;
  border: 3px solid var(--line);
  border-radius: 16px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  padding: 8px;
  background: var(--white);
  box-shadow: 8px 8px 0 rgba(20,20,20,.08);
}

.logo span { background: var(--ink); border-radius: 2px; }
.logo span:nth-child(2), .logo span:nth-child(6) { opacity: .35; }

h1, h2, h3, p { margin: 0; }

h1 {
  font-family: var(--mono);
  font-size: clamp(24px, 4vw, 46px);
  letter-spacing: -2px;
  line-height: .95;
}

.subtitle {
  font-family: var(--mono);
  color: var(--muted);
  margin-top: 8px;
  font-size: 13px;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.ghost { background: transparent; }
.danger { color: var(--danger); border-color: var(--danger); }

.layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 22px;
  align-items: start;
}

.panel {
  background: var(--panel);
  border: 2px solid var(--line);
  border-radius: var(--radius);
  box-shadow: 12px 12px 0 rgba(20,20,20,.08);
  backdrop-filter: blur(8px);
}

.galaxy {
  padding: 22px;
  position: sticky;
  top: 20px;
  min-height: 620px;
  overflow: hidden;
}

.galaxy-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.galaxy-title {
  font-family: var(--mono);
  font-size: 20px;
  letter-spacing: -1px;
}

.orbit-wrap {
  height: 410px;
  border: 2px dashed rgba(20,20,20,.22);
  border-radius: 50%;
  position: relative;
  margin: 18px auto;
  width: min(100%, 265px);
}

.core {
  width: 96px;
  height: 96px;
  border: 3px solid var(--line);
  border-radius: 50%;
  display: grid;
  place-items: center;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: var(--white);
  box-shadow: 0 0 0 12px rgba(20,20,20,.04);
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  padding: 12px;
}

.planet {
  --x: 50%;
  --y: 50%;
  position: absolute;
  left: var(--x);
  top: var(--y);
  transform: translate(-50%, -50%);
  width: 58px;
  height: 58px;
  border: 3px solid var(--line);
  border-radius: 50%;
  background: var(--white);
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-weight: 800;
  box-shadow: 6px 6px 0 rgba(20,20,20,.10);
  cursor: pointer;
  z-index: 2;
}

.planet.active { background: var(--ink); color: var(--white); }

.planet::after {
  content: attr(data-name);
  position: absolute;
  top: 64px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--ink);
  background: var(--bg);
  border: 1px solid rgba(20,20,20,.18);
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 10px;
  white-space: nowrap;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.planet.active::after { color: var(--ink); }

.empty-galaxy {
  text-align: center;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 13px;
  margin-top: 36px;
  line-height: 1.6;
}

.planet-form, .note-form {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

input, textarea, select {
  width: 100%;
  border: 2px solid var(--line);
  background: var(--white);
  border-radius: 18px;
  padding: 12px 14px;
  outline: none;
}

textarea { resize: vertical; min-height: 95px; }

.hint {
  font-family: var(--mono);
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.workspace {
  min-height: 620px;
  padding: 24px;
}

.planet-detail {
  display: none;
}

.planet-detail.active {
  display: block;
}

.detail-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: start;
  padding-bottom: 18px;
  border-bottom: 2px solid rgba(20,20,20,.12);
}

.meta-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 11px;
  border: 2px solid var(--line);
  border-radius: 999px;
  background: var(--chip);
  font-family: var(--mono);
  font-size: 12px;
}

.icon {
  width: 16px;
  height: 16px;
  display: inline-block;
  position: relative;
  flex: 0 0 16px;
}

.icon.planet-i { border: 2px solid currentColor; border-radius: 50%; }
.icon.planet-i::after { content: ""; position: absolute; width: 22px; height: 7px; border: 2px solid currentColor; border-top: 0; border-radius: 50%; left: -5px; top: 5px; transform: rotate(-18deg); }
.icon.tag-i { border: 2px solid currentColor; border-radius: 5px 8px 8px 5px; transform: rotate(45deg); }
.icon.tag-i::after { content: ""; position: absolute; width: 3px; height: 3px; background: currentColor; border-radius: 50%; left: 3px; top: 3px; }
.icon.note-i { border: 2px solid currentColor; border-radius: 4px; }
.icon.note-i::after { content: ""; position: absolute; left: 3px; right: 3px; top: 5px; height: 2px; background: currentColor; box-shadow: 0 5px 0 currentColor; }

.note-maker {
  margin-top: 20px;
  padding: 18px;
  border: 2px solid rgba(20,20,20,.22);
  border-radius: 22px;
  background: rgba(255,255,255,.42);
}

.note-maker h3 {
  font-family: var(--mono);
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.note-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
  gap: 18px;
  margin-top: 22px;
}

.note-card {
  min-height: 260px;
  border: 3px solid var(--line);
  border-radius: 24px;
  background: var(--white);
  padding: 20px;
  position: relative;
  box-shadow:
    10px 10px 0 rgba(20,20,20,.08),
    -8px 8px 0 rgba(20,20,20,.035);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.note-card::before,
.note-card::after {
  content: "";
  position: absolute;
  inset: 10px -9px -10px 9px;
  border: 2px solid rgba(20,20,20,.25);
  border-radius: 23px;
  z-index: -1;
}

.note-card::after {
  inset: 20px -17px -20px 17px;
  opacity: .45;
}

.note-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  font-family: var(--mono);
  color: var(--muted);
  font-size: 12px;
}

.note-title {
  font-family: var(--mono);
  font-size: 24px;
  line-height: 1.05;
  letter-spacing: -1.5px;
  word-break: break-word;
}

.note-content {
  color: #2d2a27;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  flex: 1;
}

.note-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-top: auto;
  font-family: var(--mono);
  font-size: 12px;
}

.mini-btn {
  padding: 7px 10px;
  font-size: 12px;
  border-width: 2px;
}

.empty-state {
  min-height: 440px;
  display: grid;
  place-items: center;
  text-align: center;
  color: var(--muted);
  font-family: var(--mono);
  line-height: 1.7;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.searchbar {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  align-items: center;
}

.searchbar input { flex: 1; }

@media (max-width: 870px) {
  .layout { grid-template-columns: 1fr; }
  .galaxy { position: relative; top: 0; min-height: auto; }
  .orbit-wrap { height: 320px; }
  .detail-head { grid-template-columns: 1fr; }
  .actions { justify-content: flex-start; }
}

@media (max-width: 560px) {
  .topbar { align-items: flex-start; flex-direction: column; }
  .field-row { grid-template-columns: 1fr; }
  .workspace, .galaxy { padding: 18px; }
  .note-grid { grid-template-columns: 1fr; }
}

  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div>
          <h1>Chimptopus</h1>
          <p class="subtitle">galaxy based note vault</p>
        </div>
      </div>
      <div class="actions">
        <button class="ghost" id="exportBtn">Dışa Aktar</button>
        <button class="ghost" id="importBtn">İçe Aktar</button>
        <button class="danger" id="wipeBtn">Sıfırla</button>
      </div>
    </header><section class="layout">
  <aside class="panel galaxy">
    <div class="galaxy-head">
      <div>
        <h2 class="galaxy-title">Chimptopus Galaxy</h2>
        <p class="hint">Her gezegen ayrı bir not kasasıdır.</p>
      </div>
      <button class="mini-btn" id="sampleBtn">Örnek</button>
    </div>

    <div class="orbit-wrap" id="orbit">
      <div class="core">CHIMP<br/>TOPUS</div>
    </div>

    <form class="planet-form" id="planetForm">
      <input id="planetName" maxlength="28" placeholder="Gezegen adı" required />
      <div class="field-row">
        <input id="planetPurpose" maxlength="48" placeholder="İçin: proje, fikir, günlük..." />
        <input id="planetTags" maxlength="70" placeholder="Etiketler: ui, araştırma" />
      </div>
      <button type="submit">+ Yeni Gezegen</button>
      <p class="hint">Gezegen kartına tıklayınca içindeki not blokları açılır.</p>
    </form>
  </aside>

  <section class="panel workspace" id="workspace">
    <div class="empty-state" id="emptyState">
      <div>
        <h2 class="galaxy-title">Henüz gezegen yok.</h2>
        <p>Soldan bir not kasası oluştur ve Chimptopus galaksisine bağla.</p>
      </div>
    </div>
  </section>
</section>

  </main>  <input type="file" id="fileInput" accept="application/json" hidden />  <script>
    const STORAGE_KEY = "chimptopus-notes-v1";

    let state = loadState();
    let activePlanetId = state.planets[0]?.id || null;

    const orbit = document.getElementById("orbit");
    const workspace = document.getElementById("workspace");
    const emptyState = document.getElementById("emptyState");
    const planetForm = document.getElementById("planetForm");
    const planetName = document.getElementById("planetName");
    const planetPurpose = document.getElementById("planetPurpose");
    const planetTags = document.getElementById("planetTags");
    const exportBtn = document.getElementById("exportBtn");
    const importBtn = document.getElementById("importBtn");
    const wipeBtn = document.getElementById("wipeBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const fileInput = document.getElementById("fileInput");

    function uid(prefix = "id") {
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { planets: [] };
      } catch {
        return { planets: [] };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(text = "") {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseTags(text = "") {
      return text
        .split(",")
        .map(tag => tag.trim())
        .filter(Boolean)
        .slice(0, 6);
    }

    function getActivePlanet() {
      return state.planets.find(p => p.id === activePlanetId) || null;
    }

    function render() {
      saveState();
      renderGalaxy();
      renderWorkspace();
    }

    function renderGalaxy() {
      orbit.querySelectorAll(".planet").forEach(el => el.remove());

      if (!state.planets.length) {
        const empty = document.createElement("div");
        empty.className = "empty-galaxy";
        empty.textContent = "Yeni gezegenler burada yörüngeye girer.";
        empty.dataset.empty = "true";
        orbit.appendChild(empty);
        return;
      }

      orbit.querySelectorAll("[data-empty='true']").forEach(el => el.remove());

      const total = state.planets.length;
      state.planets.forEach((planet, index) => {
        const angle = (Math.PI * 2 * index) / Math.max(total, 1) - Math.PI / 2;
        const radiusX = 43;
        const radiusY = 43;
        const x = 50 + Math.cos(angle) * radiusX;
        const y = 50 + Math.sin(angle) * radiusY;
        const btn = document.createElement("button");
        btn.className = `planet ${planet.id === activePlanetId ? "active" : ""}`;
        btn.style.setProperty("--x", `${x}%`);
        btn.style.setProperty("--y", `${y}%`);
        btn.dataset.name = planet.name;
        btn.title = planet.name;
        btn.textContent = planet.name.slice(0, 2).toUpperCase();
        btn.addEventListener("click", () => {
          activePlanetId = planet.id;
          render();
        });
        orbit.appendChild(btn);
      });
    }

    function renderWorkspace() {
      const planet = getActivePlanet();
      workspace.innerHTML = "";

      if (!planet) {
        workspace.appendChild(emptyState);
        return;
      }

      const tags = planet.tags.map(tag => `<span class="chip"><span class="icon tag-i"></span>${escapeHtml(tag)}</span>`).join("");
      const notes = planet.notes || [];

      workspace.innerHTML = `
        <div class="planet-detail active">
          <div class="detail-head">
            <div>
              <h2 class="galaxy-title"><span class="icon planet-i"></span> ${escapeHtml(planet.name)}</h2>
              <div class="meta-row">
                <span class="chip"><span class="icon note-i"></span>${notes.length} not</span>
                <span class="chip">için: ${escapeHtml(planet.purpose || "serbest")}</span>
                ${tags || `<span class="chip">etiketsiz</span>`}
              </div>
            </div>
            <button class="danger mini-btn" data-delete-planet="${planet.id}">Gezegeni Sil</button>
          </div>

          <div class="note-maker">
            <h3>&gt; yeni çekirdek not oluştur _</h3>
            <form class="note-form" data-note-form="${planet.id}">
              <input name="title" maxlength="48" placeholder="Not başlığı" required />
              <textarea name="content" maxlength="1200" placeholder="Not içeriği..." required></textarea><div class="field-row">
            <input name="tags" maxlength="70" placeholder="Etiketler: fikir, yapılacak" />
            <select name="mood">
              <option value="core">Çekirdek</option>
              <option value="idea">Fikir</option>
              <option value="todo">Yapılacak</option>
              <option value="archive">Arşiv</option>
            </select>
          </div>
          <button type="submit">+ Not Bloğu Ekle</button>
        </form>
      </div>

      <div class="searchbar">
        <input id="noteSearch" placeholder="Bu gezegende ara..." />
      </div>

      <div class="note-grid" id="noteGrid">
        ${renderNotes(notes)}
      </div>
    </div>
  `;

  workspace.querySelector("[data-note-form]").addEventListener("submit", addNote);
  workspace.querySelector("[data-delete-planet]").addEventListener("click", deletePlanet);
  workspace.querySelectorAll("[data-delete-note]").forEach(btn => btn.addEventListener("click", deleteNote));
  workspace.querySelector("#noteSearch").addEventListener("input", filterNotes);
}

function renderNotes(notes) {
  if (!notes.length) {
    return `<div class="empty-state"><div><h2 class="galaxy-title">Boş not kasası.</h2><p>İlk çekirdek notunu ekle.</p></div></div>`;
  }

  return notes.map((note, index) => {
    const tags = (note.tags || []).map(tag => `<span>#${escapeHtml(tag)}</span>`).join(" ");
    return `
      <article class="note-card" data-note-card data-search="${escapeHtml((note.title + " " + note.content + " " + (note.tags || []).join(" ")).toLowerCase())}">
        <div class="note-top">
          <span>${String(index + 1).padStart(2, "0")} / ${String(notes.length).padStart(2, "0")}</span>
          <span>${escapeHtml(note.mood || "core")}</span>
        </div>
        <h3 class="note-title">${escapeHtml(note.title)}</h3>
        <p class="note-content">${escapeHtml(note.content)}</p>
        <div class="note-footer">
          <span>${tags || "çekirdek not"}</span>
          <button class="mini-btn danger" data-delete-note="${note.id}">Sil</button>
        </div>
      </article>
    `;
  }).join("");
}

function addPlanet(event) {
  event.preventDefault();
  const name = planetName.value.trim();
  if (!name) return;

  const planet = {
    id: uid("planet"),
    name,
    purpose: planetPurpose.value.trim(),
    tags: parseTags(planetTags.value),
    notes: [],
    createdAt: new Date().toISOString()
  };

  state.planets.push(planet);
  activePlanetId = planet.id;
  planetForm.reset();
  render();
}

function addNote(event) {
  event.preventDefault();
  const planet = getActivePlanet();
  if (!planet) return;

  const data = new FormData(event.target);
  const note = {
    id: uid("note"),
    title: data.get("title").trim(),
    content: data.get("content").trim(),
    tags: parseTags(data.get("tags") || ""),
    mood: data.get("mood"),
    createdAt: new Date().toISOString()
  };

  planet.notes.unshift(note);
  event.target.reset();
  render();
}

function deletePlanet(event) {
  const id = event.currentTarget.dataset.deletePlanet;
  const planet = state.planets.find(p => p.id === id);
  if (!planet || !confirm(`"${planet.name}" gezegeni ve içindeki notlar silinsin mi?`)) return;
  state.planets = state.planets.filter(p => p.id !== id);
  activePlanetId = state.planets[0]?.id || null;
  render();
}

function deleteNote(event) {
  const planet = getActivePlanet();
  if (!planet) return;
  const id = event.currentTarget.dataset.deleteNote;
  planet.notes = planet.notes.filter(note => note.id !== id);
  render();
}

function filterNotes(event) {
  const query = event.target.value.trim().toLowerCase();
  workspace.querySelectorAll("[data-note-card]").forEach(card => {
    card.style.display = card.dataset.search.includes(query) ? "flex" : "none";
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "chimptopus-notes.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!Array.isArray(imported.planets)) throw new Error("Invalid file");
      state = imported;
      activePlanetId = state.planets[0]?.id || null;
      render();
    } catch {
      alert("Bu dosya Chimptopus formatında görünmüyor.");
    }
  };
  reader.readAsText(file);
}

function addSample() {
  if (state.planets.length && !confirm("Örnek veriler mevcut galaksiye eklensin mi?")) return;
  const sample = {
    id: uid("planet"),
    name: "Nebula UI",
    purpose: "arayüz fikirleri",
    tags: ["design", "frontend"],
    createdAt: new Date().toISOString(),
    notes: [
      {
        id: uid("note"),
        title: "Designer Soul. Developer Brain.",
        content: "Kart mantığı: kısa, çekirdek, sayfa sayfa okunabilir not blokları. Her blok tek fikri taşımalı.",
        tags: ["kart", "minimal"],
        mood: "core",
        createdAt: new Date().toISOString()
      },
      {
        id: uid("note"),
        title: "Kasayı hafif tut",
        content: "Ağır animasyon yok. Sadece hover ve küçük geçişler. Veri localStorage içinde tutulur.",
        tags: ["performans"],
        mood: "todo",
        createdAt: new Date().toISOString()
      }
    ]
  };
  state.planets.push(sample);
  activePlanetId = sample.id;
  render();
}

planetForm.addEventListener("submit", addPlanet);
exportBtn.addEventListener("click", exportData);
importBtn.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", event => {
  const file = event.target.files[0];
  if (file) importData(file);
  event.target.value = "";
});
wipeBtn.addEventListener("click", () => {
  if (!confirm("Tüm Chimptopus galaksisi silinsin mi?")) return;
  state = { planets: [] };
  activePlanetId = null;
  render();
});
sampleBtn.addEventListener("click", addSample);

render();

  </script>
</body>
</html>
