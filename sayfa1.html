<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOTBOOK — Terminal Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d09;
    --surface: #1a1610;
    --surface2: #221e16;
    --surface3: #2c2820;
    --cream: #d4c5a9;
    --cream-dim: #8a7d68;
    --cream-faint: #3d3629;
    --gold: #c9a84c;
    --gold-dim: #7a6430;
    --green-bright: #6dba8a;
    --red: #8b3a3a;
    --border: rgba(201,168,76,0.15);
    --border-strong: rgba(201,168,76,0.35);
  }

  /* Gündüz Modu Renkleri */
  body.light-mode {
    --bg: #f5f2eb;
    --surface: #ffffff;
    --surface2: #eeebe3;
    --surface3: #e4e0d5;
    --cream: #2c2820;
    --cream-dim: #5c5548;
    --cream-faint: #a59d8d;
    --gold: #8b6e21;
    --border: rgba(139,110,33,0.15);
    --border-strong: rgba(139,110,33,0.35);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* Tarama Çizgileri Efekti */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border-strong);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
  }

  .topbar-brand {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 4px;
  }

  .mode-toggle {
    cursor: pointer;
    font-size: 14px;
    margin-right: 15px;
    background: none;
    border: none;
    color: var(--gold);
  }

  .app { padding: 70px 0 80px; }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

  /* Kartlar ve Listeler */
  .stats-row { display: flex; gap: 1px; margin: 16px 20px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .stat-cell { flex: 1; padding: 15px; background: var(--surface); text-align: center; }
  .stat-num { font-family: 'Share Tech Mono', monospace; font-size: 20px; color: var(--gold); display: block; }
  .stat-label { font-size: 9px; text-transform: uppercase; color: var(--cream-dim); }

  .new-note-btn {
    width: calc(100% - 40px); margin: 0 20px 20px; padding: 14px;
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Share Tech Mono', monospace; cursor: pointer;
  }

  .stage-section { margin-bottom: 20px; }
  .stage-label-row { padding: 0 20px 10px; display: flex; align-items: center; gap: 10px; font-family: 'Share Tech Mono', monospace; font-size: 10px; }
  
  .cards-scroll { display: flex; gap: 12px; padding: 0 20px 10px; overflow-x: auto; scrollbar-width: none; }
  .note-card {
    flex-shrink: 0; width: 220px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px; padding: 15px;
  }

  /* Editör */
  .title-input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
    padding: 20px; font-family: 'Playfair Display', serif; font-size: 24px; color: var(--cream); outline: none;
  }
  .note-textarea {
    width: 100%; min-height: 300px; background: transparent; border: none;
    padding: 20px; font-family: 'IBM Plex Mono', monospace; color: var(--cream); outline: none; resize: none;
  }

  .advance-btn {
    width: calc(100% - 40px); margin: 20px; padding: 15px;
    background: var(--surface2); border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Share Tech Mono', monospace; cursor: pointer;
  }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border-strong);
    display: flex; padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn { flex: 1; padding: 15px; background: none; border: none; color: var(--cream-dim); font-family: 'Share Tech Mono', monospace; font-size: 10px; }
  .nav-btn.active { color: var(--gold); }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: var(--bg); padding: 8px 20px; border-radius: 20px;
    font-size: 12px; opacity: 0; transition: 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">> NOTBOOK</div>
  <div style="display: flex; align-items: center;">
    <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">☼</button>
    <div class="topbar-clock" id="clockDisplay" style="font-family: 'Share Tech Mono'; font-size: 12px;">00:00:00</div>
  </div>
</div>

<div class="app">
  <div class="screen active" id="screenHome">
    <div style="padding: 20px;">
      <h1 style="font-family: 'Playfair Display';">Notlarım</h1>
    </div>
    
    <div class="stats-row">
      <div class="stat-cell"><span class="stat-num" id="statDraft">0</span><span class="stat-label">Taslak</span></div>
      <div class="stat-cell"><span class="stat-num" id="statRevise">0</span><span class="stat-label">Revize</span></div>
      <div class="stat-cell"><span class="stat-num" id="statFinal">0</span><span class="stat-label">Final</span></div>
    </div>

    <button class="new-note-btn" onclick="openNewNote()">+ YENİ NOT OLUŞTUR</button>
    <div id="notesList"></div>
  </div>

  <div class="screen" id="screenEditor">
    <div style="padding: 10px 20px;">
      <button onclick="showScreen('home')" style="background:none; border:none; color:var(--gold); cursor:pointer;">← GERİ</button>
    </div>
    <input class="title-input" id="noteTitle" placeholder="Başlık Yazın..." oninput="autoSave()">
    <div id="editorContent">
      <textarea class="note-textarea" id="noteText" placeholder="Yazmaya başlayın..." oninput="autoSave()"></textarea>
    </div>
    <button class="advance-btn" id="advanceBtn" onclick="nextStage()">SONRAKİ AŞAMAYA GEÇ →</button>
    <button class="advance-btn" style="color: var(--red); border-color: var(--red); margin-top: 0;" onclick="deleteNote()">NOTU SİL</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showScreen('home')">ANA EKRAN</button>
  <button class="nav-btn" onclick="showToast('Geçmiş özelliği yakında!')">GEÇMİŞ</button>
</div>

<div class="toast" id="toast">İşlem Başarılı</div>

<script>
let notes = JSON.parse(localStorage.getItem('notbook_notes') || '[]');
let currentNoteId = null;

// SAAT
function updateClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('tr-TR');
}
setInterval(updateClock, 1000);
updateClock();

// TEMA (GECE/GÜNDÜZ)
function toggleTheme() {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    document.getElementById('themeBtn').textContent = isLight ? '☾' : '☼';
    localStorage.setItem('notbook_theme', isLight ? 'light' : 'dark');
}

// BAŞLANGIÇ TEMASI
if(localStorage.getItem('notbook_theme') === 'light') toggleTheme();

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    if(name === 'home') renderHome();
}

function renderHome() {
    const list = document.getElementById('notesList');
    list.innerHTML = '';
    
    const stages = ['draft', 'revise', 'final'];
    stages.forEach(stage => {
        const stageNotes = notes.filter(n => n.stage === stage);
        document.getElementById('stat' + stage.charAt(0).toUpperCase() + stage.slice(1)).textContent = stageNotes.length;
        
        if(stageNotes.length > 0) {
            let html = `<div class="stage-section"><div class="stage-label-row"><span>●</span> ${stage.toUpperCase()}</div><div class="cards-scroll">`;
            stageNotes.forEach(note => {
                html += `
                    <div class="note-card" onclick="openNote('${note.id}')">
                        <div style="font-weight:bold; margin-bottom:5px;">${note.title || 'Başlıksız'}</div>
                        <div style="font-size:11px; color:var(--cream-dim);">${(note.content || '').substring(0, 50)}...</div>
                    </div>`;
            });
            html += `</div></div>`;
            list.innerHTML += html;
        }
    });
}

function openNewNote() {
    const newNote = {
        id: Date.now().toString(),
        title: '',
        content: '',
        stage: 'draft',
        updatedAt: Date.now()
    };
    notes.push(newNote);
    saveToStorage();
    openNote(newNote.id);
}

function openNote(id) {
    currentNoteId = id;
    const note = notes.find(n => n.id === id);
    document.getElementById('noteTitle').value = note.title;
    document.getElementById('noteText').value = note.content;
    
    const btn = document.getElementById('advanceBtn');
    btn.style.display = note.stage === 'final' ? 'none' : 'block';
    btn.textContent = note.stage === 'draft' ? 'REVİZEYE AKTAR →' : 'FİNALE AKTAR →';
    
    showScreen('editor');
}

function autoSave() {
    if(!currentNoteId) return;
    const note = notes.find(n => n.id === currentNoteId);
    note.title = document.getElementById('noteTitle').value;
    note.content = document.getElementById('noteText').value;
    note.updatedAt = Date.now();
    saveToStorage();
}

function nextStage() {
    const note = notes.find(n => n.id === currentNoteId);
    if(note.stage === 'draft') note.stage = 'revise';
    else if(note.stage === 'revise') note.stage = 'final';
    saveToStorage();
    showToast('Aşama Atlandı!');
    showScreen('home');
}

function deleteNote() {
    if(confirm('Bu notu silmek istediğine emin misin?')) {
        notes = notes.filter(n => n.id !== currentNoteId);
        saveToStorage();
        showScreen('home');
    }
}

function saveToStorage() {
    localStorage.setItem('notbook_notes', JSON.stringify(notes));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

renderHome();
</script>
</body>
</html>
