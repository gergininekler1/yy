<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Chimptopus Pro V2</title>
    
    <script>
        const manifestJSON = {
            "name": "Chimptopus Pro", "short_name": "Notes",
            "start_url": window.location.href.split('#')[0].split('?')[0],
            "display": "standalone", "background_color": "#000000", "theme_color": "#000000",
            "icons": [{"src": "https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsrounded/edit_document/default/24px.svg", "sizes": "192x192", "type": "image/svg+xml"}]
        };
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestJSON));
        document.head.appendChild(manifestLink);
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #f2f2f7; 
            --surface-color: #ffffff; 
            --surface-alt: #e5e5ea; 
            --text-main: #1c1c1e; 
            --text-muted: #8e8e93; 
            --border-color: #d1d1d6;
            --primary-blue: #007aff; 
            --danger-color: #ff3b30;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.04);
            --color-taslak: #8e8e93; --color-revize: #007aff; --color-archive: #34c759; 
        }

        .dark-mode {
            --bg-color: #000000; 
            --surface-color: #1c1c1e; 
            --surface-alt: #2c2c2e;   
            --text-main: rgba(255,255,255,0.95); 
            --text-muted: rgba(255,255,255,0.6);
            --border-color: #38383a; 
            --card-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }

        html, body { max-width: 100vw; overflow-x: hidden; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            transition: background 0.3s ease, color 0.3s ease, padding-top 0.3s ease;
            -webkit-tap-highlight-color: transparent; padding-top: calc(125px + env(safe-area-inset-top)); 
        }

        body.focus-mode .app-header, body.focus-mode .top-tabs { transform: translateY(-150%); opacity: 0; pointer-events: none; }
        body.focus-mode { padding-top: calc(20px + env(safe-area-inset-top)) !important; }

        * { box-sizing: border-box; }

        .card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--card-shadow); }
        
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 1010;
            padding: calc(15px + env(safe-area-inset-top)) 20px 10px;
            display: flex; justify-content: space-between; align-items: center; transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }

        .top-tabs {
            position: fixed; top: calc(56px + env(safe-area-inset-top)); left: 0; width: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center;
            padding: 8px 0; z-index: 1000; transition: transform 0.3s ease, opacity 0.3s ease;
        }
        body:not(.dark-mode) .top-tabs { background: rgba(242,242,247,0.88); }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            color: var(--text-muted); cursor: pointer; flex: 1; text-align: center; position: relative; padding-bottom: 4px;
        }
        .nav-item .icon { font-size: 18px; transition: transform 0.2s ease; }
        .nav-item .label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-item.active { color: var(--text-main); }
        .nav-item.active .icon { transform: scale(1.1); }

        .page-container { padding: 0 20px 40px; display: none; animation: pageIn 0.3s ease; }
        .page-container.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ADACIK TASARIMI (ISLANDS) */
        .editor-island { padding: 18px; margin-bottom: 15px; display: flex; flex-direction: column; border-radius: 16px; background: var(--surface-color); border: 1px solid var(--border-color); box-shadow: var(--card-shadow); }
        .island-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        .meta-input {
            width: 100%; background: var(--surface-alt); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 12px 15px; font-size: 14px; font-weight: 600;
            color: var(--text-main); outline: none; font-family: inherit; 
        }
        .meta-input::placeholder { color: var(--text-muted); font-weight: 400; }

        .timer-btn {
            font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 6px;
            background: var(--surface-alt); border: 1px solid var(--border-color);
            color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px; font-family: inherit;
        }
        
        .sw-running { animation: pulseBorder 2s infinite; color: var(--primary-blue); border-color: var(--primary-blue); }
        @keyframes pulseBorder { 0% { border-color: var(--border-color); } 50% { border-color: var(--primary-blue); } 100% { border-color: var(--border-color); } }

        textarea {
            width: 100%; height: 160px; background-color: var(--surface-alt);
            background-image: repeating-linear-gradient(transparent, transparent 31px, var(--border-color) 31px, var(--border-color) 32px);
            background-attachment: local; line-height: 32px; padding: 6px 15px; font-size: 16px; 
            border: 1px solid var(--border-color); border-radius: 8px; outline: none; color: var(--text-main); resize: none;
            font-family: inherit; transition: height 0.3s ease;
        }

        .ref-input-container {
            display: flex; gap: 10px; align-items: center; background: var(--surface-alt); padding: 10px 15px;
            border-radius: 8px; border: 1px solid var(--border-color);
        }
        .ref-input-container input { background: transparent; border: none; outline: none; font-size: 14px; color: var(--text-main); flex-grow: 1; font-family: inherit; }

        .word-challenge { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-top: 15px; }
        .progress-bar-container { flex-grow: 1; height: 8px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; margin-left: 10px; border: 1px solid var(--border-color); }
        .progress-bar { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s ease; }

        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .note-card { padding: 16px; cursor: pointer; display: flex; flex-direction: column; transition: transform 0.15s ease; border-radius: 12px; border-left: 4px solid var(--primary-blue); }
        .note-card:active { transform: scale(0.98); }

        .mention-link { color: var(--primary-blue); cursor: pointer; font-weight: 600; background: rgba(0,122,255,0.1); padding: 2px 5px; border-radius: 4px; }
        .tag-link { color: #bf5af2; font-weight: 600; background: rgba(191,90,242,0.1); padding: 2px 5px; border-radius: 4px; }

        /* SEARCH MODAL */
        #searchOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color); z-index: 5000; display: none; flex-direction: column;
            padding: calc(20px + env(safe-area-inset-top)) 20px 20px;
        }
        .search-header { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .search-input-wrap { flex-grow: 1; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px; display: flex; align-items: center; padding: 0 15px; }
        .search-input-wrap input { background: transparent; border: none; outline: none; padding: 15px 0; color: var(--text-main); width: 100%; font-size: 16px; }

        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-pill { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); font-size: 12px; font-weight: 600; color: var(--text-muted); background: var(--surface-color); }
        .filter-pill.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        .stat-number { font-size: 22px; font-weight: 700; color: var(--text-main); }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        .icon-btn { background: transparent; border: none; color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-primary { background: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: 600; padding: 10px 20px; cursor: pointer; font-family: inherit; }
        
        .ios-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .ios-modal.active { display: flex; }
        .ios-modal-content { background: var(--surface-color); border-radius: 20px; width: 100%; max-width: 450px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .ios-modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body class="dark-mode">

    <script>
        /* --- STATE & DATA --- */
        let notes = JSON.parse(localStorage.getItem('chimptopus_v2_notes')) || [];
        let archive = JSON.parse(localStorage.getItem('chimptopus_v2_archive')) || [];
        let globalCounter = parseInt(localStorage.getItem('chimptopus_v2_counter')) || 1;
        let currentPage = 'records';
        let editingNoteId = null;
        let swInterval, swSeconds = 0, swRunning = false;
        let searchFilter = 'all';

        /* --- FIREBASE PLACEHOLDER (Use your own config) --- */
        const firebaseConfig = { apiKey: "...", databaseURL: "https://gergininekler11-default-rtdb.firebaseio.com" };
        // firebase.initializeApp(firebaseConfig); 

        /* --- HELPERS --- */
        function getNextAvailableNum() {
            const all = [...notes, ...archive];
            const used = all.map(n => parseInt(n.num));
            let next = 1;
            while (used.includes(next)) next++;
            return String(next).padStart(3, '0');
        }

        function saveToLocal() {
            localStorage.setItem('chimptopus_v2_notes', JSON.stringify(notes));
            localStorage.setItem('chimptopus_v2_archive', JSON.stringify(archive));
            localStorage.setItem('chimptopus_v2_counter', globalCounter);
        }

        /* --- CORE ACTIONS: THE FIX (Nükleer Temizlik) --- */
        function resetEditorUI() {
            editingNoteId = null;
            document.getElementById('noteInput').value = '';
            document.getElementById('metaTitle').value = '';
            document.getElementById('refInput').value = '';
            document.getElementById('questionsContainer').innerHTML = '';
            document.getElementById('refCardsContainer').innerHTML = '';
            document.getElementById('backlinkCardsContainer').innerHTML = '';
            document.getElementById('backlinkContainer').style.display = 'none';
            swSeconds = 0;
            document.getElementById('swDisplay').innerText = '00:00';
            if (swRunning) toggleStopwatch();
            updateWordProgress();
            
            // Temporary memory clear
            localStorage.removeItem('chimptopus_v2_draft_temp');
        }

        function handleAction(type) {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return alert('Empty note!');

            const num = editingNoteId ? (notes.find(n => n.id === editingNoteId)?.num || archive.find(n => n.id === editingNoteId)?.num) : getNextAvailableNum();
            const tags = [...new Set((text.match(/#(\w+)/g) || []))];
            const manualRefs = document.getElementById('refInput').value.match(/\d+/g) || [];
            const inlineRefs = (text.match(/@(\d+)/g) || []).map(r => r.replace('@',''));
            const refs = [...new Set([...manualRefs, ...inlineRefs])];
            const questions = Array.from(document.querySelectorAll('#questionsContainer .q-row')).map(r => {
                const cb = r.querySelector('input').checked;
                const txt = r.querySelector('input[type="text"]').value;
                return (cb ? '[x] ' : '[ ] ') + txt;
            });

            const noteObj = {
                id: editingNoteId || Date.now(),
                num, text, tags, refs, questions,
                title: document.getElementById('metaTitle').value,
                spentSeconds: swSeconds,
                date: new Date().toLocaleDateString(),
                type: currentPage === 'revize' ? 'revize' : 'taslak'
            };

            if (type === 'save') {
                notes.unshift(noteObj);
                globalCounter++;
                saveToLocal();
                resetEditorUI(); // KUSURSUZ SIFIRLAMA
                navSwitchPage('records');
            } else if (type === 'update') {
                const idx = notes.findIndex(n => n.id === editingNoteId);
                if (idx > -1) notes[idx] = noteObj;
                saveToLocal();
                resetEditorUI();
                navSwitchPage('records');
            } else if (type === 'archive') {
                notes = notes.filter(n => n.id !== editingNoteId);
                noteObj.type = 'archive';
                archive.unshift(noteObj);
                saveToLocal();
                resetEditorUI();
                navSwitchPage('archive');
            }
        }

        /* --- GLOBAL SEARCH --- */
        function openSearchView() { document.getElementById('searchOverlay').style.display = 'flex'; document.getElementById('globalSearchInput').focus(); }
        function closeSearchView() { document.getElementById('searchOverlay').style.display = 'none'; }
        function setSearchFilter(f) { 
            searchFilter = f; 
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            renderSearchResults(); 
        }

        function renderSearchResults() {
            const query = document.getElementById('globalSearchInput').value.toLowerCase();
            const list = document.getElementById('searchResultList');
            list.innerHTML = '';
            
            let all = [...notes, ...archive];
            if (searchFilter !== 'all') all = all.filter(n => n.type === searchFilter);
            
            const filtered = all.filter(n => n.text.toLowerCase().includes(query) || (n.title && n.title.toLowerCase().includes(query)) || n.num.includes(query));
            
            filtered.forEach(n => {
                const card = document.createElement('div');
                card.className = 'card note-card';
                card.style.borderColor = n.type === 'taslak' ? 'var(--color-taslak)' : (n.type === 'revize' ? 'var(--color-revize)' : 'var(--color-archive)');
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; margin-bottom:5px;">
                        <span>#${n.num}</span><span style="text-transform:uppercase">${n.type}</span>
                    </div>
                    <div style="font-weight:700; font-size:14px; margin-bottom:4px;">${n.title || 'Untitled'}</div>
                    <div style="font-size:12px; color:var(--text-muted); display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${n.text}</div>
                `;
                card.onclick = () => { closeSearchView(); n.type === 'archive' ? openArchiveModal(n.id) : openRecordModal(n.id); };
                list.appendChild(card);
            });
        }

        /* --- MODALS WITH CONNECTIONS --- */
        function renderConnectionsInModal(note) {
            const container = document.getElementById('modalLinksContainer');
            const list = document.getElementById('modalLinksList');
            list.innerHTML = '';
            
            const all = [...notes, ...archive];
            const connections = all.filter(n => n.id !== note.id && (n.refs.includes(note.num) || (note.refs && note.refs.includes(n.num))));
            
            if (connections.length > 0) {
                container.style.display = 'flex';
                connections.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'ref-item-text';
                    item.style.padding = '8px';
                    item.style.background = 'var(--surface-alt)';
                    item.style.borderRadius = '6px';
                    item.style.fontSize = '12px';
                    item.innerHTML = `<b>#${c.num}</b>: ${c.title || c.text.substring(0,30) + '...'}`;
                    item.onclick = () => { closeUniversalModal(); c.type === 'archive' ? openArchiveModal(c.id) : openRecordModal(c.id); };
                    list.appendChild(item);
                });
            } else {
                container.style.display = 'none';
            }
        }

        function openRecordModal(id) {
            const n = notes.find(x => x.id === id); if(!n) return;
            document.getElementById('modalTitle').innerText = (n.type === 'taslak' ? 'Draft' : 'Revise') + ' #' + n.num;
            document.getElementById('modalDate').innerText = n.date;
            document.getElementById('modalBody').innerHTML = formatText(n.text);
            renderConnectionsInModal(n);
            document.getElementById('modalFooter').innerHTML = `
                <button class="icon-btn" style="color:var(--danger-color)" onclick="deleteNote(${n.id})"><span class="material-symbols-rounded">delete</span></button>
                <button class="btn-primary" onclick="editNote(${n.id})">Edit Note</button>
            `;
            document.getElementById('universalModal').classList.add('active');
        }

        function openArchiveModal(id) {
            const n = archive.find(x => x.id === id); if(!n) return;
            document.getElementById('modalTitle').innerText = 'Archived #' + n.num;
            document.getElementById('modalDate').innerText = n.date;
            document.getElementById('modalBody').innerHTML = (n.title ? `<h3>${n.title}</h3>` : '') + formatText(n.text);
            renderConnectionsInModal(n); // ARŞİVDE BAĞLANTILARI GÖRME ÖZELLİĞİ
            document.getElementById('modalFooter').innerHTML = `
                <button class="icon-btn" style="color:var(--danger-color)" onclick="deleteArchive(${n.id})"><span class="material-symbols-rounded">delete</span></button>
                <button class="btn-primary" style="background:var(--color-revize)" onclick="restoreToRevize(${n.id})">Restore to Revise</button>
            `;
            document.getElementById('universalModal').classList.add('active');
        }

        function closeUniversalModal() { document.getElementById('universalModal').classList.remove('active'); }

        /* --- UI & NAVIGATION --- */
        function navSwitchPage(p) {
            currentPage = p;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-'+p).classList.add('active');
            document.querySelectorAll('.page-container').forEach(pc => pc.classList.remove('active'));
            
            if (p === 'records') { renderRecords(); document.getElementById('pageRecords').classList.add('active'); }
            else if (p === 'archive') { renderArchive(); document.getElementById('pageArchive').classList.add('active'); }
            else { 
                document.getElementById('pageEditor').classList.add('active');
                setupEditorForStage(p);
            }
        }

        function setupEditorForStage(stage) {
            const badge = document.getElementById('stageBadge');
            const label = document.getElementById('boxLabel');
            const analysis = document.getElementById('analysisIsland');
            
            badge.style.background = stage === 'taslak' ? 'var(--color-taslak)' : 'var(--color-revize)';
            label.innerText = stage === 'taslak' ? 'Draft Mode' : 'Revise Mode';
            analysis.style.display = stage === 'taslak' ? 'none' : 'flex';
            
            document.getElementById('currentNoteIdDisplay').innerText = '#' + (editingNoteId ? (notes.find(n=>n.id===editingNoteId)?.num || '...') : getNextAvailableNum());
            
            const actionContainer = document.getElementById('editorActions');
            if (editingNoteId) {
                actionContainer.innerHTML = `<button class="btn-primary" onclick="handleAction('update')">Update</button> ${stage === 'revize' ? `<button class="btn-primary" style="background:var(--color-archive)" onclick="handleAction('archive')">Archive</button>` : ''}`;
            } else {
                actionContainer.innerHTML = `<button class="btn-primary" onclick="handleAction('save')">Save ${stage === 'taslak' ? 'Draft' : 'Revise'}</button>`;
            }
        }

        function editNote(id) {
            const n = notes.find(x => x.id === id); if(!n) return;
            editingNoteId = id;
            closeUniversalModal();
            navSwitchPage(n.type);
            document.getElementById('noteInput').value = n.text;
            document.getElementById('metaTitle').value = n.title || '';
            document.getElementById('refInput').value = n.refs.join(', ');
            document.getElementById('questionsContainer').innerHTML = '';
            (n.questions || []).forEach(q => addQuestionInput(q));
            swSeconds = n.spentSeconds || 0;
            document.getElementById('swDisplay').innerText = formatTime(swSeconds);
            searchReference();
            updateWordProgress();
        }

        function addQuestionInput(val = '') {
            const container = document.getElementById('questionsContainer');
            const row = document.createElement('div');
            row.className = 'q-row';
            row.style.display = 'flex'; row.style.gap = '8px'; row.style.alignItems = 'center';
            
            const isChecked = val.startsWith('[x] ');
            const textVal = isChecked ? val.substring(4) : (val.startsWith('[ ] ') ? val.substring(4) : val);

            row.innerHTML = `
                <input type="checkbox" ${isChecked ? 'checked' : ''}>
                <input type="text" class="meta-input" style="padding:8px" value="${textVal}" placeholder="Key question...">
                <span class="material-symbols-rounded" style="color:var(--danger-color); cursor:pointer" onclick="this.parentElement.remove()">remove_circle</span>
            `;
            container.appendChild(row);
        }

        /* --- LOGIC UTILS --- */
        function toggleStopwatch() {
            const btn = document.getElementById('swToggleBtn');
            const icon = document.getElementById('swToggleIcon');
            if (swRunning) { clearInterval(swInterval); swRunning = false; icon.innerText = 'play_arrow'; btn.classList.remove('sw-running'); }
            else { swInterval = setInterval(() => { swSeconds++; document.getElementById('swDisplay').innerText = formatTime(swSeconds); }, 1000); swRunning = true; icon.innerText = 'pause'; btn.classList.add('sw-running'); }
        }
        function formatTime(s) { const m = Math.floor(s/60).toString().padStart(2,'0'); const sec = (s%60).toString().padStart(2,'0'); return `${m}:${sec}`; }

        function formatText(t) {
            return t.replace(/#(\w+)/g, '<span class="tag-link">#$1</span>')
                    .replace(/@(\d+)/g, '<span class="mention-link">@$1</span>')
                    .replace(/==([^=]+)==/g, '<mark style="background:rgba(48,209,88,0.3); color:#30d158; border-radius:4px; padding:0 4px;">$1</mark>');
        }

        function updateWordProgress() {
            const val = document.getElementById('noteInput').value.trim();
            const words = val ? val.split(/\s+/).length : 0;
            const level = Math.floor(words / 50) + 1;
            const progress = (words % 50) / 50 * 100;
            document.getElementById('wordLevel').innerText = 'Level ' + level;
            document.getElementById('wordCountUI').innerText = (words % 50) + ' / 50';
            document.getElementById('wordProgress').style.width = progress + '%';
        }

        function renderRecords() {
            const board = document.getElementById('recordsBoard');
            board.innerHTML = '';
            notes.filter(n => n.type === 'taslak').forEach(n => {
                const card = document.createElement('div');
                card.className = 'card note-card';
                card.style.borderColor = 'var(--color-taslak)';
                card.innerHTML = `<b>#${n.num}</b><div style="font-size:12px; margin-top:5px; overflow:hidden; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${n.text}</div>`;
                card.onclick = () => openRecordModal(n.id);
                board.appendChild(card);
            });
        }

        function renderArchive() {
            const board = document.getElementById('archiveBoard');
            board.innerHTML = '';
            archive.forEach(n => {
                const card = document.createElement('div');
                card.className = 'card note-card';
                card.style.borderColor = 'var(--color-archive)';
                card.innerHTML = `<b>#${n.num}</b><div style="font-size:12px; margin-top:5px; overflow:hidden; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${n.text}</div>`;
                card.onclick = () => openArchiveModal(n.id);
                board.appendChild(card);
            });
        }

        function searchReference() {
            const val = document.getElementById('refInput').value;
            const container = document.getElementById('refCardsContainer');
            container.innerHTML = '';
            const ids = (val.match(/\d+/g) || []).map(id => id.padStart(3,'0'));
            const all = [...notes, ...archive];
            ids.forEach(id => {
                const found = all.find(n => n.num === id);
                if (found) {
                    const item = document.createElement('div');
                    item.className = 'card'; item.style.padding = '10px'; item.style.fontSize = '12px';
                    item.innerHTML = `<b>#${found.num}</b>: ${found.text.substring(0,40)}...`;
                    container.appendChild(item);
                }
            });
        }

        /* --- THEME & INIT --- */
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function handleInput() { updateWordProgress(); }
        function insertHeadingTemplate() { const ta = document.getElementById('noteInput'); ta.value += '\n# '; ta.focus(); }
        function insert5N1KTemplate() { document.getElementById('noteInput').value += '\nKİM: \nNE: \nNEREDE: \nNE ZAMAN: \nNASIL: \nNEDEN: '; }
        function insertTimeTemplate() { const now = new Date(); document.getElementById('noteInput').value += ` [${now.getHours()}:${now.getMinutes()}] `; }

        window.onload = () => { navSwitchPage('records'); };

    </script>
</body>
</html>
