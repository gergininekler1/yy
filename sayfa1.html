<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Notes</title>
    <style>
        /* Renk Paleti ve Değişkenler */
        :root {
            --bg-color: #17100D; /* Ağır ciddi koyu kahve */
            --card-bg: #241A14;  /* Biraz daha açık kahve tonu */
            --text-cream: #D6C5B3; /* Koyu krem */
            --accent-gold: #B8860B; /* Koyu altın sarısı */
            --faint-red: rgba(200, 50, 50, 0.4); /* Solgun kırmızı */
            --green-tick: #4CAF50;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Consolas', 'Courier New', monospace; /* Terminal/Analog hissiyat */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-cream);
            padding: 20px 15px;
            overflow-x: hidden;
        }

        /* Üst Bilgi ve İlerleme Çizgisi */
        .progress-line {
            height: 3px;
            background-color: var(--faint-red);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(214, 197, 179, 0.1);
        }

        .header-title {
            font-size: 1.2rem;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .header-meta {
            font-size: 0.75rem;
            text-align: right;
            opacity: 0.8;
        }

        /* Butonlar */
        button {
            background-color: transparent;
            color: var(--text-cream);
            border: 1px solid var(--text-cream);
            padding: 8px 12px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        button:active {
            background-color: var(--text-cream);
            color: var(--bg-color);
        }

        button.gold-btn {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        button.gold-btn:active {
            background-color: var(--accent-gold);
            color: var(--bg-color);
        }

        /* Not Ekleme Alanı */
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section textarea {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid rgba(214, 197, 179, 0.2);
            color: var(--text-cream);
            padding: 12px;
            border-radius: var(--border-radius);
            min-height: 80px;
            margin-bottom: 10px;
            resize: none;
        }
        
        .input-section textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
        }

        /* Netflix Tarzı Yatay Kaydırma (Kart Sistemi) */
        .section-title {
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid var(--accent-gold);
            padding-left: 8px;
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 15px;
            margin-bottom: 25px;
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        .horizontal-scroll::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }

        /* Kart Tasarımları (Aşamalara Göre Farklılaşmış) */
        .card {
            min-width: 220px;
            max-width: 220px;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(214, 197, 179, 0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-content {
            font-size: 0.85rem;
            margin-bottom: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .card-date {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-bottom: 8px;
        }

        /* Taslak Kartı */
        .card.draft { border-left: 2px solid rgba(214, 197, 179, 0.3); }
        
        /* Revize Kartı */
        .card.revise { border-left: 2px solid #5a8bb0; }
        
        /* Final Kartı */
        .card.final { 
            border: 1px solid var(--accent-gold);
            background: linear-gradient(145deg, var(--card-bg), #1a140f);
        }

        /* Geçmiş Kartı */
        .card.history {
            opacity: 0.7;
            border: 1px dashed rgba(214, 197, 179, 0.2);
        }

        .green-tick {
            color: var(--green-tick);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Modal (Revize ve Künye için) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(23, 16, 13, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid var(--accent-gold);
        }

        .modal-content textarea {
            width: 100%;
            height: 200px;
            background-color: var(--bg-color);
            color: var(--text-cream);
            border: 1px solid rgba(214, 197, 179, 0.2);
            padding: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            resize: none;
        }

    </style>
</head>
<body>

    <div class="progress-line"></div>

    <div class="header">
        <div class="header-title">TERMINAL_NOTES</div>
        <div class="header-meta">
            <div>Kritik Görev: <span id="critical-counter">0</span></div>
            <div style="font-size: 0.6rem; color: #888;">Otomatik Yedekleme: Açık</div>
            <button onclick="openProfile()" style="padding: 2px 5px; margin-top: 5px; font-size: 0.6rem;">[Künye]</button>
        </div>
    </div>

    <div class="input-section">
        <textarea id="new-note-text" placeholder="> Yeni bir fikir yaz..."></textarea>
        <div class="action-buttons">
            <button onclick="addNote('draft')">Taslak Ekle</button>
            <button onclick="addNote('atomic')" class="gold-btn">Atomik Not Ekle</button>
        </div>
    </div>

    <div class="section-title">1. Taslaklar (Ham Fikirler)</div>
    <div class="horizontal-scroll" id="drafts-container"></div>

    <div class="section-title">2. Revize (Geliştirme Masası)</div>
    <div class="horizontal-scroll" id="revise-container"></div>

    <div class="section-title">3. Final (Tamamlanmaya Hazır)</div>
    <div class="horizontal-scroll" id="finals-container"></div>

    <div class="section-title">Geçmiş (Tamamlananlar)</div>
    <div class="horizontal-scroll" id="history-container"></div>


    <div class="modal-overlay" id="revise-modal">
        <div class="modal-content">
            <h3 style="color: var(--accent-gold);">[REVİZE MODU]</h3>
            <p style="font-size: 0.7rem; opacity: 0.7; margin-top: 5px;">Notu burada detaylandır ve düzenle.</p>
            <textarea id="revise-text"></textarea>
            <input type="hidden" id="revise-id">
            <div class="action-buttons">
                <button onclick="closeModal()">İptal</button>
                <button onclick="saveRevise()" class="gold-btn">Final'e Aktar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profile-modal">
        <div class="modal-content">
            <h3 style="color: var(--accent-gold);">[KÜNYE - AKTİF GÖREV TARİHLERİ]</h3>
            <div id="profile-dates" style="margin: 20px 0; font-size: 0.85rem; line-height: 1.8;">
                </div>
            <button onclick="closeProfile()" style="width: 100%">Kapat</button>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('terminal_notes')) || [];

        function saveNotes() {
            localStorage.setItem('terminal_notes', JSON.stringify(notes));
            renderAll();
        }

        function addNote(type) {
            const textInput = document.getElementById('new-note-text');
            const text = textInput.value.trim();
            if (!text) return;

            const note = {
                id: Date.now(),
                text: type === 'atomic' ? `[ATOMİK] ${text}` : text,
                stage: 'draft',
                date: new Date().toLocaleDateString('tr-TR')
            };

            notes.push(note);
            textInput.value = '';
            saveNotes();
        }

        function changeStage(id, newStage) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.stage = newStage;
                saveNotes();
            }
        }

        function openReviseModal(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                document.getElementById('revise-text').value = note.text;
                document.getElementById('revise-id').value = note.id;
                document.getElementById('revise-modal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('revise-modal').style.display = 'none';
        }

        function saveRevise() {
            const id = parseInt(document.getElementById('revise-id').value);
            const newText = document.getElementById('revise-text').value;
            const note = notes.find(n => n.id === id);
            
            if (note) {
                note.text = newText;
                note.stage = 'final';
                closeModal();
                saveNotes();
            }
        }

        function openProfile() {
            const activeNotes = notes.filter(n => n.stage !== 'history');
            const datesDiv = document.getElementById('profile-dates');
            
            if(activeNotes.length === 0) {
                datesDiv.innerHTML = "Aktif görev tarihi bulunmuyor.";
            } else {
                // Sadece tarihleri göster
                datesDiv.innerHTML = activeNotes.map(n => `> ${n.date}`).join('<br>');
            }
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        function renderAll() {
            const draftsContainer = document.getElementById('drafts-container');
            const reviseContainer = document.getElementById('revise-container');
            const finalsContainer = document.getElementById('finals-container');
            const historyContainer = document.getElementById('history-container');

            draftsContainer.innerHTML = '';
            reviseContainer.innerHTML = '';
            finalsContainer.innerHTML = '';
            historyContainer.innerHTML = '';

            let criticalCount = 0;

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = `card ${note.stage}`;
                
                let buttonsHtml = '';
                let statusHtml = '';

                if (note.stage === 'draft') {
                    criticalCount++;
                    buttonsHtml = `<button onclick="changeStage(${note.id}, 'revise')">Revizeye Gönder ➔</button>`;
                } 
                else if (note.stage === 'revise') {
                    criticalCount++;
                    buttonsHtml = `<button class="gold-btn" onclick="openReviseModal(${note.id})">[DÜZENLE]</button>`;
                } 
                else if (note.stage === 'final') {
                    criticalCount++;
                    buttonsHtml = `<button onclick="changeStage(${note.id}, 'history')">Tamamla ✓</button>`;
                } 
                else if (note.stage === 'history') {
                    statusHtml = `<div class="green-tick">✅ Tamamlandı</div>`;
                }

                card.innerHTML = `
                    <div>
                        <div class="card-date">${note.date}</div>
                        <div class="card-content">${note.text.substring(0, 100)}${note.text.length > 100 ? '...' : ''}</div>
                    </div>
                    <div>
                        ${statusHtml}
                        ${buttonsHtml}
                    </div>
                `;

                if (note.stage === 'draft') draftsContainer.appendChild(card);
                if (note.stage === 'revise') reviseContainer.appendChild(card);
                if (note.stage === 'final') finalsContainer.appendChild(card);
                if (note.stage === 'history') historyContainer.appendChild(card);
            });

            document.getElementById('critical-counter').innerText = criticalCount;

            // Boş durum mesajları
            if(draftsContainer.innerHTML === '') draftsContainer.innerHTML = '<div style="opacity:0.3; padding: 20px;">[BOŞ]</div>';
            if(reviseContainer.innerHTML === '') reviseContainer.innerHTML = '<div style="opacity:0.3; padding: 20px;">[BOŞ]</div>';
            if(finalsContainer.innerHTML === '') finalsContainer.innerHTML = '<div style="opacity:0.3; padding: 20px;">[BOŞ]</div>';
            if(historyContainer.innerHTML === '') historyContainer.innerHTML = '<div style="opacity:0.3; padding: 20px;">[BOŞ]</div>';
        }

        // İlk yükleme
        renderAll();
    </script>
</body>
</html>
