<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Netflix Notlar - Pro Edition</title>
<style>
  :root {
    --bg: #000000;
    --surface: #141414;
    --surface-light: #2b2b2b;
    --text: #ffffff;
    --text-muted: #808080;
    --netflix-red: #E50914;
    --success: #2ecc71;
    --border: #333333;
    --radius: 6px;
    --safe-bottom: env(safe-area-inset-bottom, 15px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-top: 60px; padding-bottom: calc(70px + var(--safe-bottom)); }

  /* HEADER */
  header { position: fixed; top: 0; left: 0; right: 0; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--netflix-red); }
  .delete-all-btn { background: rgba(229, 9, 20, 0.1); color: var(--netflix-red); border: 1px solid rgba(229, 9, 20, 0.3); padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .delete-all-btn:active { transform: scale(0.95); background: var(--netflix-red); color: white; }

  /* TABS (Single Line Compact) */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(20,20,20,0.95); backdrop-filter: blur(15px); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; color: var(--text-muted); font-size: 10px; font-weight: bold; letter-spacing: 0.5px; cursor: pointer; transition: 0.3s; border-top: 2px solid transparent; }
  .nav-item.active { color: white; border-top-color: var(--netflix-red); background: linear-gradient(to bottom, rgba(229,9,20,0.1), transparent); }

  /* SECTIONS */
  .section { display: none; padding: 15px; animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
  .section.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  /* SMART INPUT AREA */
  .input-container { background: var(--surface-light); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; overflow: hidden; }
  .input-container.expanded { border-color: var(--netflix-red); box-shadow: 0 4px 20px rgba(229, 9, 20, 0.15); }
  
  .input-main-row { display: flex; align-items: flex-start; padding: 12px; gap: 10px; }
  .smart-input { flex: 1; background: transparent; border: none; color: white; font-size: 14px; resize: none; height: 24px; outline: none; transition: height 0.3s; line-height: 1.4; }
  .input-container.expanded .smart-input { height: 120px; }
  
  /* Right Side Tools */
  .quick-tools { display: flex; flex-direction: column; gap: 8px; transition: 0.3s; opacity: 0; pointer-events: none; width: 0; }
  .input-container.expanded .quick-tools { opacity: 1; pointer-events: all; width: 36px; }
  .q-btn { width: 32px; height: 32px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
  .q-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }

  /* Expanded Extras (Challenge & Reference) */
  .input-extras { padding: 0 12px; max-height: 0; opacity: 0; transition: all 0.3s; overflow: hidden; }
  .input-container.expanded .input-extras { max-height: 150px; opacity: 1; padding-bottom: 12px; }
  
  .ref-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px dashed var(--border); color: var(--text-muted); font-size: 11px; padding: 8px; border-radius: 4px; margin-bottom: 10px; resize: none; height: 40px; outline: none; }
  
  .challenge-bar { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; }
  .c-lbl { font-size: 10px; color: var(--text-muted); margin-right: 5px; }
  .c-opt { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; padding: 6px 0; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; }
  .c-opt.active { background: rgba(229, 9, 20, 0.1); border-color: var(--netflix-red); color: var(--netflix-red); }
  
  .save-btn { width: 100%; background: var(--netflix-red); color: white; border: none; padding: 10px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; }

  /* SQUARE CARDS (Netflix Style) */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card { aspect-ratio: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; position: relative; cursor: pointer; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--border); }
  .card.stage-taslak::before { background: var(--netflix-red); }
  .card.stage-revize::before { background: #3498db; }
  .card.stage-final::before { background: var(--success); }
  
  .c-timer { position: absolute; top: 8px; right: 8px; background: rgba(229,9,20,0.15); color: var(--netflix-red); font-size: 9px; padding: 3px 6px; border-radius: 3px; font-weight: bold; letter-spacing: 0.5px; border: 1px solid rgba(229,9,20,0.3); }
  .c-timer.expired { color: var(--text-muted); background: transparent; border-color: var(--border); }
  
  .c-text { flex: 1; font-size: 12px; line-height: 1.5; color: #ddd; margin-top: 8px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; word-break: break-word; }
  .c-action { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; font-size: 10px; font-weight: bold; padding: 7px; border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
  
  .card.completed { opacity: 0.5; border-color: var(--success); }
  .card.completed .c-text { text-decoration: line-through; }

  /* ARCHIVE (Redesigned) */
  .arch-stats { display: flex; justify-content: space-between; background: var(--surface-light); padding: 15px; border-radius: var(--radius); margin-bottom: 15px; border: 1px solid var(--border); }
  .a-stat { text-align: center; }
  .a-val { font-size: 18px; font-weight: bold; color: var(--netflix-red); }
  .a-lbl { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; }
  
  .arch-list { display: flex; flex-direction: column; gap: 10px; }
  .arch-item { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--border); }
  .arch-info { flex: 1; overflow: hidden; }
  .arch-date { font-size: 9px; color: var(--text-muted); margin-bottom: 4px; }
  .arch-text { font-size: 12px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .restore-btn { background: transparent; border: 1px solid var(--border); color: white; font-size: 10px; padding: 5px 10px; border-radius: 4px; margin-left: 10px; cursor: pointer; }

  /* CALENDAR (Compact & Functional) */
  .cal-wrapper { background: var(--surface-light); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; }
  .cal-head { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 15px; color: white; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-day-name { text-align: center; font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-weight: bold; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 12px; background: var(--surface); border-radius: 4px; position: relative; border: 1px solid transparent; }
  .cal-day.today { border-color: var(--netflix-red); color: var(--netflix-red); font-weight: bold; }
  .cal-day.has-data::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--success); border-radius: 50%; }

  /* EDIT MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(5px); }
  .modal-overlay.open { display: flex; }
  .modal-content { background: var(--surface-light); width: 100%; border-radius: 12px 12px 0 0; padding: 20px; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-top: 1px solid var(--border); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .modal-title { font-size: 14px; font-weight: bold; letter-spacing: 1px; }
  .close-modal { background: transparent; border: none; color: var(--text-muted); font-size: 20px; }
  
  .modal-ref { background: var(--surface); padding: 10px; font-size: 11px; color: var(--text-muted); border-left: 2px solid var(--border); margin-bottom: 15px; font-style: italic; border-radius: 0 4px 4px 0; }
  .modal-textarea { width: 100%; height: 150px; background: var(--surface); color: white; border: 1px solid var(--border); padding: 12px; border-radius: 4px; resize: none; outline: none; margin-bottom: 15px; font-size: 14px; }
  
  .modal-actions { display: flex; gap: 10px; }
  .m-btn { flex: 1; padding: 12px; border-radius: 4px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
  .btn-save { background: var(--surface); color: white; border: 1px solid var(--border); }
  .btn-forward { background: var(--netflix-red); color: white; }
</style>
</head>
<body>

  <header>
    <div class="logo">N. TASLAK</div>
    <button class="delete-all-btn" onclick="clearDay()">TÜMÜNÜ SİL</button>
  </header>

  <div id="sec-taslak" class="section active">
    <div class="input-container" id="draftBox">
      <div class="input-main-row">
        <textarea id="mainDraft" class="smart-input" placeholder="Günün notunu veya aklındakileri dök..."></textarea>
        <div class="quick-tools">
          <button class="q-btn" onclick="copyDraft()" title="Tümünü Kopyala">📋</button>
          <button class="q-btn" onclick="addTime()" title="Saat Ekle">🕒</button>
        </div>
      </div>
      
      <div class="input-extras">
        <textarea id="refDraft" class="ref-input" placeholder="Alıntı veya referans linki..."></textarea>
        <div class="challenge-bar">
          <span class="c-lbl">Challenge:</span>
          <div class="c-opt active" onclick="setTimer(0, this)">Yok</div>
          <div class="c-opt" onclick="setTimer(5, this)">5 dk</div>
          <div class="c-opt" onclick="setTimer(10, this)">10 dk</div>
          <div class="c-opt" onclick="setTimer(15, this)">15 dk</div>
        </div>
        <button class="save-btn" onclick="saveNewDraft()">TASLAĞI KAYDET</button>
      </div>
    </div>

    <div class="grid" id="grid-taslak"></div>
  </div>

  <div id="sec-revize" class="section">
    <div class="grid" id="grid-revize"></div>
  </div>

  <div id="sec-final" class="section">
    <div class="grid" id="grid-final"></div>
  </div>

  <div id="sec-arsiv" class="section">
    <div class="arch-stats">
      <div class="a-stat"><div class="a-val" id="stat-total">0</div><div class="a-lbl">TOPLAM</div></div>
      <div class="a-stat"><div class="a-val" id="stat-done" style="color:var(--success)">0</div><div class="a-lbl">TAMAMLANAN</div></div>
      <div class="a-stat"><div class="a-val" id="stat-revs" style="color:#3498db">0</div><div class="a-lbl">REVİZYON</div></div>
    </div>
    <div class="arch-list" id="list-arsiv"></div>
  </div>

  <div id="sec-takvim" class="section">
    <div class="cal-wrapper">
      <div class="cal-head"><span id="calMonthStr"></span></div>
      <div class="cal-grid">
        <div class="cal-day-name">Pt</div><div class="cal-day-name">Sa</div><div class="cal-day-name">Ça</div>
        <div class="cal-day-name">Pe</div><div class="cal-day-name">Cu</div><div class="cal-day-name">Ct</div><div class="cal-day-name">Pz</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('taslak')">TASLAK</div>
    <div class="nav-item" onclick="switchTab('revize')">REVİZE</div>
    <div class="nav-item" onclick="switchTab('final')">FİNAL</div>
    <div class="nav-item" onclick="switchTab('arsiv')">ARŞİV</div>
    <div class="nav-item" onclick="switchTab('takvim')">TAKVİM</div>
  </nav>

  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <div class="modal-head">
        <span class="modal-title" id="mTitle">Düzenle</span>
        <button class="close-modal" onclick="closeModal()">✕</button>
      </div>
      <div id="mRef" class="modal-ref"></div>
      <textarea id="mText" class="modal-textarea"></textarea>
      <div class="modal-actions">
        <button class="m-btn btn-save" onclick="saveModal()">Kaydet</button>
        <button id="mActionBtn" class="m-btn btn-forward"></button>
      </div>
    </div>
  </div>

<script>
  // VERİ YÖNETİMİ
  let notes = JSON.parse(localStorage.getItem('n_pro_notes')) || [];
  let timerSelection = 0;
  let activeTimers = {};
  let currentEditId = null;

  // AKILLI INPUT (Aynı sayfada büyüme)
  const draftBox = document.getElementById('draftBox');
  const mainDraft = document.getElementById('mainDraft');

  mainDraft.addEventListener('focus', () => draftBox.classList.add('expanded'));
  
  // Ekranda boş bir yere tıklanırsa input'u küçült (eğer içi boşsa)
  document.addEventListener('click', (e) => {
    if (!draftBox.contains(e.target) && mainDraft.value.trim() === '' && document.getElementById('refDraft').value.trim() === '') {
      draftBox.classList.remove('expanded');
    }
  });

  // PRATİK BUTONLAR
  function copyDraft() {
    navigator.clipboard.writeText(mainDraft.value).then(() => {
      alert("Tümü Kopyalandı!");
    });
  }

  function addTime() {
    const now = new Date();
    const tStr = `[${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}] `;
    mainDraft.value = mainDraft.value ? mainDraft.value + '\n' + tStr : tStr;
    mainDraft.focus();
  }

  function setTimer(mins, el) {
    timerSelection = mins;
    document.querySelectorAll('.c-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
  }

  // SEKME DEĞİŞTİRME
  function switchTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`sec-${tab}`).classList.add('active');
    event.currentTarget.classList.add('active');
    renderUI();
  }

  // NOT EKLEME VE İŞLEMLER
  function saveNewDraft() {
    const text = mainDraft.value.trim();
    if (!text) return;

    const newNote = {
      id: Date.now(),
      text: text,
      ref: document.getElementById('refDraft').value.trim(),
      stage: 'taslak',
      completed: false,
      revisions: 0,
      date: new Date().toLocaleDateString('tr-TR'),
      deadline: timerSelection > 0 ? Date.now() + (timerSelection * 60000) : null
    };

    notes.unshift(newNote);
    mainDraft.value = '';
    document.getElementById('refDraft').value = '';
    draftBox.classList.remove('expanded');
    setTimer(0, document.querySelector('.c-opt'));
    saveAndRender();
  }

  function moveStage(id, stage) {
    const n = notes.find(x => x.id === id);
    if(n) {
      if(stage === 'final' && n.stage === 'revize') n.revisions++;
      n.stage = stage;
      saveAndRender();
    }
  }

  function toggleComplete(id) {
    const n = notes.find(x => x.id === id);
    if(n) {
      n.completed = true;
      n.stage = 'arsiv'; // Tamamlanınca arşive düşsün
      saveAndRender();
    }
  }

  function restoreNote(id) {
    const n = notes.find(x => x.id === id);
    if(n) {
      n.stage = 'final';
      n.completed = false;
      saveAndRender();
    }
  }

  function clearDay() {
    if(confirm("Bugünün tüm kayıtlarını silmek istediğine emin misin? (Arşivdekiler hariç)")) {
      const today = new Date().toLocaleDateString('tr-TR');
      notes = notes.filter(n => n.date !== today || n.stage === 'arsiv');
      saveAndRender();
    }
  }

  // MODAL İŞLEMLERİ
  function openModal(id) {
    const n = notes.find(x => x.id === id);
    if(!n) return;
    currentEditId = id;

    document.getElementById('mTitle').innerText = n.stage.toUpperCase() + ' DÜZENLE';
    const mRef = document.getElementById('mRef');
    if(n.ref) { mRef.style.display = 'block'; mRef.innerText = n.ref; } else { mRef.style.display = 'none'; }
    
    document.getElementById('mText').value = n.text;
    
    const actionBtn = document.getElementById('mActionBtn');
    if(n.stage === 'taslak') {
      actionBtn.innerText = 'Revizeye Aktar ➡️';
      actionBtn.style.background = '#3498db';
      actionBtn.onclick = () => { saveModal(); moveStage(id, 'revize'); closeModal(); };
    } else if(n.stage === 'revize') {
      actionBtn.innerText = 'Finale Aktar ➡️';
      actionBtn.style.background = 'var(--success)';
      actionBtn.onclick = () => { saveModal(); moveStage(id, 'final'); closeModal(); };
    } else {
      actionBtn.style.display = 'none';
    }

    document.getElementById('editModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('open');
    currentEditId = null;
    document.getElementById('mActionBtn').style.display = 'block';
  }

  function saveModal() {
    const n = notes.find(x => x.id === currentEditId);
    if(n) {
      n.text = document.getElementById('mText').value;
      saveAndRender();
    }
  }

  // ARAYÜZ ÇİZİMİ (RENDER)
  function renderUI() {
    // 1. Gridleri Temizle
    const gTaslak = document.getElementById('grid-taslak');
    const gRevize = document.getElementById('grid-revize');
    const gFinal = document.getElementById('grid-final');
    const lArsiv = document.getElementById('list-arsiv');
    
    gTaslak.innerHTML = ''; gRevize.innerHTML = ''; gFinal.innerHTML = ''; lArsiv.innerHTML = '';

    let total = notes.length;
    let completedCount = 0;
    let revCount = 0;

    notes.forEach(n => {
      revCount += (n.revisions || 0);

      // ARŞİV LİSTESİ
      if(n.stage === 'arsiv') {
        completedCount++;
        lArsiv.innerHTML += `
          <div class="arch-item">
            <div class="arch-info">
              <div class="arch-date">${n.date} - Rev: ${n.revisions}</div>
              <div class="arch-text">${n.text}</div>
            </div>
            <button class="restore-btn" onclick="restoreNote(${n.id})">Geri Al</button>
          </div>
        `;
        return;
      }

      // KARTLAR (Taslak, Revize, Final)
      const card = document.createElement('div');
      card.className = `card stage-${n.stage}`;
      
      let tHtml = '';
      if(n.stage === 'taslak' && n.deadline) {
        tHtml = `<div class="c-timer" id="tmr-${n.id}">--:--</div>`;
        runTimer(n);
      }

      let btnTxt = n.stage === 'taslak' ? 'Revize ➡️' : (n.stage === 'revize' ? 'Final ➡️' : 'Tamamla ✓');
      let btnColor = n.stage === 'taslak' ? '#3498db' : (n.stage === 'revize' ? 'var(--success)' : 'var(--text-muted)');
      let clickEvt = n.stage === 'final' ? `toggleComplete(${n.id})` : `moveStage(${n.id}, '${n.stage === 'taslak' ? 'revize' : 'final'}')`;

      card.innerHTML = `
        ${tHtml}
        <div style="font-size:9px; color:var(--text-muted)">${n.date}</div>
        <div class="c-text" onclick="openModal(${n.id})">${n.text}</div>
        <div class="c-action" onclick="${clickEvt}">
          <span>İlerle</span>
          <span style="color:${btnColor}">${btnTxt}</span>
        </div>
      `;

      if(n.stage === 'taslak') gTaslak.appendChild(card);
      if(n.stage === 'revize') gRevize.appendChild(card);
      if(n.stage === 'final') gFinal.appendChild(card);
    });

    // İstatistik Güncelleme
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-done').innerText = completedCount;
    document.getElementById('stat-revs').innerText = revCount;

    renderCalendar();
  }

  // TIMER (Geri Sayım)
  function runTimer(n) {
    if(activeTimers[n.id]) clearInterval(activeTimers[n.id]);
    activeTimers[n.id] = setInterval(() => {
      const el = document.getElementById(`tmr-${n.id}`);
      if(!el) { clearInterval(activeTimers[n.id]); return; }
      
      const left = Math.max(0, n.deadline - Date.now());
      if(left === 0) {
        el.innerText = 'SÜRE BİTTİ';
        el.classList.add('expired');
        clearInterval(activeTimers[n.id]);
      } else {
        const m = Math.floor(left / 60000);
        const s = Math.floor((left % 60000) / 1000);
        el.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
      }
    }, 1000);
  }

  // İŞLEVSEL TAKVİM
  function renderCalendar() {
    const cg = document.getElementById('calGrid');
    cg.innerHTML = '';
    
    const now = new Date();
    document.getElementById('calMonthStr').innerText = now.toLocaleString('tr-TR', { month: 'long', year: 'numeric' }).toUpperCase();
    
    let firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
    let daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    let offset = firstDay === 0 ? 6 : firstDay - 1; 

    for(let i=0; i<offset; i++) cg.innerHTML += `<div></div>`;

    for(let d=1; d<=daysInMonth; d++) {
      const dStr = new Date(now.getFullYear(), now.getMonth(), d).toLocaleDateString('tr-TR');
      // O güne ait not var mı kontrol et
      const hasData = notes.some(x => x.date === dStr);
      const isToday = d === now.getDate();
      
      cg.innerHTML += `<div class="cal-day ${isToday ? 'today' : ''} ${hasData ? 'has-data' : ''}">${d}</div>`;
    }
  }

  function saveAndRender() {
    localStorage.setItem('n_pro_notes', JSON.stringify(notes));
    renderUI();
  }

  // BAŞLANGIÇ
  renderUI();
</script>
</body>
</html>
