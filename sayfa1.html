<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes - iOS Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #ffffff; 
            --surface-color: #ffffff;
            --surface-alt: #f7f7f5;
            --text-main: #37352f;
            --text-muted: #9b9a97;
            --border-color: #e9e9e7;
            --primary-blue: #2383e2;
            --danger-color: #eb5757;
            --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.05);
            --vibe-1: #e2a188;
            --vibe-2: #809682;
            --vibe-3: #75a2d6;
        }

        .dark-mode {
            --bg-color: #191919;
            --surface-color: #202020;
            --surface-alt: #252525;
            --text-main: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: #373737;
            --primary-blue: #2eaadc;
        }

        html, body { max-width: 100vw; overflow-x: hidden; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
            transition: background 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        * { box-sizing: border-box; }

        header { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;}

        .page-container { padding: 0 20px 140px; display: none; animation: fadeIn 0.2s ease; }
        .page-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Editör Bloğu */
        .note-box { padding: 20px; background: var(--surface-alt); border: 1px solid var(--border-color); border-radius: 14px;}
        textarea { 
            width: 100%; height: 220px; background-color: var(--surface-color); 
            border: 1px solid var(--border-color); border-radius: 10px;
            padding: 15px; font-size: 16px; line-height: 1.5; 
            outline: none; color: var(--text-main); resize: none; 
            font-family: inherit; box-shadow: var(--card-shadow);
        }

        /* Sabit Boyutlu Kart Tasarımı */
        .note-card { 
            width: 100%; 
            height: 180px; /* SABİT BOYUT */
            padding: 16px; 
            background: var(--surface-color); 
            border: 1px solid var(--border-color); 
            border-radius: 14px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            position: relative;
            transition: background 0.2s;
            cursor: pointer;
        }
        .note-card:active { background: var(--surface-alt); }
        
        .note-card p { 
            margin: 0; 
            font-size: 14px; 
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 5; /* Yazıyı 5 satırda keser */
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text-main);
        }

        .card-footer { 
            border-top: 1px solid var(--border-color); 
            padding-top: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* Grid Sistemi */
        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; 
        }

        /* Yan Menü */
        .side-panel { 
            position: fixed; top: 0; right: 0; transform: translateX(100%); 
            width: 100%; max-width: 300px; height: 100%; 
            z-index: 2000; padding: 40px 20px; 
            background: var(--surface-color); border-left: 1px solid var(--border-color);
            transition: transform 0.3s ease; 
        }
        .side-panel.active { transform: translateX(0); box-shadow: -5px 0 20px rgba(0,0,0,0.05); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; padding: 10px 0 calc(15px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .dark-mode .bottom-nav { background: rgba(25, 25, 25, 0.9); }
        
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-muted); cursor: pointer; flex: 1; text-align: center; transition: 0.2s;
        }
        .nav-item.active { color: var(--primary-blue); }
        .nav-item .icon { font-size: 24px; }
        .nav-item .label { font-size: 9px; font-weight: 600; text-transform: uppercase; }

        /* Yardımcılar */
        .btn-primary { background: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: 600; padding: 8px 16px; cursor: pointer; font-family: inherit;}
        .icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .search-bar { background: var(--surface-alt); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; margin-bottom: 20px;}
        .search-bar input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; font-family: inherit; color: var(--text-main);}
        .progress-bar-container { flex-grow: 1; height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; margin-left: 10px; }
        .progress-bar { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s; }
        .mood-dot { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .mood-dot.active { border-color: var(--text-main); transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="mainLogo">📝 Notes</div>
        <div style="display: flex; gap: 5px;">
            <button class="icon-btn" onclick="toggleDarkMode()"><span class="material-symbols-rounded">dark_mode</span></button>
            <button class="icon-btn" onclick="togglePanel('sideMenu')"><span class="material-symbols-rounded">settings</span></button>
        </div>
    </header>

    <div id="sideMenu" class="side-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-size: 20px; font-weight: 700;">Ayarlar</h2>
            <span class="material-symbols-rounded" onclick="closePanels()" style="cursor:pointer">close</span>
        </div>
        <button onclick="exportData()" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border-color); background:none; margin-bottom:10px; font-family:inherit;">JSON Yedek Al</button>
        <button onclick="clearAll()" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border-color); color:var(--danger-color); background:none; font-family:inherit;">Verileri Sıfırla</button>
    </div>

    <div id="pageEditor" class="page-container active">
        <div id="referenceBox" style="display: none; padding: 12px; background: var(--surface-alt); border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 15px;">
            <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">BAĞLANTILI BLOK</div>
            <div id="refContent" style="font-size: 13px; color: var(--text-muted); max-height: 60px; overflow: hidden;"></div>
        </div>

        <div class="note-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span id="boxLabel" style="font-weight: 700; font-size: 15px;">Taslak</span>
                <div style="display: flex; gap: 6px;">
                    <div class="mood-dot" style="background: var(--vibe-1);" onclick="setMood('var(--vibe-1)', this)"></div>
                    <div class="mood-dot" style="background: var(--vibe-2);" onclick="setMood('var(--vibe-2)', this)"></div>
                    <div class="mood-dot active" style="background: var(--vibe-3);" onclick="setMood('var(--vibe-3)', this)"></div>
                </div>
            </div>
            <textarea id="noteInput" placeholder="Yazmaya başlayın..." oninput="updateWordProgress()"></textarea>
            
            <div style="display: flex; align-items: center; margin-top: 15px; gap: 8px;">
                <span style="font-size: 12px; color: var(--text-muted);" id="wordCount">0</span>
                <div class="progress-bar-container"><div class="progress-bar" id="wordProgress"></div></div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <div style="display: flex; gap: 15px; color: var(--text-muted);">
                    <span class="material-symbols-rounded" style="font-size: 20px; cursor: pointer;" onclick="insertTimestamp()">schedule</span>
                    <span class="material-symbols-rounded" style="font-size: 20px; cursor: pointer;" onclick="undoText()">undo</span>
                </div>
                <button class="btn-primary" onclick="handleAction()">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="pageRecords" class="page-container">
        <h2 style="font-size: 24px; font-weight: 700; margin: 0 0 20px 0;">Kayıtlar</h2>
        <div class="search-bar">
            <span class="material-symbols-rounded" style="color: var(--text-muted);">search</span>
            <input type="text" id="searchInput" placeholder="Notlarda ara..." oninput="renderRecords()">
        </div>
        <div id="recordsGrid" class="cards-grid"></div>
    </div>

    <div id="pageArchive" class="page-container">
        <h2 style="font-size: 24px; font-weight: 700; margin: 0 0 20px 0;">Arşiv</h2>
        <div id="archiveGrid" class="cards-grid"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-taslak" onclick="switchPage('taslak')">
            <span class="material-symbols-rounded icon">edit_note</span>
            <span class="label">Taslak</span>
        </div>
        <div class="nav-item" id="nav-revize" onclick="switchPage('revize')">
            <span class="material-symbols-rounded icon">history_edu</span>
            <span class="label">Revize</span>
        </div>
        <div class="nav-item" id="nav-final" onclick="switchPage('final')">
            <span class="material-symbols-rounded icon">task_alt</span>
            <span class="label">Final</span>
        </div>
        <div class="nav-item" id="nav-records" onclick="switchPage('records')">
            <span class="material-symbols-rounded icon">grid_view</span>
            <span class="label">Kayıtlar</span>
        </div>
        <div class="nav-item" id="nav-archive" onclick="switchPage('archive')">
            <span class="material-symbols-rounded icon">archive</span>
            <span class="label">Arşiv</span>
        </div>
    </nav>

    <script>
        let notes = JSON.parse(localStorage.getItem('chimptopus_v10_notes')) || [];
        let archive = JSON.parse(localStorage.getItem('chimptopus_v10_archive')) || [];
        let globalCounter = parseInt(localStorage.getItem('chimptopus_v10_counter')) || 1;
        
        let currentPage = 'taslak'; 
        let selectedMood = 'var(--vibe-3)';
        let editingNoteId = null;
        let textHistory = [];

        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById('nav-' + page).classList.add('active');

            if (page === 'records') {
                document.getElementById('pageRecords').classList.add('active');
                renderRecords();
            } else if (page === 'archive') {
                document.getElementById('pageArchive').classList.add('active');
                renderArchive();
            } else {
                document.getElementById('pageEditor').classList.add('active');
                document.getElementById('boxLabel').innerText = page.charAt(0).toUpperCase() + page.slice(1);
                document.getElementById('referenceBox').style.display = (page === 'taslak') ? 'none' : 'block';
            }
            window.scrollTo(0, 0);
        }

        function handleAction() {
            const text = document.getElementById('noteInput').value;
            if (!text.trim()) return;

            if (editingNoteId) {
                const idx = notes.findIndex(n => n.id === editingNoteId);
                if (idx > -1) {
                    notes[idx].text = text;
                    notes[idx].mood = selectedMood;
                }
                editingNoteId = null;
            } else {
                const formattedNum = String(globalCounter).padStart(2, '0');
                const newNote = {
                    id: Date.now(),
                    num: formattedNum,
                    text: text,
                    type: currentPage,
                    mood: selectedMood,
                    date: new Date().toLocaleDateString('tr-TR', { day:'numeric', month:'short' })
                };
                
                if (currentPage === 'final') {
                    archive.unshift(newNote);
                    localStorage.setItem('chimptopus_v10_archive', JSON.stringify(archive));
                } else {
                    notes.unshift(newNote);
                    localStorage.setItem('chimptopus_v10_notes', JSON.stringify(notes));
                }
                globalCounter++;
                localStorage.setItem('chimptopus_v10_counter', globalCounter);
            }
            
            document.getElementById('noteInput').value = '';
            updateWordProgress();
            alert("Kaydedildi.");
            switchPage('records');
        }

        function renderRecords() {
            const grid = document.getElementById('recordsGrid');
            const query = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            let filtered = notes.filter(n => n.text.toLowerCase().includes(query) || n.num.includes(query));
            
            filtered.forEach(n => {
                const card = createCard(n, false);
                grid.appendChild(card);
            });
        }

        function renderArchive() {
            const grid = document.getElementById('archiveGrid');
            grid.innerHTML = '';
            archive.forEach(n => {
                const card = createCard(n, true);
                grid.appendChild(card);
            });
        }

        function createCard(n, isArchive) {
            const div = document.createElement('div');
            div.className = 'note-card';
            div.innerHTML = `
                <div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span style="font-size:11px; font-weight:700; color:var(--text-muted);">#${n.num}</span>
                        <div style="width:8px; height:8px; border-radius:50%; background:${n.mood}"></div>
                    </div>
                    <p>${n.text}</p>
                </div>
                <div class="card-footer">
                    <span style="font-size:11px; color:var(--text-muted); font-weight:500;">${n.date}</span>
                    <div style="display:flex; gap:12px;">
                        <span class="material-symbols-rounded" style="font-size:18px; color:var(--text-muted);" onclick="loadToEditor(${n.id}, event)">edit</span>
                        <span class="material-symbols-rounded" style="font-size:18px; color:var(--danger-color);" onclick="deleteNote(${n.id}, ${isArchive}, event)">delete</span>
                    </div>
                </div>
            `;
            div.onclick = () => {
                document.getElementById('refContent').innerText = n.text;
                alert("Blok referans olarak seçildi.");
            };
            return div;
        }

        function loadToEditor(id, e) {
            e.stopPropagation();
            const n = notes.find(x => x.id === id) || archive.find(x => x.id === id);
            if (!n) return;
            editingNoteId = n.id;
            document.getElementById('noteInput').value = n.text;
            switchPage('taslak');
            window.scrollTo(0,0);
        }

        function deleteNote(id, isArchive, e) {
            e.stopPropagation();
            if(!confirm("Silmek istediğine emin misin?")) return;
            if (isArchive) {
                archive = archive.filter(x => x.id !== id);
                localStorage.setItem('chimptopus_v10_archive', JSON.stringify(archive));
                renderArchive();
            } else {
                notes = notes.filter(x => x.id !== id);
                localStorage.setItem('chimptopus_v10_notes', JSON.stringify(notes));
                renderRecords();
            }
        }

        function updateWordProgress() {
            const val = document.getElementById('noteInput').value.trim();
            const words = val ? val.split(/\s+/).length : 0;
            document.getElementById('wordCount').innerText = words + " kelime";
            document.getElementById('wordProgress').style.width = Math.min(words, 100) + "%";
            
            if (textHistory[textHistory.length - 1] !== val) {
                textHistory.push(val);
                if (textHistory.length > 20) textHistory.shift();
            }
        }

        function undoText() {
            if (textHistory.length > 1) {
                textHistory.pop();
                document.getElementById('noteInput').value = textHistory[textHistory.length - 1];
                updateWordProgress();
            }
        }

        function insertTimestamp() {
            const ta = document.getElementById('noteInput');
            const now = new Date();
            ta.value += `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}] `;
            ta.focus();
        }

        function setMood(color, el) {
            selectedMood = color;
            document.querySelectorAll('.mood-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }
        function closePanels() { document.getElementById('sideMenu').classList.remove('active'); }
        function clearAll() { if(confirm("Tüm veriler silinecek?")) { localStorage.clear(); location.reload(); } }
        function exportData() {
            const data = { notes, archive, counter: globalCounter };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'notes_backup.json'; a.click();
        }
    </script>
</body>
</html>
