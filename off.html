<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Öykü Mimarı v7.0 | Mood Director</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #E50914;
            --text: #ffffff;
            --text-dim: #888;
            /* Mood Colors */
            --mood-tense: #ff4d4d;
            --mood-sad: #4d94ff;
            --mood-calm: #4dff88;
            --mood-mystery: #a366ff;
            --mood-action: #ff944d;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        .header { padding: 15px; background: #000; border-bottom: 1px solid #222; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.1rem; color: var(--accent); margin: 0; letter-spacing: 2px; }

        .tab-content { display: none; padding: 15px; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }

        /* MOOD SAHNE KARTLARI */
        .scene-container { margin-top: 15px; }
        .scene-card {
            background: var(--card);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 6px solid #444;
            position: relative;
        }
        .scene-card.tense { border-left-color: var(--mood-tense); }
        .scene-card.sad { border-left-color: var(--mood-sad); }
        .scene-card.calm { border-left-color: var(--mood-calm); }
        .scene-card.mystery { border-left-color: var(--mood-mystery); }
        .scene-card.action { border-left-color: var(--mood-action); }

        .scene-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .scene-mood-tag { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: #222; }

        /* KARAKTER KARTLARI (NETFLIX) */
        .char-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .char-mini-card { flex: 0 0 110px; background: var(--card); border-radius: 6px; overflow: hidden; border: 1px solid #222; }
        .char-mini-img { width: 100%; height: 130px; object-fit: cover; }
        .char-mini-name { padding: 5px; font-size: 0.75rem; text-align: center; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* EDITÖR */
        .mood-selector { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding: 5px 0; }
        .mood-btn { padding: 6px 12px; border-radius: 15px; border: 1px solid #333; background: #111; color: white; font-size: 0.7rem; cursor: pointer; white-space: nowrap; }
        .mood-btn.active { border-color: var(--accent); background: var(--accent); }

        textarea { width: 100%; background: #111; border: 1px solid #222; color: #ddd; padding: 15px; border-radius: 8px; font-size: 1rem; line-height: 1.7; box-sizing: border-box; }
        .writing-zone { height: calc(100vh - 280px); min-height: 300px; }

        /* NAVİGASYON */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: var(--text-dim); font-size: 0.65rem; text-align: center; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <h1>MOOD DIRECTOR <small>v7</small></h1>
</div>

<div id="cast" class="tab-content active">
    <h2>🎭 Karakter Kadrosu</h2>
    <div class="char-scroll" id="charScroll">
        </div>
    <div style="margin-top:20px; background: #111; padding: 15px; border-radius: 10px;">
        <input type="text" id="cName" placeholder="İsim" style="width:100%; margin-bottom:10px; background:#222; border:none; padding:10px; color:white;">
        <input type="text" id="cImg" placeholder="Fotoğraf URL" style="width:100%; margin-bottom:10px; background:#222; border:none; padding:10px; color:white;">
        <button onclick="addCast()" style="width:100%; background:var(--accent); color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">KADROYA EKLE</button>
    </div>
</div>

<div id="scenes" class="tab-content">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🎬 Sahne Akışı</h2>
        <button onclick="addNewSceneCard()" style="background:#222; color:white; border:1px solid #444; padding:5px 10px; border-radius:5px; font-size:0.7rem;">+ YENİ SAHNE</button>
    </div>
    <div class="scene-container" id="sceneList">
        </div>
</div>

<div id="write" class="tab-content">
    <div class="mood-selector" id="moodPicker">
        <div class="mood-btn active" onclick="setMood('tense', this)">🔥 Gerilimli</div>
        <div class="mood-btn" onclick="setMood('sad', this)">💧 Hüzünlü</div>
        <div class="mood-btn" onclick="setMood('calm', this)">🍃 Sakin</div>
        <div class="mood-btn" onclick="setMood('mystery', this)">🔮 Gizemli</div>
        <div class="mood-btn" onclick="setMood('action', this)">⚡ Aksiyon</div>
    </div>
    <textarea id="editor" class="writing-zone" placeholder="Sahneyi hisset ve yazmaya başla..." oninput="syncWrite()"></textarea>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('cast', this)"><span>👥</span><br>KADRO</div>
    <div class="nav-item" onclick="switchTab('scenes', this)"><span>🎞️</span><br>SAHNELER</div>
    <div class="nav-item" onclick="switchTab('write', this)"><span>🖋️</span><br>YAZIM</div>
</nav>

<script>
    let project = JSON.parse(localStorage.getItem('mood_v7')) || {
        chars: [],
        scenes: [],
        currentDraft: "",
        currentMood: "tense"
    };

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // KARAKTER SİSTEMİ
    function addCast() {
        const name = document.getElementById('cName').value;
        const img = document.getElementById('cImg').value || 'https://via.placeholder.com/110x130/222/fff?text=No+Img';
        if(!name) return;
        project.chars.push({name, img, id: Date.now()});
        save();
        renderChars();
        document.getElementById('cName').value = "";
    }

    function renderChars() {
        const scroll = document.getElementById('charScroll');
        scroll.innerHTML = project.chars.map(c => `
            <div class="char-mini-card" onclick="if(confirm('Silinsin mi?')) deleteChar(${c.id})">
                <img src="${c.img}" class="char-mini-img">
                <span class="char-mini-name">${c.name}</span>
            </div>
        `).join('');
    }

    function deleteChar(id) {
        project.chars = project.chars.filter(c => c.id !== id);
        save(); renderChars();
    }

    // SAHNE SİSTEMİ
    function addNewSceneCard() {
        const desc = prompt("Sahne özeti (Zaman çizelgesi için):");
        if(!desc) return;
        project.scenes.push({desc, mood: project.currentMood, id: Date.now()});
        save();
        renderScenes();
    }

    function renderScenes() {
        const list = document.getElementById('sceneList');
        list.innerHTML = project.scenes.map((s, index) => `
            <div class="scene-card ${s.mood}">
                <div class="scene-header">
                    <span style="font-size:0.8rem; font-weight:bold;">Sahne ${index + 1}</span>
                    <span class="scene-mood-tag">${s.mood}</span>
                </div>
                <div style="font-size:0.85rem; color:#ccc;">${s.desc}</div>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <small style="color:var(--accent);" onclick="loadSceneToEditor(${index})">Düzenle</small>
                    <small style="color:#666;" onclick="deleteScene(${index})">Sil</small>
                </div>
            </div>
        `).join('');
    }

    // YAZIM SİSTEMİ
    function setMood(mood, btn) {
        project.currentMood = mood;
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        save();
    }

    function syncWrite() {
        project.currentDraft = document.getElementById('editor').value;
        save();
    }

    function save() {
        localStorage.setItem('mood_v7', JSON.stringify(project));
    }

    window.onload = () => {
        renderChars();
        renderScenes();
        document.getElementById('editor').value = project.currentDraft;
    };

    function deleteScene(index) {
        project.scenes.splice(index, 1);
        save(); renderScenes();
    }
</script>

</body>
</html>
