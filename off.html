<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Öykü Mimarı v8.0 | Master Architect</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #E50914;
            --text: #ffffff;
            --text-dim: #666;
            --mindmap-line: #333;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* MİND MAP & TİMELİNE GÖRSELİ */
        .mindmap-container {
            padding: 20px 10px;
            background: #000;
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        .mindmap-line {
            position: absolute; top: 38px; left: 10%; right: 10%;
            height: 2px; background: var(--mindmap-line); z-index: 1;
        }
        .node {
            z-index: 2; text-align: center; width: 60px; position: relative;
        }
        .node-dot {
            width: 12px; height: 12px; background: #333; border-radius: 50%;
            margin: 0 auto 8px; border: 2px solid var(--bg); transition: 0.3s;
        }
        .node.active .node-dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .node-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .node.active .node-label { color: var(--accent); font-weight: bold; }

        /* ANALİZ PANELİ */
        .analysis-box {
            background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 15px;
            display: none; font-size: 0.8rem; border: 1px solid #333;
        }

        /* SAHNE LİSTESİ (SÜRÜKLENEBİLİR) */
        .scene-item {
            background: var(--card); padding: 15px; margin-bottom: 8px;
            border-radius: 8px; border: 1px solid #222; display: flex; align-items: center;
        }
        .scene-handle { margin-right: 15px; color: #444; cursor: grab; }

        /* GENEL STİLLER */
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        textarea { width: 100%; background: #111; border: 1px solid #222; color: #ddd; padding: 15px; border-radius: 8px; font-size: 1rem; line-height: 1.6; min-height: 300px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: var(--text-dim); font-size: 0.7rem; text-align: center; }
        .nav-item.active { color: var(--accent); }

        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="mindmap-container">
    <div class="mindmap-line"></div>
    <div class="node active" id="node-serim">
        <div class="node-dot"></div>
        <div class="node-label">Serim</div>
    </div>
    <div class="node" id="node-dugum">
        <div class="node-dot"></div>
        <div class="node-label">Düğüm</div>
    </div>
    <div class="node" id="node-gelisme">
        <div class="node-dot"></div>
        <div class="node-label">Gelişme</div>
    </div>
    <div class="node" id="node-doruk">
        <div class="node-dot"></div>
        <div class="node-label">Doruk</div>
    </div>
    <div class="node" id="node-cozum">
        <div class="node-dot"></div>
        <div class="node-label">Çözüm</div>
    </div>
</div>

<div id="analysisArea" class="tab-content">
    <div class="analysis-box" id="analysisContent" style="display:block;">
        Metni yazdıktan sonra analiz butonuna bas kanka.
    </div>
    <button onclick="analyzeText()">📊 Kelime Analizi Yap</button>
</div>

<div id="timeline" class="tab-content">
    <div id="sceneList"></div>
    <button onclick="addScenePrompt()">+ Yeni Sahne Ekle</button>
</div>

<div id="write" class="tab-content active">
    <select id="stageSelect" onchange="updateMindMap()" style="width:100%; background:#222; color:white; padding:10px; border:none; border-radius:5px; margin-bottom:15px;">
        <option value="serim">Aşama: SERİM</option>
        <option value="dugum">Aşama: DÜĞÜM</option>
        <option value="gelisme">Aşama: GELİŞME</option>
        <option value="doruk">Aşama: DORUK</option>
        <option value="cozum">Aşama: ÇÖZÜM</option>
    </select>
    <textarea id="mainEditor" placeholder="Kalemine kuvvet..." oninput="autoSave()"></textarea>
</div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="switchTab('timeline', this)"><span>🎞️</span><br>AKIŞ</div>
    <div class="nav-item active" onclick="switchTab('write', this)"><span>🖋️</span><br>YAZ</div>
    <div class="nav-item" onclick="switchTab('analysisArea', this)"><span>📊</span><br>ANALİZ</div>
</nav>

<script>
    let data = JSON.parse(localStorage.getItem('mimari_v8')) || {
        scenes: [],
        draft: "",
        currentStage: "serim"
    };

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function updateMindMap() {
        const stage = document.getElementById('stageSelect').value;
        data.currentStage = stage;
        document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
        document.getElementById('node-' + stage).classList.add('active');
        autoSave();
    }

    function autoSave() {
        data.draft = document.getElementById('mainEditor').value;
        localStorage.setItem('mimari_v8', JSON.stringify(data));
    }

    // KELİME ANALİZİ
    function analyzeText() {
        const text = document.getElementById('mainEditor').value;
        if(!text) return;
        const words = text.toLowerCase().match(/\b\w+\b/g);
        const freq = {};
        words.forEach(w => { if(w.length > 3) freq[w] = (freq[w] || 0) + 1; });
        
        const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 5);
        let html = "<b>En Çok Kullandığın Kelimeler:</b><br>";
        sorted.forEach(([w, c]) => {
            html += `- ${w.toUpperCase()}: ${c} kez<br>`;
        });
        document.getElementById('analysisContent').innerHTML = html;
    }

    // SAHNE YÖNETİMİ
    function addScenePrompt() {
        const s = prompt("Sahne özeti:");
        if(s) {
            data.scenes.push({desc: s, id: Date.now()});
            renderScenes();
            autoSave();
        }
    }

    function renderScenes() {
        const list = document.getElementById('sceneList');
        list.innerHTML = data.scenes.map((s, i) => `
            <div class="scene-item">
                <div class="scene-handle">☰</div>
                <div style="flex:1; font-size:0.85rem;">${i+1}. ${s.desc}</div>
                <div onclick="deleteScene(${i})" style="color:var(--accent); font-size:1.2rem;">×</div>
            </div>
        `).join('');
    }

    function deleteScene(i) {
        data.scenes.splice(i, 1);
        renderScenes();
        autoSave();
    }

    window.onload = () => {
        document.getElementById('mainEditor').value = data.draft;
        document.getElementById('stageSelect').value = data.currentStage;
        updateMindMap();
        renderScenes();
    };
</script>

</body>
</html>
