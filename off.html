<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öykü Yazım Aracı</title>
<style>
    /* Genel Stil */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a1a;
        color: #f0f0f0;
        margin: 0;
        padding: 0;
    }
    header {
        background: #0d6efd;
        color: white;
        text-align: center;
        padding: 1rem;
        font-size: 1.5rem;
        font-weight: bold;
    }
    main {
        padding: 1rem;
    }
    section {
        background: #2a2a2a;
        margin-bottom: 1rem;
        padding: 1rem;
        border-radius: 12px;
    }
    h2 {
        color: #0d6efd;
        margin-top: 0;
    }
    textarea {
        width: 100%;
        border-radius: 8px;
        border: none;
        padding: 0.5rem;
        margin-top: 0.5rem;
        resize: vertical;
        min-height: 60px;
        font-size: 1rem;
    }
    button {
        background: #0d6efd;
        border: none;
        padding: 0.5rem 1rem;
        color: white;
        border-radius: 8px;
        margin-top: 0.5rem;
        cursor: pointer;
        font-size: 1rem;
    }
    button:hover {
        background: #0956c1;
    }
    .generated {
        background: #1e1e1e;
        padding: 0.5rem;
        border-radius: 8px;
        margin-top: 0.5rem;
        font-style: italic;
    }
</style>
</head>
<body>
<header>Öykü Yazım Aracı</header>
<main>

<!-- 1. Fikir ve Tema -->
<section>
<h2>1️⃣ Fikir ve Tema</h2>
<label>Hikayenin temel fikri:</label>
<textarea id="themeInput" placeholder="Temel fikri buraya yaz..."></textarea>
<button onclick="generateIdea()">İlham Ver</button>
<div class="generated" id="ideaOutput"></div>
</section>

<!-- 2. Karakter Arkı -->
<section>
<h2>2️⃣ Karakter Arkı</h2>
<label>Ana karakterin motivasyonu ve özellikleri:</label>
<textarea id="characterInput" placeholder="Karakteri tanımla..."></textarea>
<button onclick="generateCharacter()">Karakter Önerisi</button>
<div class="generated" id="characterOutput"></div>
</section>

<!-- 3. Evren Tasarımı -->
<section>
<h2>3️⃣ Evren Tasarımı</h2>
<label>Hikayenin geçtiği ortam ve kurallar:</label>
<textarea id="worldInput" placeholder="Evreni tasarla..."></textarea>
<button onclick="generateWorld()">Evren Önerisi</button>
<div class="generated" id="worldOutput"></div>
</section>

<!-- 4. Kurgu Yapısı -->
<section>
<h2>4️⃣ Kurgu Yapısı</h2>
<label>Olay örgüsü ve yapı:</label>
<textarea id="plotInput" placeholder="Olayları sırala..."></textarea>
<button onclick="generatePlot()">Kurgu Önerisi</button>
<div class="generated" id="plotOutput"></div>
</section>

<!-- 5. Anlatıcı ve Bakış Açısı -->
<section>
<h2>5️⃣ Anlatıcı ve Bakış Açısı</h2>
<label>Bakış açısı ve anlatıcı tipi:</label>
<textarea id="narrativeInput" placeholder="Bakış açısını belirle..."></textarea>
<button onclick="generateNarrative()">Bakış Açısı Önerisi</button>
<div class="generated" id="narrativeOutput"></div>
</section>

<!-- 6. Yazım ve Revizyon -->
<section>
<h2>6️⃣ Yazım ve Revizyon</h2>
<label>İlk taslak ve notlar:</label>
<textarea id="draftInput" placeholder="İlk taslağı buraya yaz..."></textarea>
<button onclick="generateRevision()">Revizyon Önerisi</button>
<div class="generated" id="revisionOutput"></div>
</section>

</main>

<script>
// Basit ilham üreten fonksiyonlar
function generateIdea() {
    const ideas = [
        "Gizemli bir şehirde kaybolan bir zaman makinesi.",
        "Yapay zekanın insan duygularını anlamaya çalışması.",
        "Küçük bir kasabada ortaya çıkan sıra dışı güçler."
    ];
    document.getElementById('ideaOutput').innerText = ideas[Math.floor(Math.random()*ideas.length)];
}

function generateCharacter() {
    const chars = [
        "Cesur ama yalnız bir kahraman.",
        "Kurnaz ve sır dolu bir anti-kahraman.",
        "Meraklı, genç bir bilim insanı."
    ];
    document.getElementById('characterOutput').innerText = chars[Math.floor(Math.random()*chars.length)];
}

function generateWorld() {
    const worlds = [
        "Gelecekteki distopik bir şehir.",
        "Büyü ile teknolojinin birleştiği bir evren.",
        "Post-apokaliptik bir dünyada hayatta kalma mücadelesi."
    ];
    document.getElementById('worldOutput').innerText = worlds[Math.floor(Math.random()*worlds.length)];
}

function generatePlot() {
    const plots = [
        "Başlangıçta rutin bir gün, sonra büyük bir kaos.",
        "Karakter, gizemli bir nesneyi bulur ve yolculuk başlar.",
        "Dost ve düşmanlar ortaya çıkar, çatışma doruğa ulaşır."
    ];
    document.getElementById('plotOutput').innerText = plots[Math.floor(Math.random()*plots.length)];
}

function generateNarrative() {
    const narratives = [
        "Birinci tekil anlatım: Karakterin içsel dünyası derinlemesine.",
        "Üçüncü tekil ilahi bakış: Tüm olayları geniş perspektiften görme.",
        "Hikaye bölümler arasında farklı bakış açılarıyla anlatılıyor."
    ];
    document.getElementById('narrativeOutput').innerText = narratives[Math.floor(Math.random()*narratives.length)];
}

function generateRevision() {
    const revisions = [
        "Karakterin motivasyonunu güçlendir.",
        "Olay örgüsünde sürprizleri artır.",
        "Betimlemeleri zenginleştir ve atmosferi güçlendir."
    ];
    document.getElementById('revisionOutput').innerText = revisions[Math.floor(Math.random()*revisions.length)];
}
</script>

</body>
</html>
