<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Öykü Mimarı v9.0 | Dune Edition</title>
    <style>
        /* image_0.png ve image_1.png'DAN ESİNLENEN RENK PALETİ VE TARZ */
        :root {
            --bg-deep: #0b0c10;
            --card-deep: #12141a;
            --accent-neon: #00ffff; /* Neon Turkuaz */
            --accent-warm: #ffda44; /* Canlı Sarı */
            --accent-green: #2ecc71; /* Asit Yeşil (Tetikleyici Olay) */
            --text-main: #ffffff;
            --text-muted: #8c9096;
            --border-muted: #2d3038;
            --body-text-font: 'Georgia', serif;
            --ui-font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--ui-font);
            background: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Nav bar için */
        }

        /* HEADER */
        .header {
            padding: 15px;
            background: var(--card-deep);
            border-bottom: 1px solid var(--border-muted);
            text-align: center;
        }

        .header h1 {
            font-size: 1.2rem;
            color: var(--accent-neon);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* TAB İÇERİK */
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* KART TABANLI DÜZEN */
        .card {
            background: var(--card-deep);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border-muted);
        }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* GİRİŞ ALANLARI */
        .input-group { margin-bottom: 15px; }
        
        input, textarea, select {
            width: 100%;
            background: #1c1e26;
            border: 1px solid #2d3038;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-top: 5px;
            box-sizing: border-box;
            font-size: 0.95rem;
            outline: none;
        }
        
        input:focus, textarea:focus { border-color: var(--accent-neon); }
        
        /* KARAKTER KARTLARI (NETFLIX GRID) */
        .char-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .char-card {
            background: #1c1e26;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d3038;
            position: relative;
        }
        
        .char-img { width: 100%; height: 120px; object-fit: cover; }
        .char-name { padding: 8px; font-weight: bold; font-size: 0.85rem; }

        /* YAZIM ALANI */
        .writing-area { height: calc(100vh - 280px); line-height: 1.7; font-family: var(--body-text-font); }

        /* YAZIM ASİSTANI (YENİ İPUÇLARI) */
        .writer-assistant {
            background: rgba(255, 218, 68, 0.1);
            color: var(--accent-warm);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            border: 1px dashed var(--accent-warm);
        }

        /* NAVİGASYON (Alt Bar) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--card-deep); display: flex;
            justify-content: space-around; padding: 12px 0;
            border-top: 1px solid var(--border-muted); z-index: 1000;
        }
        
        .nav-item {
            color: var(--text-muted); font-size: 0.7rem; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        
        .nav-item.active { color: var(--accent-neon); }
        .nav-item.active .nav-icon { color: var(--accent-neon); }
        
        .nav-icon { font-size: 1.4rem; color: var(--text-muted); }

        /* BUTONLAR */
        button {
            border: none; padding: 12px; border-radius: 6px;
            width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 10px;
            cursor: pointer; font-size: 0.9rem;
        }
        
        .btn-green { background: var(--accent-green); color: black; }
        .btn-yellow { background: var(--accent-warm); color: black; }
    </style>
</head>
<body>

<div class="header">
    <h1>ÖYKÜ MİMARI PRO</h1>
</div>

<div id="dna" class="tab-content active">
    <div class="card">
        <div class="card-title">🏗️ Proje DNA'sı</div>
        <div class="input-group">
            <input type="text" id="storyTitle" placeholder="Öykü Adı..." oninput="autoSave()">
        </div>
        <div class="input-group">
            <textarea id="logline" placeholder="Logline: Kim, neyi, neden istiyor?" oninput="autoSave()"></textarea>
        </div>
    </div>

    <div class="card">
        <div class="card-title">👥 Karakter Kadrosu</div>
        <div class="char-grid" id="charGrid"></div>
        <button class="btn-yellow" style="background:#1c1e26; color:white; border:1px solid #333;" onclick="addCharacter()">+ Karakter Ekle</button>
    </div>
</div>

<div id="write" class="tab-content">
    <div class="writer-assistant" id="currentTip">Hocanın İpucu: 'Anlatma, göster.' Karakterin duygularını eylemleriyle anlat.</div>
    
    <div class="card">
        <div class="input-group">
            <select id="stageSelect" onchange="autoSave()">
                <option value="serim">Aşama: SERİM</option>
                <option value="dugum">Aşama: DÜĞÜM</option>
                <option value="gelisme">Aşama: GELİŞME</option>
                <option value="doruk">Aşama: DORUK</option>
                <option value="cozum">Aşama: ÇÖZÜM</option>
            </select>
        </div>
        
        <textarea id="mainDraft" class="writing-area" placeholder="Anlatmaya başla..." oninput="autoSave()"></textarea>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('dna', this)">
        <span class="nav-icon">🧬</span>
        <span>DNA</span>
    </div>
    <div class="nav-item" onclick="switchTab('write', this)">
        <span class="nav-icon">🖋️</span>
        <span>YAZ</span>
    </div>
</nav>

<script>
    // DATA MODEL
    let project = JSON.parse(localStorage.getItem('showrunner_v9')) || {
        title: "",
        logline: "",
        chars: [],
        draft: "",
        stage: "serim"
    };

    // HOCANIN İPUÇLARI (ASİSTAN)
    const stageTips = {
        serim: [
            "Atmosferi kur kanka. Çevrenin kokusunu ve sesini anlat.",
            "Karakterin sıradan dünyasını göster. Bir eksiklik hissettir.",
            "Olayın geçtiği yeri bir dekor gibi değil, yaşayan bir yer gibi betimle."
        ],
        dugum: [
            "Karakteri konfor alanından çıkaran olay! Artık geri dönüş yok.",
            "Tetikleyici olay şaşırtıcı ve net olmalı.",
            "Karakter 'Macera Çağrısı'nı kabul etmek zorunda kalmalı."
        ],
        gelisme: [
            "Engellerin büyüdüğü yer. Karakter yanılıyor, öğreniyor.",
            "Her sahne bir çatışma içermelidir kanka. Kim engel oluyor?",
            "Yeni karakterler ve müttefiklerle tanıştır."
        ],
        doruk: [
            "En yüksek gerilim! Karakter en büyük korkusuyla yüzleşir.",
            "Tüm soruların cevabını bu hesaplaşmada ver.",
            "Karakterin maskesi düşer ve dönüşüm gerçekleşir."
        ],
        cozum: [
            "Toz duman dağılır. Karakter değişti mi?",
            "Yeni bir dünya düzeni kur. Tüm açık uçları kapat kanka.",
            "Okurda bir tatmin duygusu yarat."
        ]
    };

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'write') updateWriterAssistant();
    }

    function updateWriterAssistant() {
        const stage = document.getElementById('stageSelect').value;
        const currentTips = stageTips[stage] || [];
        const tipText = currentTips[Math.floor(Math.random() * currentTips.length)] || "Kalemine kuvvet kanka.";
        document.getElementById('currentTip').innerText = "Hocanın İpucu: " + tipText;
    }

    // KARAKTER SİSTEMİ
    function addCharacter() {
        const name = prompt("Karakter İsmi:");
        const img = prompt("Karakter Fotoğraf URL (Örn: image_1.png):") || 'https://via.placeholder.com/150';
        if(!name) return;
        project.chars.push({ name, img, id: Date.now() });
        autoSave();
        renderChars();
    }

    function renderChars() {
        const grid = document.getElementById('charGrid');
        grid.innerHTML = project.chars.map(c => `
            <div class="char-card">
                <img src="${c.img}" class="char-img">
                <span class="char-name">${c.name}</span>
            </div>
        `).join('');
    }

    // KAYIT SİSTEMİ
    function autoSave() {
        project.title = document.getElementById('storyTitle').value;
        project.logline = document.getElementById('logline').value;
        project.draft = document.getElementById('mainDraft').value;
        project.stage = document.getElementById('stageSelect').value;
        localStorage.setItem('showrunner_v9', JSON.stringify(project));
    }

    window.onload = () => {
        document.getElementById('storyTitle').value = project.title || "";
        document.getElementById('logline').value = project.logline || "";
        document.getElementById('mainDraft').value = project.draft || "";
        document.getElementById('stageSelect').value = project.stage;
        renderChars();
    };
</script>

</body>
</html>
