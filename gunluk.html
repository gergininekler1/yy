<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zihin Bilantısı - Pro Dashboard</title>
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --card-bg: #161616;
            --border-color: #262626;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --accent-blue: #4facfe;
            --accent-red: #ff4d4d;
            --accent-green: #00ff88;
            --terminal-font: 'Courier New', monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- ÜST PANEL: RENK TEMASI --- */
        .header-section {
            font-size: 0.8rem;
            color: var(--accent-green);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .color-themes {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-dot.active { border-color: white; box-shadow: 0 0 10px white; }
        .dot-green { background: #00ff88; }
        .dot-blue { background: #4facfe; }
        .dot-purple { background: #bc13fe; }
        .dot-orange { background: #ff8c00; }
        .dot-red { background: #ff4d4d; }

        /* --- STATÜ KARTLARI --- */
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-blue);
            border-radius: 8px;
            padding: 15px;
        }

        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .stat-value { font-family: var(--terminal-font); font-size: 2rem; color: var(--accent-blue); }

        .warning-card {
            border-left-color: var(--accent-red);
            background: linear-gradient(90deg, rgba(255,77,77,0.1) 0%, rgba(22,22,22,1) 100%);
        }

        .warning-text { color: var(--accent-red); font-weight: bold; font-family: var(--terminal-font); font-size: 0.9rem; }

        /* --- SERİ TAKİP BLOĞU (Yeni Yerinde) --- */
        .series-tracker {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-family: var(--terminal-font);
        }

        /* --- TERMINAL ARAMA KUTUSU --- */
        .terminal-search-wrapper {
            position: relative;
            width: 100%;
        }

        .prompt-symbol {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-red);
            font-family: var(--terminal-font);
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .terminal-search {
            width: 100%;
            box-sizing: border-box;
            background-color: #050505;
            border: 1px solid #333;
            border-left: 3px solid var(--accent-red);
            border-radius: 6px;
            padding: 15px 15px 15px 35px;
            color: #fff;
            font-family: var(--terminal-font);
            outline: none;
            transition: all 0.3s ease;
        }

        .terminal-search:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.2);
        }

        /* --- MODERN TAB NAVIGATOR (EKSTRA DAHİL) --- */
        .tab-wrapper {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 5px;
            display: flex;
            gap: 5px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-wrapper::-webkit-scrollbar { display: none; }

        .tab-item {
            flex: 1;
            min-width: 90px;
            padding: 10px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .tab-item.active {
            background: var(--accent-blue);
            color: white;
        }

        /* --- MODERN HAFTA SEÇİCİ --- */
        .week-navigator {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111;
            border: 1px solid #222;
            border-radius: 50px;
            padding: 8px 20px;
            margin: 10px 0;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-btn:hover { transform: scale(1.3); color: white; }

        .current-week {
            font-family: var(--terminal-font);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* --- GÜNLÜK KARTLAR --- */
        .day-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .day-card.active { border-left: 5px solid var(--accent-blue); }

        .date-text { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; }
        .card-title { font-size: 1.2rem; color: var(--accent-blue); margin-bottom: 15px; font-weight: bold; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .progress-bar { height: 4px; background: #333; border-radius: 2px; width: 60px; }
        .progress-fill { height: 100%; background: var(--accent-blue); width: 40%; }

        /* --- EKSTRA SEKMESİ İÇERİĞİ --- */
        .extra-content-header {
            background: rgba(0, 255, 136, 0.05);
            border: 1px dashed var(--accent-green);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .add-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">// RENK TEMASI</div>
    <div class="color-themes">
        <div class="color-dot dot-green"></div>
        <div class="color-dot dot-blue active"></div>
        <div class="color-dot dot-purple"></div>
        <div class="color-dot dot-orange"></div>
        <div class="color-dot dot-red"></div>
    </div>

    <div class="stat-card">
        <div class="stat-label">📊 Kayıt Sayısı</div>
        <div class="stat-value">3</div>
    </div>

    <div class="stat-card warning-card">
        <div class="stat-label">🛡️ KRİTİK DURUM 🔴</div>
        <div class="warning-text">YÜKSEK ÖNCELİKLİ İŞ VAR</div>
    </div>

    <div class="series-tracker">
        <span style="color: var(--text-dim); font-size: 0.7rem;">// SERİ TAKİP AKTİF</span>
        <div style="margin-top:5px; color: var(--accent-green);">🔥 12 GÜNDÜR KESİNTİSİZ</div>
    </div>

    <div class="terminal-search-wrapper">
        <span class="prompt-symbol">></span>
        <input type="text" class="terminal-search" placeholder="Sistem veri tabanında ara...">
    </div>

    <div class="tab-wrapper">
        <div class="tab-item active">📅 Haftalık</div>
        <div class="tab-item">🗓️ Aylık</div>
        <div class="tab-item">🗄️ Arşiv</div>
        <div class="tab-item">⚡ Ekstra</div>
    </div>

    <div class="week-navigator">
        <button class="nav-btn">❮</button>
        <div class="current-week">19 - 25 NİSAN</div>
        <button class="nav-btn">❯</button>
    </div>

    <div class="day-list">
        <div class="day-card active">
            <div class="date-text">5 NİSAN PAZ</div>
            <div class="card-title">zihin bilantısı</div>
            <div class="card-footer">
                <div style="color: var(--text-dim); font-size: 0.8rem;">📋 1 &nbsp; 🧠 1</div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 0.7rem; color: var(--text-dim);">%40</span>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
            </div>
        </div>

        <div class="day-card">
            <div class="date-text">6 NİSAN PZT</div>
            <div class="card-title" style="color: var(--text-dim);">...</div>
        </div>
    </div>
</div>

<div class="add-button">+</div>

</body>
</html>
