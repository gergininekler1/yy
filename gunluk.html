<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX.JOURNAL v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ─── THEME TOKENS ─── */
        :root {
            --accent: #00e676;
            --accent-dim: rgba(0,230,118,0.12);
            --accent-glow: rgba(0,230,118,0.22);
            --danger: #ff4d6d;
            --danger-dim: rgba(255,77,109,0.14);
            --warn: #ffb300;
            --warn-dim: rgba(255,179,0,0.14);
            --info: #40c4ff;
            --info-dim: rgba(64,196,255,0.12);
            --p-high: #ff4d6d;
            --p-med:  #ffb300;
            --p-low:  #69f0ae;
        }

        [data-theme="dark"] {
            --bg:       #0e0e11;
            --surface:  #141418;
            --surface2: #1b1b20;
            --surface3: #222228;
            --border:   #28282f;
            --border2:  #38383f;
            --text1:    #e8e8ec;
            --text2:    #7a7a8c;
            --text3:    #3a3a46;
        }

        [data-theme="light"] {
            --bg:       #f4f4f6;
            --surface:  #ffffff;
            --surface2: #f0f0f3;
            --surface3: #e8e8ed;
            --border:   #d8d8e0;
            --border2:  #c4c4cc;
            --text1:    #18181c;
            --text2:    #6a6a7a;
            --text3:    #b0b0bc;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text1);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        .container { max-width:100%; padding:1rem; animation:fadeUp 0.45s ease; }

        /* ══════════════════════════════
           HEADER
        ══════════════════════════════ */
        header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.1rem 1.4rem;
            margin-bottom: 1rem;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.9rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            color: var(--text1);
        }
        h1 .dot { color: var(--accent); }

        .theme-btn {
            font-size: 1rem;
            padding: 0.35rem 0.7rem;
            border: 1px solid var(--border2);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
            line-height: 1;
        }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

        .stats-bar {
            display: flex;
            gap: 0;
            flex-wrap: wrap;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 0.9rem;
            overflow: hidden;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.55rem 1rem;
            gap: 0.15rem;
            flex: 1;
            min-width: 80px;
            border-right: 1px solid var(--border);
        }
        .stat-item:last-child { border-right: none; }

        .stat-label {
            font-size: 0.58rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }
        .stat-value.neutral { color: var(--text1); }
        .stat-value.fire { color: var(--warn); }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.9rem;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 0.5rem 0.8rem;
            border: 1px solid var(--border2);
            background: var(--surface2);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--text1);
            border-radius: 4px;
            transition: border-color 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--accent); }
        .search-input::placeholder { color: var(--text3); }

        .search-clear {
            padding: 0.5rem 0.7rem;
            font-size: 0.75rem;
        }

        .header-controls {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            padding: 0.45rem 0.9rem;
            border: 1px solid var(--border2);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.18s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 3px;
            white-space: nowrap;
        }
        button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        button.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

        .view-switcher {
            display: flex;
            border: 1px solid var(--border2);
            border-radius: 4px;
            overflow: hidden;
        }
        .view-switcher button { border:none; border-right:1px solid var(--border2); border-radius:0; }
        .view-switcher button:last-child { border-right:none; }

        .date-navigation { display:flex; align-items:center; gap:0.4rem; }

        .date-display {
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            min-width: 148px;
            text-align: center;
            color: var(--text1);
            font-weight: 700;
        }

        .data-controls { display:flex; gap:0.4rem; margin-left:auto; }

        /* ══════════════════════════════
           SEARCH RESULTS PANEL
        ══════════════════════════════ */
        .search-results-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            animation: slideDown 0.2s ease;
        }
        .search-results-title {
            font-size: 0.68rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }
        .search-result-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0.65rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 0.4rem;
            cursor: pointer;
            transition: border-color 0.15s;
            background: var(--surface2);
            animation: slideIn 0.2s ease;
        }
        .search-result-item:hover { border-color: var(--accent); }
        .search-result-date { font-size: 0.7rem; color: var(--text2); margin-bottom: 0.25rem; }
        .search-result-text { font-size: 0.82rem; color: var(--text1); line-height: 1.4; }
        .search-result-tags { display:flex; gap:0.3rem; flex-wrap:wrap; margin-top:0.3rem; }
        .search-empty { font-size:0.82rem; color:var(--text3); padding:0.5rem 0; }

        /* ══════════════════════════════
           MOOD CHART
        ══════════════════════════════ */
        .mood-chart-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 0.65rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }
        .section-title::before { content: '/ '; color: var(--accent); }

        .mood-chart {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 60px;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .mood-bar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .mood-bar {
            width: 22px;
            border-radius: 2px 2px 0 0;
            transition: height 0.4s ease;
            cursor: default;
            position: relative;
        }
        .mood-bar[data-mood="great"]   { background: var(--accent); }
        .mood-bar[data-mood="good"]    { background: var(--accent); }
        .mood-bar[data-mood="neutral"] { background: var(--text2); }
        .mood-bar[data-mood="bad"]     { background: var(--danger); }
        .mood-bar[data-mood="terrible"]{ background: var(--danger); }
        .mood-bar-label { font-size:0.5rem; color:var(--text2); text-align:center; }

        /* ══════════════════════════════
           WEEKLY SCROLL
        ══════════════════════════════ */
        .weekly-scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 0.75rem;
            margin-bottom: 5rem;
            -webkit-overflow-scrolling: touch;
        }
        .weekly-scroll-container::-webkit-scrollbar { height:4px; }
        .weekly-scroll-container::-webkit-scrollbar-track { background:var(--surface); }
        .weekly-scroll-container::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

        .weekly-view { display:flex; gap:0.65rem; min-width:max-content; padding:0.25rem 0; }

        .day-card {
            width: 250px;
            min-height: 460px;
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 1.1rem;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
        }
        .day-card:hover { border-color: var(--border2); box-shadow:0 4px 20px rgba(0,0,0,0.25); }
        .day-card.today { border-color: var(--accent); }
        .day-card.today::after {
            content: '●';
            position: absolute;
            top:9px; right:11px;
            font-size:0.45rem;
            color: var(--accent);
            animation: blink 1.5s infinite;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.85rem;
            padding-bottom: 0.65rem;
            border-bottom: 1px solid var(--border);
        }

        .day-name  { font-size:0.6rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:0.15rem; }
        .day-number { font-family:'Orbitron',monospace; font-size:2rem; font-weight:900; line-height:1; color:var(--text1); }
        .day-card.today .day-number { color:var(--accent); }
        .day-month { font-size:0.6rem; color:var(--text2); text-transform:uppercase; margin-top:0.15rem; }

        .mood-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }
        .mood-badge-pill {
            font-size: 0.65rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .mood-badge-pill.great, .mood-badge-pill.good { background:rgba(0,230,118,0.15); color:var(--accent); border:1px solid rgba(0,230,118,0.3); }
        .mood-badge-pill.neutral                      { background:var(--surface3); color:var(--text2); border:1px solid var(--border2); }
        .mood-badge-pill.bad, .mood-badge-pill.terrible{ background:rgba(255,77,109,0.13); color:var(--danger); border:1px solid rgba(255,77,109,0.3); }
        .terminal-section {
            margin-top: 0.65rem;
            padding: 0.65rem;
            border: 1px solid var(--border);
            background: var(--surface2);
            border-radius: 3px;
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .section-label {
            font-size:0.58rem;
            color:var(--text2);
            text-transform:uppercase;
            margin-bottom:0.4rem;
            letter-spacing:0.1em;
        }
        .section-label::before { content:'/ '; color:var(--accent); }

        .note-preview {
            font-size:0.8rem;
            line-height:1.5;
            color:var(--text1);
            overflow:hidden;
            display:-webkit-box;
            -webkit-line-clamp:7;
            -webkit-box-orient:vertical;
            flex:1;
        }

        .note-count {
            font-size:0.62rem;
            color:var(--text2);
            margin-top:0.4rem;
            padding-top:0.4rem;
            border-top:1px solid var(--border);
        }

        .task-mini {
            font-size: 0.68rem;
            color: var(--text2);
            margin-top: 0.3rem;
            padding-top: 0.3rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .tags-terminal { display:flex; gap:0.35rem; flex-wrap:wrap; margin-top:0.65rem; }
        .tag {
            font-size:0.6rem;
            padding:0.18rem 0.55rem;
            border:1px solid var(--border2);
            background:var(--surface2);
            color:var(--text2);
            text-transform:uppercase;
            border-radius:2px;
        }

        .empty-state {
            color:var(--text3);
            font-size:0.78rem;
            text-align:center;
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        /* ══════════════════════════════
           CALENDAR VIEW
        ══════════════════════════════ */
        .calendar-container {
            border:1px solid var(--border);
            background:var(--surface);
            padding:1rem;
            border-radius:5px;
            margin-bottom:5rem;
        }
        .calendar-header { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); margin-bottom:1px; }
        .calendar-view   { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); }
        .calendar-day-name { background:var(--surface2); padding:0.4rem; text-align:center; font-size:0.65rem; color:var(--text2); text-transform:uppercase; }
        .calendar-day {
            background:var(--surface);
            padding:0.5rem;
            min-height:70px;
            cursor:pointer;
            transition:background 0.15s;
        }
        .calendar-day:hover { background:var(--surface2); }
        .calendar-day.today { background:var(--accent-dim); outline:1px solid var(--accent); }
        .calendar-day.other-month { opacity:0.3; }
        .cal-day-number { font-size:0.9rem; font-weight:bold; color:var(--text2); }
        .calendar-day.today .cal-day-number { color:var(--accent); }

        /* ══════════════════════════════
           LIST VIEW
        ══════════════════════════════ */
        .list-view { display:flex; flex-direction:column; gap:0.65rem; margin-bottom:5rem; }

        .entry-card {
            border:1px solid var(--border);
            background:var(--surface);
            padding:1.1rem 1.3rem;
            cursor:pointer;
            transition:border-color 0.15s;
            border-radius:5px;
        }
        .entry-card:hover { border-color:var(--border2); }

        .entry-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:0.65rem;
            padding-bottom:0.5rem;
            border-bottom:1px solid var(--border);
        }
        .entry-date { font-family:'Orbitron',monospace; font-size:0.8rem; font-weight:700; text-transform:uppercase; color:var(--text1); }
        .entry-content { color:var(--text1); line-height:1.6; font-size:0.85rem; margin-bottom:0.6rem; }

        /* ══════════════════════════════
           TASKS & SUMMARY VIEW
        ══════════════════════════════ */
        .summary-view { display:flex; flex-direction:column; gap:1rem; margin-bottom:2rem; }
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
        
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.1rem;
        }
        .summary-card-title {
            font-size: 0.6rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.65rem;
        }
        .summary-card-title::before { content:'/ '; color:var(--accent); }
        .summary-big-num {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 0.2rem;
        }
        .summary-sub { font-size: 0.72rem; color: var(--text2); }

        .tasks-overview { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:5rem; }

        .tasks-filter-bar {
            display:flex; gap:0.4rem; flex-wrap:wrap;
            margin-bottom:0.75rem;
        }
        .tasks-filter-bar button.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

        .task-overview-item {
            display:flex;
            align-items:center;
            gap:0.65rem;
            padding:0.65rem 0.9rem;
            border:1px solid var(--border);
            background:var(--surface);
            border-radius:4px;
            animation:slideIn 0.2s ease;
            transition:border-color 0.15s, opacity 0.2s;
            cursor:pointer;
        }
        .task-overview-item:hover { border-color:var(--border2); }
        .task-overview-item.done-task { opacity:0.45; }
        .task-overview-item.done-task .tov-text { text-decoration:line-through; color:var(--text2); }

        .tov-check {
            width:17px; height:17px;
            border:1px solid var(--border2);
            border-radius:2px;
            flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:0.6rem;
            background:var(--surface2);
            transition:all 0.15s;
        }
        .tov-check.checked { background:var(--accent); border-color:var(--accent); color:#000; }

        .tov-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .tov-dot.high   { background:var(--p-high); }
        .tov-dot.medium { background:var(--p-med); }
        .tov-dot.low    { background:var(--p-low); }

        .tov-text { flex:1; font-size:0.83rem; color:var(--text1); line-height:1.4; }

        .tov-date {
            font-size:0.62rem;
            color:var(--text2);
            flex-shrink:0;
            font-family:'Orbitron',monospace;
        }

        /* ══════════════════════════════
           MODAL
        ══════════════════════════════ */
        .modal {
            display:none;
            position:fixed; top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.8);
            z-index:1000;
            overflow-y:auto;
        }
        .modal.active { display:flex; align-items:center; justify-content:center; animation:fadeUp 0.22s ease; }

        .modal-content {
            background:var(--surface);
            border:1px solid var(--border2);
            padding:1.75rem;
            max-width:660px;
            width:94%;
            max-height:92vh;
            overflow-y:auto;
            border-radius:7px;
            animation:slideDown 0.25s ease;
        }

        .modal-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:1.5rem;
            padding-bottom:0.9rem;
            border-bottom:1px solid var(--border);
        }

        .modal-title {
            font-family:'Orbitron',monospace;
            font-size:1rem;
            font-weight:900;
            text-transform:uppercase;
            letter-spacing:0.1em;
        }

        .close-btn {
            background:none;
            border:1px solid var(--border2);
            font-size:1rem;
            padding:0.2rem 0.6rem;
            color:var(--text2);
            border-radius:3px;
        }
        .close-btn:hover { background:var(--danger-dim); border-color:var(--danger); color:var(--danger); }

        .form-group { margin-bottom:1.3rem; }

        .form-label {
            font-size:0.65rem;
            text-transform:uppercase;
            letter-spacing:0.12em;
            display:block;
            margin-bottom:0.55rem;
            color:var(--text2);
        }
        .form-label::before { content:'/ '; color:var(--accent); }

        textarea, input[type="text"], input[type="date"] {
            width:100%;
            padding:0.65rem 0.75rem;
            border:1px solid var(--border2);
            background:var(--surface2);
            font-family:'Share Tech Mono',monospace;
            font-size:0.88rem;
            color:var(--text1);
            resize:vertical;
            transition:border-color 0.18s;
            border-radius:3px;
        }
        textarea:focus, input[type="text"]:focus, input[type="date"]:focus { outline:none; border-color:var(--accent); }
        textarea { min-height:130px; line-height:1.6; }
        ::placeholder { color:var(--text3); }

        .mood-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .mood-option {
            display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
            cursor: pointer; padding: 0.9rem 0.5rem; border: 1px solid var(--border);
            background: var(--surface2); transition: all 0.18s; border-radius: 4px; user-select: none;
        }
        .mood-option:hover { border-color:var(--border2); }
        .mood-option[data-mood="good"].selected   { border-color:var(--accent); background:rgba(0,230,118,0.1); }
        .mood-option[data-mood="neutral"].selected{ border-color:var(--border2); background:var(--surface3); }
        .mood-option[data-mood="bad"].selected    { border-color:var(--danger); background:var(--danger-dim); }

        .mood-icon { font-size: 1.5rem; line-height: 1; }
        .mood-label-text { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
        .mood-option[data-mood="good"].selected .mood-label-text { color:var(--accent); }
        .mood-option[data-mood="bad"].selected  .mood-label-text { color:var(--danger); }
        .mood-option[data-mood="neutral"].selected .mood-label-text{ color:var(--text1); }

        .tasks-section { padding:1.1rem; border:1px solid var(--border); background:var(--surface2); border-radius:4px; margin-bottom:0; }
        .tasks-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.85rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }
        .tasks-list { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:0.65rem; }
        .task-item { display:flex; align-items:center; gap:0.6rem; padding:0.55rem 0.7rem; border:1px solid var(--border); background:var(--surface); border-radius:3px; animation:slideIn 0.2s ease; transition:opacity 0.2s; }
        .task-item.done { opacity:0.5; }
        .task-checkbox { width:16px; height:16px; border:1px solid var(--border2); border-radius:2px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.6rem; transition:all 0.15s; background:var(--surface2); }
        .task-checkbox.checked { background:var(--accent); border-color:var(--accent); color:#000; }
        .task-priority-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .task-priority-dot.high { background:var(--p-high); }
        .task-priority-dot.medium { background:var(--p-med); }
        .task-priority-dot.low { background:var(--p-low); }
        .task-text { flex:1; font-size:0.82rem; color:var(--text1); line-height:1.4; }
        .task-item.done .task-text { text-decoration:line-through; color:var(--text2); }
        .task-del-btn { background:none; border:none; color:var(--text3); font-size:0.9rem; padding:0 0.2rem; cursor:pointer; letter-spacing:0; }
        .task-del-btn:hover { color:var(--danger); background:none; border:none; }
        .task-add-row { display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; }
        .task-add-row input { flex:1; min-width:120px; padding:0.45rem 0.65rem; font-size:0.8rem; }
        .priority-select { font-family:'Share Tech Mono',monospace; font-size:0.72rem; padding:0.45rem 0.6rem; border:1px solid var(--border2); background:var(--surface2); color:var(--text2); border-radius:3px; cursor:pointer; }
        .priority-select:focus { outline:none; border-color:var(--accent); }

        .atomic-notes-section { padding:1.1rem; border:1px solid var(--border); background:var(--surface2); border-radius:4px; }
        .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; padding-bottom:0.45rem; border-bottom:1px solid var(--border); }
        .atomic-notes-list { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:0.6rem; }
        .atomic-note { display:flex; align-items:flex-start; gap:0.6rem; padding:0.55rem 0.7rem; border:1px solid var(--border); background:var(--surface); border-radius:3px; animation:slideIn 0.2s ease; }
        .atomic-note-text { flex:1; font-size:0.82rem; color:var(--text1); line-height:1.4; }
        .atom-del-btn { background:none; border:none; color:var(--text3); font-size:0.9rem; padding:0 0.2rem; cursor:pointer; }
        .atom-del-btn:hover { color:var(--danger); background:none; border:none; }
        .inline-add-row { display:flex; gap:0.4rem; }
        .inline-add-row input { flex:1; padding:0.45rem 0.65rem; font-size:0.8rem; }
        .inline-add-row button { padding:0.45rem 0.75rem; }

        .tag-input-container { display:flex; flex-wrap:wrap; gap:0.35rem; padding:0.5rem 0.65rem; border:1px solid var(--border2); background:var(--surface2); min-height:46px; border-radius:3px; align-items:center; }
        .tag-input-container:focus-within { border-color:var(--accent); }
        .tag-item { display:flex; align-items:center; gap:0.35rem; padding:0.18rem 0.55rem; background:var(--accent-dim); border:1px solid var(--accent); font-size:0.68rem; text-transform:uppercase; border-radius:2px; color:var(--accent); }
        .tag-remove { cursor:pointer; opacity:0.7; }
        .tag-remove:hover { opacity:1; }
        #tagInput { border:none; background:transparent; padding:0.25rem; flex:1; min-width:80px; font-family:'Share Tech Mono',monospace; font-size:0.8rem; color:var(--text1); }
        #tagInput:focus { outline:none; }

        .modal-footer { display:flex; gap:0.6rem; margin-top:1.5rem; }
        .btn-primary { flex:1; background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
        .btn-primary:hover { background:var(--accent); color:#000; }
        .btn-danger { background:var(--danger-dim); border-color:var(--danger); color:var(--danger); }
        .btn-danger:hover { background:var(--danger); color:white; }

        .fab { position:fixed; bottom:1.5rem; right:1.5rem; width:52px; height:52px; border:1px solid var(--accent); background:var(--accent-dim); color:var(--accent); font-size:1.5rem; cursor:pointer; transition:all 0.2s; z-index:100; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .fab:hover { background:var(--accent); color:#000; box-shadow:0 4px 18px var(--accent-glow); transform:scale(1.07); }
        .fab::before { content:'+'; display:block; line-height:1; }

        .hidden { display:none !important; }

        /* ══════════════════════════════
           RESPONSIVE
        ══════════════════════════════ */
        @media (max-width:640px) {
            h1 { font-size:1rem; }
            .header-controls { flex-direction:column; align-items:stretch; }
            .date-navigation { flex-wrap:wrap; }
            .date-display { min-width:110px; font-size:0.68rem; }
            .data-controls { margin-left:0; }
            .day-card { width:220px; min-height:400px; }
            .modal-content { width:97%; padding:1.1rem; }
            .stats-bar { overflow-x:auto; flex-wrap:nowrap; }
            .stat-item { min-width:72px; }
            .mood-selector { grid-template-columns:repeat(3,1fr); }
            .summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-top">
            <h1>MATRIX<span class="dot">.</span>JOURNAL <span style="font-size:0.72em;opacity:0.5;">v3</span></h1>
            <button class="theme-btn" id="themeToggle" title="Tema değiştir">☀️</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Streak</span>
                <span class="stat-value fire" id="streakCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Aktif görev</span>
                <span class="stat-value" id="activeTaskCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tamamlandı</span>
                <span class="stat-value" id="completionRate">—</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Bu hafta</span>
                <span class="stat-value neutral" id="weekEntries">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Top tag</span>
                <span class="stat-value neutral" id="topTag">—</span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍  Kayıt, tag veya not ara...">
            <button class="search-clear hidden" id="searchClear">✕ Temizle</button>
        </div>

        <div class="header-controls">
            <div class="view-switcher">
                <button class="view-btn active" data-view="weekly">Hafta</button>
                <button class="view-btn" data-view="calendar">Takvim</button>
                <button class="view-btn" data-view="list">Liste</button>
                <button class="view-btn" data-view="tasks">Görevler & Özet</button>
            </div>

            <div class="date-navigation">
                <button id="prevPeriod">←</button>
                <div class="date-display" id="dateDisplay"></div>
                <button id="nextPeriod">→</button>
            </div>

            <div class="data-controls">
                <button id="today">Bugün</button>
                <button id="exportData">↑ Export</button>
                <button id="importData">↓ Import</button>
                <input type="file" id="fileInput" accept=".json" class="hidden">
            </div>
        </div>
    </header>

    <div class="search-results-panel hidden" id="searchPanel"></div>

    <div class="mood-chart-section">
        <div class="section-title">Son 14 gün — ruh hali grafiği</div>
        <div class="mood-chart" id="moodChart"></div>
    </div>

    <div id="mainContent"></div>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="entryModalTitle">Yeni kayıt</div>
            <button class="close-btn" id="closeEntryModal">✕</button>
        </div>

        <div class="form-group">
            <label class="form-label">Tarih</label>
            <input type="date" id="entryDate">
        </div>

        <div class="form-group">
            <label class="form-label">Ruh hali</label>
            <div class="mood-selector">
                <div class="mood-option" data-mood="good">
                    <div class="mood-icon">🙂</div>
                    <div class="mood-label-text">İyi</div>
                </div>
                <div class="mood-option" data-mood="neutral">
                    <div class="mood-icon">😐</div>
                    <div class="mood-label-text">Nötr</div>
                </div>
                <div class="mood-option" data-mood="bad">
                    <div class="mood-icon">😔</div>
                    <div class="mood-label-text">Kötü</div>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Ana not</label>
            <textarea id="entryText" placeholder="Bugün ne oldu? İpucu: Neler başardın? Neler öğrendin? Yarın neyi daha iyi yapabilirsin?"></textarea>
        </div>

        <div class="form-group">
            <div class="tasks-section">
                <div class="tasks-header">
                    <label class="form-label" style="margin:0;">Görevler</label>
                    <span id="taskProgress" style="font-size:0.65rem;color:var(--text2);"></span>
                </div>
                <div class="tasks-list" id="tasksList"></div>
                <div class="task-add-row">
                    <input type="text" id="taskInput" placeholder="Yeni görev...">
                    <select class="priority-select" id="taskPriority">
                        <option value="high">🔴 Yüksek</option>
                        <option value="medium" selected>🟡 Orta</option>
                        <option value="low">🟢 Düşük</option>
                    </select>
                    <button id="addTaskBtn">+ Ekle</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <div class="atomic-notes-section">
                <div class="section-header">
                    <label class="form-label" style="margin:0;">Atomic notlar</label>
                </div>
                <div class="atomic-notes-list" id="atomicNotesList"></div>
                <div class="inline-add-row">
                    <input type="text" id="atomicNoteInput" placeholder="Yeni not ekle...">
                    <button id="addAtomicNoteBtn">+ Ekle</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Etiketler</label>
            <div class="tag-input-container" id="tagContainer">
                <input type="text" id="tagInput" placeholder="Etiket yaz, Enter'a bas">
            </div>
        </div>

        <div class="modal-footer">
            <button id="saveEntry" class="btn-primary">Kaydet</button>
            <button id="deleteEntry" class="hidden btn-danger">Sil</button>
        </div>
    </div>
</div>

<button class="fab" id="fab"></button>

<script>
class DataManager {
    constructor() { this.entries = this.load(); }
    load() { try { return JSON.parse(localStorage.getItem('mjv3') || '{}'); } catch(e){ return {}; } }
    save() { localStorage.setItem('mjv3', JSON.stringify(this.entries)); }
    add(date, entry) { this.entries[date] = entry; this.save(); }
    get(date) { return this.entries[date] || null; }
    del(date) { delete this.entries[date]; this.save(); }
    export() {
        const blob = new Blob([JSON.stringify({entries:this.entries,v:'3.0',date:new Date().toISOString()},null,2)],{type:'application/json'});
        const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`mj-${fmtDate(new Date())}.json`});
        a.click();
    }
    import(data) { if(data.entries) { this.entries=data.entries; this.save(); } }
}

const dm = new DataManager();
let currentView = 'weekly';
let currentDate  = new Date();
let selectedDate = null;
let currentTags  = [];
let atomicNotes  = [];
let tasks        = [];
let searchQuery  = '';

function fmtDate(d) { return d.toISOString().split('T')[0]; }

function weekDates(d) {
    const s = new Date(d);
    s.setDate(s.getDate() - s.getDay() + 1);
    return Array.from({length:7}, (_,i) => { const x=new Date(s); x.setDate(x.getDate()+i); return x; });
}

function monthDates(d) {
    const y=d.getFullYear(), m=d.getMonth();
    const first=new Date(y,m,1), last=new Date(y,m+1,0);
    const dates=[];
    const start = first.getDay()||7;
    for(let i=start-1;i>0;i--){ const x=new Date(first); x.setDate(x.getDate()-i); dates.push({date:x,other:true}); }
    for(let i=1;i<=last.getDate();i++) dates.push({date:new Date(y,m,i),other:false});
    for(let i=1;dates.length<42;i++){ const x=new Date(last); x.setDate(x.getDate()+i); dates.push({date:x,other:true}); }
    return dates;
}

const DAYS   = ['PAZ','PZT','SAL','ÇAR','PER','CUM','CMT'];
const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const MOOD_LABELS = { good:'İyi', neutral:'Nötr', bad:'Kötü' };
const MOOD_CHART_H = { good:50, neutral:28, bad:10 };

function moodBadgeHTML(mood) {
    if (!mood) return '';
    return `<div class="mood-badge"><span class="mood-badge-pill ${mood}">${MOOD_LABELS[mood]||mood}</span></div>`;
}

function calcStreak() {
    let streak = 0;
    const today = fmtDate(new Date());
    let check = new Date();
    while(true) {
        const ds = fmtDate(check);
        if (ds === today && !dm.get(ds)) { check.setDate(check.getDate()-1); continue; }
        if (dm.get(ds)) { streak++; check.setDate(check.getDate()-1); }
        else break;
    }
    return streak;
}

function renderStats() {
    const allEntries = Object.values(dm.entries);
    const wDates = weekDates(currentDate).map(fmtDate);
    const weekCount = wDates.filter(d=>dm.get(d)).length;

    let activeTasks=0, totalTasks=0, doneTasks=0;
    allEntries.forEach(e => {
        if(e.tasks) {
            e.tasks.forEach(t => {
                totalTasks++;
                if(t.done) doneTasks++;
                else activeTasks++;
            });
        }
    });

    const rate = totalTasks > 0 ? Math.round((doneTasks/totalTasks)*100)+'%' : '—';
    const allTags = [];
    allEntries.forEach(e => { if(e.tags) allTags.push(...e.tags); });
    const tc = {};
    allTags.forEach(t=>tc[t]=(tc[t]||0)+1);
    const top = Object.entries(tc).sort((a,b)=>b[1]-a[1])[0];

    document.getElementById('streakCount').textContent    = calcStreak() + ' 🔥';
    document.getElementById('activeTaskCount').textContent = activeTasks;
    document.getElementById('completionRate').textContent  = rate;
    document.getElementById('weekEntries').textContent     = weekCount;
    document.getElementById('topTag').textContent          = top ? top[0] : '—';
}

function renderMoodChart() {
    const days = 14;
    let html = '';
    for(let i=days-1; i>=0; i--) {
        const d = new Date();
        d.setDate(d.getDate()-i);
        const ds = fmtDate(d);
        const entry = dm.get(ds);
        const mood = entry ? entry.mood : null;
        const h = mood ? MOOD_CHART_H[mood] : 4;
        const label = d.getDate() + '/' + (d.getMonth()+1);
        html += `
            <div class="mood-bar-wrap" title="${label}${mood?' — '+MOOD_LABELS[mood]:''}" data-date="${ds}" style="cursor:${entry?'pointer':'default'}">
                <div class="mood-bar" data-mood="${mood||'none'}" style="height:${h}px;${!mood?'background:var(--border);':''}" ></div>
                <div class="mood-bar-label">${d.getDate()}</div>
            </div>`;
    }
    document.getElementById('moodChart').innerHTML = html;
    document.querySelectorAll('.mood-bar-wrap[data-date]').forEach(el => {
        el.addEventListener('click', () => {
            const ds = el.dataset.date;
            if (dm.get(ds)) openModal(ds);
        });
    });
}

function doSearch(q) {
    q = q.toLowerCase().trim();
    const panel = document.getElementById('searchPanel');
    const clearBtn = document.getElementById('searchClear');

    if (!q) {
        panel.classList.add('hidden');
        clearBtn.classList.add('hidden');
        return;
    }

    clearBtn.classList.remove('hidden');
    const results = Object.entries(dm.entries).filter(([date, entry]) => {
        return (
            (entry.text && entry.text.toLowerCase().includes(q)) ||
            (entry.tags && entry.tags.some(t => t.toLowerCase().includes(q))) ||
            (entry.atomicNotes && entry.atomicNotes.some(n => n.toLowerCase().includes(q))) ||
            (entry.tasks && entry.tasks.some(t => t.text.toLowerCase().includes(q)))
        );
    }).sort((a,b) => new Date(b[0]) - new Date(a[0]));

    if (results.length === 0) {
        panel.innerHTML = `<div class="search-results-title">Arama sonuçları</div><div class="search-empty">Sonuç bulunamadı.</div>`;
    } else {
        let html = `<div class="search-results-title">${results.length} sonuç bulundu — "${q}"</div>`;
        results.forEach(([ds, entry]) => {
            const d = new Date(ds);
            const tagsHTML = entry.tags && entry.tags.length
                ? `<div class="search-result-tags">${entry.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';
            html += `
                <div class="search-result-item" data-date="${ds}">
                    <div style="flex:1;">
                        <div class="search-result-date">${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
                        <div class="search-result-text">${(entry.text||'').substring(0,120)}${entry.text&&entry.text.length>120?'…':''}</div>
                        ${tagsHTML}
                    </div>
                    ${entry.mood ? `<div style="font-size:1.1rem;margin-left:0.5rem;">${{good:'🙂',neutral:'😐',bad:'😔'}[entry.mood]||''}</div>` : ''}
                </div>`;
        });
        panel.innerHTML = html;
        panel.querySelectorAll('.search-result-item').forEach(el => {
            el.addEventListener('click', () => openModal(el.dataset.date));
        });
    }
    panel.classList.remove('hidden');
}

function renderWeekly() {
    const dates = weekDates(currentDate);
    const today  = fmtDate(new Date());
    let html = '<div class="weekly-view">';

    dates.forEach(date => {
        const ds = fmtDate(date);
        const entry = dm.get(ds);
        const isToday = ds === today;

        let taskSummary = '';
        if (entry && entry.tasks && entry.tasks.length > 0) {
            const done = entry.tasks.filter(t=>t.done).length;
            const total = entry.tasks.length;
            taskSummary = `<div class="task-mini"><span>${done}/${total} görev tamamlandı</span></div>`;
        }

        html += `
            <div class="day-card ${isToday?'today':''}" data-date="${ds}">
                <div class="terminal-header">
                    <div>
                        <div class="day-name">${DAYS[date.getDay()]}</div>
                        <div class="day-number">${date.getDate()}</div>
                        <div class="day-month">${MONTHS[date.getMonth()]}</div>
                    </div>
                    ${entry && entry.mood ? moodBadgeHTML(entry.mood) : ''}
                </div>
                ${entry && entry.text ? `
                    <div class="terminal-section">
                        <div class="section-label">Ana log</div>
                        <div class="note-preview">${entry.text}</div>
                        ${entry.atomicNotes && entry.atomicNotes.length > 0 ? `<div class="note-count">+ ${entry.atomicNotes.length} atomic not</div>` : ''}
                        ${taskSummary}
                    </div>
                ` : `<div class="empty-state">Henüz kayıt yok</div>`}
                ${entry && entry.tags && entry.tags.length > 0 ? `
                    <div class="tags-terminal">${entry.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                ` : ''}
            </div>`;
    });
    html += '</div>';
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('mainContent').className = 'weekly-scroll-container';
    attachClicks();
}

function renderCalendar() {
    const dates = monthDates(currentDate);
    const today  = fmtDate(new Date());
    const DNAMES = ['PZT','SAL','ÇAR','PER','CUM','CMT','PAZ'];
    const moodIcons = {good:'🙂',neutral:'😐',bad:'😔'};

    let html = '<div class="calendar-container"><div class="calendar-header">';
    DNAMES.forEach(n => html += `<div class="calendar-day-name">${n}</div>`);
    html += '</div><div class="calendar-view">';

    dates.forEach(({date,other}) => {
        const ds = fmtDate(date);
        const entry = dm.get(ds);
        const isToday = ds === today;
        html += `
            <div class="calendar-day ${other?'other-month':''} ${isToday?'today':''}" data-date="${ds}">
                <div class="cal-day-number">${date.getDate()}</div>
                ${entry && !other && entry.mood ? `<div style="font-size:1.2rem;margin-top:0.25rem;">${moodIcons[entry.mood]||''}</div>` : ''}
                ${entry && !other && entry.tasks ? `<div style="font-size:0.55rem;color:var(--text2);margin-top:0.2rem;">${entry.tasks.filter(t=>t.done).length}/${entry.tasks.length} görev</div>` : ''}
            </div>`;
    });

    html += '</div></div>';
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('mainContent').className = '';
    attachClicks();
}

function renderList() {
    const entries = Object.entries(dm.entries)
        .sort((a,b)=>new Date(b[0])-new Date(a[0]))
        .slice(0,60);

    if (!entries.length) {
        document.getElementById('mainContent').innerHTML = `<div class="empty-state" style="padding:4rem;text-align:center;">Henüz kayıt yok</div>`;
        document.getElementById('mainContent').className = '';
        return;
    }

    const moodIcons = {good:'🙂',neutral:'😐',bad:'😔'};
    let html = '<div class="list-view">';
    entries.forEach(([ds, entry]) => {
        const d = new Date(ds);
        const activeTasks = entry.tasks ? entry.tasks.filter(t=>!t.done).length : 0;
        html += `
            <div class="entry-card" data-date="${ds}">
                <div class="entry-header">
                    <div class="entry-date">${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                        ${activeTasks > 0 ? `<span style="font-size:0.65rem;color:var(--warn);">${activeTasks} açık görev</span>` : ''}
                        ${entry.mood ? `<div style="font-size:1.3rem;">${moodIcons[entry.mood]||''}</div>` : ''}
                    </div>
                </div>
                <div class="entry-content">${(entry.text||'').substring(0,200)}${entry.text&&entry.text.length>200?'…':''}</div>
                ${entry.tags && entry.tags.length ? `<div class="tags-terminal">${entry.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
            </div>`;
    });
    html += '</div>';
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('mainContent').className = '';
    attachClicks();
}

function updateDateDisplay() {
    const el = document.getElementById('dateDisplay');
    if (currentView === 'weekly') {
        const dates = weekDates(currentDate);
        el.textContent = `${dates[0].getDate()}–${dates[6].getDate()} ${MONTHS[dates[6].getMonth()]}`;
    } else if (currentView === 'calendar') {
        el.textContent = `${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
    } else if (currentView === 'tasks') {
        el.textContent = 'Görevler & Özet';
    } else {
        el.textContent = 'Tüm kayıtlar';
    }
    const navBtns = document.querySelectorAll('#prevPeriod, #nextPeriod');
    navBtns.forEach(b => b.style.visibility = (currentView==='list'||currentView==='tasks') ? 'hidden' : 'visible');
}

let tasksFilter = 'all';

function renderTasksView() {
    const allEntries = Object.entries(dm.entries).sort((a,b) => new Date(b[0]) - new Date(a[0]));
    const allValues  = Object.values(dm.entries);
    
    // --- ÖZET (SUMMARY) HESAPLAMALARI ---
    const totalEntries = allEntries.length;
    const streak = calcStreak();

    let totalTasks = 0, doneTasks = 0;
    let allTasks = [];
    allEntries.forEach(([ds, entry]) => {
        if (entry.tasks && entry.tasks.length) {
            entry.tasks.forEach((t, idx) => {
                totalTasks++;
                if (t.done) doneTasks++;
                allTasks.push({ ...t, date: ds, entryIdx: idx });
            });
        }
    });
    const completionPct = totalTasks ? Math.round((doneTasks/totalTasks)*100) : 0;

    // --- GÖREVLER (TASKS) FİLTRELEME ---
    let filtered = allTasks;
    if (tasksFilter === 'active')  filtered = allTasks.filter(t => !t.done);
    else if (tasksFilter === 'done')   filtered = allTasks.filter(t => t.done);
    else if (tasksFilter === 'high')   filtered = allTasks.filter(t => t.priority === 'high');
    else if (tasksFilter === 'medium') filtered = allTasks.filter(t => t.priority === 'medium');
    else if (tasksFilter === 'low')    filtered = allTasks.filter(t => t.priority === 'low');

    const total  = allTasks.length;
    const active = allTasks.filter(t=>!t.done).length;
    const done   = allTasks.filter(t=>t.done).length;

    let html = `
    <div class="summary-view">
        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-card-title">Toplam kayıt</div>
                <div class="summary-big-num">${totalEntries}</div>
                <div class="summary-sub">gün yazıldı</div>
            </div>
            <div class="summary-card">
                <div class="summary-card-title">Mevcut streak</div>
                <div class="summary-big-num" style="color:var(--warn)">${streak}</div>
                <div class="summary-sub">gün 🔥</div>
            </div>
            <div class="summary-card">
                <div class="summary-card-title">Görev tamamlama</div>
                <div class="summary-big-num">${completionPct}<span style="font-size:1rem;opacity:0.6">%</span></div>
                <div class="summary-sub">${doneTasks} / ${totalTasks} görev</div>
            </div>
        </div>
    </div>

    <div class="tasks-filter-bar">
        <button class="tfilter-btn ${tasksFilter==='all'?'active':''}" data-filter="all">Tümü (${total})</button>
        <button class="tfilter-btn ${tasksFilter==='active'?'active':''}" data-filter="active">Aktif (${active})</button>
        <button class="tfilter-btn ${tasksFilter==='done'?'active':''}" data-filter="done">Tamamlanan (${done})</button>
        <button class="tfilter-btn ${tasksFilter==='high'?'active':''}" data-filter="high">🔴 Yüksek</button>
        <button class="tfilter-btn ${tasksFilter==='medium'?'active':''}" data-filter="medium">🟡 Orta</button>
        <button class="tfilter-btn ${tasksFilter==='low'?'active':''}" data-filter="low">🟢 Düşük</button>
    </div>`;

    if (!filtered.length) {
        html += `<div class="empty-state" style="padding:3rem;text-align:center;">Görev bulunamadı</div>`;
    } else {
        html += '<div class="tasks-overview">';
        filtered.forEach(t => {
            const d = new Date(t.date);
            const label = `${d.getDate()} ${MONTHS[d.getMonth()]}`;
            html += `
            <div class="task-overview-item ${t.done?'done-task':''}" data-date="${t.date}">
                <div class="tov-check ${t.done?'checked':''}" data-date="${t.date}" data-taskidx="${t.entryIdx}">${t.done?'✓':''}</div>
                <div class="tov-dot ${t.priority||'medium'}"></div>
                <div class="tov-text">${t.text}</div>
                <div class="tov-date">${label}</div>
            </div>`;
        });
        html += '</div>';
    }

    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('mainContent').className = '';

    document.querySelectorAll('.tfilter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            tasksFilter = btn.dataset.filter;
            renderTasksView();
            renderStats();
        });
    });

    document.querySelectorAll('.tov-check').forEach(el => {
        el.addEventListener('click', e => {
            e.stopPropagation();
            const ds = el.dataset.date;
            const idx = parseInt(el.dataset.taskidx);
            const entry = dm.get(ds);
            if (entry && entry.tasks && entry.tasks[idx] !== undefined) {
                entry.tasks[idx].done = !entry.tasks[idx].done;
                dm.add(ds, entry);
                renderTasksView();
                renderStats();
            }
        });
    });

    document.querySelectorAll('.task-overview-item').forEach(el => {
        el.addEventListener('click', e => {
            if (e.target.classList.contains('tov-check')) return;
            openModal(el.dataset.date);
        });
    });
}

function render() {
    if (currentView === 'weekly') renderWeekly();
    else if (currentView === 'calendar') renderCalendar();
    else if (currentView === 'tasks') renderTasksView();
    else renderList();
    renderStats();
    renderMoodChart();
    updateDateDisplay();
}

function attachClicks() {
    document.querySelectorAll('.day-card, .calendar-day, .entry-card').forEach(el => {
        el.addEventListener('click', () => openModal(el.dataset.date));
    });
}

function openModal(ds) {
    selectedDate = ds;
    const entry = dm.get(ds);

    document.getElementById('entryModalTitle').textContent = entry ? 'Kaydı düzenle' : 'Yeni kayıt';
    document.getElementById('entryDate').value = ds;
    document.getElementById('entryText').value = entry ? (entry.text||'') : '';

    document.querySelectorAll('.mood-option').forEach(m => m.classList.remove('selected'));
    if (entry && entry.mood) {
        const el = document.querySelector(`.mood-option[data-mood="${entry.mood}"]`);
        if (el) el.classList.add('selected');
    }

    tasks = entry && entry.tasks ? JSON.parse(JSON.stringify(entry.tasks)) : [];
    renderTasksList();

    atomicNotes = entry && entry.atomicNotes ? [...entry.atomicNotes] : [];
    renderAtomicNotes();

    currentTags = entry && entry.tags ? [...entry.tags] : [];
    renderTagInput();

    document.getElementById('atomicNoteInput').value = '';
    document.getElementById('taskInput').value = '';
    document.getElementById('deleteEntry').classList.toggle('hidden', !entry);
    document.getElementById('entryModal').classList.add('active');
}

function closeModal() {
    document.getElementById('entryModal').classList.remove('active');
    selectedDate = null;
    currentTags = []; atomicNotes = []; tasks = [];
}

function renderTasksList() {
    const list = document.getElementById('tasksList');
    const prog = document.getElementById('taskProgress');

    if (!tasks.length) {
        list.innerHTML = '<div style="font-size:0.75rem;color:var(--text3);padding:0.3rem 0;">Henüz görev yok</div>';
        prog.textContent = '';
        return;
    }

    const done = tasks.filter(t=>t.done).length;
    prog.textContent = `${done}/${tasks.length} tamamlandı`;

    list.innerHTML = tasks.map((t,i) => `
        <div class="task-item ${t.done?'done':''}" data-index="${i}">
            <div class="task-checkbox ${t.done?'checked':''}" data-index="${i}">${t.done?'✓':''}</div>
            <div class="task-priority-dot ${t.priority||'medium'}"></div>
            <div class="task-text">${t.text}</div>
            <button class="task-del-btn" data-index="${i}">✕</button>
        </div>
    `).join('');

    list.querySelectorAll('.task-checkbox').forEach(el => {
        el.addEventListener('click', e => {
            e.stopPropagation();
            const i = parseInt(el.dataset.index);
            tasks[i].done = !tasks[i].done;
            renderTasksList();
        });
    });
    list.querySelectorAll('.task-del-btn').forEach(el => {
        el.addEventListener('click', e => {
            e.stopPropagation();
            tasks.splice(parseInt(el.dataset.index), 1);
            renderTasksList();
        });
    });
}

function addTask() {
    const input = document.getElementById('taskInput');
    const priority = document.getElementById('taskPriority').value;
    const val = input.value.trim();
    if (!val) return;
    tasks.push({ text: val, priority, done: false });
    input.value = '';
    renderTasksList();
    input.focus();
}

function renderAtomicNotes() {
    const list = document.getElementById('atomicNotesList');
    if (!atomicNotes.length) {
        list.innerHTML = '<div style="font-size:0.75rem;color:var(--text3);padding:0.3rem 0;">Henüz atomic not yok</div>';
        return;
    }
    list.innerHTML = atomicNotes.map((n,i) => `
        <div class="atomic-note">
            <span class="atomic-note-text">${n}</span>
            <button class="atom-del-btn" data-index="${i}">✕</button>
        </div>`).join('');
    list.querySelectorAll('.atom-del-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            atomicNotes.splice(parseInt(btn.dataset.index),1);
            renderAtomicNotes();
        });
    });
}

function addAtomicNote() {
    const input = document.getElementById('atomicNoteInput');
    const val = input.value.trim();
    if (!val) return;
    atomicNotes.push(val);
    input.value = '';
    renderAtomicNotes();
    input.focus();
}

function renderTagInput() {
    const container = document.getElementById('tagContainer');
    const input = document.getElementById('tagInput');
    while (container.firstChild && container.firstChild !== input) container.removeChild(container.firstChild);
    currentTags.forEach(tag => {
        const el = document.createElement('div');
        el.className = 'tag-item';
        el.innerHTML = `<span>${tag}</span><span class="tag-remove" data-tag="${tag}">×</span>`;
        container.insertBefore(el, input);
    });
    container.querySelectorAll('.tag-remove').forEach(el => {
        el.addEventListener('click', () => {
            currentTags = currentTags.filter(t => t !== el.dataset.tag);
            renderTagInput();
        });
    });
}

const themeBtn = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('mjTheme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mjTheme', next);
    themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
});

document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        render();
    });
});

document.getElementById('prevPeriod').addEventListener('click', () => {
    if (currentView==='weekly') currentDate.setDate(currentDate.getDate()-7);
    else if (currentView==='calendar') currentDate.setMonth(currentDate.getMonth()-1);
    render();
});
document.getElementById('nextPeriod').addEventListener('click', () => {
    if (currentView==='weekly') currentDate.setDate(currentDate.getDate()+7);
    else if (currentView==='calendar') currentDate.setMonth(currentDate.getMonth()+1);
    render();
});
document.getElementById('today').addEventListener('click', () => { currentDate=new Date(); render(); });

document.getElementById('closeEntryModal').addEventListener('click', closeModal);
document.getElementById('entryModal').addEventListener('click', e => { if(e.target.id==='entryModal') closeModal(); });

document.querySelectorAll('.mood-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.mood-option').forEach(m=>m.classList.remove('selected'));
        opt.classList.add('selected');
    });
});

document.getElementById('addTaskBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addTask();} });

document.getElementById('addAtomicNoteBtn').addEventListener('click', addAtomicNote);
document.getElementById('atomicNoteInput').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addAtomicNote();} });

document.getElementById('tagInput').addEventListener('keydown', e => {
    if (e.key==='Enter' && e.target.value.trim()) {
        e.preventDefault();
        const tag = e.target.value.trim().toUpperCase();
        if (!currentTags.includes(tag)) { currentTags.push(tag); renderTagInput(); }
        e.target.value = '';
    }
});

document.getElementById('saveEntry').addEventListener('click', () => {
    const ds   = document.getElementById('entryDate').value;
    const text = document.getElementById('entryText').value.trim();
    if (!text) {
        const ta = document.getElementById('entryText');
        ta.style.borderColor = 'var(--danger)';
        ta.focus();
        setTimeout(()=>ta.style.borderColor='',1600);
        return;
    }
    const moodEl = document.querySelector('.mood-option.selected');
    dm.add(ds, {
        text, tasks, atomicNotes,
        mood: moodEl ? moodEl.dataset.mood : null,
        tags: currentTags,
        updatedAt: new Date().toISOString()
    });
    closeModal();
    render();
});

document.getElementById('deleteEntry').addEventListener('click', () => {
    if (confirm('Bu kaydı silmek istediğine emin misin?')) {
        dm.del(selectedDate);
        closeModal();
        render();
    }
});

document.getElementById('fab').addEventListener('click', () => openModal(fmtDate(new Date())));

document.getElementById('exportData').addEventListener('click', () => dm.export());
document.getElementById('importData').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            if (confirm('Mevcut veriler silinecek. Devam edilsin mi?')) {
                dm.import(data);
                render();
            }
        } catch { alert('Geçersiz dosya.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
});

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(e.target.value), 280);
});
document.getElementById('searchClear').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    doSearch('');
});

render();
</script>
</body>
</html>
