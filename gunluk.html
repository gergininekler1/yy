<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zihin Arayüzü v3.0</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-blue: #3498db;
            --critical-red: #ff4d4d;
            --faded-red: rgba(255, 77, 77, 0.4); /* İstediğin solgun kırmızı */
            --success-green: #2ecc71;
            --gray-text: #888;
            --input-bg: #151515;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- 1. BLOK: KÜÇÜLTÜLMÜŞ İSTATİSTİKLER --- */
        .stats-block-compact {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .compact-card {
            background: var(--card-bg);
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50px;
        }

        .compact-card .label {
            font-size: 10px;
            color: var(--gray-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .compact-card .value {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .date-tag {
            background: #252525;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
        }

        /* Kritik Durum Tıklanabilir */
        .critical-trigger {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .critical-trigger:active { transform: scale(0.98); }
        .alert-text { color: var(--critical-red); font-size: 1rem; }

        /* --- 2. BLOK: SERİLER --- */
        .series-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .series-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        .series-icon { color: var(--accent-blue); font-size: 1.5rem; }
        .series-label { font-size: 12px; color: var(--gray-text); letter-spacing: 2px; }

        /* --- NAVİGASYON BÖLÜMÜ --- */
        .nav-section {
            margin-top: 10px;
        }

        .tabs-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #252525;
            color: var(--gray-text);
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        /* Alt tarafa alınan Hafta Değiştirici */
        .week-navigator-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 15px;
            padding: 10px;
            background: #151515;
            border-radius: 8px;
        }

        .nav-arrow {
            background: none;
            border: 1px solid #333;
            color: white;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* --- KAYIT VE GÖREV ALANI --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #222;
            padding: 12px;
            color: white;
            border-radius: 6px;
        }

        .add-btn {
            background: var(--accent-blue);
            border: none;
            color: white;
            width: 45px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .section-label {
            color: var(--accent-blue);
            font-size: 12px;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }

        /* --- ÖZEL ÖZELLİKLER --- */
        .atomic-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        /* Kayıt günlerine göre renkli çizgi */
        .record-entry {
            border-left: 4px solid var(--success-green); /* Kayıt varsa yeşil */
            margin-bottom: 10px;
            padding-left: 10px;
        }
        .no-record {
            border-left: 4px solid #444; /* Kayıt yoksa gri */
        }

        .save-btn {
            background: var(--accent-blue);
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="stats-block-compact">
        <div class="compact-card">
            <span class="label">🗄️ KAYIT SAYISI</span>
            <div class="value">2</div>
        </div>

        <div class="compact-card">
            <span class="label">📋 AKTİF GÖREVLER</span>
            <div class="active-dates">
                <span class="date-tag">2026-04-06 (1)</span>
                <span class="date-tag">2026-04-05 (1)</span>
            </div>
        </div>

        <div class="compact-card critical-trigger" onclick="openHighPriorityTasks()">
            <span class="label">🛡️ KRİTİK DURUM</span>
            <div class="value alert-text">YÜKSEK ÖNCELİKLİ İŞ VAR</div>
        </div>
    </div>

    <div class="series-block">
        <div class="series-card">
            <div class="series-icon">🔳</div>
            <span class="series-label">ZİHİN SERİSİ</span>
        </div>
        <div class="series-card">
            <div class="series-icon">🔳</div>
            <span class="series-label">SPOR SERİSİ</span>
        </div>
        <div class="series-card">
            <div class="value" style="color: var(--accent-blue);">1</div>
            <span class="series-label">OKUMA SERİSİ</span>
        </div>
    </div>

    <div style="color: var(--gray-text); font-family: monospace; font-size: 12px; padding: 5px;">
        <span style="color: var(--accent-blue);">root@matrix:-#</span> Sistem veri tabanında yedekleme hazır.
    </div>

    <div class="nav-section">
        <div class="tabs-container">
            <button class="tab-btn active">📅 HAFTALIK</button>
            <button class="tab-btn">📅 AYLIK</button>
            <button class="tab-btn">📂 ARŞİV</button>
            <button class="tab-btn">⚡ EKSTRA</button>
        </div>

        <div class="week-navigator-bottom">
            <button class="nav-arrow">&lt;</button>
            <span style="font-weight: bold;">5 - 11 NİS</span>
            <button class="nav-arrow">&gt;</button>
        </div>
    </div>

    <div class="task-input-area">
        <div class="input-group">
            <input type="text" placeholder="Görev ekle...">
            <button class="add-btn">+</button>
        </div>
    </div>

    <div class="atomic-section">
        <span class="section-label">// ZİHİN NOTU</span>
        <div class="input-group">
            <input type="text" placeholder="Atomic note ekle...">
            <button class="add-btn">+</button>
        </div>
    </div>

    <div class="note-section">
        <span class="section-label">// GÜN NOTU</span>
        <textarea rows="5" placeholder="Bugün neler oldu?"></textarea>
    </div>

    <div class="tags-section">
        <span class="section-label">// ETİKETLER</span>
        <div class="input-group">
            <input type="text" placeholder="#etiket ekle...">
            <button class="add-btn">+</button>
        </div>
    </div>

    <button class="save-btn">💾 KAYDET</button>

    <div style="text-align: center; font-size: 10px; color: #444; margin-top: 10px;">
        Otomatik yedekleme aktif: Son yedek 5 dk önce.
    </div>

</div>

<script>
    // Kritik durum tıklandığında görevleri açma fonksiyonu
    function openHighPriorityTasks() {
        alert("Yüksek öncelikli görevler listeleniyor...");
        // Burada ilgili filtreleme veya sayfa geçiş kodun yer alacak.
    }

    // Yedekleme hatırlatıcı ve diğer fonksiyonların burada devam eder.
</script>

</body>
</html>
