<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX - REVIZE v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #2ecc71; 
            --accent-dim: rgba(46, 204, 113, 0.1);
            --danger: #e74c3c;
            --warning: #f1c40f;
            --bg-grid: #0d0d0d;
            --bg-grid-lines: #161616;
            --bg: var(--bg-grid);
            --surface: #161616; 
            --surface2: #1f1f1f;
            --border: #2a2a2a; 
            --text1: #d1d1d1; 
            --text2: #777;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        body { background-color: var(--bg-grid); background-image: linear-gradient(var(--bg-grid-lines) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid-lines) 1px, transparent 1px); background-size: 20px 20px; color: var(--text1); padding: 1rem; }
        
        .container { max-width: 1100px; margin: 0 auto; }
        .header-block { border: 1px solid var(--border); padding: 1rem 1.5rem; margin-bottom: 0.5rem; background: var(--surface); position: relative; }
        h1 { font-family: 'Orbitron'; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; font-size: 1.8rem; }
        
        .kunye-block { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface); }
        .kunye-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* İSTATİSTİK BAR */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 1.5rem; }
        .stat-item { background: var(--surface2); padding: 15px; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .stat-item.danger-border { border-left-color: var(--danger); }
        .stat-label { color: var(--text2); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .stat-content { font-size: 1.5rem; color: var(--text1); font-weight: bold; font-family: 'Orbitron'; }

        .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent); padding: 12px; font-size: 0.8rem; margin-bottom: 1rem; outline: none; }
        .search-input:focus { border-color: var(--accent); }
        
        button { background: transparent; border: none; color: var(--text2); padding: 8px 14px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        button:hover { color: var(--accent); }
        button.active { background: var(--accent); color: #000; font-weight: bold; }

        .toast { padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 0.85rem; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards; background: var(--surface2); border-left: 4px solid var(--accent); display: flex; align-items: center; gap: 10px; font-weight: bold; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; } }

        /* TAKVİM IZGARASI (GÜN KARTLARI) */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 1rem; }
        .day-card { background: var(--surface2); border: 1px dashed var(--border); padding: 15px; cursor: pointer; position: relative; min-height: 130px; border-radius: 6px; transition: all 0.2s; display:flex; flex-direction:column; }
        .day-card:hover { border-color: var(--accent); background: var(--surface); }
        
        /* Dolu olan günler */
        .day-card.recorded { border: 1px solid var(--border); border-left: 4px solid var(--accent); background: linear-gradient(135deg, var(--surface) 30%, var(--accent-dim) 150%); }
        
        .day-header { font-size: 0.65rem; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; display:flex; justify-content:space-between;}
        .day-title { font-size: 0.85rem; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        .day-desc { font-size: 0.7rem; color: var(--text1); margin-bottom: 10px; flex-grow: 1; }
        
        .empty-icon { margin: auto; font-size: 1.5rem; color: var(--border); transition: color 0.2s; }
        .day-card:hover .empty-icon { color: var(--accent); }

        .habit-icons { display: flex; gap: 4px; margin-top: auto; }
        .habit-icon { width: 20px; height: 20px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--accent); border: 1px solid var(--border); }
        
        /* Modal */
        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); width: 100%; max-width: 600px; padding: 1.5rem; border-radius: 8px; }
        .modal-block { background: var(--surface2); border: 1px solid var(--border); padding: 1.2rem; margin-bottom: 1rem; border-radius: 6px; }
        .day-title-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent); padding: 10px; font-size: 0.9rem; margin-bottom: 1rem; }
        
        .habit-btn { background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: all 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--text2); }
        .habit-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

        /* Ekstra Sekmesi Filtreleri */
        .extra-filter-bar { display: flex; gap: 10px; background: var(--surface2); padding: 10px; border-radius: 6px; margin-bottom: 1rem; border: 1px solid var(--border); }
        .extra-filter-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: bold; }
        .extra-filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        .task-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 8px; border-radius: 4px; border-left: 4px solid var(--border); }
        .task-list-item.p1 { border-left-color: var(--danger); }
        .task-list-item.p2 { border-left-color: var(--warning); }
        .task-list-item.p3 { border-left-color: var(--accent); }

        /* Arşiv Son Aktivite */
        .latest-activity { background: linear-gradient(135deg, var(--surface2) 0%, rgba(46,204,113,0.05) 100%); border: 1px solid var(--accent); padding: 20px; border-radius: 6px; margin-bottom: 2rem; position: relative; }
        .latest-badge { position: absolute; top: -10px; left: 15px; background: var(--accent); color: #000; padding: 4px 10px; font-size: 0.65rem; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

<div class="container">
    <div class="header-block">
        <h1><i class="fa-solid fa-terminal"></i> Matrix</h1>
        <div style="font-size: 0.65rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase;">terminal mod: revize v3 (Takvim Aktif)</div>
    </div>

    <div class="kunye-block">
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-label">Kayıt Sayısı</div>
                <div class="stat-content" id="stat-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Aktif Görevler</div>
                <div class="stat-content" id="stat-active">0</div>
            </div>
            <div class="stat-item danger-border">
                <div class="stat-label" style="color:var(--danger)">Kritik Durum</div>
                <div class="stat-content" style="color:var(--danger)" id="stat-critical">0</div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="globalSearch" class="search-input" placeholder="Veri tabanında ara...">
        </div>

        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;">
            <div style="display:flex; border:1px solid var(--border); background:var(--bg); border-radius:4px;">
                <button class="view-btn active" data-view="weekly"><i class="fa-solid fa-calendar-week"></i> HAFTALIK</button>
                <button class="view-btn" data-view="monthly"><i class="fa-solid fa-calendar-days"></i> AYLIK</button>
                <button class="view-btn" data-view="list"><i class="fa-solid fa-box-archive"></i> ARŞİV</button>
                <button class="view-btn" data-view="extra"><i class="fa-solid fa-layer-group"></i> EKSTRA</button>
            </div>
            
            <div id="dateNavigation" style="display:flex; border:1px solid var(--border); background:var(--bg); border-radius:4px;">
                <button id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="currentRange" style="min-width:140px; pointer-events:none; color:var(--accent);"></button>
                <button id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <main id="mainContent"></main>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <div class="modal-block">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <div id="modalTitle" style="color:var(--accent); font-size:1.2rem; font-weight:bold; font-family:'Orbitron';">YENİ GİRİŞ</div>
                <i class="fa-solid fa-times" id="closeModal" style="cursor:pointer; font-size:1.5rem; color:var(--text2);"></i>
            </div>
            
            <div id="modalDateDisplay" style="margin-bottom:10px; font-size:0.8rem; color:var(--text2);"></div>
            <input type="text" id="dayTitle" class="day-title-input" placeholder="Gün Özeti / Notlar">
            
            <div style="display:flex; gap:10px; margin-bottom:1rem;">
                <button class="habit-btn" id="h_zihin" data-habit="zihin"><i class="fa-solid fa-brain"></i> ZİHİN</button>
                <button class="habit-btn" id="h_spor" data-habit="spor"><i class="fa-solid fa-running"></i> SPOR</button>
                <button class="habit-btn" id="h_okuma" data-habit="okuma"><i class="fa-solid fa-book"></i> OKUMA</button>
            </div>
        </div>
        
        <div style="text-align:right;">
            <button id="saveBtn" style="background:var(--accent); color:#000; padding:10px 20px; font-weight:bold; border-radius:4px; margin-left:auto;"><i class="fa-solid fa-save"></i> KAYDET</button>
        </div>
    </div>
</div>

<script>
// --- VERİ MANTIĞI ---
let entries = [
    { title: "Sistem Kurulumu", desc: "Arayüz güncellemeleri tamamlandı.", habits: ['zihin', 'okuma'], tasks: [{text:"Backend entegrasyonu", p:1}], date: "2026-04-06" } // Örnek veri (Pazartesi)
];

let currentView = 'weekly';
let extraFilter = 'all';
let currentBaseDate = new Date(); // Takvimi hesaplamak için baz alınan tarih
let targetEditDate = ""; // Modala gönderilecek olan tarih

const daysTr = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];

// Elementler
const mainContent = document.getElementById('mainContent');
const searchInput = document.getElementById('globalSearch');
const currentRangeText = document.getElementById('currentRange');
const dateNav = document.getElementById('dateNavigation');
const modal = document.getElementById('entryModal');

// Tarih Formatlayıcı (YYYY-MM-DD)
const fmt = (d) => {
    const offset = d.getTimezoneOffset() * 60000;
    return (new Date(d - offset)).toISOString().split('T')[0];
};

window.showToast = (msg, type = 'success') => {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fa-solid fa-check-circle" style="color:var(--accent)"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
};

// İstatistikleri Güncelle
function updateStats() {
    document.getElementById('stat-count').innerText = entries.length;
    let activeTasks = 0; let criticalTasks = 0;
    entries.forEach(e => {
        if(e.tasks) { activeTasks += e.tasks.length; criticalTasks += e.tasks.filter(t => t.p === 1).length; }
    });
    document.getElementById('stat-active').innerText = activeTasks;
    document.getElementById('stat-critical').innerText = criticalTasks;
}

// Görünüm Render Motoru
function render() {
    mainContent.innerHTML = "";
    let searchTerm = searchInput.value.toLowerCase();
    
    // Takvim görünümlerinde tarih navigasyonunu göster, arşiv/ekstrada gizle
    dateNav.style.display = (currentView === 'weekly' || currentView === 'monthly') ? 'flex' : 'none';

    if (currentView === 'weekly') {
        renderCalendar(7);
    } 
    else if (currentView === 'monthly') {
        renderCalendar(30); // Basitlik için 30 günlük grid
    } 
    else if (currentView === 'list') {
        renderArchive(searchTerm);
    } 
    else if (currentView === 'extra') {
        renderExtra(searchTerm);
    }
    updateStats();
}

// TAKVİM OLUŞTURUCU (Haftalık ve Aylık)
function renderCalendar(daysCount) {
    // Hafta başını hesapla (Pazartesi)
    let startD = new Date(currentBaseDate);
    if(daysCount === 7) {
        let day = startD.getDay();
        let diff = startD.getDate() - day + (day === 0 ? -6 : 1);
        startD.setDate(diff);
        
        let endD = new Date(startD);
        endD.setDate(startD.getDate() + 6);
        currentRangeText.innerText = `${startD.getDate()} - ${endD.getDate()} ${startD.toLocaleString('tr-TR', { month: 'short' })}`;
    } else {
        startD.setDate(1); // Ayın 1'i
        currentRangeText.innerText = `${startD.toLocaleString('tr-TR', { month: 'long', year:'numeric' })}`;
    }

    const grid = document.createElement('div');
    grid.className = 'calendar-grid';

    for(let i = 0; i < daysCount; i++) {
        let currentDay = new Date(startD);
        currentDay.setDate(startD.getDate() + i);
        let dateStr = fmt(currentDay);
        let dayName = daysTr[currentDay.getDay()];
        let dayNum = currentDay.getDate();

        // Bu güne ait kayıt var mı?
        let entry = entries.find(e => e.date === dateStr);

        if(entry) {
            let habitHtml = entry.habits ? entry.habits.map(h => {
                let icon = h === 'zihin' ? 'fa-brain' : (h === 'spor' ? 'fa-running' : 'fa-book');
                return `<div class="habit-icon"><i class="fa-solid ${icon}"></i></div>`;
            }).join('') : '';

            grid.innerHTML += `
                <div class="day-card recorded" onclick="openModal('${dateStr}', true)">
                    <div class="day-header"><span>${dayName}</span> <span>${dayNum}</span></div>
                    <div class="day-title">${entry.title}</div>
                    <div class="day-desc">${entry.desc || ''}</div>
                    <div class="habit-icons">${habitHtml}</div>
                </div>
            `;
        } else {
            // Boş Gün - Tıklayınca not ekle
            grid.innerHTML += `
                <div class="day-card" onclick="openModal('${dateStr}', false)">
                    <div class="day-header"><span>${dayName}</span> <span>${dayNum}</span></div>
                    <i class="fa-solid fa-plus empty-icon"></i>
                </div>
            `;
        }
    }
    mainContent.appendChild(grid);
}

// ARŞİV GÖRÜNÜMÜ
function renderArchive(searchTerm) {
    let filtered = entries.filter(e => e.title.toLowerCase().includes(searchTerm) || (e.desc && e.desc.toLowerCase().includes(searchTerm)));
    
    if(filtered.length > 0) {
        let latest = filtered[filtered.length - 1];
        mainContent.innerHTML += `
            <div class="latest-activity">
                <div class="latest-badge"><i class="fa-solid fa-bolt"></i> EN SON AKTİVİTE</div>
                <h2 style="color:var(--accent); font-family:'Orbitron'; margin-top:5px;">${latest.title}</h2>
                <p style="color:var(--text2); margin-bottom:10px;">${latest.desc || ''}</p>
                <span style="font-size:0.8rem; background:var(--surface); padding:4px 8px; border-radius:4px;"><i class="fa-regular fa-calendar"></i> ${latest.date}</span>
            </div>
            <div class="kunye-label">// GEÇMİŞ KAYITLAR</div>
        `;
        
        filtered.slice().reverse().forEach((entry, idx) => {
            if(idx === 0 && searchTerm === "") return; // Sonuncuyu tekrar basma
            mainContent.innerHTML += `
                <div class="task-list-item">
                    <div>
                        <strong style="color:var(--accent)">${entry.title}</strong>
                        <div style="font-size:0.75rem; color:var(--text2); margin-top:4px;">${entry.desc || ''}</div>
                    </div>
                    <div style="font-size:0.7rem;">${entry.date}</div>
                </div>
            `;
        });
    } else {
        mainContent.innerHTML = "<p style='color:var(--text2);'>Kayıt bulunamadı.</p>";
    }
}

// EKSTRA GÖRÜNÜMÜ (Görevler)
function renderExtra(searchTerm) {
    mainContent.innerHTML += `
        <div class="extra-filter-bar">
            <span style="font-size:0.8rem; color:var(--text2);">Filtrele: </span>
            <button class="extra-filter-btn ${extraFilter === 'all' ? 'active' : ''}" onclick="setExtraFilter('all')">TÜMÜ</button>
            <button class="extra-filter-btn ${extraFilter === 1 ? 'active' : ''}" onclick="setExtraFilter(1)" style="${extraFilter === 1 ? 'color:var(--danger); border-color:var(--danger);' : ''}">KRİTİK</button>
        </div>
    `;

    let allTasks = [];
    entries.forEach(e => {
        if(e.tasks) e.tasks.forEach(t => allTasks.push({ ...t, parentDate: e.date, parentTitle: e.title }));
    });

    if(extraFilter !== 'all') allTasks = allTasks.filter(t => t.p === extraFilter);
    allTasks = allTasks.filter(t => t.text.toLowerCase().includes(searchTerm));

    allTasks.forEach(task => {
        let pClass = task.p === 1 ? 'p1' : (task.p === 2 ? 'p2' : 'p3');
        mainContent.innerHTML += `
            <div class="task-list-item ${pClass}">
                <div><span style="color:var(--text1);">${task.text}</span>
                <div style="font-size:0.65rem; color:var(--text2); margin-top:5px;"><i class="fa-solid fa-link"></i> ${task.parentTitle} (${task.parentDate})</div></div>
            </div>
        `;
    });
}

// Tarihe Göre Modal Aç
window.openModal = function(dateStr, hasData) {
    targetEditDate = dateStr;
    document.getElementById('modalDateDisplay').innerHTML = `<i class="fa-regular fa-calendar"></i> Hedef Tarih: <b>${dateStr}</b>`;
    
    // Formu temizle
    document.getElementById('dayTitle').value = "";
    document.querySelectorAll('.habit-btn').forEach(b => b.classList.remove('active'));

    // Eğer veri varsa doldur (Düzenleme)
    if(hasData) {
        let entry = entries.find(e => e.date === dateStr);
        document.getElementById('dayTitle').value = entry.title;
        if(entry.habits) {
            entry.habits.forEach(h => {
                let btn = document.getElementById('h_' + h);
                if(btn) btn.classList.add('active');
            });
        }
    }
    
    modal.classList.add('active');
};

// Kaydet Butonu
document.getElementById('saveBtn').addEventListener('click', () => {
    const title = document.getElementById('dayTitle').value || 'Not';
    const activeHabits = Array.from(document.querySelectorAll('.habit-btn.active')).map(b => b.dataset.habit);

    // O tarihte kayıt varsa güncelle, yoksa ekle
    let existingIndex = entries.findIndex(e => e.date === targetEditDate);
    if(existingIndex > -1) {
        entries[existingIndex].title = title;
        entries[existingIndex].habits = activeHabits;
    } else {
        entries.push({ title: title, desc: "", habits: activeHabits, tasks: [], date: targetEditDate });
    }
    
    modal.classList.remove('active');
    showToast('Kayıt sisteme işlendi.');
    render();
});

// Tarih Gezinme
document.getElementById('prevBtn').addEventListener('click', () => {
    let offset = currentView === 'weekly' ? -7 : -30;
    currentBaseDate.setDate(currentBaseDate.getDate() + offset);
    render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
    let offset = currentView === 'weekly' ? 7 : 30;
    currentBaseDate.setDate(currentBaseDate.getDate() + offset);
    render();
});

// Event Listeners
searchInput.addEventListener('input', () => render());
document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        currentView = e.currentTarget.dataset.view;
        render();
    });
});
document.querySelectorAll('.habit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => e.currentTarget.classList.toggle('active'));
});
document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('active'));
window.setExtraFilter = function(level) { extraFilter = level; render(); };

// İlk Çalıştırma
render();

</script>
</body>
</html>
