<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATRIX JOURNAL V5</title><style>
body{margin:0;font-family:monospace;background:#0e0e11;color:#eee}
.container{padding:1rem}
.task{padding:8px;border-bottom:1px solid #222;cursor:pointer}
.done{text-decoration:line-through;opacity:.5}
.dashboard{padding:10px;border:1px solid #222;margin-bottom:10px}
#atomicFeed{position:fixed;bottom:0;width:100%;background:#111;padding:8px;font-size:12px;white-space:nowrap;overflow-x:auto}
.fab{position:fixed;bottom:60px;right:20px;background:#00e676;color:#000;border:none;padding:15px;border-radius:50%}
</style></head><body><div class="container">
<h2>MATRIX JOURNAL V5</h2><div id="dashboard"></div>
<div id="tasks"></div></div><div id="atomicFeed"></div>
<button class="fab" onclick="quickAdd()">+</button><script>

let data = JSON.parse(localStorage.getItem('mjv5')||'{}');

function save(){localStorage.setItem('mjv5',JSON.stringify(data))}

function today(){return new Date().toISOString().split('T')[0]}

function get(){return data[today()]||{tasks:[],atomicNotes:[],mood:'neutral'}}

function set(e){data[today()]=e;save();render()}

// 🔥 SCORE
function calcScore(e){
 let s=0;
 e.tasks.forEach(t=>{if(t.done)s+=10});
 if(e.text)s+=5;
 if(e.mood==='good')s+=5;
 if(e.mood==='bad')s-=5;
 return s;
}

// 🔥 RENDER
function render(){
 let e=get();

 document.getElementById('dashboard').innerHTML=`
 <div class="dashboard">
 <b>SCORE:</b> ${calcScore(e)}<br>
 ${e.tasks.filter(t=>t.done).length}/${e.tasks.length} görev tamamlandı
 </div>`;

 let html='';
 e.tasks.forEach((t,i)=>{
 html+=`<div class="task ${t.done?'done':''}" onclick="toggle(${i})">${t.text}</div>`
 });

 document.getElementById('tasks').innerHTML=html;

 renderFeed();
}

// ✔ TASK TOGGLE
function toggle(i){
 let e=get();
 e.tasks[i].done=!e.tasks[i].done;
 set(e);
}

// ⚡ QUICK ADD
function quickAdd(){
 let t=prompt('Görev gir');
 if(!t)return;
 let e=get();
 e.tasks.push({text:t,done:false});
 set(e);
}

// 🔀 ATOMIC FEED
function renderFeed(){
 let notes=[];
 Object.values(data).forEach(d=>{
  if(d.atomicNotes)notes.push(...d.atomicNotes);
 });

 notes.sort(()=>Math.random()-0.5);

 document.getElementById('atomicFeed').innerHTML=
 notes.slice(0,10).join(' • ') || 'Atomic not yok';
}

render();

</script></body>
</html>
