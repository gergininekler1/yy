<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX - FINAL FIX v47 (Prioritized)</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #2ecc71; 
            --accent-dim: rgba(46, 204, 113, 0.1);
            --danger: #e74c3c;
            /* Grid Background Colors */
            --bg-grid: #0d0d0d;
            --bg-grid-lines: #161616;
            --bg: var(--bg-grid);
            --surface: #161616; --surface2: #1f1f1f;
            --border: #2a2a2a; --text1: #d1d1d1; --text2: #777;
        }

        [data-theme="light"] {
            --bg-grid: #f4f4f7;
            --bg-grid-lines: #ebebef;
            --bg: var(--bg-grid);
            --surface: #ffffff; --surface2: #ebebef;
            --border: #d1d1d1; --text1: #222; --text2: #666;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        
        /* Grid Background Pattern */
        body {
            background-color: var(--bg-grid);
            background-image: 
                linear-gradient(var(--bg-grid-lines) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid-lines) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text1); transition: 0.3s; padding: 1rem; line-height: 1.4;
        }
        
        .container { max-width: 1100px; margin: 0 auto; }

        header { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface); position: relative; }
        .theme-icon { position: absolute; top: 1.5rem; right: 1.5rem; cursor: pointer; color: var(--text2); font-size: 1.2rem; }
        
        h1 { font-family: 'Orbitron'; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; font-size: 1.8rem; }
        .sub-title { font-size: 0.65rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }
        
        .kunye-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; opacity: 0.7; }
        .sub-header-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
        .stat-item { background: var(--surface2); padding: 10px; border-left: 2px solid var(--accent); }
        .stat-label { color: var(--text2); font-size: 0.55rem; text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }

        .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent); padding: 12px; font-size: 0.8rem; margin-bottom: 1rem; }

        .nav-controls { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .group { display: flex; border: 1px solid var(--border); background: var(--bg); }
        
        button { background: transparent; border: none; color: var(--text2); padding: 8px 14px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        button.active { background: var(--accent); color: #000; font-weight: bold; }

        /* VIEWS */
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .day-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; cursor: pointer; position: relative; min-height: 120px; }
        .habit-circle { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; border: 1px solid var(--border); border-radius: 50%; }
        .habit-circle.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); border: none; }

        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); }
        .month-day { background: var(--surface); aspect-ratio: 1.2; padding: 5px; cursor: pointer; font-size: 0.7rem; }
        .month-day.other-month { opacity: 0.2; }
        .month-day.has-entry { border-left: 2px solid var(--accent); }

        /* EDITOR & RENDER */
        .editor-toolbar { display: flex; gap: 5px; background: var(--surface2); padding: 5px; border: 1px solid var(--border); border-bottom: none; }
        .tool-btn { padding: 4px 8px; font-size: 0.65rem; border: 1px solid var(--border); cursor: pointer; color: var(--text2); }
        
        /* contenteditable div style, replacing textarea */
        [contenteditable] { width: 100%; min-height: 180px; background: var(--bg); border: 1px solid var(--border); color: var(--text1); padding: 12px; resize: vertical; overflow-y: auto; }
        
        .rendered h1, .rendered h2 { color: var(--accent); margin: 5px 0; }
        .rendered b { color: #fff; }
        .rendered .hl { color: var(--accent); }

        /* MODAL */
        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 2rem; }

        .habit-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .habit-btn { flex: 1; border: 1px solid var(--border); padding: 10px; font-size: 0.65rem; cursor: pointer; text-align: center; color: var(--text2); }
        .habit-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        .list-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); padding: 6px 10px; margin-bottom: 3px; font-size: 0.8rem; }
        
        /* Priority tags in task pool and modal */
        .priority-tag { font-size: 0.55rem; padding: 2px 4px; border-radius: 2px; text-transform: uppercase; font-weight: bold; }
        .priority-1 { background-color: var(--danger); color: #fff; } /* High */
        .priority-2 { background-color: #f1c40f; color: #000; } /* Medium */
        .priority-3 { background-color: var(--accent); color: #000; } /* Low */
        
        /* Filter buttons in Ekstra view */
        .filter-btn { border: 1px solid var(--border); color: var(--text2); font-size: 0.6rem; padding: 4px 8px; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        .fab { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="theme-icon" id="themeToggle"><i class="fa-solid fa-moon"></i></div>
        <h1><i class="fa-solid fa-terminal" style="margin-right: 10px;"></i>Matrix</h1>
        <div class="sub-title">terminal mod: günlük</div>

        <div class="kunye-label" style="margin-top:20px">// KÜNYE</div>
        <div class="sub-header-row">
            <button id="exportBtn"><i class="fa-solid fa-download"></i> [EXPORT]</button>
            <button id="importBtn"><i class="fa-solid fa-upload"></i> [IMPORT]</button>
            <input type="file" id="fileInput" hidden>
        </div>

        <div class="stats-bar" id="statsBar"></div>

        <div class="search-container">
            <input type="text" id="globalSearch" class="search-input" placeholder="Sistemde ara...">
        </div>

        <div class="nav-controls">
            <div class="group">
                <button class="view-btn active" data-view="weekly">HAFTALIK</button>
                <button class="view-btn" data-view="monthly">AYLIK</button>
                <button class="view-btn" data-view="list">ARŞİV</button>
                <button class="view-btn" data-view="extra">EKSTRA</button>
            </div>
            <div class="group">
                <button id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="currentRange" style="min-width: 140px; pointer-events: none;"></button>
                <button id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </header>

    <main id="mainContent"></main>

    <footer>
        <div id="randomAtomicArea" style="max-width:600px; margin: 3rem auto 0; color:var(--text2); font-style:italic; font-size:0.8rem; border-left:2px solid var(--accent); padding-left:15px;">Sistem yükleniyor...</div>
    </footer>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Orbitron'; color:var(--accent); margin-bottom: 1.5rem;">00-00-0000</h2>
        
        <div class="habit-row">
            <div class="habit-btn" id="h_demir" onclick="toggleHabit('demir')"><i class="fa-solid fa-brain"></i> ZİHİN</div>
            <div class="habit-btn" id="h_spor" onclick="toggleHabit('spor')"><i class="fa-solid fa-dumbbell"></i> SPOR</div>
            <div class="habit-btn" id="h_okuma" onclick="toggleHabit('okuma')"><i class="fa-solid fa-book-open"></i> OKUMA</div>
        </div>

        <div style="color:var(--text2); font-size:0.6rem; margin-bottom:5px;">// GÖREVLER</div>
        <div id="modalTasks" style="margin-bottom:10px"></div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="taskInput" placeholder="Görev ekle..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:8px;">
            <select id="taskPrioritySelect" style="background:var(--bg); border:1px solid var(--border); color:var(--accent); padding:8px; font-size:0.7rem;">
                <option value="3">Düşük</option>
                <option value="2">Orta</option>
                <option value="1">Yüksek</option>
            </select>
            <button onclick="addTask()" style="border:1px solid var(--accent); color:var(--accent)">EKLE</button>
        </div>

        <div style="color:var(--text2); font-size:0.6rem; margin-bottom:5px;">// ATOMİK NOTLAR</div>
        <div id="modalAtomics" style="margin-bottom:10px"></div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="atomicInput" placeholder="Atomik not..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:8px;">
            <button onclick="addAtomic()" style="border:1px solid #40c4ff; color:#40c4ff">EKLE</button>
        </div>

        <div class="editor-toolbar">
            <div class="tool-btn" onclick="wrap('bold')">B</div>
            <div class="tool-btn" onclick="wrap('italic')">I</div>
            <div class="tool-btn" onclick="wrap('formatBlock', '<h1>')">H1</div>
            <div class="tool-btn" onclick="wrap('foreColor', var(--accent))">YEŞİL</div>
        </div>
        <div id="entryTextEditor" contenteditable="true"></div>

        <div style="display:flex; gap:10px; margin-top:2rem;">
            <button id="saveBtn" style="flex:2; background:var(--accent); color:#000; font-weight:bold;">KAYDET</button>
            <button id="closeBtn" style="flex:1; border:1px solid var(--border);">İPTAL</button>
        </div>
    </div>
</div>

<div class="fab" id="fab"><i class="fa-solid fa-plus"></i></div>

<script>
const state = {
    entries: JSON.parse(localStorage.getItem('matrix_v47_data') || '{}'),
    view: 'weekly', cursor: new Date(), selectedDate: null,
    temp: { tasks: [], habits: [], atomics: [] }, searchQuery: '',
    currentTaskFilter: 'all'
};

const save = () => localStorage.setItem('matrix_v47_data', JSON.stringify(state.entries));
const fmt = (d) => d.toISOString().split('T')[0];

const getPriorityLabel = (p) => ['Yüksek', 'Orta', 'Düşük'][p-1];

/* VIEWS */
const render = () => {
    const main = document.getElementById('mainContent');
    main.innerHTML = '';
    if(state.view === 'weekly') renderWeekly(main);
    else if(state.view === 'monthly') renderMonthly(main);
    else if(state.view === 'list') renderArchive(main);
    else if(state.view === 'extra') renderExtra(main);
    updateStats();
    renderRandomNote();
};

const renderWeekly = (el) => {
    const start = new Date(state.cursor);
    start.setDate(start.getDate() - (start.getDay() || 7) + 1);
    document.getElementById('currentRange').textContent = `${start.getDate()} - ${new Date(new Date(start).setDate(start.getDate()+6)).getDate()} ${start.toLocaleString('tr-TR', {month:'short'})}`;
    const grid = document.createElement('div'); grid.className = 'weekly-grid';
    for(let i=0; i<7; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const ds = fmt(d); const e = state.entries[ds];
        const content = e?.text ? e.text.substring(0, 60).replace(/<[^>]+>/g, '') : '...'; // Basic tag stripping for preview
        grid.innerHTML += `
            <div class="day-card" onclick="openEntry('${ds}')">
                <div class="habit-circle ${e?.habits?.includes('demir') ? 'active' : ''}"></div>
                <div style="color:var(--accent); font-family:'Orbitron'">${d.getDate()} <span style="font-size:0.6rem; color:var(--text2)">${d.toLocaleDateString('tr-TR',{weekday:'short'})}</span></div>
                <div class="rendered" style="font-size:0.75rem; margin-top:10px">${content}</div>
            </div>`;
    }
    el.appendChild(grid);
};

const renderMonthly = (el) => {
    const y = state.cursor.getFullYear(), m = state.cursor.getMonth();
    document.getElementById('currentRange').textContent = state.cursor.toLocaleString('tr-TR', {month:'long', year:'numeric'});
    const grid = document.createElement('div'); grid.className = 'month-grid';
    const first = new Date(y, m, 1);
    const offset = (first.getDay() || 7) - 1;
    for(let i=0; i<42; i++) {
        const d = new Date(y, m, i - offset + 1);
        const ds = fmt(d);
        grid.innerHTML += `<div class="month-day ${d.getMonth()!==m?'other-month':''} ${state.entries[ds]?'has-entry':''}" onclick="openEntry('${ds}')">${d.getDate()}</div>`;
    }
    el.appendChild(grid);
};

const renderArchive = (el) => {
    Object.keys(state.entries).sort().reverse().forEach(d => {
        const e = state.entries[d];
        el.innerHTML += `<div class="day-card" style="margin-bottom:10px" onclick="openEntry('${d}')">
            <b style="color:var(--accent)">${d}</b>
            <div class="rendered" style="font-size:0.8rem; margin-top:5px; opacity:0.8">${e.text}</div>
        </div>`;
    });
};

const renderExtra = (el) => {
    const all = Object.entries(state.entries);
    const countHabit = (h, list) => list.filter(([d, e]) => e.habits?.includes(h)).length;
    
    const now = new Date();
    const thisWeek = all.filter(([d]) => {
        const dd = new Date(d);
        const s = new Date(now); s.setDate(now.getDate() - (now.getDay() || 7) + 1);
        return dd >= s;
    });

    const priorityCounts = all.flatMap(([d, e]) => e.tasks || []).reduce((sums, task) => {
        const p = task.priority || 3;
        sums[p] = (sums[p] || 0) + 1;
        return sums;
    }, {});

    el.innerHTML = `
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-label">BU HAFTA HABITS</div>Spor: ${countHabit('spor', thisWeek)} | Okuma: ${countHabit('okuma', thisWeek)}</div>
            <div class="stat-item"><div class="stat-label">GENEL HABITS</div>Spor: ${countHabit('spor', all)} | Okuma: ${countHabit('okuma', all)}</div>
            <div class="stat-item"><div class="stat-label">GÖREV ÖNCELİKLERİ</div>Hi: ${priorityCounts[1] || 0} | Med: ${priorityCounts[2] || 0} | Low: ${priorityCounts[3] || 0}</div>
        </div>
        <div class="kunye-label" style="margin-top:20px">// ÖNCELİKLİ GÖREV HAVUZU (SIRALANMIŞ / FİLTRELİ)</div>
        <div class="filter-row" style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="filter-btn ${state.currentTaskFilter === 'all' ? 'active' : ''}" onclick="setTaskFilter('all')">TÜMÜ</button>
            <button class="filter-btn ${state.currentTaskFilter === '1' ? 'active' : ''}" onclick="setTaskFilter('1')">YÜKSEK</button>
            <button class="filter-btn ${state.currentTaskFilter === '2' ? 'active' : ''}" onclick="setTaskFilter('2')">ORTA</button>
            <button class="filter-btn ${state.currentTaskFilter === '3' ? 'active' : ''}" onclick="setTaskFilter('3')">DÜŞÜK</button>
        </div>
        <div id="pool" style="margin-top:10px"></div>
    `;
    const pool = el.querySelector('#pool');
    
    const allSortedTasks = all.flatMap(([d, e]) => (e.tasks || []).map(t => ({...t, date: d})))
                             .filter(t => state.currentTaskFilter === 'all' || t.priority == state.currentTaskFilter)
                             .sort((a, b) => (a.priority || 3) - (b.priority || 3) || a.date.localeCompare(b.date)); // Priority first, then date

    allSortedTasks.forEach(t => {
        pool.innerHTML += `<div class="list-row" style="opacity:${t.done?0.4:1}">
            [${t.date}] <span class="priority-tag priority-${t.priority || 3}">[${getPriorityLabel(t.priority || 3)}]</span> ${t.text}
        </div>`;
    });
};

/* LOGIC */
window.openEntry = (date) => {
    state.selectedDate = date;
    const e = state.entries[date] || { text:'', habits:[], tasks:[], atomics:[] };
    state.temp = { tasks: [...(e.tasks || [])], habits: [...(e.habits || [])], atomics: [...(e.atomics || [])] };
    document.getElementById('modalTitle').textContent = date;
    document.getElementById('entryTextEditor').innerHTML = e.text || ''; // Load HTML into contenteditable
    renderModalTemp();
    document.getElementById('entryModal').classList.add('active');
};

const renderModalTemp = () => {
    ['demir','spor','okuma'].forEach(h => document.getElementById(`h_${h}`).classList.toggle('active', state.temp.habits.includes(h)));
    document.getElementById('modalTasks').innerHTML = state.temp.tasks.map((t,i) => `<div class="list-row">
        <input type="checkbox" ${t.done?'checked':''} onchange="state.temp.tasks[${i}].done=!state.temp.tasks[${i}].done">
        <span class="priority-tag priority-${t.priority || 3}">[${getPriorityLabel(t.priority || 3)}]</span>
        <span style="flex:1">${t.text}</span>
    </div>`).join('');
    document.getElementById('modalAtomics').innerHTML = state.temp.atomics.map((a,i) => `<div class="list-row" style="border-left:2px solid #40c4ff"><span>${a}</span></div>`).join('');
};

window.addTask = () => {
    const i = document.getElementById('taskInput');
    const p = document.getElementById('taskPrioritySelect').value;
    if(i.value){
        state.temp.tasks.push({text:i.value, done:false, priority: parseInt(p)});
        i.value='';
        document.getElementById('taskPrioritySelect').value = '3'; // Reset to low
        renderModalTemp();
    }
};
window.addAtomic = () => { const i = document.getElementById('atomicInput'); if(i.value){state.temp.atomics.push(i.value); i.value=''; renderModalTemp();} };
window.toggleHabit = (h) => { const idx = state.temp.habits.indexOf(h); if(idx>-1) state.temp.habits.splice(idx,1); else state.temp.habits.push(h); renderModalTemp(); };

// Updated wrap function for contenteditable using execCommand
window.wrap = (cmd, val=null) => {
    document.execCommand(cmd, false, val);
};

window.setTaskFilter = (f) => {
    state.currentTaskFilter = f;
    render();
};

document.getElementById('saveBtn').onclick = () => {
    const text = document.getElementById('entryTextEditor').innerHTML; // Save HTML
    state.entries[state.selectedDate] = { text: text, habits: state.temp.habits, tasks: state.temp.tasks, atomics: state.temp.atomics };
    save(); document.getElementById('entryModal').classList.remove('active'); render();
};

const updateStats = () => {
    const all = Object.values(state.entries);
    const active = all.reduce((s, e) => s + (e.tasks?.filter(t => !t.done).length || 0), 0);
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="stat-label">KAYIT</div>${all.length}</div>
        <div class="stat-item"><div class="stat-label">AKTİF GÖREV</div>${active}</div>
        <div class="stat-item"><div class="stat-label">DEMİR ZİHİN</div>${all.filter(e=>e.habits?.includes('demir')).length}</div>
    `;
};

const renderRandomNote = () => {
    const pool = Object.values(state.entries).flatMap(e => e.atomics || []);
    if(pool.length) document.getElementById('randomAtomicArea').textContent = `"${pool[Math.floor(Math.random()*pool.length)]}"`;
};

document.querySelectorAll('.view-btn').forEach(b => b.onclick = () => { document.querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); state.view = b.dataset.view; render(); });
document.getElementById('prevBtn').onclick = () => { if(state.view==='monthly') state.cursor.setMonth(state.cursor.getMonth()-1); else state.cursor.setDate(state.cursor.getDate()-7); render(); };
document.getElementById('nextBtn').onclick = () => { if(state.view==='monthly') state.cursor.setMonth(state.cursor.getMonth()+1); else state.cursor.setDate(state.cursor.getDate()+7); render(); };
document.getElementById('themeToggle').onclick = () => { const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme', t); document.getElementById('themeToggle').innerHTML = t==='dark'?'<i class="fa-solid fa-moon"></i>':'<i class="fa-solid fa-sun"></i>'; };
document.getElementById('exportBtn').onclick = () => { const b = new Blob([JSON.stringify(state.entries)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='matrix_v47.json'; a.click(); };
document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => { const r = new FileReader(); r.onload=(ev)=>{state.entries=JSON.parse(ev.target.result); render();}; r.readAsText(e.target.files[0]); };
document.getElementById('closeBtn').onclick = () => document.getElementById('entryModal').classList.remove('active');
document.getElementById('fab').onclick = () => openEntry(fmt(new Date()));

render();
</script>
</body>
</html>
