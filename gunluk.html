<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX v53</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #2ecc71;
            --accent-dim: rgba(46, 204, 113, 0.1);
            --danger: #e74c3c;
            --danger-muted: rgba(231, 76, 60, 0.25);
            --bg-grid: #0d0d0d;
            --bg-grid-lines: #161616;
            --bg: var(--bg-grid);
            --surface: #161616; --surface2: #1f1f1f;
            --border: #2a2a2a; --text1: #d1d1d1; --text2: #666;
            --warning: #f1c40f;
            --pr-high: #e74c3c;
            --pr-mid: #e8a838;
            --pr-low: #2ecc71;
        }
        [data-theme="light"] {
            --bg-grid: #f4f4f7; --bg-grid-lines: #e8e8ec;
            --bg: var(--bg-grid);
            --surface: #ffffff; --surface2: #ebebef;
            --border: #d1d1d1; --text1: #222; --text2: #888;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        body { background-color: var(--bg-grid); background-image: linear-gradient(var(--bg-grid-lines) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid-lines) 1px, transparent 1px); background-size: 20px 20px; color: var(--text1); padding: 1rem; }

        .container { max-width: 1100px; margin: 0 auto; }
        .header-block { border: 1px solid var(--border); padding: 1rem 1.5rem; margin-bottom: 0.5rem; background: var(--surface); position: relative; }
        h1 { font-family: 'Orbitron'; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; font-size: 1.8rem; }

        .kunye-block { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface); }
        .kunye-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
        .stat-item { background: var(--surface2); padding: 10px; border-left: 2px solid var(--accent); border-radius: 4px; }
        .stat-label { color: var(--text2); font-size: 0.55rem; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }

        /* Active tasks mini list */
        .active-task-row { display: flex; align-items: center; gap: 7px; padding: 4px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
        .active-task-row:last-child { border-bottom: none; }
        .active-task-row:hover { opacity: 0.75; }
        .active-task-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .active-task-date { font-size: 0.55rem; color: var(--text2); flex-shrink: 0; min-width: 38px; }
        .active-task-text { font-size: 0.65rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text1); padding: 12px; font-size: 0.8rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text2); }

        button { background: transparent; border: none; color: var(--text2); padding: 8px 14px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
        button.active { background: var(--accent); color: #000; font-weight: bold; }

        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .day-card { background: var(--surface); padding: 15px; cursor: pointer; position: relative; min-height: 120px; border-radius: 4px; overflow: hidden; border-left: 4px solid var(--border); transition: border-color 0.2s, transform 0.15s; }
        .day-card:hover { transform: translateY(-1px); }
        .day-card.recorded { border-left-color: var(--accent); }
        .card-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); opacity: 0.5; transition: width 0.4s ease; }

        .critical-dot { width: 7px; height: 7px; background: var(--danger); border-radius: 50%; display: inline-block; animation: blink 1s infinite; margin-left: 4px; }
        .backup-alert { color: var(--warning); animation: blink 1.5s infinite; font-size: 0.8rem; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg); border: 1px solid var(--border); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; border-radius: 6px; }
        .modal-block { background: var(--surface); border: 1px solid var(--border); padding: 1.2rem; margin-bottom: 1rem; border-radius: 6px; }

        /* Day title input */
        .day-title-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text1); padding: 4px 0 8px; font-size: 0.9rem; outline: none; margin-top: 6px; transition: border-color 0.2s; }
        .day-title-input:focus { border-bottom-color: var(--accent); }
        .day-title-input::placeholder { color: var(--text2); font-size: 0.75rem; }

        /* Habit buttons */
        .habit-btn { border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 4px; font-size: 0.65rem; transition: all 0.15s; }
        .habit-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* Priority buttons */
        .pr-btn { border: 1px solid var(--border); border-radius: 4px; font-size: 0.6rem; padding: 5px 10px; transition: all 0.15s; }

        textarea { width: 100%; min-height: 150px; background: var(--bg); border: 1px solid var(--border); color: var(--text1); padding: 10px; resize: vertical; outline: none; border-radius: 4px; }
        textarea:focus { border-color: var(--accent); }

        .list-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); padding: 6px 10px; margin-bottom: 3px; font-size: 0.75rem; border-radius: 3px; }
        .tag-chip { background: var(--surface2); color: var(--accent); padding: 4px 8px; font-size: 0.6rem; border-radius: 4px; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 5px; }

        /* Related notes link */
        .note-link { color: var(--accent); text-decoration: underline; cursor: pointer; font-size: 0.65rem; }

        /* Archive highlight */
        mark { background: rgba(46,204,113,0.2); color: var(--accent); border-radius: 2px; padding: 0 1px; }

        /* Archive filter bar */
        .archive-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
        .filter-btn { border: 1px solid var(--border); color: var(--text2); padding: 3px 10px; font-size: 0.55rem; border-radius: 20px; transition: all 0.15s; }
        .filter-btn.on { border-color: var(--accent); color: var(--accent); }

        .fab { position: fixed; bottom: 2rem; right: 2rem; width: 52px; height: 52px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; z-index: 100; box-shadow: 0 4px 20px rgba(46,204,113,0.3); }

        /* Calendar styles */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
        .cal-header-cell { text-align: center; font-size: 0.5rem; color: var(--text2); padding: 6px 0; letter-spacing: 1px; text-transform: uppercase; }
        .cal-cell { background: var(--surface); border: 1px solid var(--border); min-height: 86px; padding: 6px; border-radius: 4px; cursor: pointer; transition: border-color 0.15s; position: relative; }
        .cal-cell:hover { border-color: var(--accent); }
        .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
        .cal-cell.has-entry { border-left: 2px solid var(--accent); }
        .cal-cell.today { background: rgba(46,204,113,0.06); }
        .cal-day-num { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--text2); margin-bottom: 4px; }
        .cal-cell.has-entry .cal-day-num { color: var(--accent); }
        .cal-cell.today .cal-day-num { color: var(--text1); }
        .cal-habit-row { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
        .cal-habit-pip { width: 14px; height: 14px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; }
        .cal-habit-pip.demir { background: rgba(100,180,255,0.15); color: #64b4ff; }
        .cal-habit-pip.spor { background: rgba(46,204,113,0.15); color: var(--accent); }
        .cal-habit-pip.okuma { background: rgba(241,196,15,0.15); color: var(--warning); }
        .cal-task-bar { margin-top: 4px; background: var(--surface2); height: 2px; border-radius: 1px; overflow: hidden; }
        .cal-task-fill { height: 100%; background: var(--accent); }
        .cal-snippet { font-size: 0.48rem; color: var(--text2); margin-top: 3px; line-height: 1.3; overflow: hidden; max-height: 20px; }
        .cal-month-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 12px; }
        .cal-sum-card { background: var(--surface); border: 1px solid var(--border); border-left: 2px solid var(--accent); padding: 10px 12px; border-radius: 4px; }
        .cal-sum-label { font-size: 0.48rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .cal-sum-val { font-size: 1rem; font-family: 'Orbitron'; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-block">
        <div id="themeToggle" style="position:absolute; top:1rem; right:1.5rem; cursor:pointer; color:var(--text2);"><i class="fa-solid fa-moon"></i></div>
        <h1><i class="fa-solid fa-terminal"></i> Matrix</h1>
        <div style="font-size: 0.6rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;">terminal mod: g\u00fcnl\u00fck v53</div>
    </div>

    <div class="kunye-block">
        <div class="kunye-label">// S\u0130STEM DURUMU</div>
        <div style="display:flex; gap:10px; margin-bottom:1.5rem;">
            <button id="exportBtn"><i class="fa-solid fa-download"></i> [EXPORT] <span id="backupWarning"></span></button>
            <button id="importBtn"><i class="fa-solid fa-upload"></i> [IMPORT]</button>
            <input
