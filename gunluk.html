<!DOCTYPE html><html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATRIX.JOURNAL v5</title><style>
:root{
 --accent:#00e676;--bg:#0e0e11;--surface:#141418;--border:#28282f;--text:#e8e8ec;--sub:#7a7a8c;
}
body{font-family:monospace;background:var(--bg);color:var(--text);margin:0}
.container{padding:1rem}
button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.4rem 0.7rem}
.task{display:flex;gap:0.5rem;padding:0.5rem;border-bottom:1px solid var(--border)}
.done{text-decoration:line-through;opacity:0.5}
#atomicFeed{position:fixed;bottom:0;left:0;width:100%;background:var(--surface);padding:0.5rem;overflow-x:auto;white-space:nowrap}
.score{font-size:1.2rem;color:var(--accent)}
.quick{position:fixed;bottom:70px;right:20px;background:var(--accent);color:#000;padding:10px;border-radius:50%}
</style></head>
<body>
<div class="container">
<h2>MATRIX JOURNAL v5</h2><div id="dashboard"></div>
<div id="tasks"></div></div><div id="atomicFeed"></div>
<button class="quick" onclick="quickAdd()">+</button><script>
let data = JSON.parse(localStorage.getItem('v5')||'{}');

function save(){localStorage.setItem('v5',JSON.stringify(data))}

function today(){return new Date().toISOString().split('T')[0]}

function get(){return data[today()]||{tasks:[],notes:[],mood:'neutral'}}

function set(entry){data[today()]=entry;save();render()}

function calcScore(e){
 let s=0;
 e.tasks.forEach(t=>{if(t.done)s+=10});
 if(e.text)s+=5;
 if(e.mood==='good')s+=5;
 if(e.mood==='bad')s-=5;
 return s;
}

function render(){
 let e=get();

 // dashboard
 document.getElementById('dashboard').innerHTML=`
 <div class="score">SCORE: ${calcScore(e)}</div>
 <div>${e.tasks.filter(t=>t.done).length}/${e.tasks.length} görev</div>`;

 // tasks
 let html='';
 e.tasks.forEach((t,i)=>{
 html+=`<div class="task ${t.done?'done':''}" onclick="toggle(${i})">${t.text}</div>`
 })
 document.getElementById('tasks').innerHTML=html;

 renderFeed();
}

function toggle(i){
 let e=get();
 e.tasks[i].done=!e.tasks[i].done;
 set(e);
}

function quickAdd(){
 let text=prompt('Görev gir');
 if(!text)return;
 let e=get();
 e.tasks.push({text,done:false});
 set(e);
}

function renderFeed(){
 let notes=[];
 Object.values(data).forEach(d=>{if(d.notes)notes.push(...d.notes)});
 notes.sort(()=>Math.random()-0.5);
 document.getElementById('atomicFeed').innerHTML=notes.slice(0,10).join(' • ');
}

render();
</script></body>
</html>
