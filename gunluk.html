<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX - TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Daha soluk, mat terminal yeşili */
            --accent: #2ecc71; 
            --accent-dim: rgba(46, 204, 113, 0.1);
            --danger: #e74c3c;
            --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
            --border: #2a2a2a; --text1: #d1d1d1; --text2: #777;
        }

        [data-theme="light"] {
            --bg: #f4f4f7; --surface: #ffffff; --surface2: #ebebef;
            --border: #d1d1d1; --text1: #222; --text2: #666;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        body { background: var(--bg); color: var(--text1); transition: 0.3s; padding: 1rem; line-height: 1.4; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* ─── KÜNYE & HEADER ─── */
        header { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface); position: relative; }
        .matrix-title-group { margin-bottom: 1.5rem; }
        h1 { font-family: 'Orbitron'; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; line-height: 1; font-size: 1.8rem; }
        .sub-title { font-size: 0.65rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }
        
        .kunye-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; opacity: 0.7; }
        
        .sub-header-row { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
        .stat-item { background: var(--surface2); padding: 10px; border-left: 2px solid var(--accent); position: relative; }
        .stat-label { color: var(--text2); font-size: 0.55rem; text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .stat-label i { opacity: 0.5; }

        /* ARAMA */
        .search-container { margin-bottom: 1rem; }
        .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent); padding: 12px; font-size: 0.8rem; }

        .nav-controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .group { display: flex; border: 1px solid var(--border); background: var(--bg); overflow: hidden; }
        
        button { background: transparent; border: none; color: var(--text2); padding: 8px 14px; cursor: pointer; font-size: 0.7rem; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        button i { opacity: 0.5; font-size: 0.8rem; }
        button:hover { color: var(--accent); background: var(--accent-dim); }
        button.active { background: var(--accent); color: #000; font-weight: bold; }
        button.active i { color: #000; opacity: 1; }

        /* ─── VIEWS ─── */
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .day-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; cursor: pointer; transition: 0.2s; position: relative; }
        .day-card:hover { border-color: var(--accent); background: var(--surface2); }
        .day-card.today { border-color: var(--accent); box-shadow: inset 0 0 10px var(--accent-dim); }
        
        /* Sağ Üst Yuvarlak */
        .habit-circle { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; border: 1px solid var(--border); border-radius: 50%; }
        .habit-circle.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); border: none; }

        .card-header { border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }
        .card-date { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--accent); }

        /* AYLIK TAKVİM */
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); }
        .month-day { background: var(--surface); aspect-ratio: 1.2; padding: 5px; cursor: pointer; font-size: 0.7rem; }
        .month-day:hover { background: var(--accent-dim); color: var(--accent); }
        .month-day.other-month { opacity: 0.2; }
        .month-day.has-entry { border-left: 2px solid var(--accent); }

        /* ─── MODAL ─── */
        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); width: 100%; max-width: 650px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }

        .habit-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .habit-btn { border: 1px solid var(--border); padding: 8px; font-size: 0.65rem; cursor: pointer; flex: 1; text-align: center; }
        .habit-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        textarea { width: 100%; min-height: 150px; background: var(--bg); border: 1px solid var(--border); color: var(--text1); padding: 12px; margin: 10px 0; resize: none; font-size: 0.85rem; }
        .item-list { margin-bottom: 10px; }
        .list-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); padding: 6px 10px; margin-bottom: 3px; font-size: 0.8rem; }
        
        /* ─── FOOTER ─── */
        footer { margin-top: 3rem; padding: 2rem 0; border-top: 1px solid var(--border); }
        .random-note-box { max-width: 600px; margin: 0 auto; color: var(--text2); font-style: italic; font-size: 0.8rem; border-left: 2px solid var(--accent); padding-left: 15px; opacity: 0.8; }

        .fab { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="matrix-title-group">
            <h1><i class="fa-solid fa-terminal" style="font-size: 1.2rem; vertical-align: middle; margin-right: 10px;"></i>Matrix</h1>
            <div class="sub-title">terminal mod: günlük</div>
        </div>

        <div class="kunye-label">// KÜNYE</div>
        
        <div class="sub-header-row">
            <button id="themeToggle"><i class="fa-solid fa-circle-half-stroke"></i> [TEMA]</button>
            <button id="exportBtn"><i class="fa-solid fa-download"></i> [EXPORT]</button>
            <button id="importBtn"><i class="fa-solid fa-upload"></i> [IMPORT]</button>
            <input type="file" id="fileInput" hidden>
        </div>

        <div class="stats-bar" id="statsBar">
            </div>

        <div class="search-container">
            <input type="text" id="globalSearch" class="search-input" placeholder="Sistemde ara (notlar, atomikler, etiketler)...">
        </div>

        <div class="nav-controls">
            <div class="group">
                <button class="view-btn active" data-view="weekly"><i class="fa-solid fa-calendar-week"></i> HAFTALIK</button>
                <button class="view-btn" data-view="monthly"><i class="fa-solid fa-calendar-days"></i> AYLIK</button>
                <button class="view-btn" data-view="list"><i class="fa-solid fa-box-archive"></i> ARŞİV</button>
                <button class="view-btn" data-view="extra"><i class="fa-solid fa-bolt"></i> EKSTRA</button>
            </div>
            <div class="group">
                <button id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="currentRange" style="min-width: 140px; pointer-events: none;"></button>
                <button id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </header>

    <main id="mainContent"></main>

    <footer>
        <div style="font-size: 0.5rem; color: var(--text2); letter-spacing: 4px; margin-bottom: 1rem; text-align:center;">// SINGLE_ATOMIC_HISTORY</div>
        <div id="randomAtomicArea" class="random-note-box">Sistem hazır.</div>
    </footer>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Orbitron'; color:var(--accent); margin-bottom: 1.5rem; font-size: 1.2rem;">00-00-0000</h2>
        
        <div class="habit-row">
            <div class="habit-btn" id="h_demir" onclick="toggleHabit('demir')"><i class="fa-solid fa-brain"></i> ZİHİN</div>
            <div class="habit-btn" id="h_spor" onclick="toggleHabit('spor')"><i class="fa-solid fa-dumbbell"></i> SPOR</div>
            <div class="habit-btn" id="h_okuma" onclick="toggleHabit('okuma')"><i class="fa-solid fa-book-open"></i> OKUMA</div>
        </div>

        <div style="color:var(--text2); font-size:0.6rem; margin-bottom:5px;">// GÖREVLER</div>
        <div id="modalTasks" class="item-list"></div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="taskInput" placeholder="Görev..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:8px;">
            <button onclick="addTask()" style="border:1px solid var(--accent); color:var(--accent); padding:0 15px;">+</button>
        </div>

        <div style="color:var(--text2); font-size:0.6rem; margin-bottom:5px;">// ATOMİK NOTLAR</div>
        <div id="modalAtomics" class="item-list"></div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="atomicInput" placeholder="Kısa not..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:8px;">
            <button onclick="addAtomic()" style="border:1px solid var(--accent); color:var(--accent); padding:0 15px;">+</button>
        </div>

        <textarea id="entryText" placeholder="Sistem günlüğü..."></textarea>

        <div style="color:var(--text2); font-size:0.6rem; margin-bottom:5px;">// ETİKETLER</div>
        <div id="modalTags" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;"></div>
        <input type="text" id="tagInput" placeholder="#etiket..." style="width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:8px;">

        <div style="display:flex; gap:10px; margin-top:2rem;">
            <button id="saveBtn" style="flex:2; background:var(--accent); color:#000; font-weight:bold;">KAYDET</button>
            <button id="closeBtn" style="flex:1; border:1px solid var(--border);">İPTAL</button>
        </div>
    </div>
</div>

<div class="fab" id="fab"><i class="fa-solid fa-plus"></i></div>

<script>
const state = {
    entries: JSON.parse(localStorage.getItem('matrix_v44_data') || '{}'),
    view: 'weekly',
    cursor: new Date(),
    selectedDate: null,
    temp: { tasks: [], habits: [], tags: [], atomics: [] },
    tagFilter: null,
    searchQuery: ''
};

const save = () => localStorage.setItem('matrix_v44_data', JSON.stringify(state.entries));
const fmt = (d) => d.toISOString().split('T')[0];

/* ─── RENDER ENGINE ─── */
const render = () => {
    const main = document.getElementById('mainContent');
    main.innerHTML = '';
    
    if(state.searchQuery) renderSearch(main);
    else if(state.view === 'weekly') renderWeekly(main);
    else if(state.view === 'monthly') renderMonthly(main);
    else if(state.view === 'list') renderList(main);
    else if(state.view === 'extra') renderExtra(main);

    updateStats();
    renderRandomHistory();
};

const renderWeekly = (el) => {
    const start = new Date(state.cursor);
    start.setDate(start.getDate() - (start.getDay() || 7) + 1);
    document.getElementById('currentRange').textContent = `${start.getDate()} - ${new Date(new Date(start).setDate(start.getDate()+6)).getDate()} ${start.toLocaleString('tr-TR', {month:'short'})}`;

    const grid = document.createElement('div');
    grid.className = 'weekly-grid';
    for(let i=0; i<7; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const ds = fmt(d);
        const e = state.entries[ds];
        const hasDemir = e?.habits?.includes('demir');

        grid.innerHTML += `
            <div class="day-card ${ds === fmt(new Date()) ? 'today' : ''}" onclick="openEntry('${ds}')">
                <div class="habit-circle ${hasDemir ? 'active' : ''}"></div>
                <div class="card-header">
                    <div class="card-date">${d.getDate()}</div>
                    <div style="font-size:0.6rem; color:var(--text2)">${d.toLocaleDateString('tr-TR',{weekday:'long'}).toUpperCase()}</div>
                </div>
                <div style="margin:10px 0; font-size:0.75rem; min-height:45px; color:var(--text1)">
                    ${e ? e.text.substring(0,70) + '...' : '<span style="opacity:0.2">Sistem kaydı yok...</span>'}
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.55rem; color:var(--text2)">
                    <span>${e?.tasks?.length || 0} GÖREV</span>
                    <span style="color:var(--accent)">${e?.atomics?.length || 0} ATOMİK</span>
                </div>
            </div>`;
    }
    el.appendChild(grid);
};

const renderMonthly = (el) => {
    const y = state.cursor.getFullYear(), m = state.cursor.getMonth();
    document.getElementById('currentRange').textContent = state.cursor.toLocaleString('tr-TR', {month:'long', year:'numeric'});
    el.innerHTML = `<div style="display:grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.6rem; color: var(--text2); margin-bottom: 5px;">
        <div>PT</div><div>SA</div><div>ÇA</div><div>PE</div><div>CU</div><div>CT</div><div>PZ</div></div>`;
    const grid = document.createElement('div'); grid.className = 'month-grid';
    const first = new Date(y, m, 1);
    const startOffset = (first.getDay() || 7) - 1;
    for(let i=0; i<42; i++) {
        const d = new Date(y, m, i - startOffset + 1);
        const ds = fmt(d);
        grid.innerHTML += `<div class="month-day ${d.getMonth()!==m?'other-month':''} ${state.entries[ds]?'has-entry':''}" onclick="openEntry('${ds}')">${d.getDate()}</div>`;
    }
    el.appendChild(grid);
};

const renderExtra = (el) => {
    const allEntries = Object.entries(state.entries);
    const now = new Date();
    
    const getStats = (items) => ({
        spor: items.filter(([d, e]) => e.habits?.includes('spor')).length,
        okuma: items.filter(([d, e]) => e.habits?.includes('okuma')).length
    });

    const thisWeek = allEntries.filter(([d]) => {
        const date = new Date(d);
        const start = new Date(now); start.setDate(now.getDate() - (now.getDay() || 7) + 1);
        return date >= start;
    });

    const thisMonth = allEntries.filter(([d]) => new Date(d).getMonth() === now.getMonth());

    const gen = getStats(allEntries);
    const week = getStats(thisWeek);
    const month = getStats(thisMonth);

    el.innerHTML = `
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:25px;">
            <div class="stat-item"><div class="stat-label">BU HAFTA</div><div style="font-size:0.7rem;">S:${week.spor} | O:${week.okuma}</div></div>
            <div class="stat-item"><div class="stat-label">BU AY</div><div style="font-size:0.7rem;">S:${month.spor} | O:${month.okuma}</div></div>
            <div class="stat-item"><div class="stat-label">GENEL</div><div style="font-size:0.7rem;">S:${gen.spor} | O:${gen.okuma}</div></div>
        </div>
        <div style="margin-bottom:20px;">
            <div class="stat-label">// ETİKET FİLTRESİ</div>
            <div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">
                <button onclick="state.tagFilter=null; render();" style="border:1px solid var(--border)">HEPSİ</button>
                ${Array.from(new Set(allEntries.flatMap(([d,e]) => e.tags || []))).map(t => `<button onclick="state.tagFilter='${t}'; render();" style="border:1px solid var(--accent); color:var(--accent)">#${t}</button>`).join('')}
            </div>
        </div>
        <div class="stat-label">// GÖREV HAVUZU</div>
        <div id="extraTasks" style="margin-top:10px;"></div>
    `;

    const taskList = document.getElementById('extraTasks');
    allEntries.sort().reverse().forEach(([date, e]) => {
        if(state.tagFilter && !e.tags?.includes(state.tagFilter)) return;
        (e.tasks || []).forEach(t => {
            taskList.innerHTML += `<div class="list-row" style="opacity:${t.done?0.4:1}"><span style="color:var(--accent); min-width:85px;">[${date}]</span> <span style="flex:1">${t.text}</span></div>`;
        });
    });
};

const renderList = (el) => {
    Object.keys(state.entries).sort().reverse().forEach(d => {
        el.innerHTML += `<div class="day-card" style="margin-bottom:8px; display:flex; justify-content:space-between;" onclick="openEntry('${d}')"><b style="color:var(--accent)">${d}</b> <span style="color:var(--text2); font-size:0.7rem;">${state.entries[d].text.substring(0,80)}...</span></div>`;
    });
};

const renderSearch = (el) => {
    const q = state.searchQuery.toLowerCase();
    el.innerHTML = `<div class="stat-label">// ARAMA: "${q}"</div>`;
    Object.keys(state.entries).forEach(date => {
        const e = state.entries[date];
        if(e.text?.toLowerCase().includes(q) || e.atomics?.some(a => a.toLowerCase().includes(q)) || e.tags?.some(t => t.toLowerCase().includes(q))) {
            el.innerHTML += `<div class="day-card" style="margin-bottom:8px;" onclick="openEntry('${date}')"><b style="color:var(--accent)">${date}</b></div>`;
        }
    });
};

/* ─── MODAL ─── */
window.openEntry = (date) => {
    state.selectedDate = date;
    const e = state.entries[date] || { text:'', habits:[], tasks:[], tags:[], atomics: [] };
    state.temp = { 
        tasks: JSON.parse(JSON.stringify(e.tasks || [])), 
        habits: [...(e.habits || [])], 
        tags: [...(e.tags || [])],
        atomics: [...(e.atomics || [])]
    };
    document.getElementById('modalTitle').textContent = date;
    document.getElementById('entryText').value = e.text || '';
    renderModalTemp();
    document.getElementById('entryModal').classList.add('active');
};

const renderModalTemp = () => {
    ['demir','spor','okuma'].forEach(h => {
        const btn = document.getElementById(`h_${h}`);
        btn.classList.toggle('active', state.temp.habits.includes(h));
    });
    document.getElementById('modalTasks').innerHTML = state.temp.tasks.map((t,i) => `
        <div class="list-row">
            <input type="checkbox" ${t.done?'checked':''} onchange="state.temp.tasks[${i}].done=!state.temp.tasks[${i}].done">
            <span style="flex:1; ${t.done?'text-decoration:line-through; opacity:0.5':''}">${t.text}</span>
            <span onclick="state.temp.tasks.splice(${i},1); renderModalTemp();" style="color:var(--danger); cursor:pointer;">×</span>
        </div>`).join('');
    document.getElementById('modalAtomics').innerHTML = state.temp.atomics.map((a,i) => `
        <div class="list-row" style="border-left:2px solid #40c4ff"><span style="flex:1">${a}</span><span onclick="state.temp.atomics.splice(${i},1); renderModalTemp();" style="color:var(--danger); cursor:pointer;">×</span></div>`).join('');
    document.getElementById('modalTags').innerHTML = state.temp.tags.map((t,i) => `
        <div class="tag-chip" style="background:var(--surface2); padding:2px 8px; font-size:0.6rem; border:1px solid var(--border);">#${t} <span onclick="state.temp.tags.splice(${i},1); renderModalTemp();" style="cursor:pointer">×</span></div>`).join('');
};

window.toggleHabit = (h) => {
    const idx = state.temp.habits.indexOf(h);
    if(idx > -1) state.temp.habits.splice(idx, 1);
    else state.temp.habits.push(h);
    renderModalTemp();
};

window.addTask = () => {
    const inp = document.getElementById('taskInput');
    if(inp.value) { state.temp.tasks.push({text:inp.value, done:false}); inp.value=''; renderModalTemp(); }
};

window.addAtomic = () => {
    const inp = document.getElementById('atomicInput');
    if(inp.value) { state.temp.atomics.push(inp.value); inp.value=''; renderModalTemp(); }
};

document.getElementById('tagInput').onkeydown = (e) => {
    if(e.key === 'Enter' && e.target.value) {
        state.temp.tags.push(e.target.value.trim().replace(/\s/g,''));
        e.target.value = ''; renderModalTemp();
    }
};

/* ─── HELPERS ─── */
const updateStats = () => {
    const all = Object.values(state.entries);
    const activeTasks = all.reduce((sum, e) => sum + (e.tasks?.filter(t => !t.done).length || 0), 0);
    const demirCount = all.filter(e => e.habits?.includes('demir')).length;
    
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="stat-label"><i class="fa-solid fa-database"></i> KAYIT GÜNÜ</div><div>${all.length}</div></div>
        <div class="stat-item"><div class="stat-label"><i class="fa-solid fa-list-check"></i> AKTİF GÖREV</div><div>${activeTasks}</div></div>
        <div class="stat-item"><div class="stat-label"><i class="fa-solid fa-fire"></i> DEMİR ZİHİN</div><div>${demirCount}</div></div>
    `;
};

const renderRandomHistory = () => {
    const pool = Object.values(state.entries).flatMap(e => [...(e.atomics || []), e.text]).filter(t => t && t.length > 5);
    if(pool.length) document.getElementById('randomAtomicArea').textContent = `"${pool[Math.floor(Math.random() * pool.length)].substring(0,180)}..."`;
};

/* ─── EVENTS ─── */
document.getElementById('globalSearch').oninput = (e) => { state.searchQuery = e.target.value; render(); };
document.getElementById('saveBtn').onclick = () => {
    state.entries[state.selectedDate] = {
        text: document.getElementById('entryText').value,
        habits: state.temp.habits,
        tasks: state.temp.tasks,
        tags: state.temp.tags,
        atomics: state.temp.atomics
    };
    save();
    document.getElementById('entryModal').classList.remove('active');
    render();
};

document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.view = btn.dataset.view;
        state.searchQuery = '';
        render();
    };
});

document.getElementById('prevBtn').onclick = () => { 
    if(state.view === 'monthly') state.cursor.setMonth(state.cursor.getMonth() - 1);
    else state.cursor.setDate(state.cursor.getDate() - 7);
    render();
};
document.getElementById('nextBtn').onclick = () => {
    if(state.view === 'monthly') state.cursor.setMonth(state.cursor.getMonth() + 1);
    else state.cursor.setDate(state.cursor.getDate() + 7);
    render();
};

document.getElementById('themeToggle').onclick = () => {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
};

document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(state.entries)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `matrix_v44_backup.json`; a.click();
};

document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { state.entries = JSON.parse(ev.target.result); save(); render(); };
    reader.readAsText(e.target.files[0]);
};

document.getElementById('closeBtn').onclick = () => document.getElementById('entryModal').classList.remove('active');
document.getElementById('fab').onclick = () => openEntry(fmt(new Date()));

render();
</script>
</body>
</html>
