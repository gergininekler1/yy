<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX.JOURNAL v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ─── THEME & GLOBAL ─── */
        :root {
            --accent: #00e676;
            --accent-dim: rgba(0,230,118,0.12);
            --accent-glow: 0 0 15px rgba(0,230,118,0.4);
            --danger: #ff4d6d;
            --danger-dim: rgba(255,77,109,0.14);
            --warn: #ffb300;
            --info: #40c4ff;
            --p-high: #ff4d6d; --p-med: #ffb300; --p-low: #69f0ae;
        }

        [data-theme="dark"] {
            --bg: #0a0a0c; --surface: rgba(20, 20, 24, 0.8); --surface2: #16161c;
            --border: #28282f; --text1: #e8e8ec; --text2: #9a9aae; --text3: #4a4a56;
        }

        [data-theme="light"] {
            --bg: #f0f0f4; --surface: rgba(255, 255, 255, 0.85); --surface2: #ffffff;
            --border: #d8d8e0; --text1: #1a1a1e; --text2: #6a6a7a; --text3: #b0b0bc;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text1);
            min-height: 100vh;
            transition: all 0.3s ease;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 230, 118, 0.03) 0%, transparent 100%);
        }

        body.focus-mode header, body.focus-mode .mood-chart-section, body.focus-mode .fab, body.focus-mode .random-atomic-footer {
            opacity: 0.1; pointer-events: none; filter: blur(4px);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

        /* ─── UI COMPONENTS ─── */
        header {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            box-shadow: var(--accent-glow);
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; font-size: 1.4rem; color: var(--accent); text-shadow: var(--accent-glow); }

        .stats-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 120px; background: var(--surface2); padding: 0.75rem; border-radius: 4px; border-left: 3px solid var(--accent); }
        .stat-label { font-size: 0.6rem; color: var(--text2); text-transform: uppercase; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--text1); }

        .controls { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .view-switcher, .date-nav { display: flex; background: var(--surface2); border-radius: 4px; border: 1px solid var(--border); overflow: hidden; }
        
        button {
            background: transparent; border: none; color: var(--text2); 
            padding: 0.6rem 1rem; cursor: pointer; font-family: inherit; font-size: 0.75rem;
            transition: all 0.2s;
        }
        button:hover { color: var(--accent); background: var(--accent-dim); }
        button.active { color: var(--accent); background: var(--accent-dim); box-shadow: inset 0 0 10px rgba(0,230,118,0.1); }

        /* ─── HABIT GRID ─── */
        .habit-grid { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .habit-dot { 
            width: 12px; height: 12px; border: 1px solid var(--border); border-radius: 2px; 
            cursor: help; transition: all 0.3s;
        }
        .habit-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); border-color: var(--accent); }

        /* ─── MAIN VIEWS ─── */
        .weekly-view { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; }
        .day-card {
            min-width: 280px; background: var(--surface); backdrop-filter: blur(8px);
            border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem;
            transition: transform 0.3s, border-color 0.3s;
        }
        .day-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .day-card.today { border: 1px solid var(--accent); box-shadow: var(--accent-glow); }
        
        .internal-link { color: var(--info); text-decoration: underline; cursor: pointer; }

        /* ─── MODAL ─── */
        .modal { 
            display:none; position:fixed; inset:0; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: var(--surface2); border: 1px solid var(--accent); width: 95%; max-width: 700px;
            max-height: 90vh; overflow-y: auto; padding: 2rem; border-radius: 8px; position: relative;
        }

        .habit-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .habit-opt { 
            background: var(--bg); border: 1px solid var(--border); padding: 0.75rem; 
            text-align: center; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .habit-opt.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        textarea { 
            width: 100%; min-height: 150px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text1); padding: 1rem; font-family: inherit; border-radius: 4px; resize: vertical;
        }
        textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--accent-glow); }

        .task-list-item { 
            display: flex; align-items: center; gap: 0.5rem; background: var(--bg); 
            padding: 0.5rem; margin-bottom: 0.3rem; border-radius: 3px; border-left: 2px solid var(--accent);
        }

        /* ─── FOOTER RANDOM ATOMICS ─── */
        .random-atomic-footer {
            margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--border);
            background: linear-gradient(transparent, var(--surface));
        }
        .atomic-stream { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
        .atomic-chip { 
            background: var(--surface2); padding: 0.5rem 1rem; border-radius: 20px;
            font-size: 0.8rem; border: 1px solid var(--border); color: var(--text2);
            animation: glitch 5s infinite; opacity: 0.8;
        }
        .atomic-chip:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }

        .fab { 
            position: fixed; bottom: 2rem; right: 2rem; width: 60px; height: 60px;
            background: var(--accent); color: #000; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer;
            box-shadow: var(--accent-glow); transition: 0.3s; z-index: 100;
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        .focus-toggle { position: absolute; top: 1rem; right: 1rem; font-size: 1.2rem; cursor: pointer; opacity: 0.5; }
        .focus-toggle:hover { opacity: 1; color: var(--accent); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-top">
            <h1>MATRIX<span style="color:var(--text3)">.</span>JOURNAL <small style="font-size: 0.5em; vertical-align: middle; opacity: 0.5;">v4.0</small></h1>
            <div style="display:flex; gap: 10px;">
                <button id="focusBtn" title="Odak Modu">👁️ FOCUS</button>
                <button id="themeToggle">☀️</button>
            </div>
        </div>

        <div class="stats-bar" id="statsBar">
            </div>

        <div class="controls">
            <div class="view-switcher">
                <button class="view-btn active" data-view="weekly">HAFTA</button>
                <button class="view-btn" data-view="list">LİSTE</button>
                <button class="view-btn" data-view="tasks">GÖREVLER</button>
            </div>
            <div class="date-nav">
                <button id="prevBtn">←</button>
                <button id="currentRange" style="min-width: 150px; pointer-events: none; font-weight: bold;"></button>
                <button id="nextBtn">→</button>
            </div>
            <button id="exportBtn">EXPORT</button>
            <button id="importBtn">IMPORT</button>
            <input type="file" id="fileInput" hidden>
        </div>
    </header>

    <div class="mood-chart-section" style="margin-bottom: 2rem;">
        <div id="moodChart" style="display:flex; align-items: flex-end; gap: 4px; height: 40px;"></div>
    </div>

    <main id="mainContent"></main>

    <footer class="random-atomic-footer">
        <div style="text-align: center; font-size: 0.6rem; color: var(--text3); margin-bottom: 1rem; letter-spacing: 2px;">RANDOM ATOMIC STREAM</div>
        <div class="atomic-stream" id="atomicStream"></div>
    </footer>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <div class="focus-toggle" id="modalFocus">🔳</div>
        <h2 id="modalTitle" style="font-family:'Orbitron'; margin-bottom: 1.5rem; font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">YENİ KAYIT</h2>
        
        <input type="date" id="entryDate" style="background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:0.5rem; margin-bottom:1rem; width:100%;">

        <div class="section-label" style="font-size:0.6rem; color:var(--text2); margin-bottom:0.5rem;">/ ALIŞKANLIK MATRİSİ</div>
        <div class="habit-selector" id="habitSelector">
            <div class="habit-opt" data-habit="spor">SPOR</div>
            <div class="habit-opt" data-habit="okuma">OKUMA</div>
            <div class="habit-opt" data-habit="demir">DEMİR</div>
            <div class="habit-opt" data-habit="zihin">ZİHİN</div>
        </div>

        <div class="section-label" style="font-size:0.6rem; color:var(--text2); margin-bottom:0.5rem;">/ GÖREVLER</div>
        <div id="modalTasks" style="margin-bottom: 1.5rem;">
            <div id="taskList"></div>
            <div style="display:flex; gap: 5px; margin-top: 0.5rem;">
                <input type="text" id="newTaskInput" placeholder="Görev ekle..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:0.5rem;">
                <button id="addTaskBtn" style="background:var(--accent-dim); border:1px solid var(--accent); color:var(--accent);">+ EKLE</button>
            </div>
        </div>

        <div class="section-label" style="font-size:0.6rem; color:var(--text2); margin-bottom:0.5rem;">/ ANA LOG</div>
        <textarea id="entryText" placeholder="Bugün neler oldu? [[Tarih]] ile bağla..."></textarea>

        <div class="section-label" style="font-size:0.6rem; color:var(--text2); margin-top:1.5rem; margin-bottom:0.5rem;">/ ATOMİK NOTLAR</div>
        <div id="atomicList"></div>
        <input type="text" id="newAtomicInput" placeholder="Kısa bir not..." style="width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:0.5rem; margin-top:0.5rem;">

        <div style="display:flex; gap: 1rem; margin-top: 2rem;">
            <button id="saveBtn" style="flex:1; background:var(--accent); color:#000; font-weight:bold;">KAYDET</button>
            <button id="deleteBtn" style="color:var(--danger);">SİL</button>
            <button id="closeBtn">İPTAL</button>
        </div>
    </div>
</div>

<div class="fab" id="fab">+</div>

<script>
/* ─── CORE LOGIC ─── */
const state = {
    entries: JSON.parse(localStorage.getItem('mj_v4_data') || '{}'),
    currentView: 'weekly',
    currentDate: new Date(),
    selectedDate: null,
    tempTasks: [],
    tempAtomics: [],
    tempHabits: []
};

const saveToLocal = () => localStorage.setItem('mj_v4_data', JSON.stringify(state.entries));

/* ─── UTILS ─── */
const formatDate = (d) => d.toISOString().split('T')[0];
const getWeekDates = (d) => {
    const start = new Date(d);
    start.setDate(start.getDate() - (start.getDay() === 0 ? 6 : start.getDay() - 1));
    return Array.from({length:7}, (_, i) => {
        const day = new Date(start);
        day.setDate(day.getDate() + i);
        return day;
    });
};

const processText = (text) => {
    if(!text) return '';
    return text.replace(/\[\[(\d{4}-\d{2}-\d{2})\]\]/g, '<span class="internal-link" onclick="openEntry(\'$1\')">$1</span>');
};

/* ─── RENDERING ─── */
const renderStats = () => {
    const all = Object.values(state.entries);
    const totalDays = all.length;
    const totalTasks = all.reduce((acc, curr) => acc + (curr.tasks?.length || 0), 0);
    const completedTasks = all.reduce((acc, curr) => acc + (curr.tasks?.filter(t => t.done).length || 0), 0);
    const streak = calculateStreak();

    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="stat-label">STREAK</div><div class="stat-value">${streak} 🔥</div></div>
        <div class="stat-item"><div class="stat-label">TOPLAM KAYIT</div><div class="stat-value">${totalDays}</div></div>
        <div class="stat-item"><div class="stat-label">GÖREV BAŞARI</div><div class="stat-value">%${totalTasks ? Math.round((completedTasks/totalTasks)*100) : 0}</div></div>
    `;
};

const calculateStreak = () => {
    let streak = 0;
    let checkDate = new Date();
    while(state.entries[formatDate(checkDate)]) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
    }
    return streak;
};

const renderRandomAtomics = () => {
    const allAtomics = [];
    Object.values(state.entries).forEach(e => {
        if(e.atomics) allAtomics.push(...e.atomics);
    });
    
    const shuffled = allAtomics.sort(() => 0.5 - Math.random()).slice(0, 12);
    document.getElementById('atomicStream').innerHTML = shuffled.map(a => `<div class="atomic-chip">${a}</div>`).join('');
};

const renderMain = () => {
    const container = document.getElementById('mainContent');
    container.innerHTML = '';
    
    if(state.currentView === 'weekly') {
        const days = getWeekDates(state.currentDate);
        document.getElementById('currentRange').textContent = `${days[0].getDate()} - ${days[6].getDate()} ${days[6].toLocaleString('tr-TR', {month:'long'})}`;
        
        const wrapper = document.createElement('div');
        wrapper.className = 'weekly-view';
        
        days.forEach(d => {
            const ds = formatDate(d);
            const entry = state.entries[ds];
            const isToday = ds === formatDate(new Date());
            
            wrapper.innerHTML += `
                <div class="day-card ${isToday ? 'today' : ''}" onclick="openEntry('${ds}')">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <div style="font-size:0.7rem; color:var(--text2)">${d.toLocaleDateString('tr-TR', {weekday:'short'}).toUpperCase()}</div>
                            <div style="font-family:'Orbitron'; font-size:1.5rem;">${d.getDate()}</div>
                        </div>
                        <div class="habit-grid">
                            ${['spor','okuma','demir','zihin'].map(h => `
                                <div class="habit-dot ${entry?.habits?.includes(h) ? 'active' : ''}" title="${h}"></div>
                            `).join('')}
                        </div>
                    </div>
                    <div style="margin-top:1rem; font-size:0.8rem; line-height:1.4; color:var(--text1); min-height:60px;">
                        ${entry ? processText(entry.text).substring(0, 100) + (entry.text.length > 100 ? '...' : '') : '<span style="color:var(--text3)">Kayıt yok...</span>'}
                    </div>
                    ${entry?.tasks?.length ? `
                        <div style="margin-top:1rem; font-size:0.6rem; color:var(--accent)">
                            ${entry.tasks.filter(t=>t.done).length}/${entry.tasks.length} GÖREV TAMAM
                        </div>
                    ` : ''}
                </div>
            `;
        });
        container.appendChild(wrapper);
    }
    // List ve Tasks görünümleri buraya eklenebilir (v3 ile benzer mantık)
};

/* ─── MODAL ACTIONS ─── */
window.openEntry = (date) => {
    state.selectedDate = date;
    const entry = state.entries[date] || {};
    
    document.getElementById('modalTitle').textContent = date;
    document.getElementById('entryDate').value = date;
    document.getElementById('entryText').value = entry.text || '';
    state.tempTasks = entry.tasks ? [...entry.tasks] : [];
    state.tempAtomics = entry.atomics ? [...entry.atomics] : [];
    state.tempHabits = entry.habits ? [...entry.habits] : [];
    
    renderModalTasks();
    renderModalAtomics();
    updateHabitUI();
    
    document.getElementById('entryModal').classList.add('active');
};

const renderModalTasks = () => {
    const list = document.getElementById('taskList');
    list.innerHTML = state.tempTasks.map((t, i) => `
        <div class="task-list-item">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
            <span style="flex:1; font-size:0.8rem; ${t.done ? 'text-decoration:line-through; opacity:0.5' : ''}">${t.text}</span>
            <span onclick="removeTask(${i})" style="cursor:pointer; color:var(--danger)">×</span>
        </div>
    `).join('');
};

const renderModalAtomics = () => {
    document.getElementById('atomicList').innerHTML = state.tempAtomics.map((a, i) => `
        <div class="task-list-item" style="border-left-color: var(--info)">
            <span style="flex:1; font-size:0.8rem;">${a}</span>
            <span onclick="removeAtomic(${i})" style="cursor:pointer; color:var(--danger)">×</span>
        </div>
    `).join('');
};

const updateHabitUI = () => {
    document.querySelectorAll('.habit-opt').forEach(opt => {
        opt.classList.toggle('selected', state.tempHabits.includes(opt.dataset.habit));
    });
};

/* ─── EVENTS ─── */
document.getElementById('saveBtn').onclick = () => {
    const date = document.getElementById('entryDate').value;
    state.entries[date] = {
        text: document.getElementById('entryText').value,
        tasks: state.tempTasks,
        atomics: state.tempAtomics,
        habits: state.tempHabits,
        updatedAt: new Date().toISOString()
    };
    saveToLocal();
    document.getElementById('entryModal').classList.remove('active');
    renderMain();
    renderStats();
    renderRandomAtomics();
};

document.getElementById('addTaskBtn').onclick = () => {
    const input = document.getElementById('newTaskInput');
    if(input.value) {
        state.tempTasks.push({ text: input.value, done: false });
        input.value = '';
        renderModalTasks();
    }
};

window.toggleTask = (i) => { state.tempTasks[i].done = !state.tempTasks[i].done; renderModalTasks(); };
window.removeTask = (i) => { state.tempTasks.splice(i, 1); renderModalTasks(); };

document.getElementById('newAtomicInput').onkeydown = (e) => {
    if(e.key === 'Enter' && e.target.value) {
        state.tempAtomics.push(e.target.value);
        e.target.value = '';
        renderModalAtomics();
    }
};
window.removeAtomic = (i) => { state.tempAtomics.splice(i, 1); renderModalAtomics(); };

document.querySelectorAll('.habit-opt').forEach(opt => {
    opt.onclick = () => {
        const h = opt.dataset.habit;
        if(state.tempHabits.includes(h)) state.tempHabits = state.tempHabits.filter(x => x !== h);
        else state.tempHabits.push(h);
        updateHabitUI();
    };
});

document.getElementById('focusBtn').onclick = () => document.body.classList.toggle('focus-mode');
document.getElementById('modalFocus').onclick = () => {
    const content = document.querySelector('.modal-content');
    content.style.maxWidth = content.style.maxWidth === '100%' ? '700px' : '100%';
};

document.getElementById('prevBtn').onclick = () => { state.currentDate.setDate(state.currentDate.getDate() - 7); renderMain(); };
document.getElementById('nextBtn').onclick = () => { state.currentDate.setDate(state.currentDate.getDate() + 7); renderMain(); };
document.getElementById('fab').onclick = () => openEntry(formatDate(new Date()));
document.getElementById('closeBtn').onclick = () => document.getElementById('entryModal').classList.remove('active');

// Init
renderMain();
renderStats();
renderRandomAtomics();
</script>

</body>
</html>
