<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00e676;
            --accent-dim: rgba(0,230,118,0.1);
            --danger: #ff4d6d;
            --bg: #0a0a0a; --surface: #121212; --surface2: #1a1a1a;
            --border: #333; --text1: #e0e0e0; --text2: #888;
        }

        [data-theme="light"] {
            --bg: #f2f2f5; --surface: #ffffff; --surface2: #e8e8ed;
            --border: #ccc; --text1: #1a1a1a; --text2: #666;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        body { background: var(--bg); color: var(--text1); transition: 0.3s; padding: 1rem; line-height: 1.4; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* ─── HEADER ─── */
        header { border: 2px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface); }
        h1 { font-family: 'Orbitron'; letter-spacing: 8px; color: var(--accent); margin-bottom: 1rem; text-transform: uppercase; }
        
        .sub-header-row { display: flex; gap: 10px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
        .stat-item { background: var(--surface2); padding: 8px 12px; border-left: 3px solid var(--accent); }
        .stat-label { color: var(--text2); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; }

        .nav-controls { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .group { display: flex; border: 1px solid var(--border); background: var(--bg); border-radius: 3px; overflow: hidden; }
        
        button { 
            background: transparent; border: none; color: var(--text2); padding: 8px 16px; 
            cursor: pointer; font-size: 0.75rem; transition: 0.2s; text-transform: uppercase;
        }
        button:hover { color: var(--accent); background: var(--accent-dim); }
        button.active { background: var(--accent); color: #000; font-weight: bold; }

        /* ─── VIEWS ─── */
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .day-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; cursor: pointer; transition: 0.2s; }
        .day-card:hover { border-color: var(--accent); }
        .day-card.today { border: 2px solid var(--accent); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .card-date { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--accent); }

        /* AYLIK TAKVİM */
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: var(--border); border: 1px solid var(--border); }
        .month-day { background: var(--surface); aspect-ratio: 1; padding: 5px; cursor: pointer; position: relative; font-size: 0.7rem; }
        .month-day:hover { background: var(--accent-dim); }
        .month-day.other-month { opacity: 0.3; }
        .month-day.has-entry { border-bottom: 2px solid var(--accent); }
        .month-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.6rem; color: var(--text2); margin-bottom: 5px; }

        /* ─── MODAL ─── */
        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); width: 100%; max-width: 650px; max-height: 95vh; overflow-y: auto; padding: 2rem; }

        .habit-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .habit-btn { border: 1px solid var(--border); padding: 8px 12px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .habit-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        textarea { width: 100%; min-height: 180px; background: var(--bg); border: 1px solid var(--border); color: var(--text1); padding: 12px; margin: 10px 0; resize: none; }
        .internal-link { color: var(--accent); text-decoration: underline; cursor: pointer; }
        
        .tag-input-area { display: flex; gap: 8px; margin-top: 10px; }
        .tag-chip { background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; font-size: 0.65rem; border-radius: 3px; display: inline-flex; align-items: center; gap: 5px; }

        /* ─── FOOTER ─── */
        footer { margin-top: 3rem; padding: 2rem 0; border-top: 1px solid var(--border); text-align: center; }
        .random-note-box { max-width: 600px; margin: 0 auto; color: var(--text2); font-style: italic; font-size: 0.85rem; border-left: 2px solid var(--accent); padding-left: 15px; }

        .fab { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Matrix</h1>
        
        <div class="sub-header-row">
            <button id="themeToggle" style="border:1px solid var(--border)">[TEMA]</button>
            <button id="exportBtn" style="border:1px solid var(--border)">[EXPORT]</button>
            <button id="importBtn" style="border:1px solid var(--border)">[IMPORT]</button>
            <input type="file" id="fileInput" hidden>
        </div>

        <div class="stats-bar" id="statsBar">
            </div>

        <div class="nav-controls">
            <div class="group">
                <button class="view-btn active" data-view="weekly">HAFTALIK</button>
                <button class="view-btn" data-view="monthly">AYLIK</button>
                <button class="view-btn" data-view="list">ARŞİV</button>
                <button class="view-btn" data-view="extra">EKSTRA</button>
            </div>
            <div class="group">
                <button id="prevBtn">&lt;</button>
                <button id="currentRange" style="min-width: 140px; pointer-events: none;"></button>
                <button id="nextBtn">&gt;</button>
            </div>
        </div>
    </header>

    <main id="mainContent"></main>

    <footer>
        <div style="font-size: 0.5rem; color: var(--text3); letter-spacing: 4px; margin-bottom: 1rem;">// SINGLE_ATOMIC_HISTORY</div>
        <div id="randomAtomicArea" class="random-note-box">...</div>
    </footer>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Orbitron'; color:var(--accent); margin-bottom: 1.5rem;">00-00-0000</h2>
        
        <div class="habit-row">
            <div class="habit-btn" id="h_demir" onclick="toggleHabit('demir')"><span>[ ]</span> DEMİR GİBİ ZİHİN</div>
            <div class="habit-btn" id="h_spor" onclick="toggleHabit('spor')"><span>[ ]</span> SPOR</div>
            <div class="habit-btn" id="h_okuma" onclick="toggleHabit('okuma')"><span>[ ]</span> OKUMA</div>
        </div>

        <div style="color:var(--text2); font-size:0.6rem;">// GÖREVLER</div>
        <div id="modalTasks" style="margin: 10px 0;"></div>
        <div style="display:flex; gap:5px; margin-bottom:20px;">
            <input type="text" id="taskInput" placeholder="Görev..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:5px;">
            <button onclick="addTask()" style="border:1px solid var(--accent); color:var(--accent); padding:0 10px;">+</button>
        </div>

        <div style="color:var(--text2); font-size:0.6rem;">// SİSTEM NOTU [[TARİH]]</div>
        <textarea id="entryText" placeholder="Kayıt giriniz..."></textarea>

        <div style="color:var(--text2); font-size:0.6rem;">// ETİKETLER</div>
        <div id="modalTags" style="margin-top:5px; display:flex; flex-wrap:wrap; gap:5px;"></div>
        <div class="tag-input-area">
            <input type="text" id="tagInput" placeholder="Etiket ekle ve enter..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:5px;">
        </div>

        <div style="display:flex; gap:10px; margin-top:2rem;">
            <button id="saveBtn" style="flex:2; background:var(--accent); color:#000; font-weight:bold;">SİSTEME KAYDET</button>
            <button id="closeBtn" style="flex:1; border:1px solid var(--border);">İPTAL</button>
        </div>
    </div>
</div>

<div class="fab" id="fab">+</div>

<script>
const state = {
    entries: JSON.parse(localStorage.getItem('matrix_v42_data') || '{}'),
    view: 'weekly',
    cursor: new Date(),
    selectedDate: null,
    temp: { tasks: [], habits: [], tags: [] },
    tagFilter: null
};

const save = () => localStorage.setItem('matrix_v42_data', JSON.stringify(state.entries));
const fmt = (d) => d.toISOString().split('T')[0];

/* ─── RENDER ENGINE ─── */
const render = () => {
    const main = document.getElementById('mainContent');
    main.innerHTML = '';
    
    if(state.view === 'weekly') renderWeekly(main);
    else if(state.view === 'monthly') renderMonthly(main);
    else if(state.view === 'list') renderList(main);
    else if(state.view === 'extra') renderExtra(main);

    updateStats();
    renderRandomNote();
};

// HAFTALIK
const renderWeekly = (el) => {
    const start = new Date(state.cursor);
    start.setDate(start.getDate() - (start.getDay() || 7) + 1);
    document.getElementById('currentRange').textContent = `${start.getDate()} - ${new Date(new Date(start).setDate(start.getDate()+6)).getDate()} ${start.toLocaleString('tr-TR', {month:'short'})}`;

    const grid = document.createElement('div');
    grid.className = 'weekly-grid';
    for(let i=0; i<7; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const ds = fmt(d);
        const e = state.entries[ds];
        grid.innerHTML += `
            <div class="day-card ${ds === fmt(new Date()) ? 'today' : ''}" onclick="openEntry('${ds}')">
                <div class="card-header">
                    <div class="card-date">${d.getDate()}</div>
                    <div style="font-size:0.6rem; color:var(--text2)">${d.toLocaleDateString('tr-TR',{weekday:'short'}).toUpperCase()}</div>
                </div>
                <div style="margin:10px 0; font-size:0.75rem; min-height:40px;">
                    ${e ? parseLinks(e.text).substring(0,80) + '...' : '---'}
                </div>
                <div style="display:flex; gap:5px; font-size:0.5rem; color:var(--accent)">
                    ${e?.habits?.includes('demir') ? '[ZİHİN]' : ''}
                    ${e?.habits?.includes('spor') ? '[SPOR]' : ''}
                    ${e?.habits?.includes('okuma') ? '[OKUMA]' : ''}
                </div>
            </div>`;
    }
    el.appendChild(grid);
};

// AYLIK
const renderMonthly = (el) => {
    const y = state.cursor.getFullYear(), m = state.cursor.getMonth();
    document.getElementById('currentRange').textContent = state.cursor.toLocaleString('tr-TR', {month:'long', year:'numeric'});
    
    el.innerHTML = `<div class="month-header"><div>PT</div><div>SA</div><div>ÇA</div><div>PE</div><div>CU</div><div>CT</div><div>PZ</div></div>`;
    const grid = document.createElement('div'); grid.className = 'month-grid';
    
    const first = new Date(y, m, 1);
    const startOffset = (first.getDay() || 7) - 1;
    const totalDays = new Date(y, m+1, 0).getDate();

    for(let i=0; i<42; i++) {
        const d = new Date(y, m, i - startOffset + 1);
        const ds = fmt(d);
        const isCurrentMonth = d.getMonth() === m;
        grid.innerHTML += `
            <div class="month-day ${!isCurrentMonth ? 'other-month' : ''} ${state.entries[ds] ? 'has-entry' : ''}" onclick="openEntry('${ds}')">
                ${d.getDate()}
            </div>`;
    }
    el.appendChild(grid);
};

// EKSTRA (GÖREVLER + SPOR/OKUMA İSTATİSTİĞİ + ETİKET FİLTRE)
const renderExtra = (el) => {
    const all = Object.values(state.entries);
    const spor = all.filter(e => e.habits?.includes('spor')).length;
    const okuma = all.filter(e => e.habits?.includes('okuma')).length;
    
    let tags = new Set();
    all.forEach(e => e.tags?.forEach(t => tags.add(t)));

    el.innerHTML = `
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <div class="stat-item"><div class="stat-label">TOPLAM SPOR</div><div>${spor} SEANS</div></div>
            <div class="stat-item"><div class="stat-label">TOPLAM OKUMA</div><div>${okuma} GÜN</div></div>
        </div>
        <div style="margin-bottom:20px;">
            <div class="stat-label">// ETİKET FİLTRESİ</div>
            <div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">
                <button onclick="state.tagFilter=null; render();" style="border:1px solid var(--border)">HEPSİ</button>
                ${Array.from(tags).map(t => `<button onclick="state.tagFilter='${t}'; render();" style="border:1px solid var(--accent); color:var(--accent)">#${t}</button>`).join('')}
            </div>
        </div>
        <div class="stat-label">// GÖREV HAVUZU ${state.tagFilter ? `(#${state.tagFilter})` : ''}</div>
        <div id="extraTasks" style="margin-top:10px;"></div>
    `;

    const taskList = document.getElementById('extraTasks');
    Object.keys(state.entries).sort().reverse().forEach(date => {
        const e = state.entries[date];
        if(state.tagFilter && !e.tags?.includes(state.tagFilter)) return;
        
        (e.tasks || []).forEach(t => {
            taskList.innerHTML += `
                <div style="display:flex; gap:10px; background:var(--surface); padding:8px; border-bottom:1px solid var(--border); font-size:0.8rem; opacity:${t.done?0.5:1}">
                    <span style="color:var(--accent); min-width:80px;">[${date}]</span>
                    <span style="${t.done?'text-decoration:line-through':''}">${t.text}</span>
                </div>`;
        });
    });
};

const renderList = (el) => {
    Object.keys(state.entries).sort().reverse().forEach(d => {
        el.innerHTML += `<div class="day-card" style="margin-bottom:5px;" onclick="openEntry('${d}')"><b style="color:var(--accent)">${d}</b> | ${state.entries[d].text.substring(0,100)}...</div>`;
    });
};

/* ─── MODAL ─── */
window.openEntry = (date) => {
    state.selectedDate = date;
    const e = state.entries[date] || { text:'', habits:[], tasks:[], tags:[] };
    state.temp = { tasks:[...(e.tasks||[])], habits:[...(e.habits||[])], tags:[...(e.tags||[])] };
    
    document.getElementById('modalTitle').textContent = date;
    document.getElementById('entryText').value = e.text || '';
    renderModalTemp();
    document.getElementById('entryModal').classList.add('active');
};

const renderModalTemp = () => {
    // Habits
    ['demir','spor','okuma'].forEach(h => {
        const btn = document.getElementById(`h_${h}`);
        const active = state.temp.habits.includes(h);
        btn.classList.toggle('active', active);
        btn.querySelector('span').textContent = active ? '[X]' : '[ ]';
    });
    // Tasks
    document.getElementById('modalTasks').innerHTML = state.temp.tasks.map((t,i) => `
        <div style="display:flex; gap:10px; margin-bottom:5px; font-size:0.8rem;">
            <input type="checkbox" ${t.done?'checked':''} onchange="state.temp.tasks[${i}].done=!state.temp.tasks[${i}].done">
            <span style="flex:1">${t.text}</span>
            <span onclick="state.temp.tasks.splice(${i},1); renderModalTemp();" style="color:var(--danger); cursor:pointer;">×</span>
        </div>`).join('');
    // Tags
    document.getElementById('modalTags').innerHTML = state.temp.tags.map((t,i) => `
        <div class="tag-chip">#${t} <span onclick="state.temp.tags.splice(${i},1); renderModalTemp();" style="cursor:pointer">×</span></div>`).join('');
};

window.toggleHabit = (h) => {
    const idx = state.temp.habits.indexOf(h);
    if(idx > -1) state.temp.habits.splice(idx, 1);
    else state.temp.habits.push(h);
    renderModalTemp();
};

window.addTask = () => {
    const input = document.getElementById('taskInput');
    if(input.value) { state.temp.tasks.push({text:input.value, done:false}); input.value=''; renderModalTemp(); }
};

document.getElementById('tagInput').onkeydown = (e) => {
    if(e.key === 'Enter' && e.target.value) {
        state.temp.tags.push(e.target.value.replace(/\s/g,''));
        e.target.value = '';
        renderModalTemp();
    }
};

/* ─── HELPERS ─── */
const parseLinks = (text) => {
    if(!text) return '';
    return text.replace(/\[\[(\d{4}-\d{2}-\d{2})\]\]/g, '<span class="internal-link" onclick="event.stopPropagation(); openEntry(\'$1\')">$1</span>');
};

const updateStats = () => {
    const all = Object.values(state.entries);
    const demirCount = all.filter(e => e.habits?.includes('demir')).length;
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="stat-label">SİSTEM KAYDI</div><div>${all.length} ADET</div></div>
        <div class="stat-item"><div class="stat-label">DEMİR GİBİ ZİHİN</div><div>${demirCount} GÜN</div></div>
    `;
};

const renderRandomNote = () => {
    const notes = Object.values(state.entries).map(e => e.text).filter(t => t && t.length > 5);
    if(notes.length) {
        document.getElementById('randomAtomicArea').textContent = `"${notes[Math.floor(Math.random() * notes.length)].substring(0,150)}..."`;
    }
};

/* ─── GLOBAL EVENTS ─── */
document.getElementById('saveBtn').onclick = () => {
    state.entries[state.selectedDate] = {
        text: document.getElementById('entryText').value,
        habits: state.temp.habits,
        tasks: state.temp.tasks,
        tags: state.temp.tags
    };
    save();
    document.getElementById('entryModal').classList.remove('active');
    render();
};

document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.view = btn.dataset.view;
        render();
    };
});

document.getElementById('prevBtn').onclick = () => { 
    if(state.view === 'monthly') state.cursor.setMonth(state.cursor.getMonth() - 1);
    else state.cursor.setDate(state.cursor.getDate() - 7);
    render();
};
document.getElementById('nextBtn').onclick = () => {
    if(state.view === 'monthly') state.cursor.setMonth(state.cursor.getMonth() + 1);
    else state.cursor.setDate(state.cursor.getDate() + 7);
    render();
};

document.getElementById('themeToggle').onclick = () => {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
};

document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(state.entries)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `matrix_v42.json`; a.click();
};

document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { state.entries = JSON.parse(ev.target.result); save(); render(); };
    reader.readAsText(e.target.files[0]);
};

document.getElementById('closeBtn').onclick = () => document.getElementById('entryModal').classList.remove('active');
document.getElementById('fab').onclick = () => openEntry(fmt(new Date()));

// INIT
render();
</script>
</body>
</html>
