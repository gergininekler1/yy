<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX.JOURNAL v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --surface: #141417;
            --surface2: #1a1a1f;
            --border: #2a2a32;
            --border-accent: #3a3a46;
            --accent: #00e676;
            --accent-dim: rgba(0, 230, 118, 0.12);
            --accent-glow: rgba(0, 230, 118, 0.2);
            --text-primary: #e8e8ec;
            --text-secondary: #7a7a8a;
            --text-muted: #3a3a46;
            --danger: #ff4d6d;
            --danger-dim: rgba(255, 77, 109, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            padding: 1rem;
            animation: fadeUp 0.5s ease;
        }

        /* ─── HEADER ─── */
        header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
        }

        .header-top {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            color: var(--text-primary);
        }

        h1 span {
            color: var(--accent);
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding: 0.75rem 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            margin-bottom: 1rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
        }

        .stat-label {
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .stat-value {
            color: var(--accent);
            font-weight: bold;
        }

        .stat-value.neutral {
            color: var(--text-primary);
        }

        .stat-divider {
            width: 1px;
            height: 14px;
            background: var(--border);
        }

        /* ─── CONTROLS ─── */
        .header-controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        button, select {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-accent);
            background: var(--surface2);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-radius: 3px;
            white-space: nowrap;
        }

        button:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        button.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .view-switcher {
            display: flex;
            gap: 0;
            border: 1px solid var(--border-accent);
            border-radius: 3px;
            overflow: hidden;
        }

        .view-switcher button {
            border: none;
            border-right: 1px solid var(--border-accent);
            border-radius: 0;
            padding: 0.5rem 1.1rem;
        }

        .view-switcher button:last-child { border-right: none; }

        .date-navigation {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: nowrap;
        }

        .date-display {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            min-width: 160px;
            text-align: center;
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .nav-btn {
            padding: 0.5rem 0.8rem;
        }

        .data-controls {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        /* ─── WEEKLY SCROLL ─── */
        .weekly-scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 0.75rem;
            margin-bottom: 5rem;
            -webkit-overflow-scrolling: touch;
        }

        .weekly-scroll-container::-webkit-scrollbar { height: 4px; }
        .weekly-scroll-container::-webkit-scrollbar-track { background: var(--surface); }
        .weekly-scroll-container::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 2px; }

        .weekly-view {
            display: flex;
            gap: 0.75rem;
            min-width: max-content;
            padding: 0.25rem 0;
        }

        /* ─── DAY CARD ─── */
        .day-card {
            width: 260px;
            min-height: 460px;
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 1.25rem;
            cursor: pointer;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        .day-card:hover {
            border-color: var(--border-accent);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .day-card.today {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-dim);
        }

        .day-card.today::after {
            content: '●';
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 0.5rem;
            color: var(--accent);
            animation: blink 1.5s infinite;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .day-name {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 0.2rem;
        }

        .day-number {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
            color: var(--text-primary);
        }

        .day-card.today .day-number { color: var(--accent); }

        .day-month {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        .mood-terminal { text-align: right; }
        .mood-indicator { font-size: 1.75rem; line-height: 1; margin-bottom: 0.2rem; }
        .mood-label { font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }

        .terminal-section {
            margin-top: 0.75rem;
            padding: 0.75rem;
            border: 1px solid var(--border);
            background: var(--surface2);
            border-radius: 3px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .section-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .section-label::before { content: '/ '; color: var(--accent); }

        .note-preview {
            font-size: 0.82rem;
            line-height: 1.55;
            color: var(--text-primary);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 8;
            -webkit-box-orient: vertical;
            flex: 1;
        }

        .note-count {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .tags-terminal {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .tag {
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--border-accent);
            background: var(--surface2);
            color: var(--text-secondary);
            text-transform: uppercase;
            border-radius: 2px;
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
            padding: 2rem 0;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ─── CALENDAR ─── */
        .calendar-container {
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 5rem;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            margin-bottom: 1px;
        }

        .calendar-view {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
        }

        .calendar-day-name {
            background: var(--surface2);
            padding: 0.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .calendar-day {
            background: var(--surface);
            padding: 0.6rem;
            min-height: 80px;
            cursor: pointer;
            transition: background 0.15s ease;
            position: relative;
        }

        .calendar-day:hover { background: var(--surface2); }

        .calendar-day.today {
            background: var(--accent-dim);
            outline: 1px solid var(--accent);
        }

        .calendar-day.other-month { opacity: 0.3; }

        .cal-day-number {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-secondary);
        }

        .calendar-day.today .cal-day-number { color: var(--accent); }

        /* ─── LIST VIEW ─── */
        .list-view {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 5rem;
        }

        .entry-card {
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            transition: border-color 0.2s ease;
            border-radius: 4px;
        }

        .entry-card:hover { border-color: var(--border-accent); }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
        }

        .entry-date {
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .entry-content {
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 0.88rem;
            margin-bottom: 0.75rem;
        }

        /* ─── MODAL ─── */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeUp 0.25s ease;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border-accent);
            padding: 2rem;
            max-width: 680px;
            width: 94%;
            max-height: 92vh;
            overflow-y: auto;
            position: relative;
            border-radius: 6px;
            animation: slideDown 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.75rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: 1px solid var(--border-accent);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.25rem 0.7rem;
            line-height: 1;
            color: var(--text-secondary);
            border-radius: 3px;
        }

        .close-btn:hover {
            background: var(--danger-dim);
            border-color: var(--danger);
            color: var(--danger);
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
        }

        .form-label::before { content: '/ '; color: var(--accent); }

        textarea, input[type="text"], input[type="date"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-accent);
            background: var(--surface2);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
            resize: vertical;
            transition: border-color 0.2s ease;
            border-radius: 3px;
        }

        textarea:focus, input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea { min-height: 140px; line-height: 1.6; }

        /* ─── MOOD SELECTOR ─── */
        .mood-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .mood-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            background: var(--surface2);
            transition: all 0.2s ease;
            border-radius: 3px;
            flex: 1;
            min-width: 60px;
        }

        .mood-option:hover { border-color: var(--border-accent); }

        .mood-option.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .mood-emoji { font-size: 1.6rem; }

        .mood-name {
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* ─── ATOMIC NOTES ─── */
        .atomic-notes-section {
            margin-top: 0;
            padding: 1.25rem;
            border: 1px solid var(--border);
            background: var(--surface2);
            border-radius: 3px;
        }

        .atomic-notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .atomic-notes-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .atomic-note {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            padding: 0.65rem 0.75rem;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 3px;
            animation: slideDown 0.2s ease;
        }

        .atomic-note-text {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-primary);
            flex: 1;
        }

        .atomic-note-delete {
            background: none;
            border: 1px solid var(--border-accent);
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 2px;
            flex-shrink: 0;
            transition: all 0.15s ease;
        }

        .atomic-note-delete:hover {
            background: var(--danger-dim);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Inline add area */
        .atomic-add-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .atomic-add-row input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            margin: 0;
            font-size: 0.82rem;
        }

        .atomic-add-row button {
            padding: 0.5rem 0.85rem;
            flex-shrink: 0;
        }

        /* ─── TAGS ─── */
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--border-accent);
            background: var(--surface2);
            min-height: 50px;
            border-radius: 3px;
            align-items: center;
        }

        .tag-input-container:focus-within {
            border-color: var(--accent);
        }

        .tag-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.2rem 0.6rem;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            font-size: 0.7rem;
            text-transform: uppercase;
            border-radius: 2px;
            color: var(--accent);
        }

        .tag-remove {
            cursor: pointer;
            color: var(--accent);
            font-weight: bold;
            opacity: 0.7;
        }

        .tag-remove:hover { opacity: 1; }

        #tagInput {
            border: none;
            background: transparent;
            padding: 0.3rem;
            flex: 1;
            min-width: 90px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.82rem;
            color: var(--text-primary);
        }

        #tagInput:focus { outline: none; }

        /* ─── FAB ─── */
        .fab {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            border: 1px solid var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 100;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: scale(1.08);
        }

        .fab::before {
            content: '+';
            display: block;
            line-height: 1;
        }

        /* ─── MODAL FOOTER ─── */
        .modal-footer {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.75rem;
        }

        .btn-primary {
            flex: 1;
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: #000;
        }

        .btn-danger {
            background: var(--danger-dim);
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* ─── UTILITY ─── */
        .hidden { display: none !important; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            h1 { font-size: 1.1rem; }

            .header-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-row {
                justify-content: space-between;
            }

            .date-navigation {
                flex: 1;
            }

            .date-display {
                min-width: 120px;
                font-size: 0.7rem;
            }

            .data-controls {
                margin-left: 0;
            }

            .day-card { width: 230px; min-height: 420px; }

            .modal-content { width: 96%; padding: 1.25rem; }

            .stats-bar { gap: 1rem; }

            .stat-divider { display: none; }

            .mood-option { padding: 0.5rem 0.6rem; }

            .mood-name { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>MATRIX<span>.</span>JOURNAL <span style="font-size:0.75em; opacity:0.6;">v2.0</span></h1>
            </div>

            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Aktif görevler</span>
                    <span class="stat-value" id="activeTaskCount">—</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Tamamlanma</span>
                    <span class="stat-value" id="completionRate">—</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Bu hafta</span>
                    <span class="stat-value neutral" id="weekEntries">0</span>
                    <span class="stat-label">kayıt</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Popüler tag</span>
                    <span class="stat-value neutral" id="topTag">—</span>
                </div>
            </div>

            <div class="header-controls">
                <div class="control-row">
                    <div class="view-switcher">
                        <button class="view-btn active" data-view="weekly">Hafta</button>
                        <button class="view-btn" data-view="calendar">Takvim</button>
                        <button class="view-btn" data-view="list">Liste</button>
                    </div>

                    <div class="date-navigation">
                        <button id="prevPeriod" class="nav-btn">←</button>
                        <div class="date-display" id="dateDisplay"></div>
                        <button id="nextPeriod" class="nav-btn">→</button>
                        <button id="today">Bugün</button>
                    </div>
                </div>

                <div class="control-row">
                    <div class="data-controls">
                        <button id="exportData">↑ Export</button>
                        <button id="importData">↓ Import</button>
                        <input type="file" id="fileInput" accept=".json" class="hidden">
                    </div>
                </div>
            </div>
        </header>

        <div class="weekly-scroll-container" id="mainContent"></div>
    </div>

    <!-- Entry Modal -->
    <div class="modal" id="entryModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="entryModalTitle">Yeni kayıt</div>
                <button class="close-btn" id="closeEntryModal">✕</button>
            </div>

            <div class="form-group">
                <label class="form-label">Tarih</label>
                <input type="date" id="entryDate">
            </div>

            <div class="form-group">
                <label class="form-label">Ruh hali</label>
                <div class="mood-selector">
                    <div class="mood-option" data-mood="great"><div class="mood-emoji">😄</div><div class="mood-name">Harika</div></div>
                    <div class="mood-option" data-mood="good"><div class="mood-emoji">🙂</div><div class="mood-name">İyi</div></div>
                    <div class="mood-option" data-mood="neutral"><div class="mood-emoji">😐</div><div class="mood-name">Nötr</div></div>
                    <div class="mood-option" data-mood="bad"><div class="mood-emoji">😟</div><div class="mood-name">Kötü</div></div>
                    <div class="mood-option" data-mood="terrible"><div class="mood-emoji">😢</div><div class="mood-name">Berbat</div></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ana not</label>
                <textarea id="entryText" placeholder="Bugün ne oldu?"></textarea>
            </div>

            <!-- Atomic Notes Section -->
            <div class="form-group">
                <div class="atomic-notes-section">
                    <div class="atomic-notes-header">
                        <label class="form-label" style="margin:0;">Atomic notlar</label>
                    </div>
                    <div class="atomic-notes-list" id="atomicNotesList"></div>
                    <div class="atomic-add-row">
                        <input type="text" id="atomicNoteInput" placeholder="Yeni not ekle...">
                        <button id="addAtomicNoteBtn">+ Ekle</button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Etiketler</label>
                <div class="tag-input-container" id="tagContainer">
                    <input type="text" id="tagInput" placeholder="Etiket yaz, Enter'a bas">
                </div>
            </div>

            <div class="modal-footer">
                <button id="saveEntry" class="btn-primary">Kaydet</button>
                <button id="deleteEntry" class="hidden btn-danger">Sil</button>
            </div>
        </div>
    </div>

    <button class="fab" id="fab"></button>

    <script>
        // ─── DATA MANAGER ───
        class DataManager {
            constructor() {
                this.entries = this.loadEntries();
            }

            loadEntries() {
                const data = localStorage.getItem('matrixJournalEntries');
                return data ? JSON.parse(data) : {};
            }

            saveEntries() {
                localStorage.setItem('matrixJournalEntries', JSON.stringify(this.entries));
            }

            addEntry(date, entry) {
                this.entries[date] = entry;
                this.saveEntries();
            }

            getEntry(date) { return this.entries[date] || null; }

            deleteEntry(date) {
                delete this.entries[date];
                this.saveEntries();
            }

            exportData() {
                const data = { entries: this.entries, exportDate: new Date().toISOString(), version: '2.0' };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `matrix-journal-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }

            importData(data) {
                if (data.entries) this.entries = data.entries;
                this.saveEntries();
            }
        }

        // ─── APP STATE ───
        const dataManager = new DataManager();
        let currentView = 'weekly';
        let currentDate = new Date();
        let selectedDate = null;
        let editingEntry = null;
        let currentTags = [];
        let atomicNotes = [];

        // ─── DATE UTILITIES ───
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function getWeekDates(date) {
            const start = new Date(date);
            start.setDate(start.getDate() - start.getDay() + 1);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(start);
                d.setDate(d.getDate() + i);
                dates.push(d);
            }
            return dates;
        }

        function getMonthDates(date) {
            const year = date.getFullYear();
            const month = date.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const dates = [];
            const startDay = firstDay.getDay() || 7;

            for (let i = startDay - 1; i > 0; i--) {
                const d = new Date(firstDay);
                d.setDate(d.getDate() - i);
                dates.push({ date: d, otherMonth: true });
            }
            for (let i = 1; i <= lastDay.getDate(); i++) {
                dates.push({ date: new Date(year, month, i), otherMonth: false });
            }
            const remaining = 42 - dates.length;
            for (let i = 1; i <= remaining; i++) {
                const d = new Date(lastDay);
                d.setDate(d.getDate() + i);
                dates.push({ date: d, otherMonth: true });
            }
            return dates;
        }

        function getTurkishDayName(dayIndex) {
            return ['PAZ', 'PZT', 'SAL', 'ÇAR', 'PER', 'CUM', 'CMT'][dayIndex];
        }

        function getTurkishMonthName(monthIndex) {
            return ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran',
                    'Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'][monthIndex];
        }

        const moodEmojis = { great:'😄', good:'🙂', neutral:'😐', bad:'😟', terrible:'😢' };
        const moodLabels = { great:'Harika', good:'İyi', neutral:'Nötr', bad:'Kötü', terrible:'Berbat' };

        // ─── RENDER ───
        function renderWeeklyView() {
            const dates = getWeekDates(currentDate);
            const today = formatDate(new Date());

            let html = '<div class="weekly-view">';
            dates.forEach(date => {
                const dateStr = formatDate(date);
                const entry = dataManager.getEntry(dateStr);
                const isToday = dateStr === today;

                html += `
                    <div class="day-card ${isToday ? 'today' : ''}" data-date="${dateStr}">
                        <div class="terminal-header">
                            <div class="day-info">
                                <div class="day-name">${getTurkishDayName(date.getDay())}</div>
                                <div class="day-number">${date.getDate()}</div>
                                <div class="day-month">${getTurkishMonthName(date.getMonth())}</div>
                            </div>
                            ${entry && entry.mood ? `
                                <div class="mood-terminal">
                                    <div class="mood-indicator">${moodEmojis[entry.mood]}</div>
                                    <div class="mood-label">${moodLabels[entry.mood]}</div>
                                </div>
                            ` : ''}
                        </div>

                        ${entry && entry.text ? `
                            <div class="terminal-section">
                                <div class="section-label">Ana log</div>
                                <div class="note-preview">${entry.text}</div>
                                ${entry.atomicNotes && entry.atomicNotes.length > 0 ? `
                                    <div class="note-count">+ ${entry.atomicNotes.length} atomic not</div>
                                ` : ''}
                            </div>
                        ` : '<div class="empty-state">Henüz kayıt yok</div>'}

                        ${entry && entry.tags && entry.tags.length > 0 ? `
                            <div class="tags-terminal">
                                ${entry.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            html += '</div>';

            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('mainContent').className = 'weekly-scroll-container';
            attachDayClickListeners();
        }

        function renderCalendarView() {
            const dates = getMonthDates(currentDate);
            const today = formatDate(new Date());
            const dayNames = ['PZT', 'SAL', 'ÇAR', 'PER', 'CUM', 'CMT', 'PAZ'];

            let html = '<div class="calendar-container"><div class="calendar-header">';
            dayNames.forEach(day => { html += `<div class="calendar-day-name">${day}</div>`; });
            html += '</div><div class="calendar-view">';

            dates.forEach(({ date, otherMonth }) => {
                const dateStr = formatDate(date);
                const entry = dataManager.getEntry(dateStr);
                const isToday = dateStr === today;

                html += `
                    <div class="calendar-day ${otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}" data-date="${dateStr}">
                        <div class="cal-day-number">${date.getDate()}</div>
                        ${entry && !otherMonth && entry.mood ? `<div style="font-size:1.3rem;margin-top:0.3rem;">${moodEmojis[entry.mood]}</div>` : ''}
                    </div>
                `;
            });

            html += '</div></div>';
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('mainContent').className = '';
            attachDayClickListeners();
        }

        function renderListView() {
            const entries = Object.entries(dataManager.entries)
                .sort((a, b) => new Date(b[0]) - new Date(a[0]))
                .slice(0, 50);

            if (entries.length === 0) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty-state" style="padding:4rem; text-align:center;">Henüz kayıt yok</div>
                `;
                document.getElementById('mainContent').className = '';
                return;
            }

            let html = '<div class="list-view">';
            entries.forEach(([dateStr, entry]) => {
                const date = new Date(dateStr);
                html += `
                    <div class="entry-card" data-date="${dateStr}">
                        <div class="entry-header">
                            <div class="entry-date">${date.getDate()} ${getTurkishMonthName(date.getMonth())} ${date.getFullYear()}</div>
                            ${entry.mood ? `<div style="font-size:1.4rem;">${moodEmojis[entry.mood]}</div>` : ''}
                        </div>
                        <div class="entry-content">${entry.text}</div>
                        ${entry.atomicNotes && entry.atomicNotes.length > 0 ? `
                            <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.5rem;">+ ${entry.atomicNotes.length} atomic not</div>
                        ` : ''}
                        ${entry.tags && entry.tags.length > 0 ? `
                            <div class="tags-terminal">${entry.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
                        ` : ''}
                    </div>
                `;
            });
            html += '</div>';

            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('mainContent').className = '';
            attachDayClickListeners();
        }

        function renderStats() {
            // Week entries
            const weekDates = getWeekDates(currentDate).map(d => formatDate(d));
            const weekEntries = weekDates.filter(d => dataManager.getEntry(d)).length;
            document.getElementById('weekEntries').textContent = weekEntries;

            // Active tasks = entries with atomic notes (incomplete)
            // We treat entries that exist this week as "active"
            // More meaningful: total atomic notes across all entries
            const allEntries = Object.values(dataManager.entries);
            const totalAtomicNotes = allEntries.reduce((sum, e) => sum + (e.atomicNotes ? e.atomicNotes.length : 0), 0);
            document.getElementById('activeTaskCount').textContent = totalAtomicNotes > 0 ? totalAtomicNotes : '0';

            // Completion rate: entries with mood logged vs total entries
            const total = allEntries.length;
            const withMood = allEntries.filter(e => e.mood).length;
            const rate = total > 0 ? Math.round((withMood / total) * 100) : 0;
            document.getElementById('completionRate').textContent = total > 0 ? `%${rate}` : '—';

            // Top tag
            const allTags = [];
            allEntries.forEach(e => { if (e.tags) allTags.push(...e.tags); });
            const tagCounts = {};
            allTags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
            const topTag = Object.entries(tagCounts).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('topTag').textContent = topTag ? topTag[0] : '—';
        }

        function updateDateDisplay() {
            const display = document.getElementById('dateDisplay');
            if (currentView === 'weekly') {
                const dates = getWeekDates(currentDate);
                const start = dates[0];
                const end = dates[6];
                display.textContent = `${start.getDate()}–${end.getDate()} ${getTurkishMonthName(end.getMonth())}`;
            } else if (currentView === 'calendar') {
                display.textContent = `${getTurkishMonthName(currentDate.getMonth())} ${currentDate.getFullYear()}`;
            } else {
                display.textContent = 'Tüm kayıtlar';
            }
        }

        function render() {
            if (currentView === 'weekly') renderWeeklyView();
            else if (currentView === 'calendar') renderCalendarView();
            else renderListView();
            renderStats();
            updateDateDisplay();
        }

        // ─── CLICK LISTENERS ───
        function attachDayClickListeners() {
            document.querySelectorAll('.day-card, .calendar-day, .entry-card').forEach(el => {
                el.addEventListener('click', () => {
                    const dateStr = el.dataset.date;
                    openEntryModal(dateStr);
                });
            });
        }

        // ─── MODAL ───
        function openEntryModal(dateStr) {
            selectedDate = dateStr;
            const entry = dataManager.getEntry(dateStr);
            editingEntry = entry;

            document.getElementById('entryModalTitle').textContent = entry ? 'Kaydı düzenle' : 'Yeni kayıt';
            document.getElementById('entryDate').value = dateStr;
            document.getElementById('entryText').value = entry ? entry.text : '';

            document.querySelectorAll('.mood-option').forEach(m => m.classList.remove('selected'));
            if (entry && entry.mood) {
                const moodEl = document.querySelector(`.mood-option[data-mood="${entry.mood}"]`);
                if (moodEl) moodEl.classList.add('selected');
            }

            currentTags = entry && entry.tags ? [...entry.tags] : [];
            renderTagInput();

            atomicNotes = entry && entry.atomicNotes ? [...entry.atomicNotes] : [];
            renderAtomicNotes();

            document.getElementById('atomicNoteInput').value = '';
            document.getElementById('deleteEntry').classList.toggle('hidden', !entry);
            document.getElementById('entryModal').classList.add('active');
        }

        function closeEntryModal() {
            document.getElementById('entryModal').classList.remove('active');
            selectedDate = null;
            editingEntry = null;
            currentTags = [];
            atomicNotes = [];
        }

        // ─── TAG INPUT ───
        function renderTagInput() {
            const container = document.getElementById('tagContainer');
            const input = document.getElementById('tagInput');

            while (container.firstChild && container.firstChild !== input) {
                container.removeChild(container.firstChild);
            }

            currentTags.forEach(tag => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag-item';
                tagEl.innerHTML = `<span>${tag}</span><span class="tag-remove" data-tag="${tag}">×</span>`;
                container.insertBefore(tagEl, input);
            });

            document.querySelectorAll('.tag-remove').forEach(el => {
                el.addEventListener('click', () => {
                    currentTags = currentTags.filter(t => t !== el.dataset.tag);
                    renderTagInput();
                });
            });
        }

        // ─── ATOMIC NOTES ───
        function renderAtomicNotes() {
            const list = document.getElementById('atomicNotesList');

            if (atomicNotes.length === 0) {
                list.innerHTML = '<div style="font-size:0.78rem;color:var(--text-muted);padding:0.5rem 0;">Henüz atomic not yok</div>';
                return;
            }

            list.innerHTML = atomicNotes.map((note, index) => `
                <div class="atomic-note">
                    <span class="atomic-note-text">${note}</span>
                    <button class="atomic-note-delete" data-index="${index}">✕</button>
                </div>
            `).join('');

            document.querySelectorAll('.atomic-note-delete').forEach(btn => {
                btn.addEventListener('click', () => {
                    atomicNotes.splice(parseInt(btn.dataset.index), 1);
                    renderAtomicNotes();
                });
            });
        }

        function addAtomicNote() {
            const input = document.getElementById('atomicNoteInput');
            const val = input.value.trim();
            if (val) {
                atomicNotes.push(val);
                input.value = '';
                renderAtomicNotes();
                input.focus();
            }
        }

        // ─── EVENT LISTENERS ───
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                render();
            });
        });

        document.getElementById('prevPeriod').addEventListener('click', () => {
            if (currentView === 'weekly') currentDate.setDate(currentDate.getDate() - 7);
            else if (currentView === 'calendar') currentDate.setMonth(currentDate.getMonth() - 1);
            render();
        });

        document.getElementById('nextPeriod').addEventListener('click', () => {
            if (currentView === 'weekly') currentDate.setDate(currentDate.getDate() + 7);
            else if (currentView === 'calendar') currentDate.setMonth(currentDate.getMonth() + 1);
            render();
        });

        document.getElementById('today').addEventListener('click', () => {
            currentDate = new Date();
            render();
        });

        document.getElementById('closeEntryModal').addEventListener('click', closeEntryModal);
        document.getElementById('entryModal').addEventListener('click', (e) => {
            if (e.target.id === 'entryModal') closeEntryModal();
        });

        document.querySelectorAll('.mood-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.mood-option').forEach(m => m.classList.remove('selected'));
                option.classList.add('selected');
            });
        });

        document.getElementById('tagInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                e.preventDefault();
                const tag = e.target.value.trim().toUpperCase();
                if (!currentTags.includes(tag)) {
                    currentTags.push(tag);
                    renderTagInput();
                }
                e.target.value = '';
            }
        });

        document.getElementById('addAtomicNoteBtn').addEventListener('click', addAtomicNote);

        document.getElementById('atomicNoteInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addAtomicNote();
            }
        });

        document.getElementById('saveEntry').addEventListener('click', () => {
            const dateStr = document.getElementById('entryDate').value;
            const text = document.getElementById('entryText').value.trim();

            if (!text) {
                document.getElementById('entryText').focus();
                document.getElementById('entryText').style.borderColor = 'var(--danger)';
                setTimeout(() => document.getElementById('entryText').style.borderColor = '', 1500);
                return;
            }

            const selectedMood = document.querySelector('.mood-option.selected');
            dataManager.addEntry(dateStr, {
                text,
                mood: selectedMood ? selectedMood.dataset.mood : null,
                tags: currentTags,
                atomicNotes: atomicNotes,
                updatedAt: new Date().toISOString()
            });

            closeEntryModal();
            render();
        });

        document.getElementById('deleteEntry').addEventListener('click', () => {
            if (confirm('Bu kaydı silmek istediğine emin misin?')) {
                dataManager.deleteEntry(selectedDate);
                closeEntryModal();
                render();
            }
        });

        document.getElementById('fab').addEventListener('click', () => {
            openEntryModal(formatDate(new Date()));
        });

        document.getElementById('exportData').addEventListener('click', () => {
            dataManager.exportData();
        });

        document.getElementById('importData').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (confirm('Mevcut veriler silinecek. Devam edilsin mi?')) {
                            dataManager.importData(data);
                            render();
                        }
                    } catch (err) {
                        alert('Geçersiz dosya.');
                    }
                };
                reader.readAsText(file);
            }
        });

        // ─── INIT ───
        render();
    </script>
</body>
</html>
