<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX - REVIZE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #2ecc71; 
            --accent-dim: rgba(46, 204, 113, 0.1);
            --danger: #e74c3c;
            --warning: #f1c40f;
            --bg-grid: #0d0d0d;
            --bg-grid-lines: #161616;
            --bg: var(--bg-grid);
            --surface: #161616; 
            --surface2: #1f1f1f;
            --border: #2a2a2a; 
            --text1: #d1d1d1; 
            --text2: #777;
        }

        [data-theme="light"] {
            --bg-grid: #f4f4f7;
            --bg-grid-lines: #ebebef;
            --bg: var(--bg-grid);
            --surface: #ffffff; 
            --surface2: #ebebef;
            --border: #d1d1d1; 
            --text1: #222; 
            --text2: #666;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        body { background-color: var(--bg-grid); background-image: linear-gradient(var(--bg-grid-lines) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid-lines) 1px, transparent 1px); background-size: 20px 20px; color: var(--text1); padding: 1rem; }
        
        .container { max-width: 1100px; margin: 0 auto; }
        .header-block { border: 1px solid var(--border); padding: 1rem 1.5rem; margin-bottom: 0.5rem; background: var(--surface); position: relative; }
        h1 { font-family: 'Orbitron'; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; font-size: 1.8rem; }
        
        .kunye-block { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface); }
        .kunye-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* GÜNCELLENEN İSTATİSTİK BAR */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 1.5rem; }
        .stat-item { background: var(--surface2); padding: 15px; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .stat-item.danger-border { border-left-color: var(--danger); }
        .stat-label { color: var(--text2); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .stat-content { font-size: 1.5rem; color: var(--text1); font-weight: bold; font-family: 'Orbitron'; }

        .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent); padding: 12px; font-size: 0.8rem; margin-bottom: 1rem; outline: none; transition: border-color 0.3s; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-dim); }
        
        button { background: transparent; border: none; color: var(--text2); padding: 8px 14px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; display: flex; align-items: center; gap: 8px; transition: all 0.2s; position: relative; overflow: hidden; }
        button:hover { color: var(--accent); }
        button.active { background: var(--accent); color: #000; font-weight: bold; }
        button.active:hover { color: #000; opacity: 0.9; }

        .toast { padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 0.85rem; font-family: 'Share Tech Mono', monospace; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards; background: var(--surface2); border-left: 4px solid var(--accent); display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .toast.error { border-left-color: var(--danger); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; } }

        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 1rem; }
        .day-card { background: var(--surface); padding: 15px; cursor: pointer; position: relative; min-height: 140px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); border-left: 4px solid var(--border); transition: all 0.2s; }
        .day-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); border-color: var(--accent); }
        .day-card.recorded { border-left-color: var(--accent); }
        
        .day-title { font-size: 1rem; color: var(--accent); margin-bottom: 8px; font-weight: bold; font-family: 'Orbitron'; }
        .day-desc { font-size: 0.75rem; color: var(--text2); margin-bottom: 10px; }
        
        .habit-icons { display: flex; gap: 8px; margin-top: 10px; }
        .habit-icon { width: 24px; height: 24px; background: var(--surface2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--accent); }
        
        /* Modal ve Eklemeler */
        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; border-radius: 8px; box-shadow: 0 0 30px rgba(46,204,113,0.2); }
        
        .modal-block { background: var(--surface2); border: 1px solid var(--border); padding: 1.2rem; margin-bottom: 1rem; border-radius: 6px; }
        .day-title-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent); padding: 10px; font-size: 0.9rem; margin-bottom: 1rem; }
        
        .habit-btn { background: var(--surface); border: 1px solid var(--border); padding: 10px 15px; border-radius: 6px; cursor: pointer; transition: all 0.3s; font-size: 1rem; display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--text2); }
        .habit-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

        .fab { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 100; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4); transition: transform 0.2s; }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* Yeni Ekstra Sekmesi Tasarımı */
        .extra-filter-bar { display: flex; gap: 10px; background: var(--surface2); padding: 10px; border-radius: 6px; margin-bottom: 1rem; border: 1px solid var(--border); }
        .extra-filter-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: bold; }
        .extra-filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        .task-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 8px; border-radius: 4px; border-left: 4px solid var(--border); }
        .task-list-item.p1 { border-left-color: var(--danger); }
        .task-list-item.p2 { border-left-color: var(--warning); }
        .task-list-item.p3 { border-left-color: var(--accent); }

        /* Arşiv Son Aktivite */
        .latest-activity { background: linear-gradient(135deg, var(--surface2) 0%, rgba(46,204,113,0.05) 100%); border: 1px solid var(--accent); padding: 20px; border-radius: 6px; margin-bottom: 2rem; position: relative; }
        .latest-badge { position: absolute; top: -10px; left: 15px; background: var(--accent); color: #000; padding: 4px 10px; font-size: 0.65rem; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

<div class="container">
    <div class="header-block">
        <div id="themeToggle" style="position:absolute; top:1rem; right:1.5rem; cursor:pointer; color:var(--text2);"><i class="fa-solid fa-moon"></i></div>
        <h1><i class="fa-solid fa-terminal"></i> Matrix</h1>
        <div style="font-size: 0.65rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase;">terminal mod: revize v2.0</div>
    </div>

    <div class="kunye-block">
        <div class="kunye-label">// SİSTEM İSTATİSTİKLERİ</div>
        
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-label">Kayıt Sayısı</div>
                <div class="stat-content" id="stat-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Aktif Görevler</div>
                <div class="stat-content" id="stat-active">0</div>
            </div>
            <div class="stat-item danger-border">
                <div class="stat-label" style="color:var(--danger)">Kritik Durum</div>
                <div class="stat-content" style="color:var(--danger)" id="stat-critical">0</div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="globalSearch" class="search-input" placeholder="Sistem veri tabanında görev, not veya başlık ara...">
        </div>

        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;">
            <div style="display:flex; border:1px solid var(--border); background:var(--bg); border-radius:4px; overflow:hidden;">
                <button class="view-btn active" data-view="weekly"><i class="fa-solid fa-calendar-week"></i> HAFTALIK</button>
                <button class="view-btn" data-view="monthly"><i class="fa-solid fa-calendar-days"></i> AYLIK</button>
                <button class="view-btn" data-view="list"><i class="fa-solid fa-box-archive"></i> ARŞİV</button>
                <button class="view-btn" data-view="extra"><i class="fa-solid fa-layer-group"></i> EKSTRA</button>
            </div>
        </div>
    </div>

    <main id="mainContent"></main>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <div class="modal-block">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <div id="modalTitle" style="color:var(--accent); font-size:1.2rem; font-weight:bold; font-family:'Orbitron';">YENİ GİRİŞ</div>
                <i class="fa-solid fa-times" id="closeModal" style="cursor:pointer; font-size:1.5rem; color:var(--text2);"></i>
            </div>
            
            <input type="text" id="dayTitle" class="day-title-input" placeholder="Kayıt Başlığı / Gün Özeti">
            
            <div style="display:flex; gap:10px; margin-bottom:1rem;">
                <button class="habit-btn" id="h_zihin" data-habit="zihin"><i class="fa-solid fa-brain"></i> ZİHİN</button>
                <button class="habit-btn" id="h_spor" data-habit="spor"><i class="fa-solid fa-running"></i> SPOR</button>
                <button class="habit-btn" id="h_okuma" data-habit="okuma"><i class="fa-solid fa-book"></i> OKUMA</button>
            </div>
        </div>
        
        <div style="text-align:right;">
            <button id="saveBtn" style="background:var(--accent); color:#000; padding:10px 20px; font-weight:bold; border-radius:4px; margin-left:auto;"><i class="fa-solid fa-save"></i> SİSTEME KAYDET</button>
        </div>
    </div>
</div>

<div class="fab" id="fab"><i class="fa-solid fa-plus"></i></div>

<script>
// --- TEMEL VERİ VE UYGULAMA MANTIĞI ---
let entries = [
    { id: 1, title: "Sistem Kurulumu", desc: "Arayüz güncellemeleri tamamlandı.", habits: ['zihin', 'okuma'], tasks: [{text:"Backend entegrasyonu", p:1}, {text:"UI testleri", p:3}], date: "2026-04-04" },
    { id: 2, title: "Optimizasyon Günü", desc: "Kodlar temizlendi.", habits: ['spor'], tasks: [{text:"Gereksiz kodları sil", p:2}], date: "2026-04-05" }
];
let currentView = 'weekly';
let extraFilter = 'all';

// Elementler
const mainContent = document.getElementById('mainContent');
const searchInput = document.getElementById('globalSearch');
const viewBtns = document.querySelectorAll('.view-btn');
const modal = document.getElementById('entryModal');
const fab = document.getElementById('fab');
const closeModal = document.getElementById('closeModal');
const saveBtn = document.getElementById('saveBtn');

// Toast Bildirimi
window.showToast = (msg, type = 'success') => {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    const color = type === 'success' ? 'var(--accent)' : 'var(--danger)';
    toast.innerHTML = `<i class="fa-solid ${icon}" style="color:${color}"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
};

// İstatistikleri Güncelle
function updateStats() {
    document.getElementById('stat-count').innerText = entries.length;
    let activeTasks = 0;
    let criticalTasks = 0;
    entries.forEach(e => {
        if(e.tasks) {
            activeTasks += e.tasks.length;
            criticalTasks += e.tasks.filter(t => t.p === 1).length;
        }
    });
    document.getElementById('stat-active').innerText = activeTasks;
    document.getElementById('stat-critical').innerText = criticalTasks;
}

// Görünümleri Render Et
function render(searchTerm = "") {
    mainContent.innerHTML = "";
    
    // Arama Filtresi Uygula
    let filteredEntries = entries.filter(e => 
        e.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
        e.desc.toLowerCase().includes(searchTerm.toLowerCase())
    );

    if (currentView === 'weekly' || currentView === 'monthly') {
        const grid = document.createElement('div');
        grid.className = 'grid-view';
        filteredEntries.forEach(entry => {
            let habitHtml = entry.habits.map(h => {
                let icon = h === 'zihin' ? 'fa-brain' : (h === 'spor' ? 'fa-running' : 'fa-book');
                return `<div class="habit-icon"><i class="fa-solid ${icon}"></i></div>`;
            }).join('');

            grid.innerHTML += `
                <div class="day-card recorded">
                    <div class="day-title">${entry.title}</div>
                    <div class="day-desc">${entry.desc}</div>
                    <div style="font-size:0.65rem; color:var(--text2)"><i class="fa-regular fa-calendar"></i> ${entry.date}</div>
                    <div class="habit-icons">${habitHtml}</div>
                </div>
            `;
        });
        mainContent.appendChild(grid);
    } 
    else if (currentView === 'list') { // ARŞİV SEKMESİ
        if(filteredEntries.length > 0) {
            // Son Aktiviteyi En Üste Koy
            const latest = filteredEntries[filteredEntries.length - 1];
            mainContent.innerHTML += `
                <div class="latest-activity">
                    <div class="latest-badge"><i class="fa-solid fa-bolt"></i> EN SON AKTİVİTE</div>
                    <h2 class="day-title" style="font-size:1.5rem; margin-top:5px;">${latest.title}</h2>
                    <p style="color:var(--text2); margin-bottom:10px;">${latest.desc}</p>
                    <span style="font-size:0.8rem; background:var(--surface); padding:4px 8px; border-radius:4px;"><i class="fa-regular fa-calendar"></i> ${latest.date}</span>
                </div>
                <div class="kunye-label">// GEÇMİŞ KAYITLAR</div>
            `;
        }
        
        const listDiv = document.createElement('div');
        filteredEntries.slice().reverse().forEach((entry, index) => {
            if(index === 0 && searchTerm === "") return; // Son aktiviteyi tekrar basma
            listDiv.innerHTML += `
                <div class="task-list-item" style="border-left-color: var(--text2)">
                    <div>
                        <strong style="color:var(--accent)">${entry.title}</strong>
                        <div style="font-size:0.75rem; color:var(--text2); margin-top:4px;">${entry.desc}</div>
                    </div>
                    <div style="font-size:0.7rem;">${entry.date}</div>
                </div>
            `;
        });
        mainContent.appendChild(listDiv);
    }
    else if (currentView === 'extra') { // EKSTRA SEKMESİ (Görev Yönetimi)
        mainContent.innerHTML += `
            <div class="extra-filter-bar">
                <span style="font-size:0.8rem; color:var(--text2); display:flex; align-items:center;">Filtrele: </span>
                <button class="extra-filter-btn ${extraFilter === 'all' ? 'active' : ''}" onclick="setExtraFilter('all')">TÜMÜ</button>
                <button class="extra-filter-btn ${extraFilter === 1 ? 'active' : ''}" onclick="setExtraFilter(1)" style="${extraFilter === 1 ? 'color:var(--danger); border-color:var(--danger); background:transparent;' : ''}">KRİTİK</button>
                <button class="extra-filter-btn ${extraFilter === 2 ? 'active' : ''}" onclick="setExtraFilter(2)" style="${extraFilter === 2 ? 'color:var(--warning); border-color:var(--warning); background:transparent;' : ''}">ORTA</button>
                <button class="extra-filter-btn ${extraFilter === 3 ? 'active' : ''}" onclick="setExtraFilter(3)">DÜŞÜK</button>
            </div>
        `;

        let allTasks = [];
        filteredEntries.forEach(e => {
            if(e.tasks) {
                e.tasks.forEach(t => allTasks.push({ ...t, parentDate: e.date, parentTitle: e.title }));
            }
        });

        // Öncelik filtresi
        if(extraFilter !== 'all') {
            allTasks = allTasks.filter(t => t.p === extraFilter);
        }

        const taskDiv = document.createElement('div');
        allTasks.forEach(task => {
            let pClass = task.p === 1 ? 'p1' : (task.p === 2 ? 'p2' : 'p3');
            taskDiv.innerHTML += `
                <div class="task-list-item ${pClass}">
                    <div>
                        <span style="font-size:0.9rem; color:var(--text1);">${task.text}</span>
                        <div style="font-size:0.65rem; color:var(--text2); margin-top:5px;">
                            <i class="fa-solid fa-link"></i> ${task.parentTitle} (${task.parentDate})
                        </div>
                    </div>
                </div>
            `;
        });
        mainContent.appendChild(taskDiv);
    }
    updateStats();
}

// Extra Sekmesi Filtre Fonksiyonu
window.setExtraFilter = function(level) {
    extraFilter = level;
    render(searchInput.value);
};

// Event Listeners
searchInput.addEventListener('input', (e) => render(e.target.value));

viewBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
        viewBtns.forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        currentView = e.currentTarget.dataset.view;
        render(searchInput.value);
    });
});

fab.addEventListener('click', () => modal.classList.add('active'));
closeModal.addEventListener('click', () => modal.classList.remove('active'));

saveBtn.addEventListener('click', () => {
    const title = document.getElementById('dayTitle').value || 'İsimsiz Giriş';
    
    // Aktif alışkanlıkları bul
    const activeHabits = [];
    document.querySelectorAll('.habit-btn.active').forEach(b => activeHabits.push(b.dataset.habit));

    entries.push({
        id: Date.now(),
        title: title,
        desc: "Sistem üzerinden manuel giriş yapıldı.",
        habits: activeHabits,
        tasks: [], // Geliştirilebilir
        date: new Date().toISOString().split('T')[0]
    });
    
    document.getElementById('dayTitle').value = '';
    document.querySelectorAll('.habit-btn').forEach(b => b.classList.remove('active'));
    modal.classList.remove('active');
    
    showToast('Sisteme başarıyla kaydedildi.');
    render();
});

// Habit Buton Toggle
document.querySelectorAll('.habit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.currentTarget.classList.toggle('active');
    });
});

// İlk Yükleme
render();

</script>
</body>
</html>
