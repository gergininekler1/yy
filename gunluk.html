<!-- ========== MATRIX REVIZE 5 (GÜNCEL) ========== -->
<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATRIX REVIZE 5</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--accent:#2ecc71;
--bg:#0d0d0d;
--surface:#161616;
--surface2:#1f1f1f;
--border:#2a2a2a;
--text1:#d1d1d1;
--text2:#777;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Share Tech Mono',monospace;}
body{background:var(--bg);color:var(--text1);padding:1rem;}
.container{max-width:1100px;margin:auto;}

button{background:transparent;border:none;color:var(--text2);padding:8px 14px;cursor:pointer;font-size:0.7rem;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
button.active{background:var(--accent);color:#000;}

.header-block{border:1px solid var(--border);padding:1rem;margin-bottom:1rem;background:var(--surface);}
h1{color:var(--accent);letter-spacing:4px;}

.weekly-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}

.day-card-wrapper{display:flex;gap:8px;}

.day-left{
min-width:60px;
display:flex;
align-items:center;
justify-content:center;
background:var(--surface2);
border:1px solid var(--border);
border-radius:6px;
font-size:0.75rem;
color:var(--accent);
font-weight:bold;
}

.day-card{
background:var(--surface);
padding:12px;
border-radius:6px;
flex:1;
cursor:pointer;
border-left:4px solid var(--border);
}

.day-card.recorded{border-left-color:var(--accent);}

.day-header{font-size:0.6rem;color:var(--text2);}
.day-title{color:var(--accent);font-size:0.9rem;margin:5px 0;}

.stats{font-size:0.65rem;color:var(--text2);}

.nav{display:flex;gap:10px;margin-bottom:1rem;}

</style>
</head>

<body>
<div class="container">

<div class="header-block">
<h1>Matrix</h1>
</div>

<!-- SEKME BUTONLARI (İKONLU) -->
<div class="nav">
<button class="view-btn active" onclick="setView('weekly')">
<i class="fa-solid fa-calendar-week"></i> HAFTALIK
</button>

<button class="view-btn" onclick="setView('monthly')">
<i class="fa-solid fa-calendar"></i> AYLIK
</button>

<button class="view-btn" onclick="setView('list')">
<i class="fa-solid fa-box-archive"></i> ARŞİV
</button>

<button class="view-btn" onclick="setView('extra')">
<i class="fa-solid fa-layer-group"></i> EKSTRA
</button>
</div>

<div id="main"></div>

</div>

<script>
const fmt=d=>d.toISOString().split('T')[0];

const state={
entries:{},
view:'weekly',
cursor:new Date()
};

/* =========================
   KAYIT SAYISI DÜZELTME
========================= */
function getRecordCount(){
return Object.values(state.entries).filter(e =>
e && (
(e.text && e.text.trim()!=='') ||
(e.title && e.title.trim()!=='') ||
(e.tasks && e.tasks.length) ||
(e.atomics && e.atomics.length)
)
).length;
}

/* =========================
   VIEW
========================= */
function setView(v){
state.view=v;
render();
}

/* =========================
   RENDER
========================= */
function render(){
if(state.view==='weekly') renderWeekly();
else if(state.view==='extra') renderExtra();
else document.getElementById('main').innerHTML='';
}

/* =========================
   HAFTALIK (2 BLOK SİSTEM)
========================= */
function renderWeekly(){
const el=document.getElementById('main');
el.innerHTML='<div class="weekly-grid"></div>';
const grid=el.querySelector('.weekly-grid');

let start=new Date(state.cursor);
start.setDate(start.getDate()-start.getDay());

for(let i=0;i<7;i++){
let d=new Date(start);
d.setDate(start.getDate()+i);

let key=fmt(d);
let e=state.entries[key]||{};

let shortDay=d.toLocaleDateString('tr-TR',{weekday:'short'}).toUpperCase();

grid.innerHTML+=`
<div class="day-card-wrapper">

<div class="day-left">
${shortDay}
</div>

<div class="day-card ${e.text?'recorded':''}">
<div class="day-header">${d.toLocaleDateString('tr-TR')}</div>
${e.title?`<div class="day-title">${e.title}</div>`:''}
<div class="stats">Görev: ${(e.tasks||[]).length}</div>
</div>

</div>
`;
}
}

/* =========================
   EXTRA (FİLTRE TAŞINDI)
========================= */
function renderExtra(){
const el=document.getElementById('main');

el.innerHTML=`
<div style="margin-bottom:1rem; border:1px solid var(--border); padding:10px;">

<div style="margin-bottom:6px; font-size:0.6rem; color:var(--accent);">
GÖREV FİLTRE
</div>

<div style="display:flex; gap:5px;">
<button onclick="filterTasks('all')">TÜMÜ</button>
<button onclick="filterTasks('1')">KRİTİK</button>
<button onclick="filterTasks('2')">ORTA</button>
<button onclick="filterTasks('3')">DÜŞÜK</button>
</div>

</div>

<div>Kayıt Sayısı: ${getRecordCount()}</div>
`;
}

/* =========================
   FILTER (placeholder)
========================= */
function filterTasks(f){
alert("Filtre: "+f);
}

/* =========================
   INIT
========================= */
render();

</script>
</body>
</html>
