<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX - REVIZE PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #2ecc71;
            --accent-dim: rgba(46, 204, 113, 0.1);
            --danger: #e74c3c;
            --danger-pale: rgba(231, 76, 60, 0.5); /* Yeni solgun kırmızı */
            --warning: #f1c40f;
            --bg-grid: #0d0d0d;
            --bg-grid-lines: #161616;
            --bg: var(--bg-grid);
            --surface: #161616;
            --surface2: #1f1f1f;
            --border: #2a2a2a;
            --text1: #d1d1d1;
            --text2: #777;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }

        body {
            background-color: var(--bg-grid);
            background-image: linear-gradient(var(--bg-grid-lines) 1px, transparent 1px),
                              linear-gradient(90deg, var(--bg-grid-lines) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text1);
            padding: 1rem;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* ── HEADER ── */
        .header-block {
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            margin-bottom: 0.5rem;
            background: var(--surface);
            position: relative;
        }
        h1 { font-family: 'Orbitron'; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; font-size: 1.8rem; }

        /* ── KUNYE ── */
        .kunye-block {
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            background: var(--surface);
        }
        .kunye-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }

        /* ── STATS BAR ── */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
        .stat-item {
            background: var(--surface2); padding: 16px; border-left: 3px solid var(--accent);
            border-radius: 6px; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .stat-label { color: var(--text2); font-size: 0.55rem; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .stat-content { font-size: 0.7rem; line-height: 1.4; }
        .task-chip {
            display: inline-block; background: var(--surface); border: 1px solid var(--border);
            padding: 3px 8px; margin: 2px; border-radius: 3px; font-size: 0.65rem; cursor: pointer;
        }

        /* ── SEARCH ── */
        .terminal-search-wrapper {
            position: relative; margin-bottom: 1.5rem; display: flex; align-items: center;
            background: var(--bg-grid-lines); border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
        }
        .terminal-prompt { color: var(--accent); padding: 12px 14px; font-weight: bold; font-size: 0.85rem; }
        .terminal-search-input { flex: 1; background: transparent; border: none; color: var(--text1); padding: 12px 0; outline: none; }

        /* ── DAY CARDS ── */
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .day-card {
            background: var(--surface); display: flex; cursor: pointer; border-radius: 6px; overflow: hidden;
            border-left: 5px solid #444; /* Kayıt yoksa gri çizgi */
            transition: all 0.2s; min-height: 140px;
        }
        .day-card.recorded { border-left-color: #2ecc71 !important; } /* Kayıt varsa yeşil çizgi */
        .day-card:hover { transform: translateY(-3px); }
        .day-card-left { width: 60px; background: rgba(0, 0, 0, 0.2); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text2); }
        .day-card-right { flex: 1; padding: 15px; position: relative; }
        
        /* ── PROGRESS BAR (REVİZE: SOLGUN KIRMIZI) ── */
        .progress-bar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; background: var(--danger-pale); transition: width 0.4s ease; }

        /* ── MODAL ── */
        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg); border: 1px solid var(--accent); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; border-radius: 6px; }
        .modal-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem; }
        
        textarea { width: 100%; min-height: 100px; background: var(--bg); border: 1px solid var(--border); color: var(--text1); padding: 10px; border-radius: 4px; outline: none; }
        .list-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); padding: 8px 12px; margin-bottom: 4px; font-size: 0.75rem; border-radius: 5px; }
        
        /* ── BUTTONS ── */
        button { background: var(--surface2); border: 1px solid var(--border); color: var(--text1); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .view-btn.active { background: var(--accent); color: #000; }
        .fab { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 100; }

        .backup-alert { color: var(--warning); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-block">
        <h1><i class="fa-solid fa-terminal"></i> Matrix</h1>
    </div>

    <div class="kunye-block">
        <div class="kunye-label">// SİSTEM DURUMU</div>
        <div style="display:flex; gap:10px; margin-bottom:1.5rem;">
            <button id="exportBtn">[EXPORT] <span id="backupWarning"></span></button>
            <button id="importBtn">[IMPORT]</button>
            <input type="file" id="fileInput" hidden>
        </div>

        <div class="stats-bar" id="statsBar"></div>

        <div class="terminal-search-wrapper">
            <span class="terminal-prompt">root@matrix:~#</span>
            <input type="text" id="globalSearch" class="terminal-search-input" placeholder="Sistemde ara...">
        </div>

        <div style="display:flex; gap:10px; background:var(--surface2); padding:8px; border-radius:8px;">
            <button class="view-btn active" data-view="weekly">HAFTALIK</button>
            <button class="view-btn" data-view="monthly">AYLIK</button>
            <button class="view-btn" data-view="extra">EKSTRA</button>
            <div id="currentRange" style="margin-left:auto; font-size:0.8rem; display:flex; align-items:center; padding-right:10px;"></div>
        </div>
    </div>

    <main id="mainContent"></main>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <div class="modal-block">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <div id="modalTitle" style="color:var(--accent); font-weight:bold; font-family:'Orbitron';"></div>
                <i class="fa-solid fa-times" onclick="closeModal()" style="cursor:pointer; color:var(--text2);"></i>
            </div>
            <input type="text" id="dayTitle" placeholder="Gün Başlığı" style="width:100%; background:var(--bg); border:1px solid var(--border); color:var(--accent); padding:10px; border-radius:4px; outline:none; margin-bottom:10px;">
            <div id="modalHabitBar" style="display:flex; gap:5px;">
                <button onclick="toggleHabit('zihin')" id="h_zihin">ZİHİN</button>
                <button onclick="toggleHabit('spor')" id="h_spor">SPOR</button>
                <button onclick="toggleHabit('okuma')" id="h_okuma">OKUMA</button>
            </div>
        </div>

        <div class="modal-block">
            <div class="kunye-label">// GÖREVLER</div>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="taskInput" placeholder="Görev..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:8px;">
                <select id="prioritySelect" style="background:var(--surface2); color:var(--text1); border:1px solid var(--border);">
                    <option value="1">KRİTİK</option>
                    <option value="2">ORTA</option>
                    <option value="3" selected>DÜŞÜK</option>
                </select>
                <button onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="modalTasks"></div>
        </div>

        <div class="modal-block">
            <div class="kunye-label">// ATOMİK NOT EKLE</div>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="atomicInput" placeholder="Kısa not..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:8px;">
                <button onclick="addAtomic()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="modalAtomics"></div>
        </div>

        <div class="modal-block">
            <div class="kunye-label">// GÜN NOTU</div>
            <textarea id="entryText"></textarea>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="closeModal()">İPTAL</button>
            <button id="saveBtn" style="background:var(--accent); color:#000;">KAYDET</button>
        </div>
    </div>
</div>

<div class="fab" id="fab"><i class="fa-solid fa-plus"></i></div>

<script>
const fmt = (d) => d.toISOString().split('T')[0];
const state = {
    entries: JSON.parse(localStorage.getItem('matrix_entries') || '{}'),
    view: 'weekly',
    cursor: new Date(),
    selectedDate: null,
    temp: { tasks:[], habits:[], atomics:[] }
};

const save = () => {
    localStorage.setItem('matrix_entries', JSON.stringify(state.entries));
    localStorage.setItem('matrix_last_backup', new Date().toISOString());
    render();
};

const updateStats = () => {
    const all = Object.entries(state.entries);
    const validCount = all.filter(([d, e]) => e.text || e.tasks?.length || e.atomics?.length).length;
    
    // AKTİF GÖREVLER (REVİZE: Sadece Tarih)
    const activeDays = all.filter(([d,e]) => e.tasks?.some(t => !t.done)).map(([d]) => d);
    const activeHtml = activeDays.length ? activeDays.slice(0,3).map(d => `<span class="task-chip">${d}</span>`).join('') : 'YOK';

    // KRİTİK GÖREV SAYACI (YENİ)
    let criticalCount = 0;
    all.forEach(([d,e]) => {
        criticalCount += (e.tasks || []).filter(t => t.priority == 1 && !t.done).length;
    });

    // YEDEKLEME HATIRLATICI (YENİ)
    const lastB = localStorage.getItem('matrix_last_backup');
    const needsBackup = !lastB || (Date.now() - new Date(lastB).getTime() > 3 * 86400000);
    document.getElementById('backupWarning').innerHTML = needsBackup ? '<i class="fa-solid fa-clock-rotate-left backup-alert"></i>' : '';

    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item">
            <div class="stat-label">SİSTEM KAYDI</div>
            <div class="stat-content" style="font-size:1.4rem; color:var(--accent);">${validCount} GÜN</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">AKTİF GÖREVLER (TARİH)</div>
            <div class="stat-content">${activeHtml}</div>
        </div>
        <div class="stat-item" style="border-left-color:${criticalCount > 0 ? 'var(--danger)' : 'var(--accent)'}">
            <div class="stat-label">KRİTİK GÖREV SAYACI</div>
            <div class="stat-content" style="font-size:1.4rem; color:${criticalCount > 0 ? 'var(--danger)' : 'var(--accent)'};">${criticalCount}</div>
        </div>
    `;
};

const render = () => {
    const el = document.getElementById('mainContent');
    updateStats();
    if (state.view === 'weekly') renderWeekly(el);
    else if (state.view === 'monthly') renderMonthly(el);
    else if (state.view === 'extra') renderExtra(el);
};

const renderWeekly = (el) => {
    const start = new Date(state.cursor);
    start.setDate(start.getDate() - start.getDay());
    el.innerHTML = '<div class="weekly-grid"></div>';
    const grid = el.querySelector('.weekly-grid');

    for (let i = 0; i < 7; i++) {
        const d = new Date(start); d.setDate(start.getDate() + i);
        const key = fmt(d);
        const e = state.entries[key] || {};
        const hasRecords = e.text || e.tasks?.length || e.atomics?.length;
        const totalTasks = e.tasks?.length || 0;
        const doneTasks = e.tasks?.filter(t => t.done).length || 0;
        const prog = totalTasks > 0 ? Math.round((doneTasks/totalTasks)*100) : 0;

        grid.innerHTML += `
            <div class="day-card ${hasRecords ? 'recorded' : ''}" onclick="openEntry('${key}')">
                <div class="day-card-left">${d.toLocaleDateString('tr-TR', {weekday:'short'})}</div>
                <div class="day-card-right">
                    <div style="font-size:0.6rem; color:var(--text2);">${key}</div>
                    <div style="color:var(--accent); margin:5px 0; font-weight:bold;">${e.title || '---'}</div>
                    ${totalTasks > 0 ? `
                        <div style="font-size:0.6rem; margin-top:10px;">GÖREV: %${prog}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
                    ` : ''}
                </div>
            </div>`;
    }
};

const renderExtra = (el) => {
    el.innerHTML = `
        <div class="modal-block">
            <div class="kunye-label">// TÜM ATOMİK NOTLAR</div>
            <div id="atomicPool" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
        </div>
        <div class="modal-block">
            <div class="kunye-label">// BEKLEYEN GÖREV HAVUZU</div>
            <div id="pendingTasks"></div>
        </div>
    `;
    const pool = el.querySelector('#atomicPool');
    const tasks = el.querySelector('#pendingTasks');
    
    Object.entries(state.entries).forEach(([d, e]) => {
        (e.atomics || []).forEach(a => {
            pool.innerHTML += `<div class="task-chip">${a} <small style="opacity:0.5">(${d})</small></div>`;
        });
        (e.tasks || []).forEach(t => {
            if(!t.done) tasks.innerHTML += `<div class="list-row"><span>${t.text}</span> <small>${d}</small></div>`;
        });
    });
};

window.openEntry = (date) => {
    state.selectedDate = date;
    const e = state.entries[date] || { text:'', title:'', habits:[], tasks:[], atomics:[] };
    state.temp = { tasks:[...(e.tasks||[])], habits:[...(e.habits||[])], atomics:[...(e.atomics||[])] };
    
    document.getElementById('modalTitle').innerText = date;
    document.getElementById('dayTitle').value = e.title || '';
    document.getElementById('entryText').value = e.text || '';
    renderModalTemp();
    document.getElementById('entryModal').classList.add('active');
};

const renderModalTemp = () => {
    document.getElementById('modalTasks').innerHTML = state.temp.tasks.map((t, i) => `
        <div class="list-row">
            <input type="checkbox" ${t.done?'checked':''} onchange="state.temp.tasks[${i}].done=!state.temp.tasks[${i}].done; renderModalTemp();">
            <span style="flex:1; ${t.done?'text-decoration:line-through; opacity:0.5':''}">${t.text}</span>
            <i class="fa-solid fa-trash" onclick="state.temp.tasks.splice(${i},1); renderModalTemp();" style="cursor:pointer; color:var(--danger)"></i>
        </div>
    `).join('');

    document.getElementById('modalAtomics').innerHTML = state.temp.atomics.map((a, i) => `
        <div class="list-row">
            <span style="flex:1;">${a}</span>
            <i class="fa-solid fa-trash" onclick="state.temp.atomics.splice(${i},1); renderModalTemp();" style="cursor:pointer; color:var(--danger)"></i>
        </div>
    `).join('');

    ['zihin','spor','okuma'].forEach(h => {
        document.getElementById('h_'+h).style.background = state.temp.habits.includes(h) ? 'var(--accent)' : '';
        document.getElementById('h_'+h).style.color = state.temp.habits.includes(h) ? '#000' : '';
    });
};

window.addTask = () => {
    const val = document.getElementById('taskInput').value;
    const pr = document.getElementById('prioritySelect').value;
    if(val) {
        state.temp.tasks.push({ text: val, done: false, priority: pr });
        document.getElementById('taskInput').value = '';
        renderModalTemp();
    }
};

window.addAtomic = () => {
    const val = document.getElementById('atomicInput').value;
    if(val) {
        state.temp.atomics.push(val);
        document.getElementById('atomicInput').value = '';
        renderModalTemp();
    }
};

window.toggleHabit = (h) => {
    const idx = state.temp.habits.indexOf(h);
    if(idx > -1) state.temp.habits.splice(idx,1);
    else state.temp.habits.push(h);
    renderModalTemp();
};

document.getElementById('saveBtn').onclick = () => {
    state.entries[state.selectedDate] = {
        title: document.getElementById('dayTitle').value,
        text: document.getElementById('entryText').value,
        tasks: state.temp.tasks,
        habits: state.temp.habits,
        atomics: state.temp.atomics
    };
    save();
    closeModal();
};

window.closeModal = () => document.getElementById('entryModal').classList.remove('active');
document.getElementById('fab').onclick = () => openEntry(fmt(new Date()));

document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.view = btn.dataset.view;
        render();
    };
});

document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(state.entries)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'matrix_backup.json'; a.click();
};

render();
</script>
</body>
</html>
