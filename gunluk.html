<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX.JOURNAL v4.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00e676;
            --accent-dim: rgba(0,230,118,0.1);
            --danger: #ff4d6d;
            --bg: #0a0a0a; --surface: #121212; --surface2: #1a1a1a;
            --border: #333; --text1: #e0e0e0; --text2: #888;
        }

        [data-theme="light"] {
            --bg: #f5f5f7; --surface: #ffffff; --surface2: #ebebed;
            --border: #ccc; --text1: #1a1a1a; --text2: #666;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        body { background: var(--bg); color: var(--text1); transition: background 0.3s; padding: 1rem; }
        
        .container { max-width: 1000px; margin: 0 auto; }

        /* ─── HEADER & CONTROLS ─── */
        header { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem; background: var(--surface); }
        h1 { font-family: 'Orbitron'; letter-spacing: 5px; color: var(--accent); margin-bottom: 0.5rem; }
        
        .sub-header-controls { display: flex; gap: 10px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1rem; }
        .stat-item { background: var(--surface2); padding: 0.5rem 1rem; border-left: 2px solid var(--accent); }
        .stat-label { font-size: 0.6rem; color: var(--text2); }

        .main-nav { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .btn-group { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        
        button { 
            background: transparent; border: none; color: var(--text2); padding: 8px 15px; 
            cursor: pointer; font-size: 0.8rem; transition: 0.2s;
        }
        button:hover { color: var(--accent); background: var(--accent-dim); }
        button.active { background: var(--accent); color: #000; font-weight: bold; }

        /* ─── VIEWS ─── */
        .view-section { margin-top: 1.5rem; }
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .day-card { 
            background: var(--surface); border: 1px solid var(--border); padding: 1rem; 
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .day-card:hover { border-color: var(--accent); }
        .day-card.today { border-color: var(--accent); border-width: 2px; }

        .habit-indicator { 
            width: 10px; height: 10px; border-radius: 50%; background: var(--border); 
            display: inline-block; margin-right: 5px; 
        }
        .habit-indicator.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* ─── MODAL ─── */
        .modal { 
            display:none; position:fixed; inset:0; background: rgba(0,0,0,0.9); 
            z-index: 1000; align-items: center; justify-content: center; padding: 10px;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: var(--surface2); border: 1px solid var(--accent); width: 100%; 
            max-width: 650px; max-height: 95vh; overflow-y: auto; padding: 2rem;
        }

        textarea { 
            width: 100%; min-height: 200px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text1); padding: 1rem; margin-top: 10px; resize: none;
        }

        .task-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; background: var(--bg); padding: 5px; }

        /* ─── FOCUS MODE ─── */
        body.focus-mode header, body.focus-mode footer, body.focus-mode .fab { opacity: 0; pointer-events: none; }
        body.focus-mode .view-section { transform: translateY(-50px); }

        /* ─── FOOTER ─── */
        footer { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 2rem; }
        .atomic-stream { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .atomic-chip { background: var(--surface2); padding: 4px 12px; border: 1px solid var(--border); font-size: 0.75rem; color: var(--text2); }

        .fab { 
            position: fixed; bottom: 2rem; right: 2rem; width: 50px; height: 50px;
            background: var(--accent); color: #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
            cursor: pointer; box-shadow: 0 0 20px rgba(0,230,118,0.3);
        }

        .list-item { background: var(--surface); border: 1px solid var(--border); padding: 1rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MATRIX.JOURNAL v4.1</h1>
        
        <div class="sub-header-controls">
            <button id="focusBtn" style="border:1px solid var(--border)">[👁️ FOCUS MODE]</button>
            <button id="themeToggle" style="border:1px solid var(--border)">[☀️ LIGHT/DARK]</button>
        </div>

        <div class="stats-bar" id="statsBar"></div>

        <div class="main-nav">
            <div class="btn-group">
                <button class="view-btn active" data-view="weekly">HAFTALIK</button>
                <button class="view-btn" data-view="list">LİSTE</button>
                <button class="view-btn" data-view="tasks">TÜM GÖREVLER</button>
            </div>
            <div class="btn-group">
                <button id="prevBtn">&lt;</button>
                <button id="currentRange" style="min-width: 140px; pointer-events: none;"></button>
                <button id="nextBtn">&gt;</button>
            </div>
        </div>
    </header>

    <main id="mainContent" class="view-section"></main>

    <footer id="footer">
        <div style="text-align: center; color: var(--text2); font-size: 0.6rem; margin-bottom: 1rem;">// RANDOM_ATOMIC_HISTORY</div>
        <div class="atomic-stream" id="atomicStream"></div>
    </footer>
</div>

<div class="modal" id="entryModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Orbitron'; color:var(--accent); margin-bottom: 1rem;">00-00-0000</h2>
        
        <div style="margin-bottom: 1.5rem; background: var(--bg); padding: 10px; border: 1px solid var(--border);">
            <label style="cursor:pointer; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="habitDemir" style="width:18px; height:18px;">
                <span style="font-weight: bold; color: var(--accent);">DEMİR GİBİ ZİHİN</span>
            </label>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <div style="color:var(--text2); font-size:0.7rem; margin-bottom:5px;">// GÖREVLER</div>
            <div id="modalTaskList"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="taskInput" placeholder="Yeni görev..." style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:5px;">
                <button id="addTaskBtn" style="border:1px solid var(--accent); color:var(--accent);">EKLE</button>
            </div>
        </div>

        <div>
            <div style="color:var(--text2); font-size:0.7rem;">// GÜNLÜK NOT</div>
            <textarea id="entryText" placeholder="Sistem kaydı girin..."></textarea>
        </div>

        <div style="margin-top: 1.5rem;">
            <div style="color:var(--text2); font-size:0.7rem;">// ATOMİK NOTLAR (ENTER)</div>
            <div id="modalAtomicList" style="margin-bottom: 5px;"></div>
            <input type="text" id="atomicInput" placeholder="Hızlı not ekle..." style="width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text1); padding:5px;">
        </div>

        <div style="display:flex; gap:10px; margin-top:2rem;">
            <button id="saveBtn" style="flex:2; background:var(--accent); color:#000; font-weight:bold;">SİSTEME KAYDET</button>
            <button id="closeBtn" style="flex:1; border:1px solid var(--border);">İPTAL</button>
        </div>
    </div>
</div>

<div class="fab" id="fab">+</div>

<script>
const state = {
    entries: JSON.parse(localStorage.getItem('mj_v41_data') || '{}'),
    view: 'weekly',
    date: new Date(),
    selectedDate: null,
    tempTasks: [],
    tempAtomics: []
};

const save = () => localStorage.setItem('mj_v41_data', JSON.stringify(state.entries));
const fmt = (d) => d.toISOString().split('T')[0];

/* ─── RENDERING ─── */
const render = () => {
    const container = document.getElementById('mainContent');
    container.innerHTML = '';
    
    if(state.view === 'weekly') {
        renderWeekly(container);
    } else if(state.view === 'list') {
        renderList(container);
    } else if(state.view === 'tasks') {
        renderAllTasks(container);
    }

    updateStats();
    renderAtomics();
};

const renderWeekly = (el) => {
    const start = new Date(state.date);
    start.setDate(start.getDate() - (start.getDay() || 7) + 1);
    document.getElementById('currentRange').textContent = `${start.getDate()} - ${new Date(new Date(start).setDate(start.getDate()+6)).getDate()} ${start.toLocaleString('tr-TR', {month:'short'})}`;

    const grid = document.createElement('div');
    grid.className = 'weekly-grid';
    
    for(let i=0; i<7; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        const ds = fmt(d);
        const entry = state.entries[ds];
        const isToday = ds === fmt(new Date());

        grid.innerHTML += `
            <div class="day-card ${isToday ? 'today' : ''}" onclick="openEntry('${ds}')">
                <div style="display:flex; justify-content:space-between;">
                    <span style="font-size:0.7rem; color:var(--text2)">${d.toLocaleDateString('tr-TR',{weekday:'short'}).toUpperCase()}</span>
                    <span class="habit-indicator ${entry?.habit ? 'active' : ''}"></span>
                </div>
                <div style="font-family:'Orbitron'; font-size:1.2rem; margin: 5px 0;">${d.getDate()}</div>
                <div style="font-size:0.75rem; color:var(--text2); height:40px; overflow:hidden;">
                    ${entry ? entry.text.substring(0,60) + '...' : '---'}
                </div>
            </div>
        `;
    }
    el.appendChild(grid);
};

const renderList = (el) => {
    const sorted = Object.keys(state.entries).sort().reverse();
    if(!sorted.length) el.innerHTML = '<div style="text-align:center">Kayıt bulunamadı.</div>';
    sorted.forEach(date => {
        const e = state.entries[date];
        el.innerHTML += `
            <div class="list-item" onclick="openEntry('${date}')">
                <b style="color:var(--accent)">${date}</b> - ${e.text.substring(0,100)}...
            </div>
        `;
    });
};

const renderAllTasks = (el) => {
    let hasTasks = false;
    Object.keys(state.entries).forEach(date => {
        const tasks = state.entries[date].tasks || [];
        if(tasks.length) {
            hasTasks = true;
            el.innerHTML += `<div style="color:var(--accent); margin:15px 0 5px; font-size:0.8rem;">[${date}]</div>`;
            tasks.forEach(t => {
                el.innerHTML += `
                    <div class="task-row" style="opacity: ${t.done ? 0.5 : 1}">
                        <input type="checkbox" ${t.done ? 'checked' : ''} disabled>
                        <span style="${t.done ? 'text-decoration:line-through' : ''}">${t.text}</span>
                    </div>
                `;
            });
        }
    });
    if(!hasTasks) el.innerHTML = '<div style="text-align:center">Aktif görev bulunamadı.</div>';
};

/* ─── MODAL LOGIC ─── */
window.openEntry = (date) => {
    state.selectedDate = date;
    const e = state.entries[date] || { text: '', tasks: [], atomics: [], habit: false };
    
    document.getElementById('modalTitle').textContent = date;
    document.getElementById('entryText').value = e.text || '';
    document.getElementById('habitDemir').checked = !!e.habit;
    state.tempTasks = [...(e.tasks || [])];
    state.tempAtomics = [...(e.atomics || [])];
    
    renderModalTasks();
    renderModalAtomics();
    document.getElementById('entryModal').classList.add('active');
};

const renderModalTasks = () => {
    document.getElementById('modalTaskList').innerHTML = state.tempTasks.map((t, i) => `
        <div class="task-row">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="state.tempTasks[${i}].done = !state.tempTasks[${i}].done; renderModalTasks();">
            <span style="flex:1; ${t.done ? 'text-decoration:line-through; color:var(--text2)' : ''}">${t.text}</span>
            <span onclick="state.tempTasks.splice(${i},1); renderModalTasks();" style="color:var(--danger); cursor:pointer">×</span>
        </div>
    `).join('');
};

const renderModalAtomics = () => {
    document.getElementById('modalAtomicList').innerHTML = state.tempAtomics.map((a, i) => `
        <div class="task-row" style="border-left: 2px solid var(--accent)">
            <span style="flex:1; font-size:0.8rem;">${a}</span>
            <span onclick="state.tempAtomics.splice(${i},1); renderModalAtomics();" style="color:var(--danger); cursor:pointer">×</span>
        </div>
    `).join('');
};

/* ─── EVENTS ─── */
document.getElementById('saveBtn').onclick = () => {
    state.entries[state.selectedDate] = {
        text: document.getElementById('entryText').value,
        habit: document.getElementById('habitDemir').checked,
        tasks: state.tempTasks,
        atomics: state.tempAtomics
    };
    save();
    document.getElementById('entryModal').classList.remove('active');
    render();
};

document.getElementById('addTaskBtn').onclick = () => {
    const val = document.getElementById('taskInput').value;
    if(val) { state.tempTasks.push({text: val, done: false}); document.getElementById('taskInput').value = ''; renderModalTasks(); }
};

document.getElementById('atomicInput').onkeydown = (e) => {
    if(e.key === 'Enter' && e.target.value) {
        state.tempAtomics.push(e.target.value);
        e.target.value = '';
        renderModalAtomics();
    }
};

document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.view = btn.dataset.view;
        render();
    };
});

document.getElementById('themeToggle').onclick = () => {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
};

document.getElementById('focusBtn').onclick = () => document.body.classList.toggle('focus-mode');
document.getElementById('prevBtn').onclick = () => { state.date.setDate(state.date.getDate()-7); render(); };
document.getElementById('nextBtn').onclick = () => { state.date.setDate(state.date.getDate()+7); render(); };
document.getElementById('closeBtn').onclick = () => document.getElementById('entryModal').classList.remove('active');
document.getElementById('fab').onclick = () => openEntry(fmt(new Date()));

const updateStats = () => {
    const all = Object.values(state.entries);
    const habits = all.filter(e => e.habit).length;
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="stat-label">TOPLAM KAYIT</div><div>${all.length}</div></div>
        <div class="stat-item"><div class="stat-label">DEMİR GİBİ ZİHİN</div><div>${habits} GÜN</div></div>
    `;
};

const renderAtomics = () => {
    const atomics = [];
    Object.values(state.entries).forEach(e => atomics.push(...(e.atomics || [])));
    const shuffled = atomics.sort(() => 0.5 - Math.random()).slice(0, 15);
    document.getElementById('atomicStream').innerHTML = shuffled.map(a => `<div class="atomic-chip">${a}</div>`).join('');
};

render();
</script>
</body>
</html>
