<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yazı İlham Aracı</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #38bdf8;
    }

    .container {
        max-width: 900px;
        margin: auto;
    }

    textarea {
        width: 100%;
        height: 250px;
        background: #020617;
        color: white;
        border: 1px solid #334155;
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
    }

    .box {
        background: #020617;
        padding: 15px;
        margin-top: 15px;
        border-radius: 10px;
        border: 1px solid #334155;
    }

    button {
        margin-top: 10px;
        margin-right: 10px;
        padding: 8px 15px;
        background: #38bdf8;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #0ea5e9;
    }

    .tip {
        font-style: italic;
        color: #94a3b8;
    }
</style>
</head>

<body>

<div class="container">
    <h1>✍️ Yazı İlham Aracı</h1>

    <textarea id="editor" placeholder="Yazmaya başla..."></textarea>

    <div class="box">
        <strong>📌 Rastgele Kelime:</strong>
        <p id="word"></p>
        <button onclick="newWord()">Yeni Kelime</button>
    </div>

    <div class="box">
        <strong>💭 İlham Alıntısı:</strong>
        <p id="quote"></p>
        <button onclick="newQuote()">Yeni Alıntı</button>
    </div>

    <div class="box">
        <strong>🧠 Yazma Yardımı:</strong>
        <p id="tip" class="tip"></p>
        <button onclick="newTip()">Yeni Tavsiye</button>
    </div>
</div>

<script>

// --- KELİMELER (dosyandan örnekler, istersen genişletiriz) ---
const words = [
"özlemek","sevinmek","endişelenmek","şaşırmak","utanmak",
"güvenmek","affetmek","merak","alışkanlık","sorumluluk",
"fırsat","özgürlük","adalet","empati","motivasyon",
"bilinç","irade","varoluş","anlatıcı","metafor",
"ironi","epistemoloji","hakikat","algı","zaman"
];

// --- ALINTILAR (dosyandan seçilmiş) ---
const quotes = [
"Kendini mutlu etmek için ihtiyaç duyduğun her şey kendi içindedir.",
"Engel, yolun ta kendisidir.",
"İnsan, düşünceleri ne ise odur.",
"Tek bildiğim hiçbir şey bilmediğimdir.",
"Sorgulanmamış bir hayat yaşamaya değmez.",
"Biz, tekrar tekrar yaptıklarımızız.",
"Yaşamak yetmez; bir anlam bulmak gerekir.",
"Zihin her şeydir; ne düşünürsen o olursun.",
"Her şey akar; hiçbir şey durağan değildir.",
"Varoluş özden önce gelir."
];

// --- YAZMA TAVSİYELERİ ---
const tips = [
"Takılınca durma, kötü yaz ama yazmaya devam et.",
"Sadece bir sahne yaz, mükemmel olmak zorunda değil.",
"Bir kelimeyi merkeze al ve onun etrafında yaz.",
"Karakterine bir sır ver.",
"Yazdığını değil, hissettiğini anlat.",
"Şu soruyla başla: 'Ya şöyle olsaydı?'",
"İlk cümleyi sil ve yeniden yaz.",
"Zıtlık kullan: mutluluk + karanlık gibi.",
"Bir anıyı yeniden yaz ama farklı sonla bitir.",
"Okuyucuya değil kendine yaz."
];

// --- FONKSİYONLAR ---
function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function newWord() {
    document.getElementById("word").innerText = randomItem(words);
}

function newQuote() {
    document.getElementById("quote").innerText = randomItem(quotes);
}

function newTip() {
    document.getElementById("tip").innerText = randomItem(tips);
}

// sayfa açıldığında otomatik doldur
newWord();
newQuote();
newTip();

</script>

</body>
</html>
