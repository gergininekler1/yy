<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distopik Yazım Paneli v2</title>
<style>
body {margin:0;font-family:sans-serif;background:#0b0b0b;color:#eee;}
header{padding:12px;text-align:center;background:#111;border-bottom:1px solid #333}
h1{font-size:18px;color:#ff2e63;margin:0}
.container{display:flex;flex-direction:column;height:100vh}
nav{display:flex;overflow-x:auto;background:#151515}
nav button{flex:1;padding:10px;background:#151515;color:#ccc;border:none}
nav button.active{background:#ff2e63;color:#fff}
main{flex:1;overflow:auto;padding:10px}
textarea,input{width:100%;margin-bottom:10px;background:#1a1a1a;color:#fff;border:1px solid #333;padding:10px;border-radius:8px}
button.action{width:100%;padding:12px;margin:5px 0;background:#ff2e63;color:white;border:none;border-radius:8px}
.card{background:#141414;padding:10px;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
<header><h1>Distopik Yazım Paneli</h1></header><nav>
<button onclick="show('write')" class="active">Yaz</button>
<button onclick="show('ideas')">İlham</button>
<button onclick="show('characters')">Karakter</button>
</nav><main>
<div id="write" class="section">
<input id="title" placeholder="Bölüm başlığı">
<textarea id="content" placeholder="Yazmaya başla..."></textarea>
<button class="action" onclick="save()">Kaydet</button>
</div><div id="ideas" class="section" style="display:none">
<div class="card">
<b>Kelime Üret</b>
<p id="word"></p>
<button class="action" onclick="generateWord()">Kelime Üret</button>
</div>
<div class="card">
<b>Sahne Fikri</b>
<p id="scene"></p>
<button class="action" onclick="generateScene()">Sahne Üret</button>
</div>
<div class="card">
<b>Plot Twist</b>
<p id="twist"></p>
<button class="action" onclick="generateTwist()">Twist Üret</button>
</div>
</div><div id="characters" class="section" style="display:none">
<input id="charName" placeholder="Karakter adı">
<textarea id="charDesc" placeholder="Özellikler..."></textarea>
<button class="action" onclick="saveChar()">Kaydet</button>
<div id="charList"></div>
</div>
</main>
</div><script>
function show(id){document.querySelectorAll('.section').forEach(s=>s.style.display='none');document.getElementById(id).style.display='block';document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}

function save(){localStorage.setItem('story',document.getElementById('content').value);alert('Kaydedildi')}
window.onload=function(){document.getElementById('content').value=localStorage.getItem('story')||''}

const words=["karanlık","simülasyon","çürüme","yapay zeka","parazit","unutulmuş","protokol","gözetim","virüs","koloni"]
function generateWord(){document.getElementById('word').innerText=words[Math.floor(Math.random()*words.length)]}

const scenes=[
"Şehirde elektrikler kesilir ve herkes aynı rüyayı görür",
"Bir karakter aynada kendisinin farklı bir versiyonunu fark eder",
"Yapay zeka insanların düşüncelerini silmeye başlar"
]
function generateScene(){document.getElementById('scene').innerText=scenes[Math.floor(Math.random()*scenes.length)]}

const twists=[
"Ana karakter aslında sistemin yaratıcısıdır",
"Gerçek dünya çoktan yok olmuştur",
"Düşman aslında insanlığın son umududur"
]
function generateTwist(){document.getElementById('twist').innerText=twists[Math.floor(Math.random()*twists.length)]}

function saveChar(){let name=document.getElementById('charName').value;let desc=document.getElementById('charDesc').value;let list=document.getElementById('charList');let div=document.createElement('div');div.className='card';div.innerText=name+" - "+desc;list.appendChild(div)}
</script></body>
</html>
