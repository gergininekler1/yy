            padding: 20px;
            color: #0ff;
            position: relative;
            overflow-x: hidden;
        }

            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:

            animation: pulse 8s ease-in-out infinite;
        }

            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #0ff, transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 1000;

        @keyframes scan {
            0% { transform: translateY(0); opacity: 0.8; }
            100% { transform: translateY(100vh); opacity: 0; }

            padding: 40px;
            max-width: 1200px;
            width: 100%;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff00ff, #0ff, transparent);
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: #0ff;
            margin-bottom: 10px;

            text-shadow:

                0 0 20px #0ff,

            letter-spacing: 4px;
            animation: glitch 8s infinite;
        }

            0%, 90%, 100% { transform: translate(0); }

            92% { transform: translate(2px, -2px); }
            93% { transform: translate(0); }

            color: #ff00ff;
            margin-bottom: 30px;

            text-transform: uppercase;
            letter-spacing: 2px;

            flex-wrap: wrap;

            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            transition: left 0.5s;

            margin-bottom: 25px;

            left: -50%;

            height: 200%;

                transparent 30%,

            from {

            to {
