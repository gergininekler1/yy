<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Distopik Öykü Yazım Paneli</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0e0e0e;
        color: #e0e0e0;
    }
    header {
        background: #111;
        padding: 20px;
        text-align: center;
        border-bottom: 2px solid crimson;
    }
    h1 {
        color: crimson;
    }
    .container {
        display: grid;
        grid-template-columns: 250px 1fr;
        height: calc(100vh - 80px);
    }
    nav {
        background: #151515;
        padding: 15px;
        border-right: 1px solid #333;
    }
    nav button {
        display: block;
        width: 100%;
        margin-bottom: 10px;
        padding: 10px;
        background: #222;
        color: white;
        border: none;
        cursor: pointer;
    }
    nav button:hover {
        background: crimson;
    }
    main {
        padding: 20px;
        overflow-y: auto;
    }
    textarea {
        width: 100%;
        height: 300px;
        background: #1c1c1c;
        color: white;
        border: 1px solid #444;
        padding: 10px;
    }
    input {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        background: #1c1c1c;
        color: white;
        border: 1px solid #444;
    }
    .section {
        display: none;
    }
    .active {
        display: block;
    }
</style>
</head>

<body>

<header>
    <h1>Distopik Hikaye Yazım Paneli</h1>
    <p>Bilim kurgu • Korku • Distopya</p>
</header>

<div class="container">

<nav>
    <button onclick="show('plan')">Proje Planı</button>
    <button onclick="show('world')">Dünya Tasarımı</button>
    <button onclick="show('characters')">Karakterler</button>
    <button onclick="show('chapters')">Bölüm Yazımı</button>
    <button onclick="show('notes')">Notlar</button>
</nav>

<main>

<div id="plan" class="section active">
    <h2>Proje Planı</h2>
    <input placeholder="Kitap Adı">
    <input placeholder="Tema (örn: Yapay zeka diktatörlüğü)">
    <textarea placeholder="Hikayenin genel fikri..."></textarea>
</div>

<div id="world" class="section">
    <h2>Dünya Tasarımı</h2>
    <textarea placeholder="Dünya nasıl bir yer? (yıkılmış şehirler, teknoloji seviyesi, rejim vb.)"></textarea>
</div>

<div id="characters" class="section">
    <h2>Karakterler</h2>
    <input placeholder="Karakter adı">
    <textarea placeholder="Karakter geçmişi, motivasyonu, korkuları..."></textarea>
</div>

<div id="chapters" class="section">
    <h2>Bölüm Yazımı</h2>
    <input placeholder="Bölüm başlığı">
    <textarea placeholder="Hikayeni burada yaz..."></textarea>
</div>

<div id="notes" class="section">
    <h2>Notlar & İlham</h2>
    <textarea placeholder="Aklına gelen karanlık fikirler, sahneler, diyaloglar..."></textarea>
</div>

</main>

</div>

<script>
function show(sectionId) {
    let sections = document.querySelectorAll('.section');
    sections.forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
}
</script>

</body>
</html>
