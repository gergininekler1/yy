<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öykü Mimarı v3.0 | Director's Cut</title>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #181818;
            --primary-red: #E50914;
            --hover-red: #f40612;
            --text-main: #FFFFFF;
            --text-muted: #B3B3B3;
            --border-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .header h1 { color: var(--primary-red); margin: 0; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }

        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        h2 { font-size: 1.1rem; border-left: 3px solid var(--primary-red); padding-left: 10px; margin-bottom: 20px; }

        /* SÜRÜKLE BIRAK STİLLERİ */
        .scene-card {
            background: #222;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: grab;
            border: 1px solid #444;
            transition: transform 0.2s;
        }
        .scene-card:active { cursor: grabbing; transform: scale(0.98); }
        .scene-card.dragging { opacity: 0.5; border: 1px dashed var(--primary-red); }

        textarea, input {
            width: 100%; background: #2b2b2b; color: white; border: 1px solid #444;
            padding: 12px; border-radius: 5px; margin-top: 5px; box-sizing: border-box;
        }

        button {
            background: var(--primary-red); color: white; border: none; padding: 10px 15px;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: var(--hover-red); }
        .btn-twist { background: #e59400; color: black; margin-top: 10px; width: 100%; }

        /* TWIST MODAL */
        #twistDisplay {
            display: none;
            background: #e59400; color: black; padding: 15px;
            border-radius: 5px; margin-top: 10px; font-weight: bold;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        .stats-bar { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ÖYKÜ MİMARI <small style="font-size: 0.4em; color: white;">v3.0</small></h1>
        <div>
            <button onclick="exportData()" style="background:#333;">💾 Kaydet & İndir</button>
        </div>
    </div>

    <div class="grid">
        <div class="side-panel">
            <div class="panel">
                <h2>Olay Örgüsü (Sahneler)</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Sahneleri sürükleyerek sırasını değiştir.</p>
                <div id="sceneContainer">
                    </div>
                <button onclick="addNewScene()" style="width: 100%; background: #333; margin-top:10px;">+ Sahne Ekle</button>
            </div>

            <div class="panel" style="margin-top: 20px;">
                <h2>Twist Jeneratörü</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Hikaye tıkandı mı? Bir sürpriz patlat!</p>
                <button class="btn-twist" onclick="generateTwist()">⚡ Rastgele Twist Üret</button>
                <div id="twistDisplay"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>Yazım Atölyesi</h2>
                <input type="text" id="storyTitle" placeholder="Öykü Başlığı..." style="font-size: 1.5rem; border: none; background: transparent; border-bottom: 1px solid #333;">
                <textarea id="mainDraft" style="height: 500px; margin-top: 20px; font-size: 1.1rem; line-height: 1.8;" placeholder="Anlatmaya başla..."></textarea>
                <div class="stats-bar">
                    <span id="wordCount">0 Kelime</span>
                    <span>Mod: Odaklanma Açık</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const twists = [
        "En güvenilir karakterin aslında bir casus olduğu ortaya çıkar.",
        "Karakterin elindeki gizemli eşya aslında geçmişten gelen bir mesajdır.",
        "Beklenmedik bir doğal afet (fırtına, deprem) tüm planları bozar.",
        "Ana karakterin aslında ölü olduğu veya bir simülasyonda olduğu anlaşılır.",
        "Yardımcı karakter, kahramanın en büyük sırrını topluma açıklar.",
        "Zaman çizelgesi aniden kırılır; olaylar aslında gelecekte geçiyordur."
    ];

    // Sürükle Bırak Mantığı
    const container = document.getElementById('sceneContainer');

    function addNewScene(content = "") {
        const id = Date.now();
        const card = document.createElement('div');
        card.className = 'scene-card';
        card.draggable = true;
        card.innerHTML = `
            <textarea placeholder="Sahne detayı..." oninput="saveAll()">${content}</textarea>
            <small style="color: #666; cursor:pointer;" onclick="this.parentElement.remove(); saveAll();">Sil</small>
        `;
        
        card.addEventListener('dragstart', () => card.classList.add('dragging'));
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
        
        container.appendChild(card);
    }

    container.addEventListener('dragover', e => {
        e.preventDefault();
        const afterElement = getDragAfterElement(container, e.clientY);
        const dragging = document.querySelector('.dragging');
        if (afterElement == null) {
            container.appendChild(dragging);
        } else {
            container.insertBefore(dragging, afterElement);
        }
    });

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.scene-card:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    // Twist Jeneratörü
    function generateTwist() {
        const display = document.getElementById('twistDisplay');
        const randomTwist = twists[Math.floor(Math.random() * twists.length)];
        display.innerText = "YENİ KRİZ: " + randomTwist;
        display.style.display = 'block';
    }

    // Kelime Sayacı
    document.getElementById('mainDraft').addEventListener('input', function() {
        const words = this.value.trim().split(/\s+/).filter(x => x.length > 0).length;
        document.getElementById('wordCount').innerText = words + " Kelime";
        saveAll();
    });

    // Kayıt Fonksiyonu
    function saveAll() {
        const scenes = [...container.querySelectorAll('textarea')].map(t => t.value);
        localStorage.setItem('scenes_v3', JSON.stringify(scenes));
        localStorage.setItem('title_v3', document.getElementById('storyTitle').value);
        localStorage.setItem('draft_v3', document.getElementById('mainDraft').value);
    }

    window.onload = () => {
        document.getElementById('storyTitle').value = localStorage.getItem('title_v3') || "";
        document.getElementById('mainDraft').value = localStorage.getItem('draft_v3') || "";
        const savedScenes = JSON.parse(localStorage.getItem('scenes_v3') || "[]");
        savedScenes.forEach(s => addNewScene(s));
    };

    function exportData() {
        const title = document.getElementById('storyTitle').value || "Bölüm_1";
        const content = document.getElementById('mainDraft').value;
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = title + ".txt";
        a.click();
    }
</script>

</body>
</html>
