<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distopik Yazarlık AI Stüdyosu V3</title>
<style>
:root{--bg:#05050a;--panel:#0f0f1f;--accent:#00ffe1}
body{margin:0;background:var(--bg);color:#e6faff;font-family:monospace}
.container{display:flex;height:100vh}
.sidebar{width:300px;background:var(--panel);padding:10px;overflow:auto}
.main{flex:1;display:flex;flex-direction:column}
textarea{flex:1;background:#0a0a14;color:#fff;border:none;padding:12px}
button{display:block;width:100%;margin:4px 0;padding:8px;background:#1c1c3a;color:#fff;border:none}
button:hover{background:#00ffe1;color:#000}
.ai-chat{height:200px;overflow:auto;background:#000;padding:10px;border-top:1px solid #222}
.msg{margin-bottom:6px}
.user{color:#0ff}
.ai{color:#f0f}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<h3>AI SİSTEM</h3>
<button onclick="aiChat()">AI ile Konuş</button>
<button onclick="analyzeStory()">Hikaye Analizi</button>
<button onclick="storyPlanner()">Hikaye Planı</button>
<button onclick="imitateStyle()">Stil Öğren</button>
</div>
<div class="main">
<textarea id="editor"></textarea>
<div class="ai-chat" id="chat"></div>
</div>
</div>
<script>
let styleMemory="";function chatLog(role,text){ let div=document.createElement('div'); div.className='msg '+role; div.innerText=(role==='user'?'> ':'AI: ')+text; document.getElementById('chat').appendChild(div); }

function getText(){return document.getElementById('editor').value}

function aiChat(){ let input=getText().split(' ').slice(-10).join(' '); chatLog('user',input); let response="Veri işleniyor... Bu hikaye karanlığa sürükleniyor."; chatLog('ai',response); }

function analyzeStory(){ let text=getText(); let len=text.length; let mood=len>200?"yoğun":"başlangıç"; chatLog('ai',"Analiz: hikaye "+mood+" aşamasında."); }

function storyPlanner(){ let plan="Başlangıç → Çöküş → Gerçeklik kırılması → Final"; chatLog('ai',"Plan oluşturuldu: "+plan); }

function imitateStyle(){ styleMemory=getText().slice(0,200); chatLog('ai',"Stil öğrenildi. Bundan sonra öneriler bu tona yakın olacak."); }

setInterval(()=>{ localStorage.setItem('v3_story',getText()); },1500);

window.onload=()=>{ document.getElementById('editor').value=localStorage.getItem('v3_story')||""; } </script>

</body>
</html>
