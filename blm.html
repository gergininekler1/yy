<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öykü Mimarı v1.0</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
        }
        h2 {
            font-size: 1.2em;
            color: #2980b9;
            margin-top: 0;
        }
        label {
            display: block;
            font-weight: bold;
            margin-top: 10px;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            height: 80px;
            resize: vertical;
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .status-quo { border-left: 5px solid #95a5a6; }
        .inciting { border-left: 5px solid #f1c40f; }
        .climax { border-left: 5px solid #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>🖋️ Öykü Mimarı v1.0</h1>
    
    <div class="section">
        <h2>1. Temel Kurulum (Pre-Writing)</h2>
        <label>Öykü Adı:</label>
        <input type="text" placeholder="Örn: Gece Gelen Misafir">
        
        <label>Logline (Tek Cümlelik Özet):</label>
        <textarea placeholder="Karakterin temel çatışmasını ve hedefini yaz..."></textarea>
        
        <label>Tema:</label>
        <input type="text" placeholder="Örn: İhanet, Yalnızlık, Cesaret">
    </div>

    <div class="section">
        <h2>2. Dramatik Yapı (Hikaye Arkı)</h2>
        
        <div class="status-quo">
            <label>Serim (Normal Düzen):</label>
            <textarea placeholder="Dünya nasıl bir yer? Karakter kim?"></textarea>
        </div>

        <div class="inciting">
            <label>Tetikleyici Olay:</label>
            <textarea placeholder="Düzeni bozan o ilk kıvılcım ne?"></textarea>
        </div>

        <div class="rising">
            <label>Yükselen Aksiyon & Engeller:</label>
            <textarea placeholder="Karakterin önüne çıkan 3 ana engel..."></textarea>
        </div>

        <div class="climax">
            <label>Doruk Noktası (Kriz ve Çözüm):</label>
            <textarea placeholder="Geri dönüşü olmayan o büyük an!"></textarea>
        </div>
    </div>

    <div class="section">
        <h2>3. Karakterin Dönüşümü</h2>
        <label>Karakterin İnandığı Yalan:</label>
        <input type="text" placeholder="Örn: 'Kimseye güvenmemeliyim'">
        
        <label>Öğrenmesi Gereken Gerçek (İhtiyaç):</label>
        <input type="text" placeholder="Örn: 'İnsanlar birbirine muhtaçtır'">
    </div>

    <div class="btn-container">
        <button onclick="alert('Taslağınız hafızaya alındı! (Şimdilik sembolik)')">Taslağı Kilitle ve Odaklan</button>
    </div>
</div>

</body>
</html>
