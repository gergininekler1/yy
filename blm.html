<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Arayüz Güncellemesi</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --accent-color: #000000;
            --hover-bg: #f5f5f5;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Raf Bölümü */
        .shelf-section {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shelf-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Minimal Buton Tasarımı */
        .btn-minimal {
            background: none;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-minimal:hover {
            background-color: var(--hover-bg);
            border-color: var(--accent-color);
        }

        .btn-minimal.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* Kurallar Bölümü */
        .rules-section {
            width: 100%;
        }

        .rules-header {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: #fafafa;
        }

        .rules-input-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #newRuleText {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 8px;
            outline: none;
            font-size: 0.9rem;
        }

        /* Kurallar Listesi */
        .rules-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.3s ease;
        }

        .rule-content {
            display: flex;
            flex-direction: column;
        }

        .rule-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 4px;
        }

        .rule-text {
            font-size: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* İkonlar için Genel Stil */
        svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shelf-section">
        <div class="shelf-title">
            <svg viewBox="0 0 24 24"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="M3 9V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4"/></svg>
            Ürün Rafı
        </div>
        <button id="editBtn" class="btn-minimal" onclick="toggleEditMode()">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span>Görsel Düzenle</span>
        </button>
    </div>

    <div class="rules-section">
        <div class="rules-header">
            <div class="rules-input-wrapper">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                <input type="text" id="newRuleText" placeholder="Yeni notunuzu buraya yazın...">
            </div>
            <button class="btn-minimal" onclick="addRule()">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Kural Ekle
            </button>
        </div>

        <div id="rulesList" class="rules-list">
            </div>
    </div>
</div>

<script>
    let ruleCount = 0;
    let isEditMode = false;

    // Görsel Düzenle Butonunu Aktif Hale Getiren Fonksiyon
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('editBtn');
        const span = btn.querySelector('span');
        
        if (isEditMode) {
            btn.classList.add('active');
            span.innerText = "Düzenleme Aktif";
            console.log("Görsel düzenleme modu açıldı.");
            // Burada görsel üzerine overlay veya çerçeve ekleme mantığı çalışabilir
        } else {
            btn.classList.remove('active');
            span.innerText = "Görsel Düzenle";
            console.log("Görsel düzenleme modu kapatıldı.");
        }
    }

    // Yeni Kural Ekleme Fonksiyonu
    function addRule() {
        const input = document.getElementById('newRuleText');
        const list = document.getElementById('rulesList');
        
        if (input.value.trim() === "") {
            alert("Lütfen bir not yazın.");
            return;
        }

        ruleCount++;
        
        const ruleDiv = document.createElement('div');
        ruleDiv.className = 'rule-item';
        
        ruleDiv.innerHTML = `
            <div class="rule-content">
                <span class="rule-title">KURAL ${ruleCount}</span>
                <span class="rule-text">${input.value}</span>
            </div>
            <button class="btn-minimal" onclick="this.parentElement.remove()" style="border:none; padding:5px;">
                <svg viewBox="0 0 24 24" style="width:14px; height:14px;"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        `;

        list.appendChild(ruleDiv);
        input.value = ""; // Girişi temizle
        input.focus();
    }

    // Enter tuşu ile kural ekleme desteği
    document.getElementById('newRuleText').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            addRule();
        }
    });
</script>

</body>
</html>
