<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öykü Mimarı v4.0 | Master Edition</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --sidebar-bg: #1a1a1a;
            --editor-bg: #121212;
            --accent: #E50914;
            --text: #e0e0e0;
            --border: #333;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SOL PANEL: BÖLÜMLER */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .chapter-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .chapter-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.2s;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .chapter-item:hover { background: #252525; }
        .chapter-item.active {
            background: #252525;
            border-left-color: var(--accent);
            font-weight: bold;
        }

        /* ORTA PANEL: EDİTÖR */
        .main-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--editor-bg);
        }

        .editor-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chapterTitleInput {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            outline: none;
            width: 70%;
        }

        .text-area-container {
            flex: 1;
            padding: 30px;
            display: flex;
            gap: 20px;
        }

        #editorBody {
            flex: 2;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 1.1rem;
            line-height: 1.8;
            resize: none;
            outline: none;
            font-family: 'Georgia', serif;
        }

        /* SAĞ PANEL: BÖLÜM PLANI */
        .chapter-outline-panel {
            width: 300px;
            background: #181818;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .chapter-outline-panel h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 0;
        }

        #chapterPlanText {
            width: 100%;
            height: 80%;
            background: #222;
            border: 1px solid #444;
            color: #bbb;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            resize: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add { margin: 10px 20px; background: #333; }
        .btn-add:hover { background: #444; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">🖋️ ÖYKÜ MİMARI PROJESİ</div>
    <div id="chapterList" class="chapter-list">
        </div>
    <button class="btn-add" onclick="createNewChapter()">+ Yeni Bölüm Ekle</button>
    <button class="btn-add" onclick="downloadFullProject()" style="background: #0056b3;">📥 Tüm Projeyi İndir</button>
</div>

<div class="main-editor">
    <div class="editor-header">
        <input type="text" id="chapterTitleInput" placeholder="Bölüm Başlığı..." oninput="syncData()">
        <div id="wordCount" style="font-size: 0.8rem; color: #666;">0 Kelime</div>
    </div>
    
    <div class="text-area-container">
        <textarea id="editorBody" placeholder="Hikayeni yazmaya başla..." oninput="syncData()"></textarea>
        
        <div class="chapter-outline-panel">
            <h3>Bölüm Olay Akışı</h3>
            <p style="font-size: 0.75rem; color: #888; margin-bottom: 10px;">Bu bölümde neler olacak? Zaman çizelgesine göre not al.</p>
            <textarea id="chapterPlanText" placeholder="Örn: Selim eve gelir. Mektubu bulur. Büyük kavga çıkar..." oninput="syncData()"></textarea>
        </div>
    </div>
</div>

<script>
    // VERİ YAPISI
    // Proje = [ {title, content, plan}, ... ]
    let project = JSON.parse(localStorage.getItem('my_story_project')) || [
        { title: "Giriş: İlk Adım", content: "Buraya öykünün girişini yaz...", plan: "Karakter tanıtımı ve ilk çatışma." }
    ];
    let activeIndex = 0;

    // BAŞLANGIÇ
    window.onload = () => {
        renderChapterList();
        loadActiveChapter();
    };

    function renderChapterList() {
        const list = document.getElementById('chapterList');
        list.innerHTML = '';
        project.forEach((ch, index) => {
            const div = document.createElement('div');
            div.className = `chapter-item ${index === activeIndex ? 'active' : ''}`;
            div.innerHTML = `<span>${index + 1}. ${ch.title || 'Başlıksız'}</span>`;
            div.onclick = () => switchChapter(index);
            list.appendChild(div);
        });
    }

    function loadActiveChapter() {
        const ch = project[activeIndex];
        document.getElementById('chapterTitleInput').value = ch.title;
        document.getElementById('editorBody').value = ch.content;
        document.getElementById('chapterPlanText').value = ch.plan;
        updateWordCount();
    }

    function switchChapter(index) {
        activeIndex = index;
        renderChapterList();
        loadActiveChapter();
    }

    function createNewChapter() {
        project.push({ title: "Yeni Bölüm", content: "", plan: "" });
        activeIndex = project.length - 1;
        saveAndRefresh();
    }

    function syncData() {
        project[activeIndex].title = document.getElementById('chapterTitleInput').value;
        project[activeIndex].content = document.getElementById('editorBody').value;
        project[activeIndex].plan = document.getElementById('chapterPlanText').value;
        
        localStorage.setItem('my_story_project', JSON.stringify(project));
        
        // Yan paneldeki başlığı anlık güncellemek için listeyi yenile ama focus kaybetme
        const activeItem = document.querySelector('.chapter-item.active span');
        if(activeItem) activeItem.innerText = `${activeIndex + 1}. ${project[activeIndex].title}`;
        
        updateWordCount();
    }

    function saveAndRefresh() {
        localStorage.setItem('my_story_project', JSON.stringify(project));
        renderChapterList();
        loadActiveChapter();
    }

    function updateWordCount() {
        const text = document.getElementById('editorBody').value.trim();
        const words = text ? text.split(/\s+/).length : 0;
        document.getElementById('wordCount').innerText = words + " Kelime";
    }

    function downloadFullProject() {
        let fullText = "PROJE TASLAĞI\n\n";
        project.forEach((ch, i) => {
            fullText += `\n--- BÖLÜM ${i+1}: ${ch.title.toUpperCase()} ---\n`;
            fullText += `PLAN: ${ch.plan}\n`;
            fullText += `\n${ch.content}\n\n`;
            fullText += "========================================\n";
        });

        const blob = new Blob([fullText], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Oyku_Projesi_Tam_Taslak.txt';
        a.click();
    }
</script>

</body>
</html>
