<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // Yazar Laboratuvarı</title>
    <style>
        /* CSS Değişkenleri & Tema */
        :root {
            --bg-dark: #09090b;
            --bg-panel: #121217;
            --bg-input: #1a1a24;
            --text-main: #e2e8f0;
            --text-muted: #8b8b9f;
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-red: #ff003c;
            --border-color: #2a2a35;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
        }

        /* Glitch Efekti */
        .glitch {
            position: relative;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px var(--neon-purple), -2px -2px 0px var(--neon-blue);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { text-shadow: 2px 2px 0px var(--neon-purple), -2px -2px 0px var(--neon-blue); transform: translate(0); }
            20% { text-shadow: -2px 2px 0px var(--neon-purple), 2px -2px 0px var(--neon-blue); transform: translate(-2px, 2px); }
            40% { text-shadow: 2px -2px 0px var(--neon-purple), -2px 2px 0px var(--neon-blue); transform: translate(2px, -2px); }
            60% { text-shadow: -2px -2px 0px var(--neon-purple), 2px 2px 0px var(--neon-blue); transform: translate(-2px, -2px); }
            80% { text-shadow: 2px 2px 0px var(--neon-purple), -2px -2px 0px var(--neon-blue); transform: translate(2px, 2px); }
            100% { text-shadow: -2px 2px 0px var(--neon-purple), 2px -2px 0px var(--neon-blue); transform: translate(0); }
        }

        /* Layout */
        .sidebar {
            width: 260px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            transition: var(--transition);
            z-index: 10;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: var(--transition);
        }

        .tools-panel {
            width: 320px;
            background-color: var(--bg-panel);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            overflow-y: auto;
            transition: var(--transition);
        }

        /* Distraction Free Mode */
        body.distraction-free .sidebar,
        body.distraction-free .tools-panel {
            transform: translateX(-100%);
            width: 0;
            padding: 0;
            opacity: 0;
            overflow: hidden;
            border: none;
        }

        body.distraction-free .tools-panel {
            transform: translateX(100%);
        }

        /* Butonlar & Form Elemanları */
        button {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            transition: var(--transition);
            border-radius: 4px;
            width: 100%;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        button:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            color: var(--neon-blue);
        }

        .btn-primary {
            background-color: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        .btn-danger {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .btn-danger:hover {
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
        }

        .btn-purple {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
        }

        .btn-purple:hover {
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.2);
        }

        input, select, textarea {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem;
            font-family: var(--font-sans);
            width: 100%;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-purple);
        }

        /* Sidebar Elemanları */
        .brand {
            margin-bottom: 2rem;
            text-align: center;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--neon-purple);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3rem;
        }

        .chapter-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .chapter-item {
            padding: 0.5rem;
            cursor: pointer;
            border-left: 2px solid transparent;
            margin-bottom: 0.2rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chapter-item:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .chapter-item.active {
            border-left-color: var(--neon-blue);
            background-color: rgba(0, 240, 255, 0.05);
            color: var(--neon-blue);
        }

        .motivation {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            margin-top: 1rem;
        }

        /* Editor */
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-panel);
        }

        .editor-header input {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            width: auto;
            flex: 1;
        }

        .editor-header input:focus {
            border: none;
            box-shadow: none;
        }

        .editor-stats {
            display: flex;
            gap: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
            align-items: center;
        }

        .timer-display {
            color: var(--neon-blue);
            font-weight: bold;
        }

        .editor-area {
            flex: 1;
            padding: 2rem 15%;
            background-color: var(--bg-dark);
            border: none;
            resize: none;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-main);
            font-family: var(--font-sans);
        }

        .editor-area:focus {
            border: none;
            outline: none;
        }

        /* Tools Panel */
        .tool-group {
            margin-bottom: 2rem;
        }

        .output-box {
            background-color: var(--bg-input);
            border: 1px dashed var(--border-color);
            padding: 1rem;
            min-height: 80px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--neon-blue);
            margin-top: 1rem;
            border-radius: 4px;
            white-space: pre-wrap;
        }

        .tabs {
            display: flex;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.5rem;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .tab.active {
            color: var(--neon-purple);
            border-bottom: 2px solid var(--neon-purple);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

        /* Responsive */
        @media (max-width: 1024px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar, .tools-panel { width: 100%; border: none; border-bottom: 1px solid var(--border-color); height: auto; }
            .main-content { min-height: 60vh; }
            .editor-area { padding: 1rem; }
            body.distraction-free .sidebar, body.distraction-free .tools-panel { display: none; }
        }

        #import-file { display: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="glitch">NEXUS_OS</div>
            <div style="font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); margin-top: 5px;">YAZARLIK LABORATUVARI v1.0</div>
        </div>

        <div class="section-title">Bölümler</div>
        <div class="chapter-list" id="chapter-list">
            </div>

        <button class="btn-primary" onclick="addChapter()">+ Yeni Bölüm (Ctrl+N)</button>
        
        <div class="section-title" style="margin-top: 1rem;">Oturum Zamanlayıcı</div>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
            <button onclick="startTimer()" style="color:var(--neon-blue); border-color:var(--neon-blue)">Başlat</button>
            <button onclick="stopTimer()">Dur</button>
            <button onclick="resetTimer()">Sıfırla</button>
        </div>

        <div class="section-title">Sistem Kontrolü</div>
        <button onclick="saveData()">Kaydet (Ctrl+S)</button>
        <button onclick="toggleFullscreen()">Distraction-Free</button>
        
        <div class="motivation" id="motivation-text">"Karanlık seni çağırıyor..."</div>
    </aside>

    <main class="main-content">
        <div class="editor-header">
            <input type="text" id="chapter-title" value="Bölüm 1" oninput="updateChapterTitle()">
            <div class="editor-stats">
                <span id="save-status">Hazır</span>
                <span class="timer-display" id="timer-display">00:00</span>
                <span><span id="word-count">0</span> Kelime</span>
            </div>
        </div>
        <textarea class="editor-area" id="editor-textarea" placeholder="Sistem başlatıldı. Veri girişi bekleniyor..." oninput="autoSave()"></textarea>
    </main>

    <aside class="tools-panel">
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('ilham')">İlham</div>
            <div class="tab" onclick="switchTab('dunya')">Dünya</div>
            <div class="tab" onclick="switchTab('dosya')">Dosya</div>
        </div>

        <div id="tab-ilham" class="tab-content active">
            <div class="tool-group">
                <div class="section-title">Ton & Stil Motoru</div>
                <select id="tone-selector" onchange="changeTone()">
                    <option value="dystopian">Distopik Baskı</option>
                    <option value="psychological">Psikolojik Korku</option>
                    <option value="cosmic">Kozmik Korku</option>
                    <option value="minimal">Minimal Karanlık</option>
                </select>
            </div>

            <div class="tool-group">
                <div class="section-title">Fikir & Kurgu Jeneratörü</div>
                <button onclick="generateIdea('event')">Olay Fikri Üret</button>
                <button onclick="generateIdea('character')">Karakter Oluştur</button>
                <button onclick="generateIdea('location')">Mekan Tasarla</button>
                <button onclick="generateIdea('twist')">Plot Twist Ver</button>
            </div>

            <div class="tool-group">
                <div class="section-title">Kelime & Cümle Modülü</div>
                <button class="btn-purple" onclick="generateText('word')">Kelime Üret</button>
                <button class="btn-purple" onclick="generateText('atmosphere')">Atmosfer Cümlesi</button>
                <button class="btn-purple" onclick="generateText('expand')">Betimleme Genişlet</button>
            </div>

            <div class="output-box" id="ai-output">
                // Bekleniyor...
            </div>
        </div>

        <div id="tab-dunya" class="tab-content">
            <div class="tool-group">
                <div class="section-title">Evren Veritabanı</div>
                <label style="font-size: 0.8rem; color:var(--text-muted)">Evren Kuralları:</label>
                <textarea id="world-rules" rows="3" oninput="saveWorldData()" placeholder="Örn: Yerçekimi sadece elitler için var..."></textarea>
                
                <label style="font-size: 0.8rem; color:var(--text-muted)">Teknoloji Seviyesi:</label>
                <input type="text" id="world-tech" oninput="saveWorldData()" placeholder="Siber-biyolojik, Çökmüş Ağ...">
                
                <label style="font-size: 0.8rem; color:var(--text-muted)">Yönetim Biçimi:</label>
                <input type="text" id="world-gov" oninput="saveWorldData()" placeholder="Yapay Zeka Diktatörlüğü, Otokrasi...">
                
                <label style="font-size: 0.8rem; color:var(--text-muted)">Tehdit Unsurları:</label>
                <textarea id="world-threats" rows="2" oninput="saveWorldData()" placeholder="Mutant varyantlar, Zihin-hackerları..."></textarea>

                <label style="font-size: 0.8rem; color:var(--text-muted)">İnsanlık Durumu:</label>
                <input type="text" id="world-humanity" oninput="saveWorldData()" placeholder="Umutsuz, Sentetikleşmiş, Köle...">
            </div>
        </div>

        <div id="tab-dosya" class="tab-content">
            <div class="tool-group">
                <div class="section-title">Dışa/İçe Aktar</div>
                <button class="btn-primary" onclick="exportTXT()">TXT Olarak İndir</button>
                <button class="btn-primary" onclick="exportJSON()">Projeyi JSON Kaydet</button>
                <hr style="border-color: var(--border-color); margin: 1rem 0;">
                <button onclick="document.getElementById('import-file').click()">JSON'dan Geri Yükle</button>
                <input type="file" id="import-file" accept=".json" onchange="importJSON(event)">
            </div>
        </div>

    </aside>

    <script>
        /* --- VERİ SETLERİ (BİLİMKURGU, KORKU, DİSTOPIA) --- */
        const DB = {
            events: {
                dystopian: ["Sistem, herkesin anılarını 24 saatte bir sıfırlamaya karar verir.", "Gıda rasyonlarına zihin kontrol kimyasalı karıştırıldığı ortaya çıkar.", "Yeraltı direnişi yanlışlıkla şehrin yaşam destek ünitesini kapatır."],
                psychological: ["Ana karakter, aynadaki yansımasının ondan birkaç saniye bağımsız hareket ettiğini fark eder.", "Telsizden gelen yardım çağrısının aslında kendi sesi olduğu anlaşılır.", "Duvarlardaki çatlaklar yavaşça kelimeler oluşturmaya başlar."],
                cosmic: ["Gökyüzündeki yıldızlar aniden sönerek, devasa bir gözün açılmasına neden olur.", "Kazı ekibi, insan DNA'sından milyonlarca yıl daha eski biyolojik bir makine bulur.", "Gezegenin çekirdeğinden gelen frekans, tüm sentetik zihinleri delirtir."],
                minimal: ["Elektrikler kesilir. Karanlıktan fısıltılar yükselir.", "Sokaktaki son lamba da patlar.", "Kapı kilitliydi ama içeriden açıldı."]
            },
            characters: {
                dystopian: ["Jason, geçmişini bir çipte taşıyan eski bir infazcı.", "Sadece rüya görenleri avlayan bir sistem memuru.", "Duyguları alındığı için karaborsada his satın alan bir bürokrat."],
                psychological: ["Gerçekliği ayırt edemeyen şizofrenik bir veri-madencisi.", "Geçmişte işlediği bir cinayetin kurbanını her yüzleştiği ekranda gören bir hacker.", "Uyuduğunda başka birinin bedeninde uyanan bir denek."],
                cosmic: ["Boşlukta duyduğu sese tapan bir uzay gemisi mühendisi.", "Gözleri olmayan ama evrenin dokusunu görebilen bir kahin.", "Anubis istasyonunda yalnız kalan ve gittikçe insanlığını yitiren bir biyolog."],
                minimal: ["Kimliği silinmiş, yüzü sargılı bir yabancı.", "Sürekli arkasına bakan yorgun bir adam.", "Elleri titreyen bir cerrah."]
            },
            locations: {
                dystopian: ["Anubis Kolonisi'nin çürüyen alt katmanları.", "Neon ışıklarının hiç sönmediği ama güneşin hiç doğmadığı Sektör 4.", "Sürekli zehirli gaz sızdıran eski bir endüstriyel tapınak."],
                psychological: ["Odalarının yerleri sürekli değişen terk edilmiş bir akıl hastanesi.", "Sadece zihinde var olan karanlık bir koridor.", "Her aynanın farklı bir boyuta açıldığı bir sorgu odası."],
                cosmic: ["Zamanın donduğu, kara deliğin olay ufkundaki bir araştırma gemisi.", "Ölü bir tanrının kaburgalarından inşa edilmiş bir uzay istasyonu.", "Anubis gezegeninin yüzeyindeki etten yapılmış kraterler."],
                minimal: ["Küçük, penceresiz bir beton hücre.", "Sonsuzluğa uzanan dar bir tünel.", "Paslı, soğuk bir ameliyathane."]
            },
            twists: {
                dystopian: ["Kurtarıcı sandıkları lider, aslında sistemin kendi yarattığı bir kukladır.", "Kaçtıkları yer, aslında devasa bir simülasyonun sadece başka bir katmanıdır.", "Jason, aradığı baş düşmanın kendi klonu olduğunu fark eder."],
                psychological: ["Tüm yaşananlar, ana karakterin ölüm anında gördüğü bir halüsinasyondur.", "Kurban aslında katilin ta kendisidir, zihni bölünmüştür.", "Kimse onları takip etmiyordur; sadece paranoyadan birbirlerini öldürmüşlerdir."],
                cosmic: ["İnsanlık, aslında kadim bir varlığın kanser hücresidir.", "Dış uzay sandıkları şey, devasa bir organizmanın midesidir.", "İletişim kurdukları Tanrı, sadece yardım isteyen başka bir kurbandır."],
                minimal: ["Silah boştu.", "Kapı en başından beri açıktı.", "Zehir zaten içilmişti."]
            },
            words: ["Nöro-ağ", "Biyokütle", "Hiper-uzay", "Sentetik", "Simülasyon", "Distopya", "Sibernetik", "Zihin-çipi", "Karanlık Madde", "Anubis", "Void", "Hücre", "Çürüme", "Yankı", "Paradoks", "Protokol"],
            atmospheres: [
                "Neon ışıklar, kan lekeli sentetik asfaltta uzun gölgeler yaratıyordu.",
                "Anubis istasyonunun terk edilmiş koridorlarında sessizlik çığlık atıyordu.",
                "Pas ve çürümüş biyokütle kokusu genzimi yakarken, sistem alarmı ölümcül bir ritimle çalıyordu.",
                "Gökyüzü ölü bir televizyon ekranı rengindeydi.",
                "Makinelerin nefes alışverişi, insanlığın son ninnisi gibiydi."
            ],
            motivations: [
                "Karanlık seni çağırıyor...",
                "Distopyayı inşa et.",
                "Sistem hatalı. Kodu yeniden yaz.",
                "Hiçlikte bir yankı bırak.",
                "Korku, en saf ilhamdır."
            ]
        };

        /* --- SİSTEM STATE --- */
        let appState = {
            chapters: [
                { id: Date.now(), title: "Bölüm 1", content: "" }
            ],
            activeChapterId: null,
            world: {
                rules: "", tech: "", gov: "", threats: "", humanity: ""
            },
            tone: "dystopian"
        };

        let autoSaveTimer = null;
        let sprintTimer = null;
        let sprintSeconds = 0;
        let isTimerRunning = false;

        /* --- BAŞLATMA --- */
        function init() {
            const savedData = localStorage.getItem('nexus_data');
            if (savedData) {
                appState = JSON.parse(savedData);
            }
            
            if (!appState.activeChapterId && appState.chapters.length > 0) {
                appState.activeChapterId = appState.chapters[0].id;
            }

            document.getElementById('tone-selector').value = appState.tone;
            
            loadWorldData();
            renderChapters();
            loadActiveChapter();
            updateMotivation();
        }

        /* --- BÖLÜM YÖNETİMİ --- */
        function renderChapters() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = '';
            
            appState.chapters.forEach(chap => {
                const div = document.createElement('div');
                div.className = `chapter-item ${chap.id === appState.activeChapterId ? 'active' : ''}`;
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = chap.title;
                titleSpan.onclick = () => switchChapter(chap.id);
                titleSpan.style.flex = "1";
                titleSpan.style.overflow = "hidden";
                titleSpan.style.textOverflow = "ellipsis";
                titleSpan.style.whiteSpace = "nowrap";

                const delBtn = document.createElement('span');
                delBtn.textContent = "×";
                delBtn.style.color = "var(--neon-red)";
                delBtn.style.fontWeight = "bold";
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteChapter(chap.id);
                };

                div.appendChild(titleSpan);
                if(appState.chapters.length > 1) div.appendChild(delBtn);
                
                list.appendChild(div);
            });
        }

        function switchChapter(id) {
            saveCurrentChapterContent();
            appState.activeChapterId = id;
            loadActiveChapter();
            renderChapters();
        }

        function loadActiveChapter() {
            const chap = appState.chapters.find(c => c.id === appState.activeChapterId);
            if (chap) {
                document.getElementById('chapter-title').value = chap.title;
                document.getElementById('editor-textarea').value = chap.content;
                updateWordCount();
            }
        }

        function saveCurrentChapterContent() {
            const chap = appState.chapters.find(c => c.id === appState.activeChapterId);
            if (chap) {
                chap.content = document.getElementById('editor-textarea').value;
            }
        }

        function updateChapterTitle() {
            const chap = appState.chapters.find(c => c.id === appState.activeChapterId);
            if (chap) {
                chap.title = document.getElementById('chapter-title').value;
                renderChapters();
                triggerAutoSave();
            }
        }

        function addChapter() {
            saveCurrentChapterContent();
            const newId = Date.now();
            appState.chapters.push({ id: newId, title: `Yeni Bölüm`, content: "" });
            appState.activeChapterId = newId;
            renderChapters();
            loadActiveChapter();
            saveData();
            document.getElementById('editor-textarea').focus();
        }

        function deleteChapter(id) {
            if (confirm("Bu bölümü kalıcı olarak silmek istediğinizden emin misiniz? (Geri alınamaz)")) {
                appState.chapters = appState.chapters.filter(c => c.id !== id);
                if (appState.activeChapterId === id) {
                    appState.activeChapterId = appState.chapters[0].id;
                    loadActiveChapter();
                }
                renderChapters();
                saveData();
            }
        }

        function changeTone() {

        function getRandomInt(max) {
            return Math.floor(Math.random() * max);
        }

        function typeWriterEffect(element, text, speed = 20) {
            element.innerHTML = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function setOutput(text) {
            const outBox = document.getElementById('ai-output');
            outBox.innerHTML = "";
            typeWriterEffect(outBox, `>> [${appState.tone.toUpperCase()}_PROTOCOL] \n\n` + text);
        }

        function generateIdea(type) {
            const tone = appState.tone;
            let pool = [];
            
            if (DB[type + 's'] && DB[type + 's'][tone]) {
                pool = DB[type + 's'][tone];
            } else {
                // Fallback tüm tonları birleştir
                for (let key in DB[type + 's']) {
                    pool = pool.concat(DB[type + 's'][key]);
                }
            }

            const selection = pool[getRandomInt(pool.length)];
            setOutput(selection);
        }

        function generateText(type) {
            let output = "";
            if (type === 'word') {
                const words = [];
                for(let i=0; i<3; i++) {
                    words.push(DB.words[getRandomInt(DB.words.length)]);
                }
                output = "Önerilen Kelimeler:\n- " + words.join("\n- ");
            } 
            else if (type === 'atmosphere') {
                output = DB.atmospheres[getRandomInt(DB.atmospheres.length)];
                if(appState.tone === 'cosmic') output += " ...ve boşluk geri bakıyordu.";
            } 
            else if (type === 'expand') {
                const editorText = document.getElementById('editor-textarea').value;
                if(editorText.length < 10) {
                    output = "HATA: Genişletilecek yeterli metin bulunamadı. Lütfen editöre biraz yazın.";
                } else {
                    const lastWords = editorText.split(" ").slice(-5).join(" ");
                    output = `Son yazılanlara ("...${lastWords}") istinaden betimleme fikri:\n\nDuvarlar adeta bu düşünceyi emiyordu. Yüzeydeki paslı metalin soğukluğu, karakterin içindeki dehşetle birleşti. Hava ağırlaştı, ciğerleri çürük bir biyokütle kokusuyla doldu.`;
                }
            }
            setOutput(output);
        }

        function updateMotivation() {
            document.getElementById('motivation-text').textContent = DB.motivations[getRandomInt(DB.motivations.length)];
        }

        function exportTXT() {
            saveData();

            saveData();
            const dataStr = JSON.stringify(appState, null, 2);
            downloadFile(dataStr, "nexus_backup.json", "application/json");
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData && importedData.chapters) {
                        appState = importedData;
                        saveData();
                        init();
                        alert("Proje başarıyla yüklendi.");
                    } else {
                        alert("Geçersiz JSON formatı.");
                    }
                } catch (error) {
                    alert("Dosya okuma hatası: " + error.message);
                }
            };
            reader.readAsText(file);
        }
