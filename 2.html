<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Notes · Reference Layout</title>
  <style>
    :root {
      --bg: #eeeeee;
      --ink: #2a2a2a;
      --fade: rgba(0,0,0,.105);
      --line: rgba(0,0,0,.055);
      --muted: #7f7f7f;
      --panel: rgba(255,255,255,.58);
      --ease: cubic-bezier(.16,1,.3,1);
    }* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}

button, input, select, textarea { font: inherit; }
button { border: 0; background: none; padding: 0; cursor: pointer; color: inherit; }

.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #eeeeee;
  isolation: isolate;
}

.scene::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 78% 16%, rgba(255,255,255,.35), transparent 24%),
    radial-gradient(circle at 22% 84%, rgba(255,255,255,.26), transparent 28%);
  pointer-events: none;
  z-index: -2;
}

/* Hidden app controls: press N for new note, or use the tiny corner button. */
.corner-controls {
  position: fixed;
  left: 18px;
  top: 18px;
  z-index: 50;
  display: flex;
  gap: 8px;
  opacity: .08;
  transition: opacity .18s ease;
}

.corner-controls:hover,
.corner-controls:focus-within { opacity: 1; }

.corner-btn {
  border-radius: 999px;
  padding: 10px 13px;
  background: rgba(255,255,255,.72);
  border: 1px solid rgba(0,0,0,.08);
  font-size: 12px;
  font-weight: 900;
  color: #555;
  box-shadow: 0 10px 24px rgba(0,0,0,.055);
}

.corner-btn:hover { background: #242424; color: #fff; }

/* Exact reference composition */
.orbit {
  position: absolute;
  width: 720px;
  height: 720px;
  left: -455px;
  top: 50%;
  transform: translateY(-50%);
  border: 3px solid var(--line);
  border-radius: 50%;
  z-index: 1;
}

.orbit-marker {
  position: absolute;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: rgba(0,0,0,.09);
  transform: translate(-50%, -50%);
}

.orbit-marker.dark {
  width: 10px;
  height: 10px;
  background: #2b2b2b;
}

.m1 { left: 76.8%; top: 22.6%; }
.m2 { left: 97.15%; top: 50%; }
.m3 { left: 76.8%; top: 77.4%; }
.m4 { left: 45%; top: 94.4%; }

.ghost-step {
  position: absolute;
  z-index: 3;
  color: var(--fade);
  font-size: 76px;
  line-height: .8;
  font-weight: 950;
  letter-spacing: -.14em;
  transform: rotate(-27deg);
  user-select: none;
  transition: color .2s ease, transform .2s ease;
}

.ghost-step:hover { color: rgba(0,0,0,.19); }

.g1 { left: 108px; top: 166px; }
.g2 { left: 306px; top: 407px; }
.g4 { left: 315px; top: 1018px; }
.g5 { left: 108px; top: 1248px; }

.focus {
  position: absolute;
  left: 373px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 56px;
  transition: 460ms var(--ease);
}

.focus-no {
  font-size: 140px;
  line-height: .78;
  font-weight: 950;
  letter-spacing: -.14em;
  color: #2b2b2b;
  min-width: 198px;
}

.focus-copy {
  width: 330px;
  transform: translateY(2px);
}

.focus-title {
  margin: 0 0 11px;
  font-size: 32px;
  line-height: 1;
  font-weight: 900;
  letter-spacing: -.055em;
  color: #2b2b2b;
}

.focus-desc {
  margin: 0;
  font-size: 31px;
  line-height: 1.22;
  color: #7d7d7d;
  font-weight: 400;
  letter-spacing: -.035em;
}

/* Off-canvas editor, so the main view stays identical to the reference. */
.editor-toggle {
  position: fixed;
  right: 22px;
  bottom: 22px;
  z-index: 45;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  background: rgba(255,255,255,.68);
  border: 1px solid rgba(0,0,0,.075);
  color: #666;
  display: grid;
  place-items: center;
  font-weight: 950;
  opacity: .12;
  transition: .18s ease;
  box-shadow: 0 14px 35px rgba(0,0,0,.075);
}

.editor-toggle:hover { opacity: 1; background: #242424; color: white; }

.sheet-backdrop {
  position: fixed;
  inset: 0;
  z-index: 90;
  display: none;
  background: rgba(0,0,0,.18);
  backdrop-filter: blur(8px);
}

.sheet-backdrop.show { display: block; }

.sheet {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: min(430px, 92vw);
  z-index: 100;
  padding: 22px;
  background: rgba(245,245,245,.86);
  backdrop-filter: blur(18px);
  border-left: 1px solid rgba(0,0,0,.075);
  box-shadow: -30px 0 80px rgba(0,0,0,.16);
  transform: translateX(105%);
  transition: 430ms var(--ease);
  overflow: auto;
}

.sheet.show { transform: translateX(0); }

.sheet-head {
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 16px;
  margin-bottom: 20px;
}

.sheet-kicker {
  margin: 0 0 7px;
  color: #797979;
  font-size: 12px;
  font-weight: 950;
  letter-spacing: .18em;
  text-transform: uppercase;
}

.sheet-title {
  margin: 0;
  font-size: 34px;
  line-height: .9;
  letter-spacing: -.085em;
  font-weight: 950;
}

.close-btn {
  width: 38px;
  height: 38px;
  border-radius: 999px;
  background: rgba(255,255,255,.6);
  border: 1px solid rgba(0,0,0,.08);
  color: #666;
  font-size: 20px;
  font-weight: 950;
}

.close-btn:hover { background: #242424; color: white; }

.form {
  display: grid;
  gap: 12px;
  margin-bottom: 22px;
}

label {
  display: grid;
  gap: 7px;
  color: #686868;
  font-size: 11px;
  font-weight: 950;
  letter-spacing: .14em;
  text-transform: uppercase;
}

input, select, textarea {
  width: 100%;
  border: 1px solid rgba(0,0,0,.075);
  background: rgba(255,255,255,.6);
  border-radius: 20px;
  color: #242424;
  outline: none;
}

input, select { padding: 14px 15px; }

textarea {
  min-height: 230px;
  padding: 16px 17px;
  resize: vertical;
  line-height: 1.55;
}

input:focus, select:focus, textarea:focus {
  border-color: rgba(0,0,0,.28);
  background: rgba(255,255,255,.88);
  box-shadow: 0 12px 32px rgba(0,0,0,.065);
}

.primary-btn {
  border-radius: 999px;
  padding: 15px 18px;
  background: #242424;
  color: #fff;
  font-weight: 950;
  letter-spacing: -.025em;
}

.planet-list { display: grid; gap: 10px; margin-top: 18px; }

.planet-chip {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 11px;
  align-items: center;
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  background: rgba(255,255,255,.48);
  border: 1px solid rgba(0,0,0,.055);
  text-align: left;
}

.planet-chip.active, .planet-chip:hover { background: rgba(255,255,255,.78); }

.mini-planet {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.28), transparent 22%),
    linear-gradient(145deg,#c6c6c6,#9e9e9e);
}

.planet-chip strong {
  display: block;
  font-size: 14px;
  letter-spacing: -.035em;
}

.planet-chip span {
  display: block;
  margin-top: 2px;
  color: #858585;
  font-size: 12px;
}

.step-row {
  display: flex;
  gap: 8px;
  margin: 12px 0 16px;
}

.step-pill {
  flex: 1;
  border-radius: 999px;
  padding: 10px 0;
  background: rgba(255,255,255,.55);
  border: 1px solid rgba(0,0,0,.07);
  color: #777;
  font-size: 13px;
  font-weight: 950;
}

.step-pill.active { background: #242424; color: #fff; }

.status {
  margin-top: 10px;
  color: #818181;
  font-size: 12px;
  font-weight: 850;
  text-align: right;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  z-index: 150;
  transform: translateX(-50%) translateY(24px);
  opacity: 0;
  pointer-events: none;
  border-radius: 999px;
  padding: 12px 16px;
  background: rgba(24,24,24,.94);
  color: #fff;
  font-size: 13px;
  font-weight: 900;
  transition: .24s ease;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 900px) {
  html, body { overflow: auto; }
  .scene { width: 900px; height: 1450px; transform-origin: top left; }
}

  </style>
</head>
<body>
  <main class="scene" id="scene">
    <div class="corner-controls">
      <button class="corner-btn" id="newBtn" type="button">Yeni</button>
      <button class="corner-btn" id="listBtn" type="button">Notlar</button>
    </div><section class="orbit" aria-label="Adım yörüngesi">
  <span class="orbit-marker m1"></span>
  <span class="orbit-marker m2 dark"></span>
  <span class="orbit-marker m3"></span>
  <span class="orbit-marker m4"></span>
</section>

<button class="ghost-step g1" data-step="0" type="button">01</button>
<button class="ghost-step g2" data-step="1" type="button">02</button>
<button class="ghost-step g4" data-step="3" type="button">04</button>
<button class="ghost-step g5" data-step="4" type="button">05</button>

<section class="focus" id="focusBlock">
  <div class="focus-no" id="focusNo">03</div>
  <div class="focus-copy">
    <h1 class="focus-title" id="focusTitle">Ambient</h1>
    <p class="focus-desc" id="focusDesc">already on and never<br>turns off.</p>
  </div>
</section>

<button class="editor-toggle" id="editorBtn" type="button">✎</button>

  </main>  <div class="sheet-backdrop" id="backdrop"></div>
  <aside class="sheet" id="sheet">
    <div class="sheet-head">
      <div>
        <p class="sheet-kicker" id="sheetKicker">Orbital note</p>
        <h2 class="sheet-title" id="sheetTitle">Notlar</h2>
      </div>
      <button class="close-btn" id="closeSheet" type="button">×</button>
    </div><form class="form" id="planetForm">
  <label>
    Gezegen adı
    <input id="planetName" type="text" placeholder="Örn. Ambient" required />
  </label>
  <label>
    Kategori
    <select id="planetCategory" required>
      <option value="">Seç</option>
      <option>Ambient</option>
      <option>Araştırma</option>
      <option>Kişisel</option>
      <option>Fikir</option>
      <option>Proje</option>
    </select>
  </label>
  <button class="primary-btn" type="submit">Oluştur</button>
</form>

<div class="step-row" id="stepRow"></div>

<label>
  Aktif not
  <textarea id="noteArea" placeholder="Bu adıma ait notunu yaz..."></textarea>
</label>
<div class="status" id="saveStatus">Kaydedildi</div>

<section class="planet-list" id="planetList"></section>

  </aside>  <div class="toast" id="toast">Kaydedildi</div>  <script>
    const STEPS = [
      { no: '01', title: 'Çekirdek fikir', desc: 'Notun merkezindeki fikri\nkısa ve net biçimde\nyakala.' },
      { no: '02', title: 'Bağlam', desc: 'Neden önemli olduğunu\nve arka planını\ntanımla.' },
      { no: '03', title: 'Ambient', desc: 'already on and never\nturns off.' },
      { no: '04', title: 'Bağlantılar', desc: 'İlgili kişiler ve\nnot ilişkilerini\neşleştir.' },
      { no: '05', title: 'Sonraki adım', desc: 'Devam etmek için\nen net hareketi\nyaz.' }
    ];

    const STORAGE = 'orbital_reference_exact_v1';
    const scene = document.getElementById('scene');
    const focusNo = document.getElementById('focusNo');
    const focusTitle = document.getElementById('focusTitle');
    const focusDesc = document.getElementById('focusDesc');
    const ghostButtons = [...document.querySelectorAll('.ghost-step')];
    const editorBtn = document.getElementById('editorBtn');
    const newBtn = document.getElementById('newBtn');
    const listBtn = document.getElementById('listBtn');
    const sheet = document.getElementById('sheet');
    const backdrop = document.getElementById('backdrop');
    const closeSheet = document.getElementById('closeSheet');
    const form = document.getElementById('planetForm');
    const planetName = document.getElementById('planetName');
    const planetCategory = document.getElementById('planetCategory');
    const stepRow = document.getElementById('stepRow');
    const noteArea = document.getElementById('noteArea');
    const saveStatus = document.getElementById('saveStatus');
    const planetList = document.getElementById('planetList');
    const toast = document.getElementById('toast');

    let planets = JSON.parse(localStorage.getItem(STORAGE) || '[]');
    let activePlanetId = planets[0]?.id || null;
    let activeStep = 2;
    let saveTimer = null;

    if (!planets.length) {
      const demo = {
        id: 'demo',
        name: 'Ambient',
        category: 'Ambient',
        notes: ['', '', '', '', ''],
        createdAt: new Date().toISOString()
      };
      planets.push(demo);
      activePlanetId = demo.id;
      save();
    }

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function save() {
      localStorage.setItem(STORAGE, JSON.stringify(planets));
    }

    function activePlanet() {
      return planets.find(p => p.id === activePlanetId);
    }

    function toastMsg(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => toast.classList.remove('show'), 1300);
    }

    function openSheet() {
      backdrop.classList.add('show');
      sheet.classList.add('show');
      renderSheet();
    }

    function hideSheet() {
      backdrop.classList.remove('show');
      sheet.classList.remove('show');
    }

    function renderMain() {
      const step = STEPS[activeStep];
      focusNo.textContent = step.no;
      focusTitle.textContent = step.title;
      focusDesc.innerHTML = step.desc.replaceAll('\n', '<br>');

      ghostButtons.forEach(btn => {
        const stepIndex = Number(btn.dataset.step);
        btn.style.display = stepIndex === activeStep ? 'none' : 'block';
      });

      if (noteArea) {
        const planet = activePlanet();
        noteArea.value = planet?.notes?.[activeStep] || '';
        noteArea.placeholder = `${step.no} · ${step.title} için notunu yaz...`;
      }
      renderSheet();
    }

    function renderStepButtons() {
      stepRow.innerHTML = '';
      STEPS.forEach((step, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'step-pill' + (index === activeStep ? ' active' : '');
        btn.textContent = step.no;
        btn.addEventListener('click', () => goToStep(index));
        stepRow.appendChild(btn);
      });
    }

    function renderPlanets() {
      planetList.innerHTML = '';
      planets.forEach((planet, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'planet-chip' + (planet.id === activePlanetId ? ' active' : '');
        btn.innerHTML = `
          <span class="mini-planet"></span>
          <span><strong>${String(index + 1).padStart(2,'0')} · ${planet.name}</strong><span>${planet.category}</span></span>
        `;
        btn.addEventListener('click', () => {
          activePlanetId = planet.id;
          save();
          renderMain();
        });
        planetList.appendChild(btn);
      });
    }

    function renderSheet() {
      renderStepButtons();
      renderPlanets();
      const planet = activePlanet();
      const step = STEPS[activeStep];
      if (planet) noteArea.value = planet.notes[activeStep] || '';
      noteArea.placeholder = `${step.no} · ${step.title} için notunu yaz...`;
    }

    function goToStep(index) {
      activeStep = Math.max(0, Math.min(4, index));
      renderMain();
    }

    ghostButtons.forEach(btn => {
      btn.addEventListener('click', () => goToStep(Number(btn.dataset.step)));
    });

    editorBtn.addEventListener('click', openSheet);
    newBtn.addEventListener('click', openSheet);
    listBtn.addEventListener('click', openSheet);
    closeSheet.addEventListener('click', hideSheet);
    backdrop.addEventListener('click', hideSheet);

    form.addEventListener('submit', event => {
      event.preventDefault();
      const planet = {
        id: uid(),
        name: planetName.value.trim(),
        category: planetCategory.value,
        notes: ['', '', '', '', ''],
        createdAt: new Date().toISOString()
      };
      if (!planet.name || !planet.category) return;
      planets.unshift(planet);
      activePlanetId = planet.id;
      activeStep = 2;
      save();
      form.reset();
      renderMain();
      toastMsg('Gezegen oluşturuldu');
    });

    noteArea.addEventListener('input', () => {
      const planet = activePlanet();
      if (!planet) return;
      planet.notes[activeStep] = noteArea.value;
      planet.updatedAt = new Date().toISOString();
      save();
      saveStatus.textContent = 'Kaydediliyor...';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveStatus.textContent = 'Kaydedildi', 420);
    });

    window.addEventListener('keydown', event => {
      if (document.activeElement === noteArea || document.activeElement === planetName) return;
      if (event.key.toLowerCase() === 'n') openSheet();
      if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') goToStep(activeStep - 1);
      if (event.key === 'ArrowDown' || event.key === 'ArrowRight') goToStep(activeStep + 1);
      if (event.key === 'Escape') hideSheet();
    });

    renderMain();
  </script></body>
</html>
