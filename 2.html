<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İpek Yolu Not Defteri</title>
  <style>
    :root {
      --bg: #140d08;
      --panel: rgba(45, 27, 13, 0.88);
      --panel-2: rgba(75, 45, 18, 0.82);
      --gold: #d8a842;
      --gold-light: #ffe19a;
      --bronze: #8a5720;
      --ink: #f2dfba;
      --muted: #b99662;
      --danger: #b8452e;
      --shadow: rgba(0, 0, 0, 0.55);
    }* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, "Times New Roman", serif;
  color: var(--ink);
  background:
    radial-gradient(circle at top, rgba(216, 168, 66, 0.18), transparent 30%),
    linear-gradient(rgba(20, 13, 8, 0.75), rgba(20, 13, 8, 0.96)),
    repeating-linear-gradient(45deg, #1b1008 0, #1b1008 12px, #130b06 12px, #130b06 24px);
  overflow-x: hidden;
}

body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

body::before {
  background:
    radial-gradient(circle at 18% 28%, rgba(216, 168, 66, 0.16), transparent 9%),
    radial-gradient(circle at 82% 18%, rgba(168, 76, 32, 0.14), transparent 11%),
    radial-gradient(circle at 70% 78%, rgba(216, 168, 66, 0.09), transparent 14%);
  filter: blur(1px);
}

body::after {
  background-image:
    linear-gradient(90deg, transparent 0 96%, rgba(216, 168, 66, 0.05) 97% 100%),
    linear-gradient(0deg, transparent 0 96%, rgba(216, 168, 66, 0.04) 97% 100%);
  background-size: 64px 64px;
  opacity: 0.45;
}

.app {
  position: relative;
  z-index: 1;
  width: min(1180px, calc(100% - 32px));
  margin: 28px auto;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 22px;
}

.frame {
  border: 1px solid rgba(255, 225, 154, 0.42);
  border-radius: 18px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.05), transparent 35%),
    var(--panel);
  box-shadow: 0 18px 50px var(--shadow), inset 0 0 22px rgba(216, 168, 66, 0.08);
  backdrop-filter: blur(6px);
}

.sidebar {
  padding: 18px;
  min-height: calc(100vh - 56px);
}

.brand {
  padding: 16px 14px 18px;
  text-align: center;
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(216,168,66,0.18), rgba(50,28,12,0.42));
  border: 1px solid rgba(216, 168, 66, 0.34);
  margin-bottom: 16px;
}

.brand .sigil {
  width: 66px;
  height: 66px;
  margin: 0 auto 10px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--gold-light);
  font-size: 32px;
  background:
    radial-gradient(circle, rgba(255,225,154,0.2), transparent 58%),
    conic-gradient(from 20deg, #7b3f16, #d8a842, #7b3f16, #3b1d0c, #d8a842, #7b3f16);
  border: 2px solid rgba(255, 225, 154, 0.58);
  box-shadow: 0 0 24px rgba(216, 168, 66, 0.28);
}

.brand h1 {
  margin: 0;
  font-size: 25px;
  letter-spacing: 0.8px;
  color: var(--gold-light);
  text-shadow: 0 2px 0 #4b270d, 0 0 18px rgba(216,168,66,0.35);
}

.brand p {
  margin: 7px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.toolbar,
.note-tools {
  display: grid;
  gap: 10px;
}

button,
input,
textarea {
  font: inherit;
}

button {
  border: 1px solid rgba(255, 225, 154, 0.38);
  color: var(--gold-light);
  background: linear-gradient(180deg, #6c3d16, #2b170a);
  border-radius: 12px;
  padding: 11px 12px;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 18px rgba(0,0,0,0.28);
  transition: transform 0.15s ease, filter 0.15s ease, border-color 0.15s ease;
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(1.12);
  border-color: rgba(255, 225, 154, 0.65);
}

button:active {
  transform: translateY(0);
}

.danger {
  background: linear-gradient(180deg, #7a2f22, #2a100d);
  color: #ffd7cb;
}

.ghost {
  background: rgba(24, 14, 8, 0.62);
  color: var(--ink);
}

.search {
  width: 100%;
  padding: 12px 13px;
  border-radius: 12px;
  border: 1px solid rgba(216, 168, 66, 0.34);
  background: rgba(17, 10, 5, 0.72);
  color: var(--ink);
  outline: none;
  margin: 14px 0 12px;
}

.search:focus,
.title:focus,
textarea:focus {
  border-color: var(--gold-light);
  box-shadow: 0 0 0 3px rgba(216, 168, 66, 0.16);
}

.notes-list {
  display: grid;
  gap: 10px;
  max-height: calc(100vh - 330px);
  overflow: auto;
  padding-right: 4px;
}

.note-card {
  padding: 12px;
  border-radius: 13px;
  border: 1px solid rgba(216,168,66,0.22);
  background: rgba(24, 13, 6, 0.66);
  cursor: pointer;
  transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
}

.note-card:hover,
.note-card.active {
  background: linear-gradient(180deg, rgba(138,87,32,0.46), rgba(24,13,6,0.72));
  border-color: rgba(255,225,154,0.55);
  transform: translateX(2px);
}

.note-card strong {
  display: block;
  color: var(--gold-light);
  font-size: 15px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.note-card span {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.editor {
  min-height: calc(100vh - 56px);
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  overflow: hidden;
}

.editor-header {
  padding: 20px 22px 14px;
  border-bottom: 1px solid rgba(216,168,66,0.22);
  background: linear-gradient(90deg, rgba(216,168,66,0.12), transparent);
}

.title {
  width: 100%;
  border: 1px solid rgba(216, 168, 66, 0.28);
  background: rgba(17, 10, 5, 0.56);
  color: var(--gold-light);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: clamp(24px, 3vw, 38px);
  outline: none;
  text-shadow: 0 0 12px rgba(216,168,66,0.18);
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 18px;
  color: var(--muted);
  padding: 12px 22px;
  font-size: 13px;
  border-bottom: 1px solid rgba(216,168,66,0.16);
}

textarea {
  width: 100%;
  height: 100%;
  resize: none;
  border: 0;
  outline: none;
  color: #2b1608;
  padding: 28px;
  line-height: 1.65;
  font-size: 18px;
  background:
    linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.05)),
    repeating-linear-gradient(#ead2a0 0 31px, #d0ad6b 32px),
    #e2c482;
  box-shadow: inset 0 12px 30px rgba(54,29,8,0.28);
}

.bottom-bar {
  padding: 13px 18px;
  display: flex;
  gap: 10px;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(216,168,66,0.22);
  background: rgba(20, 12, 7, 0.82);
}

.status {
  color: var(--muted);
  font-size: 13px;
}

.bottom-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.empty {
  color: var(--muted);
  font-size: 13px;
  text-align: center;
  padding: 18px 10px;
  border: 1px dashed rgba(216,168,66,0.26);
  border-radius: 14px;
}

::selection {
  background: rgba(216, 168, 66, 0.42);
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(20, 12, 7, 0.65);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(var(--gold), var(--bronze));
  border-radius: 999px;
  border: 2px solid rgba(20,12,7,0.85);
}

@media (max-width: 860px) {
  .app {
    grid-template-columns: 1fr;
    margin: 16px auto;
  }

  .sidebar,
  .editor {
    min-height: auto;
  }

  .notes-list {
    max-height: 220px;
  }

  textarea {
    min-height: 55vh;
  }
}

  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar frame">
      <section class="brand">
        <div class="sigil">✦</div>
        <h1>İpek Yolu Defteri</h1>
        <p>Kervan notları, görev fikirleri ve günlük kayıtlar</p>
      </section><div class="toolbar">
    <button id="newNote">Yeni Parşömen</button>
    <button id="duplicateNote" class="ghost">Notu Çoğalt</button>
  </div>

  <input id="search" class="search" type="search" placeholder="Notlarda ara..." />

  <section id="notesList" class="notes-list"></section>
</aside>

<section class="editor frame">
  <header class="editor-header">
    <input id="title" class="title" type="text" placeholder="Başlık yaz..." />
  </header>

  <div class="meta">
    <span id="createdAt">Oluşturulma: -</span>
    <span id="updatedAt">Son kayıt: -</span>
    <span id="wordCount">0 kelime</span>
    <span id="charCount">0 karakter</span>
  </div>

  <textarea id="content" placeholder="Buraya notunu yaz...\n\nÖrn: Hotan pazarında satılacak eşyalar, kervan rotası, görev notları..."></textarea>

  <footer class="bottom-bar">
    <div id="status" class="status">Hazır</div>
    <div class="bottom-actions">
      <button id="exportNote" class="ghost">.txt Dışa Aktar</button>
      <button id="clearNote" class="danger">Temizle</button>
      <button id="deleteNote" class="danger">Sil</button>
    </div>
  </footer>
</section>

  </main>  <script>
    const STORAGE_KEY = "silkroad_not_defteri_v1";

    const elements = {
      newNote: document.getElementById("newNote"),
      duplicateNote: document.getElementById("duplicateNote"),
      search: document.getElementById("search"),
      notesList: document.getElementById("notesList"),
      title: document.getElementById("title"),
      content: document.getElementById("content"),
      createdAt: document.getElementById("createdAt"),
      updatedAt: document.getElementById("updatedAt"),
      wordCount: document.getElementById("wordCount"),
      charCount: document.getElementById("charCount"),
      status: document.getElementById("status"),
      exportNote: document.getElementById("exportNote"),
      clearNote: document.getElementById("clearNote"),
      deleteNote: document.getElementById("deleteNote")
    };

    let notes = loadNotes();
    let activeId = notes[0]?.id || null;
    let saveTimer = null;

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function now() {
      return new Date().toISOString();
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("tr-TR", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function loadNotes() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (Array.isArray(saved) && saved.length) return saved;
      } catch (error) {
        console.warn("Notlar okunamadı", error);
      }

      const seedTime = now();
      return [
        {
          id: uid(),
          title: "Kervan Günlüğü",
          content: "Jangan kapısından çıkmadan önce:\n- İksirleri tamamla\n- Depodaki eski eşyaları sat\n- Kervan rotasını kontrol et\n\nBugünün hedefi: güvenli ticaret, temiz kazanç.",
          createdAt: seedTime,
          updatedAt: seedTime
        }
      ];
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function activeNote() {
      return notes.find(note => note.id === activeId) || null;
    }

    function renderList() {
      const term = elements.search.value.trim().toLowerCase();
      const filtered = notes.filter(note => {
        return note.title.toLowerCase().includes(term) || note.content.toLowerCase().includes(term);
      });

      elements.notesList.innerHTML = "";

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Aramaya uygun not bulunamadı.";
        elements.notesList.appendChild(empty);
        return;
      }

      filtered
        .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
        .forEach(note => {
          const card = document.createElement("article");
          card.className = "note-card" + (note.id === activeId ? " active" : "");
          card.innerHTML = `
            <strong>${escapeHtml(note.title || "Başlıksız Parşömen")}</strong>
            <span>${escapeHtml((note.content || "Boş not").replace(/\s+/g, " ").slice(0, 90))}</span>
          `;
          card.addEventListener("click", () => selectNote(note.id));
          elements.notesList.appendChild(card);
        });
    }

    function renderEditor() {
      const note = activeNote();
      if (!note) {
        createNote();
        return;
      }

      elements.title.value = note.title;
      elements.content.value = note.content;
      elements.createdAt.textContent = `Oluşturulma: ${formatDate(note.createdAt)}`;
      elements.updatedAt.textContent = `Son kayıt: ${formatDate(note.updatedAt)}`;
      updateCounts();
    }

    function selectNote(id) {
      activeId = id;
      renderEditor();
      renderList();
      setStatus("Parşömen açıldı");
    }

    function createNote() {
      const timestamp = now();
      const note = {
        id: uid(),
        title: "Yeni Parşömen",
        content: "",
        createdAt: timestamp,
        updatedAt: timestamp
      };
      notes.unshift(note);
      activeId = note.id;
      persist();
      renderEditor();
      renderList();
      elements.title.select();
      setStatus("Yeni not oluşturuldu");
    }

    function saveActiveNote() {
      const note = activeNote();
      if (!note) return;

      note.title = elements.title.value.trim() || "Başlıksız Parşömen";
      note.content = elements.content.value;
      note.updatedAt = now();
      persist();
      renderList();
      elements.updatedAt.textContent = `Son kayıt: ${formatDate(note.updatedAt)}`;
      setStatus("Kaydedildi");
    }

    function scheduleSave() {
      updateCounts();
      setStatus("Yazılıyor...");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveActiveNote, 350);
    }

    function updateCounts() {
      const text = elements.content.value.trim();
      const words = text ? text.split(/\s+/).length : 0;
      const chars = elements.content.value.length;
      elements.wordCount.textContent = `${words} kelime`;
      elements.charCount.textContent = `${chars} karakter`;
    }

    function duplicateNote() {
      const note = activeNote();
      if (!note) return;
      const timestamp = now();
      const copy = {
        id: uid(),
        title: `${note.title} - Kopya`,
        content: note.content,
        createdAt: timestamp,
        updatedAt: timestamp
      };
      notes.unshift(copy);
      activeId = copy.id;
      persist();
      renderEditor();
      renderList();
      setStatus("Not çoğaltıldı");
    }

    function clearNote() {
      const note = activeNote();
      if (!note) return;
      if (!confirm("Bu notun içeriği temizlensin mi?")) return;
      elements.content.value = "";
      saveActiveNote();
      updateCounts();
      setStatus("İçerik temizlendi");
    }

    function deleteNote() {
      const note = activeNote();
      if (!note) return;
      if (!confirm(`“${note.title}” silinsin mi?`)) return;
      notes = notes.filter(item => item.id !== note.id);
      if (!notes.length) {
        activeId = null;
        createNote();
        return;
      }
      activeId = notes[0].id;
      persist();
      renderEditor();
      renderList();
      setStatus("Not silindi");
    }

    function exportNote() {
      const note = activeNote();
      if (!note) return;
      const blob = new Blob([`${note.title}\n\n${note.content}`], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${slugify(note.title)}.txt`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus("Dışa aktarıldı");
    }

    function slugify(text) {
      return (text || "not")
        .toLowerCase()
        .replace(/[ğ]/g, "g")
        .replace(/[ü]/g, "u")
        .replace(/[ş]/g, "s")
        .replace(/[ı]/g, "i")
        .replace(/[ö]/g, "o")
        .replace(/[ç]/g, "c")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "") || "not";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setStatus(message) {
      elements.status.textContent = message;
      clearTimeout(setStatus.timer);
      setStatus.timer = setTimeout(() => {
        elements.status.textContent = "Hazır";
      }, 1800);
    }

    elements.newNote.addEventListener("click", createNote);
    elements.duplicateNote.addEventListener("click", duplicateNote);
    elements.clearNote.addEventListener("click", clearNote);
    elements.deleteNote.addEventListener("click", deleteNote);
    elements.exportNote.addEventListener("click", exportNote);
    elements.search.addEventListener("input", renderList);
    elements.title.addEventListener("input", scheduleSave);
    elements.content.addEventListener("input", scheduleSave);

    renderEditor();
    renderList();
  </script></body>
</html>
