<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Silkroad Temalı Not Defteri</title>
  <style>
    :root{
      --bg:#3a2a1a;
      --panel:#1c1c1d;
      --panel-2:#262626;
      --panel-3:#111;
      --gold:#9f8a57;
      --gold-2:#cbb476;
      --gold-3:#6f603b;
      --blue:#4f5f8d;
      --blue-2:#6678a9;
      --line:#5d5d5d;
      --text:#e7d9b8;
      --muted:#b7aa86;
      --danger:#8d3a32;
      --success:#5f7b44;
      --shadow: rgba(0,0,0,.45);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.06), transparent 25%),
        linear-gradient(180deg, #7d5f34 0%, #4e3b21 16%, #2a2117 100%);
      color:var(--text);
      font-family: Tahoma, Verdana, Arial, sans-serif;
      overflow-x:hidden;
    }

    body{
      min-height:100dvh;
    }

    .app{
      width:100%;
      min-height:100dvh;
      padding:10px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .window{
      width:100%;
      max-width:460px;
      background:linear-gradient(180deg, #2d2d2d 0%, #181818 100%);
      border:2px solid var(--gold-3);
      box-shadow:
        0 0 0 1px #000 inset,
        0 0 0 2px #4b4b4b inset,
        0 10px 30px var(--shadow);
      border-radius:8px;
      overflow:hidden;
    }

    /* ÜST BAŞLIK */
    .titlebar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      background:
        linear-gradient(180deg, #0b0b0b 0%, #171717 100%);
      border-bottom:1px solid #444;
      box-shadow: inset 0 -1px 0 #000;
    }

    .titlebar h1{
      margin:0;
      font-size:15px;
      font-weight:700;
      color:#f3f0e3;
      letter-spacing:.3px;
      text-align:center;
      flex:1;
    }

    .title-deco{
      width:24px;
      height:24px;
      border:1px solid var(--gold-3);
      background:linear-gradient(180deg, #7b6a3d, #534525);
      border-radius:3px;
      display:grid;
      place-items:center;
      color:#efe2b8;
      font-size:13px;
      font-weight:bold;
      flex:0 0 24px;
    }

    /* MAVI BAR */
    .namebar{
      margin:8px;
      background:linear-gradient(180deg, var(--blue-2) 0%, var(--blue) 100%);
      border:1px solid #7e8ebc;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
      border-radius:4px;
      padding:6px 10px;
      text-align:center;
      color:#f1f4ff;
      font-weight:700;
      font-size:16px;
    }

    /* İÇ PANEL */
    .content{
      padding:8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 10%),
        linear-gradient(180deg, #1c1c1c, #151515);
      border-top:1px solid #2d2d2d;
    }

    .section{
      background:linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
      border:1px solid #474747;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      padding:10px;
      margin-bottom:8px;
      border-radius:4px;
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .row + .row{
      margin-top:8px;
    }

    .label{
      color:var(--gold-2);
      font-size:13px;
      min-width:88px;
      flex:0 0 auto;
    }

    .value{
      color:#fff;
      font-size:13px;
      flex:1 1 auto;
      min-width:0;
    }

    .field{
      width:100%;
      border:1px solid #4e4e4e;
      background:linear-gradient(180deg, #0a0a0a, #151515);
      color:#fff;
      border-radius:4px;
      padding:10px 12px;
      outline:none;
      font-size:14px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.7);
    }

    .field::placeholder,
    textarea::placeholder{
      color:#8e8e8e;
    }

    .field:focus,
    textarea:focus{
      border-color:#8d9fd3;
      box-shadow:
        inset 0 1px 2px rgba(0,0,0,.7),
        0 0 0 1px rgba(141,159,211,.25);
    }

    .editor-title{
      font-size:13px;
      color:var(--gold-2);
      margin-bottom:6px;
    }

    textarea{
      width:100%;
      min-height:280px;
      resize:vertical;
      border:1px solid #4e4e4e;
      background:
        linear-gradient(180deg, #171717 0%, #0f0f0f 100%);
      color:#ececec;
      border-radius:4px;
      padding:12px;
      outline:none;
      font-size:14px;
      line-height:1.55;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.7);
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .statbox{
      background:linear-gradient(180deg, #2e2e2e, #222);
      border:1px solid #4d4d4d;
      border-radius:4px;
      padding:8px;
    }

    .statbox .small{
      color:var(--gold-2);
      font-size:12px;
      margin-bottom:4px;
    }

    .statbox .big{
      color:#fff;
      font-size:13px;
      font-weight:700;
    }

    .bar-group{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .barline{
      display:grid;
      grid-template-columns:42px 1fr;
      gap:8px;
      align-items:center;
    }

    .barline span{
      color:#ddd;
      font-size:12px;
      font-weight:700;
    }

    .bar{
      height:18px;
      background:#060606;
      border:1px solid #444;
      border-radius:3px;
      overflow:hidden;
      position:relative;
    }

    .fill{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
    }

    .fill.red{
      width:100%;
      background:linear-gradient(180deg, #ff4157, #be0b1f);
    }

    .fill.blue{
      width:72%;
      background:linear-gradient(180deg, #4a70ff, #1430a9);
    }

    .bartext{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      color:#fff;
      text-shadow:0 1px 1px #000;
      padding:0 6px;
    }

    /* BUTONLAR */
    .actions{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:8px;
    }

    .btn{
      appearance:none;
      border:1px solid var(--gold-3);
      background:
        linear-gradient(180deg, #6d603d 0%, #4d432b 48%, #3b321f 49%, #2a2418 100%);
      color:#f1e7c8;
      border-radius:4px;
      padding:10px 8px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 1px 0 rgba(0,0,0,.45);
      min-height:42px;
    }

    .btn:active{
      transform:translateY(1px);
      filter:brightness(.96);
    }

    .btn.blue{
      border-color:#5a6b9f;
      background:linear-gradient(180deg, #7085bf, #4d608e 52%, #3a4a72 53%, #2c3857);
    }

    .btn.red{
      border-color:#77413c;
      background:linear-gradient(180deg, #94514a, #713a35 52%, #5a2e2a 53%, #42211e);
    }

    .btn.green{
      border-color:#576c40;
      background:linear-gradient(180deg, #7b9860, #5d7645 52%, #496036 53%, #354629);
    }

    .btn.full{
      grid-column:1 / -1;
    }

    .footer{
      padding:10px;
      border-top:1px solid #454545;
      background:linear-gradient(180deg, #161616, #0d0d0d);
      display:flex;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
      font-size:12px;
      color:var(--muted);
    }

    .chip{
      background:#0a0a0a;
      border:1px solid #3b3b3b;
      border-radius:4px;
      padding:5px 8px;
      white-space:nowrap;
    }

    /* NOTLAR PANELİ */
    .drawer{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:flex-end;
      z-index:100;
    }

    .drawer.open{
      display:flex;
    }

    .drawer-panel{
      width:100%;
      max-width:460px;
      margin:0 auto;
      background:linear-gradient(180deg, #262626, #171717);
      border:2px solid var(--gold-3);
      border-bottom:none;
      border-radius:10px 10px 0 0;
      max-height:78dvh;
      overflow:hidden;
      box-shadow:0 -10px 30px rgba(0,0,0,.45);
    }

    .drawer-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px;
      border-bottom:1px solid #444;
      background:linear-gradient(180deg, #0f0f0f, #1a1a1a);
    }

    .drawer-head h2{
      margin:0;
      font-size:14px;
      color:#f0e6c7;
    }

    .drawer-body{
      padding:10px;
    }

    .search{
      width:100%;
      margin-bottom:10px;
    }

    .notes{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:56dvh;
      overflow:auto;
    }

    .note-item{
      width:100%;
      text-align:left;
      border:1px solid #4d4d4d;
      background:linear-gradient(180deg, #2b2b2b, #1e1e1e);
      border-radius:4px;
      padding:10px;
      color:#ececec;
      cursor:pointer;
    }

    .note-item.active{
      border-color:#92a3d6;
      background:linear-gradient(180deg, #41527d, #2a3450);
    }

    .note-title{
      display:block;
      font-size:13px;
      font-weight:700;
      color:#fff;
      margin-bottom:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .note-preview{
      display:block;
      font-size:12px;
      color:#bdbdbd;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .empty{
      text-align:center;
      color:#a9a9a9;
      font-size:13px;
      padding:16px;
      border:1px dashed #575757;
      border-radius:4px;
      background:#121212;
    }

    @media (min-width: 700px){
      .window{
        max-width:560px;
      }

      .actions{
        grid-template-columns:repeat(3, 1fr);
      }

      .drawer-panel{
        max-width:560px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="window">
      <div class="titlebar">
        <div class="title-deco">◄</div>
        <h1>Character</h1>
        <div class="title-deco">×</div>
      </div>

      <div class="namebar">Not Defteri</div>

      <div class="content">
        <div class="section">
          <div class="bar-group">
            <div class="barline">
              <span>HP</span>
              <div class="bar">
                <div class="fill red"></div>
                <div class="bartext">Hazır</div>
              </div>
            </div>
            <div class="barline">
              <span>MP</span>
              <div class="bar">
                <div class="fill blue"></div>
                <div class="bartext" id="autosaveText">Otomatik kayıt açık</div>
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="editor-title">Not Başlığı</div>
          <input id="titleInput" class="field" type="text" placeholder="Başlık gir..." />
        </div>

        <div class="section">
          <div class="editor-title">Not İçeriği</div>
          <textarea id="contentInput" placeholder="Buraya notunu yaz..."></textarea>
        </div>

        <div class="section">
          <div class="stats">
            <div class="statbox">
              <div class="small">Not Sayısı</div>
              <div class="big" id="noteCount">0</div>
            </div>
            <div class="statbox">
              <div class="small">Aktif Not</div>
              <div class="big" id="activeInfo">Yok</div>
            </div>
            <div class="statbox">
              <div class="small">Kelime</div>
              <div class="big" id="wordCount">0</div>
            </div>
            <div class="statbox">
              <div class="small">Karakter</div>
              <div class="big" id="charCount">0</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="actions">
            <button class="btn blue" id="openNotesBtn">Notlar</button>
            <button class="btn green" id="newBtn">Yeni</button>
            <button class="btn" id="saveBtn">Kaydet</button>
            <button class="btn" id="duplicateBtn">Kopyala</button>
            <button class="btn red" id="clearBtn">Temizle</button>
            <button class="btn red" id="deleteBtn">Sil</button>
            <button class="btn full" id="exportBtn">TXT Dışa Aktar</button>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="chip" id="statusText">Durum: Hazır</div>
        <div class="chip" id="updatedText">Son kayıt: -</div>
      </div>
    </div>
  </div>

  <!-- Notlar Paneli -->
  <div class="drawer" id="drawer">
    <div class="drawer-panel">
      <div class="drawer-head">
        <h2>Not Listesi</h2>
        <button class="btn" id="closeDrawerBtn" style="padding:8px 12px; min-height:auto;">Kapat</button>
      </div>
      <div class="drawer-body">
        <input id="searchInput" class="field search" type="search" placeholder="Not ara..." />
        <div class="notes" id="notesList"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "sro_mobile_notes_v2";

    const el = {
      titleInput: document.getElementById("titleInput"),
      contentInput: document.getElementById("contentInput"),
      noteCount: document.getElementById("noteCount"),
      activeInfo: document.getElementById("activeInfo"),
      wordCount: document.getElementById("wordCount"),
      charCount: document.getElementById("charCount"),
      statusText: document.getElementById("statusText"),
      updatedText: document.getElementById("updatedText"),
      autosaveText: document.getElementById("autosaveText"),

      openNotesBtn: document.getElementById("openNotesBtn"),
      closeDrawerBtn: document.getElementById("closeDrawerBtn"),
      drawer: document.getElementById("drawer"),
      searchInput: document.getElementById("searchInput"),
      notesList: document.getElementById("notesList"),

      newBtn: document.getElementById("newBtn"),
      saveBtn: document.getElementById("saveBtn"),
      duplicateBtn: document.getElementById("duplicateBtn"),
      clearBtn: document.getElementById("clearBtn"),
      deleteBtn: document.getElementById("deleteBtn"),
      exportBtn: document.getElementById("exportBtn"),
    };

    let notes = loadNotes();
    let activeId = notes[0]?.id ?? null;
    let saveTimer = null;

    function uid(){
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function nowISO(){
      return new Date().toISOString();
    }

    function formatDate(iso){
      if(!iso) return "-";
      return new Intl.DateTimeFormat("tr-TR", {
        dateStyle:"short",
        timeStyle:"short"
      }).format(new Date(iso));
    }

    function loadNotes(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw){
          const parsed = JSON.parse(raw);
          if(Array.isArray(parsed) && parsed.length) return parsed;
        }
      }catch(e){}

      const t = nowISO();
      return [{
        id: uid(),
        title: "Yeni Not",
        content: "",
        createdAt: t,
        updatedAt: t
      }];
    }

    function persist(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function getActiveNote(){
      return notes.find(n => n.id === activeId) || null;
    }

    function setStatus(text){
      el.statusText.textContent = "Durum: " + text;
    }

    function updateStats(){
      const content = el.contentInput.value || "";
      const trimmed = content.trim();
      const words = trimmed ? trimmed.split(/\s+/).length : 0;
      const chars = content.length;

      el.wordCount.textContent = words;
      el.charCount.textContent = chars;
      el.noteCount.textContent = notes.length;

      const active = getActiveNote();
      el.activeInfo.textContent = active ? "Seçili" : "Yok";
      el.updatedText.textContent = "Son kayıt: " + (active ? formatDate(active.updatedAt) : "-");
    }

    function renderEditor(){
      const note = getActiveNote();
      if(!note) return;

      el.titleInput.value = note.title || "";
      el.contentInput.value = note.content || "";
      updateStats();
    }

    function renderNotes(){
      const q = el.searchInput.value.trim().toLowerCase();
      const filtered = [...notes]
        .sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt))
        .filter(n => {
          return (n.title || "").toLowerCase().includes(q) ||
                 (n.content || "").toLowerCase().includes(q);
        });

      el.notesList.innerHTML = "";

      if(!filtered.length){
        el.notesList.innerHTML = '<div class="empty">Aramaya uygun not bulunamadı.</div>';
        return;
      }

      filtered.forEach(note => {
        const btn = document.createElement("button");
        btn.className = "note-item" + (note.id === activeId ? " active" : "");
        btn.innerHTML = `
          <span class="note-title">${escapeHtml(note.title || "Başlıksız Not")}</span>
          <span class="note-preview">${escapeHtml((note.content || "Boş not").replace(/\s+/g," ").slice(0, 60))}</span>
        `;
        btn.addEventListener("click", () => {
          activeId = note.id;
          renderEditor();
          renderNotes();
          closeDrawer();
          setStatus("Not açıldı");
        });
        el.notesList.appendChild(btn);
      });

      updateStats();
    }

    function saveActiveNote(){
      const note = getActiveNote();
      if(!note) return;

      note.title = (el.titleInput.value || "").trim() || "Başlıksız Not";
      note.content = el.contentInput.value || "";
      note.updatedAt = nowISO();

      persist();
      renderNotes();
      updateStats();
      setStatus("Kaydedildi");
      el.autosaveText.textContent = "Kaydedildi";
    }

    function scheduleSave(){
      updateStats();
      setStatus("Yazılıyor...");
      el.autosaveText.textContent = "Yazılıyor...";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveActiveNote, 350);
    }

    function createNote(){
      const t = nowISO();
      const newNote = {
        id: uid(),
        title: "Yeni Not",
        content: "",
        createdAt: t,
        updatedAt: t
      };
      notes.unshift(newNote);
      activeId = newNote.id;
      persist();
      renderEditor();
      renderNotes();
      setStatus("Yeni not oluşturuldu");
      el.autosaveText.textContent = "Hazır";
      el.titleInput.focus();
      el.titleInput.select();
    }

    function duplicateNote(){
      const current = getActiveNote();
      if(!current) return;

      const t = nowISO();
      const copy = {
        id: uid(),
        title: (current.title || "Not") + " - Kopya",
        content: current.content || "",
        createdAt: t,
        updatedAt: t
      };

      notes.unshift(copy);
      activeId = copy.id;
      persist();
      renderEditor();
      renderNotes();
      setStatus("Not kopyalandı");
    }

    function clearCurrent(){
      const current = getActiveNote();
      if(!current) return;

      if(!confirm("Bu notun içeriği temizlensin mi?")) return;
      el.contentInput.value = "";
      saveActiveNote();
      setStatus("İçerik temizlendi");
    }

    function deleteCurrent(){
      const current = getActiveNote();
      if(!current) return;

      if(!confirm("Bu not silinsin mi?")) return;

      notes = notes.filter(n => n.id !== current.id);

      if(!notes.length){
        const t = nowISO();
        notes = [{
          id: uid(),
          title: "Yeni Not",
          content: "",
          createdAt: t,
          updatedAt: t
        }];
      }

      activeId = notes[0].id;
      persist();
      renderEditor();
      renderNotes();
      setStatus("Not silindi");
    }

    function exportCurrent(){
      const current = getActiveNote();
      if(!current) return;

      const text = (current.title || "Not") + "\\n\\n" + (current.content || "");
      const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = slugify(current.title || "not") + ".txt";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      setStatus("Dışa aktarıldı");
    }

    function slugify(str){
      return String(str || "not")
        .toLowerCase()
        .replace(/ğ/g, "g")
        .replace(/ü/g, "u")
        .replace(/ş/g, "s")
        .replace(/ı/g, "i")
        .replace(/ö/g, "o")
        .replace(/ç/g, "c")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "") || "not";
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function openDrawer(){
      el.drawer.classList.add("open");
    }

    function closeDrawer(){
      el.drawer.classList.remove("open");
    }

    el.openNotesBtn.addEventListener("click", openDrawer);
    el.closeDrawerBtn.addEventListener("click", closeDrawer);
    el.drawer.addEventListener("click", (e) => {
      if(e.target === el.drawer) closeDrawer();
    });

    el.newBtn.addEventListener("click", createNote);
    el.saveBtn.addEventListener("click", saveActiveNote);
    el.duplicateBtn.addEventListener("click", duplicateNote);
    el.clearBtn.addEventListener("click", clearCurrent);
    el.deleteBtn.addEventListener("click", deleteCurrent);
    el.exportBtn.addEventListener("click", exportCurrent);

    el.titleInput.addEventListener("input", scheduleSave);
    el.contentInput.addEventListener("input", scheduleSave);
    el.searchInput.addEventListener("input", renderNotes);

    renderEditor();
    renderNotes();
    setStatus("Hazır");
  </script>
</body>
</html>
